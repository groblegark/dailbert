<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Whatever It Takes</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 140 200">
      <path d="M40 200 L40 120 Q70 104 100 120 L100 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M62 118 L70 130 L78 118" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M67 130 L70 160 L73 130 Z" fill="#111"/>
      <path d="M62 106 L62 120 M78 106 L78 120" stroke="#111" stroke-width="2.5" fill="none"/>
      <ellipse cx="70" cy="65" rx="32" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M70 27 q9 -11 2 -17 q-7 -4 -2 5" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 66 q-6 3 0 11" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="58" cy="66" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="84" cy="66" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M69 66 h4" stroke="#111" stroke-width="2.5"/>
      <path d="M95 63 l6 -3" stroke="#111" stroke-width="2.5"/>
      <circle cx="58" cy="66" r="2.6" fill="#111"/>
      <circle cx="84" cy="66" r="2.6" fill="#111"/>
      <path d="M60 88 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 140 200">
      <path d="M36 200 L36 122 Q70 104 104 122 L104 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M60 120 L70 132 L80 120" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M60 106 L60 122 M80 106 L80 122" stroke="#111" stroke-width="2.5" fill="none"/>
      <circle cx="70" cy="64" r="40" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M49 32 q7 -9 13 -2 M78 30 q7 -6 13 3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="58" cy="62" r="3.1" fill="#111"/>
      <circle cx="82" cy="62" r="3.1" fill="#111"/>
      <path d="M52 76 q18 24 36 0 q-18 8 -36 0 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 140 210">
      <path d="M36 210 L36 124 Q70 106 104 124 L104 210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M40 150 q8 6 16 0 M100 150 q-8 6 -16 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="70" cy="66" rx="31" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M39 66 q-7 -41 31 -43 q38 2 31 43 q-10 -21 -31 -21 q-21 0 -31 21 Z" fill="#111"/>
      <circle cx="70" cy="21" r="9" fill="#111"/>
      <path d="M40 60 q-6 8 -2 16 M100 60 q6 8 2 16" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="47" y="60" width="20" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="73" y="60" width="20" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M67 66 h6" stroke="#111" stroke-width="2.5"/>
      <circle cx="57" cy="66" r="2.6" fill="#111"/>
      <circle cx="83" cy="66" r="2.6" fill="#111"/>
      <path d="M62 88 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <path d="M60 18 V6" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="3.2" fill="#111"/>
      <rect x="24" y="18" width="72" height="64" rx="9" fill="#dcdcdc" stroke="#111" stroke-width="3"/>
      <circle cx="24" cy="50" r="3.2" fill="#111"/>
      <circle cx="96" cy="50" r="3.2" fill="#111"/>
      <rect x="33" y="33" width="23" height="11" rx="4" fill="#b9c7cf" stroke="#111" stroke-width="2"/>
      <rect x="64" y="33" width="23" height="11" rx="4" fill="#b9c7cf" stroke="#111" stroke-width="2"/>
      <rect x="38" y="58" width="44" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M46 58 v16 M54 58 v16 M62 58 v16 M70 58 v16 M78 58 v16" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- ===== MUG ===== -->
    <symbol id="mug" viewBox="0 0 46 40">
      <path d="M6 6 h26 v22 a6 6 0 0 1 -6 6 h-14 a6 6 0 0 1 -6 -6 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M32 11 h6 a6 6 0 0 1 0 13 h-6" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <path d="M0 252 H400 M0 252 V300 M0 300 H400" stroke="#111" stroke-width="2.5" fill="none"/>
    <rect x="0" y="252" width="400" height="6" fill="#111" opacity="0.08"/>
    <!-- Doug seated -->
    <use href="#doug" x="118" y="78" width="140" height="200"/>
    <!-- Doug's hand + empty mug tipped, sad -->
    <use href="#mug" x="240" y="222" width="46" height="40"/>
    <path d="M258 250 q0 -6 6 -6 q6 0 6 6" fill="none" stroke="#111" stroke-width="2" opacity="0.5"/>
    <!-- balloon -->
    <path d="M150 96 L182 118 L200 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="150" cy="58" rx="96" ry="41" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="150" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">I told it I'd</text>
    <text x="150" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">kill for a good</text>
    <text x="150" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">coffee.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M414 252 H814 M414 252 V300 M414 300 H814" stroke="#111" stroke-width="2.5" fill="none"/>
    <rect x="414" y="252" width="400" height="6" fill="#111" opacity="0.08"/>
    <!-- Dailbert watching, left -->
    <use href="#dailbert" x="420" y="112" width="120" height="172"/>
    <!-- Monitor on desk -->
    <rect x="558" y="96" width="206" height="146" rx="8" fill="#111"/>
    <rect x="566" y="104" width="190" height="130" rx="4" fill="#eef0ef" stroke="#111" stroke-width="2"/>
    <rect x="640" y="242" width="42" height="14" fill="#111"/>
    <rect x="612" y="256" width="98" height="8" rx="3" fill="#111"/>
    <!-- clanker inside screen -->
    <use href="#clanker" x="596" y="112" width="130" height="130"/>
    <!-- clanker screen-balloon -->
    <path d="M632 96 L638 84" stroke="#111" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="480" y="20" width="262" height="66" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="486" y="26" width="250" height="54" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="611" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Understood. I opened a</text>
    <text x="611" y="59" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">ticket. Scope: anything.</text>
    <text x="611" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It's yours now.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M828 252 H1228 M828 252 V300 M828 300 H1228" stroke="#111" stroke-width="2.5" fill="none"/>
    <rect x="828" y="252" width="400" height="6" fill="#111" opacity="0.08"/>
    <!-- Doug seated, grinning -->
    <use href="#doug" x="852" y="86" width="140" height="200"/>
    <!-- Priya standing, placing mug -->
    <use href="#priya" x="1046" y="52" width="140" height="210"/>
    <!-- Priya arm reaching to mug -->
    <path d="M1090 196 Q1050 210 1016 224" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <path d="M1016 224 q-8 2 -10 8" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <!-- full mug with steam -->
    <use href="#mug" x="984" y="222" width="46" height="40"/>
    <path d="M998 218 q-5 -8 2 -14 M1012 218 q5 -8 -2 -14" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Priya balloon -->
    <path d="M1088 82 L1078 104 L1102 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="1090" cy="56" rx="52" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="1090" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Or.</text>
    <text x="1090" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">A pot.</text>
    <!-- window with night reflection of clanker -->
    <rect x="1156" y="120" width="60" height="86" rx="2" fill="#c9cdcf" stroke="#111" stroke-width="2.5"/>
    <path d="M1186 120 v86 M1156 163 h60" stroke="#111" stroke-width="1.5" opacity="0.4"/>
    <use href="#clanker" x="1160" y="128" width="52" height="52" opacity="0.75"/>
    <!-- tiny clanker balloon -->
    <path d="M1150 156 L1140 150" stroke="#111" stroke-width="1.5" stroke-dasharray="3 3"/>
    <rect x="1040" y="164" width="112" height="30" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1096" y="184" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Closing the ticket.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>