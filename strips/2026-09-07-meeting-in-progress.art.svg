      <path d="M42 78 l-8 10 M78 78 l8 10" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="30" width="52" height="44" rx="6" fill="#1c1c1c" stroke="#9aa0a6" stroke-width="2.5"/>
