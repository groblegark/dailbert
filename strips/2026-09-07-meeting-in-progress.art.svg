      <rect x="140" y="120" width="150" height="14" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="165" y1="134" x2="165" y2="298" stroke="#111" stroke-width="3"/>
      <line x1="265" y1="134" x2="265" y2="298" stroke="#111" stroke-width="3"/>
      <rect x="158" y="200" width="14" height="98" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="258" y="200" width="14" height="98" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="185" y="66" width="70" height="50" rx="4" fill="#1c1c1c" stroke="#111" stroke-width="2.5"/>
      <line x1="220" y1="116" x2="220" y2="120" stroke="#111" stroke-width="3"/>
      <use href="#clanker" x="176" y="52" width="88" height="88"/>
      <rect x="60" y="240" width="34" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="66" y1="250" x2="66" y2="298" stroke="#111" stroke-width="2.2"/>
      <line x1="88" y1="250" x2="88" y2="298" stroke="#111" stroke-width="2.2"/>
      <line x1="90" y1="240" x2="90" y2="210" stroke="#111" stroke-width="2.2"/>
      <rect x="76" y="200" width="16" height="42" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="330" cy="60" r="22" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="330" y1="60" x2="330" y2="45" stroke="#111" stroke-width="2"/>
      <line x1="330" y1="60" x2="341" y2="60" stroke="#111" stroke-width="2"/>
      <text x="330" y="94" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" text-anchor="middle" fill="#111">since 3 a.m.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="430" y1="300" x2="800" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#dailbert" x="470" y="150" width="120" height="160"/>
      <use href="#doug" x="620" y="150" width="120" height="160"/>
      <rect x="420" y="118" width="60" height="12" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="440" y1="130" x2="440" y2="300" stroke="#111" stroke-width="3"/>
      <path d="M660 40 h120 q10 0 10 10 v40 q0 10 -10 10 h-55 l-10 14 l-2 -14 h-43 q-10 0 -10 -10 v-40 q0 -10 10 -10z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="720" y="63" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Your desk's been</text>
      <text x="720" y="81" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">in a meeting</text>
      <text x="720" y="99" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">all night.</text>
      <path d="M478 150 h95 q9 0 9 9 v22 q0 9 -9 9 h-60 l-9 12 l-2 -12 h-24 q-9 0 -9 -9 v-22 q0 -9 9 -9z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="530" y="168" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">I wrote that</text>
      <text x="530" y="184" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">script.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="845" y1="300" x2="1215" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#priya" x="900" y="150" width="120" height="160"/>
      <rect x="1075" y="150" width="96" height="66" rx="5" fill="#1c1c1c" stroke="#111" stroke-width="2.5"/>
      <rect x="1112" y="216" width="22" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="1095" y="226" width="56" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="1079" y="150" width="88" height="88"/>
      <path d="M918 34 h150 v58 h-150 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="993" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">No one attended, so</text>
      <text x="993" y="71" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">I marked the meeting</text>
      <text x="993" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">a success.</text>
      <line x1="1068" y1="80" x2="1110" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="5 4"/>
      <path d="M842 200 h120 q9 0 9 9 v34 q0 9 -9 9 h-70 l-12 14 l-1 -14 h-37 q-9 0 -9 -9 v-34 q0 -9 9 -9z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="912" y="220" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Lower it before it</text>
      <text x="912" y="237" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">books a follow-up.</text>
