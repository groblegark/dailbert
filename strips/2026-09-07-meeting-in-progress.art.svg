      <circle cx="50" cy="34" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="70" cy="34" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="34" x2="62" y2="34" stroke="#111" stroke-width="2.2"/>
