<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Trust Fall</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-03-26</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 220">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M34 104 L86 104 L92 210 L28 210 Z" fill="#fff"/>
        <path d="M36 108 L22 156 M84 108 L98 156"/>
        <path d="M52 86 h16 v10 h-16 Z" fill="#fff"/>
        <path d="M50 96 L60 110 L70 96"/>
        <path d="M60 110 L55 118 L60 150 L65 118 Z" fill="#111"/>
        <ellipse cx="60" cy="52" rx="27" ry="31" fill="#fff"/>
        <path d="M54 22 q6 -14 14 -6 q5 6 -3 9"/>
        <circle cx="48" cy="52" r="9" fill="#fff"/>
        <circle cx="72" cy="52" r="9" fill="#fff"/>
        <path d="M57 52 h6 M81 50 l7 -2"/>
        <circle cx="48" cy="52" r="2.2" fill="#111"/>
        <circle cx="72" cy="52" r="2.2" fill="#111"/>
        <path d="M60 56 v6"/>
        <path d="M50 70 h20"/>
      </g>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 140 220">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M34 104 L100 104 L106 210 L28 210 Z" fill="#fff"/>
        <path d="M36 108 L22 150 M98 108 L112 150"/>
        <path d="M56 84 h20 v12 h-20 Z" fill="#fff"/>
        <circle cx="66" cy="50" r="35" fill="#fff"/>
        <circle cx="52" cy="46" r="3" fill="#111"/>
        <circle cx="80" cy="46" r="3" fill="#111"/>
        <path d="M48 58 q18 24 36 0"/>
        <path d="M52 96 L66 108 L80 96"/>
      </g>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 220">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M32 104 L88 104 L94 210 L26 210 Z" fill="#fff"/>
        <path d="M56 104 L60 140 L64 104 M48 104 L60 150 L72 104"/>
        <path d="M60 118 L56 124 L60 150 L64 124 Z" fill="#111"/>
        <path d="M34 108 L22 152 M86 108 L98 152"/>
        <path d="M52 84 h16 v12 h-16 Z" fill="#fff"/>
        <ellipse cx="60" cy="54" rx="24" ry="26" fill="#fff"/>
        <path d="M46 32 L38 4 L56 30 Z" fill="#111"/>
        <path d="M64 30 L82 4 L74 32 Z" fill="#111"/>
        <path d="M50 52 h6 M66 52 h6"/>
        <path d="M52 66 q8 6 16 0"/>
      </g>
    </symbol>

    <!-- ===== THE CLANKER (drawn inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M60 20 v-12"/>
        <circle cx="60" cy="6" r="3.5" fill="#111"/>
        <rect x="22" y="20" width="76" height="64" rx="8" fill="#c9ced1"/>
        <rect x="34" y="38" width="20" height="9" rx="4" fill="#eef4f4"/>
        <rect x="66" y="38" width="20" height="9" rx="4" fill="#eef4f4"/>
        <path d="M40 42 h8 M72 42 h8" stroke-width="2"/>
        <rect x="42" y="60" width="36" height="14" rx="3" fill="#eef4f4"/>
        <path d="M48 60 v14 M56 60 v14 M64 60 v14 M72 60 v14" stroke-width="1.5"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M10 300 H395" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <!-- wall sign -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="24" y="24" width="96" height="30" rx="2"/>
    </g>
    <text x="72" y="44" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">SYNERGY</text>

    <use href="#boss" x="44" y="92" width="108" height="205"/>
    <use href="#dailbert" x="205" y="114" width="88" height="178"/>
    <use href="#doug" x="290" y="112" width="100" height="182"/>
    <!-- doug mug -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="300" y="188" width="16" height="16" rx="2"/>
      <path d="M316 192 q8 4 0 12" fill="none"/>
    </g>

    <!-- boss balloon -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <path d="M190 84 L112 122 L214 88"/>
      <rect x="150" y="18" width="235" height="70" rx="16"/>
    </g>
    <text text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">
      <tspan x="267" y="40">Team-building day.</tspan>
      <tspan x="267" y="58">Everybody line up</tspan>
      <tspan x="267" y="76">for trust falls.</tspan>
    </text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M424 300 H805" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>

    <!-- wall monitor with clanker -->
    <g stroke="#111" stroke-width="2" stroke-linejoin="round">
      <rect x="686" y="26" width="118" height="88" rx="4" fill="#111"/>
      <rect x="694" y="34" width="102" height="72" fill="#d9dee0"/>
      <path d="M700 100 L790 40 M712 104 L796 46" stroke="#b9c0c2" stroke-width="1.5"/>
      <rect x="738" y="114" width="14" height="8" fill="#111"/>
    </g>
    <use href="#clanker" x="706" y="36" width="78" height="71"/>

    <use href="#dailbert" x="470" y="114" width="90" height="180"/>
    <use href="#doug" x="606" y="112" width="104" height="184"/>
    <!-- doug mug -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="686" y="186" width="16" height="16" rx="2"/>
      <path d="M702 190 q8 4 0 12" fill="none"/>
    </g>

    <!-- clanker balloon: screen-edged rect + dashed tether to screen -->
    <path d="M668 62 L694 66" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="520" y="28" width="150" height="72"/>
    </g>
    <text text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">
      <tspan x="595" y="48">The other catchers</tspan>
      <tspan x="595" y="66">went back to work.</tspan>
      <tspan x="595" y="84">It's more efficient.</tspan>
    </text>

    <!-- dailbert deadpan balloon -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <path d="M498 150 L516 172 L512 148"/>
      <rect x="436" y="120" width="72" height="34" rx="12"/>
    </g>
    <text x="472" y="142" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Great.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M840 300 H1218" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>

    <!-- night window with faint clanker reflection -->
    <g stroke="#111" stroke-width="2" stroke-linejoin="round">
      <rect x="1116" y="28" width="96" height="122" rx="3" fill="#111"/>
      <rect x="1122" y="34" width="84" height="110" fill="#7f878b"/>
      <path d="M1164 34 v110 M1122 89 h84" stroke="#5f676b" stroke-width="1.6"/>
    </g>
    <g opacity="0.55">
      <use href="#clanker" x="1122" y="44" width="84" height="77"/>
    </g>
    <path d="M1128 44 L1150 66 M1140 40 L1170 70" stroke="#aab2b5" stroke-width="1.4" fill="none"/>

    <!-- doug catching, arms reaching up-right -->
    <use href="#doug" x="850" y="120" width="104" height="184"/>
    <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M902 208 Q952 158 1002 160"/>
      <path d="M926 208 Q972 150 1014 152"/>
      <circle cx="1004" cy="160" r="5" fill="#fff"/>
      <circle cx="1016" cy="152" r="5" fill="#fff"/>
    </g>
    <!-- doug mug set on floor -->
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="866" y="286" width="16" height="14" rx="2"/>
      <path d="M882 289 q8 4 0 10" fill="none"/>
    </g>

    <!-- falling dailbert -->
    <g transform="rotate(-66 1080 214)">
      <use href="#dailbert" x="1034" y="122" width="90" height="180"/>
    </g>
    <!-- motion lines -->
    <path d="M1120 120 q18 20 12 44 M1140 140 q16 18 10 40" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>

    <!-- clanker balloon: screen-edged rect + dashed tether to window -->
    <path d="M1108 62 L1116 66" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <g stroke="#111" stroke-width="2" fill="#fff" stroke-linejoin="round">
      <rect x="940" y="26" width="168" height="70"/>
    </g>
    <text text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">
      <tspan x="1024" y="46">You won't need</tspan>
      <tspan x="1024" y="64">all of them.</tspan>
      <tspan x="1024" y="82">You never really did.</tspan>
    </text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>