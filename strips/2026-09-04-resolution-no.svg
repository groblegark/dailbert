<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Resolution: No</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-04</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- PRIYA: dark curly hair pulled up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <!-- hair bun -->
      <circle cx="60" cy="18" r="11" fill="#111"/>
      <!-- head -->
      <ellipse cx="60" cy="46" rx="24" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair mass -->
      <path d="M36 40 Q30 20 48 20 Q54 8 68 16 Q86 14 84 36 Q90 44 82 50 Q84 32 70 30 Q58 24 46 32 Q38 34 40 50 Z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="42" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="62" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="47" x2="62" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="47.5" r="1.6" fill="#111"/>
      <circle cx="70" cy="47.5" r="1.6" fill="#111"/>
      <!-- mouth calm -->
      <path d="M52 62 Q60 65 68 62" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- neck -->
      <rect x="53" y="70" width="14" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- torso, sleeves rolled -->
      <path d="M38 82 Q60 74 82 82 L88 140 L32 140 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- rolled sleeve cuffs -->
      <path d="M38 82 L30 116 L44 118 L46 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M82 82 L90 116 L76 118 L74 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="28" y="112" width="18" height="7" rx="2" fill="#111"/>
      <rect x="74" y="112" width="18" height="7" rx="2" fill="#111"/>
      <!-- forearms -->
      <rect x="32" y="118" width="11" height="24" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="77" y="118" width="11" height="24" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="52" y1="90" x2="56" y2="138" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- THE BOSS: two tall hair spikes, tiny eyes, suit and tie -->
    <symbol id="boss" viewBox="0 0 120 170">
      <!-- hair spikes -->
      <path d="M40 34 L30 2 L52 30 Z" fill="#111"/>
      <path d="M70 30 L92 2 L80 34 Z" fill="#111"/>
      <!-- head -->
      <ellipse cx="60" cy="46" rx="23" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair band across -->
      <path d="M38 32 Q60 22 82 32" fill="none" stroke="#111" stroke-width="2.5"/>
      <!-- tiny eyes -->
      <circle cx="52" cy="45" r="1.8" fill="#111"/>
      <circle cx="70" cy="45" r="1.8" fill="#111"/>
      <!-- mouth -->
      <path d="M52 58 Q60 62 68 58" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- neck -->
      <rect x="53" y="70" width="14" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- suit -->
      <path d="M34 84 Q60 74 86 84 L92 150 L28 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- lapels -->
      <path d="M60 80 L46 108 L58 100 Z" fill="#111"/>
      <path d="M60 80 L74 108 L62 100 Z" fill="#111"/>
      <!-- tie -->
      <path d="M60 96 L55 108 L60 132 L65 108 Z" fill="#111"/>
      <!-- arms -->
      <rect x="26" y="86" width="12" height="46" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="82" y="86" width="12" height="46" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome robot head, glowing slot-eyes, grille mouth, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <!-- antenna -->
      <line x1="60" y1="20" x2="60" y2="6" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="3.4" fill="#111"/>
      <!-- head box -->
      <rect x="26" y="20" width="68" height="60" rx="8" fill="#cfd2d6" stroke="#111" stroke-width="2.6"/>
      <!-- inner face plate -->
      <rect x="34" y="30" width="52" height="26" rx="4" fill="#2b2f33" stroke="#111" stroke-width="2"/>
      <!-- slot eyes glowing -->
      <rect x="40" y="39" width="14" height="6" rx="3" fill="#eef3ff"/>
      <rect x="66" y="39" width="14" height="6" rx="3" fill="#eef3ff"/>
      <!-- grille mouth -->
      <line x1="42" y1="66" x2="78" y2="66" stroke="#111" stroke-width="2"/>
      <line x1="46" y1="62" x2="46" y2="74" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="62" x2="54" y2="74" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="62" x2="60" y2="74" stroke="#111" stroke-width="2"/>
      <line x1="66" y1="62" x2="66" y2="74" stroke="#111" stroke-width="2"/>
      <line x1="74" y1="62" x2="74" y2="74" stroke="#111" stroke-width="2"/>
      <rect x="42" y="60" width="36" height="14" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <!-- side bolts -->
      <circle cx="31" cy="50" r="2.2" fill="#111"/>
      <circle cx="89" cy="50" r="2.2" fill="#111"/>
    </symbol>

    <!-- MONITOR shell -->
    <symbol id="monitor" viewBox="0 0 200 170">
      <rect x="8" y="8" width="184" height="120" rx="6" fill="#111"/>
      <rect x="16" y="16" width="168" height="104" rx="3" fill="#20242a"/>
      <rect x="90" y="128" width="20" height="20" fill="#111"/>
      <rect x="60" y="146" width="80" height="10" rx="4" fill="#111"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- faint back wall -->
      <line x1="0" y1="250" x2="399" y2="250" stroke="#d8d4c8" stroke-width="2"/>
      <!-- desk -->
      <rect x="0" y="300" width="399" height="40" fill="#e7e3d8"/>
      <rect x="0" y="298" width="399" height="4" fill="#111"/>

      <!-- Boss standing at desk, right, gesturing -->
      <use href="#boss" x="238" y="120" width="150" height="212"/>

      <!-- Priya at desk seated, left, facing monitor -->
      <use href="#priya" x="18" y="150" width="150" height="212"/>

      <!-- Monitor on desk with clanker inside -->
      <use href="#monitor" x="150" y="150" width="150" height="128"/>
      <use href="#clanker" x="175" y="150" width="100" height="100"/>

      <!-- Boss balloon -->
      <path d="M196 30 h150 a10 10 0 0 1 10 10 v46 a10 10 0 0 1 -10 10 h-70 l-14 16 l0 -16 h-66 a10 10 0 0 1 -10 -10 v-46 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="271" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Can we do the whole</text>
      <text x="271" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">migration this weekend?</text>
      <text x="271" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's basically Friday.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="250" x2="813" y2="250" stroke="#d8d4c8" stroke-width="2"/>
      <rect x="414" y="300" width="399" height="40" fill="#e7e3d8"/>
      <rect x="414" y="298" width="399" height="4" fill="#111"/>

      <!-- Priya seated, still calm, not looking up -->
      <use href="#priya" x="470" y="150" width="150" height="212"/>

      <!-- Monitor + clanker, right side -->
      <use href="#monitor" x="628" y="150" width="150" height="128"/>
      <use href="#clanker" x="653" y="150" width="100" height="100"/>

      <!-- Clanker screen-edged balloon (rectangular) with dashed line to monitor -->
      <line x1="700" y1="160" x2="662" y2="130" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="470" y="28" width="270" height="106" rx="3" fill="#20242a" stroke="#111" stroke-width="2.2"/>
      <text x="605" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#eef3ff">I could draft a plan.</text>
      <text x="605" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#eef3ff">Or hold the weekend.</text>
      <text x="605" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#eef3ff">Or split it into phases.</text>
      <text x="605" y="112" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#eef3ff">There is a yes in here</text>
      <text x="605" y="128" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#eef3ff">somewhere.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="250" x2="1227" y2="250" stroke="#d8d4c8" stroke-width="2"/>
      <rect x="828" y="300" width="399" height="40" fill="#e7e3d8"/>
      <rect x="828" y="298" width="399" height="4" fill="#111"/>

      <!-- Priya, one calm word -->
      <use href="#priya" x="884" y="150" width="150" height="212"/>

      <!-- Monitor + clanker -->
      <use href="#monitor" x="1042" y="150" width="150" height="128"/>
      <use href="#clanker" x="1067" y="150" width="100" height="100"/>

      <!-- Priya balloon: one word -->
      <path d="M902 60 h84 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-30 l-14 16 l0 -16 h-40 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="944" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="22" fill="#111" font-weight="bold">No.</text>

      <!-- Clanker log line, small, on screen -->
      <line x1="1114" y1="160" x2="1090" y2="132" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="1010" y="34" width="176" height="46" rx="3" fill="#20242a" stroke="#111" stroke-width="2.2"/>
      <text x="1098" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#eef3ff">Logged.</text>
      <text x="1098" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#eef3ff">resolution: no</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>