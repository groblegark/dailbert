      <path d="M44 66 q16 22 32 0" fill="none" stroke="#111" stroke-width="3"/>
      <rect x="90" y="150" width="26" height="24" rx="3" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M116 154 q11 3 0 15" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M95 150 q8 -6 16 0" fill="none" stroke="#111" stroke-width="2"/>
