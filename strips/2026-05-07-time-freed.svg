      <rect x="52" y="100" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="58" r="40" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M40 26 q8 -8 16 -4 M64 22 q8 -6 16 2" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="48" cy="54" r="3.2" fill="#111"/>
