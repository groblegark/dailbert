  <!-- panel frames -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- ===== PANEL 1 ===== -->
  <g clip-path="none">
    <line x1="10" y1="288" x2="390" y2="288" stroke="#111" stroke-width="2"/>
    <!-- monitor + clanker -->
    <rect x="250" y="150" width="128" height="104" rx="6" fill="#111"/>
    <rect x="258" y="158" width="112" height="88" rx="3" fill="#eef2f4" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(266,168) scale(0.8)"/>
    <rect x="298" y="254" width="34" height="12" fill="#111"/>
    <rect x="278" y="266" width="74" height="7" rx="2" fill="#111"/>
    <!-- boss -->
    <use href="#boss" transform="translate(28,102)"/>
    <!-- boss balloon -->
    <path d="M40 27 h205 a14 14 0 0 1 14 14 v40 a14 14 0 0 1 -14 14 h-120 l-18 22 l2 -22 h-69 a14 14 0 0 1 -14 -14 v-40 a14 14 0 0 1 14 -14 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="149" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">
      <tspan x="149">The clanker gave</tspan>
      <tspan x="149" dy="19">everyone 11 hours back.</tspan>
    </text>
  </g>

  <!-- ===== PANEL 2 ===== -->
  <g>
    <line x1="424" y1="288" x2="804" y2="288" stroke="#111" stroke-width="2"/>
    <!-- big monitor + clanker -->
    <rect x="508" y="118" width="190" height="146" rx="7" fill="#111"/>
    <rect x="518" y="128" width="170" height="126" rx="3" fill="#eef2f4" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(540,134) scale(1.35)"/>
    <rect x="588" y="264" width="30" height="11" fill="#111"/>
    <rect x="565" y="275" width="76" height="7" rx="2" fill="#111"/>
    <!-- dailbert seated -->
    <use href="#dailbert" transform="translate(690,150) scale(0.9)"/>
    <!-- clanker screen balloon (rect edged, dashed tail) -->
    <rect x="426" y="20" width="252" height="82" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <line x1="431" y1="25" x2="673" y2="25" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="431" y1="97" x2="673" y2="97" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="M545 102 L575 124" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
    <text x="552" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">
      <tspan x="552">I merged all seven</tspan>
      <tspan x="552" dy="18">meetings into one.</tspan>
      <tspan x="552" dy="18">Everyone talks at once.</tspan>
    </text>
    <!-- dailbert balloon -->
    <path d="M700 150 h86 a12 12 0 0 1 12 12 v20 a12 12 0 0 1 -12 12 h-52 l-14 16 l1 -16 h-21 a12 12 0 0 1 -12 -12 v-20 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="748" y="180" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Bold.</text>
  </g>

  <!-- ===== PANEL 3 ===== -->
  <g>
    <line x1="838" y1="288" x2="1218" y2="288" stroke="#111" stroke-width="2"/>
    <!-- priya's monitor + tiny clanker -->
    <rect x="838" y="200" width="86" height="66" rx="5" fill="#111"/>
    <rect x="844" y="206" width="74" height="54" rx="3" fill="#eef2f4" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(849,208) scale(0.62)"/>
    <rect x="872" y="266" width="20" height="9" fill="#111"/>
    <!-- priya -->
    <use href="#priya" transform="translate(912,118)"/>
    <!-- doug -->
    <use href="#doug" transform="translate(1082,150) scale(0.82)"/>
    <!-- priya balloon -->
    <path d="M858 22 h206 a14 14 0 0 1 14 14 v38 a14 14 0 0 1 -14 14 h-84 l-16 20 l1 -20 h-107 a14 14 0 0 1 -14 -14 v-38 a14 14 0 0 1 14 -14 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="968" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">
      <tspan x="968">I renamed it 'Optional.'</tspan>
      <tspan x="968" dy="19">Attendance is zero.</tspan>
    </text>
    <!-- doug balloon -->
    <path d="M1058 96 h132 a12 12 0 0 1 12 12 v22 a12 12 0 0 1 -12 12 h-58 l-14 16 l1 -16 h-61 a12 12 0 0 1 -12 -12 v-22 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="1124" y="123" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">Best in the building.</text>
    <!-- tiny clanker screen balloon -->
    <rect x="836" y="150" width="82" height="30" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M877 180 L881 200" stroke="#111" stroke-width="1.3" stroke-dasharray="3 3" fill="none"/>
    <text x="877" y="170" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" text-anchor="middle" fill="#111">Noted.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>