      <rect x="30" y="62" width="50" height="16" rx="3" fill="#eef2f4" stroke="#111" stroke-width="2.5"/>
      <line x1="40" y1="62" x2="40" y2="78" stroke="#111" stroke-width="2"/>
      <line x1="50" y1="62" x2="50" y2="78" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="62" x2="60" y2="78" stroke="#111" stroke-width="2"/>
      <line x1="70" y1="62" x2="70" y2="78" stroke="#111" stroke-width="2"/>
