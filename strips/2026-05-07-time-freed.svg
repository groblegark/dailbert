      <path d="M26 62 q0 -48 34 -48 q34 0 34 48 q-10 -24 -34 -24 q-24 0 -34 24 z" fill="#111"/>
      <circle cx="34" cy="42" r="8" fill="#111"/>
      <circle cx="86" cy="42" r="8" fill="#111"/>
      <circle cx="60" cy="10" r="9" fill="#111"/>
      <rect x="37" y="55" width="21" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="55" width="21" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="61" x2="63" y2="61" stroke="#111" stroke-width="2.5"/>
