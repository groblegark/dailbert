      <path d="M60 114 l-7 12 l7 30 l7 -30 z" fill="#111"/>
      <ellipse cx="60" cy="60" rx="34" ry="40" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M60 20 q11 -12 2 -19" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="48" cy="60" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="74" cy="60" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="59" y1="60" x2="63" y2="60" stroke="#111" stroke-width="3"/>
