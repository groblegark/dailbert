<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">You're Not Alone</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-03-19</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 90 120">
      <path d="M20 118 C20 88 30 82 45 86 C60 82 70 88 70 118 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M32 76 L45 86 L58 76" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M45 86 l-4 5 l4 16 l4 -16 z" fill="#111"/>
      <line x1="40" y1="67" x2="40" y2="77" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="67" x2="50" y2="77" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="45" cy="40" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 12 q9 -9 14 0 q2 6 -5 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="56" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="42" y1="42" x2="48" y2="42" stroke="#111" stroke-width="2"/>
      <line x1="26" y1="42" x2="21" y2="40" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="42" x2="69" y2="40" stroke="#111" stroke-width="2"/>
      <circle cx="34" cy="42" r="2" fill="#111"/>
      <circle cx="56" cy="42" r="2" fill="#111"/>
      <path d="M39 58 q6 4 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 100 120">
      <path d="M22 118 C22 86 34 80 48 84 C63 80 74 86 74 118 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M35 74 L48 84 L61 74" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="43" y1="66" x2="43" y2="76" stroke="#111" stroke-width="2.5"/>
      <line x1="53" y1="66" x2="53" y2="76" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="40" r="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 15 q6 -5 10 0 M50 13 q6 -4 10 1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="39" cy="38" r="2.6" fill="#111"/>
      <circle cx="57" cy="38" r="2.6" fill="#111"/>
      <path d="M34 47 q14 17 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M34 47 q14 6 28 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- arm + mug -->
      <path d="M72 104 q14 -2 16 -12" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="80" y="80" width="18" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M98 84 q7 1 6 7 q-1 4 -6 3" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M84 78 q1 -5 5 -5 M90 78 q1 -6 5 -5" fill="none" stroke="#999" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER (drawn inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 80 68">
      <line x1="40" y1="4" x2="40" y2="12" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="4" r="2.6" fill="#111"/>
      <rect x="13" y="12" width="54" height="44" rx="6" fill="#cfccc4" stroke="#111" stroke-width="2.5"/>
      <circle cx="17" cy="34" r="1.6" fill="#111"/>
      <circle cx="63" cy="34" r="1.6" fill="#111"/>
      <rect x="21" y="26" width="15" height="7" rx="3.5" fill="#111"/>
      <rect x="44" y="26" width="15" height="7" rx="3.5" fill="#111"/>
      <line x1="23" y1="28" x2="28" y2="28" stroke="#f4f1ea" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="46" y1="28" x2="51" y2="28" stroke="#f4f1ea" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="26" y="42" width="28" height="9" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="31" y1="42" x2="31" y2="51" stroke="#111" stroke-width="1.6"/>
      <line x1="36" y1="42" x2="36" y2="51" stroke="#111" stroke-width="1.6"/>
      <line x1="40" y1="42" x2="40" y2="51" stroke="#111" stroke-width="1.6"/>
      <line x1="44" y1="42" x2="44" y2="51" stroke="#111" stroke-width="1.6"/>
      <line x1="49" y1="42" x2="49" y2="51" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- ===== lone worker (background) ===== -->
    <symbol id="worker" viewBox="0 0 60 74">
      <path d="M12 72 C12 48 20 42 30 44 C40 42 48 48 48 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="30" cy="22" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M24 22 h4 M32 22 h4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ================= PANEL A ================= -->
  <g>
    <rect x="1.5" y="1.5" width="411" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clipA"><rect x="3" y="3" width="408" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clipA)">
      <!-- desk -->
      <rect x="-5" y="258" width="430" height="90" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <line x1="-5" y1="258" x2="425" y2="258" stroke="#111" stroke-width="2.5"/>
      <!-- dailbert seated -->
      <use href="#dailbert" x="30" y="88" width="150" height="200"/>
      <!-- sad sandwich on plate -->
      <ellipse cx="95" cy="256" rx="36" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M80 254 l14 -22 l16 22 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="86" y1="245" x2="104" y2="245" stroke="#111" stroke-width="1.6"/>
      <!-- monitor -->
      <path d="M300 258 l-10 -8 h30 l-8 8 z" fill="#eae6dc" stroke="#111" stroke-width="2"/>
      <rect x="240" y="150" width="128" height="102" rx="5" fill="#111"/>
      <rect x="247" y="157" width="114" height="88" rx="3" fill="#c9c6be"/>
      <use href="#clanker" x="258" y="164" width="92" height="78"/>
      <!-- clanker balloon -->
      <line x1="298" y1="86" x2="290" y2="150" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <path d="M212 20 h174 v52 h-174 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M212 20 l-6 -6 M386 20 l6 -6 M212 72 l-6 6 M386 72 l6 6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <text x="299" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">You eat lunch alone</text>
      <text x="299" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">every day.</text>
      <!-- dailbert balloon -->
      <path d="M30 30 q0 -14 14 -14 h84 q14 0 14 14 v22 q0 14 -14 14 h-52 l-14 16 l2 -16 h-20 q-14 0 -14 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="86" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">It's fine.</text>
    </g>
  </g>

  <!-- ================= PANEL B ================= -->
  <g>
    <rect x="415.5" y="1.5" width="411" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clipB"><rect x="417" y="3" width="408" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clipB)">
      <!-- desk -->
      <rect x="411" y="262" width="430" height="86" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <line x1="411" y1="262" x2="841" y2="262" stroke="#111" stroke-width="2.5"/>
      <!-- dailbert seated left -->
      <use href="#dailbert" x="436" y="118" width="132" height="176"/>
      <!-- doug walking by with mug -->
      <use href="#doug" x="612" y="132" width="150" height="180"/>
      <!-- monitor -->
      <path d="M560 262 l-9 -7 h27 l-7 7 z" fill="#eae6dc" stroke="#111" stroke-width="2"/>
      <rect x="512" y="176" width="104" height="82" rx="5" fill="#111"/>
      <rect x="518" y="182" width="92" height="70" rx="3" fill="#c9c6be"/>
      <use href="#clanker" x="527" y="188" width="74" height="63"/>
      <!-- clanker balloon -->
      <line x1="560" y1="80" x2="558" y2="176" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <path d="M470 20 h180 v56 h-180 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M470 20 l-6 -6 M650 20 l6 -6 M470 76 l-6 6 M650 76 l6 6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <text x="560" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">I fixed it, so you</text>
      <text x="560" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">never eat alone.</text>
      <!-- doug balloon -->
      <path d="M676 92 q0 -13 13 -13 h74 q13 0 13 13 v20 q0 13 -13 13 h-40 l-8 15 l-1 -15 h-25 q-13 0 -13 -13 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="726" y="103" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Aw. Thoughtful.</text>
    </g>
  </g>

  <!-- ================= PANEL C ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clipC"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clipC)">
      <!-- back wall floor line -->
      <line x1="831" y1="212" x2="1225" y2="212" stroke="#999" stroke-width="1.6"/>
      <!-- rows of lone workers at little desks -->
      <g>
        <line x1="852" y1="196" x2="912" y2="196" stroke="#111" stroke-width="2"/>
        <use href="#worker" x="858" y="150" width="50" height="61"/>
      </g>
      <g>
        <line x1="1140" y1="196" x2="1200" y2="196" stroke="#111" stroke-width="2"/>
        <use href="#worker" x="1146" y="150" width="50" height="61"/>
      </g>
      <g>
        <line x1="1005" y1="182" x2="1057" y2="182" stroke="#111" stroke-width="2"/>
        <use href="#worker" x="1011" y="140" width="44" height="54"/>
      </g>
      <g>
        <line x1="905" y1="176" x2="950" y2="176" stroke="#111" stroke-width="2"/>
        <use href="#worker" x="910" y="138" width="38" height="47"/>
      </g>
      <!-- foreground desk -->
      <rect x="825" y="264" width="410" height="84" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <line x1="825" y1="264" x2="1235" y2="264" stroke="#111" stroke-width="2.5"/>
      <!-- dailbert foreground, looking up/around -->
      <use href="#dailbert" x="905" y="126" width="150" height="200"/>
      <!-- his sandwich -->
      <ellipse cx="968" cy="262" rx="34" ry="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M955 260 l13 -20 l15 20 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- monitor -->
      <path d="M1150 264 l-9 -7 h27 l-7 7 z" fill="#eae6dc" stroke="#111" stroke-width="2"/>
      <rect x="1100" y="182" width="102" height="80" rx="5" fill="#111"/>
      <rect x="1106" y="188" width="90" height="68" rx="3" fill="#c9c6be"/>
      <use href="#clanker" x="1114" y="193" width="74" height="63"/>
      <!-- clanker balloon (plain) -->
      <line x1="1150" y1="94" x2="1150" y2="182" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <path d="M1024 18 h182 v74 h-182 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M1024 18 l-6 -6 M1206 18 l6 -6 M1024 92 l-6 6 M1206 92 l6 6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <text x="1115" y="41" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Everyone eats at</text>
      <text x="1115" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">their desk now.</text>
      <text x="1115" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">You're not alone.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>