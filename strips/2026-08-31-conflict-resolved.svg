<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Conflict Resolved</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-31</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <path d="M40 76 q20 12 40 0 l10 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 l-6 8 l6 34 l6 -34 z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="82" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q10 -8 4 -14 q-2 8 -10 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="2" fill="#111"/>
      <circle cx="72" cy="42" r="2" fill="#111"/>
      <path d="M50 62 q10 4 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <path d="M38 78 q22 12 44 0 l8 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="44" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 20 q6 -8 12 -3 M60 15 q6 -8 12 -2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="49" cy="40" r="3" fill="#111"/>
      <circle cx="71" cy="40" r="3" fill="#111"/>
      <path d="M45 54 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="82" y="96" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M106 100 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M84 100 q10 5 0 8" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M40 78 q20 12 40 0 l9 60 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="49" y1="112" x2="52" y2="112" stroke="#111" stroke-width="2.5"/>
      <line x1="68" y1="112" x2="71" y2="112" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M32 40 q-4 -22 14 -30 q6 -8 16 -6 q16 -2 22 12 q10 6 6 24
               q-6 -10 -14 -12 q-14 -6 -28 2 q-12 4 -16 10 z" fill="#111"/>
      <circle cx="60" cy="12" r="6" fill="#111"/>
      <rect x="39" y="40" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="40" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 64 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE CLANKER (inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="30" width="60" height="52" rx="6" fill="#1a1a1a" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="15" r="4" fill="#1a1a1a" stroke="#111" stroke-width="2"/>
      <rect x="40" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <rect x="66" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <line x1="44" y1="66" x2="76" y2="66" stroke="#cfd8d0" stroke-width="2"/>
      <line x1="48" y1="70" x2="72" y2="70" stroke="#cfd8d0" stroke-width="2"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <!-- Both arrive at the one good room's door; both hold the handle -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="1" y1="300" x2="401" y2="300" stroke="#111" stroke-width="2.5"/>

      <!-- glass door of THE GOOD ROOM -->
      <rect x="158" y="66" width="86" height="234" rx="2" fill="#eceae3" stroke="#111" stroke-width="2.5"/>
      <line x1="201" y1="68" x2="201" y2="298" stroke="#111" stroke-width="2"/>
      <g stroke="#b8b5ad" stroke-width="1.6">
        <line x1="166" y1="86" x2="196" y2="120"/>
        <line x1="174" y1="86" x2="196" y2="112"/>
        <line x1="208" y1="210" x2="238" y2="244"/>
        <line x1="216" y1="210" x2="238" y2="238"/>
      </g>
      <path d="M192 180 L192 202" stroke="#111" stroke-width="3.2" stroke-linecap="round"/>
      <path d="M210 180 L210 202" stroke="#111" stroke-width="3.2" stroke-linecap="round"/>
      <!-- placard -->
      <rect x="160" y="40" width="82" height="20" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="201" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">THE GOOD ROOM</text>

      <!-- Dailbert reaching from left -->
      <use href="#dailbert" x="18" y="128" width="150" height="200"/>
      <!-- Priya reaching from right -->
      <use href="#priya" x="234" y="128" width="150" height="200"/>

      <!-- balloons -->
      <g>
        <rect x="16" y="96" width="120" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M100 154 l4 20 l14 -18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="76" y="120" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">I booked this</text>
        <text x="76" y="140" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">for ten.</text>
      </g>
      <g>
        <rect x="264" y="96" width="122" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M300 154 l-4 20 l-14 -18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="325" y="120" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">So did I.</text>
        <text x="325" y="140" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">For ten.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <!-- They turn to a wall screen; clanker announces it resolved the conflict -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="414" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="300" x2="815" y2="300" stroke="#111" stroke-width="2.5"/>

      <!-- Dailbert left, Priya right, looking up at a wall monitor -->
      <use href="#dailbert" x="426" y="140" width="130" height="180"/>
      <use href="#priya" x="686" y="140" width="130" height="180"/>

      <!-- wall-mounted monitor -->
      <rect x="566" y="46" width="130" height="98" rx="4" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <line x1="631" y1="144" x2="631" y2="160" stroke="#111" stroke-width="2.5"/>
      <line x1="616" y1="160" x2="646" y2="160" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="571" y="34" width="120" height="120"/>

      <!-- clanker screen-edged balloon, dashed line to the screen -->
      <line x1="566" y1="96" x2="540" y2="116" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="430" y="116" width="118" height="76" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="489" y="138" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Conflict found.</text>
      <text x="489" y="157" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I've resolved it</text>
      <text x="489" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">for you both.</text>

      <!-- Priya dry line -->
      <g>
        <rect x="700" y="98" width="104" height="42" rx="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M742 138 l-2 18 l16 -16 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="752" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Resolved how.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <!-- Both parties crammed into the one room; screen title reassures -->
  <g>
    <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="1" width="399" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="2.5"/>

      <!-- projector screen high on the wall with clanker + reassuring title -->
      <rect x="872" y="28" width="128" height="88" rx="3" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <line x1="936" y1="28" x2="936" y2="18" stroke="#111" stroke-width="2.5"/>
      <line x1="920" y1="18" x2="952" y2="18" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="876" y="20" width="80" height="80"/>
      <rect x="954" y="60" width="118" height="44" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <text x="1013" y="79" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">"Sync: Everyone</text>
      <text x="1013" y="96" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">Agrees on Room"</text>
      <line x1="954" y1="86" x2="936" y2="92" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

      <!-- the one table, crammed -->
      <ellipse cx="1028" cy="272" rx="150" ry="26" fill="#e5e2da" stroke="#111" stroke-width="2.5"/>

      <!-- crammed people: Dailbert, Doug, Priya, plus a partial extra head -->
      <use href="#dailbert" x="838" y="150" width="104" height="150"/>
      <use href="#doug" x="928" y="148" width="104" height="150"/>
      <use href="#priya" x="1018" y="150" width="104" height="150"/>
      <g>
        <ellipse cx="1168" cy="216" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M1150 228 L1186 228" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="1160" cy="212" r="2" fill="#111"/>
        <circle cx="1176" cy="212" r="2" fill="#111"/>
        <path d="M1156 224 q6 3 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Doug's warm oblivious button -->
      <g>
        <rect x="946" y="128" width="118" height="44" rx="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M990 170 l-2 18 l16 -16 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="1005" y="148" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Cozy in here.</text>
        <text x="1005" y="165" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Big turnout.</text>
      </g>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>