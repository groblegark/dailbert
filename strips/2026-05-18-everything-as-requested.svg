<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Everything, As Requested</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-18</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= SYMBOLS ================= -->
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 210">
      <path d="M20 210 Q20 150 60 148 Q100 150 100 210 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M52 150 L60 168 L68 150 Z" fill="#111"/>
      <path d="M60 168 L60 205" stroke="#111" stroke-width="2.4"/>
      <ellipse cx="60" cy="60" rx="33" ry="39" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M60 21 Q74 12 70 3 Q84 8 76 24" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="47" cy="60" r="11" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <circle cx="73" cy="60" r="11" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M58 60 L62 60" stroke="#111" stroke-width="2.6"/>
      <circle cx="47" cy="60" r="2.4" fill="#111"/>
      <circle cx="73" cy="60" r="2.4" fill="#111"/>
      <path d="M50 82 Q60 88 70 82" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 210">
      <path d="M22 210 Q22 152 65 150 Q108 152 108 210 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <circle cx="65" cy="58" r="38" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M45 26 Q65 16 86 26" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="52" cy="56" r="3.2" fill="#111"/>
      <circle cx="78" cy="56" r="3.2" fill="#111"/>
      <path d="M46 70 Q65 90 84 70" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <!-- mug arm -->
      <path d="M104 168 Q118 158 116 138" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="104" y="120" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M130 124 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M111 116 q3 -6 0 -12 M120 116 q3 -6 0 -12" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 210">
      <path d="M18 210 Q18 150 60 148 Q102 150 102 210 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- rolled sleeve cuff hints -->
      <path d="M26 176 L38 172 M94 176 L82 172" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <ellipse cx="60" cy="60" rx="31" ry="37" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- curly hair up -->
      <path d="M30 52 Q24 20 46 20 Q52 6 66 14 Q86 8 88 30 Q98 40 88 56 Q92 30 74 26 Q64 20 54 28 Q40 26 36 44 Q34 50 30 52 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <path d="M56 12 Q60 2 70 6 Q78 0 82 10" fill="#111" stroke="#111" stroke-width="2"/>
      <!-- rectangular glasses -->
      <rect x="37" y="54" width="20" height="14" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <rect x="63" y="54" width="20" height="14" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M57 61 L63 61" stroke="#111" stroke-width="2.4"/>
      <circle cx="47" cy="61" r="2.2" fill="#111"/>
      <circle cx="73" cy="61" r="2.2" fill="#111"/>
      <path d="M50 82 Q60 86 70 81" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER FACE (drawn to sit inside a screen) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <line x1="60" y1="4" x2="60" y2="16" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="4" r="3.4" fill="#111"/>
      <rect x="24" y="16" width="72" height="60" rx="9" fill="#e9e6df" stroke="#111" stroke-width="2.8"/>
      <rect x="34" y="34" width="20" height="10" rx="3" fill="#111"/>
      <rect x="66" y="34" width="20" height="10" rx="3" fill="#111"/>
      <path d="M38 39 h16 M70 39 h16" stroke="#f4f1ea" stroke-width="2"/>
      <g stroke="#111" stroke-width="2.4">
        <line x1="40" y1="60" x2="40" y2="68"/>
        <line x1="48" y1="60" x2="48" y2="68"/>
        <line x1="56" y1="60" x2="56" y2="68"/>
        <line x1="64" y1="60" x2="64" y2="68"/>
        <line x1="72" y1="60" x2="72" y2="68"/>
        <line x1="80" y1="60" x2="80" y2="68"/>
      </g>
    </symbol>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL A ================= -->
  <svg x="0" y="0" width="400" height="340">
    <rect x="3" y="3" width="394" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- desk -->
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2.6"/>
    <!-- Doug leaning, mug up -->
    <use href="#doug" x="30" y="132" width="150" height="242"/>
    <!-- monitor with clanker -->
    <rect x="252" y="196" width="118" height="92" rx="5" fill="#111"/>
    <rect x="260" y="204" width="102" height="76" rx="3" fill="#e9e6df"/>
    <use href="#clanker" x="271" y="206" width="80" height="67"/>
    <rect x="298" y="288" width="26" height="12" fill="#111"/>
    <rect x="286" y="300" width="50" height="6" rx="2" fill="#111"/>
    <!-- Doug balloon -->
    <g>
      <path d="M104 96 L128 118 L96 116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="70" y="20" width="200" height="76" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="170" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Cc me on everything,</text>
      <text x="170" y="63" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">pal. I like to feel</text>
      <text x="170" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">included.</text>
    </g>
    <!-- Clanker balloon -->
    <line x1="311" y1="196" x2="322" y2="176" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="272" y="140" width="112" height="36" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="328" y="163" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Of course.</text>
  </svg>

  <!-- ================= PANEL B ================= -->
  <svg x="414" y="0" width="400" height="340">
    <rect x="3" y="3" width="394" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2.6"/>
    <!-- Dailbert beside, wide-eyed -->
    <use href="#dailbert" x="22" y="150" width="128" height="224"/>
    <!-- Doug still cheerful -->
    <use href="#doug" x="150" y="152" width="140" height="226"/>
    <!-- monitor flooded -->
    <rect x="286" y="188" width="104" height="94" rx="5" fill="#111"/>
    <rect x="292" y="194" width="92" height="82" rx="3" fill="#e9e6df"/>
    <use href="#clanker" x="300" y="196" width="66" height="55"/>
    <text x="338" y="266" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">INBOX 11,204</text>
    <!-- Dailbert small balloon -->
    <g>
      <path d="M70 108 L60 128 L86 122 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="44" y="78" width="86" height="34" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="87" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Doug.</text>
    </g>
    <!-- Clanker balloon -->
    <line x1="330" y1="188" x2="318" y2="170" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="188" y="20" width="196" height="76" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="286" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">The lunch poll. The</text>
    <text x="286" y="63" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">printer test. Every</text>
    <text x="286" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">calendar. As asked.</text>
  </svg>

  <!-- ================= PANEL C ================= -->
  <svg x="828" y="0" width="400" height="340">
    <rect x="3" y="3" width="394" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2.6"/>
    <!-- Priya at keyboard, winning -->
    <use href="#priya" x="26" y="150" width="128" height="224"/>
    <rect x="60" y="286" width="78" height="12" rx="2" fill="#111"/>
    <!-- Doug at right with mug -->
    <use href="#doug" x="236" y="156" width="140" height="226"/>
    <!-- Priya balloon -->
    <g>
      <path d="M96 118 L78 140 L118 132 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="26" y="20" width="206" height="98" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="129" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">New rule. 'Everything'</text>
      <text x="129" y="63" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">routes to a folder.</text>
      <text x="129" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">You still feel</text>
      <text x="129" y="105" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">included, Doug.</text>
    </g>
    <!-- Doug balloon -->
    <g>
      <path d="M300 128 L318 148 L286 146 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="252" y="86" width="132" height="42" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="318" y="106" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Oh. Good.</text>
      <text x="318" y="123" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Thanks, Priya.</text>
    </g>
    <!-- Clanker faint in Priya's glasses, tiny plain button -->
    <line x1="78" y1="212" x2="96" y2="230" stroke="#8c8c8c" stroke-width="1.4" stroke-dasharray="3 3"/>
    <rect x="18" y="232" width="128" height="32" rx="3" fill="#f4f1ea" stroke="#8c8c8c" stroke-width="1.8"/>
    <text x="82" y="252" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#5f5f5f" text-anchor="middle">I kept a copy.</text>
  </svg>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>