<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Any Other Questions</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-10</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 10 q10 -12 3 -18 q10 4 4 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="46" x2="64" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="46" r="1.7" fill="#111"/>
      <circle cx="72" cy="46" r="1.7" fill="#111"/>
      <path d="M50 64 q10 7 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 82 q20 14 40 0 l10 60 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-7 10 l7 8 l7 -8 Z" fill="#111"/>
      <path d="M58 100 l-3 34 l8 0 l-3 -34 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 q22 12 44 0 l8 58 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="74" y="112" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M100 116 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M80 108 q7 -6 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 44 q-4 -30 30 -34 q34 4 30 34 q-6 -14 -30 -14 q-24 0 -30 14 Z" fill="#111"/>
      <path d="M34 36 q4 -8 12 -10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 6 q8 -3 16 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="40" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="48" x2="64" y2="48" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="48" r="1.7" fill="#111"/>
      <circle cx="72" cy="48" r="1.7" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l8 58 q-28 12 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M46 108 l-2 20 M74 108 l2 20" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- BOSS: two tall hair spikes, tiny eyes, suit and tie -->
    <symbol id="boss" viewBox="0 0 120 200">
      <ellipse cx="60" cy="52" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 26 q-16 -22 -2 -24 q4 12 14 14 Z" fill="#111"/>
      <path d="M80 26 q16 -22 2 -24 q-4 12 -14 14 Z" fill="#111"/>
      <path d="M40 26 q20 -8 40 0" fill="none" stroke="#111" stroke-width="2.6"/>
      <circle cx="50" cy="50" r="1.7" fill="#111"/>
      <circle cx="70" cy="50" r="1.7" fill="#111"/>
      <path d="M52 66 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 86 q22 12 44 0 l9 60 q-31 12 -62 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 86 l-8 10 l8 46 l8 -46 Z" fill="#111"/>
    </symbol>

    <!-- CLANKER: boxy chrome head, slot-eyes, grille, antenna (drawn INSIDE a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#9aa0a6"/>
      <rect x="26" y="20" width="68" height="60" rx="9" fill="#20242a" stroke="#9aa0a6" stroke-width="2.6"/>
      <rect x="35" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <rect x="65" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <g stroke="#9aa0a6" stroke-width="2.2">
        <line x1="38" y1="62" x2="82" y2="62"/>
        <line x1="38" y1="68" x2="82" y2="68"/>
        <line x1="46" y1="58" x2="46" y2="72"/>
        <line x1="60" y1="58" x2="60" y2="72"/>
        <line x1="74" y1="58" x2="74" y2="72"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <line x1="2" y1="252" x2="398" y2="252" stroke="#111" stroke-width="1.6"/>

      <!-- pull-down projector screen, clanker inside -->
      <line x1="190" y1="30" x2="374" y2="30" stroke="#111" stroke-width="4"/>
      <rect x="192" y="30" width="180" height="120" rx="4" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <rect x="196" y="34" width="172" height="112" rx="3" fill="none" stroke="#3a4048" stroke-width="1.4"/>
      <use href="#clanker" x="234" y="42" width="96" height="96"/>

      <!-- anonymous question box on a small table, front-left -->
      <rect x="36" y="182" width="88" height="66" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="48" y1="198" x2="112" y2="198" stroke="#111" stroke-width="2"/>
      <rect x="62" y="194" width="36" height="7" rx="2" fill="#20242a"/>
      <path d="M70 194 l6 -12 l11 4 l-4 8 Z" fill="#f4f1ea" stroke="#111" stroke-width="1.8" stroke-linejoin="round"/>
      <text x="80" y="236" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">ANONYMOUS</text>

      <!-- Boss at podium, gripping index cards, right -->
      <use href="#boss" x="264" y="148" width="120" height="200"/>
      <rect x="280" y="272" width="80" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="310" y="282" width="20" height="66" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="296" y="238" width="26" height="18" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="1.8" transform="rotate(-8 309 247)"/>

      <!-- clanker balloon: rectangular, dashed line to screen -->
      <line x1="282" y1="98" x2="150" y2="98" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M16 60 h134 v58 h-84 l-10 12 l-3 -12 h-37 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="83" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="83" dy="0">Welcome to the</tspan>
        <tspan x="83" dy="16">all-hands. I tidied</tspan>
        <tspan x="83" dy="16">the question box.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <line x1="416" y1="252" x2="812" y2="252" stroke="#111" stroke-width="1.6"/>

      <!-- screen with clanker, faint scroll of answered lines -->
      <line x1="606" y1="22" x2="800" y2="22" stroke="#111" stroke-width="4"/>
      <rect x="608" y="22" width="192" height="156" rx="4" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="700" y="28" width="82" height="82"/>
      <g stroke="#3a4048" stroke-width="3" stroke-linecap="round">
        <line x1="620" y1="120" x2="694" y2="120"/>
        <line x1="620" y1="130" x2="702" y2="130"/>
        <line x1="620" y1="140" x2="686" y2="140"/>
        <line x1="620" y1="150" x2="700" y2="150"/>
        <line x1="620" y1="160" x2="672" y2="160"/>
      </g>

      <!-- Dailbert and Doug seated, watching -->
      <use href="#dailbert" x="436" y="150" width="120" height="200"/>
      <use href="#doug" x="532" y="150" width="120" height="200"/>

      <!-- clanker balloon top, dashed to screen -->
      <line x1="700" y1="66" x2="474" y2="66" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M428 22 h182 v64 h-118 l-10 12 l-3 -12 h-51 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="519" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">
        <tspan x="519" dy="0">Q12: "Are the raises</tspan>
        <tspan x="519" dy="15">real?" A great question.</tspan>
        <tspan x="519" dy="15">I've answered all</tspan>
        <tspan x="519" dy="15">forty-one for you.</tspan>
      </text>

      <!-- Doug balloon -->
      <path d="M556 178 h134 v42 h-70 l-10 12 l-3 -12 h-51 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="623" y="198" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="623" dy="0">It did the</tspan>
        <tspan x="623" dy="15">follow-ups too.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <line x1="830" y1="252" x2="1226" y2="252" stroke="#111" stroke-width="1.6"/>

      <!-- dark projector screen, clanker inside -->
      <line x1="1020" y1="26" x2="1204" y2="26" stroke="#111" stroke-width="4"/>
      <rect x="1022" y="26" width="180" height="120" rx="4" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="1064" y="36" width="96" height="96"/>

      <!-- Boss at podium, one lone card left -->
      <use href="#boss" x="862" y="148" width="120" height="200"/>
      <rect x="876" y="272" width="80" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="906" y="282" width="20" height="66" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="898" y="248" width="24" height="16" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="1.8" transform="rotate(12 910 256)"/>

      <!-- Priya standing calm, arms folded, front-right -->
      <use href="#priya" x="998" y="150" width="120" height="200"/>
      <path d="M1010 250 q28 -16 56 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- Boss balloon: small, deflated -->
      <path d="M848 150 h122 v40 h-58 l-10 12 l-3 -12 h-51 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="909" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="909" dy="0">So. Any other</tspan>
        <tspan x="909" dy="15">questions.</tspan>
      </text>

      <!-- Priya balloon: dry button -->
      <path d="M1042 170 h154 v44 h-72 l-10 12 l-3 -12 h-69 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1119" y="190" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="1119" dy="0">One. Whose answers</tspan>
        <tspan x="1119" dy="15">were those.</tspan>
      </text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>