    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 130">
      <ellipse cx="50" cy="36" rx="25" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M26 30 q-4 -22 24 -24 q28 2 24 24 q-6 -12 -24 -12 q-18 0 -24 12" fill="#111"/>
      <path d="M46 10 q4 -8 10 -4 q6 4 2 10" fill="#111" stroke="#111" stroke-width="1.5"/>
      <rect x="33" y="32" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="52" y="32" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="37" x2="52" y2="37" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="37" r="1.8" fill="#111"/>
      <circle cx="59" cy="37" r="1.8" fill="#111"/>
      <path d="M42 52 q8 3 15 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 L70 64 L66 120 L34 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M30 66 q-6 20 -2 30 M70 66 q6 20 2 30" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>
