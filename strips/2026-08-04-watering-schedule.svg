      <path d="M30 50 q-14 -6 -16 -26 q10 8 16 20 q-2 -20 4 -30 q6 12 4 28 q6 -14 16 -18 q-6 18 -20 26" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
