  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="1" y1="270" x2="399" y2="270" stroke="#111" stroke-width="1.6" opacity="0.4"/>
    <rect x="250" y="150" width="120" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="300" y="236" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="286" y="250" width="48" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <use href="#clanker" x="278" y="150" width="64" height="58"/>
    <line x1="230" y1="256" x2="399" y2="256" stroke="#111" stroke-width="2.4"/>
    <use href="#plant" x="236" y="196" width="46" height="62"/>
    <use href="#dailbert" x="40" y="120" width="120" height="156"/>
    <g>
      <path d="M40 40 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-70 l-14 16 l2 -16 h-68 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="115" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">The plant looks</text>
      <text x="115" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">rough. Can you</text>
      <text x="115" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">water it?</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="415" y1="270" x2="813" y2="270" stroke="#111" stroke-width="1.6" opacity="0.4"/>
    <rect x="640" y="120" width="130" height="94" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="695" y="214" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="681" y="228" width="48" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <use href="#clanker" x="672" y="118" width="66" height="60"/>
    <line x1="640" y1="234" x2="800" y2="234" stroke="#111" stroke-width="2.4"/>
    <use href="#plant" x="612" y="172" width="48" height="64"/>
    <rect x="600" y="178" width="30" height="20" rx="2" fill="#fff" stroke="#111" stroke-width="1.8" transform="rotate(-8 615 188)"/>
    <line x1="606" y1="184" x2="624" y2="184" stroke="#111" stroke-width="1.4" transform="rotate(-8 615 188)"/>
    <line x1="606" y1="190" x2="620" y2="190" stroke="#111" stroke-width="1.4" transform="rotate(-8 615 188)"/>
    <use href="#dailbert" x="440" y="150" width="118" height="150"/>
    <g>
      <line x1="672" y1="150" x2="620" y2="70" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="470" y="24" width="220" height="70" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="474" y="28" width="212" height="62" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="580" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I opened a ticket.</text>
      <text x="580" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Priority Two. It is</text>
      <text x="580" y="84" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">assigned to you.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="829" y1="270" x2="1227" y2="270" stroke="#111" stroke-width="1.6" opacity="0.4"/>
    <line x1="1030" y1="252" x2="1227" y2="252" stroke="#111" stroke-width="2.4"/>
    <use href="#plant" x="1120" y="190" width="52" height="66"/>
    <path d="M1132 236 q2 4 0 6 q-2 -2 0 -6" fill="#8fb8a3" stroke="#111" stroke-width="1"/>
    <use href="#priya" x="1000" y="132" width="120" height="156"/>
    <use href="#doug" x="850" y="150" width="118" height="150"/>
    <g>
      <path d="M1010 30 h150 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-40 l-12 14 l1 -14 h-99 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1085" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I used the mug.</text>
      <text x="1085" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Closed the ticket.</text>
    </g>
    <g>
      <path d="M846 120 h116 a9 9 0 0 1 9 9 v26 a9 9 0 0 1 -9 9 h-64 l-12 13 l1 -13 h-41 a9 9 0 0 1 -9 -9 v-26 a9 9 0 0 1 9 -9 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="908" y="140" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Poor guy just</text>
      <text x="908" y="157" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">wanted a drink.</text>
    </g>
