      <line x1="50" y1="18" x2="50" y2="8" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="6" r="3" fill="#111"/>
      <rect x="30" y="30" width="16" height="9" rx="2" fill="#bfe3d0"/>
      <rect x="54" y="30" width="16" height="9" rx="2" fill="#bfe3d0"/>
