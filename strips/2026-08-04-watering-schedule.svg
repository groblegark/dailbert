      <ellipse cx="50" cy="34" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 4 q7 -8 3 4 q-3 6 2 4" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="40" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="34" x2="53" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="34" r="1.8" fill="#111"/>
      <circle cx="60" cy="34" r="1.8" fill="#111"/>
      <path d="M42 50 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 L70 64 L64 120 L36 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 64 L45 82 L50 88 L55 82 Z" fill="#111"/>
      <line x1="50" y1="88" x2="50" y2="104" stroke="#111" stroke-width="2.6"/>
