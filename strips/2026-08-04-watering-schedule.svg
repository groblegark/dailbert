      <circle cx="50" cy="36" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 6 q6 -6 2 4" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="40" cy="34" r="2.4" fill="#111"/>
      <circle cx="60" cy="34" r="2.4" fill="#111"/>
      <path d="M38 44 q12 14 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M30 66 L70 66 L66 120 L34 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="60" y="92" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M80 96 q8 3 0 10" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M64 92 q6 3 12 0" fill="none" stroke="#111" stroke-width="1.8"/>
