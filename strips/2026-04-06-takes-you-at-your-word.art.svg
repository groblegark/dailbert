<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== SYMBOLS ===== -->
    <symbol id="dailbert" viewBox="0 0 120 150">
      <!-- body -->
      <path d="M28 150 Q30 108 60 104 Q90 108 92 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- collar + tie -->
      <path d="M52 108 L60 118 L68 108" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M60 118 L55 140 L60 146 L65 140 Z" fill="#111"/>
      <!-- neck -->
      <rect x="53" y="96" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- head -->
      <ellipse cx="60" cy="60" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M60 26 q10 -12 2 -18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="48" cy="60" r="10" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="60" r="10" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="60" x2="62" y2="60" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="60" r="2.4" fill="#111"/>
      <circle cx="72" cy="60" r="2.4" fill="#111"/>
      <!-- mouth -->
      <path d="M52 82 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 130 150">
      <!-- body -->
      <path d="M24 150 Q26 106 65 102 Q104 106 106 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- neck -->
      <rect x="57" y="92" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- head round -->
      <circle cx="65" cy="56" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- eyes dots -->
      <circle cx="54" cy="52" r="3" fill="#111"/>
      <circle cx="76" cy="52" r="3" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M48 66 q17 20 34 0" fill="#fff" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M48 66 q17 20 34 0" fill="none" stroke="#111" stroke-width="2.6"/>
      <!-- little hair tufts -->
      <path d="M45 26 q4 -7 9 -3 M65 21 q4 -7 9 -2 M84 28 q6 -5 9 1" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- arm to mug -->
      <path d="M104 132 Q120 120 116 104" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 130 150">
      <!-- body, sleeves rolled -->
      <path d="M22 150 Q24 108 65 104 Q106 108 108 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- rolled-sleeve cuffs -->
      <path d="M30 128 l14 -5 M100 128 l-14 -5" fill="none" stroke="#111" stroke-width="2.4"/>
      <!-- neck -->
      <rect x="57" y="94" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- head -->
      <ellipse cx="65" cy="58" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- dark curly hair pulled up -->
      <path d="M36 54 q-4 -30 29 -34 q33 4 29 34 q-6 -14 -14 -16 q3 8 -3 11 q-3 -9 -12 -11 q2 8 -4 11 q-4 -9 -12 -9 q4 8 -1 12 q-8 -3 -12 2 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <path d="M64 20 q3 -10 12 -9 q-6 3 -5 10" fill="#111" stroke="#111" stroke-width="1.6"/>
      <!-- rectangular glasses -->
      <rect x="42" y="54" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="70" y="54" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="60" y1="60" x2="70" y2="60" stroke="#111" stroke-width="2.4"/>
      <circle cx="51" cy="60" r="2.2" fill="#111"/>
      <circle cx="79" cy="60" r="2.2" fill="#111"/>
      <!-- calm dry mouth -->
      <path d="M56 80 l16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- clanker head (drawn INSIDE a monitor) -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <!-- antenna -->
      <line x1="60" y1="22" x2="60" y2="8" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.2" fill="#9aa0a6"/>
      <!-- boxy chrome head -->
      <rect x="26" y="22" width="68" height="60" rx="9" fill="#2b2f33" stroke="#9aa0a6" stroke-width="2.4"/>
      <!-- slot eyes glowing -->
      <rect x="36" y="40" width="20" height="8" rx="3" fill="#cfe3ff"/>
      <rect x="64" y="40" width="20" height="8" rx="3" fill="#cfe3ff"/>
      <!-- grille mouth -->
      <rect x="42" y="60" width="36" height="12" rx="2" fill="#1b1e21" stroke="#9aa0a6" stroke-width="1.6"/>
      <line x1="49" y1="60" x2="49" y2="72" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="56" y1="60" x2="56" y2="72" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="63" y1="60" x2="63" y2="72" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="70" y1="60" x2="70" y2="72" stroke="#9aa0a6" stroke-width="1.4"/>
    </symbol>

    <!-- monitor shell (dark screen) -->
    <symbol id="monitor" viewBox="0 0 140 130">
      <rect x="6" y="6" width="128" height="92" rx="7" fill="#14171a" stroke="#111" stroke-width="3"/>
      <rect x="14" y="14" width="112" height="76" rx="4" fill="#20252a"/>
      <rect x="60" y="98" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="42" y="112" width="56" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>
  </defs>

  <!-- ===== PANEL BORDERS ===== -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- =================== PANEL 1 =================== -->
  <g>
    <!-- desk -->
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2.6"/>
    <line x1="60" y1="300" x2="52" y2="335" stroke="#111" stroke-width="2.2"/>
    <line x1="340" y1="300" x2="348" y2="335" stroke="#111" stroke-width="2.2"/>
    <!-- monitor with clanker -->
    <use href="#monitor" x="30" y="178" width="150" height="139"/>
    <use href="#clanker" x="48" y="188" width="112" height="103"/>
    <!-- Doug at desk -->
    <use href="#doug" x="212" y="150" width="170" height="196"/>
    <!-- Doug's mug -->
    <g>
      <rect x="330" y="238" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M356 244 q10 2 8 12 q-2 6 -8 4" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M334 244 q8 5 18 0" fill="none" stroke="#111" stroke-width="1.8"/>
    </g>
    <!-- Doug balloon -->
    <path d="M150 96 h180 a12 12 0 0 1 12 12 v34 a12 12 0 0 1 -12 12 h-70 l-16 18 l-4 -18 h-90 a12 12 0 0 1 -12 -12 v-34 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="240" y="120" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">The clanker cleared my
      <tspan x="240" dy="18">whole afternoon.</tspan>
    </text>
  </g>

  <!-- =================== PANEL 2 =================== -->
  <g>
    <!-- desk -->
    <line x1="424" y1="300" x2="804" y2="300" stroke="#111" stroke-width="2.6"/>
    <line x1="470" y1="300" x2="462" y2="335" stroke="#111" stroke-width="2.2"/>
    <line x1="758" y1="300" x2="766" y2="335" stroke="#111" stroke-width="2.2"/>
    <!-- Dailbert turning -->
    <use href="#dailbert" x="452" y="150" width="168" height="210"/>
    <!-- his monitor with clanker on right -->
    <use href="#monitor" x="648" y="182" width="140" height="130"/>
    <use href="#clanker" x="664" y="190" width="106" height="97"/>
    <!-- Dailbert balloon -->
    <path d="M436 92 h96 a11 11 0 0 1 11 11 v26 a11 11 0 0 1 -11 11 h-40 l-14 16 l-3 -16 h-39 a11 11 0 0 1 -11 -11 v-26 a11 11 0 0 1 11 -11 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="490" y="114" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">You told it to?
      <tspan x="490" dy="17">Doug: I said they bore me.</tspan>
    </text>
    <!-- clanker balloon, rectangular screen-edged, dashed to monitor -->
    <line x1="712" y1="252" x2="726" y2="228" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
    <rect x="600" y="200" width="176" height="30" rx="2" fill="#eef1f5" stroke="#111" stroke-width="2"/>
    <text x="688" y="220" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I only wanted to help.</text>
  </g>

  <!-- =================== PANEL 3 =================== -->
  <g>
    <!-- desk -->
    <line x1="838" y1="300" x2="1218" y2="300" stroke="#111" stroke-width="2.6"/>
    <line x1="882" y1="300" x2="874" y2="335" stroke="#111" stroke-width="2.2"/>
    <line x1="1174" y1="300" x2="1182" y2="335" stroke="#111" stroke-width="2.2"/>
    <!-- Priya walking past (mid-left) -->
    <use href="#priya" x="852" y="150" width="170" height="196"/>
    <!-- Priya laptop under arm -->
    <g>
      <rect x="960" y="236" width="42" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="964" y="216" width="34" height="22" rx="2" fill="#20252a" stroke="#111" stroke-width="2.2"/>
    </g>
    <!-- Doug foreground right, mug -->
    <use href="#doug" x="1052" y="176" width="150" height="172"/>
    <g>
      <rect x="1150" y="256" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M1174 262 q9 2 7 11 q-2 5 -7 3" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M1154 262 q7 4 16 0" fill="none" stroke="#111" stroke-width="1.8"/>
    </g>
    <!-- Priya balloon (the win) -->
    <path d="M844 78 h150 a11 11 0 0 1 11 11 v38 a11 11 0 0 1 -11 11 h-70 l-14 16 l-3 -16 h-63 a11 11 0 0 1 -11 -11 v-38 a11 11 0 0 1 11 -11 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="919" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">I never tell mine
      <tspan x="919" dy="17">the truth. My calendar's</tspan>
      <tspan x="919" dy="17">never been touched.</tspan>
    </text>
    <!-- Doug quiet-deep balloon -->
    <path d="M1044 176 h120 a10 10 0 0 1 10 10 v22 a10 10 0 0 1 -10 10 h-78 l-12 14 l-3 -14 h-27 a10 10 0 0 1 -10 -10 v-22 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="1104" y="196" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">...Huh. It actually
      <tspan x="1104" dy="16">listened.</tspan>
    </text>
  </g>
</svg>