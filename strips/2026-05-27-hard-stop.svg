<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Hard Stop</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= CHARACTER SYMBOLS ================= -->
    <symbol id="dailbert" viewBox="0 0 120 210">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M28 210 V150 Q28 118 60 112 Q92 118 92 150 V210" fill="#f4f1ea"/>
        <path d="M52 112 V100 M68 112 V100"/>
        <path d="M60 112 l-6 8 l6 26 l6 -26 z" fill="#111" stroke="#111"/>
        <ellipse cx="60" cy="66" rx="27" ry="31" fill="#f4f1ea"/>
        <path d="M60 34 q11 -11 2 -19"/>
        <circle cx="49" cy="66" r="9" fill="#f4f1ea"/>
        <circle cx="71" cy="66" r="9" fill="#f4f1ea"/>
        <path d="M58 66 h4 M40 64 l-7 -3 M80 64 l7 -3"/>
        <circle cx="49" cy="66" r="1.9" fill="#111"/>
        <circle cx="71" cy="66" r="1.9" fill="#111"/>
        <path d="M52 84 q8 5 16 0"/>
      </g>
    </symbol>

    <symbol id="doug" viewBox="0 0 140 210">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M24 210 V150 Q24 114 66 108 Q108 114 108 150 V210" fill="#f4f1ea"/>
        <path d="M58 108 V98 M74 108 V98"/>
        <circle cx="66" cy="64" r="33" fill="#f4f1ea"/>
        <path d="M44 40 q6 -9 13 -4 M76 35 q9 -5 13 4"/>
        <circle cx="56" cy="60" r="2.5" fill="#111"/>
        <circle cx="78" cy="60" r="2.5" fill="#111"/>
        <path d="M50 74 q16 17 32 0"/>
        <!-- coffee mug -->
        <rect x="96" y="150" width="28" height="26" rx="3" fill="#f4f1ea"/>
        <path d="M124 156 q11 3 0 15"/>
        <path d="M96 150 h28"/>
        <path d="M104 144 q-3 -6 2 -10 M115 144 q-3 -6 2 -10"/>
      </g>
    </symbol>

    <symbol id="priya" viewBox="0 0 130 210">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M26 210 V150 Q26 118 62 112 Q98 118 98 150 V210" fill="#f4f1ea"/>
        <path d="M30 150 h18 M76 150 h18"/>
        <path d="M54 112 V102 M70 112 V102"/>
        <ellipse cx="62" cy="66" rx="25" ry="29" fill="#f4f1ea"/>
        <path d="M37 62 Q33 26 62 22 Q91 26 87 62 Q80 40 62 38 Q44 40 37 62 Z" fill="#111" stroke="#111"/>
        <circle cx="62" cy="21" r="9" fill="#111" stroke="#111"/>
        <path d="M38 58 q-6 9 -2 17 M86 58 q6 9 2 17"/>
        <rect x="46" y="60" width="14" height="10" rx="2" fill="#f4f1ea"/>
        <rect x="66" y="60" width="14" height="10" rx="2" fill="#f4f1ea"/>
        <path d="M60 65 h6 M46 63 l-6 -2 M80 63 l6 -2"/>
        <circle cx="53" cy="65" r="1.8" fill="#111"/>
        <circle cx="73" cy="65" r="1.8" fill="#111"/>
        <path d="M54 82 q8 3 16 0"/>
      </g>
    </symbol>

    <symbol id="boss" viewBox="0 0 120 210">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M26 210 V150 Q26 116 60 110 Q94 116 94 150 V210" fill="#f4f1ea"/>
        <path d="M60 110 l-15 20 M60 110 l15 20"/>
        <path d="M60 110 l-5 8 l5 24 l5 -24 z" fill="#111" stroke="#111"/>
        <ellipse cx="60" cy="66" rx="25" ry="29" fill="#f4f1ea"/>
        <path d="M46 42 Q40 8 53 40 Z" fill="#111" stroke="#111"/>
        <path d="M74 42 Q80 8 67 40 Z" fill="#111" stroke="#111"/>
        <circle cx="52" cy="64" r="1.5" fill="#111"/>
        <circle cx="70" cy="64" r="1.5" fill="#111"/>
        <path d="M53 80 q8 3 15 0"/>
      </g>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 120">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <path d="M60 15 V5"/>
        <circle cx="60" cy="3.5" r="3" fill="#111"/>
        <rect x="30" y="16" width="60" height="54" rx="7" fill="#dfe3e6" stroke="#111"/>
        <rect x="40" y="33" width="14" height="7" rx="2" fill="#111"/>
        <rect x="66" y="33" width="14" height="7" rx="2" fill="#111"/>
        <rect x="42" y="50" width="36" height="12" rx="2" fill="none" stroke="#111"/>
        <path d="M42 54 h36 M42 58 h36"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- boss -->
    <use href="#boss" x="22" y="78" width="150" height="262"/>
    <!-- desk -->
    <rect x="10" y="250" width="384" height="90" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- monitor stand -->
    <path d="M296 204 h30 l6 46 h-42 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <!-- monitor -->
    <rect x="250" y="100" width="128" height="104" rx="6" fill="#111"/>
    <rect x="258" y="108" width="112" height="88" rx="3" fill="#d7dbde" stroke="#111" stroke-width="2"/>
    <use href="#clanker" x="270" y="110" width="86" height="86"/>
    <!-- boss balloon -->
    <path d="M22 14 h180 a10 10 0 0 1 10 10 v38 a10 10 0 0 1 -10 10 h-108 l-10 18 l-4 -18 h-58 a10 10 0 0 1 -10 -10 v-38 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="112" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Standups drag.</text>
    <text x="112" y="59" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Give it a hard stop.</text>
    <!-- clanker balloon (rectangular, dashed connector) -->
    <path d="M304 84 L318 108" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4" fill="none"/>
    <rect x="216" y="14" width="172" height="62" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="302" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Understood.</text>
    <text x="302" y="59" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Scheduling hard stops.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- dailbert -->
    <use href="#dailbert" x="444" y="86" width="150" height="262"/>
    <!-- doug -->
    <use href="#doug" x="628" y="90" width="162" height="262"/>
    <!-- desk -->
    <rect x="424" y="252" width="380" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- laptop -->
    <path d="M470 252 l14 -34 h70 l14 34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="488" y="222" width="62" height="26" rx="2" fill="#d7dbde" stroke="#111" stroke-width="1.8"/>
    <path d="M494 230 h40 M494 236 h30 M494 242 h44" stroke="#111" stroke-width="1.4"/>
    <!-- dailbert balloon -->
    <path d="M430 12 h182 a10 10 0 0 1 10 10 v52 a10 10 0 0 1 -10 10 h-84 l-12 18 l-4 -18 h-70 a10 10 0 0 1 -10 -10 v-52 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="521" y="36" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It booked a meeting</text>
    <text x="521" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">after every meeting —</text>
    <text x="521" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">to end the meeting.</text>
    <!-- doug balloon -->
    <path d="M690 40 h90 a10 10 0 0 1 10 10 v24 a10 10 0 0 1 -10 10 h-40 l-14 16 l0 -16 h-36 a10 10 0 0 1 -10 -10 v-24 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="735" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Bold.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- priya -->
    <use href="#priya" x="946" y="86" width="150" height="262"/>
    <!-- desk -->
    <rect x="838" y="252" width="380" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- laptop she's clicking -->
    <path d="M968 252 l14 -34 h74 l14 34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="988" y="222" width="64" height="26" rx="2" fill="#d7dbde" stroke="#111" stroke-width="1.8"/>
    <path d="M994 230 h42 M994 236 h26" stroke="#111" stroke-width="1.4"/>
    <!-- a small check she just clicked -->
    <path d="M1030 240 l4 5 l9 -11" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- priya balloon -->
    <path d="M846 12 h222 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-60 l-12 18 l-4 -18 h-146 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="957" y="37" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Declined all of them.</text>
    <text x="957" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Standup's four minutes now.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>