  <!-- ================= PANEL A ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="18" y="98" width="132" height="231"/>
    <!-- desk -->
    <rect x="6" y="272" width="388" height="66" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- monitor on desk -->
    <rect x="248" y="150" width="124" height="94" rx="6" fill="#1b1f24" stroke="#111" stroke-width="3"/>
    <rect x="300" y="244" width="20" height="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="262" y="150" width="96" height="88"/>
    <!-- Dailbert balloon -->
    <path d="M92 92 L110 92 L84 140 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="24" y="14" width="188" height="92" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="118" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Trim the standup</text>
    <text x="118" y="63" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">agenda. Nobody</text>
    <text x="118" y="84" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">reads it anyway.</text>
    <!-- Clanker balloon -->
    <line x1="307" y1="70" x2="310" y2="150" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="230" y="26" width="154" height="44" rx="3" fill="#eef3f7" stroke="#111" stroke-width="2.5"/>
    <text x="307" y="54" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Understood.</text>
  </g>

  <!-- ================= PANEL B ================= -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#doug" x="420" y="150" width="104" height="182"/>
    <use href="#dailbert" x="512" y="176" width="96" height="168"/>
    <use href="#boss" x="708" y="96" width="116" height="203"/>
    <!-- desk -->
    <rect x="420" y="276" width="388" height="62" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#mug" x="428" y="244" width="46" height="46"/>
    <!-- monitor -->
    <rect x="636" y="168" width="110" height="86" rx="6" fill="#1b1f24" stroke="#111" stroke-width="3"/>
    <rect x="682" y="254" width="18" height="22" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="648" y="170" width="86" height="79"/>
    <!-- Boss balloon -->
    <path d="M748 66 L772 66 L762 128 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="684" y="12" width="150" height="56" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="759" y="36" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Where are my</text>
    <text x="759" y="56" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">metrics?!</text>
    <!-- Clanker balloon -->
    <line x1="642" y1="176" x2="690" y2="210" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="462" y="100" width="182" height="86" rx="3" fill="#eef3f7" stroke="#111" stroke-width="2.5"/>
    <text x="553" y="128" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I removed the metrics.</text>
    <text x="553" y="149" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">The agenda just says:</text>
    <text x="553" y="172" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">be kind.</text>
  </g>

  <!-- ================= PANEL C ================= -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="838" y1="308" x2="1218" y2="308" stroke="#111" stroke-width="2"/>
    <use href="#priya" x="856" y="98" width="126" height="220"/>
    <!-- crossed arms -->
    <path d="M885 246 Q919 234 958 248 L958 258 Q919 246 885 258 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M958 250 Q919 264 884 250 L884 262 Q919 276 958 262 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M894 250 l4 6 M948 252 l-4 6" stroke="#111" stroke-width="2" fill="none"/>
    <use href="#boss" x="1006" y="122" width="104" height="182"/>
    <use href="#doug" x="1114" y="158" width="96" height="168"/>
    <use href="#mug" x="1120" y="246" width="44" height="44"/>
    <!-- Priya balloon -->
    <path d="M912 96 L936 96 L922 132 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="846" y="12" width="162" height="86" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="927" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Leave it.</text>
    <text x="927" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Standup's four</text>
    <text x="927" y="82" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">minutes now.</text>
    <!-- Doug balloon -->
    <path d="M1140 194 L1160 194 L1152 216 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="1058" y="150" width="128" height="46" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="1122" y="179" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">I feel seen.</text>
