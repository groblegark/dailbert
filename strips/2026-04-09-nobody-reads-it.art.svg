      <path d="M52 92 q8 -3 16 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <!-- ===== CLANKER (lives inside a screen) ===== -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <path d="M60 14 L60 3" stroke="#9aa0a6" stroke-width="3"/>
      <circle cx="60" cy="3" r="3" fill="#9aa0a6"/>
      <rect x="24" y="14" width="72" height="64" rx="10" fill="#2a2f36" stroke="#9aa0a6" stroke-width="3"/>
      <rect x="36" y="34" width="20" height="8" rx="4" fill="#bfe3ff"/>
      <rect x="64" y="34" width="20" height="8" rx="4" fill="#bfe3ff"/>
      <rect x="40" y="54" width="40" height="15" rx="3" fill="#1b1f24" stroke="#9aa0a6" stroke-width="2"/>
      <path d="M47 54 V69 M55 54 V69 M63 54 V69 M71 54 V69" stroke="#9aa0a6" stroke-width="1.6"/>
    </symbol>
    <!-- ===== MUG ===== -->
    <symbol id="mug" viewBox="0 0 60 60">
      <rect x="10" y="16" width="34" height="32" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
