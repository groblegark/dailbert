      <path d="M52 92 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 210">
      <path d="M24 205 L26 150 Q30 120 60 118 Q90 120 94 150 L96 205 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M60 120 L44 152 M60 120 L76 152" stroke="#111" stroke-width="3" fill="none"/>
      <path d="M56 120 L60 140 L64 120" fill="none" stroke="#111" stroke-width="3"/>
