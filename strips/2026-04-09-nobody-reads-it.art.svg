      <circle cx="60" cy="66" r="34" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M40 40 q4 -8 10 -4 M59 34 q4 -8 10 -3 M78 42 q3 -7 9 -2" fill="none" stroke="#111" stroke-width="2.5"/>
