      <rect x="39" y="63" width="19" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="62" y="63" width="19" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M58 69 h4" stroke="#111" stroke-width="3"/>
