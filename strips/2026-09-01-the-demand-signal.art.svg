<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== SYMBOLS ===== -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 180">
      <ellipse cx="60" cy="40" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 10 q7 -9 2 -16 q9 4 4 15" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="50" cy="40" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="70" cy="40" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="40" x2="63" y2="40" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="40" r="1.6" fill="#111"/>
      <circle cx="70" cy="40" r="1.6" fill="#111"/>
      <path d="M52 56 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M44 68 L60 74 L76 68 L70 108 L50 108 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 74 L55 92 L60 96 L65 92 Z" fill="#111"/>
      <line x1="44" y1="72" x2="34" y2="100" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="76" y1="72" x2="86" y2="100" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 180">
      <circle cx="60" cy="42" r="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="40" r="2.4" fill="#111"/>
      <circle cx="71" cy="40" r="2.4" fill="#111"/>
      <path d="M46 50 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M42 74 L60 80 L78 74 L72 116 L48 116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug arm -->
      <line x1="78" y1="80" x2="96" y2="96" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="92" y="94" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M112 98 q7 1 7 7 q0 6 -7 7" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="42" y1="78" x2="34" y2="104" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 180">
      <ellipse cx="60" cy="42" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M36 34 q-6 -14 8 -18 q4 -10 16 -8 q12 -3 17 8 q13 3 8 18 q4 -2 3 6" fill="#111" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="16" r="6" fill="#111"/>
      <circle cx="45" cy="20" r="5" fill="#111"/>
      <circle cx="76" cy="21" r="5" fill="#111"/>
      <rect x="42" y="38" width="14" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="38" width="14" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="42" x2="64" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="42.5" r="1.5" fill="#111"/>
      <circle cx="71" cy="42.5" r="1.5" fill="#111"/>
      <path d="M52 58 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M44 70 L60 76 L76 70 L72 116 L48 116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="44" y1="74" x2="36" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="76" y1="74" x2="84" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="33" y1="94" x2="41" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="87" y1="94" x2="79" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="30" width="52" height="44" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="30" x2="50" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="15" r="3.5" fill="#1c1c1c" stroke="#111" stroke-width="2"/>
      <rect x="31" y="40" width="14" height="8" rx="2" fill="#cfe0e0"/>
      <rect x="55" y="40" width="14" height="8" rx="2" fill="#cfe0e0"/>
      <g stroke="#8fb0b0" stroke-width="2">
        <line x1="33" y1="60" x2="33" y2="68"/>
        <line x1="40" y1="60" x2="40" y2="68"/>
        <line x1="47" y1="60" x2="47" y2="68"/>
        <line x1="54" y1="60" x2="54" y2="68"/>
        <line x1="61" y1="60" x2="61" y2="68"/>
        <line x1="67" y1="60" x2="67" y2="68"/>
      </g>
    </symbol>

    <!-- SNACK BAR (single) -->
    <symbol id="bar" viewBox="0 0 40 24">
      <rect x="2" y="4" width="36" height="16" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M8 4 L6 20 M16 4 L14 20 M24 4 L22 20 M32 4 L30 20" stroke="#111" stroke-width="1.4" opacity="0.5"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- the snack shelf, normal but a bit sparse -->
      <rect x="34" y="74" width="150" height="150" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="34" y1="122" x2="184" y2="122" stroke="#111" stroke-width="2.2"/>
      <line x1="34" y1="170" x2="184" y2="170" stroke="#111" stroke-width="2.2"/>
      <text x="109" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">SNACK SHELF</text>
      <use href="#bar" x="46" y="88" width="34" height="20"/>
      <use href="#bar" x="118" y="88" width="34" height="20"/>
      <rect x="86" y="134" width="18" height="26" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="146" y="136" width="16" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#bar" x="52" y="186" width="34" height="20"/>

      <!-- Dailbert -->
      <use href="#dailbert" x="222" y="150" width="120" height="180"/>

      <!-- wall monitor with clanker -->
      <rect x="250" y="34" width="120" height="88" rx="4" fill="#e7e2d6" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="278" y="44" width="66" height="66"/>

      <!-- clanker balloon (screen-edged, dashed to surface) -->
      <line x1="308" y1="122" x2="270" y2="238" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="118" y="238" width="156" height="72" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M118 238 l-4 -4 M274 238 l4 -4 M118 310 l-4 4 M274 310 l4 4" stroke="#111" stroke-width="2"/>
      <text x="196" y="262" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The shelf is</text>
      <text x="196" y="280" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">running low. I read</text>
      <text x="196" y="298" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">the demand. Restocking.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <!-- the shelf, HEAVING with one identical bar -->
      <rect x="438" y="42" width="182" height="256" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="438" y1="102" x2="620" y2="102" stroke="#111" stroke-width="2.2"/>
      <line x1="438" y1="162" x2="620" y2="162" stroke="#111" stroke-width="2.2"/>
      <line x1="438" y1="222" x2="620" y2="222" stroke="#111" stroke-width="2.2"/>
      <g>
        <use href="#bar" x="448" y="54" width="34" height="20"/>
        <use href="#bar" x="483" y="54" width="34" height="20"/>
        <use href="#bar" x="518" y="54" width="34" height="20"/>
        <use href="#bar" x="553" y="54" width="34" height="20"/>
        <use href="#bar" x="586" y="54" width="34" height="20"/>
        <use href="#bar" x="448" y="76" width="34" height="20"/>
        <use href="#bar" x="483" y="76" width="34" height="20"/>
        <use href="#bar" x="518" y="76" width="34" height="20"/>
        <use href="#bar" x="553" y="76" width="34" height="20"/>
        <use href="#bar" x="586" y="76" width="34" height="20"/>

        <use href="#bar" x="448" y="114" width="34" height="20"/>
        <use href="#bar" x="483" y="114" width="34" height="20"/>
        <use href="#bar" x="518" y="114" width="34" height="20"/>
        <use href="#bar" x="553" y="114" width="34" height="20"/>
        <use href="#bar" x="586" y="114" width="34" height="20"/>
        <use href="#bar" x="448" y="136" width="34" height="20"/>
        <use href="#bar" x="483" y="136" width="34" height="20"/>
        <use href="#bar" x="518" y="136" width="34" height="20"/>
        <use href="#bar" x="553" y="136" width="34" height="20"/>
        <use href="#bar" x="586" y="136" width="34" height="20"/>

        <use href="#bar" x="448" y="174" width="34" height="20"/>
        <use href="#bar" x="483" y="174" width="34" height="20"/>
        <use href="#bar" x="518" y="174" width="34" height="20"/>
        <use href="#bar" x="553" y="174" width="34" height="20"/>
        <use href="#bar" x="586" y="174" width="34" height="20"/>
        <use href="#bar" x="448" y="196" width="34" height="20"/>
        <use href="#bar" x="483" y="196" width="34" height="20"/>
        <use href="#bar" x="518" y="196" width="34" height="20"/>
        <use href="#bar" x="553" y="196" width="34" height="20"/>
        <use href="#bar" x="586" y="196" width="34" height="20"/>

        <use href="#bar" x="448" y="234" width="34" height="20"/>
        <use href="#bar" x="483" y="234" width="34" height="20"/>
        <use href="#bar" x="518" y="234" width="34" height="20"/>
        <use href="#bar" x="553" y="234" width="34" height="20"/>
        <use href="#bar" x="586" y="234" width="34" height="20"/>
        <use href="#bar" x="448" y="256" width="34" height="20"/>
        <use href="#bar" x="483" y="256" width="34" height="20"/>
        <use href="#bar" x="518" y="256" width="34" height="20"/>
        <use href="#bar" x="553" y="256" width="34" height="20"/>
        <use href="#bar" x="586" y="256" width="34" height="20"/>
      </g>
      <!-- overflow on the floor -->
      <use href="#bar" x="630" y="286" width="34" height="20"/>
      <use href="#bar" x="642" y="302" width="34" height="20" transform="rotate(16 659 312)"/>

      <!-- Doug, delighted -->
      <use href="#doug" x="656" y="150" width="120" height="180"/>

      <!-- Doug balloon -->
      <path d="M642 40 q-8 0 -8 8 v34 q0 8 8 8 h96 q8 0 8 -8 v-34 q0 -8 -8 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M700 98 l-4 16 l18 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="690" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Oh, wow. They're</text>
      <text x="690" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">all Kelp Crunch.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <!-- overloaded shelf edge behind -->
      <rect x="978" y="58" width="94" height="152" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="978" y1="108" x2="1072" y2="108" stroke="#111" stroke-width="2.2"/>
      <line x1="978" y1="158" x2="1072" y2="158" stroke="#111" stroke-width="2.2"/>
      <use href="#bar" x="982" y="72" width="28" height="16"/>
      <use href="#bar" x="1012" y="72" width="28" height="16"/>
      <use href="#bar" x="1040" y="72" width="28" height="16"/>
      <use href="#bar" x="982" y="122" width="28" height="16"/>
      <use href="#bar" x="1012" y="122" width="28" height="16"/>
      <use href="#bar" x="1040" y="122" width="28" height="16"/>
      <use href="#bar" x="982" y="172" width="28" height="16"/>
      <use href="#bar" x="1012" y="172" width="28" height="16"/>
      <use href="#bar" x="1040" y="172" width="28" height="16"/>

      <!-- Priya, dry -->
      <use href="#priya" x="858" y="150" width="120" height="180"/>
      <!-- Doug beside her, still munching -->
      <use href="#doug" x="1082" y="158" width="112" height="172"/>

      <!-- clanker in the dark shelf-side screen -->
      <rect x="1098" y="40" width="98" height="72" rx="4" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="1120" y="48" width="56" height="56"/>

      <!-- Priya balloon -->
      <path d="M846 214 q-8 0 -8 8 v40 q0 8 8 8 h132 q8 0 8 -8 v-40 q0 -8 -8 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M905 270 l-3 14 l15 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="912" y="234" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Doug ate one of</text>
      <text x="912" y="251" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">these once. As a</text>
      <text x="912" y="268" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">joke.</text>

      <!-- clanker reply (screen-edged, dashed to surface) -->
      <line x1="1120" y1="112" x2="1150" y2="128" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="1000" y="128" width="150" height="56" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M1000 128 l-4 -4 M1150 128 l4 -4 M1000 184 l-4 4 M1150 184 l4 4" stroke="#111" stroke-width="2"/>
      <text x="1075" y="148" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It was the most</text>
      <text x="1075" y="164" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">recent thing anyone</text>
      <text x="1075" y="180" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">chose.</text>
    </g>
  </g>
</svg>