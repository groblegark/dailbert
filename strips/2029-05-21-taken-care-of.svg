<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Taken Care Of</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2029-05-21</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 150">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M40 20 q-3 -10 8 -12" fill="none"/>
        <ellipse cx="60" cy="40" rx="26" ry="30" fill="#f4f1ea"/>
        <circle cx="50" cy="40" r="8" fill="#f4f1ea"/>
        <circle cx="70" cy="40" r="8" fill="#f4f1ea"/>
        <line x1="58" y1="40" x2="62" y2="40"/>
        <circle cx="50" cy="40" r="1.6" fill="#111"/>
        <circle cx="70" cy="40" r="1.6" fill="#111"/>
        <path d="M52 56 q8 5 16 0" fill="none"/>
        <path d="M40 68 q-14 6 -16 30 l72 0 q-2 -24 -16 -30" fill="#f4f1ea"/>
        <path d="M52 66 l8 10 l8 -10" fill="#f4f1ea"/>
        <line x1="60" y1="76" x2="60" y2="96"/>
        <path d="M56 76 l4 20 l4 -20" fill="#111" stroke="none"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 150">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M46 14 q6 -6 12 0" fill="none"/>
        <circle cx="58" cy="42" r="30" fill="#f4f1ea"/>
        <circle cx="49" cy="40" r="2" fill="#111"/>
        <circle cx="67" cy="40" r="2" fill="#111"/>
        <path d="M44 50 q14 16 28 0" fill="#f4f1ea"/>
        <path d="M40 72 q-12 6 -14 26 l66 0 q-2 -20 -14 -26" fill="#f4f1ea"/>
        <path d="M50 70 q8 8 16 0" fill="#f4f1ea"/>
        <!-- mug in hand -->
        <rect x="6" y="74" width="22" height="20" rx="2" fill="#f4f1ea"/>
        <path d="M28 78 q8 0 8 7 t-8 7" fill="none"/>
        <path d="M26 74 q4 -14 -8 -14" fill="none" stroke-width="2"/>
      </g>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 150">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M44 22 q-6 -18 2 -20 q2 12 8 14" fill="#f4f1ea"/>
        <path d="M74 22 q6 -18 -2 -20 q-2 12 -8 14" fill="#f4f1ea"/>
        <ellipse cx="59" cy="40" rx="24" ry="26" fill="#f4f1ea"/>
        <circle cx="51" cy="40" r="1.5" fill="#111"/>
        <circle cx="67" cy="40" r="1.5" fill="#111"/>
        <path d="M53 54 q6 3 12 0" fill="none"/>
        <path d="M42 64 q-14 6 -16 30 l66 0 q-2 -24 -16 -30" fill="#f4f1ea"/>
        <path d="M52 62 l7 10 l7 -10" fill="#f4f1ea"/>
        <path d="M55 72 l4 18 l4 -18" fill="#111" stroke="none"/>
      </g>
    </symbol>

    <!-- CLANKER robot head -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
        <line x1="50" y1="10" x2="50" y2="20"/>
        <circle cx="50" cy="8" r="3" fill="#111"/>
        <rect x="24" y="20" width="52" height="46" rx="5" fill="#f4f1ea"/>
        <rect x="31" y="30" width="14" height="9" rx="2" fill="#111"/>
        <rect x="55" y="30" width="14" height="9" rx="2" fill="#111"/>
        <line x1="33" y1="50" x2="67" y2="50"/>
        <line x1="33" y1="55" x2="67" y2="55"/>
        <line x1="40" y1="47" x2="40" y2="58"/>
        <line x1="50" y1="47" x2="50" y2="58"/>
        <line x1="60" y1="47" x2="60" y2="58"/>
        <rect x="33" y="47" width="34" height="12" rx="2" fill="none"/>
        <line x1="24" y1="42" x2="18" y2="42"/>
        <line x1="76" y1="42" x2="82" y2="42"/>
      </g>
    </symbol>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#111" stroke-width="0.4" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- ============ PANEL 1 : desk ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <line x1="2" y1="250" x2="398" y2="250" stroke="#111" stroke-width="2.4"/>
      <!-- monitor -->
      <g>
        <rect x="40" y="120" width="150" height="110" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
        <rect x="50" y="130" width="130" height="90" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
        <rect x="50" y="130" width="130" height="90" rx="3" fill="url(#scan)"/>
        <rect x="100" y="230" width="30" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <rect x="80" y="244" width="70" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <!-- clanker on screen -->
        <use href="#clanker" x="75" y="128" width="80" height="80"/>
      </g>
      <!-- coffee mug on desk -->
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <rect x="228" y="218" width="30" height="30" rx="3" fill="#f4f1ea"/>
        <path d="M258 224 q11 0 11 9 t-11 9" fill="none"/>
        <path d="M232 214 q3 -10 -2 -16" stroke-width="1.6"/>
        <path d="M240 214 q3 -10 -2 -16" stroke-width="1.6"/>
      </g>
      <!-- dailbert at desk right -->
      <use href="#dailbert" x="268" y="120" width="120" height="150"/>
    </g>
    <!-- balloons -->
    <g>
      <path d="M52 18 q-8 0 -8 10 l0 34 q0 10 10 10 l120 0 q10 0 10 -10 l0 -34 q0 -10 -10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M108 82 l6 24 l14 -18 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="44" y="18" width="126" height="64" fill="#fff" stroke="#111" stroke-width="1" opacity="0"/>
      <text x="107" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="107" dy="0">Your coffee's the right</tspan>
        <tspan x="107" dy="15">warmth. You hadn't</tspan>
        <tspan x="107" dy="15">reached for it yet.</tspan>
      </text>
      <line x1="118" y1="88" x2="118" y2="128" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>
    <g>
      <path d="M250 20 q-8 0 -8 9 l0 26 q0 9 9 9 l84 0 q9 0 9 -9 l0 -26 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M318 72 l-4 20 l16 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="292" y="40" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="292" dy="0">You're getting</tspan>
        <tspan x="292" dy="15">ahead of me.</tspan>
      </text>
    </g>
    <g>
      <path d="M212 108 q-8 0 -8 9 l0 26 q0 9 9 9 l86 0 q9 0 9 -9 l0 -26 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M150 138 l-8 8 l24 4 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="255" y="128" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">
        <tspan x="255" dy="0">Only by half a second.</tspan>
        <tspan x="255" dy="14">I give the rest back.</tspan>
      </text>
      <line x1="150" y1="150" x2="140" y2="170" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>
  </g>

  <!-- ============ PANEL 2 : office ============ -->
  <g transform="translate(414,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="2" y1="270" x2="398" y2="270" stroke="#111" stroke-width="2.4"/>
      <!-- back wall cabinet with taped card to nothing -->
      <rect x="40" y="150" width="90" height="70" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="85" y1="150" x2="85" y2="220" stroke="#111" stroke-width="1.6"/>
      <!-- floating card taped to nothing -->
      <g>
        <rect x="150" y="120" width="60" height="44" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
        <line x1="170" y1="118" x2="190" y2="112" stroke="#111" stroke-width="4" opacity="0.5"/>
        <line x1="158" y1="132" x2="202" y2="132" stroke="#111" stroke-width="1" opacity="0.5"/>
        <line x1="158" y1="140" x2="202" y2="140" stroke="#111" stroke-width="1" opacity="0.5"/>
        <line x1="158" y1="148" x2="185" y2="148" stroke="#111" stroke-width="1" opacity="0.5"/>
      </g>
      <!-- doug left -->
      <use href="#doug" x="40" y="150" width="120" height="150"/>
      <!-- dailbert right -->
      <use href="#dailbert" x="248" y="150" width="120" height="150"/>
    </g>
    <!-- balloons -->
    <g>
      <path d="M24 18 q-8 0 -8 9 l0 40 q0 9 9 9 l128 0 q9 0 9 -9 l0 -40 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M70 76 l4 22 l18 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="89" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="89" dy="0">There's a card taped</tspan>
        <tspan x="89" dy="15">to nothing. Says</tspan>
        <tspan x="89" dy="15">'thank you for</tspan>
        <tspan x="89" dy="15">the years.'</tspan>
      </text>
    </g>
    <g>
      <path d="M250 22 q-8 0 -8 9 l0 24 q0 9 9 9 l82 0 q9 0 9 -9 l0 -24 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M312 62 l-4 20 l16 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="291" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="291" dy="0">Who signed it?</tspan>
      </text>
    </g>
    <g>
      <path d="M100 118 q-8 0 -8 9 l0 54 q0 9 9 9 l150 0 q9 0 9 -9 l0 -54 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M118 190 l-6 22 l20 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="175" y="134" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">
        <tspan x="175" dy="0">Nobody. I checked</tspan>
        <tspan x="175" dy="14">twice. Also my kid's</tspan>
        <tspan x="175" dy="14">cereal was already</tspan>
        <tspan x="175" dy="14">in the cupboard.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 : meeting ============ -->
  <g transform="translate(828,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- meeting table -->
      <path d="M20 300 l40 -40 l280 0 l40 40 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- boss left, arms raised -->
      <use href="#boss" x="40" y="120" width="120" height="150"/>
      <!-- boss glasses with clanker reflection -->
      <g>
        <circle cx="86" cy="158" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <circle cx="114" cy="158" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <line x1="98" y1="158" x2="102" y2="158" stroke="#111" stroke-width="2.2"/>
        <clipPath id="lensL"><circle cx="86" cy="158" r="11"/></clipPath>
        <clipPath id="lensR"><circle cx="114" cy="158" r="11"/></clipPath>
        <g clip-path="url(#lensL)"><use href="#clanker" x="66" y="140" width="40" height="40"/></g>
        <g clip-path="url(#lensR)"><use href="#clanker" x="94" y="140" width="40" height="40"/></g>
      </g>
      <!-- dailbert right -->
      <use href="#dailbert" x="250" y="150" width="120" height="150"/>
    </g>
    <!-- balloons -->
    <g>
      <path d="M22 18 q-8 0 -8 9 l0 40 q0 9 9 9 l150 0 q9 0 9 -9 l0 -40 q0 -9 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M96 76 l2 26 l18 -18 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="98" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="98" dy="0">Good quarter, team.</tspan>
        <tspan x="98" dy="15">I really pulled us</tspan>
        <tspan x="98" dy="15">into a nice place.</tspan>
      </text>
    </g>
    <!-- clanker rectangular double-outline balloon, dashed connector to glasses -->
    <g>
      <rect x="214" y="30" width="150" height="58" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="219" y="35" width="140" height="48" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="289" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="289" dy="0">Yes. There's nothing</tspan>
        <tspan x="289" dy="15">left for anyone</tspan>
        <tspan x="289" dy="15">to do.</tspan>
      </text>
      <path d="M214 78 L150 130 L110 152" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>