<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Waters the Right Plant</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-03</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 4 q7 -6 3 4 q-3 5 2 6" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="40" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="34" x2="53" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="34" r="1.6" fill="#111"/>
      <circle cx="60" cy="34" r="1.6" fill="#111"/>
      <path d="M44 50 q6 5 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 64 q16 10 32 0 v40 h-32 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 66 l-6 10 h12 z" fill="#111"/>
      <path d="M50 76 l-3 20 h6 z" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 100 130">
      <circle cx="50" cy="36" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="32" r="2.4" fill="#111"/>
      <circle cx="60" cy="32" r="2.4" fill="#111"/>
      <path d="M38 44 q12 14 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M36 66 q14 9 28 0 v40 h-28 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="60" y="82" width="20" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M80 86 q8 0 8 4 q0 4 -8 4" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M64 78 q2 -5 0 -8 M70 78 q2 -5 0 -8" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 130">
      <ellipse cx="50" cy="36" rx="25" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M25 30 q4 -22 25 -22 q21 0 25 22 q-8 -10 -25 -10 q-17 0 -25 10z" fill="#111"/>
      <path d="M28 18 q-6 -6 2 -12 M72 18 q6 -6 -2 -12" fill="#111"/>
      <circle cx="50" cy="10" r="7" fill="#111"/>
      <rect x="32" y="32" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="32" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="37" x2="53" y2="37" stroke="#111" stroke-width="2.2"/>
      <circle cx="39.5" cy="37.5" r="1.6" fill="#111"/>
      <circle cx="60.5" cy="37.5" r="1.6" fill="#111"/>
      <path d="M43 52 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M33 64 q17 10 34 0 v40 h-34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="41" y1="72" x2="41" y2="88" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="59" y1="72" x2="59" y2="88" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 80">
      <rect x="24" y="18" width="52" height="46" rx="6" fill="#dcdcd6" stroke="#111" stroke-width="2.4"/>
      <line x1="50" y1="18" x2="50" y2="8" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="6" r="3" fill="#111"/>
      <rect x="31" y="28" width="14" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="55" y="28" width="14" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="34" y1="48" x2="66" y2="48" stroke="#111" stroke-width="2"/>
      <line x1="34" y1="53" x2="66" y2="53" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="45" x2="40" y2="56" stroke="#111" stroke-width="1.6"/>
      <line x1="50" y1="45" x2="50" y2="56" stroke="#111" stroke-width="1.6"/>
      <line x1="60" y1="45" x2="60" y2="56" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- dying desk plant -->
    <symbol id="plant" viewBox="0 0 60 70">
      <path d="M18 40 h24 l-3 26 h-18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M30 40 q-2 -18 -10 -22 M30 40 q2 -16 10 -20 M30 40 q0 -20 0 -26" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 20 q-6 3 -8 9 M40 22 q6 2 8 8 M30 14 q4 -4 3 -8" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c1"><rect x="2" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- desk -->
      <rect x="0" y="250" width="404" height="10" fill="#111"/>
      <!-- monitor with clanker -->
      <rect x="238" y="120" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="300" y="232" width="26" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="250" y="118" width="126" height="101"/>
      <!-- dying plant on desk -->
      <use href="#plant" x="18" y="188" width="66" height="70"/>
      <!-- dailbert typing -->
      <use href="#dailbert" x="96" y="118" width="120" height="156"/>

      <!-- dailbert balloon -->
      <path d="M40 40 h150 q10 0 10 10 v30 q0 10 -10 10 h-60 l-10 12 l-4 -12 h-76 q-10 0 -10 -10 v-30 q0 -10 10 -10z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="115" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Wrote an agent to</text>
      <text x="115" y="78" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">water the office plant.</text>

      <!-- clanker balloon -->
      <path d="M244 12 h150 v40 h-150 z" fill="#fff" stroke="#111" stroke-width="2" stroke-dasharray="0"/>
      <line x1="300" y1="52" x2="308" y2="116" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="319" y="30" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Thoughtful. I will</text>
      <text x="319" y="46" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">assist.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c2"><rect x="416" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <rect x="416" y="250" width="404" height="10" fill="#111"/>

      <!-- monitor + clanker -->
      <rect x="640" y="118" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="652" y="116" width="126" height="101"/>

      <!-- the plant, now DROWNING - overfull tray, puddle -->
      <use href="#plant" x="470" y="176" width="80" height="84"/>
      <!-- water spilling -->
      <path d="M474 244 q20 8 66 0 q6 6 -2 8 q-30 6 -62 0 q-8 -2 -2 -8z" fill="#bfbfb8" stroke="#111" stroke-width="1.8"/>
      <path d="M486 232 q0 8 -3 12 M500 234 q0 8 -3 12 M514 232 q0 8 -3 12" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <text x="512" y="172" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="15" fill="#111">glug</text>

      <!-- doug watching -->
      <use href="#doug" x="556" y="130" width="120" height="150"/>

      <!-- clanker balloon -->
      <path d="M566 24 h190 v54 h-190 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="700" y1="78" x2="710" y2="114" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="661" y="44" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Your agent watered</text>
      <text x="661" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">it. So I watered it</text>
      <text x="661" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">too. To be safe.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <rect x="830" y="250" width="400" height="10" fill="#111"/>

      <!-- monitor + clanker, screen off-ish -->
      <rect x="1064" y="120" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="1076" y="118" width="126" height="101"/>

      <!-- PRIYA holding a fake plant, dry tray -->
      <use href="#priya" x="880" y="120" width="122" height="156"/>
      <!-- new plant: a small plastic one on the desk, no water -->
      <use href="#plant" x="982" y="188" width="66" height="70"/>
      <text x="1015" y="184" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">(plastic)</text>

      <!-- priya balloon -->
      <path d="M842 30 h190 q10 0 10 10 v34 q0 10 -10 10 h-70 l-10 12 l-4 -12 h-106 q-10 0 -10 -10 v-34 q0 -10 10 -10z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="937" y="52" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Swapped it for a fake</text>
      <text x="937" y="70" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">one. Water it all you want.</text>

      <!-- clanker small button -->
      <path d="M1070 24 h140 v34 h-140 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="1140" y1="58" x2="1140" y2="116" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="1140" y="45" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">...it looks happier.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>