<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Sometime</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-29</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <g id="dailbert">
      <path d="M8 132 Q8 92 40 92 Q72 92 72 132 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="34" y="78" width="12" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 94 l-5 7 l5 24 l5 -24 z" fill="#111"/>
      <ellipse cx="40" cy="48" rx="22" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 22 q7 -9 13 -2 q-4 -3 -7 3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="31" cy="48" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="48" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="39" y1="48" x2="41" y2="48" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="46" x2="63" y2="44" stroke="#111" stroke-width="2"/>
      <circle cx="31" cy="48" r="2.2" fill="#111"/>
      <circle cx="49" cy="48" r="2.2" fill="#111"/>
      <line x1="34" y1="65" x2="46" y2="65" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- DOUG -->
    <g id="doug">
      <path d="M4 134 Q4 92 40 92 Q76 92 76 134 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="34" y="76" width="12" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="46" r="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M16 40 q-3 -11 9 -13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M64 40 q3 -11 -9 -13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M27 22 q13 -8 26 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="31" cy="44" r="2.7" fill="#111"/>
      <circle cx="49" cy="44" r="2.7" fill="#111"/>
      <path d="M27 53 q13 17 26 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- MUG -->
    <g id="mug">
      <rect x="0" y="0" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 5 q9 0 9 6 q0 6 -9 6" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M8 -4 q4 -5 0 -10" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M16 -4 q4 -5 0 -10" fill="none" stroke="#111" stroke-width="1.6"/>
    </g>
    <!-- PRIYA -->
    <g id="priya">
      <path d="M6 134 Q6 90 40 90 Q74 90 74 134 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M20 96 l-3 12 M60 96 l3 12" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="34" y="74" width="12" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="40" cy="49" rx="21" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M17 46 q-5 -32 23 -34 q28 2 23 34 q-7 -15 -23 -15 q-16 0 -23 15 z" fill="#111"/>
      <circle cx="40" cy="12" r="8" fill="#111"/>
      <rect x="23" y="45" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="42" y="45" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="38" y1="50" x2="42" y2="50" stroke="#111" stroke-width="2.2"/>
      <circle cx="30" cy="50" r="2" fill="#111"/>
      <circle cx="49" cy="50" r="2" fill="#111"/>
      <path d="M34 65 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <!-- CLANKER (drawn inside a screen only) -->
    <g id="clanker">
      <line x1="30" y1="8" x2="30" y2="-4" stroke="#9aa0a6" stroke-width="2.5"/>
      <circle cx="30" cy="-6" r="3" fill="#9aa0a6"/>
      <rect x="4" y="8" width="52" height="44" rx="7" fill="#c7ccd2" stroke="#e6eaee" stroke-width="2.5"/>
      <rect x="13" y="22" width="14" height="6" rx="3" fill="#eafcff"/>
      <rect x="33" y="22" width="14" height="6" rx="3" fill="#eafcff"/>
      <rect x="15" y="37" width="30" height="9" rx="2" fill="#3a4046"/>
      <line x1="21" y1="37" x2="21" y2="46" stroke="#c7ccd2" stroke-width="1.4"/>
      <line x1="27" y1="37" x2="27" y2="46" stroke="#c7ccd2" stroke-width="1.4"/>
      <line x1="33" y1="37" x2="33" y2="46" stroke="#c7ccd2" stroke-width="1.4"/>
      <line x1="39" y1="37" x2="39" y2="46" stroke="#c7ccd2" stroke-width="1.4"/>
    </g>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <line x1="0" y1="264" x2="400" y2="264" stroke="#111" stroke-width="2"/>
      <!-- monitor -->
      <rect x="88" y="220" width="12" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="94" cy="242" rx="30" ry="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="28" y="118" width="134" height="104" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="40" y="130" width="110" height="80" rx="4" fill="#16191d"/>
      <line x1="52" y1="204" x2="140" y2="150" stroke="#2f353b" stroke-width="6" opacity="0.5"/>
      <g transform="translate(63,150) scale(0.92)"><use href="#clanker"/></g>
      <!-- Doug + mug -->
      <g transform="translate(168,142)"><use href="#doug"/></g>
      <g transform="translate(150,222)"><use href="#mug"/></g>
      <!-- Dailbert -->
      <g transform="translate(276,152) scale(0.95)"><use href="#dailbert"/></g>

      <!-- clanker balloon (screen-edged, dashed to screen) -->
      <line x1="196" y1="86" x2="150" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="176" y="12" width="212" height="76" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="180" y="16" width="204" height="68" fill="none" stroke="#111" stroke-width="1" opacity="0.5"/>
      <text x="282" y="36" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You told 41 people</text>
      <text x="282" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">'grab coffee sometime.'</text>
      <text x="282" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I found the times.</text>

      <!-- Dailbert balloon -->
      <path d="M330 136 l-8 22 l22 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="248" y="98" width="142" height="40" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="319" y="123" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It booked all of them?</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="415" y1="270" x2="813" y2="270" stroke="#111" stroke-width="2"/>
      <!-- big warm Doug -->
      <g transform="translate(548,110) scale(1.45)"><use href="#doug"/></g>
      <g transform="translate(690,232) scale(1.3)"><use href="#mug"/></g>

      <!-- balloon A -->
      <path d="M566 176 l-24 6 l20 12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="430" y="30" width="140" height="44" rx="18" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="500" y="58" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="17" fill="#111">Forty-one.</text>

      <!-- balloon B (the quiet beat) -->
      <path d="M642 190 l24 4 l-18 14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="640" y="40" width="160" height="58" rx="18" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="720" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">I meant it.</text>
      <text x="720" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Every time.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="829" y1="266" x2="1227" y2="266" stroke="#111" stroke-width="2"/>
      <!-- monitor + clanker -->
      <rect x="912" y="212" width="12" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="918" cy="234" rx="28" ry="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="856" y="116" width="124" height="98" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="868" y="128" width="100" height="74" rx="4" fill="#16191d"/>
      <line x1="880" y1="196" x2="958" y2="146" stroke="#2f353b" stroke-width="6" opacity="0.5"/>
      <g transform="translate(884,144) scale(0.86)"><use href="#clanker"/></g>

      <!-- Doug in background, back to his mug -->
      <g transform="translate(1082,168) scale(0.82)"><use href="#doug"/></g>
      <g transform="translate(1064,232) scale(0.9)"><use href="#mug"/></g>

      <!-- Priya, winning -->
      <g transform="translate(978,150) scale(1.05)"><use href="#priya"/></g>
      <rect x="988" y="252" width="120" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

      <!-- clanker balloon -->
      <line x1="912" y1="72" x2="936" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="838" y="34" width="150" height="40" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="842" y="38" width="142" height="32" fill="none" stroke="#111" stroke-width="1" opacity="0.5"/>
      <text x="913" y="59" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Booked through spring.</text>

      <!-- Priya balloon (the win) -->
      <path d="M1024 158 l-20 8 l18 12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="1010" y="18" width="204" height="58" rx="18" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1112" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Keep them. One a week.</text>
      <text x="1112" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">By the window.</text>

      <!-- Doug tiny beat -->
      <path d="M1096 198 l-6 14 l14 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="1096" y="176" width="66" height="30" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1129" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>