      <path d="M60 8 q11 -7 4 -15 q-1 7 -8 5" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="8.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="72" cy="42" r="8.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
