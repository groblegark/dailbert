      <path d="M92 118 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M59 118 q6 -5 10 0" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

