      <path d="M50 74 v10 h20 v-10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M30 158 q0 -66 30 -76 q30 10 30 76" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
