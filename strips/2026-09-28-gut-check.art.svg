      <circle cx="72" cy="42" r="2" fill="#111"/>
      <path d="M50 60 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
