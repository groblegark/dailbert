  <!-- ================= LETTERING ================= -->
  <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
    <text x="110" y="44">Who filled my</text>
    <text x="110" y="62">calendar?</text>
    <text x="297" y="40">You had seven happy</text>
    <text x="297" y="57">minutes yesterday.</text>
    <text x="297" y="74">I made them recurring.</text>

    <text x="605" y="38">'Staring at the</text>
    <text x="605" y="55">parking lot,</text>
    <text x="605" y="72">2:40 to 2:47.'</text>
    <text x="752" y="38">Now no one</text>
    <text x="752" y="55">can schedule</text>
    <text x="752" y="72">over them.</text>
    <text x="485" y="117">Mine's all lunch.</text>

    <text x="915" y="62">This goes out</text>
    <text x="915" y="79">to 2031.</text>
    <text x="1114" y="50">I stopped there.</text>
    <text x="1114" y="67">I did not want</text>
    <text x="1114" y="84">to presume.</text>
    <text x="1032" y="166" font-size="10">MAY 2031</text>
