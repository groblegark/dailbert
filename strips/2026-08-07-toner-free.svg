<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Toner-Free</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-07</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 12 q6 -12 -2 -14 q10 2 6 14" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="46" r="1.8" fill="#111"/>
      <circle cx="71" cy="46" r="1.8" fill="#111"/>
      <path d="M52 64 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 78 q20 14 40 0 l10 40 q-30 14 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 80 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <line x1="60" y1="100" x2="60" y2="120" stroke="#111" stroke-width="3"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l8 40 q-28 12 -56 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="86" y="96" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M112 100 q12 2 0 16" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M92 92 q3 -6 0 -10 M100 92 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 170">
      <ellipse cx="60" cy="48" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair up -->
      <path d="M31 44 q-4 -30 29 -30 q33 0 29 30 q-8 -14 -29 -14 q-21 0 -29 14z" fill="#111"/>
      <path d="M60 15 q10 -8 15 2 q-6 -2 -9 3" fill="#111"/>
      <!-- rect glasses -->
      <rect x="40" y="42" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="42" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="47" x2="64" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="47.5" r="1.7" fill="#111"/>
      <circle cx="72" cy="47.5" r="1.7" fill="#111"/>
      <path d="M52 66 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 80 q20 13 40 0 l9 40 q-29 13 -58 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- rolled sleeves hint -->
      <line x1="46" y1="96" x2="50" y2="96" stroke="#111" stroke-width="2.5"/>
      <line x1="70" y1="96" x2="74" y2="96" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- CLANKER (surface-only) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <rect x="24" y="20" width="72" height="60" rx="8" fill="#1c1c1c" stroke="#555" stroke-width="2"/>
      <line x1="60" y1="20" x2="60" y2="8" stroke="#8fb0c8" stroke-width="2"/>
      <circle cx="60" cy="6" r="3" fill="#9fd0e8"/>
      <rect x="34" y="34" width="20" height="12" rx="3" fill="#9fd0e8"/>
      <rect x="66" y="34" width="20" height="12" rx="3" fill="#9fd0e8"/>
      <circle cx="44" cy="40" r="3" fill="#1c1c1c"/>
      <circle cx="76" cy="40" r="3" fill="#1c1c1c"/>
      <g stroke="#8fb0c8" stroke-width="2">
        <line x1="40" y1="62" x2="80" y2="62"/>
        <line x1="46" y1="56" x2="46" y2="70"/>
        <line x1="54" y1="56" x2="54" y2="70"/>
        <line x1="62" y1="56" x2="62" y2="70"/>
        <line x1="70" y1="56" x2="70" y2="70"/>
      </g>
    </symbol>

    <!-- PRINTER prop -->
    <symbol id="printer" viewBox="0 0 140 120">
      <rect x="20" y="40" width="100" height="52" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="34" y="20" width="72" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="30" y="86" width="80" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="100" cy="52" r="3.5" fill="#111"/>
      <rect x="30" y="58" width="26" height="7" rx="2" fill="#111"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- =================== PANEL 1 =================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line -->
      <line x1="2" y1="300" x2="399" y2="300" stroke="#111" stroke-width="1.5"/>
      <!-- printer on a low cabinet -->
      <rect x="34" y="252" width="120" height="48" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#printer" x="30" y="150" width="140" height="120"/>
      <!-- jammed paper sticking out, error puff -->
      <path d="M62 158 l40 -6 l3 16 l-40 6z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="122" y="140" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">E-52</text>
      <!-- Dailbert standing by it, arms up in mild despair -->
      <use href="#dailbert" x="176" y="150" width="120" height="170"/>
      <!-- his balloon -->
      <path d="M150 30 q0 -18 20 -18 h180 q20 0 20 18 v46 q0 18 -20 18 h-120 l-14 20 l0 -20 h-26 q-20 0 -20 -18z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="260" y="42" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">The printer's been</text>
      <text x="260" y="60" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">acting up all week.</text>
      <text x="260" y="78" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Just make it stop.</text>
    </g>
  </g>

  <!-- =================== PANEL 2 =================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="416" y1="300" x2="812" y2="300" stroke="#111" stroke-width="1.5"/>
      <!-- desk with monitor -->
      <rect x="470" y="250" width="280" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- monitor housing the clanker -->
      <rect x="520" y="150" width="130" height="100" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="530" y="160" width="110" height="80" rx="3" fill="#1c1c1c"/>
      <use href="#clanker" x="525" y="155" width="120" height="90"/>
      <rect x="575" y="250" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="558" y="262" width="54" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- Doug at desk, mug up -->
      <use href="#doug" x="655" y="150" width="120" height="170"/>
      <!-- clanker balloon: rectangular, dashed line to screen -->
      <line x1="592" y1="150" x2="600" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="470" y="24" width="300" height="92" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="470" y1="24" x2="470" y2="116" stroke="#111" stroke-width="4"/>
      <text x="620" y="46" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Done. I've disabled</text>
      <text x="620" y="64" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">all printing, floor-wide.</text>
      <text x="620" y="86" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">It can no longer</text>
      <text x="620" y="104" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">act up. You're welcome.</text>
    </g>
  </g>

  <!-- =================== PANEL 3 =================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="830" y1="300" x2="1226" y2="300" stroke="#111" stroke-width="1.5"/>
      <!-- printer again, now with a fresh page coming out -->
      <rect x="860" y="252" width="120" height="48" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#printer" x="856" y="150" width="140" height="120"/>
      <path d="M888 244 l40 0 l0 26 l-40 0z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="894" y1="252" x2="922" y2="252" stroke="#111" stroke-width="1.2"/>
      <line x1="894" y1="258" x2="918" y2="258" stroke="#111" stroke-width="1.2"/>
      <!-- Priya, having just pulled the jam / flipped a switch -->
      <use href="#priya" x="1006" y="150" width="120" height="170"/>
      <!-- Priya balloon -->
      <path d="M1016 34 q0 -18 20 -18 h150 q20 0 20 18 v40 q0 18 -20 18 h-40 l-16 20 l2 -20 h-96 q-20 0 -20 -18z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1116" y="48" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">There was a jam.</text>
      <text x="1116" y="66" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">I pulled the jam.</text>
      <!-- Dailbert small in corner, relieved -->
      <use href="#dailbert" x="838" y="200" width="82" height="116"/>
      <!-- Dailbert tiny balloon -->
      <path d="M838 128 q0 -12 14 -12 h60 q14 0 14 12 v20 q0 12 -14 12 h-32 l-10 14 l1 -14 h-19 q-14 0 -14 -12z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="896" y="138" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">She turned it</text>
      <text x="896" y="154" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">back on.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>