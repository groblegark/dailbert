<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Nothing Is Really Gone</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-21</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 11 q11 -10 5 -18 q9 4 3 15" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="8" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="8" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.1" fill="#111"/>
      <circle cx="71" cy="46" r="2.1" fill="#111"/>
      <path d="M52 64 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M38 80 q22 12 44 0 l10 70 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-7 10 l7 40 l7 -40 z" fill="#111"/>
      <path d="M60 82 l-6 8 l6 6 l6 -6 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="3" fill="#111"/>
      <circle cx="72" cy="44" r="3" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M36 84 q24 12 48 0 l8 66 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- arm to mug -->
      <path d="M84 96 q26 10 26 34" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="98" y="126" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M124 131 q9 2 9 9 q0 7 -9 8" fill="none" stroke="#111" stroke-width="2.6"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M28 44 q-6 -30 32 -34 q38 4 32 34 z" fill="#111"/>
      <path d="M55 6 q4 -6 12 -4 q-3 4 -1 9" fill="#111"/>
      <ellipse cx="60" cy="50" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 40 q-4 -26 30 -30 q34 4 30 30 q-14 -12 -30 -12 q-16 0 -30 12 z" fill="#111"/>
      <rect x="40" y="46" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="46" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="51" x2="63" y2="51" stroke="#111" stroke-width="2.2"/>
      <circle cx="48.5" cy="52" r="1.9" fill="#111"/>
      <circle cx="71.5" cy="52" r="1.9" fill="#111"/>
      <path d="M50 68 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M36 82 q24 12 48 0 l9 68 h-66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="47" y1="112" x2="52" y2="112" stroke="#111" stroke-width="2.2"/>
      <line x1="68" y1="112" x2="73" y2="112" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, glowing slot-eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="60" cy="6" r="4" fill="#9aa0a6"/>
      <rect x="24" y="20" width="72" height="62" rx="8" fill="#3c4147" stroke="#9aa0a6" stroke-width="2.6"/>
      <rect x="34" y="36" width="22" height="10" rx="3" fill="#cfe8ff"/>
      <rect x="64" y="36" width="22" height="10" rx="3" fill="#cfe8ff"/>
      <g stroke="#9aa0a6" stroke-width="2.2" stroke-linecap="round">
        <line x1="36" y1="62" x2="84" y2="62"/>
        <line x1="40" y1="68" x2="80" y2="68"/>
      </g>
    </symbol>

    <!-- SHREDDER: bin with slotted top -->
    <symbol id="shredder" viewBox="0 0 160 200">
      <!-- top unit -->
      <rect x="14" y="34" width="132" height="34" rx="5" fill="#e7e3da" stroke="#111" stroke-width="2.6"/>
      <rect x="34" y="46" width="92" height="8" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="2.2"/>
      <circle cx="132" cy="51" r="4" fill="#7a7a7a" stroke="#111" stroke-width="2"/>
      <!-- bin -->
      <path d="M24 70 h112 l-10 118 h-92 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="30" y1="70" x2="130" y2="70" stroke="#111" stroke-width="2.6"/>
    </symbol>

  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line -->
      <line x1="3" y1="270" x2="397" y2="270" stroke="#111" stroke-width="2"/>
      <!-- shredder -->
      <use href="#shredder" x="132" y="118" width="112" height="140"/>
      <!-- paper going in -->
      <g stroke="#111" stroke-width="2.2" fill="#fff">
        <rect x="196" y="128" width="34" height="26" transform="rotate(-8 213 141)"/>
      </g>
      <!-- Doug feeding it -->
      <use href="#doug" x="34" y="70" width="130" height="200"/>
      <!-- Doug reaching toward slot handled by symbol arm; add a paper in far hand near slot -->
      <path d="M96 150 q40 -6 78 8" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- Doug balloon -->
      <g>
        <path d="M40 24 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-70 l-14 16 l-2 -16 h-64 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="115" y="45" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Bad draft. Never</text>
        <text x="115" y="63" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">speak of it again.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="417" y1="270" x2="811" y2="270" stroke="#111" stroke-width="2"/>
      <!-- desk with monitor -->
      <rect x="470" y="130" width="180" height="118" rx="6" fill="#20242a" stroke="#111" stroke-width="2.8"/>
      <rect x="482" y="142" width="156" height="94" rx="3" fill="#2b3037"/>
      <rect x="548" y="248" width="24" height="20" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <rect x="522" y="266" width="76" height="8" rx="3" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <!-- clanker inside monitor -->
      <use href="#clanker" x="504" y="146" width="112" height="90"/>
      <!-- Doug at left still holding mug, looking -->
      <use href="#doug" x="420" y="80" width="120" height="188"/>
      <!-- clanker balloon: rectangular, dashed tether to screen -->
      <line x1="560" y1="150" x2="640" y2="90" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <g>
        <rect x="576" y="20" width="222" height="70" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <rect x="580" y="24" width="214" height="62" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="687" y="42" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Nothing is really gone.</text>
        <text x="687" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I filed a copy of each</text>
        <text x="687" y="78" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">page. Shall I bring it back?</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="831" y1="270" x2="1225" y2="270" stroke="#111" stroke-width="2"/>
      <!-- monitor again small on desk right -->
      <rect x="1096" y="150" width="118" height="96" rx="6" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <rect x="1106" y="160" width="98" height="76" rx="3" fill="#2b3037"/>
      <use href="#clanker" x="1120" y="162" width="70" height="72"/>
      <rect x="1147" y="246" width="16" height="14" fill="#20242a" stroke="#111" stroke-width="2.2"/>
      <rect x="1131" y="258" width="48" height="7" rx="3" fill="#20242a" stroke="#111" stroke-width="2.2"/>
      <!-- Priya, calm, and Dailbert next to her -->
      <use href="#priya" x="852" y="78" width="120" height="200"/>
      <use href="#dailbert" x="962" y="86" width="118" height="196"/>
      <!-- Priya balloon -->
      <g>
        <path d="M846 20 h150 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-58 l-13 15 l-2 -15 h-77 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="920" y="41" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">He shredded it on</text>
        <text x="920" y="59" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">purpose. Leave it filed.</text>
      </g>
      <!-- clanker small reply balloon -->
      <line x1="1150" y1="164" x2="1132" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <g>
        <rect x="1012" y="92" width="176" height="44" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <rect x="1016" y="96" width="168" height="36" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="1100" y="112" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Of course. I'll keep it</text>
        <text x="1100" y="128" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">safe. Just in case.</text>
      </g>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>