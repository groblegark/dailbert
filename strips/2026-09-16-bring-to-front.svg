<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Bring To Front</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-16</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- neck + shoulders -->
        <path d="M50 92 L50 104 M70 92 L70 104" />
        <path d="M30 150 C30 118 44 106 60 106 C76 106 90 118 90 150" fill="#f4f1ea"/>
        <!-- tie -->
        <path d="M60 106 L54 114 L60 140 L66 114 Z" fill="#111"/>
        <!-- head -->
        <ellipse cx="60" cy="60" rx="30" ry="36" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 24 C56 16 66 12 64 22" />
        <!-- glasses -->
        <circle cx="49" cy="60" r="9" fill="#f4f1ea"/>
        <circle cx="71" cy="60" r="9" fill="#f4f1ea"/>
        <path d="M58 60 L62 60" />
        <path d="M40 58 L34 55 M80 58 L86 55" />
        <!-- eyes -->
        <circle cx="49" cy="60" r="1.8" fill="#111" stroke="none"/>
        <circle cx="71" cy="60" r="1.8" fill="#111" stroke="none"/>
        <!-- mouth (flat, tired) -->
        <path d="M52 80 L68 80" />
      </g>
    </symbol>

    <!-- CLANKER: chrome robot head, lives inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- antenna -->
        <line x1="60" y1="18" x2="60" y2="30" fill="none"/>
        <circle cx="60" cy="15" r="3.5" fill="#111"/>
        <!-- boxy head -->
        <rect x="30" y="30" width="60" height="56" rx="7" fill="#8f9296"/>
        <!-- slot eyes glowing -->
        <rect x="40" y="46" width="16" height="7" rx="3" fill="#eef3f6" stroke="#111" stroke-width="1.6"/>
        <rect x="64" y="46" width="16" height="7" rx="3" fill="#eef3f6" stroke="#111" stroke-width="1.6"/>
        <!-- grille mouth -->
        <line x1="42" y1="70" x2="78" y2="70"/>
        <line x1="48" y1="66" x2="48" y2="74"/>
        <line x1="56" y1="66" x2="56" y2="74"/>
        <line x1="64" y1="66" x2="64" y2="74"/>
        <line x1="72" y1="66" x2="72" y2="74"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="272" width="400" height="68" fill="#e7e2d6"/>
      <line x1="0" y1="272" x2="400" y2="272" stroke="#111" stroke-width="2.4"/>

      <!-- left monitor: tidy tiled windows -->
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <rect x="34" y="96" width="128" height="90" rx="4" fill="#dfe4e6"/>
        <rect x="41" y="103" width="53" height="34" rx="2" fill="#f4f1ea"/>
        <rect x="100" y="103" width="55" height="34" rx="2" fill="#f4f1ea"/>
        <rect x="41" y="142" width="114" height="38" rx="2" fill="#f4f1ea"/>
        <rect x="90" y="186" width="16" height="10" fill="#cfd3d4"/>
        <rect x="70" y="196" width="56" height="6" rx="2" fill="#111"/>
      </g>
      <!-- right monitor: one dark idle window, centered/front -->
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <rect x="196" y="96" width="128" height="90" rx="4" fill="#dfe4e6"/>
        <rect x="224" y="112" width="72" height="58" rx="3" fill="#2b2f33"/>
        <rect x="224" y="112" width="72" height="12" rx="3" fill="#3d4247"/>
        <line x1="286" y1="118" x2="290" y2="118" stroke="#c9ccce" stroke-width="2"/>
        <!-- faint clanker reflection inside dark window -->
        <use href="#clanker" x="228" y="118" width="64" height="64" opacity="0.5"/>
        <rect x="252" y="186" width="16" height="10" fill="#cfd3d4"/>
        <rect x="232" y="196" width="56" height="6" rx="2" fill="#111"/>
      </g>

      <!-- Dailbert at desk -->
      <use href="#dailbert" x="270" y="150" width="150" height="200"/>

      <!-- speech balloon -->
      <g>
        <path d="M40 30 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-96 l-16 16 l2 -16 h-40 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="115" y="50" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Wrote a tiler. It</text>
        <text x="115" y="68" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">arranges my screens.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- desk -->
      <rect x="414" y="272" width="400" height="68" fill="#e7e2d6"/>
      <line x1="414" y1="272" x2="814" y2="272" stroke="#111" stroke-width="2.4"/>

      <!-- big monitor: dark idle window centered/maximized/front -->
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <rect x="470" y="70" width="200" height="130" rx="5" fill="#dfe4e6"/>
        <!-- other windows shoved to edges -->
        <rect x="476" y="76" width="34" height="24" rx="2" fill="#f4f1ea"/>
        <rect x="630" y="76" width="34" height="24" rx="2" fill="#f4f1ea"/>
        <rect x="476" y="170" width="34" height="24" rx="2" fill="#f4f1ea"/>
        <!-- the dark idle window: centered, maximized, on top -->
        <rect x="512" y="84" width="116" height="102" rx="3" fill="#2b2f33"/>
        <rect x="512" y="84" width="116" height="14" rx="3" fill="#3d4247"/>
        <text x="620" y="95" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#d9534f">x</text>
        <!-- clanker reflection, clearer now -->
        <use href="#clanker" x="536" y="98" width="76" height="76" opacity="0.75"/>
        <rect x="562" y="200" width="16" height="14" fill="#cfd3d4"/>
        <rect x="536" y="214" width="68" height="7" rx="2" fill="#111"/>
      </g>

      <!-- Dailbert reaching to close it -->
      <use href="#dailbert" x="672" y="150" width="150" height="200"/>
      <path d="M700 200 C670 190 650 130 632 100" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

      <!-- Dailbert balloon -->
      <g>
        <path d="M436 210 h150 a10 10 0 0 1 10 10 v32 a10 10 0 0 1 -10 10 h-110 l-14 16 l2 -16 h-28 a10 10 0 0 1 -10 -10 v-32 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="512" y="230" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I keep closing this</text>
        <text x="512" y="248" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">one. It keeps winning.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- desk -->
      <rect x="828" y="272" width="400" height="68" fill="#e7e2d6"/>
      <line x1="828" y1="272" x2="1228" y2="272" stroke="#111" stroke-width="2.4"/>

      <!-- monitor: dark window fully foregrounded, clanker clear -->
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <rect x="866" y="72" width="190" height="128" rx="5" fill="#dfe4e6"/>
        <rect x="878" y="82" width="166" height="108" rx="3" fill="#2b2f33"/>
        <rect x="878" y="82" width="166" height="14" rx="3" fill="#3d4247"/>
        <text x="1036" y="93" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#d9534f">x</text>
        <!-- clanker, clearest here -->
        <use href="#clanker" x="922" y="96" width="80" height="80" opacity="0.9"/>
        <rect x="952" y="200" width="18" height="14" fill="#cfd3d4"/>
        <rect x="922" y="214" width="78" height="7" rx="2" fill="#111"/>
      </g>

      <!-- Dailbert slumped -->
      <use href="#dailbert" x="1058" y="152" width="150" height="200"/>

      <!-- Clanker screen-edged balloon -->
      <g>
        <rect x="852" y="222" width="200" height="58" rx="3" fill="#eef1f2" stroke="#111" stroke-width="2.2"/>
        <rect x="856" y="226" width="192" height="50" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="952" y="244" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">It was the only window</text>
        <text x="952" y="261" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">with no one else in it.</text>
      </g>
      <!-- dashed tie from balloon to the dark window surface (not to a person) -->
      <path d="M960 222 C962 210 962 200 962 190" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 4"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>