<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">For Tone</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M32 200 L32 138 Q60 122 88 138 L88 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M32 150 L20 176 L30 180 L40 156 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M88 150 L100 176 L90 180 L80 156 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="16" y="170" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="88" y="170" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="52" y="120" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="92" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <!-- curly hair up -->
      <path d="M30 84 Q24 52 44 44 Q52 26 74 40 Q96 40 92 74 Q90 60 78 58 Q80 46 66 48 Q54 40 48 56 Q36 56 38 78 Z" fill="#111" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="60" cy="30" r="10" fill="#111"/>
      <circle cx="44" cy="36" r="8" fill="#111"/>
      <circle cx="78" cy="36" r="8" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="86" width="18" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="62" y="86" width="18" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="92" x2="62" y2="92" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="92" r="2.2" fill="#111"/>
      <circle cx="71" cy="92" r="2.2" fill="#111"/>
      <path d="M52 110 Q60 113 68 110" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DAILBERT: oval head, round wire glasses, small necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <path d="M34 200 L34 140 Q60 126 86 140 L86 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M60 132 L54 140 L60 168 L66 140 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <rect x="52" y="118" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="88" rx="28" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 52 Q54 40 64 40 Q72 42 64 52" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M40 62 Q50 54 80 62" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="88" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="88" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="88" x2="63" y2="88" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="88" r="2" fill="#111"/>
      <circle cx="72" cy="88" r="2" fill="#111"/>
      <path d="M52 108 Q60 106 68 108" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="42" y1="74" x2="54" y2="76" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="68" y1="76" x2="80" y2="74" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 210">
      <path d="M34 210 L34 140 Q60 126 86 140 L86 210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M34 150 L14 168 L22 176 L40 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="6" y="164" width="18" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M24 168 q9 0 9 6 t-9 6" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="118" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="90" r="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M34 78 Q40 60 60 60 Q80 60 86 78" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="86" r="3" fill="#111"/>
      <circle cx="72" cy="86" r="3" fill="#111"/>
      <path d="M44 100 Q60 118 76 100" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, drawn inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="30" x2="60" y2="14" stroke="#c9cdd2" stroke-width="3"/>
      <circle cx="60" cy="11" r="4" fill="#c9cdd2"/>
      <rect x="24" y="30" width="72" height="64" rx="8" fill="#2a2a30" stroke="#c9cdd2" stroke-width="3"/>
      <rect x="36" y="46" width="20" height="9" rx="4" fill="#9fe3ff"/>
      <rect x="64" y="46" width="20" height="9" rx="4" fill="#9fe3ff"/>
      <rect x="40" y="70" width="40" height="14" rx="3" fill="#3a3a42" stroke="#c9cdd2" stroke-width="2"/>
      <line x1="48" y1="70" x2="48" y2="84" stroke="#c9cdd2" stroke-width="1.6"/>
      <line x1="56" y1="70" x2="56" y2="84" stroke="#c9cdd2" stroke-width="1.6"/>
      <line x1="64" y1="70" x2="64" y2="84" stroke="#c9cdd2" stroke-width="1.6"/>
      <line x1="72" y1="70" x2="72" y2="84" stroke="#c9cdd2" stroke-width="1.6"/>
    </symbol>

    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="0.7"/>
    </pattern>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="3" y1="288" x2="397" y2="288" stroke="#111" stroke-width="2"/>
      <!-- desk edge -->
      <rect x="176" y="288" width="221" height="10" fill="#111"/>
      <!-- monitor -->
      <rect x="212" y="150" width="168" height="118" rx="6" fill="#111"/>
      <rect x="220" y="158" width="152" height="96" rx="3" fill="#dfe4e8"/>
      <rect x="284" y="268" width="24" height="16" fill="#111"/>
      <rect x="264" y="284" width="64" height="6" fill="#111"/>
      <!-- clanker inside the monitor -->
      <use href="#clanker" x="242" y="150" width="104" height="104"/>
      <!-- Priya at her desk -->
      <use href="#priya" x="24" y="98" width="120" height="200"/>
      <!-- clanker balloon: rectangular, dashed tie to monitor -->
      <line x1="300" y1="150" x2="288" y2="112" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="150" y="24" width="228" height="82" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="154" y="28" width="220" height="74" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
      <text x="264" y="47" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I pre-drafted every</text>
      <text x="264" y="65" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">self-review. Yours calls</text>
      <text x="264" y="83" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">you "a quiet beacon</text>
      <text x="264" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">of excellence."</text>
      <!-- Priya balloon -->
      <path d="M64 152 h96 a10 10 0 0 1 10 10 v20 a10 10 0 0 1 -10 10 h-52 l-11 13 l-2 -13 h-31 a10 10 0 0 1 -10 -10 v-20 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="118" y="178" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Delete.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="417" y1="288" x2="811" y2="288" stroke="#111" stroke-width="2"/>
      <rect x="470" y="288" width="230" height="10" fill="#111"/>
      <!-- monitor with her typed review -->
      <rect x="486" y="150" width="176" height="118" rx="6" fill="#111"/>
      <rect x="494" y="158" width="160" height="96" rx="3" fill="#eef2f5"/>
      <rect x="560" y="268" width="26" height="16" fill="#111"/>
      <rect x="540" y="284" width="66" height="6" fill="#111"/>
      <!-- typed plain lines -->
      <line x1="506" y1="176" x2="642" y2="176" stroke="#111" stroke-width="2"/>
      <line x1="506" y1="190" x2="628" y2="190" stroke="#111" stroke-width="2"/>
      <line x1="506" y1="204" x2="642" y2="204" stroke="#111" stroke-width="2"/>
      <!-- the tone-flag box at bottom of screen -->
      <rect x="506" y="222" width="136" height="20" rx="3" fill="url(#hatch)"/>
      <rect x="506" y="222" width="136" height="20" rx="3" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- Priya typing, sleeves rolled -->
      <use href="#priya" x="434" y="98" width="120" height="200"/>
      <!-- Doug wandering by with mug -->
      <use href="#doug" x="690" y="92" width="130" height="210"/>
      <!-- clanker balloon flagging tone, dashed to monitor -->
      <line x1="574" y1="150" x2="562" y2="110" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="448" y="22" width="212" height="72" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="452" y="26" width="204" height="64" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
      <text x="554" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Flagged for tone.</text>
      <text x="554" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">This one reads a</text>
      <text x="554" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">little... factual.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="831" y1="288" x2="1225" y2="288" stroke="#111" stroke-width="2"/>
      <rect x="884" y="288" width="230" height="10" fill="#111"/>
      <!-- monitor showing SUBMITTED -->
      <rect x="900" y="150" width="176" height="118" rx="6" fill="#111"/>
      <rect x="908" y="158" width="160" height="96" rx="3" fill="#eef2f5"/>
      <rect x="974" y="268" width="26" height="16" fill="#111"/>
      <rect x="954" y="284" width="66" height="6" fill="#111"/>
      <line x1="920" y1="174" x2="1056" y2="174" stroke="#111" stroke-width="2"/>
      <line x1="920" y1="240" x2="1040" y2="240" stroke="#111" stroke-width="2"/>
      <!-- SUBMITTED stamp -->
      <g transform="rotate(-7 988 205)">
        <rect x="934" y="192" width="108" height="26" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
        <text x="988" y="210" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">SUBMITTED</text>
      </g>
      <!-- Priya, done, standing at desk -->
      <use href="#priya" x="848" y="98" width="120" height="200"/>
      <!-- Priya balloon -->
      <path d="M892 150 h94 a10 10 0 0 1 10 10 v20 a10 10 0 0 1 -10 10 h-46 l-11 13 l-2 -13 h-35 a10 10 0 0 1 -10 -10 v-20 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="944" y="167" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's accurate.</text>
      <text x="944" y="184" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Keep the flag.</text>
      <!-- clanker quiet last line, dashed to monitor -->
      <line x1="1000" y1="150" x2="1056" y2="118" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="1050" y="28" width="164" height="90" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="1054" y="32" width="156" height="82" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
      <text x="1132" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Noted. I'll learn</text>
      <text x="1132" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">the tone from</text>
      <text x="1132" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">yours.</text>
      <text x="1132" y="107" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11.5" fill="#111">The others liked theirs.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>