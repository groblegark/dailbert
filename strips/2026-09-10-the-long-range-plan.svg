<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Long Range Plan</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-10</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 12 q10 -12 4 -18 q-2 8 -8 6" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="46" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57.5" y1="46" x2="62.5" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="46" r="1.8" fill="#111"/>
      <circle cx="71" cy="46" r="1.8" fill="#111"/>
      <path d="M52 63 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M36 78 q24 16 48 0 l10 60 q-34 12 -68 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M56 80 l4 10 l4 -10 l-2 34 l-4 0 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 q22 14 44 0 l8 58 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- mug in hand -->
      <rect x="86" y="112" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M112 116 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M78 128 q10 12 8 8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M28 34 q0 -22 32 -22 q32 0 32 22" fill="#111"/>
      <ellipse cx="60" cy="48" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M32 40 q-6 -24 28 -26 q34 2 28 26 q4 -30 -28 -30 q-32 0 -28 30z" fill="#111"/>
      <rect x="40" y="42" width="17" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="17" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="48.5" cy="48" r="1.9" fill="#111"/>
      <circle cx="71.5" cy="48" r="1.9" fill="#111"/>
      <path d="M50 64 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M36 80 q24 14 48 0 l8 58 q-32 12 -64 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="44" y1="96" x2="40" y2="112" stroke="#111" stroke-width="2"/>
      <line x1="76" y1="96" x2="80" y2="112" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="5" r="3.4" fill="#111"/>
      <rect x="26" y="20" width="68" height="60" rx="9" fill="#d7dade" stroke="#111" stroke-width="2.6"/>
      <rect x="33" y="27" width="54" height="46" rx="6" fill="#c3c7cc" stroke="#111" stroke-width="1.6"/>
      <rect x="39" y="38" width="16" height="9" rx="2.5" fill="#8ff3ff" stroke="#111" stroke-width="2"/>
      <rect x="65" y="38" width="16" height="9" rx="2.5" fill="#8ff3ff" stroke="#111" stroke-width="2"/>
      <line x1="42" y1="59" x2="78" y2="59" stroke="#111" stroke-width="2"/>
      <line x1="42" y1="65" x2="78" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="52" y1="55" x2="52" y2="69" stroke="#111" stroke-width="1.4"/>
      <line x1="60" y1="55" x2="60" y2="69" stroke="#111" stroke-width="1.4"/>
      <line x1="68" y1="55" x2="68" y2="69" stroke="#111" stroke-width="1.4"/>
    </symbol>

    <!-- COUNTDOWN POSTER (wall) -->
    <symbol id="poster" viewBox="0 0 140 180">
      <rect x="6" y="6" width="128" height="168" rx="4" fill="#fbfaf6" stroke="#111" stroke-width="2.6"/>
      <line x1="18" y1="34" x2="122" y2="34" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- paper background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============================= PANEL 1 ============================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- wall / floor -->
      <line x1="1" y1="266" x2="401" y2="266" stroke="#111" stroke-width="1.6"/>

      <!-- the poster on the wall -->
      <g transform="translate(268,40)">
        <use href="#poster" width="120" height="154"/>
        <text x="60" y="26" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" font-weight="bold" fill="#111">COUNTDOWN</text>
        <text x="30" y="52" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">2027</text>
        <text x="30" y="72" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">2028</text>
        <text x="30" y="92" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">2029</text>
        <text x="30" y="112" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">2030</text>
        <text x="30" y="132" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" font-weight="bold" fill="#111">2031</text>
        <line x1="52" y1="48" x2="92" y2="48" stroke="#111" stroke-width="1"/>
        <line x1="52" y1="68" x2="92" y2="68" stroke="#111" stroke-width="1"/>
        <line x1="52" y1="88" x2="92" y2="88" stroke="#111" stroke-width="1"/>
        <line x1="52" y1="108" x2="92" y2="108" stroke="#111" stroke-width="1"/>
        <line x1="52" y1="128" x2="92" y2="128" stroke="#111" stroke-width="1"/>
      </g>

      <!-- Doug looking up, pointing at poster -->
      <use href="#doug" x="40" y="120" width="130" height="200"/>
      <line x1="150" y1="210" x2="255" y2="120" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="255" cy="120" r="2.4" fill="#111"/>

      <!-- Doug balloon -->
      <path d="M60 40 q-16 0 -16 20 q0 20 16 20 l90 0 q16 0 16 -20 q0 -20 -16 -20 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M110 78 l-6 20 l20 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="108" y="55" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Hey. Our poster</text>
      <text x="108" y="72" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">stops at 2031.</text>
    </g>
  </g>

  <!-- ============================= PANEL 2 ============================= -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c2"><rect x="415" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="415" y1="266" x2="815" y2="266" stroke="#111" stroke-width="1.6"/>

      <!-- Dailbert at his desk with a monitor; clanker in the monitor -->
      <use href="#dailbert" x="452" y="150" width="120" height="200"/>

      <!-- monitor -->
      <g transform="translate(600,150)">
        <rect x="0" y="0" width="150" height="104" rx="6" fill="#1b1d1f" stroke="#111" stroke-width="2.6"/>
        <rect x="8" y="8" width="134" height="88" rx="3" fill="#23262a"/>
        <!-- screen glow hatch -->
        <line x1="14" y1="20" x2="136" y2="20" stroke="#33373c" stroke-width="1"/>
        <line x1="14" y1="82" x2="136" y2="82" stroke="#33373c" stroke-width="1"/>
        <rect x="64" y="104" width="22" height="16" fill="#1b1d1f" stroke="#111" stroke-width="2.4"/>
        <rect x="44" y="120" width="62" height="8" rx="3" fill="#1b1d1f" stroke="#111" stroke-width="2.4"/>
        <use href="#clanker" x="48" y="16" width="56" height="56"/>
      </g>

      <!-- clanker screen balloon (rectangular, dashed line to monitor) -->
      <line x1="640" y1="76" x2="612" y2="70" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="440" y="24" width="180" height="58" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="530" y="45" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I made it. The plan</text>
      <text x="530" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">runs out to there.</text>
      <text x="530" y="79" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Every quarter.</text>

      <!-- Dailbert small balloon -->
      <path d="M470 96 q-14 0 -14 16 q0 16 14 16 l52 0 q14 0 14 -16 q0 -16 -14 -16 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M498 126 l-4 16 l14 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="496" y="117" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Why 2031?</text>
    </g>
  </g>

  <!-- ============================= PANEL 3 ============================= -->
  <g>
    <rect x="829" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c3"><rect x="829" y="1" width="399" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="829" y1="266" x2="1228" y2="266" stroke="#111" stroke-width="1.6"/>

      <!-- same monitor, smaller, in corner -->
      <g transform="translate(1120,158)">
        <rect x="0" y="0" width="96" height="70" rx="5" fill="#1b1d1f" stroke="#111" stroke-width="2.4"/>
        <rect x="6" y="6" width="84" height="58" rx="3" fill="#23262a"/>
        <use href="#clanker" x="28" y="10" width="42" height="42"/>
        <rect x="40" y="70" width="16" height="12" fill="#1b1d1f" stroke="#111" stroke-width="2.2"/>
        <rect x="26" y="82" width="44" height="6" rx="3" fill="#1b1d1f" stroke="#111" stroke-width="2.2"/>
      </g>

      <!-- clanker small shy balloon -->
      <line x1="1150" y1="168" x2="1132" y2="176" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="988" y="22" width="200" height="60" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1088" y="43" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I could plan further.</text>
      <text x="1088" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I just didn't want</text>
      <text x="1088" y="77" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">to presume.</text>

      <!-- Priya, calm centre -->
      <use href="#priya" x="980" y="150" width="120" height="200"/>

      <!-- Doug at left, mug -->
      <use href="#doug" x="852" y="158" width="120" height="185"/>

      <!-- Priya balloon (the button) -->
      <path d="M872 96 q-14 0 -14 17 q0 17 14 17 l150 0 q14 0 14 -17 q0 -17 -14 -17 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M1010 128 l10 18 l6 -18 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="947" y="118" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Pencil us in for 2032.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>