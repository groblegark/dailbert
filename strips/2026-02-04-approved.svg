<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Approved</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-02-04</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="glow" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#dedbd3"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c7c4bc" stroke-width="1.5"/>
    </pattern>

    <symbol id="dailbert">
      <path d="M-26,74 C-26,44 -16,32 0,32 C16,32 26,44 26,74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-10,34 L0,46 L10,34" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M0,46 L-4,52 L0,70 L4,52 Z" fill="#111"/>
      <path d="M-6,24 L-6,34 M6,24 L6,34" stroke="#111" stroke-width="2.5" fill="none"/>
      <ellipse cx="0" cy="0" rx="17" ry="21" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="-17" cy="0" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="17" cy="0" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-2,-21 C-2,-28 9,-28 6,-20" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="-7" cy="-2" r="6" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="7" cy="-2" r="6" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="-1" y1="-2" x2="1" y2="-2" stroke="#111" stroke-width="2.2"/>
      <line x1="-13" y1="-3" x2="-16" y2="-4" stroke="#111" stroke-width="2"/>
      <line x1="13" y1="-3" x2="16" y2="-4" stroke="#111" stroke-width="2"/>
      <circle cx="-7" cy="-2" r="1.6" fill="#111"/>
      <circle cx="7" cy="-2" r="1.6" fill="#111"/>
      <line x1="-11" y1="-9" x2="-3" y2="-10" stroke="#111" stroke-width="2"/>
      <line x1="3" y1="-10" x2="11" y2="-9" stroke="#111" stroke-width="2"/>
      <path d="M0,-1 L-2,6 L1,6" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="-6" y1="13" x2="6" y2="13" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <symbol id="doug">
      <path d="M-27,74 C-27,44 -17,33 0,33 C17,33 27,44 27,74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-9,35 L0,45 L9,35" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M-6,26 L-6,35 M6,26 L6,35" stroke="#111" stroke-width="2.5" fill="none"/>
      <circle cx="0" cy="0" r="22" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="-22" cy="1" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="22" cy="1" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-11,-19 q3,-6 7,-1 M-2,-22 q4,-5 8,0 M6,-20 q3,-4 6,-1" fill="none" stroke="#111" stroke-width="2.2"/>
      <circle cx="-8" cy="-3" r="2.6" fill="#111"/>
      <circle cx="8" cy="-3" r="2.6" fill="#111"/>
      <path d="M-12,5 Q0,21 12,5" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M0,-2 q-3,5 0,6" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="clanker">
      <line x1="0" y1="-22" x2="0" y2="-31" stroke="#111" stroke-width="2.2"/>
      <circle cx="0" cy="-33" r="3" fill="#111"/>
      <rect x="-21" y="-22" width="42" height="40" rx="6" fill="#e7e4dc" stroke="#111" stroke-width="2.6"/>
      <rect x="-15" y="-11" width="12" height="5" rx="2.5" fill="#111"/>
      <rect x="3" y="-11" width="12" height="5" rx="2.5" fill="#111"/>
      <line x1="-14" y1="-8.5" x2="-4" y2="-8.5" stroke="#f4f1ea" stroke-width="1.4"/>
      <line x1="4" y1="-8.5" x2="14" y2="-8.5" stroke="#f4f1ea" stroke-width="1.4"/>
      <rect x="-13" y="4" width="26" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-7" y1="4" x2="-7" y2="14" stroke="#111" stroke-width="1.6"/>
      <line x1="0" y1="4" x2="0" y2="14" stroke="#111" stroke-width="1.6"/>
      <line x1="7" y1="4" x2="7" y2="14" stroke="#111" stroke-width="1.6"/>
      <circle cx="-16" cy="-17" r="1.6" fill="#111"/>
      <circle cx="16" cy="-17" r="1.6" fill="#111"/>
      <circle cx="-16" cy="13" r="1.6" fill="#111"/>
      <circle cx="16" cy="13" r="1.6" fill="#111"/>
    </symbol>

    <symbol id="mug">
      <rect x="-11" y="-12" width="22" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <path d="M11,-6 q9,2 0,12" fill="none" stroke="#111" stroke-width="2.3"/>
      <path d="M-4,-18 q3,-4 0,-8 M4,-16 q3,-4 0,-8" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="2" y="4" width="396" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="2" y="4" width="396" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- desk -->
      <line x1="2" y1="298" x2="398" y2="298" stroke="#111" stroke-width="2.5"/>
      <line x1="40" y1="298" x2="28" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>
      <line x1="120" y1="298" x2="112" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>

      <!-- figures -->
      <use href="#dailbert" transform="translate(80,190) scale(1.6)"/>
      <use href="#doug" transform="translate(315,182) scale(1.6)"/>
      <use href="#mug" transform="translate(268,250) scale(1.15)"/>

      <!-- monitor -->
      <rect x="162" y="208" width="94" height="82" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="170" y="216" width="78" height="62" rx="3" fill="url(#glow)" stroke="#111" stroke-width="1.6"/>
      <rect x="200" y="290" width="18" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#clanker" transform="translate(209,250) scale(0.9)"/>
      <!-- keyboard -->
      <rect x="172" y="300" width="74" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>

      <!-- balloons -->
      <rect x="30" y="24" width="152" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M92,74 L104,74 L84,120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="106" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Your code review</text>
      <text x="106" y="65" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">came back already.</text>

      <rect x="252" y="22" width="134" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M330,72 L342,72 L322,120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="319" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Already? I just</text>
      <text x="319" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">pushed it.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="416" y="4" width="396" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="416" y="4" width="396" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="416" y1="298" x2="812" y2="298" stroke="#111" stroke-width="2.5"/>
      <line x1="470" y1="298" x2="460" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>
      <line x1="740" y1="298" x2="732" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>

      <!-- partial figures -->
      <use href="#dailbert" transform="translate(470,252) scale(1.5)"/>
      <use href="#doug" transform="translate(762,252) scale(1.5)"/>
      <use href="#mug" transform="translate(724,306) scale(1.15)"/>

      <!-- big monitor -->
      <rect x="558" y="148" width="148" height="140" rx="7" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <rect x="568" y="158" width="124" height="120" rx="4" fill="url(#glow)" stroke="#111" stroke-width="1.8"/>
      <rect x="620" y="288" width="22" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#clanker" transform="translate(631,214) scale(1.55)"/>
      <rect x="570" y="300" width="120" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>

      <!-- clanker balloon (screen-edged) -->
      <line x1="546" y1="112" x2="628" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="428" y="30" width="238" height="80" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="547" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">The logic is wrong in</text>
      <text x="547" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">three places. But I</text>
      <text x="547" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">know what he meant.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="830" y="4" width="396" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="830" y="4" width="396" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="830" y1="298" x2="1226" y2="298" stroke="#111" stroke-width="2.5"/>
      <line x1="880" y1="298" x2="870" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>
      <line x1="960" y1="298" x2="952" y2="336" stroke="#111" stroke-width="1.4" opacity="0.5"/>

      <use href="#dailbert" transform="translate(905,190) scale(1.6)"/>
      <use href="#doug" transform="translate(1140,182) scale(1.6)"/>
      <use href="#mug" transform="translate(1094,250) scale(1.15)"/>

      <rect x="978" y="208" width="94" height="82" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="986" y="216" width="78" height="62" rx="3" fill="url(#glow)" stroke="#111" stroke-width="1.6"/>
      <rect x="1016" y="290" width="18" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#clanker" transform="translate(1025,250) scale(0.9)"/>
      <rect x="988" y="300" width="74" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>

      <!-- Dailbert balloon -->
      <rect x="846" y="30" width="140" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M902,80 L914,80 L898,124 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="916" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">So you'll send</text>
      <text x="916" y="71" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">it back?</text>

      <!-- clanker balloon -->
      <line x1="1088" y1="126" x2="1038" y2="210" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="1018" y="26" width="192" height="98" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="1114" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">I already fixed it</text>
      <text x="1114" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">to match. He</text>
      <text x="1114" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">won't notice.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>