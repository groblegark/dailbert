<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 11 q10 -9 4 -16" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.2" fill="#111"/>
      <circle cx="71" cy="46" r="2.2" fill="#111"/>
      <path d="M50 66 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M50 80 v10 h20 v-10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 90 l-26 12 v78 h52 v-78 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 90 l-6 8 6 30 6 -30 z" fill="#111"/>
      <line x1="60" y1="98" x2="60" y2="128" stroke="#111" stroke-width="1"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q-3 -6 3 -9" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="3" fill="#111"/>
      <circle cx="71" cy="46" r="3" fill="#111"/>
      <path d="M44 58 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M60 84 l-27 12 v74 h54 v-74 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="16" y="120" width="30" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M46 126 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M22 120 q8 -8 18 0" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="30" rx="20" ry="14" fill="#111"/>
      <ellipse cx="60" cy="48" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M32 40 q-4 -30 28 -32 q32 2 28 32 q-8 -14 -28 -12 q-20 -2 -28 12z" fill="#111"/>
      <circle cx="35" cy="26" r="6" fill="#111"/>
      <circle cx="85" cy="26" r="6" fill="#111"/>
      <rect x="40" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="49" x2="64" y2="49" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="49" r="2" fill="#111"/>
      <circle cx="72" cy="49" r="2" fill="#111"/>
      <path d="M52 68 h16" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M60 82 l-28 12 v76 h56 v-76 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M32 118 l-6 8 M88 118 l6 8" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome robot head, slot-eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="6" x2="60" y2="18" stroke="#9fb3c8" stroke-width="2.4"/>
      <circle cx="60" cy="5" r="3.4" fill="#9fd0e8"/>
      <rect x="22" y="18" width="76" height="64" rx="8" fill="#2b2e33" stroke="#556" stroke-width="2.4"/>
      <rect x="30" y="26" width="60" height="48" rx="5" fill="#20242a" stroke="#3a4048" stroke-width="1.6"/>
      <rect x="37" y="38" width="18" height="8" rx="4" fill="#0d0f12"/>
      <rect x="65" y="38" width="18" height="8" rx="4" fill="#0d0f12"/>
      <rect x="39" y="40" width="14" height="4" rx="2" fill="#9fd0e8"/>
      <rect x="67" y="40" width="14" height="4" rx="2" fill="#9fd0e8"/>
      <g stroke="#8fb0c8" stroke-width="2">
        <line x1="42" y1="58" x2="78" y2="58"/>
        <line x1="42" y1="63" x2="78" y2="63"/>
        <line x1="48" y1="54" x2="48" y2="67"/>
        <line x1="60" y1="54" x2="60" y2="67"/>
        <line x1="72" y1="54" x2="72" y2="67"/>
      </g>
    </symbol>

    <!-- dying desk plant prop -->
    <symbol id="plant" viewBox="0 0 60 70">
      <path d="M18 44 h24 l-3 22 h-18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M30 44 q-2 -20 -10 -26" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M30 44 q2 -16 10 -20" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M30 44 v-24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 18 q-6 4 -2 10" fill="none" stroke="#111" stroke-width="1.8"/>
      <path d="M40 24 q6 4 2 10" fill="none" stroke="#111" stroke-width="1.8"/>
      <path d="M30 20 q-4 -6 2 -9" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>
  </defs>

  <!-- ================= BACKGROUND ================= -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- PANEL 1 -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="2" y1="300" x2="399" y2="300" stroke="#111" stroke-width="1.4"/>
      <!-- desk with monitor housing clanker -->
      <rect x="26" y="252" width="150" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="46" y1="264" x2="46" y2="300" stroke="#111" stroke-width="2.2"/>
      <line x1="156" y1="264" x2="156" y2="300" stroke="#111" stroke-width="2.2"/>
      <rect x="48" y="150" width="118" height="90" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="54" y="152" width="106" height="97"/>
      <line x1="107" y1="240" x2="107" y2="248" stroke="#111" stroke-width="6"/>
      <rect x="88" y="248" width="38" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

      <!-- Dailbert standing right -->
      <use href="#dailbert" x="236" y="128" width="120" height="200"/>

      <!-- clanker balloon (rectangular, dashed to screen) -->
      <line x1="150" y1="168" x2="212" y2="88" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="204" y="30" width="184" height="60" rx="3" fill="#eef0f2" stroke="#111" stroke-width="2"/>
      <line x1="204" y1="30" x2="204" y2="90" stroke="#111" stroke-width="4"/>
      <text x="296" y="53" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">The summer morale</text>
      <text x="296" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">survey results are in.</text>
    </g>
  </g>

  <!-- PANEL 2 -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="416" y1="300" x2="812" y2="300" stroke="#111" stroke-width="1.4"/>

      <!-- projector screen with clanker + big bar (lower-left) -->
      <rect x="436" y="170" width="146" height="118" rx="4" fill="#2b2e33" stroke="#111" stroke-width="2.6"/>
      <rect x="450" y="248" width="118" height="26" fill="#33383f" stroke="#5b6b78" stroke-width="1.4"/>
      <rect x="450" y="248" width="118" height="26" fill="none" stroke="#9fd0e8" stroke-width="1.4"/>
      <text x="509" y="266" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#9fd0e8">100% happy</text>
      <use href="#clanker" x="462" y="176" width="94" height="86"/>

      <!-- Doug center with mug, Dailbert right -->
      <use href="#doug" x="612" y="142" width="120" height="200"/>
      <use href="#dailbert" x="704" y="148" width="120" height="196"/>

      <!-- clanker balloon (upper, clear of edges, dashed to screen) -->
      <line x1="509" y1="170" x2="546" y2="128" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="438" y="30" width="200" height="98" rx="3" fill="#eef0f2" stroke="#111" stroke-width="2"/>
      <line x1="438" y1="30" x2="438" y2="128" stroke="#111" stroke-width="4"/>
      <text x="538" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Everyone is satisfied.</text>
      <text x="538" y="76" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Not one complaint</text>
      <text x="538" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">was submitted.</text>

      <!-- Doug reply -->
      <path d="M672 168 q28 -20 60 -12 v28 q0 6 -6 6 h-38 l-12 12 2 -12z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="704" y="167" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Neat.</text>
    </g>
  </g>

  <!-- PANEL 3 -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="830" y1="300" x2="1226" y2="300" stroke="#111" stroke-width="1.4"/>

      <!-- dying desk plant prop on shelf, far right -->
      <use href="#plant" x="1166" y="150" width="52" height="62"/>
      <line x1="1160" y1="210" x2="1224" y2="210" stroke="#111" stroke-width="1.6"/>

      <!-- Priya at her laptop, left of center -->
      <use href="#priya" x="850" y="140" width="130" height="210"/>
      <rect x="838" y="252" width="82" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="846" y="212" width="66" height="42" rx="3" fill="#2b2e33" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="854" y="216" width="50" height="46"/>

      <!-- Priya's balloon (she wins) upper right, clear of her head -->
      <path d="M980 96 q0 -14 18 -14 h206 q18 0 18 14 v54 q0 14 -18 14 h-160 l-42 24 22 -24 h-26 q-18 0 -18 -14z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1101" y="116" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Two people took it.</text>
      <text x="1101" y="135" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">The other forty are</text>
      <text x="1101" y="154" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">on a beach.</text>

      <!-- clanker small earnest reply from laptop, lower right -->
      <line x1="912" y1="234" x2="1000" y2="256" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="992" y="248" width="222" height="52" rx="3" fill="#eef0f2" stroke="#111" stroke-width="2"/>
      <line x1="992" y1="248" x2="992" y2="300" stroke="#111" stroke-width="4"/>
      <text x="1103" y="270" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">A beach is a form</text>
      <text x="1103" y="289" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">of satisfaction.</text>
    </g>
  </g>
</svg>