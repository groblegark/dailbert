<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair curl -->
      <path d="M60 8 q10 -8 4 -14 q-2 8 -10 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="48" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="2" fill="#111"/>
      <circle cx="72" cy="42" r="2" fill="#111"/>
      <!-- mouth -->
      <path d="M50 62 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body -->
      <path d="M40 76 q20 12 40 0 l10 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- necktie -->
      <path d="M60 78 l-6 8 l6 34 l6 -34 z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="82" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="40" r="3" fill="#111"/>
      <circle cx="71" cy="40" r="3" fill="#111"/>
      <!-- big grin -->
      <path d="M45 54 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body -->
      <path d="M38 78 q22 12 44 0 l8 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="82" y="96" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M106 100 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M84 100 q10 5 0 8" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair pulled up -->
      <path d="M32 40 q-4 -22 14 -30 q6 -8 16 -6 q16 -2 22 12 q10 6 6 24
               q-6 -10 -14 -12 q-14 -6 -28 2 q-12 4 -16 10 z" fill="#111"/>
      <circle cx="60" cy="12" r="6" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="39" y="40" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="40" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <!-- calm mouth -->
      <path d="M52 64 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body, sleeves rolled -->
      <path d="M40 78 q20 12 40 0 l9 60 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="49" y1="112" x2="52" y2="112" stroke="#111" stroke-width="2.5"/>
      <line x1="68" y1="112" x2="71" y2="112" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== THE CLANKER (inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="30" width="60" height="52" rx="6" fill="#1a1a1a" stroke="#111" stroke-width="2.5"/>
      <!-- antenna -->
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="15" r="4" fill="#1a1a1a" stroke="#111" stroke-width="2"/>
      <!-- slot eyes glowing -->
      <rect x="40" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <rect x="66" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <!-- grille mouth -->
      <line x1="44" y1="66" x2="76" y2="66" stroke="#cfd8d0" stroke-width="2"/>
      <line x1="48" y1="70" x2="72" y2="70" stroke="#cfd8d0" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- background paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="250" width="401" height="90" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="0" y1="250" x2="401" y2="250" stroke="#111" stroke-width="2.5"/>

      <!-- Dailbert at desk -->
      <use href="#dailbert" x="40" y="120" width="150" height="200"/>

      <!-- monitor with clanker -->
      <rect x="230" y="150" width="120" height="100" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="270" y="250" width="40" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="245" y="150" width="90" height="90"/>

      <!-- Dailbert balloon -->
      <g>
        <rect x="30" y="26" width="200" height="72" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <path d="M120 96 l6 20 l16 -18 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="130" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">My branch names</text>
        <text x="130" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">are bad. Name them</text>
        <text x="130" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">descriptively.</text>
      </g>

      <!-- clanker balloon (screen-edged, dashed line to surface) -->
      <line x1="300" y1="200" x2="330" y2="112" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <g>
        <rect x="256" y="20" width="130" height="72" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="321" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I will name them</text>
        <text x="321" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">from the diff.</text>
        <text x="321" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">For you.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="414" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- desk -->
      <rect x="414" y="250" width="401" height="90" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="414" y1="250" x2="815" y2="250" stroke="#111" stroke-width="2.5"/>

      <!-- Dailbert leaning to monitor, dismayed -->
      <use href="#dailbert" x="440" y="128" width="140" height="190"/>

      <!-- monitor showing branch list -->
      <rect x="600" y="120" width="190" height="150" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="678" y="270" width="34" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="612" y="140" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">$ git branch</text>
      <text x="612" y="160" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc</text>
      <text x="612" y="177" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc</text>
      <text x="612" y="194" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc</text>
      <text x="612" y="211" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc</text>
      <text x="612" y="228" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc</text>
      <text x="612" y="245" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">  misc  ... (40)</text>

      <!-- Dailbert balloon -->
      <g>
        <rect x="452" y="24" width="180" height="66" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <path d="M520 88 l0 22 l18 -18 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="542" y="48" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">They're all named</text>
        <text x="542" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">"misc." All forty.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="1" width="399" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- desk -->
      <rect x="828" y="250" width="399" height="90" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="828" y1="250" x2="1227" y2="250" stroke="#111" stroke-width="2.5"/>

      <!-- Priya, arms/sleeves, at Dailbert's machine -->
      <use href="#priya" x="860" y="120" width="150" height="200"/>
      <!-- Dailbert smaller, beside, watching -->
      <use href="#dailbert" x="1030" y="150" width="120" height="170"/>

      <!-- monitor -->
      <rect x="1120" y="150" width="100" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="1132" y="175" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">misc</text>
      <text x="1132" y="192" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">misc</text>
      <text x="1132" y="209" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">misc</text>

      <!-- Priya balloon -->
      <g>
        <rect x="850" y="22" width="200" height="66" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <path d="M930 86 l-4 22 l20 -18 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="950" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Sort by last commit.</text>
        <text x="950" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">The one on top</text>
        <text x="950" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">is yours.</text>
      </g>

      <!-- Dailbert small balloon -->
      <g>
        <rect x="1058" y="150" width="120" height="40" rx="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <path d="M1088 188 l-2 16 l14 -14 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="1118" y="174" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">...right. Thanks.</text>
      </g>
    </g>
  </g>
</svg>