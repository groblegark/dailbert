  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#c1)">
    <rect x="2" y="4" width="396" height="332" fill="#f4f1ea"/>
    <!-- monitor with code -->
    <use href="#dailbert" x="18" y="128" width="118" height="196"/>
    <g>
      <rect x="150" y="168" width="104" height="70" rx="4" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="192" y="238" width="20" height="14" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="176" y="252" width="52" height="6" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="160" y1="182" x2="200" y2="182" stroke="#111" stroke-width="2"/>
      <line x1="160" y1="192" x2="240" y2="192" stroke="#111" stroke-width="2"/>
      <line x1="168" y1="202" x2="220" y2="202" stroke="#111" stroke-width="2"/>
      <line x1="168" y1="212" x2="236" y2="212" stroke="#111" stroke-width="2"/>
      <line x1="160" y1="222" x2="196" y2="222" stroke="#111" stroke-width="2"/>
    </g>
    <!-- Doug + mug -->
