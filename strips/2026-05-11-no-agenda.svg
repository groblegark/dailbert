      <path d="M54 88 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="5" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="5" r="3.2" fill="#111"/>
      <rect x="22" y="18" width="56" height="46" rx="6" fill="#dfe3e6" stroke="#111" stroke-width="2.5"/>
      <rect x="30" y="30" width="16" height="7" rx="3" fill="#111"/>
      <rect x="54" y="30" width="16" height="7" rx="3" fill="#111"/>
      <rect x="34" y="48" width="32" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="48" x2="40" y2="58" stroke="#111" stroke-width="1.4"/>
      <line x1="46" y1="48" x2="46" y2="58" stroke="#111" stroke-width="1.4"/>
      <line x1="52" y1="48" x2="52" y2="58" stroke="#111" stroke-width="1.4"/>
      <line x1="58" y1="48" x2="58" y2="58" stroke="#111" stroke-width="1.4"/>
