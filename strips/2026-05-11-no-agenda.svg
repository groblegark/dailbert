    <g>
      <rect x="236" y="206" width="26" height="26" rx="3" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M262 212 q12 2 0 14" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M243 202 q-3 -6 2 -10 M251 202 q3 -6 -2 -10" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- desk front -->
    <rect x="2" y="262" width="396" height="10" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- Dailbert balloon -->
    <path d="M108 74 l-22 4 l8 30 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="34" y="22" width="182" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="125" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">New agent. It declines</text>
    <text x="125" y="65" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">meetings with no agenda.</text>
    <!-- Doug balloon -->
    <path d="M330 62 l-16 2 l6 22 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="300" y="30" width="70" height="34" rx="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="335" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Bold.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#c2)">
    <rect x="416" y="4" width="396" height="332" fill="#f4f1ea"/>
    <!-- monitor with clanker -->
    <g>
      <rect x="466" y="140" width="150" height="112" rx="5" fill="#111"/>
      <rect x="472" y="146" width="138" height="100" rx="3" fill="#c9cfd3"/>
      <use href="#clanker" x="486" y="150" width="110" height="110"/>
      <rect x="528" y="252" width="26" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="506" y="268" width="70" height="6" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
    </g>
    <use href="#dailbert" x="628" y="146" width="120" height="200"/>
    <rect x="416" y="278" width="396" height="10" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- clanker screen balloon -->
    <line x1="558" y1="82" x2="545" y2="140" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="472" y="24" width="212" height="56" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="477" y="29" width="202" height="46" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="578" y="47" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Done. I declined 14.</text>
    <text x="578" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">One had an agenda.</text>
    <!-- Dailbert balloon -->
