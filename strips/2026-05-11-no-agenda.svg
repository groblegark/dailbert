      <path d="M60 122 l-6 10 l6 26 l6 -26 z" fill="#111"/>
      <path d="M56 121 h8 l-4 6 z" fill="#111"/>
      <rect x="52" y="105" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="70" rx="30" ry="36" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M60 34 q11 -12 2 -17" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="48" cy="70" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="70" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="70" x2="61" y2="70" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="70" r="2.6" fill="#111"/>
      <circle cx="72" cy="70" r="2.6" fill="#111"/>
      <path d="M52 90 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 200">
      <path d="M26 200 V150 Q26 120 60 118 Q94 120 94 150 V200" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="52" y="103" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="66" r="36" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M40 34 q4 -7 9 -2 M58 30 q1 -7 6 -3 M74 35 q5 -7 9 -1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="62" r="3" fill="#111"/>
      <circle cx="72" cy="62" r="3" fill="#111"/>
      <path d="M44 76 q16 18 32 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M26 200 V150 Q26 120 60 118 Q94 120 94 150 V200" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M40 150 q6 -8 12 -2 M80 150 q-6 -8 -12 -2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="60" cy="70" rx="28" ry="33" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M32 70 Q31 32 60 32 Q89 32 88 70 Q76 50 60 50 Q44 50 32 70 Z" fill="#111"/>
      <circle cx="42" cy="42" r="6" fill="#111"/>
      <circle cx="54" cy="34" r="6" fill="#111"/>
      <circle cx="66" cy="34" r="6" fill="#111"/>
      <circle cx="78" cy="42" r="6" fill="#111"/>
      <circle cx="60" cy="26" r="7" fill="#111"/>
      <rect x="39" y="64" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="64" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="70" x2="64" y2="70" stroke="#111" stroke-width="2.5"/>
      <circle cx="47.5" cy="70" r="2.6" fill="#111"/>
