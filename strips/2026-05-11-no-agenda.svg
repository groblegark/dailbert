    <rect x="654" y="92" width="120" height="34" rx="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="714" y="114" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Which one?</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#c3)">
    <rect x="830" y="4" width="396" height="332" fill="#f4f1ea"/>
    <!-- Dailbert slumped, blank calendar screen behind -->
    <use href="#dailbert" x="838" y="150" width="100" height="168"/>
    <g>
      <rect x="846" y="252" width="70" height="50" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="846" y1="266" x2="916" y2="266" stroke="#111" stroke-width="1.5"/>
      <line x1="869" y1="252" x2="869" y2="302" stroke="#111" stroke-width="1.2"/>
      <line x1="892" y1="252" x2="892" y2="302" stroke="#111" stroke-width="1.2"/>
      <line x1="846" y1="284" x2="916" y2="284" stroke="#111" stroke-width="1.2"/>
    </g>
    <!-- Priya standing, holding laptop -->
    <use href="#priya" x="978" y="118" width="124" height="206"/>
    <g>
      <rect x="948" y="214" width="96" height="60" rx="3" fill="#111"/>
      <rect x="953" y="219" width="86" height="50" rx="2" fill="#c9cfd3"/>
      <use href="#clanker" x="960" y="216" width="72" height="72"/>
      <path d="M944 274 h104 l10 14 h-124 z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    <rect x="830" y="298" width="396" height="10" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- Priya balloon -->
    <path d="M1046 76 l-16 2 l8 22 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="928" y="22" width="212" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="1034" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">The one where you</text>
    <text x="1034" y="65" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">demo the agent.</text>
    <!-- clanker balloon from laptop -->
    <line x1="1112" y1="196" x2="1028" y2="228" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="1030" y="158" width="184" height="38" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="1035" y="163" width="174" height="28" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="1122" y="182" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">It was a good agenda.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="2" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="416" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="830" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>