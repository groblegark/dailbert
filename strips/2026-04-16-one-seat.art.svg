<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 180">
      <path d="M28 178 L28 120 Q60 100 92 120 L92 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 122 L60 138 L68 122 Z" fill="#111"/>
      <line x1="60" y1="122" x2="60" y2="112" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="66" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 36 Q66 26 58 24 Q66 30 60 36" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="66" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="66" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="66" x2="64" y2="66" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="66" r="2" fill="#111"/>
      <circle cx="72" cy="66" r="2" fill="#111"/>
      <line x1="58" y1="82" x2="66" y2="82" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 180">
      <path d="M26 178 L26 122 Q60 104 94 122 L94 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="64" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="60" r="2.6" fill="#111"/>
      <circle cx="70" cy="60" r="2.6" fill="#111"/>
      <path d="M46 72 Q60 88 74 72" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- mug -->
      <rect x="70" y="128" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M96 132 Q106 134 96 146" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M76 128 Q78 120 80 128" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 180">
      <path d="M26 178 L26 120 Q60 102 94 120 L94 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 120 Q44 108 50 118" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M80 120 Q76 108 70 118" fill="none" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="66" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 60 Q30 30 60 30 Q90 30 86 60 Q80 48 60 46 Q40 48 34 60 Z" fill="#111"/>
      <path d="M58 26 Q60 18 66 22 Q70 26 64 30" fill="#111"/>
      <rect x="42" y="60" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="60" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="66" x2="64" y2="66" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="66" r="2" fill="#111"/>
      <circle cx="72" cy="66" r="2" fill="#111"/>
      <path d="M54 82 Q60 85 68 81" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 180">
      <path d="M26 178 L26 120 Q60 102 94 120 L94 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 122 L60 150 L68 122 Z" fill="#111"/>
      <ellipse cx="60" cy="70" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 48 Q40 8 54 44 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M78 48 Q80 8 66 44 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M54 46 Q60 40 66 46" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="52" cy="68" r="1.8" fill="#111"/>
      <circle cx="70" cy="68" r="1.8" fill="#111"/>
      <path d="M52 84 Q60 88 70 84" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (drawn inside a dark screen) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="16" x2="50" y2="4" stroke="#9fb0bd" stroke-width="2.5"/>
      <circle cx="50" cy="4" r="3.5" fill="#cfe6ff"/>
      <rect x="22" y="16" width="56" height="48" rx="7" fill="#6b727b" stroke="#9fb0bd" stroke-width="2.5"/>
      <rect x="30" y="30" width="16" height="9" rx="2.5" fill="#bff0ff"/>
      <rect x="54" y="30" width="16" height="9" rx="2.5" fill="#bff0ff"/>
      <rect x="32" y="48" width="36" height="10" rx="2" fill="#3a4048" stroke="#9fb0bd" stroke-width="1.6"/>
      <line x1="40" y1="48" x2="40" y2="58" stroke="#9fb0bd" stroke-width="1.4"/>
      <line x1="50" y1="48" x2="50" y2="58" stroke="#9fb0bd" stroke-width="1.4"/>
      <line x1="60" y1="48" x2="60" y2="58" stroke="#9fb0bd" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- paper backdrop -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c1)">
    <!-- floor line -->
    <line x1="1" y1="292" x2="399" y2="292" stroke="#111" stroke-width="2"/>
    <!-- Boss -->
    <use href="#boss" x="26" y="150" width="130" height="195"/>
    <!-- desk + monitor -->
    <rect x="236" y="250" width="150" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="258" y="176" width="112" height="80" rx="5" fill="#26303a" stroke="#111" stroke-width="2.5"/>
    <rect x="304" y="256" width="20" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="278" y="182" width="72" height="72"/>

    <!-- Boss balloon -->
    <path d="M40 40 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-70 l-14 16 l0 -16 h-66 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="115" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The clanker fixed</text>
    <text x="115" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">our alignment!</text>

    <!-- Clanker screen balloon -->
    <line x1="300" y1="196" x2="300" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="196" y="110" width="192" height="66" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="292" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">A daily alignment sync.</text>
    <text x="292" y="150" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">For everyone. Recurring.</text>
    <text x="292" y="168" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Forever.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c2)">
    <line x1="415" y1="300" x2="813" y2="300" stroke="#111" stroke-width="2"/>
    <!-- big shared desk -->
    <rect x="455" y="252" width="320" height="58" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- calendar screen, wall-mounted, packed solid -->
    <rect x="486" y="60" width="256" height="150" rx="5" fill="#26303a" stroke="#111" stroke-width="2.5"/>
    <g stroke="#8a97a3" stroke-width="1">
      <line x1="486" y1="88" x2="742" y2="88"/>
      <line x1="486" y1="116" x2="742" y2="116"/>
      <line x1="486" y1="144" x2="742" y2="144"/>
      <line x1="486" y1="172" x2="742" y2="172"/>
      <line x1="550" y1="60" x2="550" y2="210"/>
      <line x1="614" y1="60" x2="614" y2="210"/>
      <line x1="678" y1="60" x2="678" y2="210"/>
    </g>
    <!-- solid blocks: every slot one color -->
    <g fill="#c7d2db" stroke="#26303a" stroke-width="1.5">
      <rect x="492" y="92" width="52" height="20"/><rect x="556" y="92" width="52" height="20"/><rect x="620" y="92" width="52" height="20"/><rect x="684" y="92" width="52" height="20"/>
      <rect x="492" y="120" width="52" height="20"/><rect x="556" y="120" width="52" height="20"/><rect x="620" y="120" width="52" height="20"/><rect x="684" y="120" width="52" height="20"/>
      <rect x="492" y="148" width="52" height="20"/><rect x="556" y="148" width="52" height="20"/><rect x="620" y="148" width="52" height="20"/><rect x="684" y="148" width="52" height="20"/>
      <rect x="492" y="176" width="52" height="20"/><rect x="556" y="176" width="52" height="20"/><rect x="620" y="176" width="52" height="20"/><rect x="684" y="176" width="52" height="20"/>
    </g>

    <!-- Dailbert + Doug behind desk -->
    <use href="#dailbert" x="470" y="150" width="118" height="176"/>
    <use href="#doug" x="628" y="150" width="118" height="176"/>

    <!-- Doug balloon -->
    <path d="M598 214 h150 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-96 l-12 15 l-2 -15 h-40 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="673" y="234" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">My whole week is</text>
    <text x="673" y="252" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">one meeting now.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c3)">
    <line x1="829" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="2"/>
    <!-- Priya's desk + monitor -->
    <rect x="1052" y="250" width="150" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="1074" y="176" width="112" height="80" rx="5" fill="#26303a" stroke="#111" stroke-width="2.5"/>
    <rect x="1120" y="256" width="20" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="1094" y="182" width="72" height="72"/>

    <!-- Priya, leaned back, arms folded, satisfied -->
    <use href="#priya" x="858" y="150" width="128" height="192"/>

    <!-- Clanker screen balloon (top) -->
    <line x1="1116" y1="196" x2="1116" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="1016" y="104" width="196" height="66" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="1114" y="126" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">The 9am sync is</text>
    <text x="1114" y="144" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">going well. I am the</text>
    <text x="1114" y="162" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">only one invited.</text>

    <!-- Priya button balloon -->
    <path d="M866 196 h150 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-96 l-14 16 l-1 -16 h-39 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="941" y="216" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I capped it at one seat.</text>
    <text x="941" y="234" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It invited itself.</text>
  </g>
</svg>