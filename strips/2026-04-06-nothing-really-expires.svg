<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Nothing Really Expires</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-06</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="cell"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 175">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M18,175 L18,148 Q18,126 46,120 L74,120 Q102,126 102,148 L102,175 Z"/>
        <rect x="52" y="100" width="16" height="24"/>
        <ellipse cx="60" cy="66" rx="26" ry="31"/>
        <circle cx="34" cy="66" r="5"/>
        <circle cx="86" cy="66" r="5"/>
        <path d="M52,38 Q54,24 66,28 Q57,30 60,40" fill="none"/>
      </g>
      <g fill="none" stroke="#111" stroke-width="2" stroke-linecap="round">
        <circle cx="49" cy="66" r="9"/>
        <circle cx="71" cy="66" r="9"/>
        <path d="M58,66 L62,66"/>
        <path d="M40,65 L35,64"/>
        <path d="M80,65 L85,64"/>
        <path d="M60,73 L57,81 L61,81"/>
        <path d="M52,90 Q60,93 68,90"/>
      </g>
      <circle cx="49" cy="66" r="2.2" fill="#111"/>
      <circle cx="71" cy="66" r="2.2" fill="#111"/>
      <path d="M60,124 l-6,6 l6,6 l6,-6 z" fill="#111"/>
      <path d="M55,136 L52,161 L60,169 L68,161 L65,136 z" fill="#111" stroke="#111" stroke-width="1"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 175">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M20,175 L20,150 Q20,126 50,120 L88,120 Q118,126 118,150 L118,175 Z"/>
        <rect x="56" y="100" width="18" height="24"/>
        <circle cx="66" cy="64" r="31"/>
        <circle cx="35" cy="64" r="5"/>
        <circle cx="97" cy="64" r="5"/>
        <path d="M44,40 Q52,27 60,36 Q66,25 74,36 Q82,27 88,40" fill="none"/>
        <path d="M48,74 Q66,98 84,74 Q66,84 48,74 Z"/>
        <!-- mug -->
        <rect x="6" y="124" width="26" height="30" rx="4"/>
        <path d="M6,132 C-4,132 -4,150 6,150" fill="none"/>
        <ellipse cx="19" cy="156" rx="14" ry="7"/>
      </g>
      <circle cx="54" cy="60" r="3" fill="#111"/>
      <circle cx="78" cy="60" r="3" fill="#111"/>
      <circle cx="66" cy="69" r="2" fill="#111"/>
      <g fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round">
        <path d="M13,122 q4,-6 0,-11"/>
        <path d="M25,122 q4,-6 0,-11"/>
      </g>
    </symbol>

    <!-- THE CLANKER (drawn inside a screen) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g stroke="#111" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
        <line x1="60" y1="30" x2="60" y2="15"/>
        <circle cx="60" cy="11" r="4" fill="#c9c9c9"/>
        <rect x="24" y="30" width="72" height="62" rx="9" fill="#c9c9c9"/>
        <rect x="35" y="48" width="18" height="8" rx="3" fill="#efe9d8"/>
        <rect x="67" y="48" width="18" height="8" rx="3" fill="#efe9d8"/>
        <rect x="40" y="68" width="40" height="13" rx="2" fill="#a8a8a8"/>
      </g>
      <g stroke="#111" stroke-width="1.4">
        <line x1="48" y1="68" x2="48" y2="81"/>
        <line x1="56" y1="68" x2="56" y2="81"/>
        <line x1="64" y1="68" x2="64" y2="81"/>
        <line x1="72" y1="68" x2="72" y2="81"/>
      </g>
      <circle cx="30" cy="37" r="2" fill="#8a8a8a"/>
      <circle cx="90" cy="37" r="2" fill="#8a8a8a"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g clip-path="url(#cell)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>

    <use href="#dailbert" x="250" y="95" width="140" height="204"/>

    <!-- monitor -->
    <rect x="54" y="150" width="150" height="110" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="66" y="162" width="126" height="86" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
    <text x="129" y="200" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" text-anchor="middle" fill="#111" letter-spacing="1">PASSWORD</text>
    <text x="129" y="224" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" text-anchor="middle" fill="#111" letter-spacing="1">EXPIRED</text>
    <rect x="120" y="260" width="18" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="100" y="274" width="58" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- desk -->
    <rect x="10" y="282" width="380" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- balloon -->
    <path d="M312,76 L320,118 L330,76 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="206" y="18" width="188" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="300" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Expired again.</text>
    <text x="300" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Ninety days.</text>

    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)" clip-path="url(#cell)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>

    <use href="#dailbert" x="150" y="110" width="120" height="175"/>
    <use href="#doug" x="248" y="100" width="140" height="188"/>

    <!-- monitor with clanker -->
    <rect x="20" y="160" width="120" height="95" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="30" y="170" width="100" height="72" rx="3" fill="#3f3f3f" stroke="#111" stroke-width="1.5"/>
    <use href="#clanker" x="45" y="175" width="70" height="70"/>
    <rect x="70" y="255" width="16" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="52" y="267" width="52" height="7" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- desk -->
    <rect x="8" y="280" width="384" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Doug balloon -->
    <path d="M314,62 L322,106 L332,62 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="250" y="14" width="140" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="320" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">I just add</text>
    <text x="320" y="55" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">a number.</text>

    <!-- Clanker balloon -->
    <line x1="88" y1="68" x2="80" y2="172" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="12" y="16" width="154" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="16" y="20" width="146" height="44" fill="none" stroke="#111" stroke-width="1"/>
    <text x="89" y="38" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I still have</text>
    <text x="89" y="56" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">the other eight.</text>

    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)" clip-path="url(#cell)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>

    <use href="#dailbert" x="40" y="120" width="150" height="218"/>

    <!-- monitor with clanker -->
    <rect x="210" y="150" width="140" height="104" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="222" y="161" width="116" height="80" rx="3" fill="#3f3f3f" stroke="#111" stroke-width="1.5"/>
    <use href="#clanker" x="244" y="167" width="72" height="72"/>
    <rect x="270" y="254" width="18" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="250" y="266" width="58" height="7" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- desk + keyboard -->
    <rect x="8" y="282" width="384" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="66" y="288" width="120" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <g stroke="#111" stroke-width="1"><line x1="80" y1="296" x2="172" y2="296"/></g>

    <!-- Dailbert balloon -->
    <path d="M104,66 L112,118 L122,66 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="20" y="16" width="172" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="106" y="38" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">This one's</text>
    <text x="106" y="57" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">different.</text>

    <!-- Clanker balloon -->
    <line x1="299" y1="62" x2="282" y2="161" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="214" y="16" width="172" height="46" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="218" y="20" width="164" height="38" fill="none" stroke="#111" stroke-width="1"/>
    <text x="300" y="43" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">They all were.</text>

    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>