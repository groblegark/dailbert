<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">AI-First</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-05</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <style>
      .ink{fill:none;stroke:#111;stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round;}
      .thin{fill:none;stroke:#111;stroke-width:1.4;stroke-linejoin:round;stroke-linecap:round;}
      .fillp{fill:#f4f1ea;stroke:#111;stroke-width:2.4;stroke-linejoin:round;}
      .paper{fill:#f4f1ea;}
      .blk{fill:#111;}
      .bal{fill:#fff;stroke:#111;stroke-width:2.2;}
      .txt{font-family:'Comic Sans MS','Segoe Print',cursive;font-size:14px;fill:#111;text-anchor:middle;}
    </style>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <path class="paper" d="M60 26 q22 0 22 26 q0 26 -22 26 q-22 0 -22 -26 q0 -26 22 -26z"/>
      <path class="ink" d="M60 26 q22 0 22 26 q0 26 -22 26 q-22 0 -22 -26 q0 -26 22 -26z"/>
      <path class="thin" d="M45 24 q6 -10 14 -4"/>
      <circle class="thin" cx="52" cy="52" r="7"/>
      <circle class="thin" cx="70" cy="52" r="7"/>
      <line class="thin" x1="59" y1="52" x2="63" y2="52"/>
      <circle class="blk" cx="52" cy="52" r="1.6"/>
      <circle class="blk" cx="70" cy="52" r="1.6"/>
      <path class="thin" d="M54 68 q7 4 14 0"/>
      <!-- body -->
      <path class="fillp" d="M42 80 q18 12 36 0 l10 12 v52 h-56 v-52z"/>
      <path class="thin" d="M60 80 l-8 14 l8 26 l8 -26z"/>
      <path class="blk" d="M56 92 l4 8 l4 -8 l-4 -3z"/>
      <path class="thin" d="M55 82 l5 8 l5 -8"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle class="paper" cx="60" cy="52" r="26"/>
      <circle class="ink" cx="60" cy="52" r="26"/>
      <path class="thin" d="M48 28 q6 -8 12 -2 q4 -6 10 0"/>
      <circle class="blk" cx="52" cy="50" r="2.2"/>
      <circle class="blk" cx="68" cy="50" r="2.2"/>
      <path class="ink" d="M48 60 q12 12 24 0" style="stroke-width:2;"/>
      <path class="fillp" d="M42 80 q18 12 36 0 l10 12 v52 h-56 v-52z"/>
      <path class="thin" d="M54 82 h12 v10 h-12z"/>
      <!-- mug -->
      <rect class="fillp" x="8" y="112" width="26" height="24" rx="3"/>
      <path class="ink" d="M34 116 q12 2 12 12 q0 10 -12 10" style="stroke-width:2;"/>
      <path class="thin" d="M13 120 q3 6 0 12"/>
      <path class="thin" d="M40 88 q-8 -4 -6 -12 q1 6 6 8"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 200">
      <path class="paper" d="M60 30 q20 0 20 24 q0 24 -20 24 q-20 0 -20 -24 q0 -24 20 -24z"/>
      <path class="ink" d="M60 30 q20 0 20 24 q0 24 -20 24 q-20 0 -20 -24 q0 -24 20 -24z"/>
      <!-- devil spikes -->
      <path class="fillp" d="M44 34 q-6 -26 2 -30 q4 14 8 22z"/>
      <path class="fillp" d="M76 34 q6 -26 -2 -30 q-4 14 -8 22z"/>
      <circle class="blk" cx="53" cy="54" r="1.8"/>
      <circle class="blk" cx="67" cy="54" r="1.8"/>
      <path class="thin" d="M55 66 q5 3 10 0"/>
      <path class="fillp" d="M42 80 q18 12 36 0 l10 12 v52 h-56 v-52z"/>
      <path class="thin" d="M60 80 l-7 12 l7 22 l7 -22z"/>
      <path class="blk" d="M56 90 l4 8 l4 -8 l-4 -3z"/>
    </symbol>

    <!-- CLANKER robot head -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <line class="ink" x1="60" y1="8" x2="60" y2="20"/>
      <circle class="blk" cx="60" cy="7" r="3"/>
      <rect class="fillp" x="24" y="20" width="72" height="60" rx="8"/>
      <rect x="34" y="34" width="20" height="12" rx="2" fill="#111"/>
      <rect x="66" y="34" width="20" height="12" rx="2" fill="#111"/>
      <rect x="37" y="37" width="14" height="6" rx="1" fill="#f4f1ea"/>
      <rect x="69" y="37" width="14" height="6" rx="1" fill="#f4f1ea"/>
      <g class="thin">
        <line x1="38" y1="58" x2="38" y2="70"/>
        <line x1="46" y1="58" x2="46" y2="70"/>
        <line x1="54" y1="58" x2="54" y2="70"/>
        <line x1="62" y1="58" x2="62" y2="70"/>
        <line x1="70" y1="58" x2="70" y2="70"/>
        <line x1="78" y1="58" x2="78" y2="70"/>
        <line x1="82" y1="58" x2="82" y2="70"/>
        <rect x="34" y="58" width="52" height="12" rx="2" fill="none"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect class="fillp" x="2" y="2" width="396" height="336" rx="3"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- table -->
      <path class="thin" d="M0 300 q200 -18 400 0"/>
      <!-- boss -->
      <use href="#boss" x="70" y="150" width="120" height="200"/>
      <!-- dailbert seated right -->
      <use href="#dailbert" x="230" y="170" width="120" height="200"/>

      <!-- balloons -->
      <rect class="bal" x="14" y="14" width="230" height="60" rx="14"/>
      <path class="bal" d="M150 72 l6 20 l16 -18z"/>
      <text class="txt" x="129" y="34">Big news. Effective today,</text>
      <text class="txt" x="129" y="52">we are an AI-first</text>
      <text class="txt" x="129" y="70">company.</text>

      <rect class="bal" x="150" y="96" width="234" height="60" rx="14"/>
      <path class="bal" d="M180 154 l-8 18 l22 -12z"/>
      <text class="txt" x="267" y="116">From now on, everything</text>
      <text class="txt" x="267" y="134">goes through the AI</text>
      <text class="txt" x="267" y="152">first.</text>
    </g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect class="fillp" x="416" y="2" width="396" height="336" rx="3"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <path class="thin" d="M416 302 q200 -16 396 0"/>
      <use href="#dailbert" x="470" y="168" width="120" height="200"/>
      <use href="#doug" x="640" y="168" width="120" height="200"/>

      <rect class="bal" x="428" y="14" width="196" height="42" rx="14"/>
      <path class="bal" d="M520 54 l4 20 l16 -14z"/>
      <text class="txt" x="526" y="32">First for what,</text>
      <text class="txt" x="526" y="50">exactly?</text>

      <rect class="bal" x="608" y="66" width="196" height="60" rx="14"/>
      <path class="bal" d="M700 124 l6 20 l16 -16z"/>
      <text class="txt" x="706" y="86">Coffee, I'm hoping.</text>
      <text class="txt" x="706" y="104">Mine does</text>
      <text class="txt" x="706" y="122">nothing.</text>
    </g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect class="fillp" x="830" y="2" width="396" height="336" rx="3"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- projector screen with clanker -->
      <rect x="1050" y="150" width="150" height="118" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line class="thin" x1="1125" y1="150" x2="1125" y2="132"/>
      <rect x="1112" y="124" width="26" height="10" rx="2" class="fillp"/>
      <g opacity="0.9">
        <use href="#clanker" x="1075" y="168" width="100" height="83"/>
      </g>
      <!-- people small, backs to us -->
      <use href="#boss" x="836" y="196" width="110" height="184"/>
      <use href="#dailbert" x="928" y="200" width="110" height="184"/>

      <!-- clanker screen-edged balloon -->
      <rect x="846" y="12" width="288" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="850" y="16" width="280" height="48" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text class="txt" x="990" y="34">I read the whole initiative.</text>
      <text class="txt" x="990" y="52">It's ten slides that just</text>
      <text class="txt" x="990" y="64" font-size="11">say 'AI.'</text>

      <rect x="912" y="78" width="238" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="916" y="82" width="230" height="48" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text class="txt" x="1031" y="102">I added an eleventh.</text>
      <text class="txt" x="1031" y="120">It says 'ask</text>
      <text class="txt" x="1031" y="132" font-size="11">Dailbert.'</text>

      <!-- dashed connector to projector surface -->
      <path class="thin" d="M1100 134 q20 8 25 16" stroke-dasharray="4 4"/>
    </g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  </g>
</g>
    
  </svg>