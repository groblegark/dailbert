      <path d="M14 18 q13 6 26 0" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE CLANKER -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="60" cy="5" r="4" fill="#111"/>
      <rect x="26" y="20" width="68" height="58" rx="9" fill="#dfe3e6" stroke="#111" stroke-width="2.8"/>
      <rect x="35" y="36" width="20" height="12" rx="2.5" fill="#111"/>
      <rect x="65" y="36" width="20" height="12" rx="2.5" fill="#111"/>
      <rect x="38" y="39" width="9" height="6" rx="1.5" fill="#bfe4ff"/>
      <rect x="68" y="39" width="9" height="6" rx="1.5" fill="#bfe4ff"/>
