<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Past Due For Review</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-24</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 8 q7 -9 2 -15 q10 3 5 14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.4"/>
      <line x1="41" y1="41" x2="35" y2="39" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="79" y1="41" x2="85" y2="39" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="1.8" fill="#111"/>
      <circle cx="71" cy="42" r="1.8" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M36 74 q24 16 48 0 l6 60 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 76 l-7 12 l7 8 l7 -8 Z" fill="#111"/>
      <path d="M60 96 l0 26" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="44" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 16 q10 -6 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="42" r="3" fill="#111"/>
      <circle cx="72" cy="42" r="3" fill="#111"/>
      <path d="M46 54 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 78 q20 12 40 0 l5 58 q-25 10 -50 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 170">
      <ellipse cx="60" cy="46" rx="29" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 44 q-4 -30 29 -32 q33 2 29 32 q-6 -14 -14 -14 q4 8 -2 12 q-4 -12 -13 -12 q-9 0 -13 12 q-6 -4 -2 -12 q-8 0 -14 14 Z" fill="#111"/>
      <path d="M31 46 q-3 12 2 22 q-8 -8 -6 -22 Z" fill="#111"/>
      <path d="M89 46 q3 12 -2 22 q8 -8 6 -22 Z" fill="#111"/>
      <rect x="41" y="42" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="48" r="1.8" fill="#111"/>
      <circle cx="71" cy="48" r="1.8" fill="#111"/>
      <path d="M53 64 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 78 q22 13 44 0 l6 58 q-28 11 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M44 96 l-6 22" stroke="#111" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M76 96 l6 22" stroke="#111" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- THE BOSS -->
    <symbol id="boss" viewBox="0 0 120 170">
      <ellipse cx="60" cy="48" rx="28" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 26 l-6 -22 l14 16 Z" fill="#111"/>
      <path d="M80 26 l6 -22 l-14 16 Z" fill="#111"/>
      <path d="M40 26 q20 -10 40 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="51" cy="48" r="1.8" fill="#111"/>
      <circle cx="69" cy="48" r="1.8" fill="#111"/>
      <path d="M53 62 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 80 q22 12 44 0 l6 56 q-28 11 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
