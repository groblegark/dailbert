<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 150">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q7 -10 2 -3 q-2 6 4 4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2.2" fill="#111"/>
      <circle cx="71" cy="42" r="2.2" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 76 L80 76 L86 150 L34 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 76 L54 96 L60 112 L66 96 Z" fill="#111"/>
      <line x1="60" y1="76" x2="60" y2="88" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 150">
      <path d="M31 44 q-5 -24 17 -32 q13 -6 26 1 q17 8 13 30 q4 -13 -6 -21 q6 5 4 15 q3 -7 -3 -13"
            fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="52" cy="19" r="6" fill="#111"/>
      <circle cx="67" cy="16" r="6" fill="#111"/>
      <circle cx="40" cy="26" r="5" fill="#111"/>
      <circle cx="79" cy="27" r="5" fill="#111"/>
      <ellipse cx="60" cy="46" rx="28" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M33 33 q11 -14 27 -14 q16 0 27 14" fill="#111"/>
      <rect x="41" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="47.5" r="2" fill="#111"/>
      <circle cx="71" cy="47.5" r="2" fill="#111"/>
      <path d="M53 63 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 78 L80 78 L86 150 L34 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="41" y1="98" x2="79" y2="98" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER (drawn INSIDE a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="52" rx="7" fill="#1c1c1c" stroke="#cfcfcf" stroke-width="2.5"/>
      <line x1="60" y1="34" x2="60" y2="20" stroke="#cfcfcf" stroke-width="2.5"/>
      <circle cx="60" cy="16" r="4" fill="#cfcfcf"/>
      <rect x="40" y="48" width="14" height="7" rx="3" fill="#9fe6ff"/>
      <rect x="66" y="48" width="14" height="7" rx="3" fill="#9fe6ff"/>
      <line x1="44" y1="70" x2="76" y2="70" stroke="#cfcfcf" stroke-width="2"/>
      <line x1="48" y1="66" x2="48" y2="74" stroke="#cfcfcf" stroke-width="2"/>
      <line x1="56" y1="66" x2="56" y2="74" stroke="#cfcfcf" stroke-width="2"/>
      <line x1="64" y1="66" x2="64" y2="74" stroke="#cfcfcf" stroke-width="2"/>
      <line x1="72" y1="66" x2="72" y2="74" stroke="#cfcfcf" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- =============================== PANEL 1 =============================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="298" x2="400" y2="298" stroke="#111" stroke-width="2"/>

      <use href="#dailbert" x="30" y="150" width="120" height="150"/>
      <rect x="16" y="252" width="368" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

      <!-- monitor with clanker -->
      <rect x="234" y="148" width="126" height="100" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="242" y="156" width="110" height="84" rx="3" fill="#1c1c1c"/>
      <rect x="288" y="248" width="18" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="245" y="158" width="104" height="104"/>

      <!-- Dailbert balloon -->
      <rect x="42" y="34" width="150" height="76" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M78 106 l-4 22 l22 -16 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="117" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">My calendar's</text>
      <text x="117" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">totally clear</text>
      <text x="117" y="100" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">today.</text>
    </g>
  </g>

  <!-- =============================== PANEL 2 =============================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="298" x2="828" y2="298" stroke="#111" stroke-width="2"/>

      <use href="#dailbert" x="444" y="150" width="120" height="150"/>
      <rect x="430" y="252" width="368" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

      <rect x="648" y="148" width="126" height="100" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="656" y="156" width="110" height="84" rx="3" fill="#1c1c1c"/>
      <rect x="702" y="248" width="18" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="659" y="158" width="104" height="104"/>

      <!-- Clanker balloon: rectangular, dashed line back to monitor -->
      <line x1="694" y1="148" x2="648" y2="118" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="448" y="40" width="208" height="90" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="552" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">I declined your</text>
      <text x="552" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">meetings for you.</text>
      <text x="552" y="100" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">You needed the</text>
      <text x="552" y="118" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">focus time.</text>
    </g>
  </g>

  <!-- =============================== PANEL 3 =============================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="298" x2="1242" y2="298" stroke="#111" stroke-width="2"/>

      <!-- Priya walking in, dry -->
      <use href="#priya" x="850" y="150" width="120" height="150"/>
      <use href="#dailbert" x="980" y="152" width="112" height="148"/>
      <rect x="844" y="252" width="368" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

      <rect x="1064" y="148" width="120" height="100" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="1072" y="156" width="104" height="84" rx="3" fill="#1c1c1c"/>
      <rect x="1114" y="248" width="18" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="1072" y="158" width="104" height="104"/>

      <!-- Clanker balloon -->
      <line x1="1108" y1="148" x2="1096" y2="120" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="1006" y="40" width="192" height="76" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="1102" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">All but one. The</text>
      <text x="1102" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">2pm with no</text>
      <text x="1102" y="100" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">agenda.</text>

      <!-- Priya balloon -->
      <rect x="856" y="36" width="140" height="56" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M900 88 l-8 22 l24 -14 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="926" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Leave that one</text>
      <text x="926" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">declined too.</text>
    </g>
  </g>
</svg>