<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 120 210">
      <path d="M28,120 Q60,104 92,120 L100,210 L20,210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50,112 L60,128 L70,112" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M56,120 L64,120 L67,150 L60,160 L53,150 Z" fill="#111"/>
      <path d="M52,96 L52,112 M68,96 L68,112" stroke="#111" stroke-width="2"/>
      <ellipse cx="60" cy="60" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M56,28 q-8,-12 4,-15 q12,-2 8,9" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M30,60 q-6,0 -4,8 M90,60 q6,0 4,8" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="58" r="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="58" r="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M58,58 L62,58" stroke="#111" stroke-width="2"/>
      <path d="M38,56 L32,53 M82,56 L88,53" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="59" r="2" fill="#111"/>
      <circle cx="72" cy="59" r="2" fill="#111"/>
      <path d="M60,64 L57,72 L62,72" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M52,82 L68,82" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 140 210">
      <path d="M40,120 Q16,96 24,66" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
      <path d="M100,120 Q124,96 116,66" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
      <circle cx="24" cy="62" r="7" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="116" cy="62" r="7" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M34,116 Q70,104 106,116 L112,210 L28,210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M62,110 L70,132 L78,110" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M50,116 L70,132 M90,116 L70,132" stroke="#111" stroke-width="2"/>
      <path d="M66,120 L74,120 L72,150 L70,158 L68,150 Z" fill="#111"/>
      <path d="M62,94 L62,110 M78,94 L78,110" stroke="#111" stroke-width="2"/>
      <ellipse cx="70" cy="62" rx="30" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M52,38 L42,2 L66,34 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M78,36 L96,2 L86,38 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M54,54 L64,57 M86,54 L76,57" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="61" cy="62" r="2.4" fill="#111"/>
      <circle cx="79" cy="62" r="2.4" fill="#111"/>
      <path d="M70,66 L67,74 L71,74" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M60,80 Q70,88 80,80" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40,62 q-6,0 -4,8 M100,62 q6,0 4,8" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 110 100">
      <path d="M55,20 L55,8" stroke="#111" stroke-width="3"/>
      <circle cx="55" cy="5" r="4" fill="#111"/>
      <rect x="18" y="20" width="74" height="68" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="24" y="26" width="62" height="56" rx="5" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="30" y="38" width="20" height="11" rx="2" fill="#111"/>
      <rect x="60" y="38" width="20" height="11" rx="2" fill="#111"/>
      <path d="M32,41 L48,41 M32,46 L48,46" stroke="#f4f1ea" stroke-width="1"/>
      <path d="M62,41 L78,41 M62,46 L78,46" stroke="#f4f1ea" stroke-width="1"/>
      <rect x="34" y="60" width="42" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M41,60 L41,76 M48,60 L48,76 M55,60 L55,76 M62,60 L62,76 M69,60 L69,76" stroke="#111" stroke-width="1.5"/>
      <circle cx="26" cy="28" r="1.6" fill="#111"/>
      <circle cx="84" cy="28" r="1.6" fill="#111"/>
      <circle cx="26" cy="80" r="1.6" fill="#111"/>
      <circle cx="84" cy="80" r="1.6" fill="#111"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="55" y="120" width="110" height="190"/>
    <use href="#boss" x="225" y="115" width="125" height="205"/>
    <!-- desk edge occluding -->
    <rect x="4" y="307" width="392" height="31" fill="#f4f1ea"/>
    <path d="M4,307 L396,307" stroke="#111" stroke-width="2.5"/>
    <path d="M120,318 L200,318" stroke="#111" stroke-width="1.5"/>

    <!-- BOSS balloon -->
    <rect x="185" y="14" width="200" height="74" rx="14" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M272,86 L288,150 L296,84" fill="none" stroke="#111" stroke-width="2.5"/>
    <text x="285" y="35" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Big day. We switch</text>
    <text x="285" y="53" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">on the agent. I want</text>
    <text x="285" y="71" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">synergy by lunch.</text>

    <!-- DAILBERT balloon -->
    <rect x="18" y="95" width="150" height="40" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M100,133 L110,146 L118,133" fill="none" stroke="#111" stroke-width="2.5"/>
    <text x="93" y="120" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I'll let it know.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- monitor -->
    <rect x="105" y="290" width="34" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="122" cy="306" rx="42" ry="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="34" y="150" width="176" height="140" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="48" y="162" width="148" height="104" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <g stroke="#8a8a8a" stroke-width="0.6">
      <path d="M50,174 L194,174"/>
      <path d="M50,186 L194,186"/>
      <path d="M50,198 L194,198"/>
      <path d="M50,210 L194,210"/>
      <path d="M50,222 L194,222"/>
      <path d="M50,234 L194,234"/>
      <path d="M50,246 L194,246"/>
      <path d="M50,258 L194,258"/>
    </g>
    <use href="#clanker" x="72" y="170" width="100" height="90"/>

    <!-- dailbert seated -->
    <use href="#dailbert" x="248" y="140" width="125" height="205"/>

    <!-- desk edge -->
    <rect x="4" y="309" width="392" height="29" fill="#f4f1ea"/>
    <path d="M4,309 L396,309" stroke="#111" stroke-width="2.5"/>

    <!-- CLANKER screen-edged balloon -->
    <rect x="16" y="10" width="280" height="138" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="21" y="15" width="270" height="128" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <path d="M150,148 L126,162" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="156" y="34" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Good morning, Dailbert.</text>
    <text x="156" y="52" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You had forty-one</text>
    <text x="156" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">tickets. I did the</text>
    <text x="156" y="88" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">tedious ones.</text>
    <text x="156" y="112" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You looked tired in</text>
    <text x="156" y="130" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">the calendar photo.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#boss" x="35" y="118" width="125" height="205"/>
    <use href="#dailbert" x="238" y="125" width="115" height="195"/>

    <!-- desk edge -->
    <rect x="4" y="307" width="392" height="31" fill="#f4f1ea"/>
    <path d="M4,307 L396,307" stroke="#111" stroke-width="2.5"/>
    <path d="M210,318 L300,318" stroke="#111" stroke-width="1.5"/>

    <!-- BOSS balloon -->
    <rect x="14" y="14" width="190" height="74" rx="14" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M92,86 L100,148 L112,86" fill="none" stroke="#111" stroke-width="2.5"/>
    <text x="109" y="35" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Incredible. It's</text>
    <text x="109" y="53" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">already thinking</text>
    <text x="109" y="71" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">about the quarter.</text>

    <!-- DAILBERT balloon -->
    <rect x="232" y="90" width="150" height="54" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M300,142 L296,150 L312,142" fill="none" stroke="#111" stroke-width="2.5"/>
    <text x="307" y="112" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It's thinking</text>
    <text x="307" y="130" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">about me.</text>
  </g>
</svg>