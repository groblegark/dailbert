<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M28 168 L28 128 Q60 108 92 128 L92 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M52 122 L60 134 L68 122 Z" fill="#111"/>
      <path d="M56 108 L64 108 L60 124 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="60" cy="70" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M58 24 q-10 -12 4 -14 q10 -1 4 8" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="48" cy="68" r="11" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="72" cy="68" r="11" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="59" y1="68" x2="61" y2="68" stroke="#111" stroke-width="2.2"/>
      <line x1="37" y1="66" x2="30" y2="63" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="83" y1="66" x2="90" y2="63" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="48" cy="68" r="2.4" fill="#111"/>
      <circle cx="72" cy="68" r="2.4" fill="#111"/>
      <path d="M60 76 l-3 8 l5 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 92 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 130 170">
      <path d="M24 168 L24 130 Q65 110 106 130 L106 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <circle cx="62" cy="66" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 30 q12 -6 24 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="50" cy="62" r="3.2" fill="#111"/>
      <circle cx="74" cy="62" r="3.2" fill="#111"/>
      <path d="M46 78 q16 20 32 0" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M46 78 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <!-- mug -->
      <rect x="78" y="126" width="30" height="26" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M108 132 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M84 122 q3 -6 0 -10 M92 122 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M26 168 L26 126 Q60 108 94 126 L94 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M32 168 l6 -34 M88 168 l-6 -34" fill="none" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="60" cy="72" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- curly hair pulled up -->
      <path d="M31 74 q-6 -34 29 -40 q35 6 29 40 q4 -22 -12 -34 q6 12 -4 10 q4 12 -8 6 q2 12 -10 4 q0 12 -12 2 q-1 14 -12 16 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="60" cy="24" r="7" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="39" y="66" width="18" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="66" width="18" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="71" x2="63" y2="71" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="72" r="2.3" fill="#111"/>
      <circle cx="72" cy="72" r="2.3" fill="#111"/>
      <path d="M54 96 q6 4 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER (drawn inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#cfcfcf" stroke-width="2.2"/>
      <circle cx="60" cy="6" r="4" fill="#cfcfcf"/>
      <rect x="30" y="20" width="60" height="52" rx="7" fill="#3a3d40" stroke="#cfcfcf" stroke-width="2.4"/>
      <rect x="40" y="34" width="16" height="9" rx="2" fill="#bfe3ff"/>
      <rect x="64" y="34" width="16" height="9" rx="2" fill="#bfe3ff"/>
      <g stroke="#cfcfcf" stroke-width="2" stroke-linecap="round">
        <line x1="42" y1="58" x2="78" y2="58"/>
        <line x1="46" y1="58" x2="46" y2="64"/>
        <line x1="54" y1="58" x2="54" y2="64"/>
        <line x1="62" y1="58" x2="62" y2="64"/>
        <line x1="70" y1="58" x2="70" y2="64"/>
        <line x1="42" y1="64" x2="78" y2="64"/>
      </g>
      <line x1="26" y1="40" x2="30" y2="40" stroke="#cfcfcf" stroke-width="2.4"/>
      <line x1="90" y1="40" x2="94" y2="40" stroke="#cfcfcf" stroke-width="2.4"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  <clipPath id="c1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c1)">
    <!-- desk -->
    <rect x="1" y="292" width="398" height="48" fill="#e9e5db"/>
    <line x1="1" y1="292" x2="399" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- monitor on desk -->
    <rect x="250" y="228" width="120" height="70" rx="4" fill="#2f3234" stroke="#111" stroke-width="2.6"/>
    <rect x="300" y="298" width="20" height="10" fill="#cfcfcf" stroke="#111" stroke-width="2"/>
    <g stroke="#4a4d50" stroke-width="2">
      <line x1="260" y1="240" x2="360" y2="240"/>
      <line x1="260" y1="252" x2="345" y2="252"/>
      <line x1="260" y1="264" x2="352" y2="264"/>
    </g>
    <use href="#dailbert" x="40" y="150" width="150" height="212"/>
    <!-- balloon -->
    <path d="M70 40 h215 a12 12 0 0 1 12 12 v54 a12 12 0 0 1 -12 12 h-118 l-16 22 l0 -22 h-81 a12 12 0 0 1 -12 -12 v-54 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="177" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">Honestly, Priya</text>
    <text x="177" y="86" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">deserves my bonus</text>
    <text x="177" y="106" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">way more than I do.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  <clipPath id="c2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c2)">
    <rect x="415" y="292" width="398" height="48" fill="#e9e5db"/>
    <line x1="415" y1="292" x2="813" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- big monitor with clanker -->
    <rect x="470" y="150" width="200" height="140" rx="6" fill="#2f3234" stroke="#111" stroke-width="2.8"/>
    <rect x="555" y="290" width="30" height="12" fill="#cfcfcf" stroke="#111" stroke-width="2"/>
    <use href="#clanker" x="500" y="164" width="140" height="128"/>
    <!-- dailbert leaning in, back-ish -->
    <use href="#dailbert" x="672" y="176" width="140" height="196"/>
    <!-- clanker screen balloon -->
    <path d="M430 44 h140 v66 h-140 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <line x1="500" y1="110" x2="540" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="500" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">Agreed. I moved</text>
    <text x="500" y="90" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">your bonus to her.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  <clipPath id="c3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
  <g clip-path="url(#c3)">
    <rect x="829" y="292" width="398" height="48" fill="#e9e5db"/>
    <line x1="829" y1="292" x2="1227" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- Dailbert stunned, left -->
    <use href="#dailbert" x="838" y="176" width="132" height="188"/>
    <!-- Doug with mug, middle-back, grinning -->
    <use href="#doug" x="948" y="182" width="150" height="196"/>
    <!-- Priya walking through, right, dry -->
    <use href="#priya" x="1078" y="164" width="140" height="200"/>
    <!-- Priya balloon -->
    <path d="M1010 40 h150 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-30 l4 20 l-22 -20 h-102 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="1091" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">I'm not giving</text>
    <text x="1091" y="86" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">it back.</text>
  </g>
</svg>