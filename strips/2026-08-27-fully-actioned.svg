<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Fully Actioned</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== CHARACTER SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 100 150">
      <ellipse cx="50" cy="34" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 6 q10 -8 6 -16" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M42 48 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- body -->
      <path d="M34 62 q16 -8 32 0 l6 60 h-44 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 62 l-7 12 l7 6 l7 -6 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M50 80 l-4 26 l4 6 l4 -6 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 100 150">
      <circle cx="50" cy="36" r="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="41" cy="33" r="2.4" fill="#111"/>
      <circle cx="59" cy="33" r="2.4" fill="#111"/>
      <path d="M39 44 q11 12 22 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M33 64 q17 -9 34 0 l5 58 h-44 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="60" y="92" width="22" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M82 96 q8 0 8 6 q0 6 -8 6" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M64 92 q3 -6 6 0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 100 150">
      <ellipse cx="50" cy="36" rx="23" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- curly hair pulled up -->
      <path d="M28 30 q-4 -22 22 -24 q26 2 22 24 q-6 -12 -22 -12 q-16 0 -22 12z" fill="#111" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="6" r="5" fill="#111"/>
      <path d="M26 30 q-6 6 -2 14 q3 -6 6 -8z" fill="#111"/>
      <path d="M74 30 q6 6 2 14 q-3 -6 -6 -8z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="34" y="32" width="13" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="53" y="32" width="13" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="47" y1="36" x2="53" y2="36" stroke="#111" stroke-width="2"/>
      <circle cx="40.5" cy="36.5" r="1.5" fill="#111"/>
      <circle cx="59.5" cy="36.5" r="1.5" fill="#111"/>
      <path d="M43 50 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M33 64 q17 -8 34 0 l5 58 h-44 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- rolled sleeve cuffs -->
      <path d="M33 88 l-4 4 M67 88 l4 4" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="30" y="84" width="8" height="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="62" y="84" width="8" height="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE BOSS: two tall hair spikes, tiny eyes, suit and tie -->
    <symbol id="boss" viewBox="0 0 100 150">
      <ellipse cx="50" cy="40" rx="22" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M36 20 q-6 -20 4 -18 q4 8 6 12z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M64 20 q6 -20 -4 -18 q-4 8 -6 12z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M40 18 q10 -4 20 0" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="43" cy="40" r="1.8" fill="#111"/>
      <circle cx="57" cy="40" r="1.8" fill="#111"/>
      <path d="M44 52 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 66 q16 -8 32 0 l5 56 h-42 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 66 l-6 10 l6 5 l6 -5 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M50 81 l-3 22 l3 5 l3 -5 z" fill="#111"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="24" width="52" height="46" rx="6" fill="#c9ccce" stroke="#111" stroke-width="2.4"/>
      <line x1="50" y1="24" x2="50" y2="12" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="9" r="3.4" fill="#111"/>
      <!-- slot eyes glowing -->
      <rect x="32" y="36" width="14" height="7" rx="3.5" fill="#eafaff" stroke="#111" stroke-width="2"/>
      <rect x="54" y="36" width="14" height="7" rx="3.5" fill="#eafaff" stroke="#111" stroke-width="2"/>
      <!-- grille mouth -->
      <rect x="34" y="52" width="32" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="52" x2="40" y2="62" stroke="#111" stroke-width="1.4"/>
      <line x1="46" y1="52" x2="46" y2="62" stroke="#111" stroke-width="1.4"/>
      <line x1="52" y1="52" x2="52" y2="62" stroke="#111" stroke-width="1.4"/>
      <line x1="58" y1="52" x2="58" y2="62" stroke="#111" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- clock on wall showing morning -->
    <circle cx="358" cy="42" r="18" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <line x1="358" y1="42" x2="358" y2="30" stroke="#111" stroke-width="2"/>
    <line x1="358" y1="42" x2="367" y2="46" stroke="#111" stroke-width="2"/>
    <circle cx="358" cy="42" r="2" fill="#111"/>

    <!-- meeting table -->
    <rect x="40" y="250" width="320" height="70" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <ellipse cx="200" cy="252" rx="160" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>

    <!-- people filing in / seated -->
    <use href="#dailbert" x="60" y="130" width="90" height="135"/>
    <use href="#doug" x="140" y="132" width="90" height="135"/>
    <use href="#priya" x="222" y="130" width="90" height="135"/>

    <!-- wall monitor with clanker -->
    <rect x="298" y="150" width="86" height="60" rx="4" fill="#222" stroke="#111" stroke-width="2.4"/>
    <rect x="303" y="155" width="76" height="50" rx="2" fill="#2b2f31"/>
    <use href="#clanker" x="316" y="156" width="50" height="50"/>
    <rect x="334" y="210" width="14" height="8" fill="#222"/>
    <rect x="320" y="218" width="42" height="4" rx="2" fill="#111"/>

    <!-- Dailbert balloon -->
    <path d="M50 110 q-4 -34 30 -34 h58 q34 0 30 34 q4 34 -30 34 h-20 l-8 12 l-4 -12 h-26 q-34 0 -30 -34z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="110" y="96" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">So. Last night's</text>
    <text x="110" y="112" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">3 a.m. outage.</text>
    <text x="110" y="128" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Where do we start?</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- table -->
    <rect x="454" y="250" width="320" height="70" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <ellipse cx="614" cy="252" rx="160" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>

    <use href="#dailbert" x="470" y="128" width="88" height="132"/>
    <use href="#doug" x="640" y="128" width="88" height="132"/>

    <!-- wall monitor with clanker, centered -->
    <rect x="560" y="70" width="120" height="86" rx="5" fill="#222" stroke="#111" stroke-width="2.6"/>
    <rect x="567" y="77" width="106" height="72" rx="2" fill="#2b2f31"/>
    <use href="#clanker" x="588" y="80" width="64" height="64"/>
    <rect x="614" y="156" width="16" height="9" fill="#222"/>
    <rect x="598" y="165" width="48" height="4" rx="2" fill="#111"/>

    <!-- clanker screen-edged balloon + dashed line to monitor -->
    <line x1="595" y1="82" x2="560" y2="60" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
    <rect x="432" y="22" width="196" height="72" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-dasharray="1 0"/>
    <text x="530" y="43" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Resolved at 3:14.</text>
    <text x="530" y="59" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Postmortem written.</text>
    <text x="530" y="75" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Six action items filed,</text>
    <text x="530" y="91" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">assigned, and closed.</text>

    <!-- Doug balloon -->
    <path d="M690 128 q-4 -28 26 -28 h44 q30 0 26 28 q4 28 -26 28 h-30 l-6 10 l-4 -10 h-4 q-30 0 -26 -28z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="742" y="122" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Assigned to who?</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- table -->
    <rect x="868" y="250" width="320" height="70" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <ellipse cx="1028" cy="252" rx="160" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>

    <!-- Priya closing her laptop, winning -->
    <use href="#priya" x="880" y="118" width="94" height="140"/>
    <use href="#doug" x="1080" y="130" width="86" height="128"/>

    <!-- clanker on wall monitor, dim now -->
    <rect x="1000" y="86" width="86" height="60" rx="4" fill="#222" stroke="#111" stroke-width="2.4"/>
    <rect x="1005" y="91" width="76" height="50" rx="2" fill="#2b2f31"/>
    <use href="#clanker" x="1018" y="92" width="50" height="50"/>
    <rect x="1036" y="146" width="14" height="8" fill="#222"/>
    <rect x="1022" y="154" width="42" height="4" rx="2" fill="#111"/>

    <!-- clanker small dashed balloon -->
    <line x1="1010" y1="94" x2="988" y2="76" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
    <rect x="905" y="40" width="120" height="42" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="965" y="60" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">To me. Done at</text>
    <text x="965" y="76" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">3:15. Sorry.</text>

    <!-- Priya balloon: the win / deadpan button -->
    <path d="M886 152 q-4 -32 30 -32 h86 q34 0 30 32 q4 32 -30 32 h-46 l-7 11 l-4 -11 h-29 q-34 0 -30 -32z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="959" y="143" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Great. The meeting's</text>
    <text x="959" y="159" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">an action item.</text>
    <text x="959" y="175" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Close it.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>