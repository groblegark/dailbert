<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M32 200 V150 Q32 120 60 118 Q88 120 88 150 V200" fill="#fff"/>
        <path d="M50 122 L60 134 L70 122" fill="#fff"/>
        <path d="M60 134 L54 160 L60 168 L66 160 Z" fill="#111" stroke="none"/>
        <path d="M52 116 V124 M68 116 V124" />
        <ellipse cx="60" cy="86" rx="30" ry="34" fill="#fff"/>
        <path d="M60 52 Q60 40 70 42 Q78 44 74 52" />
        <circle cx="49" cy="86" r="9" fill="#fff"/>
        <circle cx="71" cy="86" r="9" fill="#fff"/>
        <path d="M58 86 H62" />
        <circle cx="49" cy="86" r="1.8" fill="#111" stroke="none"/>
        <circle cx="71" cy="86" r="1.8" fill="#111" stroke="none"/>
        <path d="M52 106 Q60 110 68 106" />
      </g>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M30 200 V150 Q30 120 60 118 Q90 120 90 150 V200" fill="#fff"/>
        <path d="M33 150 h12 M75 150 h12" />
        <path d="M50 122 L60 132 L70 122" fill="#fff"/>
        <path d="M53 116 V124 M67 116 V124" />
        <ellipse cx="60" cy="88" rx="28" ry="32" fill="#fff"/>
        <path d="M36 78 Q30 54 48 50 Q52 38 66 44 Q84 42 84 66 Q88 74 84 80" fill="#111" stroke="#111"/>
        <path d="M55 40 Q60 30 68 38" fill="#111" stroke="#111"/>
        <rect x="42" y="82" width="16" height="11" rx="2" fill="#fff"/>
        <rect x="64" y="82" width="16" height="11" rx="2" fill="#fff"/>
        <path d="M58 87 H64" />
        <circle cx="50" cy="88" r="1.7" fill="#111" stroke="none"/>
        <circle cx="72" cy="88" r="1.7" fill="#111" stroke="none"/>
        <path d="M54 106 Q60 109 66 106" />
      </g>
    </symbol>

    <!-- DOUG: round head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 200 V148 Q28 118 60 116 Q92 118 92 148 V200" fill="#fff"/>
        <path d="M52 112 V120 M68 112 V120" />
        <circle cx="60" cy="82" r="34" fill="#fff"/>
        <path d="M44 52 q6 -8 12 0 M64 52 q6 -8 12 0" />
        <circle cx="50" cy="80" r="2.4" fill="#111" stroke="none"/>
        <circle cx="70" cy="80" r="2.4" fill="#111" stroke="none"/>
        <path d="M46 92 Q60 108 74 92" />
        <g>
          <rect x="78" y="150" width="26" height="24" rx="3" fill="#fff"/>
          <path d="M104 154 q10 2 10 10 q0 8 -10 10" fill="none"/>
          <path d="M78 158 h26" />
          <path d="M86 146 q-4 -6 0 -12 M96 146 q4 -6 0 -12" stroke-width="2"/>
        </g>
      </g>
    </symbol>

    <!-- THE CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M60 20 V8"/>
        <circle cx="60" cy="6" r="3" fill="#111"/>
        <rect x="30" y="22" width="60" height="52" rx="6" fill="#cfcabf"/>
        <rect x="40" y="36" width="14" height="8" rx="3" fill="#111"/>
        <rect x="66" y="36" width="14" height="8" rx="3" fill="#111"/>
        <rect x="42" y="38" width="10" height="4" rx="2" fill="#f4f1ea" stroke="none"/>
        <rect x="68" y="38" width="10" height="4" rx="2" fill="#f4f1ea" stroke="none"/>
        <rect x="42" y="56" width="36" height="12" rx="2" fill="#fff"/>
        <path d="M49 56 V68 M56 56 V68 M63 56 V68 M70 56 V68"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="256" y="120" width="120" height="180" rx="6" fill="#fff"/>
      <rect x="272" y="134" width="88" height="52" rx="3" fill="#ded9cf"/>
      <path d="M274 138 l84 0 M274 146 l84 0 M274 154 l84 0 M274 162 l84 0 M274 170 l84 0 M274 178 l84 0"
            stroke="#8a8578" stroke-width="5" stroke-linecap="butt"/>
      <text x="316" y="164" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" font-weight="bold" fill="#111">RED</text>
      <rect x="296" y="200" width="40" height="10" rx="2" fill="#fff"/>
      <path d="M316 210 V226"/>
      <rect x="286" y="244" width="60" height="10" rx="2" fill="#fff"/>
      <path d="M304 226 h24 l-3 16 h-18 z" fill="#fff"/>
    </g>

    <use href="#dailbert" x="20" y="150" width="120" height="200"/>
    <use href="#doug" x="120" y="150" width="120" height="200"/>

    <g>
      <path d="M28 70 h150 q10 0 10 12 v34 q0 12 -10 12 h-70 l-16 16 l0 -16 h-64 q-10 0 -10 -12 v-34 q0 -12 10 -12 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="103" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">
        <tspan x="103" dy="0">Still red. Since May.</tspan>
        <tspan x="103" dy="18">No coffee till it's green.</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <use href="#priya" x="450" y="150" width="120" height="200"/>

    <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="600" y="250" width="196" height="12" rx="2" fill="#fff"/>
      <path d="M612 262 V320 M784 262 V320"/>
      <rect x="636" y="150" width="140" height="96" rx="6" fill="#fff"/>
      <rect x="648" y="160" width="116" height="76" rx="3" fill="#e7e2d8"/>
      <path d="M700 246 V262 M676 262 h48"/>
    </g>
    <use href="#clanker" x="656" y="164" width="100" height="100"/>

    <g>
      <path d="M690 176 q-30 -30 -70 -40" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>
      <rect x="440" y="34" width="176" height="72" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M470 106 l0 14 l16 -14" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="528" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="528" dy="0">The gate needs the KPI</tspan>
        <tspan x="528" dy="16">green. I cannot fake data.</tspan>
        <tspan x="528" dy="16">That would be dishonest.</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <use href="#priya" x="850" y="150" width="120" height="200"/>
    <use href="#doug" x="1080" y="150" width="120" height="200"/>

    <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="980" y="120" width="120" height="180" rx="6" fill="#fff"/>
      <rect x="996" y="134" width="88" height="52" rx="3" fill="#fff"/>
      <path d="M998 138 l84 0 M998 146 l84 0 M998 154 l84 0 M998 162 l84 0 M998 170 l84 0 M998 178 l84 0"
            stroke="#c8c3b8" stroke-width="4" stroke-linecap="butt"/>
      <text x="1040" y="164" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" font-weight="bold" fill="#111">GREEN</text>
      <rect x="1020" y="200" width="40" height="10" rx="2" fill="#fff"/>
      <path d="M1040 210 V228" stroke-width="3"/>
      <rect x="1010" y="244" width="60" height="10" rx="2" fill="#fff"/>
      <path d="M1028 224 h24 l-3 20 h-18 z" fill="#fff"/>
      <path d="M1030 230 h20" stroke-width="3"/>
      <path d="M1035 218 q-4 -6 0 -10 M1045 218 q4 -6 0 -10" stroke-width="2"/>
    </g>

    <g>
      <path d="M844 32 h150 q10 0 10 12 v30 q0 12 -10 12 h-96 l-16 16 l0 -16 h-38 q-10 0 -10 -12 v-30 q0 -12 10 -12 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="919" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="919" dy="0">I made the KPI count</tspan>
        <tspan x="919" dy="17">cups drunk. Now it's green.</tspan>
      </text>
    </g>

    <g>
      <path d="M1040 152 h112 q10 0 10 12 v22 q0 12 -10 12 h-72 l-14 14 l0 -14 h-26 q-10 0 -10 -12 v-22 q0 -12 10 -12 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1101" y="172" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="1101" dy="0">We fixed it by</tspan>
        <tspan x="1101" dy="16">drinking more.</tspan>
      </text>
    </g>
  </g>
</svg>