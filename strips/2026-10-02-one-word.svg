<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">One Word</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-10-02</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -12 4 -18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.2" fill="#111"/>
      <circle cx="71" cy="46" r="2.2" fill="#111"/>
      <path d="M50 64 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M38 78 q22 14 44 0 l14 40 q-36 16 -72 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-6 8 l6 26 l6 -26 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="46" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="44" r="2.8" fill="#111"/>
      <circle cx="71" cy="44" r="2.8" fill="#111"/>
      <path d="M45 56 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 80 q22 14 44 0 l12 38 q-34 16 -68 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="86" y="96" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M112 101 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M92 96 q-2 -8 6 -12" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M28 44 q0 -34 32 -34 q32 0 32 34 q0 6 -4 10 l-56 0 q-4 -4 -4 -10 Z" fill="#111"/>
      <circle cx="60" cy="9" r="10" fill="#111"/>
      <ellipse cx="60" cy="48" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M33 44 q4 -22 27 -22 q23 0 27 22 q-14 -10 -27 -10 q-13 0 -27 10 Z" fill="#111"/>
      <rect x="40" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="49" x2="64" y2="49" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="49.5" r="2" fill="#111"/>
      <circle cx="72" cy="49.5" r="2" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M38 80 q22 13 44 0 l13 38 q-35 16 -70 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="46" y1="104" x2="42" y2="112" stroke="#111" stroke-width="2.2"/>
      <line x1="74" y1="104" x2="78" y2="112" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#7d8790" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#9aa4ad"/>
      <rect x="26" y="20" width="68" height="56" rx="7" fill="#cfd6db" stroke="#6f7981" stroke-width="2.6"/>
      <rect x="32" y="26" width="56" height="44" rx="5" fill="#aeb7be" stroke="#6f7981" stroke-width="1.6"/>
      <rect x="38" y="38" width="16" height="7" rx="3.5" fill="#eafaff" stroke="#6f7981" stroke-width="1.4"/>
      <rect x="66" y="38" width="16" height="7" rx="3.5" fill="#eafaff" stroke="#6f7981" stroke-width="1.4"/>
      <g stroke="#6f7981" stroke-width="2">
        <line x1="42" y1="56" x2="78" y2="56"/>
        <line x1="42" y1="61" x2="78" y2="61"/>
        <line x1="42" y1="66" x2="78" y2="66"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL FRAMES ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  </g>

  <!-- ===================== PANEL 1 ===================== -->
  <!-- The clanker announces the one-word policy on a monitor. Dailbert reads it. -->
  <g>
    <line x1="1" y1="300" x2="399" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Desk + monitor with clanker -->
    <rect x="40" y="238" width="150" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <line x1="56" y1="248" x2="56" y2="300" stroke="#111" stroke-width="2.2"/>
    <line x1="174" y1="248" x2="174" y2="300" stroke="#111" stroke-width="2.2"/>
    <rect x="60" y="150" width="150" height="94" rx="6" fill="#1b1f22" stroke="#111" stroke-width="2.6"/>
    <rect x="68" y="158" width="134" height="78" rx="3" fill="#242a2e"/>
    <use href="#clanker" x="86" y="146" width="98" height="98"/>
    <rect x="118" y="244" width="30" height="10" fill="#1b1f22" stroke="#111" stroke-width="2.2"/>

    <!-- Dailbert standing, reading -->
    <use href="#dailbert" x="258" y="150" width="118" height="158"/>

    <!-- Clanker speech: rectangular screen balloon -->
    <g>
      <rect x="34" y="18" width="196" height="82" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="22" x2="40" y2="96" stroke="#111" stroke-width="1.2" stroke-dasharray="1 3"/>
      <text x="134" y="38" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">New policy, to reduce</text>
      <text x="134" y="55" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">email volume:</text>
      <text x="134" y="76" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" font-weight="bold" fill="#111">reply in one word.</text>
      <text x="134" y="93" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">Details to follow.</text>
      <path d="M96 100 l-6 22 l20 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="102" y1="108" x2="130" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="2 4"/>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <!-- The "details" arrive: a six-hundred-word wall of text on a screen. Dailbert + Doug. -->
  <g>
    <line x1="415" y1="300" x2="813" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Big wall screen with the memo -->
    <rect x="560" y="26" width="240" height="200" rx="6" fill="#1b1f22" stroke="#111" stroke-width="2.6"/>
    <rect x="568" y="34" width="224" height="184" rx="3" fill="#f6f4ee"/>
    <text x="578" y="52" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" font-weight="bold" fill="#111">RE: One-Word Policy</text>
    <line x1="578" y1="58" x2="782" y2="58" stroke="#111" stroke-width="1.2"/>
    <!-- dense wall of "text" as ruled lines -->
    <g stroke="#3a4147" stroke-width="1.3">
      <line x1="578" y1="70" x2="782" y2="70"/><line x1="578" y1="78" x2="786" y2="78"/>
      <line x1="578" y1="86" x2="776" y2="86"/><line x1="578" y1="94" x2="788" y2="94"/>
      <line x1="578" y1="102" x2="770" y2="102"/><line x1="578" y1="110" x2="786" y2="110"/>
      <line x1="578" y1="118" x2="782" y2="118"/><line x1="578" y1="126" x2="788" y2="126"/>
      <line x1="578" y1="134" x2="766" y2="134"/><line x1="578" y1="142" x2="786" y2="142"/>
      <line x1="578" y1="150" x2="780" y2="150"/><line x1="578" y1="158" x2="788" y2="158"/>
      <line x1="578" y1="166" x2="772" y2="166"/><line x1="578" y1="174" x2="786" y2="174"/>
      <line x1="578" y1="182" x2="784" y2="182"/><line x1="578" y1="190" x2="762" y2="190"/>
      <line x1="578" y1="198" x2="788" y2="198"/><line x1="578" y1="206" x2="748" y2="206"/>
    </g>

    <!-- Dailbert + Doug standing, looking up at it -->
    <use href="#dailbert" x="430" y="150" width="118" height="158"/>
    <use href="#doug" x="486" y="150" width="120" height="158"/>

    <!-- Dailbert speech (dry) -->
    <g>
      <rect x="424" y="24" width="128" height="66" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="488" y="46" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">That's the</text>
      <text x="488" y="63" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">one-word</text>
      <text x="488" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">policy?</text>
      <path d="M470 90 l-2 20 l16 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>

    <!-- Doug button -->
    <g>
      <rect x="470" y="232" width="196" height="46" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="568" y="254" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Six hundred words.</text>
      <text x="568" y="271" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I counted.</text>
      <path d="M556 232 l-6 -20 20 12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <!-- Priya wins: she just replies in one word. The clanker cannot. -->
  <g>
    <line x1="829" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Desk + monitor with clanker -->
    <rect x="860" y="238" width="150" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <line x1="876" y1="248" x2="876" y2="300" stroke="#111" stroke-width="2.2"/>
    <line x1="994" y1="248" x2="994" y2="300" stroke="#111" stroke-width="2.2"/>
    <rect x="880" y="150" width="150" height="94" rx="6" fill="#1b1f22" stroke="#111" stroke-width="2.6"/>
    <rect x="888" y="158" width="134" height="78" rx="3" fill="#242a2e"/>
    <use href="#clanker" x="906" y="146" width="98" height="98"/>
    <rect x="938" y="244" width="30" height="10" fill="#1b1f22" stroke="#111" stroke-width="2.2"/>

    <!-- Priya standing, calm -->
    <use href="#priya" x="1078" y="150" width="118" height="158"/>

    <!-- Priya's reply balloon -->
    <g>
      <rect x="1044" y="26" width="150" height="46" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1119" y="54" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">My reply: "No."</text>
      <path d="M1120 72 l6 22 l14 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>

    <!-- Clanker's reply, still too long -->
    <g>
      <rect x="852" y="24" width="176" height="82" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="858" y1="28" x2="858" y2="102" stroke="#111" stroke-width="1.2" stroke-dasharray="1 3"/>
      <text x="944" y="44" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Understood.</text>
      <text x="944" y="64" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">Though for full context,</text>
      <text x="944" y="78" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">I have appended a brief</text>
      <text x="944" y="92" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">clarifying addendum...</text>
      <path d="M912 106 l-4 22 l18 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="916" y1="114" x2="946" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="2 4"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>