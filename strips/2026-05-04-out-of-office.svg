    <rect x="172" y="96" width="151" height="124" rx="3" fill="#2b2b2b" stroke="#111" stroke-width="2"/>
    <use href="#clanker" x="185" y="102" width="128" height="118"/>
    <!-- clanker rectangular balloon + dashed line to screen -->
    <line x1="303" y1="96" x2="273" y2="20" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="204" y="14" width="182" height="74" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">
      <text x="295" y="38">I helped. It now</text>
      <text x="295" y="57">replies to every</text>
      <text x="295" y="76">mail. Even its own.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <line x1="12" y1="302" x2="390" y2="302" stroke="#111" stroke-width="2"/>
    <!-- table + laptop -->
    <line x1="48" y1="242" x2="205" y2="242" stroke="#111" stroke-width="2"/>
    <use href="#priya" x="40" y="120" width="125" height="180"/>
    <rect x="70" y="234" width="112" height="8" rx="2" fill="#d9d9d9" stroke="#111" stroke-width="2"/>
    <path d="M80 234 L88 190 L172 190 L180 234 Z" fill="#eef0ee" stroke="#111" stroke-width="2"/>
    <rect x="112" y="200" width="13" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="130" y1="207" x2="158" y2="207" stroke="#111" stroke-width="2"/>
