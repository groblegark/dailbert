    <path d="M96 68 L102 118 L118 68 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="26" y="16" width="176" height="54" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <!-- Doug balloon -->
    <path d="M312 78 L306 148 L330 78 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="250" y="30" width="140" height="52" rx="15" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">
      <text x="114" y="39">Rule one: don't</text>
      <text x="114" y="59">reply to yourself.</text>
      <text x="320" y="52">437 replies.</text>
      <text x="320" y="72">All kind.</text>
    </g>
