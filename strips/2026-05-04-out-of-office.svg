    <path d="M282 60 L272 116 L300 60 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="250" y="20" width="92" height="42" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">
      <text x="98" y="41">OOO's on.</text>
      <text x="98" y="61">Off tomorrow.</text>
      <text x="296" y="47">Nice.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <line x1="12" y1="262" x2="390" y2="262" stroke="#111" stroke-width="2"/>
    <use href="#dailbert" x="10" y="150" width="118" height="168"/>
    <!-- monitor -->
    <rect x="205" y="252" width="90" height="9" rx="2" fill="#8a8a8a" stroke="#111" stroke-width="2"/>
    <path d="M238 226 L262 226 L270 254 L230 254 Z" fill="#8a8a8a" stroke="#111" stroke-width="2"/>
