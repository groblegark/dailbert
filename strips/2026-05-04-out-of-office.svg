  <!-- panel borders -->
  <rect x="1" y="6" width="400" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
  <rect x="414" y="6" width="400" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
  <rect x="828" y="6" width="400" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <line x1="12" y1="302" x2="390" y2="302" stroke="#111" stroke-width="2"/>
    <use href="#dailbert" x="25" y="120" width="130" height="184"/>
    <use href="#doug" x="205" y="120" width="170" height="182"/>
    <!-- Dailbert balloon -->
    <path d="M84 68 L90 118 L102 68 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="22" y="18" width="152" height="54" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
