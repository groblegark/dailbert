      <path d="M50 74 L45 82 L50 104 L55 82 Z" fill="#111"/>
      <ellipse cx="50" cy="38" rx="24" ry="27" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M50 12 Q58 4 62 12 Q60 16 54 15" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="41" cy="38" r="8" fill="#fff" stroke="#111" stroke-width="2.4"/>
