    <symbol id="d_clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="6" stroke="#dfe6ea" stroke-width="2.4"/>
      <circle cx="50" cy="5" r="3" fill="#dfe6ea"/>
      <rect x="24" y="18" width="52" height="46" rx="6" fill="#2a3138" stroke="#aeb8bf" stroke-width="2.4"/>
      <rect x="32" y="30" width="14" height="6" rx="3" fill="#bfe9ff"/>
      <rect x="54" y="30" width="14" height="6" rx="3" fill="#bfe9ff"/>
      <line x1="34" y1="50" x2="66" y2="50" stroke="#aeb8bf" stroke-width="2"/>
      <line x1="38" y1="46" x2="38" y2="54" stroke="#aeb8bf" stroke-width="2"/>
      <line x1="46" y1="46" x2="46" y2="54" stroke="#aeb8bf" stroke-width="2"/>
      <line x1="54" y1="46" x2="54" y2="54" stroke="#aeb8bf" stroke-width="2"/>
      <line x1="62" y1="46" x2="62" y2="54" stroke="#aeb8bf" stroke-width="2"/>
