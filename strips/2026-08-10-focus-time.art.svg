      <rect x="33" y="36" width="15" height="10" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="52" y="36" width="15" height="10" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
