  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <svg x="0" y="0" width="400" height="340"><use href="#d_panel"/></svg>
  <g>
    <use href="#d_dailbert" x="40" y="150" width="150" height="195"/>
    <rect x="0" y="300" width="220" height="40" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>
    <rect x="230" y="150" width="150" height="118" rx="6" fill="#1c2126" stroke="#111" stroke-width="2.6"/>
    <rect x="238" y="158" width="134" height="102" rx="3" fill="#232a30"/>
    <use href="#d_clanker" x="268" y="168" width="78" height="78"/>
    <rect x="290" y="268" width="30" height="18" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>
    <rect x="270" y="286" width="70" height="8" rx="3" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>

    <path d="M22 40 H210 Q222 40 222 54 V96 Q222 110 210 110 H80 L64 128 L66 110 H22 Q10 110 10 96 V54 Q10 40 22 40 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="116" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I built an agent to</text>
    <text x="116" y="80" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">decline my low-value</text>
    <text x="116" y="98" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">meetings. Focus time.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <svg x="414" y="0" width="400" height="340"><use href="#d_panel"/></svg>
  <g transform="translate(414,0)">
    <rect x="30" y="150" width="150" height="118" rx="6" fill="#1c2126" stroke="#111" stroke-width="2.6"/>
    <rect x="38" y="158" width="134" height="102" rx="3" fill="#232a30"/>
    <use href="#d_clanker" x="68" y="168" width="78" height="78"/>
    <rect x="90" y="268" width="30" height="18" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>
    <rect x="70" y="286" width="70" height="8" rx="3" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>
    <rect x="0" y="300" width="400" height="40" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>

    <path d="M150 200 Q200 180 244 175" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="196" y="42" width="196" height="98" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="294" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Done. It declined</text>
    <text x="294" y="84" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">nineteen meetings</text>
    <text x="294" y="102" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">and your own</text>
    <text x="294" y="120" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">one-on-one.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <svg x="828" y="0" width="400" height="340"><use href="#d_panel"/></svg>
  <g transform="translate(828,0)">
    <use href="#d_priya" x="24" y="120" width="150" height="195"/>
    <use href="#d_dailbert" x="196" y="150" width="140" height="182"/>
    <rect x="0" y="300" width="400" height="40" fill="#e6e1d6" stroke="#111" stroke-width="2.2"/>

    <path d="M120 32 H360 Q372 32 372 46 V92 Q372 106 360 106 H190 L176 124 L178 106 H120 Q108 106 108 92 V46 Q108 32 120 32 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="240" y="55" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It was right about</text>
    <text x="240" y="73" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">the other nineteen.</text>
    <text x="240" y="94" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I moved yours to mine.</text>
  </g>
</svg>