      <circle cx="59" cy="38" r="2.2" fill="#111"/>
      <path d="M42 54 Q50 57 58 54" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="d_priya" viewBox="0 0 100 130">
      <rect x="45" y="60" width="10" height="14" fill="#111"/>
      <path d="M26 118 Q28 78 50 74 Q72 78 74 118 Z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M44 76 L50 84 L56 76" fill="none" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="50" cy="40" rx="23" ry="26" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M28 34 Q24 14 44 12 Q52 4 62 12 Q78 16 72 36 Q70 24 60 20 Q50 16 40 20 Q30 24 30 36 Z" fill="#111"/>
      <path d="M46 10 Q52 2 58 8 Q56 14 50 12 Z" fill="#111"/>
