<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -10 4 -16 q-3 8 -8 4" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M50 66 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M50 78 L50 92 L70 92 L70 78" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M30 190 q0 -78 30 -100 q30 22 30 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 92 L60 104 L70 92" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M60 104 L55 140 L60 150 L65 140 Z" fill="#111"/>
      <path d="M56 106 L64 106 L60 112 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="44" r="2.6" fill="#111"/>
      <circle cx="71" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M28 190 q0 -74 32 -96 q32 22 32 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M88 150 q22 -4 20 -30" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="96" y="112" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M120 116 q9 3 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <line x1="100" y1="118" x2="116" y2="118" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="30" rx="20" ry="14" fill="#111"/>
      <ellipse cx="60" cy="48" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M32 44 q-4 -30 28 -34 q32 4 28 34 q-8 -18 -28 -18 q-20 0 -28 18Z" fill="#111"/>
      <rect x="40" y="42" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="62" y="42" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="48" x2="62" y2="48" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="48" r="1.8" fill="#111"/>
      <circle cx="71" cy="48" r="1.8" fill="#111"/>
      <path d="M52 68 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M30 190 q0 -76 30 -98 q30 22 30 98 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M34 150 q6 6 14 4" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M86 150 q-6 6 -14 4" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: chrome robot head, slot eyes, grille mouth, antenna -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#8a8f96" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#8a8f96"/>
      <rect x="26" y="20" width="68" height="58" rx="8" fill="#3a4048" stroke="#8a8f96" stroke-width="2.6"/>
      <rect x="36" y="38" width="18" height="8" rx="4" fill="#cfe9ff"/>
      <rect x="66" y="38" width="18" height="8" rx="4" fill="#cfe9ff"/>
      <rect x="42" y="58" width="36" height="10" rx="2" fill="#20252b" stroke="#8a8f96" stroke-width="1.6"/>
      <line x1="50" y1="58" x2="50" y2="68" stroke="#8a8f96" stroke-width="1.4"/>
      <line x1="58" y1="58" x2="58" y2="68" stroke="#8a8f96" stroke-width="1.4"/>
      <line x1="66" y1="58" x2="66" y2="68" stroke="#8a8f96" stroke-width="1.4"/>
      <line x1="74" y1="58" x2="74" y2="68" stroke="#8a8f96" stroke-width="1.4"/>
    </symbol>

    <clipPath id="clipA"><rect x="0" y="0" width="400" height="340" rx="3"/></clipPath>
    <clipPath id="clipB"><rect x="414" y="0" width="400" height="340" rx="3"/></clipPath>
    <clipPath id="clipC"><rect x="828" y="0" width="400" height="340" rx="3"/></clipPath>
  </defs>

  <!-- ============ PANEL A ============ -->
  <g clip-path="url(#clipA)">
    <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
    <rect x="0" y="272" width="400" height="68" fill="#e9e5db"/>
    <line x1="0" y1="272" x2="400" y2="272" stroke="#111" stroke-width="2.4"/>
    <!-- monitor showing the report doc -->
    <rect x="232" y="150" width="150" height="106" rx="6" fill="#20252b" stroke="#111" stroke-width="2.8"/>
    <rect x="244" y="162" width="126" height="82" rx="3" fill="#eef0ef"/>
    <rect x="290" y="256" width="34" height="16" fill="#20252b" stroke="#111" stroke-width="2.4"/>
    <rect x="268" y="272" width="78" height="8" rx="2" fill="#111"/>
    <text x="250" y="177" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#333">WEEKLY REPORT</text>
    <line x1="250" y1="185" x2="362" y2="185" stroke="#b7bab6" stroke-width="3"/>
    <line x1="250" y1="195" x2="352" y2="195" stroke="#b7bab6" stroke-width="3"/>
    <line x1="250" y1="205" x2="362" y2="205" stroke="#b7bab6" stroke-width="3"/>
    <line x1="250" y1="215" x2="330" y2="215" stroke="#b7bab6" stroke-width="3"/>
    <text x="250" y="233" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="7" fill="#8a8d89">4. status: fine, i guess</text>
    <use href="#dailbert" x="20" y="120" width="150" height="230"/>
    <g>
      <rect x="12" y="24" width="206" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M62 88 L54 114 L84 88 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="115" y="47" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Weekly report. Filed.</text>
      <text x="115" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Nobody reads these.</text>
      <text x="115" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I hide jokes in them.</text>
    </g>
  </g>

  <!-- ============ PANEL B ============ -->
  <g clip-path="url(#clipB)">
    <rect x="414" y="0" width="400" height="340" fill="#f4f1ea"/>
    <rect x="414" y="272" width="400" height="68" fill="#e9e5db"/>
    <line x1="414" y1="272" x2="814" y2="272" stroke="#111" stroke-width="2.4"/>
    <rect x="466" y="152" width="150" height="106" rx="6" fill="#20252b" stroke="#111" stroke-width="2.8"/>
    <rect x="478" y="164" width="126" height="82" rx="3" fill="#2b3138"/>
    <rect x="524" y="258" width="34" height="16" fill="#20252b" stroke="#111" stroke-width="2.4"/>
    <rect x="502" y="272" width="78" height="8" rx="2" fill="#111"/>
    <use href="#clanker" x="494" y="168" width="96" height="88"/>
    <use href="#dailbert" x="616" y="150" width="128" height="200"/>
    <use href="#doug" x="694" y="150" width="132" height="200"/>
    <g>
      <line x1="540" y1="120" x2="548" y2="168" stroke="#111" stroke-width="1.4" stroke-dasharray="5 4"/>
      <rect x="424" y="20" width="224" height="100" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="428" y="24" width="216" height="92" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="536" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I read footnote 4.</text>
      <text x="536" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">"Status: fine, I guess."</text>
      <text x="536" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">So I set the project</text>
      <text x="536" y="101" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">status to match.</text>
    </g>
  </g>

  <!-- ============ PANEL C ============ -->
  <g clip-path="url(#clipC)">
    <rect x="828" y="0" width="400" height="340" fill="#f4f1ea"/>
    <rect x="828" y="272" width="400" height="68" fill="#e9e5db"/>
    <line x1="828" y1="272" x2="1228" y2="272" stroke="#111" stroke-width="2.4"/>
    <rect x="854" y="150" width="158" height="108" rx="6" fill="#20252b" stroke="#111" stroke-width="2.8"/>
    <rect x="866" y="162" width="134" height="84" rx="3" fill="#eef0ef"/>
    <rect x="915" y="258" width="34" height="16" fill="#20252b" stroke="#111" stroke-width="2.4"/>
    <rect x="893" y="274" width="78" height="8" rx="2" fill="#111"/>
    <text x="933" y="180" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#333">PROJECT STATUS</text>
    <line x1="874" y1="186" x2="992" y2="186" stroke="#c3c6c2" stroke-width="1.6"/>
    <text x="933" y="214" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" fill="#111">FINE,</text>
    <text x="933" y="235" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" fill="#111">I GUESS</text>
    <use href="#priya" x="1046" y="140" width="152" height="232"/>
    <g>
      <rect x="850" y="26" width="240" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M1024 90 L1040 116 L1058 90 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="970" y="49" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Leave it. Most honest</text>
      <text x="970" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">status this board has</text>
      <text x="970" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">ever shown.</text>
    </g>
  </g>

  <!-- ============ PANEL BORDERS (drawn last) ============ -->
  <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  <rect x="415" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  <rect x="829" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
</svg>