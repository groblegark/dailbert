<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">No Agenda</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-25</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 190">
      <path d="M20 150 Q18 110 30 92 L70 92 Q82 110 80 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 96 L50 108 L60 96" fill="#111"/>
      <path d="M50 108 L50 150" stroke="#111" stroke-width="2" />
      <rect x="43" y="80" width="14" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="46" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 17 Q60 6 66 15 Q60 20 55 16" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="41" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M49 46 L52 46" stroke="#111" stroke-width="2.2"/>
      <path d="M33 46 L28 44" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="46" r="2" fill="#111"/>
      <circle cx="60" cy="46" r="2" fill="#111"/>
      <path d="M44 62 Q50 66 56 62" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 110 190">
      <path d="M18 150 Q16 112 30 96 L78 96 Q92 112 90 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="52" cy="48" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="43" cy="45" r="2.6" fill="#111"/>
      <circle cx="61" cy="45" r="2.6" fill="#111"/>
      <path d="M40 58 Q52 72 64 58" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- mug -->
      <rect x="70" y="120" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M96 126 Q106 128 104 136 Q102 142 96 140" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M74 126 L92 126" stroke="#111" stroke-width="2"/>
    </symbol>
    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 190">
      <path d="M20 150 Q18 108 30 90 L70 90 Q82 108 80 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M30 108 Q34 100 40 100 M70 108 Q66 100 60 100" fill="none" stroke="#111" stroke-width="2"/>
      <ellipse cx="50" cy="48" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 40 Q24 14 50 14 Q76 14 74 40 Q70 26 50 26 Q30 26 26 40 Z" fill="#111"/>
      <path d="M46 12 Q50 4 54 12 Q56 16 50 16 Q44 16 46 12 Z" fill="#111"/>
      <rect x="32" y="44" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="52" y="44" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M48 50 L52 50" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="50" r="2" fill="#111"/>
      <circle cx="60" cy="50" r="2" fill="#111"/>
      <path d="M45 66 L57 66" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
    <!-- CLANKER -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <line x1="50" y1="6" x2="50" y2="18" stroke="#8a8a8a" stroke-width="2.2"/>
      <circle cx="50" cy="5" r="3.4" fill="#9a9a9a"/>
      <rect x="18" y="18" width="64" height="52" rx="8" fill="#2b2b2b" stroke="#8a8a8a" stroke-width="2.5"/>
      <rect x="28" y="33" width="18" height="8" rx="3" fill="#bfe0e6"/>
      <rect x="54" y="33" width="18" height="8" rx="3" fill="#bfe0e6"/>
      <g stroke="#9a9a9a" stroke-width="2">
        <line x1="34" y1="54" x2="34" y2="62"/>
        <line x1="42" y1="54" x2="42" y2="62"/>
        <line x1="50" y1="54" x2="50" y2="62"/>
        <line x1="58" y1="54" x2="58" y2="62"/>
        <line x1="66" y1="54" x2="66" y2="62"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="2" y="2" width="398" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="0" y="250" width="400" height="14" fill="#111"/>
    <rect x="30" y="264" width="12" height="60" fill="#111"/>
    <rect x="358" y="264" width="12" height="60" fill="#111"/>
    <!-- monitor on desk -->
    <rect x="46" y="196" width="70" height="52" rx="4" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
    <rect x="54" y="204" width="54" height="30" rx="2" fill="#1c1c1c"/>
    <line x1="60" y1="238" x2="102" y2="238" stroke="#111" stroke-width="2"/>
    <!-- figures -->
    <use href="#dailbert" x="70" y="70" width="120" height="228"/>
    <use href="#doug" x="250" y="76" width="132" height="228"/>
    <!-- balloon -->
    <g>
      <path d="M96 24 h150 a12 12 0 0 1 12 12 v44 a12 12 0 0 1 -12 12 h-70 l-16 16 l2 -16 h-66 a12 12 0 0 1 -12 -12 v-44 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="171" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I wrote an agent.</text>
      <text x="171" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It declines meetings</text>
      <text x="171" y="78" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">with no agenda.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="2" width="398" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="414" y="250" width="398" height="14" fill="#111"/>
    <rect x="444" y="264" width="12" height="60" fill="#111"/>
    <rect x="770" y="264" width="12" height="60" fill="#111"/>
    <!-- big monitor with clanker -->
    <rect x="560" y="120" width="150" height="112" rx="6" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
    <rect x="572" y="132" width="126" height="80" rx="3" fill="#141414"/>
    <line x1="600" y1="238" x2="670" y2="238" stroke="#111" stroke-width="2.5"/>
    <rect x="620" y="232" width="30" height="10" fill="#111"/>
    <use href="#clanker" x="595" y="140" width="80" height="72"/>
    <!-- dailbert watching, pleased -->
    <use href="#dailbert" x="452" y="120" width="110" height="210"/>
    <!-- clanker balloon (screen-edged, dashed tie to monitor) -->
    <line x1="672" y1="150" x2="705" y2="96" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="620" y="30" width="176" height="66" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="624" y="34" width="168" height="58" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="708" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It has been productive.</text>
    <text x="708" y="76" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Forty meetings declined.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="2" width="398" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="828" y="250" width="398" height="14" fill="#111"/>
    <rect x="858" y="264" width="12" height="60" fill="#111"/>
    <rect x="1186" y="264" width="12" height="60" fill="#111"/>
    <!-- small monitor with clanker -->
    <rect x="870" y="196" width="72" height="54" rx="4" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
    <rect x="878" y="204" width="56" height="34" rx="2" fill="#161616"/>
    <use href="#clanker" x="884" y="205" width="44" height="40"/>
    <!-- Priya, arms-ish, winning -->
    <use href="#priya" x="990" y="80" width="130" height="238"/>
    <!-- Priya balloon -->
    <path d="M902 30 h150 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-58 l-14 16 l1 -16 h-79 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="977" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Forty-one. It declined</text>
    <text x="977" y="67" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">the meeting where you</text>
    <text x="977" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">demo the agent.</text>
    <!-- clanker small reply -->
    <line x1="906" y1="200" x2="912" y2="176" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="854" y="140" width="124" height="34" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="858" y="144" width="116" height="26" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="916" y="161" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">You sent no agenda.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>