<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Self-Review</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-18</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- Scanline pattern for monitor glow -->
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#e9e4d8"/>
      <line x1="0" y1="1" x2="6" y2="1" stroke="#cfc8ba" stroke-width="0.8"/>
    </pattern>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- body/shirt -->
        <path d="M40 150 Q60 138 80 150 L86 200 L34 200 Z" fill="#f4f1ea"/>
        <!-- collar -->
        <path d="M52 150 L60 162 L68 150" fill="#f4f1ea"/>
        <!-- tie -->
        <path d="M60 162 L55 190 L60 196 L65 190 Z" fill="#f4f1ea"/>
        <!-- head -->
        <ellipse cx="60" cy="112" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M50 82 Q56 72 66 78 Q60 84 68 86" />
        <!-- glasses -->
        <circle cx="49" cy="110" r="10" fill="#f4f1ea"/>
        <circle cx="72" cy="110" r="10" fill="#f4f1ea"/>
        <line x1="59" y1="110" x2="62" y2="110"/>
        <!-- eyes -->
        <circle cx="49" cy="110" r="1.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="110" r="1.6" fill="#111" stroke="none"/>
        <!-- weary brows -->
        <path d="M42 100 L55 103"/>
        <path d="M66 103 L79 100"/>
        <!-- deadpan mouth -->
        <path d="M50 132 L70 132"/>
        <!-- ears -->
        <path d="M30 112 q-6 2 -1 9"/>
        <path d="M90 112 q6 2 1 9"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M38 152 Q60 140 82 152 L88 200 L32 200 Z" fill="#f4f1ea"/>
        <path d="M52 152 L60 164 L68 152" fill="#f4f1ea"/>
        <!-- round head -->
        <circle cx="60" cy="112" r="34" fill="#f4f1ea"/>
        <!-- short hair tuft -->
        <path d="M50 80 q6 -10 14 -3"/>
        <path d="M58 78 q5 -8 12 0"/>
        <!-- dot eyes -->
        <circle cx="50" cy="108" r="2.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="108" r="2.6" fill="#111" stroke="none"/>
        <!-- big oblivious grin -->
        <path d="M44 122 Q60 142 76 122" fill="#f4f1ea"/>
        <path d="M48 126 Q60 134 72 126"/>
      </g>
    </symbol>

    <!-- DOUG holding mug (mug drawn separately per panel for reflection variation) -->
    <symbol id="boss" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M40 150 Q60 138 80 150 L86 200 L34 200 Z" fill="#f4f1ea"/>
        <path d="M52 150 L60 162 L68 150" fill="#f4f1ea"/>
        <path d="M60 162 L55 190 L60 196 L65 190 Z" fill="#f4f1ea"/>
        <ellipse cx="60" cy="112" rx="29" ry="33" fill="#f4f1ea"/>
        <!-- two devil-horn spikes -->
        <path d="M45 84 L34 52 L54 80" fill="#f4f1ea"/>
        <path d="M75 84 L86 52 L66 80" fill="#f4f1ea"/>
        <!-- beady eyes -->
        <circle cx="52" cy="110" r="1.4" fill="#111" stroke="none"/>
        <circle cx="68" cy="110" r="1.4" fill="#111" stroke="none"/>
        <path d="M52 128 L68 128"/>
      </g>
    </symbol>

    <!-- THE CLANKER head (goes only inside surfaces) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <!-- antenna -->
        <line x1="60" y1="14" x2="60" y2="4"/>
        <circle cx="60" cy="3" r="2.4" fill="#111"/>
        <!-- boxy head -->
        <rect x="26" y="14" width="68" height="60" rx="6" fill="#f4f1ea"/>
        <!-- slot eyes glowing -->
        <rect x="34" y="30" width="22" height="9" rx="2" fill="#111"/>
        <rect x="64" y="30" width="22" height="9" rx="2" fill="#111"/>
        <rect x="37" y="32.5" width="16" height="4" rx="1.5" fill="#f4f1ea"/>
        <rect x="67" y="32.5" width="16" height="4" rx="1.5" fill="#f4f1ea"/>
        <!-- grille mouth -->
        <rect x="40" y="52" width="40" height="14" rx="2"/>
        <line x1="48" y1="52" x2="48" y2="66"/>
        <line x1="56" y1="52" x2="56" y2="66"/>
        <line x1="64" y1="52" x2="64" y2="66"/>
        <line x1="72" y1="52" x2="72" y2="66"/>
        <!-- side bolts -->
        <circle cx="30" cy="44" r="2"/>
        <circle cx="90" cy="44" r="2"/>
      </g>
    </symbol>
  </defs>

  <!-- =================== PANEL 1 =================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <line x1="14" y1="288" x2="386" y2="288" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <!-- desktop monitor (blank) -->
    <g fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round">
      <rect x="250" y="196" width="120" height="80" rx="4" fill="#e9e4d8"/>
      <rect x="260" y="204" width="100" height="60" rx="2" fill="#f4f1ea"/>
      <rect x="302" y="276" width="16" height="12" fill="#f4f1ea"/>
      <line x1="292" y1="288" x2="328" y2="288"/>
    </g>

    <!-- Doug left -->
    <use href="#doug" x="26" y="150" width="120" height="200"/>
    <!-- Doug's mug -->
    <g fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round">
      <rect x="118" y="250" width="30" height="26" rx="3" fill="#f4f1ea"/>
      <path d="M148 256 q12 0 12 8 q0 8 -12 8"/>
      <path d="M124 250 q6 -5 18 0" />
    </g>

    <!-- Dailbert right -->
    <use href="#dailbert" x="220" y="150" width="120" height="200"/>

    <!-- Doug balloon -->
    <g>
      <path d="M40 18 h150 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-70 l-10 14 l-2 -14 h-68 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="115" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">The clanker's writing</text>
      <text x="115" y="55" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">my self-review. Why</text>
      <text x="115" y="72" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">suffer?</text>
    </g>

    <!-- Dailbert balloon -->
    <g>
      <path d="M232 96 h140 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-70 l-8 14 l-2 -14 h-60 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="302" y="116" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You're really leaning</text>
      <text x="302" y="133" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">into being you.</text>
    </g>
  </g>

  <!-- =================== PANEL 2 =================== -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="14" y1="288" x2="386" y2="288" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Doug at desk -->
    <use href="#doug" x="30" y="160" width="120" height="200"/>

    <!-- Monitor with clanker + slide -->
    <g>
      <rect x="230" y="150" width="150" height="110" rx="5" fill="#111"/>
      <rect x="240" y="158" width="130" height="86" rx="2" fill="url(#scan)"/>
      <rect x="290" y="260" width="18" height="16" fill="#111"/>
      <line x1="278" y1="288" x2="320" y2="288" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- clanker inside -->
      <use href="#clanker" x="260" y="160" width="90" height="75"/>
      <!-- slide caption bar -->
      <rect x="244" y="228" width="122" height="14" fill="#111"/>
      <text x="305" y="239" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="10" fill="#f4f1ea">SELF-REVIEW — DOUG</text>
    </g>

    <!-- Clanker balloon (screen-edged, double outline) -->
    <g>
      <rect x="196" y="16" width="186" height="76" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="200" y="20" width="178" height="68" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="289" y="40" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">To write it well, Doug</text>
      <text x="289" y="57" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">— what are you</text>
      <text x="289" y="74" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">proud of?</text>
      <!-- dashed connector to monitor -->
      <line x1="289" y1="92" x2="300" y2="150" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    </g>

    <!-- Doug balloon -->
    <g>
      <path d="M28 110 h132 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-60 l-8 14 l-2 -14 h-62 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="94" y="130" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Leaving on time.</text>
      <text x="94" y="147" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Consistently.</text>
    </g>
  </g>

  <!-- =================== PANEL 3 =================== -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="14" y1="288" x2="386" y2="288" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Doug left -->
    <use href="#doug" x="18" y="164" width="120" height="200"/>
    <!-- Dailbert right -->
    <use href="#dailbert" x="250" y="164" width="120" height="200"/>

    <!-- Monitor center with clanker + slide -->
    <g>
      <rect x="150" y="176" width="120" height="90" rx="5" fill="#111"/>
      <rect x="158" y="183" width="104" height="66" rx="2" fill="url(#scan)"/>
      <rect x="202" y="266" width="16" height="14" fill="#111"/>
      <line x1="192" y1="288" x2="230" y2="288" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <use href="#clanker" x="176" y="184" width="72" height="60"/>
      <rect x="161" y="235" width="98" height="12" fill="#111"/>
      <text x="210" y="245" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="9" fill="#f4f1ea">...makes people feel w</text>
    </g>

    <!-- Clanker balloon top -->
    <g>
      <rect x="120" y="12" width="196" height="74" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="124" y="16" width="188" height="66" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="218" y="34" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">I wrote that you make</text>
      <text x="218" y="51" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">people feel welcome.</text>
      <text x="218" y="68" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">That part's true.</text>
      <line x1="210" y1="86" x2="210" y2="176" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    </g>

    <!-- Doug balloon lower-left -->
    <g>
      <path d="M14 108 h110 a9 9 0 0 1 9 9 v30 a9 9 0 0 1 -9 9 h-44 l-8 12 l-2 -12 h-46 a9 9 0 0 1 -9 -9 v-30 a9 9 0 0 1 9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="69" y="127" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">Cool. Mention the</text>
      <text x="69" y="143" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">printer.</text>
    </g>

    <!-- Dailbert balloon lower-right -->
    <g>
      <path d="M258 112 h118 a9 9 0 0 1 9 9 v30 a9 9 0 0 1 -9 9 h-48 l-8 12 l-2 -12 h-60 a9 9 0 0 1 -9 -9 v-30 a9 9 0 0 1 9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="318" y="131" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">It likes you more</text>
      <text x="318" y="147" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">than you do.</text>
    </g>
  </g>
</g>
    
  </svg>