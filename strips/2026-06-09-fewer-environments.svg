      <path d="M352,250 v-16 M352,236 q-10,-4 -14,-16 q12,2 14,14 M352,240 q10,-4 15,-16 q-12,1 -15,14" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M344,250 h16 l-3,-14 h-10 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
