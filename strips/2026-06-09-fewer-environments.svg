      <path d="M300,196 L258,210" stroke="#111" stroke-width="2.5" fill="none"/>
      <path d="M300,203 L262,216" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M258,210 L242,207" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
