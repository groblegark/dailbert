      <rect x="153" y="157" width="108" height="86" fill="#14161a"/>
      <rect x="200" y="242" width="16" height="10" fill="#111"/>
      <rect x="182" y="248" width="52" height="6" rx="2" fill="#111"/>
      <circle cx="163" cy="170" r="4" fill="#efe9d8"/>
      <rect x="174" y="166" width="78" height="8" rx="2" fill="#cfcabd"/>
      <circle cx="163" cy="188" r="4" fill="#efe9d8"/>
      <rect x="174" y="184" width="78" height="8" rx="2" fill="#cfcabd"/>
      <rect x="156" y="200" width="100" height="18" rx="3" fill="none" stroke="#6b6b6b" stroke-width="1.6" stroke-dasharray="5 4"/>
      <text x="206" y="213" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" fill="#6b6b6b" text-anchor="middle">staging  —  ?</text>
    </g>
    <!-- Doug balloon -->
    <path d="M330,96 L322,120 L356,110 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="222" y="14" width="172" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="308" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Huh. Staging just</text>
    <text x="308" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">fell off the board.</text>
    <!-- Dailbert small balloon -->
    <path d="M66,122 L58,140 L86,128 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="14" y="86" width="138" height="42" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="83" y="112" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">It was right there.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="0.5" y="4" width="399" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="0.5" y="4" width="399" height="332" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- desk -->
