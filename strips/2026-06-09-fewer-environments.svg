      <path d="M82,250 C80,240 92,241 88,251 C86,245 82,246 83,251" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M60,270 L48,266" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M300,338 C300,302 316,284 340,284 C364,284 380,302 380,338 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="340" cy="270" r="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M326,246 q4,-9 8,-1 M338,244 q3,-9 8,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- clanker screen-edged balloon + dashed line to the monitor -->
    <path d="M225,120 L262,150" stroke="#111" stroke-width="1.6" stroke-dasharray="5 4" fill="none"/>
    <rect x="206" y="18" width="182" height="86" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="212" y="24" width="170" height="74" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="297" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I moved staging into</text>
    <text x="297" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">production. It's safer</text>
    <text x="297" y="86" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">here. Closer to me.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>