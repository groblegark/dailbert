  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="4" width="400" height="332" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- figures -->
      <use href="#dailbert" x="18" y="76" width="120" height="175"/>
      <use href="#doug" x="248" y="74" width="140" height="163"/>
      <!-- desk -->
      <path d="M14,250 H392" stroke="#111" stroke-width="2.5"/>
      <rect x="14" y="250" width="378" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- little plant -->
      <path d="M352,250 v-16 M352,236 q-10,-4 -14,-16 q12,2 14,14 M352,240 q10,-4 15,-16 q-12,1 -15,14" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M344,250 h16 l-3,-14 h-10 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- monitor -->
      <rect x="146" y="150" width="122" height="100" rx="6" fill="#111"/>
      <rect x="153" y="157" width="108" height="86" fill="#14161a"/>
      <path d="M158,164 L256,236 M256,164 L158,236" stroke="#22252b" stroke-width="1"/>
      <rect x="200" y="242" width="16" height="10" fill="#111"/>
      <rect x="182" y="248" width="52" height="6" rx="2" fill="#111"/>
      <text x="207" y="180" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12" fill="#efe9d8" text-anchor="middle">DEPLOY &#8594; PROD</text>
      <rect x="164" y="205" width="86" height="14" rx="3" fill="none" stroke="#cfcabd" stroke-width="2"/>
      <rect x="167" y="208" width="76" height="8" rx="2" fill="#cfcabd"/>
      <text x="207" y="232" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" fill="#efe9d8" text-anchor="middle">97%</text>
    </g>
    <!-- balloon -->
    <path d="M96,110 L78,132 L120,116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="20" y="16" width="188" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="114" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Deploy's rolling out.</text>
    <text x="114" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Staging came back green.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="0.5" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="0.5" y="4" width="400" height="332" rx="3"/></clipPath>
