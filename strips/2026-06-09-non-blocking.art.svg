    <text x="114" y="33" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">You reviewed my</text>
    <text x="114" y="51" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">merge request?</text>
    <rect x="214" y="66" width="176" height="62" rx="2" fill="#fdfcf8" stroke="#111" stroke-width="2"/>
    <rect x="218" y="70" width="168" height="54" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="312" y1="128" x2="316" y2="146" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="302" y="84" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Approved. The code</text>
    <text x="302" y="100" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">was fine. I left</text>
    <text x="302" y="116" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">fourteen comments.</text>
  </g>

