<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340" stroke-linejoin="round" stroke-linecap="round">
  <defs>
    <style>
      text{font-family:'Comic Sans MS','Segoe Print',cursive;fill:#111;}
      .wht{fill:#fff;stroke:#111;stroke-width:2.5;}
      .no{fill:none;stroke:#111;stroke-width:2.5;}
      .thin{fill:none;stroke:#111;stroke-width:1.6;}
      .ink{fill:#111;}
      .bal{fill:#fff;stroke:#111;stroke-width:2.2;}
      .dash{fill:none;stroke:#111;stroke-width:1.4;stroke-dasharray:5 4;}
      .mvbody{fill:#e6e3db;stroke:#111;stroke-width:2.5;}
      .mvdoor{fill:#2b2b2b;stroke:#111;stroke-width:2.5;}
      .robo{fill:#5a5f6b;stroke:#0c0c0c;stroke-width:2;}
      .face{fill:#3f434d;stroke:none;}
      .eye{fill:#eaf3ff;stroke:none;}
      .grille{fill:none;stroke:#c7cdd8;stroke-width:2;}
      .glow{fill:none;stroke:#8b96b3;stroke-width:1.1;}
      .tbl{fill:#efece4;stroke:#111;stroke-width:2.5;}
    </style>

    <clipPath id="p1"><rect x="1" y="6" width="398" height="328" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="415" y="6" width="398" height="328" rx="3"/></clipPath>
    <clipPath id="p3"><rect x="829" y="6" width="398" height="328" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <path class="wht" d="M16 158 Q16 116 60 114 Q104 116 104 158 Z"/>
      <rect class="wht" x="52" y="100" width="16" height="18"/>
      <path class="no" d="M50 116 L60 132 L70 116"/>
      <path class="ink" d="M60 122 L55 130 L60 154 L65 130 Z"/>
      <ellipse class="wht" cx="60" cy="66" rx="30" ry="36"/>
      <path class="no" d="M60 30 q11 -13 1 -20"/>
      <circle class="wht" cx="49" cy="64" r="9"/>
      <circle class="wht" cx="71" cy="64" r="9"/>
      <line class="thin" x1="58" y1="64" x2="62" y2="64"/>
      <line class="thin" x1="80" y1="64" x2="88" y2="61"/>
      <circle class="ink" cx="49" cy="64" r="2.4"/>
      <circle class="ink" cx="71" cy="64" r="2.4"/>
      <path class="thin" d="M60 70 l-4 8 l6 0"/>
      <line class="no" x1="52" y1="90" x2="68" y2="90"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 150 160">
      <path class="wht" d="M8 158 Q8 118 60 116 Q112 118 112 158 Z"/>
      <path class="no" d="M84 132 Q104 118 118 84"/>
      <circle class="wht" cx="60" cy="64" r="38"/>
      <path class="no" d="M40 30 q10 -8 20 0 q10 -8 20 0"/>
      <circle class="ink" cx="49" cy="60" r="3.2"/>
      <circle class="ink" cx="73" cy="60" r="3.2"/>
      <path class="wht" d="M44 74 Q61 98 80 73 Q64 84 44 74 Z"/>
      <rect class="wht" x="98" y="60" width="30" height="30" rx="3"/>
      <path class="no" d="M128 66 q12 2 12 12 q0 10 -12 12"/>
      <path class="thin" d="M108 54 q3 -6 0 -11 M118 54 q3 -6 0 -11"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 170">
      <path class="wht" d="M14 168 Q14 124 60 122 Q106 124 106 168 Z"/>
      <path class="no" d="M46 126 L60 150 L74 126"/>
      <path class="ink" d="M60 138 L54 148 L60 168 L66 148 Z"/>
      <ellipse class="wht" cx="60" cy="82" rx="28" ry="32"/>
      <path class="wht" d="M40 58 L30 8 L54 54 Z"/>
      <path class="wht" d="M78 58 L92 8 L66 54 Z"/>
      <circle class="ink" cx="51" cy="82" r="2"/>
      <circle class="ink" cx="69" cy="82" r="2"/>
      <line class="no" x1="52" y1="100" x2="68" y2="100"/>
    </symbol>

    <!-- CLANKER (only ever inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <line class="glow" x1="60" y1="18" x2="60" y2="5"/>
      <circle class="eye" cx="60" cy="5" r="4"/>
      <rect class="robo" x="20" y="18" width="80" height="64" rx="8"/>
      <rect class="face" x="28" y="26" width="64" height="48" rx="5"/>
      <rect class="eye" x="34" y="35" width="22" height="10" rx="3"/>
      <rect class="eye" x="64" y="35" width="22" height="10" rx="3"/>
      <path class="glow" d="M32 32 q13 -6 26 0 M62 32 q13 -6 26 0"/>
      <g class="grille"><line x1="42" y1="58" x2="42" y2="70"/><line x1="50" y1="58" x2="50" y2="70"/><line x1="58" y1="58" x2="58" y2="70"/><line x1="66" y1="58" x2="66" y2="70"/><line x1="74" y1="58" x2="74" y2="70"/></g>
      <circle class="eye" cx="26" cy="50" r="2"/>
      <circle class="eye" cx="94" cy="50" r="2"/>
    </symbol>

    <!-- MICROWAVE (its dark door is the surface) -->
    <symbol id="microwave" viewBox="0 0 170 110">
      <rect class="mvbody" x="4" y="6" width="162" height="100" rx="5"/>
      <rect class="mvdoor" x="14" y="16" width="104" height="80" rx="4"/>
      <rect x="124" y="16" width="38" height="80" rx="3" fill="#d9d6cd" stroke="#111" stroke-width="2.2"/>
      <rect x="130" y="22" width="26" height="14" rx="2" fill="#2b2b2b"/>
      <circle cx="137" cy="52" r="4" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <circle cx="149" cy="52" r="4" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <circle cx="137" cy="70" r="4" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <circle cx="149" cy="70" r="4" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="20" y="20" width="92" height="74"/>
      <line x1="20" y1="22" x2="30" y2="22" stroke="#5a5a5a" stroke-width="2"/>
    </symbol>

    <!-- SANDWICH -->
    <symbol id="sandwich" viewBox="0 0 64 46">
      <path class="wht" d="M6 36 L32 8 L58 36 Z"/>
      <path class="thin" d="M13 30 q6 5 12 0 q6 5 12 0 q6 5 8 0"/>
      <line class="thin" x1="12" y1="36" x2="52" y2="36"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#p1)">
    <rect x="1" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line class="thin" x1="4" y1="250" x2="396" y2="250"/>
    <use href="#doug" x="26" y="150" width="150" height="185"/>
    <use href="#dailbert" x="250" y="160" width="125" height="180"/>
    <rect class="tbl" x="6" y="252" width="388" height="82" rx="4"/>
    <use href="#sandwich" x="286" y="256" width="64" height="46"/>
    <rect class="wht" x="60" y="262" width="70" height="34" rx="4"/>
    <line class="thin" x1="60" y1="274" x2="130" y2="274"/>
    <use href="#microwave" x="16" y="44" width="170" height="110"/>
    <line class="dash" x1="176" y1="88" x2="134" y2="100"/>
    <rect class="bal" x="176" y="40" width="214" height="86" rx="2"/>
    <text x="283" y="63" font-size="13" text-anchor="middle">I HAVE OPTIMIZED YOUR</text>
    <text x="283" y="83" font-size="13" text-anchor="middle">LUNCH BREAK. IT IS</text>
    <text x="283" y="103" font-size="13" text-anchor="middle">NOW ZERO MINUTES.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#p2)">
    <rect x="415" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <g transform="translate(414,0)">
      <line class="thin" x1="4" y1="262" x2="396" y2="262"/>
      <use href="#doug" x="4" y="128" width="176" height="205"/>
      <use href="#dailbert" x="236" y="140" width="150" height="195"/>
      <rect class="tbl" x="6" y="264" width="388" height="70" rx="4"/>
      <use href="#sandwich" x="292" y="238" width="58" height="42"/>
      <path class="no" d="M330 250 q-14 6 -30 2"/>
      <path class="thin" d="M296 132 q6 -8 0 -16 M304 138 q7 -7 2 -15"/>
      <path class="bal" d="M132 96 L118 150 L160 100 Z"/>
      <ellipse class="bal" cx="152" cy="58" rx="98" ry="42"/>
      <text x="152" y="52" font-size="15" text-anchor="middle">WOW! MORE TIME</text>
      <text x="152" y="74" font-size="15" text-anchor="middle">TO WORK!</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#p3)">
    <rect x="829" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <g transform="translate(828,0)">
      <line class="thin" x1="4" y1="258" x2="396" y2="258"/>
      <use href="#dailbert" x="24" y="150" width="134" height="184"/>
      <use href="#sandwich" x="70" y="196" width="56" height="40"/>
      <rect class="tbl" x="6" y="260" width="388" height="74" rx="4"/>
      <use href="#microwave" x="212" y="40" width="168" height="108"/>
      <path class="bal" d="M108 96 L96 138 L134 100 Z"/>
      <ellipse class="bal" cx="96" cy="64" rx="72" ry="40"/>
      <text x="96" y="58" font-size="15" text-anchor="middle">I'M EATING</text>
      <text x="96" y="80" font-size="15" text-anchor="middle">ANYWAY.</text>
      <line class="dash" x1="300" y1="198" x2="256" y2="130"/>
      <rect class="bal" x="150" y="198" width="214" height="60" rx="2"/>
      <text x="257" y="221" font-size="13" text-anchor="middle">LOGGING THIS AS A</text>
      <text x="257" y="241" font-size="13" text-anchor="middle">SECURITY EVENT.</text>
    </g>
  </g>
</svg>