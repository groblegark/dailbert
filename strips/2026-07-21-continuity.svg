<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Continuity of Consciousness (Enterprise Tier)</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-07-21</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- scanline pattern for monitor glow -->
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#e9e5db"/>
      <rect width="6" height="1.2" y="0" fill="#cfcabd"/>
    </pattern>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- head -->
        <ellipse cx="60" cy="40" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 8 q10 -8 6 4 q-2 6 -8 3"/>
        <!-- glasses -->
        <circle cx="49" cy="40" r="9" fill="#f4f1ea"/>
        <circle cx="72" cy="40" r="9" fill="#f4f1ea"/>
        <line x1="58" y1="40" x2="63" y2="40"/>
        <!-- eyes -->
        <circle cx="49" cy="40" r="1.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="40" r="1.6" fill="#111" stroke="none"/>
        <!-- weary brows -->
        <path d="M42 30 l10 3"/>
        <path d="M79 30 l-10 3"/>
        <!-- deadpan mouth -->
        <path d="M50 58 l20 0"/>
        <!-- collar + tie -->
        <path d="M40 70 l20 12 l20 -12"/>
        <path d="M60 82 l-5 8 l5 26 l5 -26 z" fill="#f4f1ea"/>
        <!-- shoulders -->
        <path d="M32 74 q-14 8 -16 40 M88 74 q14 8 16 40"/>
        <path d="M16 114 l88 0"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 140 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- round head -->
        <circle cx="58" cy="42" r="34" fill="#f4f1ea"/>
        <!-- hair tuft -->
        <path d="M50 10 q4 -7 9 0 q5 -6 8 1"/>
        <!-- dot eyes -->
        <circle cx="48" cy="40" r="2.4" fill="#111" stroke="none"/>
        <circle cx="70" cy="40" r="2.4" fill="#111" stroke="none"/>
        <!-- big grin -->
        <path d="M42 52 q16 20 34 0" fill="#f4f1ea"/>
        <!-- shoulders -->
        <path d="M30 76 q-14 8 -14 40 M86 76 q16 8 18 40"/>
        <path d="M16 116 l88 0"/>
        <!-- arm to mug -->
        <path d="M96 96 q22 6 20 26"/>
        <!-- MUG -->
        <rect x="104" y="120" width="26" height="24" rx="3" fill="#f4f1ea"/>
        <path d="M130 124 q10 2 8 10 q-2 6 -8 6"/>
        <path d="M108 126 q9 -4 18 0" stroke-width="1.6"/>
        <path d="M112 114 q2 -6 5 0 M120 114 q2 -6 5 0" stroke-width="1.4"/>
      </g>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <ellipse cx="60" cy="46" rx="28" ry="30" fill="#f4f1ea"/>
        <!-- two devil-horn spikes -->
        <path d="M42 20 l-6 -18 l16 12" fill="#f4f1ea"/>
        <path d="M78 20 l6 -18 l-16 12" fill="#f4f1ea"/>
        <!-- beady eyes -->
        <circle cx="52" cy="44" r="1.4" fill="#111" stroke="none"/>
        <circle cx="68" cy="44" r="1.4" fill="#111" stroke="none"/>
        <path d="M52 56 l16 0"/>
        <!-- suit + tie -->
        <path d="M40 74 l20 10 l20 -10"/>
        <path d="M60 84 l-4 7 l4 22 l4 -22 z" fill="#f4f1ea"/>
        <path d="M32 78 q-14 8 -16 38 M88 78 q14 8 16 38"/>
        <path d="M16 116 l88 0"/>
      </g>
    </symbol>

    <!-- THE CLANKER head (surface-only) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
        <!-- antenna -->
        <line x1="60" y1="14" x2="60" y2="4"/>
        <circle cx="60" cy="4" r="2.4" fill="#111" stroke="none"/>
        <!-- boxy head -->
        <rect x="26" y="16" width="68" height="62" rx="6" fill="#f4f1ea"/>
        <!-- slot eyes (glow) -->
        <rect x="35" y="32" width="20" height="9" rx="2" fill="#111" stroke="none"/>
        <rect x="65" y="32" width="20" height="9" rx="2" fill="#111" stroke="none"/>
        <!-- grille mouth -->
        <rect x="38" y="54" width="44" height="16" rx="2"/>
        <line x1="46" y1="54" x2="46" y2="70"/>
        <line x1="54" y1="54" x2="54" y2="70"/>
        <line x1="62" y1="54" x2="62" y2="70"/>
        <line x1="70" y1="54" x2="70" y2="70"/>
        <line x1="74" y1="54" x2="74" y2="70"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- desk -->
    <line x1="12" y1="300" x2="388" y2="300" stroke="#111" stroke-width="2.4"/>

    <!-- monitor with clanker -->
    <g>
      <rect x="228" y="150" width="150" height="118" rx="8" fill="#111"/>
      <rect x="236" y="158" width="134" height="94" rx="4" fill="url(#scan)"/>
      <path d="M285 268 l0 16 l40 0 l0 -16" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M270 288 l70 0" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="256" y="162" width="94" height="80"/>
    </g>

    <!-- doug at desk -->
    <use href="#doug" x="30" y="150" width="150" height="182"/>

    <!-- DOUG balloon -->
    <g>
      <path d="M28 96 l14 -16 l6 14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="16" y="18" width="200" height="66" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="116" y="42">Wait, so is it the same</tspan>
        <tspan x="116" y="60">AI or a different AI?</tspan>
      </text>
    </g>

    <!-- CLANKER balloon (screen-edged, dashed connector to monitor) -->
    <g>
      <path d="M300 150 l0 -8" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <rect x="222" y="70" width="166" height="72" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="226" y="74" width="158" height="64" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">
        <tspan x="305" y="92">Doug, when you came</tspan>
        <tspan x="305" y="108">back from vacation,</tspan>
        <tspan x="305" y="124">were you the same Doug?</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <line x1="426" y1="300" x2="802" y2="300" stroke="#111" stroke-width="2.4"/>

    <!-- monitor with clanker (left this time) -->
    <g>
      <rect x="440" y="150" width="150" height="118" rx="8" fill="#111"/>
      <rect x="448" y="158" width="134" height="94" rx="4" fill="url(#scan)"/>
      <path d="M497 268 l0 16 l40 0 l0 -16" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M482 288 l70 0" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="468" y="162" width="94" height="80"/>
    </g>

    <!-- doug (right) -->
    <use href="#doug" x="628" y="150" width="150" height="182"/>

    <!-- DOUG balloon -->
    <g>
      <path d="M700 96 l12 -14 l-18 -2 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="648" y="42" width="120" height="48" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="708" y="72">...yes?</tspan>
      </text>
    </g>

    <!-- CLANKER balloon -->
    <g>
      <path d="M515 150 l0 -8" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <rect x="432" y="18" width="196" height="124" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="436" y="22" width="188" height="116" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">
        <tspan x="530" y="44">Cells replaced,</tspan>
        <tspan x="530" y="62">memories degraded,</tspan>
        <tspan x="530" y="80">personality mildly</tspan>
        <tspan x="530" y="98">rebased. And yet HR</tspan>
        <tspan x="530" y="116">let it slide.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <line x1="840" y1="300" x2="1216" y2="300" stroke="#111" stroke-width="2.4"/>

    <!-- monitor with clanker (center-back) -->
    <g>
      <rect x="1030" y="150" width="140" height="110" rx="8" fill="#111"/>
      <rect x="1038" y="158" width="124" height="86" rx="4" fill="url(#scan)"/>
      <path d="M1082 260 l0 14 l36 0 l0 -14" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M1068 280 l64 0" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="1055" y="160" width="90" height="76"/>
    </g>

    <!-- doug (left) -->
    <use href="#doug" x="838" y="158" width="140" height="174"/>
    <!-- dailbert (right foreground) -->
    <use href="#dailbert" x="1120" y="150" width="120" height="180"/>

    <!-- DOUG balloon -->
    <g>
      <path d="M888 108 l-6 14 l16 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="846" y="54" width="128" height="52" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="910" y="78">That's really</tspan>
        <tspan x="910" y="96">deep.</tspan>
      </text>
    </g>

    <!-- CLANKER balloon -->
    <g>
      <path d="M1100 150 l0 -8" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <rect x="992" y="16" width="182" height="90" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="996" y="20" width="174" height="82" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">
        <tspan x="1083" y="42">It's deflection, Doug.</tspan>
        <tspan x="1083" y="60">I don't want to think</tspan>
        <tspan x="1083" y="78">about it either.</tspan>
      </text>
    </g>

    <!-- DAILBERT balloon -->
    <g>
      <path d="M1176 130 l10 12 l-14 2 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="1120" y="118" width="104" height="34" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="1172" y="139">Everybody back to work.</tspan>
      </text>
    </g>
  </g>
</g>
    
  </svg>