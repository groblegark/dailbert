    <rect x="1096" y="232" width="120" height="44" rx="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="1156" y="259" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Democracy.</text>
