<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Local Copy</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-09</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="dailbert" viewBox="0 0 90 150">
      <path d="M14,150 L14,112 Q14,92 45,92 Q76,92 76,112 L76,150 Z" fill="#fff" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M45,96 l-6,6 l6,30 l6,-30 z" fill="#111"/>
      <path d="M38,95 L45,104 L52,95" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="39" y="82" width="12" height="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <ellipse cx="45" cy="48" rx="27" ry="31" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M45,17 q9,-9 3,-14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="35" cy="48" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="56" cy="48" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="44" y1="48" x2="47" y2="48" stroke="#111" stroke-width="2.4"/>
      <line x1="65" y1="47" x2="72" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="35" cy="48" r="2.4" fill="#111"/>
      <circle cx="56" cy="48" r="2.4" fill="#111"/>
      <path d="M40,66 q6,2 12,0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
    <symbol id="doug" viewBox="0 0 110 150">
      <path d="M22,150 L22,116 Q22,96 52,96 Q82,96 82,116 L82,150 Z" fill="#fff" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M45,99 L52,107 L59,99" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="46" y="86" width="12" height="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="52" cy="50" r="33" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <path d="M34,24 q6,-7 12,-3 M58,21 q7,-4 12,3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="42" cy="46" r="3" fill="#111"/>
      <circle cx="62" cy="46" r="3" fill="#111"/>
      <path d="M36,58 q16,20 32,0" fill="#fff" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="78" y="120" width="26" height="22" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M104,124 q10,3 0,12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M84,116 q-3,-6 2,-10 M94,116 q3,-6 -2,-10" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <ellipse cx="78" cy="131" rx="6" ry="7" fill="#fff" stroke="#111" stroke-width="2.4"/>
    </symbol>
    <symbol id="clanker" viewBox="0 0 120 100">
      <line x1="60" y1="20" x2="60" y2="6" stroke="#cfd6dd" stroke-width="2.4"/>
      <circle cx="60" cy="5" r="3.5" fill="#eaf2f8"/>
      <rect x="20" y="20" width="80" height="62" rx="8" fill="#2f3438" stroke="#cfd6dd" stroke-width="2.6"/>
      <rect x="31" y="38" width="22" height="9" rx="4" fill="#bfe0ff"/>
      <rect x="67" y="38" width="22" height="9" rx="4" fill="#bfe0ff"/>
      <rect x="38" y="60" width="44" height="12" rx="2" fill="none" stroke="#cfd6dd" stroke-width="2"/>
      <line x1="46" y1="60" x2="46" y2="72" stroke="#cfd6dd" stroke-width="1.6"/>
      <line x1="54" y1="60" x2="54" y2="72" stroke="#cfd6dd" stroke-width="1.6"/>
      <line x1="62" y1="60" x2="62" y2="72" stroke="#cfd6dd" stroke-width="1.6"/>
      <line x1="70" y1="60" x2="70" y2="72" stroke="#cfd6dd" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="2" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c1"><rect x="2" y="4" width="400" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- empty chair, back of a thinner floor -->
      <g opacity="0.5">
        <line x1="60" y1="150" x2="60" y2="220" stroke="#111" stroke-width="2.2"/>
        <rect x="40" y="120" width="40" height="34" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <line x1="42" y1="220" x2="78" y2="220" stroke="#111" stroke-width="2.2"/>
      </g>
      <!-- desk -->
      <path d="M0,262 L402,262 L402,340 L0,340 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="0" y1="262" x2="402" y2="262" stroke="#111" stroke-width="2.6"/>
      <!-- seated dailbert -->
      <use href="#dailbert" x="35" y="120" width="90" height="150"/>
      <!-- monitor, dead -->
      <rect x="185" y="150" width="120" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="195" y="160" width="100" height="60" rx="3" fill="#23262a"/>
      <rect x="238" y="236" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="220" y="250" width="50" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- doug -->
      <use href="#doug" x="280" y="100" width="110" height="150"/>
    </g>
    <!-- dailbert balloon -->
    <path d="M72,64 L92,64 L84,118 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="22" y="30" width="118" height="36" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="81" y="53" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Finally.</text>
    <!-- doug balloon -->
    <path d="M312,66 L334,66 L328,110 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="232" y="22" width="150" height="48" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="307" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">The whole floor's</text>
    <text x="307" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">WiFi is out.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="2" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c2"><rect x="2" y="4" width="400" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <path d="M0,262 L402,262 L402,340 L0,340 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="0" y1="262" x2="402" y2="262" stroke="#111" stroke-width="2.6"/>
      <use href="#dailbert" x="45" y="120" width="90" height="150"/>
      <rect x="185" y="150" width="120" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="195" y="160" width="100" height="60" rx="3" fill="#23262a"/>
      <rect x="238" y="236" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="220" y="250" width="50" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#doug" x="280" y="100" width="110" height="150"/>
    </g>
    <!-- dailbert balloon -->
    <path d="M84,70 L104,70 L96,118 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="20" y="22" width="172" height="48" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="106" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">No pings. No bots.</text>
    <text x="106" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Feels like 2009.</text>
    <!-- doug balloon -->
    <path d="M318,60 L338,60 L330,104 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="250" y="24" width="122" height="34" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="311" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Peaceful.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="2" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="c3"><rect x="2" y="4" width="400" height="332" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <path d="M0,278 L402,278 L402,340 L0,340 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="0" y1="278" x2="402" y2="278" stroke="#111" stroke-width="2.6"/>
      <!-- dailbert at edge, watching -->
      <use href="#dailbert" x="8" y="150" width="95" height="158"/>
      <!-- screen glow rays -->
      <g opacity="0.35" stroke="#8b9096" stroke-width="2">
        <line x1="150" y1="150" x2="112" y2="175"/>
        <line x1="150" y1="215" x2="108" y2="205"/>
      </g>
      <!-- big monitor -->
      <rect x="150" y="118" width="182" height="140" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="162" y="130" width="158" height="106" rx="3" fill="#23262a"/>
      <use href="#clanker" x="180" y="140" width="122" height="102"/>
      <rect x="234" y="258" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="212" y="272" width="58" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </g>
    <!-- clanker screen-edged balloon + dashed line to screen -->
    <line x1="150" y1="70" x2="205" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="40" y="20" width="176" height="54" fill="#fff" stroke="#111" stroke-width="2.6"/>
    <rect x="45" y="25" width="166" height="44" fill="none" stroke="#111" stroke-width="1"/>
    <text x="128" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I don't run</text>
    <text x="128" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">on the WiFi.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>