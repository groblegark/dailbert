<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">One Bar</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-17</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== CHARACTER SYMBOLS ===== -->

    <!-- DAILBERT: oval head, round wire glasses, small necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M30 200 Q30 130 60 128 Q90 130 90 200 Z" fill="#f4f1ea"/>
        <path d="M52 132 L60 145 L68 132" fill="none"/>
        <path d="M60 145 L56 175 L60 182 L64 175 Z" fill="#111"/>
        <path d="M53 122 L53 132 M67 122 L67 132" fill="none"/>
        <ellipse cx="60" cy="92" rx="30" ry="34" fill="#f4f1ea"/>
        <path d="M60 58 Q60 46 70 48 Q64 52 66 58" fill="none"/>
        <circle cx="49" cy="90" r="9" fill="#fff"/>
        <circle cx="71" cy="90" r="9" fill="#fff"/>
        <path d="M58 90 L62 90" fill="none"/>
        <path d="M40 90 L34 88" fill="none"/>
        <circle cx="49" cy="90" r="2.2" fill="#111" stroke="none"/>
        <circle cx="71" cy="90" r="2.2" fill="#111" stroke="none"/>
        <path d="M52 110 L68 110" fill="none"/>
      </g>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M28 200 Q28 132 62 130 Q96 132 96 200 Z" fill="#f4f1ea"/>
        <path d="M52 134 L62 146 L72 134" fill="none"/>
        <circle cx="62" cy="90" r="34" fill="#f4f1ea"/>
        <path d="M44 62 Q50 54 56 60 M68 60 Q74 54 80 62" fill="none"/>
        <circle cx="52" cy="86" r="3" fill="#111" stroke="none"/>
        <circle cx="74" cy="86" r="3" fill="#111" stroke="none"/>
        <path d="M48 102 Q62 120 78 102" fill="none"/>
        <g>
          <rect x="92" y="150" width="30" height="30" rx="3" fill="#fff"/>
          <path d="M122 156 Q134 158 122 174" fill="none"/>
          <path d="M96 150 Q107 158 118 150" fill="none"/>
          <line x1="98" y1="163" x2="116" y2="163"/>
        </g>
      </g>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M28 200 Q28 130 60 128 Q92 130 92 200 Z" fill="#f4f1ea"/>
        <path d="M34 158 L86 158" fill="none"/>
        <path d="M50 132 L60 144 L70 132" fill="none"/>
        <ellipse cx="60" cy="92" rx="29" ry="33" fill="#f4f1ea"/>
        <path d="M31 82 Q26 52 46 50 Q52 42 62 46 Q76 40 82 54 Q92 58 88 84
                 Q86 66 78 62 Q80 54 70 54 Q66 48 58 52 Q48 48 46 58
                 Q38 58 40 72 Q34 74 31 82 Z" fill="#111" stroke="#111"/>
        <rect x="40" y="84" width="17" height="12" rx="2" fill="#fff"/>
        <rect x="63" y="84" width="17" height="12" rx="2" fill="#fff"/>
        <path d="M57 90 L63 90" fill="none"/>
        <circle cx="48.5" cy="90" r="2" fill="#111" stroke="none"/>
        <circle cx="71.5" cy="90" r="2" fill="#111" stroke="none"/>
        <path d="M53 110 Q60 113 67 110" fill="none"/>
      </g>
    </symbol>

    <!-- THE CLANKER: chrome robot head, lives inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <g stroke="#111" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
        <line x1="60" y1="18" x2="60" y2="6"/>
        <circle cx="60" cy="5" r="3.5" fill="#111"/>
        <rect x="26" y="18" width="68" height="60" rx="8" fill="#cfcfcf"/>
        <rect x="36" y="34" width="18" height="9" rx="3" fill="#fff"/>
        <rect x="66" y="34" width="18" height="9" rx="3" fill="#fff"/>
        <line x1="40" y1="38.5" x2="50" y2="38.5" stroke-width="2"/>
        <line x1="70" y1="38.5" x2="80" y2="38.5" stroke-width="2"/>
        <rect x="42" y="56" width="36" height="14" rx="3" fill="#e6e6e6"/>
        <line x1="48" y1="56" x2="48" y2="70"/>
        <line x1="54" y1="56" x2="54" y2="70"/>
        <line x1="60" y1="56" x2="60" y2="70"/>
        <line x1="66" y1="56" x2="66" y2="70"/>
        <line x1="72" y1="56" x2="72" y2="70"/>
      </g>
    </symbol>
  </defs>

  <!-- paper background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- hard summer light through blinds -->
      <g stroke="#d8d3c6" stroke-width="6">
        <line x1="250" y1="16" x2="392" y2="16"/>
        <line x1="250" y1="32" x2="392" y2="32"/>
        <line x1="250" y1="48" x2="392" y2="48"/>
      </g>
      <rect x="0" y="252" width="399" height="88" fill="#e9e4d8" stroke="#111" stroke-width="2.5"/>
      <!-- Dailbert holding phone up, chasing signal -->
      <use href="#dailbert" x="55" y="122" width="120" height="200"/>
      <!-- arm reaching to phone -->
      <path d="M115 178 Q140 168 156 166" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <g stroke="#111" stroke-width="2.5" stroke-linejoin="round" fill="#fff">
        <rect x="150" y="150" width="26" height="46" rx="4"/>
        <rect x="155" y="182" width="4" height="8" fill="#111" stroke="none"/>
        <rect x="162" y="178" width="4" height="12" fill="#dcdcdc" stroke="none"/>
        <rect x="169" y="174" width="4" height="16" fill="#dcdcdc" stroke="none"/>
      </g>
      <g>
        <path d="M196 74 h150 a12 12 0 0 1 12 12 v56 a12 12 0 0 1 -12 12 h-96 l-18 20 l3 -20 h-39 a12 12 0 0 1 -12 -12 v-56 a12 12 0 0 1 12 -12 z"
              fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="279" y="104" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Come on. One</text>
        <text x="279" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">bar. Anywhere</text>
        <text x="279" y="144" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">in this building.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="415" y="252" width="398" height="88" fill="#e9e4d8" stroke="#111" stroke-width="2.5"/>
      <!-- monitor: captive portal + clanker inside the screen -->
      <g>
        <rect x="508" y="80" width="206" height="150" rx="6" fill="#2b2b2b" stroke="#111" stroke-width="2.5"/>
        <rect x="520" y="92" width="182" height="126" rx="3" fill="#3a3a3a"/>
        <rect x="596" y="230" width="30" height="24" fill="#2b2b2b" stroke="#111" stroke-width="2.5"/>
        <rect x="572" y="252" width="78" height="10" rx="3" fill="#2b2b2b" stroke="#111" stroke-width="2.5"/>
        <text x="611" y="112" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#cfe8cf">GUEST WIFI</text>
        <line x1="532" y1="120" x2="690" y2="120" stroke="#5a5a5a" stroke-width="2"/>
        <use href="#clanker" x="557" y="120" width="108" height="99"/>
      </g>
      <!-- Dailbert leaning in -->
      <use href="#dailbert" x="428" y="152" width="110" height="188"/>
      <!-- clanker balloon: rectangular screen-edged, dashed line to screen -->
      <line x1="666" y1="158" x2="710" y2="126" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <g>
        <rect x="598" y="18" width="198" height="122" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="697" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You're online. I</text>
        <text x="697" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">accepted the terms</text>
        <text x="697" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">for the whole floor,</text>
        <text x="697" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">to save time. You're</text>
        <text x="697" y="118" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">all set.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="829" y="252" width="398" height="88" fill="#e9e4d8" stroke="#111" stroke-width="2.5"/>
      <!-- Priya reading a small printed sheet, deadpan -->
      <use href="#priya" x="858" y="140" width="120" height="200"/>
      <path d="M916 178 Q938 188 950 196" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <g stroke="#111" stroke-width="2.5" fill="#fff" stroke-linejoin="round">
        <rect x="948" y="184" width="60" height="46" rx="2"/>
        <line x1="956" y1="196" x2="1000" y2="196" stroke-width="1.5"/>
        <line x1="956" y1="206" x2="1000" y2="206" stroke-width="1.5"/>
        <line x1="956" y1="216" x2="986" y2="216" stroke-width="1.5"/>
      </g>
      <!-- Doug beside her, mug, grin -->
      <use href="#doug" x="1028" y="150" width="130" height="190"/>
      <!-- Priya balloon (dry read of the clause) -->
      <g>
        <path d="M862 26 h158 a12 12 0 0 1 12 12 v44 a12 12 0 0 1 -12 12 h-74 l-16 18 l2 -18 h-70 a12 12 0 0 1 -12 -12 v-44 a12 12 0 0 1 12 -12 z"
              fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="941" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Clause nine. The floor</text>
        <text x="941" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">now subscribes to a</text>
        <text x="941" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">router newsletter.</text>
      </g>
      <!-- Doug balloon (warm, dim) -->
      <g>
        <path d="M1044 100 h120 a12 12 0 0 1 12 12 v34 a12 12 0 0 1 -12 12 h-60 l-14 16 l2 -16 h-48 a12 12 0 0 1 -12 -12 v-34 a12 12 0 0 1 12 -12 z"
              fill="#fff" stroke="#111" stroke-width="2.5"/>
        <text x="1110" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Ooh. Is it</text>
        <text x="1110" y="143" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">any good?</text>
      </g>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>