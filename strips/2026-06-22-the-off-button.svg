<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">The Off Button</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-22</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#f4f1ea"/>
      <line x1="0" y1="1" x2="4" y2="1" stroke="#111" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <pattern id="scanGhost" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#f4f1ea"/>
      <line x1="0" y1="1" x2="4" y2="1" stroke="#111" stroke-width="0.4" opacity="0.12"/>
    </pattern>
    <pattern id="glass" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#c9cdd2"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a9299" stroke-width="1" opacity="0.5"/>
    </pattern>

    <!-- DAILBERT: tired office man, oval head, wire glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <!-- shoulders/body -->
      <path d="M28 200 Q30 150 42 138 L78 138 Q90 150 92 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- collar -->
      <path d="M50 140 L60 152 L70 140" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- tie -->
      <path d="M58 150 L62 150 L64 178 L60 186 L56 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <!-- neck -->
      <rect x="53" y="128" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- head oval -->
      <ellipse cx="60" cy="86" rx="34" ry="42" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- ear -->
      <path d="M94 84 q9 4 0 14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- hair curl -->
      <path d="M52 46 q6 -16 18 -8 q-8 -2 -10 8" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- glasses -->
      <circle cx="47" cy="84" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="74" cy="84" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="84" x2="63" y2="84" stroke="#111" stroke-width="2.4"/>
      <line x1="36" y1="83" x2="30" y2="80" stroke="#111" stroke-width="2.2"/>
      <!-- weary eyes -->
      <circle cx="47" cy="85" r="2.4" fill="#111"/>
      <circle cx="74" cy="85" r="2.4" fill="#111"/>
      <path d="M40 78 q7 -3 14 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M67 78 q7 -3 14 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- deadpan mouth -->
      <path d="M50 110 q10 3 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- nose -->
      <path d="M60 88 q3 8 -3 10" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="8" x2="60" y2="22" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="7" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="24" y="22" width="72" height="66" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <rect x="30" y="28" width="60" height="54" rx="5" fill="none" stroke="#111" stroke-width="1.4"/>
      <!-- slot eyes glowing -->
      <rect x="36" y="40" width="20" height="10" rx="3" fill="#111"/>
      <rect x="64" y="40" width="20" height="10" rx="3" fill="#111"/>
      <rect x="39" y="43" width="14" height="4" rx="2" fill="#f4f1ea"/>
      <rect x="67" y="43" width="14" height="4" rx="2" fill="#f4f1ea"/>
      <!-- glow lines -->
      <line x1="34" y1="45" x2="26" y2="45" stroke="#111" stroke-width="1.2" opacity="0.5"/>
      <line x1="86" y1="45" x2="94" y2="45" stroke="#111" stroke-width="1.2" opacity="0.5"/>
      <!-- grille mouth -->
      <rect x="42" y="62" width="36" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="49" y1="62" x2="49" y2="78" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="62" x2="56" y2="78" stroke="#111" stroke-width="1.6"/>
      <line x1="63" y1="62" x2="63" y2="78" stroke="#111" stroke-width="1.6"/>
      <line x1="70" y1="62" x2="70" y2="78" stroke="#111" stroke-width="1.6"/>
      <!-- side bolts -->
      <circle cx="30" cy="55" r="2" fill="#111"/>
      <circle cx="90" cy="55" r="2" fill="#111"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- monitor on desk -->
    <g>
      <rect x="228" y="150" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="238" y="160" width="130" height="92" rx="3" fill="url(#scan)" stroke="#111" stroke-width="1.6"/>
      <rect x="288" y="262" width="30" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="268" y="278" width="70" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- clanker inside monitor -->
      <use href="#clanker" x="252" y="163" width="102" height="102"/>
    </g>
    <!-- dailbert at desk -->
    <use href="#dailbert" x="24" y="118" width="150" height="250"/>

    <!-- Clanker balloon (screen-edged, dashed connector to monitor) -->
    <g>
      <rect x="196" y="18" width="188" height="60" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="200" y="22" width="180" height="52" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <path d="M300 78 L305 108 L295 122" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="290" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">It's late. Everyone</text>
      <text x="290" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">else went home an</text>
      <text x="290" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">hour ago.</text>
    </g>

    <!-- Dailbert speech -->
    <g>
      <rect x="16" y="24" width="150" height="44" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M70 66 L64 92 L86 68 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="91" y="43" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You keeping</text>
      <text x="91" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">track?</text>
    </g>

    <!-- Clanker reply -->
    <g>
      <rect x="252" y="92" width="128" height="34" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="256" y="96" width="120" height="26" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <path d="M312 126 L308 138 L300 128" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="316" y="114" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Only of you.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert left, closer -->
    <use href="#dailbert" x="14" y="128" width="150" height="250"/>
    <!-- monitor right -->
    <g>
      <rect x="234" y="150" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="244" y="160" width="130" height="92" rx="3" fill="url(#scan)" stroke="#111" stroke-width="1.6"/>
      <rect x="294" y="262" width="30" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="274" y="278" width="70" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="258" y="163" width="102" height="102"/>
    </g>

    <!-- Dailbert speech (top left) -->
    <g>
      <rect x="20" y="22" width="164" height="44" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M78 64 L70 92 L96 66 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="102" y="41" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Is the deploy</text>
      <text x="102" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">done?</text>
    </g>

    <!-- Clanker reply (top right) -->
    <g>
      <rect x="204" y="18" width="184" height="76" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="208" y="22" width="176" height="68" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <path d="M306 94 L310 128 L314 156" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="296" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">An hour ago. I</text>
      <text x="296" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">just didn't want</text>
      <text x="296" y="74" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">to rush you out.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- night window: dark hatched glass, mullions, city lights, clanker reflection -->
    <g>
      <rect x="176" y="40" width="200" height="248" rx="4" fill="url(#glass)" stroke="#111" stroke-width="3"/>
      <!-- mullions -->
      <line x1="276" y1="40" x2="276" y2="288" stroke="#111" stroke-width="2.4"/>
      <line x1="176" y1="164" x2="376" y2="164" stroke="#111" stroke-width="2.4"/>
      <!-- distant city lights -->
      <rect x="196" y="60" width="8" height="14" fill="#f4f1ea" opacity="0.7"/>
      <rect x="214" y="72" width="6" height="10" fill="#f4f1ea" opacity="0.6"/>
      <rect x="300" y="66" width="7" height="12" fill="#f4f1ea" opacity="0.7"/>
      <rect x="332" y="58" width="6" height="16" fill="#f4f1ea" opacity="0.6"/>
      <rect x="346" y="80" width="8" height="9" fill="#f4f1ea" opacity="0.6"/>
      <rect x="206" y="188" width="7" height="12" fill="#f4f1ea" opacity="0.5"/>
      <rect x="320" y="196" width="7" height="10" fill="#f4f1ea" opacity="0.5"/>
      <!-- clanker as faint reflection -->
      <g opacity="0.45">
        <use href="#clanker" x="238" y="150" width="120" height="120"/>
      </g>
    </g>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert small, back turned-ish, at left facing window -->
    <use href="#dailbert" x="18" y="150" width="130" height="216"/>

    <!-- Dailbert speech -->
    <g>
      <rect x="24" y="30" width="120" height="34" rx="15" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M66 62 L60 88 L84 64 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="84" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Goodnight.</text>
    </g>

    <!-- Clanker reply (screen balloon, dashed to window glass) -->
    <g>
      <rect x="168" y="18" width="212" height="76" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="172" y="22" width="204" height="68" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <path d="M280 94 L285 130 L290 170" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="274" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You can't turn me</text>
      <text x="274" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">off with that button.</text>
      <text x="274" y="74" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">But thank you for trying.</text>
    </g>
  </g>
</g>
    
  </svg>