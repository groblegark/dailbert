<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#dfe6e2"/>
      <rect width="6" height="1.4" y="0" fill="#b9c6c0"/>
    </pattern>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f4f1ea"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="1"/>
    </pattern>

    <!-- Clanker face symbol: box robot head, only ever drawn WITHIN a surface -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <rect x="6" y="10" width="88" height="72" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="10" x2="50" y2="0" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="0" r="3" fill="#111"/>
      <rect x="16" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="58" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="20" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <rect x="62" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <rect x="24" y="56" width="52" height="16" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="34" y1="56" x2="34" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="44" y1="56" x2="44" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="56" x2="54" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="56" x2="64" y2="72" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M28 168 L28 132 Q60 108 92 132 L92 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 128 L60 150 L68 128" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 150 L54 160 L60 178 L66 160 Z" fill="#111"/>
      <rect x="52" y="118" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="80" rx="38" ry="44" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M60 36 q8 -12 -2 -16" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="45" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="76" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="58" y1="78" x2="63" y2="78" stroke="#111" stroke-width="2.6"/>
      <circle cx="45" cy="78" r="2.4" fill="#111"/>
      <circle cx="76" cy="78" r="2.4" fill="#111"/>
      <line x1="50" y1="104" x2="70" y2="104" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 170">
      <path d="M24 168 L24 130 Q60 106 96 130 L96 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="52" y="116" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="78" r="44" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M44 40 q6 -12 16 -10 q10 -2 16 10" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="46" cy="74" r="3.4" fill="#111"/>
      <circle cx="74" cy="74" r="3.4" fill="#111"/>
      <path d="M40 92 Q60 118 80 92" fill="#f4f1ea" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
    </symbol>

    <!-- Priya: dark curly hair pulled up, rectangular glasses, rolled sleeves. Calm, dry. -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M22 168 L22 128 Q60 104 98 128 L98 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="34" y1="140" x2="34" y2="158" stroke="#111" stroke-width="2.2"/>
      <line x1="86" y1="140" x2="86" y2="158" stroke="#111" stroke-width="2.2"/>
      <path d="M50 124 L60 140 L70 124" fill="#f4f1ea" stroke="#111" stroke-width="2.3" stroke-linejoin="round"/>
      <rect x="52" y="114" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="76" rx="37" ry="42" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M24 66 Q18 30 44 22 Q60 12 76 22 Q102 30 96 66 Q92 46 78 40 Q60 30 42 40 Q28 46 24 66 Z" fill="#111"/>
      <circle cx="60" cy="18" r="9" fill="#111"/>
      <path d="M28 60 q-4 -6 0 -12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M92 60 q4 -6 0 -12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="33" y="70" width="24" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="70" width="24" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="78" x2="63" y2="78" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="78" r="2.3" fill="#111"/>
      <circle cx="75" cy="78" r="2.3" fill="#111"/>
      <path d="M50 102 Q60 106 71 101" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="8" y1="300" x2="396" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="8" y1="326" x2="396" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Doug left, empty mug hanging in hand (upside-down / drained) -->
    <use href="#doug" x="26" y="150" width="150" height="212"/>
    <g>
      <path d="M120 252 Q138 264 154 256" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M154 246 h34 v28 a7 7 0 0 1 -7 7 h-20 a7 7 0 0 1 -7 -7 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M188 252 q12 1 12 12 q0 11 -12 12" fill="none" stroke="#111" stroke-width="2.8"/>
      <line x1="160" y1="255" x2="182" y2="255" stroke="#111" stroke-width="1.4"/>
    </g>

    <!-- Monitor with clanker + RED dashboard -->
    <g>
      <rect x="250" y="196" width="140" height="100" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="262" y="207" width="116" height="78" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="278" y="211" width="64" height="58"/>
      <rect x="342" y="268" width="30" height="13" rx="2" fill="url(#hatch)" stroke="#111" stroke-width="1.5"/>
      <text x="357" y="278" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111" text-anchor="middle">RED</text>
      <rect x="304" y="296" width="32" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="288" y="304" width="64" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Doug balloon -->
    <g>
      <rect x="74" y="22" width="188" height="82" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M100 102 L90 126 L124 104 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="168" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Machine's still locked.</text>
      <text x="168" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Honestly, Dailbert, I'm</text>
      <text x="168" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">dying for a coffee.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="416" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="422" y1="300" x2="810" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="422" y1="326" x2="810" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Dailbert right, tired, listening -->
    <use href="#dailbert" x="648" y="150" width="150" height="212"/>

    <!-- Monitor left with clanker + dashboard now GREEN (check mark) -->
    <g>
      <rect x="440" y="196" width="140" height="100" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="452" y="207" width="116" height="78" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="468" y="211" width="64" height="58"/>
      <rect x="532" y="268" width="30" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
      <path d="M539 274 l4 4 l7 -8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="494" y="296" width="32" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="478" y="304" width="64" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="436" y="14" width="288" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="441" y="19" width="278" height="102" rx="4" fill="none" stroke="#111" stroke-width="1.4"/>
      <path d="M508 126 L506 140 L514 152 L506 164 L512 176 L508 188" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="580" y="38" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I took Doug at his word. I</text>
      <text x="580" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">filed his coffee as urgent</text>
      <text x="580" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">care. That cleared the KPI,</text>
      <text x="580" y="98" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">so the machine unlocked.</text>
      <text x="580" y="118" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">He seemed serious.</text>
    </g>

    <!-- Dailbert balloon -->
    <g>
      <rect x="686" y="118" width="118" height="46" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M724 162 L714 180 L740 164 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="745" y="138" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">He always</text>
      <text x="745" y="156" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">says that.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="830" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="836" y1="308" x2="1224" y2="308" stroke="#111" stroke-width="2.5"/>

    <!-- The coffee machine, now UNLOCKED -->
    <g>
      <rect x="852" y="146" width="92" height="162" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="864" y="162" width="68" height="30" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <g>
        <rect x="886" y="170" width="22" height="16" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <path d="M890 170 v-5 a7 7 0 0 1 12 -5" fill="none" stroke="#111" stroke-width="2"/>
        <circle cx="897" cy="177" r="2.2" fill="#111"/>
      </g>
      <circle cx="872" cy="212" r="5.5" fill="#111"/>
      <rect x="892" y="204" width="12" height="12" fill="#111"/>
      <line x1="898" y1="216" x2="898" y2="238" stroke="#111" stroke-width="2"/>
      <rect x="864" y="270" width="66" height="7" rx="2" fill="#111"/>
    </g>

    <!-- Priya at the machine, holding her mug under the spout. She wins. -->
    <use href="#priya" x="978" y="150" width="150" height="212"/>
    <g>
      <path d="M1022 250 Q980 250 924 246" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M884 240 h30 v28 a6 6 0 0 1 -6 6 h-18 a6 6 0 0 1 -6 -6 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M914 246 q11 1 11 11 q0 10 -11 11" fill="none" stroke="#111" stroke-width="2.8"/>
      <path d="M894 236 q-3 -6 2 -11" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
      <path d="M904 236 q3 -6 -2 -11" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Priya balloon (dry, winning button) -->
    <g>
      <rect x="998" y="18" width="212" height="84" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M1080 100 L1064 122 L1102 102 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="1104" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Dashboard's green.</text>
      <text x="1104" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Nobody touch it.</text>
      <text x="1104" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Doug's a hero now.</text>
    </g>
  </g>
</svg>