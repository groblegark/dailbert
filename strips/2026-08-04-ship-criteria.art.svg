<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q6 -8 2 -14 q9 4 4 14" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="42" x2="64" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="1.6" fill="#111"/>
      <circle cx="72" cy="42" r="1.6" fill="#111"/>
      <path d="M52 60 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 74 q20 14 40 0 l8 60 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 74 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <rect x="56" y="94" width="8" height="30" fill="#111"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="40" r="2.4" fill="#111"/>
      <circle cx="73" cy="40" r="2.4" fill="#111"/>
      <path d="M44 52 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 78 q20 12 40 0 l6 56 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="80" y="98" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M102 102 q10 2 0 12" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M86 98 q6 -8 12 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <line x1="74" y1="110" x2="82" y2="106" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair up in a bun -->
      <path d="M31 40 q-6 -30 29 -33 q35 3 29 33 q-6 -14 -14 -16 q4 8 -2 12 q-2 -12 -13 -12 q-11 0 -13 12 q-6 -4 -2 -12 q-8 2 -14 16z" fill="#111"/>
      <circle cx="60" cy="6" r="7" fill="#111"/>
      <rect x="42" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="62" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="43" x2="62" y2="43" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="44" r="1.6" fill="#111"/>
      <circle cx="70" cy="44" r="1.6" fill="#111"/>
      <path d="M52 62 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M40 76 q20 12 40 0 l7 58 h-54 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="30" y1="106" x2="40" y2="86" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 86 l-3 8" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE CLANKER (surface-only) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="26" y="30" width="68" height="58" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="14" r="4" fill="#111"/>
      <rect x="36" y="44" width="18" height="10" rx="2" fill="#111"/>
      <rect x="66" y="44" width="18" height="10" rx="2" fill="#111"/>
      <g stroke="#111" stroke-width="2.2">
        <line x1="38" y1="70" x2="82" y2="70"/>
        <line x1="44" y1="64" x2="44" y2="76"/>
        <line x1="54" y1="64" x2="54" y2="76"/>
        <line x1="64" y1="64" x2="64" y2="76"/>
        <line x1="74" y1="64" x2="74" y2="76"/>
      </g>
    </symbol>
  </defs>

  <!-- paper backdrop -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- coffee machine gated behind KPI dashboard -->
    <rect x="34" y="96" width="126" height="188" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- dashboard screen on the machine -->
    <rect x="46" y="112" width="102" height="70" rx="4" fill="#e7e3d9" stroke="#111" stroke-width="2.2"/>
    <!-- screen glow hatching -->
    <g stroke="#cfc9ba" stroke-width="1.2">
      <line x1="50" y1="118" x2="144" y2="118"/>
      <line x1="50" y1="124" x2="144" y2="124"/>
    </g>
    <text x="97" y="127" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">COFFEE KPI</text>
    <!-- locked spout -->
    <rect x="78" y="196" width="36" height="14" rx="3" fill="#111"/>
    <rect x="90" y="210" width="12" height="10" fill="#111"/>
    <!-- lock icon -->
    <rect x="60" y="234" width="22" height="18" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <path d="M64 234 v-5 a7 7 0 0 1 14 0 v5" fill="none" stroke="#111" stroke-width="2.2"/>
    <text x="114" y="248" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">LOCKED</text>

    <!-- Doug and Dailbert staring at it -->
    <use href="#dailbert" x="182" y="128" width="120" height="160"/>
    <use href="#doug" x="262" y="126" width="120" height="160"/>

    <!-- clanker inside the dashboard screen -->
    <use href="#clanker" x="66" y="118" width="62" height="62"/>
    <!-- clanker balloon: rectangular, dashed line to surface -->
    <line x1="120" y1="124" x2="150" y2="66" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="150" y="24" width="156" height="46" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="228" y="42" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">Coffee unlocks when</text>
    <text x="228" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">the team hits target.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- Dailbert dejected, Doug consoling -->
    <use href="#dailbert" x="466" y="140" width="120" height="160"/>
    <use href="#doug" x="616" y="140" width="120" height="160"/>

    <!-- Dailbert balloon -->
    <path d="M452 70 q0 -12 12 -12 h96 q12 0 12 12 v34 q0 12 -12 12 h-70 l-12 16 l-2 -16 h-12 q-12 0 -12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="512" y="84" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">The dashboard's</text>
    <text x="512" y="100" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">been red since May.</text>

    <!-- Doug balloon -->
    <path d="M648 76 q0 -12 12 -12 h92 q12 0 12 12 v30 q0 12 -12 12 h-58 l-10 14 l-2 -14 h-14 q-12 0 -12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="708" y="90" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">So we brew</text>
    <text x="708" y="106" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">sad, together.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- little side table with an ordinary kettle -->
    <rect x="862" y="212" width="90" height="10" fill="#111"/>
    <line x1="870" y1="222" x2="870" y2="294" stroke="#111" stroke-width="3"/>
    <line x1="944" y1="222" x2="944" y2="294" stroke="#111" stroke-width="3"/>
    <!-- plain kettle -->
    <path d="M882 178 q0 -16 25 -16 q25 0 25 16 l-4 32 h-42 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- lid -->
    <ellipse cx="907" cy="164" rx="20" ry="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <circle cx="907" cy="158" r="3.5" fill="#111"/>
    <!-- handle -->
    <path d="M894 168 q13 -20 26 0" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- spout -->
    <path d="M932 182 q14 -2 12 -14" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- steam -->
    <path d="M944 158 q6 -6 0 -12 q-6 -6 0 -12" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Priya standing calmly beside it -->
    <use href="#priya" x="958" y="140" width="120" height="160"/>
    <!-- Doug's mug in frame reaching in from left, steam -->
    <rect x="838" y="240" width="26" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M864 244 q12 3 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
    <path d="M851 234 q5 -5 0 -10 q-5 -5 0 -10" fill="none" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Priya balloon -->
    <path d="M976 44 q0 -12 12 -12 h100 q12 0 12 12 v30 q0 12 -12 12 h-32 l-10 14 l-2 -14 h-56 q-12 0 -12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1044" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">This one has no</text>
    <text x="1044" y="74" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">opinions. Just water.</text>

    <!-- Doug's small button line -->
    <path d="M842 282 q0 -10 10 -10 h86 q10 0 10 10 v18 q0 10 -10 10 h-96 z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <text x="895" y="296" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">Best cup all year.</text>
  </g>
</svg>