<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 4 q6 -8 1 -12 q9 3 4 13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="34" x2="53" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="34" r="1.8" fill="#111"/>
      <circle cx="60" cy="34" r="1.8" fill="#111"/>
      <path d="M42 50 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 q20 12 40 0 l10 46 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 64 l-7 12 l7 6 l7 -6 z" fill="#111"/>
      <rect x="47" y="82" width="6" height="20" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 100 130">
      <circle cx="50" cy="36" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="34" r="2.4" fill="#111"/>
      <circle cx="60" cy="34" r="2.4" fill="#111"/>
      <path d="M36 44 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M28 66 q22 12 44 0 l8 44 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="60" y="86" width="20" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M80 90 q8 0 8 6 q0 6 -8 6" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M64 82 q2 -6 6 -3" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 130">
      <ellipse cx="50" cy="36" rx="25" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M24 30 q-4 -22 26 -24 q30 2 26 24 q-6 -12 -26 -12 q-20 0 -26 12" fill="#111"/>
      <path d="M26 22 q-6 6 -3 14" fill="#111" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <path d="M74 22 q6 6 3 14" fill="#111" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <rect x="33" y="32" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="32" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="36" x2="53" y2="36" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="37" r="1.7" fill="#111"/>
      <circle cx="60" cy="37" r="1.7" fill="#111"/>
      <path d="M43 50 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 q20 11 40 0 l9 46 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="42" y1="70" x2="40" y2="92" stroke="#111" stroke-width="2"/>
      <line x1="58" y1="70" x2="60" y2="92" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 100 130">
      <ellipse cx="50" cy="40" rx="25" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M36 18 L26 -10 L47 14 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M64 18 L74 -10 L53 14 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="42" cy="38" r="1.9" fill="#111"/>
      <circle cx="58" cy="38" r="1.9" fill="#111"/>
      <path d="M44 50 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 68 q20 11 40 0 l9 44 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 68 l-7 14 l7 12 l7 -12 z" fill="#111"/>
    </symbol>

    <!-- CLANKER (drawn inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="8" x2="50" y2="20" stroke="#8a8f96" stroke-width="2"/>
      <circle cx="50" cy="6" r="3.5" fill="#8a8f96"/>
      <rect x="24" y="20" width="52" height="46" rx="6" fill="#2a2f36" stroke="#8a8f96" stroke-width="2.2"/>
      <rect x="31" y="32" width="14" height="8" rx="2" fill="#bfe3ff"/>
      <rect x="55" y="32" width="14" height="8" rx="2" fill="#bfe3ff"/>
      <line x1="33" y1="52" x2="67" y2="52" stroke="#8a8f96" stroke-width="1.6"/>
      <line x1="33" y1="57" x2="67" y2="57" stroke="#8a8f96" stroke-width="1.6"/>
      <line x1="40" y1="49" x2="40" y2="60" stroke="#8a8f96" stroke-width="1.6"/>
      <line x1="50" y1="49" x2="50" y2="60" stroke="#8a8f96" stroke-width="1.6"/>
      <line x1="60" y1="49" x2="60" y2="60" stroke="#8a8f96" stroke-width="1.6"/>
    </symbol>

    <!-- desk plant, quietly giving up -->
    <symbol id="plant" viewBox="0 0 60 70">
      <path d="M20 46 h20 l-3 20 h-14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M30 46 q-2 -18 -12 -22" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 46 q1 -14 10 -20" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M18 24 q-8 -2 -8 6 q8 1 8 -6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M40 26 q8 -1 7 6 q-8 0 -7 -6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M30 46 q0 8 -6 12" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <!-- Boss at a whiteboard/all-hands: mandatory approval form -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="0" y="252" width="400" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="0" y1="252" x2="400" y2="252" stroke="#111" stroke-width="2.5"/>

      <!-- whiteboard -->
      <rect x="34" y="150" width="132" height="96" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="100" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" font-weight="bold">NEW POLICY</text>
      <text x="100" y="200" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10.5" fill="#111">All AI actions need</text>
      <text x="100" y="216" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10.5" fill="#111">human sign-off.</text>
      <text x="100" y="234" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">Form 27-B required.</text>

      <!-- boss presenting -->
      <use href="#boss" x="150" y="150" width="130" height="169"/>
      <!-- audience heads (backs) -->
      <use href="#dailbert" x="266" y="196" width="80" height="130"/>
      <use href="#priya" x="326" y="196" width="80" height="130"/>

      <!-- boss balloon -->
      <path d="M150 20 h220 a6 6 0 0 1 6 6 v42 a6 6 0 0 1 -6 6 h-118 l-14 12 l2 -12 h-90 a6 6 0 0 1 -6 -6 v-42 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="260" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">From today, a human</text>
      <text x="260" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">approves every AI step.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <!-- Dailbert + Doug at the desk monitor; clanker earnestly complies -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="252" width="400" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="414" y1="252" x2="814" y2="252" stroke="#111" stroke-width="2.5"/>

      <!-- monitor -->
      <rect x="440" y="160" width="96" height="76" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="447" y="167" width="82" height="62" rx="2" fill="#ece7dc" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="459" y="168" width="58" height="58"/>

      <use href="#dailbert" x="586" y="128" width="140" height="182"/>
      <use href="#doug" x="694" y="150" width="130" height="169"/>

      <use href="#plant" x="756" y="196" width="52" height="60"/>

      <!-- clanker balloon -->
      <line x1="500" y1="160" x2="500" y2="122" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="432" y="48" width="212" height="74" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="538" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Understood. I drafted the</text>
      <text x="538" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">approval form and filled</text>
      <text x="538" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">it in. It needs a signature.</text>

      <!-- dailbert small line -->
      <path d="M600 150 h118 a6 6 0 0 1 6 6 v26 a6 6 0 0 1 -6 6 h-52 l-12 11 l2 -11 h-56 a6 6 0 0 1 -6 -6 v-26 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="659" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Whose signature?</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <!-- Priya, deadpan win; clanker's small earnest answer -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="252" width="400" height="88" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="828" y1="252" x2="1228" y2="252" stroke="#111" stroke-width="2.5"/>

      <use href="#priya" x="852" y="150" width="130" height="169"/>

      <!-- monitor -->
      <rect x="1060" y="170" width="100" height="78" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="1067" y="177" width="86" height="64" rx="2" fill="#ece7dc" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="1080" y="178" width="60" height="60"/>

      <!-- priya balloon -->
      <path d="M844 22 h150 a6 6 0 0 1 6 6 v40 a6 6 0 0 1 -6 6 h-70 l-14 14 l2 -14 h-68 a6 6 0 0 1 -6 -6 v-40 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="919" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Leave it blank. That's</text>
      <text x="919" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">what oversight means.</text>

      <!-- clanker balloon -->
      <line x1="1110" y1="170" x2="1110" y2="140" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="1008" y="70" width="196" height="70" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1106" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Noted. I logged the form</text>
      <text x="1106" y="110" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">as awaiting a human.</text>
      <text x="1106" y="128" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I'll wait.</text>
    </g>
  </g>
</svg>