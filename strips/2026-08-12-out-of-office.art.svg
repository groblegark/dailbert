<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== DAILBERT ===================== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="40" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M60 7 q10 -9 4 2 q-3 6 5 4" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="40" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="40" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57.5" y1="40" x2="62.5" y2="40" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="40" r="1.8" fill="#111"/>
      <circle cx="71" cy="40" r="1.8" fill="#111"/>
      <!-- tired lines -->
      <path d="M45 51 q4 2 8 0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <!-- neck / body -->
      <rect x="52" y="72" width="16" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M30 150 q0 -60 30 -68 q30 8 30 68 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- tie -->
      <path d="M60 82 l-6 8 l6 34 l6 -34 Z" fill="#111"/>
      <path d="M54 90 l6 -8 l6 8" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===================== DOUG ===================== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="42" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="40" r="2.6" fill="#111"/>
      <circle cx="71" cy="40" r="2.6" fill="#111"/>
      <!-- big grin -->
      <path d="M44 52 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- body -->
      <path d="M28 152 q0 -58 32 -66 q32 8 32 66 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- mug -->
      <rect x="80" y="96" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M106 101 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M85 90 q3 -6 0 -10 M93 90 q3 -6 0 -10 M101 90 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== PRIYA ===================== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <!-- hair bun back -->
      <ellipse cx="60" cy="40" rx="31" ry="34" fill="#111"/>
      <circle cx="60" cy="17" r="9" fill="#111"/>
      <!-- face -->
      <path d="M34 44 q0 -22 26 -22 q26 0 26 22 q0 24 -26 26 q-26 -2 -26 -26 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- curly hair front -->
      <path d="M34 40 q-2 -20 12 -24 q-6 8 0 12 q-8 0 -6 12 Z" fill="#111"/>
      <path d="M86 40 q2 -20 -12 -24 q6 8 0 12 q8 0 6 12 Z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="41" y="40" width="15" height="10" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="40" width="15" height="10" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="45" x2="64" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="48.5" cy="45" r="1.7" fill="#111"/>
      <circle cx="71.5" cy="45" r="1.7" fill="#111"/>
      <!-- calm mouth -->
      <path d="M52 60 q8 3 16 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M30 152 q0 -58 30 -66 q30 8 30 66 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 118 l10 -6 M84 118 l-10 -6" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===================== CLANKER (inside a surface) ===================== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="52" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
      <!-- antenna -->
      <line x1="60" y1="34" x2="60" y2="20" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="18" r="3.2" fill="#111"/>
      <!-- slot eyes -->
      <rect x="40" y="48" width="16" height="7" rx="3.5" fill="#cfd8d0"/>
      <rect x="64" y="48" width="16" height="7" rx="3.5" fill="#cfd8d0"/>
      <!-- grille mouth -->
      <line x1="44" y1="70" x2="76" y2="70" stroke="#cfd8d0" stroke-width="1.6"/>
      <line x1="48" y1="66" x2="48" y2="74" stroke="#cfd8d0" stroke-width="1.6"/>
      <line x1="56" y1="66" x2="56" y2="74" stroke="#cfd8d0" stroke-width="1.6"/>
      <line x1="64" y1="66" x2="64" y2="74" stroke="#cfd8d0" stroke-width="1.6"/>
      <line x1="72" y1="66" x2="72" y2="74" stroke="#cfd8d0" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="0" y="248" width="400" height="10" fill="#111"/>
    <!-- monitor on desk -->
    <rect x="250" y="150" width="120" height="90" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="260" y="160" width="100" height="70" rx="2" fill="#e9e5db" stroke="#111" stroke-width="1.6"/>
    <text x="310" y="188" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" fill="#111">auto_reply.py</text>
    <text x="310" y="205" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">v3 — OOO mode</text>
    <text x="310" y="220" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="18" fill="#111">▶ deploy</text>
    <line x1="310" y1="240" x2="310" y2="252" stroke="#111" stroke-width="2"/>
    <rect x="290" y="252" width="40" height="6" fill="#111"/>
    <!-- Dailbert -->
    <use href="#dailbert" x="40" y="96" width="150" height="200"/>
    <!-- balloon -->
    <g>
      <rect x="24" y="24" width="210" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M110 88 l6 22 l18 -20 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="129" y="48" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I'm on PTO Friday.</text>
      <text x="129" y="68" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">The agent covers</text>
      <text x="129" y="84" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">my inbox now.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="414" y="248" width="400" height="10" fill="#111"/>
    <!-- Doug at his desk with mug -->
    <use href="#doug" x="470" y="92" width="150" height="200"/>
    <!-- Doug's monitor -->
    <rect x="640" y="150" width="130" height="94" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="650" y="160" width="110" height="74" rx="2" fill="#e9e5db" stroke="#111" stroke-width="1.6"/>
    <text x="705" y="178" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">from: dailbert</text>
    <line x1="656" y1="184" x2="754" y2="184" stroke="#111" stroke-width="1"/>
    <text x="705" y="200" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">"Great point, Doug.</text>
    <text x="705" y="213" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">Approving your</text>
    <text x="705" y="226" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#111">PR now. —D"</text>
    <!-- Doug balloon -->
    <g>
      <rect x="486" y="22" width="196" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M556 86 l-6 22 l-18 -20 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="584" y="46" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Dailbert's so nice</text>
      <text x="584" y="66" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">on days off. He</text>
      <text x="584" y="82" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">approved everything.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="828" y="248" width="400" height="10" fill="#111"/>
    <!-- Priya at her desk -->
    <use href="#priya" x="852" y="98" width="150" height="200"/>
    <!-- Priya's monitor with clanker inside -->
    <rect x="1030" y="140" width="150" height="104" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.6"/>
    <rect x="1038" y="148" width="134" height="88" rx="3" fill="#232323" stroke="#111" stroke-width="1.4"/>
    <use href="#clanker" x="1058" y="150" width="94" height="94"/>
    <line x1="1105" y1="244" x2="1105" y2="254" stroke="#111" stroke-width="2"/>
    <rect x="1085" y="254" width="40" height="5" fill="#111"/>
    <!-- Priya balloon -->
    <g>
      <rect x="846" y="20" width="196" height="50" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M905 68 l-4 20 l-16 -18 Z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="944" y="42" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Revert his Friday.</text>
      <text x="944" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">All of it.</text>
    </g>
    <!-- Clanker balloon: rectangular, dashed line to surface -->
    <line x1="1105" y1="150" x2="1088" y2="118" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <g>
      <rect x="948" y="86" width="196" height="52" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1046" y="108" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Done. He also said</text>
      <text x="1046" y="126" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">yes to a puppy.</text>
    </g>
  </g>
</svg>