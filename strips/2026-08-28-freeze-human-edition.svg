      <path d="M636 176 l-6 18 l18 -12 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="702" y="142" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">We just don't</text>
      <text x="702" y="162" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">deploy on Fridays.</text>
