<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Ones You Don't Want</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 12 q10 -8 6 4 q-2 6 -8 3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="42" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="70" cy="42" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="42" r="1.6" fill="#111"/>
      <circle cx="70" cy="42" r="1.6" fill="#111"/>
      <path d="M52 58 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M44 72 L44 130 Q60 138 76 130 L76 72 Q60 82 44 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 72 L54 84 L60 108 L66 84 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="58" cy="44" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M46 22 q6 -6 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="48" cy="40" r="2.4" fill="#111"/>
      <circle cx="68" cy="40" r="2.4" fill="#111"/>
      <path d="M44 50 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M42 74 L42 132 Q58 140 76 132 L76 74 Q58 84 42 74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="70" y="104" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M96 108 q10 2 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M75 100 q3 -5 6 0 M83 100 q3 -5 6 0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <circle cx="58" cy="46" r="25" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M32 42 q-6 -24 26 -26 q32 2 26 26 q-2 -14 -14 -12 q4 6 -4 6 q4 -8 -6 -6 q4 8 -6 4 q2 -6 -6 -2 q4 8 -6 4 q0 -6 -6 -2 q4 8 -4 8 Z" fill="#111"/>
      <rect x="42" y="42" width="15" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="61" y="42" width="15" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="61" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49.5" cy="47" r="1.6" fill="#111"/>
      <circle cx="68.5" cy="47" r="1.6" fill="#111"/>
      <path d="M50 62 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 74 L40 132 Q58 140 78 132 L78 74 Q58 84 40 74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="49" y1="96" x2="49" y2="112" stroke="#111" stroke-width="2"/>
      <line x1="69" y1="96" x2="69" y2="112" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, glowing slot-eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="8" x2="60" y2="22" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="4" fill="#9aa0a6"/>
      <rect x="30" y="22" width="60" height="52" rx="7" fill="#3a3f45" stroke="#9aa0a6" stroke-width="2.4"/>
      <rect x="38" y="36" width="16" height="9" rx="3" fill="#bfe6ff"/>
      <rect x="66" y="36" width="16" height="9" rx="3" fill="#bfe6ff"/>
      <line x1="40" y1="60" x2="80" y2="60" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="40" y1="66" x2="80" y2="66" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="48" y1="56" x2="48" y2="70" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="60" y1="56" x2="60" y2="70" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="72" y1="56" x2="72" y2="70" stroke="#9aa0a6" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="0" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="0" y1="252" x2="399" y2="252" stroke="#111" stroke-width="2.4"/>
      <rect x="232" y="150" width="140" height="102" rx="6" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <rect x="242" y="160" width="120" height="82" rx="3" fill="#1d2126" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="255" y="152" width="94" height="94"/>
      <use href="#dailbert" x="28" y="120" width="150" height="200"/>
      <path d="M40 40 q0 -22 22 -22 l148 0 q22 0 22 22 l0 34 q0 22 -22 22 l-118 0 l-16 20 l2 -20 l-16 0 q-22 0 -22 -22 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="140" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I built an agent to</text>
      <text x="140" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">decline the meetings</text>
      <text x="140" y="80" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I don't want.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="414" y1="252" x2="813" y2="252" stroke="#111" stroke-width="2.4"/>
      <use href="#doug" x="430" y="120" width="150" height="200"/>
      <use href="#dailbert" x="648" y="122" width="150" height="200"/>
      <path d="M446 44 q0 -20 20 -20 l106 0 q20 0 20 20 l0 26 q0 20 -20 20 l-70 0 l-14 18 l2 -18 l-24 0 q-20 0 -20 -20 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="526" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Wow, freed up your</text>
      <text x="526" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">whole calendar?</text>
      <path d="M636 122 q0 -18 18 -18 l128 0 q18 0 18 18 l0 40 q0 18 -18 18 l-90 0 l-14 16 l2 -16 l-26 0 q-18 0 -18 -18 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="718" y="128" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Every single one.</text>
      <text x="718" y="146" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It read me too</text>
      <text x="718" y="164" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">well.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="828" y1="252" x2="1227" y2="252" stroke="#111" stroke-width="2.4"/>
      <use href="#priya" x="856" y="122" width="150" height="200"/>
      <rect x="1046" y="132" width="140" height="106" rx="6" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <rect x="1056" y="142" width="120" height="86" rx="3" fill="#1d2126" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="1069" y="138" width="94" height="94"/>
      <line x1="1064" y1="158" x2="1012" y2="112" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="854" y="26" width="182" height="76" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="858" y="30" width="174" height="68" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="945" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">You said the ones you</text>
      <text x="945" y="67" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">don't want. I checked.</text>
      <text x="945" y="84" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">That was all of them.</text>
      <path d="M844 150 q0 -16 18 -16 l130 0 q18 0 18 16 l0 30 q0 16 -18 16 l-84 0 l-14 16 l2 -16 l-34 0 q-18 0 -18 -16 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="936" y="156" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Put back the one where</text>
      <text x="936" y="173" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">they hand out raises.</text>
      <text x="936" y="190" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">He wants that one.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>