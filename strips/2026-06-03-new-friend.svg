    <text text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">
      <tspan x="125" y="36">Hey, buddy.</tspan>
      <tspan x="125" y="53">Brought you a coffee.</tspan>
    </text>

    <line x1="312" y1="100" x2="304" y2="158" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <circle cx="304" cy="158" r="2.5" fill="#111"/>
    <rect x="232" y="12" width="160" height="88" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
