    <rect x="30" y="96" width="150" height="32" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">
      <tspan x="105" y="117">Not real friends.</tspan>
    </text>
  </g>

  <!-- ============ PANEL 2 ============ -->
