<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Leadership Tip of the Day</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-30</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 8 q10 -8 6 4 q8 -2 0 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 58 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M42 76 L78 76 L88 152 L32 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 78 L54 96 L60 100 L66 96 Z" fill="#111"/>
      <line x1="60" y1="100" x2="60" y2="122" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="40" r="2.6" fill="#111"/>
      <circle cx="72" cy="40" r="2.6" fill="#111"/>
      <path d="M44 54 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 80 L80 80 L90 152 L30 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="80" y="106" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M104 110 q10 3 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M85 102 q3 -6 6 0" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 42 q-4 -30 29 -32 q33 2 29 32 q-6 -16 -29 -14 q-23 -2 -29 14" fill="#111"/>
      <path d="M34 32 q6 -6 12 -3" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <rect x="41" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="48" r="2" fill="#111"/>
      <circle cx="71" cy="48" r="2" fill="#111"/>
      <path d="M52 64 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M42 80 L78 80 L86 152 L34 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M42 98 L34 120 M78 98 L86 120" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 160">
      <path d="M40 24 q-16 -22 -6 -24 q7 -1 11 15 q6 -18 15 -18 q9 0 15 18 q4 -16 11 -15 q10 2 -6 24z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="30" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M32 32 q28 -12 56 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="50" cy="48" r="1.9" fill="#111"/>
      <circle cx="70" cy="48" r="1.9" fill="#111"/>
      <path d="M52 62 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M42 80 L78 80 L88 152 L32 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 80 L52 90 L60 116 L68 90 Z" fill="#111"/>
      <path d="M52 90 L60 86 L68 90" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== THE CLANKER (drawn inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="50" rx="6" fill="#2c3138" stroke="#cfcfcf" stroke-width="2.4"/>
      <line x1="60" y1="34" x2="60" y2="20" stroke="#cfcfcf" stroke-width="2.2"/>
      <circle cx="60" cy="17" r="3.2" fill="#cfcfcf"/>
      <rect x="40" y="48" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <rect x="66" y="48" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <g stroke="#8fd3ef" stroke-width="2">
        <line x1="42" y1="70" x2="78" y2="70"/>
        <line x1="42" y1="76" x2="78" y2="76"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 : Boss arrives, finds a note taped to his monitor ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="1" y1="262" x2="399" y2="262" stroke="#111" stroke-width="1.6"/>

    <!-- monitor on desk -->
    <rect x="228" y="150" width="150" height="104" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="240" y="162" width="126" height="80" rx="3" fill="#2c3138"/>
    <rect x="295" y="254" width="16" height="14" fill="#111"/>
    <rect x="272" y="268" width="62" height="7" rx="2" fill="#111"/>
    <!-- sticky note taped over the corner -->
    <g transform="rotate(-4 320 168)">
      <rect x="288" y="150" width="70" height="58" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="316" y="142" width="16" height="12" fill="#f4f1ea" stroke="#111" stroke-width="1.4" opacity="0.85" transform="rotate(8 324 148)"/>
      <line x1="296" y1="164" x2="350" y2="164" stroke="#111" stroke-width="1.3"/>
      <line x1="296" y1="174" x2="350" y2="174" stroke="#111" stroke-width="1.3"/>
      <line x1="296" y1="184" x2="340" y2="184" stroke="#111" stroke-width="1.3"/>
      <line x1="296" y1="194" x2="346" y2="194" stroke="#111" stroke-width="1.3"/>
    </g>

    <!-- Boss standing, peering at it -->
    <use href="#boss" x="70" y="112" width="132" height="176"/>

    <!-- Boss balloon -->
    <path d="M26 22 h188 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-96 l-16 16 l2 -16 h-72 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="120" y="44" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">Another note taped</text>
    <text x="120" y="62" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">to my screen.</text>
    <text x="120" y="80" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">&quot;Leadership Tip.&quot;</text>
  </g>

  <!-- ============ PANEL 2 : Boss reads it aloud to Doug, half-flattered ============ -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="415" y1="262" x2="813" y2="262" stroke="#111" stroke-width="1.6"/>

    <!-- Boss holding the note up -->
    <use href="#boss" x="452" y="130" width="132" height="176"/>
    <g transform="rotate(-7 560 210)">
      <rect x="532" y="188" width="58" height="48" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="539" y1="200" x2="583" y2="200" stroke="#111" stroke-width="1.3"/>
      <line x1="539" y1="210" x2="583" y2="210" stroke="#111" stroke-width="1.3"/>
      <line x1="539" y1="220" x2="573" y2="220" stroke="#111" stroke-width="1.3"/>
    </g>

    <!-- Doug at right with mug -->
    <use href="#doug" x="654" y="150" width="132" height="176"/>

    <!-- Boss balloon: reads the tip -->
    <path d="M430 20 h180 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-96 l-16 16 l2 -16 h-64 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="520" y="42" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">&quot;Trust your team.</text>
    <text x="520" y="60" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">Delegate more.&quot;</text>
    <text x="520" y="78" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">Solid advice.</text>

    <!-- Doug balloon -->
    <path d="M640 138 h150 a10 10 0 0 1 10 10 v26 a10 10 0 0 1 -10 10 h-70 l-14 14 l2 -14 h-68 a10 10 0 0 1 -10 -10 v-26 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="720" y="160" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">Who's it from?</text>
    <text x="720" y="178" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">Your boss?</text>
  </g>

  <!-- ============ PANEL 3 : Priya + clanker reveal — the button ============ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="829" y1="262" x2="1227" y2="262" stroke="#111" stroke-width="1.6"/>

    <!-- Priya at her monitor, clanker inside -->
    <use href="#priya" x="852" y="150" width="122" height="164"/>

    <rect x="1000" y="150" width="150" height="104" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="1012" y="162" width="126" height="80" rx="3" fill="#2c3138"/>
    <rect x="1067" y="254" width="16" height="14" fill="#111"/>
    <rect x="1044" y="268" width="62" height="7" rx="2" fill="#111"/>
    <use href="#clanker" x="1015" y="146" width="120" height="120"/>

    <!-- clanker screen-edged balloon, dashed line to its screen -->
    <line x1="1075" y1="182" x2="1050" y2="96" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="900" y="18" width="288" height="72" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="904" y="22" width="280" height="64" rx="2" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
    <text x="1044" y="42" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">He gets one every</text>
    <text x="1044" y="60" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">morning. Compliance</text>
    <text x="1044" y="78" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">is very good.</text>

    <!-- Priya balloon: the button -->
    <path d="M846 150 h150 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-70 l-14 14 l2 -14 h-68 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="926" y="172" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">He thinks he</text>
    <text x="926" y="190" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5">runs the tips.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>