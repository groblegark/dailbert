<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 8 q7 -10 2 -6 q6 3 -2 12" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="1.8" fill="#111"/>
      <circle cx="71" cy="42" r="1.8" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 76 q20 12 40 0 l10 40 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 76 l-6 8 l6 26 l6 -26 z" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="40" r="2.4" fill="#111"/>
      <circle cx="72" cy="40" r="2.4" fill="#111"/>
      <path d="M44 54 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 80 q22 12 44 0 l8 42 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <g>
        <rect x="86" y="96" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
        <path d="M112 100 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>
        <path d="M92 92 q3 -6 0 -10 M100 92 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      </g>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="30" rx="16" ry="12" fill="#111"/>
      <ellipse cx="60" cy="46" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 44 q-4 -26 20 -32 q9 -6 20 0 q22 8 18 32 q-6 -14 -18 -16 q-12 -6 -22 0 q-12 4 -16 16 z" fill="#111"/>
      <rect x="41" y="44" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="44" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="49" x2="63" y2="49" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="49.5" r="1.7" fill="#111"/>
      <circle cx="71" cy="49.5" r="1.7" fill="#111"/>
      <path d="M53 66 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 80 q20 12 40 0 l9 40 q-29 12 -58 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="47" y1="104" x2="43" y2="118" stroke="#111" stroke-width="2.2"/>
      <line x1="73" y1="104" x2="77" y2="118" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE BOSS -->
    <symbol id="boss" viewBox="0 0 120 160">
      <ellipse cx="60" cy="48" rx="29" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 26 l-6 -22 l16 16 z" fill="#111"/>
      <path d="M80 26 l6 -22 l-16 16 z" fill="#111"/>
      <path d="M40 26 q20 -8 40 0" fill="none" stroke="#111" stroke-width="2.6"/>
      <circle cx="50" cy="48" r="1.8" fill="#111"/>
      <circle cx="70" cy="48" r="1.8" fill="#111"/>
      <path d="M52 62 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 80 q20 12 40 0 l9 40 q-29 12 -58 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 80 l-6 8 l6 20 l6 -20 z" fill="#111"/>
    </symbol>

    <!-- THE CLANKER -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="26" y="30" width="68" height="56" rx="7" fill="#20242b" stroke="#0a0a0a" stroke-width="2.4"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#0a0a0a" stroke-width="2.4"/>
      <circle cx="60" cy="13" r="3.4" fill="#0a0a0a"/>
      <rect x="36" y="46" width="18" height="8" rx="3" fill="#cfe8ff"/>
      <rect x="66" y="46" width="18" height="8" rx="3" fill="#cfe8ff"/>
      <g stroke="#7f8794" stroke-width="2">
        <line x1="40" y1="70" x2="80" y2="70"/>
        <line x1="40" y1="75" x2="80" y2="75"/>
      </g>
      <line x1="46" y1="66" x2="46" y2="79" stroke="#20242b" stroke-width="2"/>
      <line x1="60" y1="66" x2="60" y2="79" stroke="#20242b" stroke-width="2"/>
      <line x1="74" y1="66" x2="74" y2="79" stroke="#20242b" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <!-- whiteboard with old friday bracket -->
    <rect x="24" y="24" width="150" height="106" rx="4" fill="#fbfaf6" stroke="#111" stroke-width="2.2"/>
    <text x="99" y="41" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" text-anchor="middle" fill="#333">FRIDAY BRACKET</text>
    <g stroke="#555" stroke-width="1.6" fill="none">
      <line x1="38" y1="56" x2="66" y2="56"/><line x1="38" y1="72" x2="66" y2="72"/>
      <line x1="66" y1="56" x2="66" y2="72"/><line x1="66" y1="64" x2="86" y2="64"/>
      <line x1="38" y1="92" x2="66" y2="92"/><line x1="38" y1="108" x2="66" y2="108"/>
      <line x1="66" y1="92" x2="66" y2="108"/><line x1="66" y1="100" x2="86" y2="100"/>
      <line x1="86" y1="64" x2="86" y2="100"/><line x1="86" y1="82" x2="110" y2="82"/>
    </g>
    <text x="138" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#555">$1 in</text>
    <text x="138" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#555">winner</text>
    <text x="138" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#555">gloats</text>

    <!-- doug and priya -->
    <use href="#doug" x="26" y="150" width="150" height="200"/>
    <use href="#priya" x="216" y="150" width="150" height="200"/>

    <!-- doug balloon -->
    <path d="M58 156 q-30 0 -30 24 q0 22 38 22 l28 0 q38 0 38 -22 q0 -24 -38 -24 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M90 200 l6 16 l12 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="76" y="174" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Friday pool.</text>
    <text x="76" y="190" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">You in, Priya?</text>

    <!-- priya balloon -->
    <path d="M300 166 q34 0 34 24 q0 22 -38 22 l-24 0 q-34 0 -34 -22 q0 -24 38 -24 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M278 208 l-4 16 l-12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="299" y="184" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Always. Same</text>
    <text x="299" y="200" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">as every week.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <!-- monitor on desk with clanker -->
    <rect x="500" y="30" width="230" height="150" rx="8" fill="#1b1f26" stroke="#111" stroke-width="2.6"/>
    <rect x="512" y="42" width="206" height="126" rx="4" fill="#242a33"/>
    <rect x="600" y="180" width="30" height="18" fill="#1b1f26" stroke="#111" stroke-width="2.4"/>
    <rect x="572" y="198" width="86" height="9" rx="3" fill="#1b1f26" stroke="#111" stroke-width="2.4"/>
    <!-- clanker inside screen -->
    <use href="#clanker" x="522" y="48" width="90" height="90"/>
    <!-- policy text on the screen -->
    <text x="662" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" text-anchor="middle" fill="#cfe8ff">ENGAGEMENT</text>
    <text x="662" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" text-anchor="middle" fill="#cfe8ff">POOL v2.1</text>
    <g stroke="#5c6675" stroke-width="1.4">
      <line x1="628" y1="92" x2="700" y2="92"/>
      <line x1="628" y1="102" x2="700" y2="102"/>
      <line x1="628" y1="112" x2="694" y2="112"/>
      <line x1="628" y1="122" x2="700" y2="122"/>
      <line x1="628" y1="132" x2="688" y2="132"/>
      <line x1="628" y1="142" x2="700" y2="142"/>
      <line x1="628" y1="152" x2="692" y2="152"/>
    </g>

    <!-- clanker balloon: screen-edged, dashed line to surface -->
    <line x1="558" y1="146" x2="470" y2="210" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="432" y="210" width="240" height="114" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="552" y="230" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">I formalized the pool.</text>
    <text x="552" y="248" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">It has a rubric, a bylaw,</text>
    <text x="552" y="266" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">an eligibility form, and</text>
    <text x="552" y="284" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">a compliance reminder</text>
    <text x="552" y="302" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">now.</text>
    <text x="552" y="318" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Enjoy.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <!-- official pool sheet taped to wall -->
    <rect x="1050" y="26" width="146" height="150" rx="3" fill="#fbfaf6" stroke="#111" stroke-width="2.2"/>
    <rect x="1042" y="20" width="18" height="12" fill="#e7e2d6" stroke="#999" stroke-width="1" transform="rotate(-18 1051 26)"/>
    <text x="1123" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#333">OFFICIAL POOL</text>
    <line x1="1062" y1="52" x2="1186" y2="52" stroke="#999" stroke-width="1.2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#666">
      <text x="1062" y="68">Entrants: 0</text>
      <text x="1062" y="86">Sect 4: waiver</text>
      <text x="1062" y="104">Sect 5: audit</text>
      <text x="1062" y="122">Sect 6: rubric</text>
      <text x="1062" y="140">(see 11 pp.)</text>
      <text x="1062" y="164">Have fun!</text>
    </g>

    <!-- priya and doug walking off -->
    <use href="#priya" x="848" y="150" width="150" height="200"/>
    <use href="#doug" x="986" y="150" width="150" height="200"/>

    <!-- priya balloon -->
    <path d="M916 158 q-34 0 -34 24 q0 22 40 22 l24 0 q34 0 34 -22 q0 -24 -38 -24 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M946 200 l6 16 l12 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="932" y="176" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I'll take a buck</text>
    <text x="932" y="192" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">and a handshake.</text>

    <!-- doug balloon -->
    <path d="M1050 172 q32 0 32 22 q0 20 -36 20 l-16 0 q-32 0 -32 -20 q0 -22 36 -22 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M1040 212 l-4 15 l-11 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="1048" y="190" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Same as every</text>
    <text x="1048" y="206" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">week.</text>
  </g>
</svg>