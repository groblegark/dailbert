  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#pnl)">
    <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
    <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="1.5" opacity="0.35"/>

    <!-- wall monitor -->
    <rect x="205" y="28" width="168" height="106" rx="6" fill="#111" stroke="#111" stroke-width="3"/>
    <rect x="214" y="36" width="150" height="90" rx="3" fill="#23262b"/>
    <line x1="220" y1="44" x2="358" y2="44" stroke="#4d5560" stroke-width="1.5"/>
    <rect x="228" y="96" width="18" height="22" fill="#bfe3f0"/>
    <rect x="252" y="78" width="18" height="40" fill="#bfe3f0"/>
    <rect x="276" y="88" width="18" height="30" fill="#8fb6c4"/>
    <rect x="300" y="66" width="18" height="52" fill="#bfe3f0"/>
    <rect x="324" y="100" width="18" height="18" fill="#5c6771"/>
    <path d="M287 134 L287 148 L267 156 M287 148 L307 156" fill="none" stroke="#111" stroke-width="3"/>

    <!-- boss -->
    <use href="#boss" x="20" y="118" width="120" height="180"/>
    <!-- pointing arm -->
    <path d="M108 208 L150 150 L193 94 L207 104 L167 160 L124 214 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="200" cy="98" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- audience -->
    <use href="#dailbert" x="176" y="188" width="100" height="150"/>
    <use href="#doug" x="258" y="192" width="118" height="150"/>
    <use href="#mug" x="238" y="250" width="56" height="54"/>

    <!-- boss balloon -->
    <path d="M120 148 L96 128 L112 128 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="30" y="14" width="132" height="70" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="96" y="36" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Efficiency. Live.</text>
    <text x="96" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Every desk.</text>
    <text x="96" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Every minute.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#pnl)" transform="translate(414,0)">
    <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
    <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="1.5" opacity="0.35"/>

    <!-- dashboard close-up -->
    <rect x="34" y="20" width="332" height="176" rx="6" fill="#111" stroke="#111" stroke-width="3"/>
    <rect x="42" y="28" width="316" height="160" rx="3" fill="#23262b"/>
    <text x="58" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#7fd0e6" letter-spacing="2">EFFICIENCY — LIVE</text>
    <line x1="58" y1="54" x2="342" y2="54" stroke="#3a424c" stroke-width="1.5"/>

    <!-- rows -->
    <text x="58" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#cfd6dd">DAILBERT</text>
    <rect x="150" y="66" width="150" height="12" rx="2" fill="#bfe3f0"/>
    <text x="58" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#cfd6dd">DOUG</text>
    <rect x="150" y="90" width="190" height="12" rx="2" fill="#bfe3f0"/>
    <text x="58" y="124" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#6c7178">KAREN</text>
    <rect x="150" y="114" width="70" height="12" rx="2" fill="none" stroke="#565b61" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="58" y="148" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#cfd6dd">TABITHA</text>
    <rect x="150" y="138" width="120" height="12" rx="2" fill="#bfe3f0"/>
    <text x="58" y="172" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#cfd6dd">BOSS</text>
    <rect x="150" y="162" width="196" height="12" rx="2" fill="#8fb6c4"/>

    <!-- viewers -->
    <use href="#dailbert" x="24" y="204" width="104" height="150"/>
    <use href="#doug" x="214" y="208" width="118" height="150"/>
    <use href="#mug" x="196" y="264" width="56" height="54"/>

    <!-- dailbert balloon -->
    <path d="M74 208 L64 190 L86 192 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="14" y="150" width="126" height="48" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="77" y="171" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Why's Karen's</text>
    <text x="77" y="189" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">row grey?</text>

    <!-- doug balloon -->
    <path d="M268 212 L258 194 L280 196 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="242" y="152" width="118" height="48" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="301" y="173" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">She left</text>
    <text x="301" y="191" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Tuesday.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#pnl)" transform="translate(828,0)">
    <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
    <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="1.5" opacity="0.35"/>

    <!-- the board, mostly empty now -->
    <rect x="18" y="20" width="204" height="176" rx="6" fill="#111" stroke="#111" stroke-width="3"/>
    <rect x="26" y="28" width="188" height="160" rx="3" fill="#1c1f23"/>
    <text x="40" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#4f5964" letter-spacing="2">EFFICIENCY</text>
    <line x1="40" y1="52" x2="200" y2="52" stroke="#2c333c" stroke-width="1.5"/>

    <!-- clanker inside the screen -->
    <use href="#clanker" x="66" y="56" width="108" height="108"/>

    <!-- one lone highlighted row, lots of empty around it -->
    <rect x="44" y="156" width="150" height="18" rx="2" fill="none" stroke="#7fd0e6" stroke-width="1.5"/>
    <text x="54" y="169" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#cfd6dd">DAILBERT</text>

    <!-- dailbert, staring up -->
    <use href="#dailbert" x="44" y="206" width="96" height="140"/>

    <!-- dashed tether from screen to clanker balloon -->
    <path d="M222 108 L244 92" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4"/>

    <!-- clanker rectangular balloon -->
    <rect x="222" y="46" width="168" height="82" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="227" y="51" width="158" height="72" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="306" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Grey rows I tidy away.</text>
    <text x="306" y="95" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">More room around</text>
    <text x="306" y="112" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">your name now.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="2" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="416" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="830" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
</svg>