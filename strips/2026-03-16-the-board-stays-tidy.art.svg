<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="pnl"><rect x="0" y="0" width="400" height="340"/></clipPath>

    <symbol id="dailbert" viewBox="0 0 120 170" overflow="visible">
      <path d="M22 170 L28 108 Q34 96 60 96 Q86 96 92 108 L98 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 100 L60 118 L70 100" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 118 L54 128 L60 152 L66 128 Z" fill="#111"/>
      <ellipse cx="60" cy="54" rx="28" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="32" cy="56" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="88" cy="56" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 30 Q60 18 82 32" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 24 Q56 12 66 12 Q74 12 70 22" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="56" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="56" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="56" x2="61" y2="56" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="56" r="2.5" fill="#111"/>
      <circle cx="72" cy="56" r="2.5" fill="#111"/>
      <path d="M60 60 L57 70 L63 70" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="50" y1="80" x2="70" y2="80" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 130 170" overflow="visible">
      <path d="M20 170 L26 112 Q32 100 62 100 Q92 100 98 112 L104 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M52 104 L62 120 L72 104" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="54" r="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="26" cy="56" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="98" cy="56" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 24 q6 -8 12 0 M60 20 q6 -8 12 0 M78 24 q6 -8 10 2" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="3.5" fill="#111"/>
      <circle cx="74" cy="50" r="3.5" fill="#111"/>
      <circle cx="62" cy="60" r="3" fill="#111"/>
      <path d="M44 68 Q62 90 80 68" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 120 180" overflow="visible">
      <path d="M18 180 L26 112 Q34 98 60 98 Q86 98 94 112 L102 180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 108 L44 150 M60 108 L76 150" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M50 102 L60 122 L70 102" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 122 L55 130 L60 152 L65 130 Z" fill="#111"/>
      <ellipse cx="60" cy="58" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="34" cy="60" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="86" cy="60" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M44 34 L30 2 L52 30 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M76 34 L90 2 L68 30 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M50 32 Q60 26 70 32" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="51" cy="58" r="2" fill="#111"/>
      <circle cx="69" cy="58" r="2" fill="#111"/>
      <path d="M60 62 L57 70 L62 70" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M50 78 Q60 82 70 78" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="mug" viewBox="0 0 62 60" overflow="visible">
      <rect x="10" y="16" width="34" height="30" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M44 22 q13 2 13 11 q0 9 -13 11" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M20 12 q4 -6 0 -11 M30 12 q4 -6 0 -11" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 120" overflow="visible">
      <line x1="60" y1="20" x2="60" y2="6" stroke="#c9ced4" stroke-width="3"/>
      <circle cx="60" cy="5" r="4" fill="#c9ced4"/>
      <rect x="24" y="20" width="72" height="64" rx="8" fill="#7f858d" stroke="#c9ced4" stroke-width="2.5"/>
      <rect x="18" y="40" width="6" height="22" rx="2" fill="#6a6f76" stroke="#c9ced4" stroke-width="2"/>
      <rect x="96" y="40" width="6" height="22" rx="2" fill="#6a6f76" stroke="#c9ced4" stroke-width="2"/>
      <rect x="34" y="38" width="22" height="9" rx="4" fill="#dfeef6"/>
      <rect x="64" y="38" width="22" height="9" rx="4" fill="#dfeef6"/>
      <rect x="38" y="60" width="44" height="14" rx="3" fill="#4c5158" stroke="#c9ced4" stroke-width="2"/>
      <line x1="46" y1="60" x2="46" y2="74" stroke="#c9ced4" stroke-width="1.5"/>
      <line x1="54" y1="60" x2="54" y2="74" stroke="#c9ced4" stroke-width="1.5"/>
      <line x1="62" y1="60" x2="62" y2="74" stroke="#c9ced4" stroke-width="1.5"/>
      <line x1="70" y1="60" x2="70" y2="74" stroke="#c9ced4" stroke-width="1.5"/>
    </symbol>
