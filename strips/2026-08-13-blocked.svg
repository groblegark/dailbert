<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Blocked</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-13</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, wire glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M30 168 L30 120 Q30 104 46 100 L74 100 Q90 104 90 120 L90 168" fill="#f4f1ea"/>
        <path d="M52 100 L52 90 M68 100 L68 90" />
        <path d="M60 100 L55 116 L60 138 L65 116 Z" fill="#111"/>
        <ellipse cx="60" cy="60" rx="30" ry="34" fill="#f4f1ea"/>
        <path d="M60 26 Q58 16 66 15 Q73 15 70 24" />
        <circle cx="49" cy="60" r="8.5" fill="#f4f1ea"/>
        <circle cx="72" cy="60" r="8.5" fill="#f4f1ea"/>
        <path d="M57.5 60 L63.5 60" />
        <circle cx="49" cy="60" r="1.7" fill="#111" stroke="none"/>
        <circle cx="72" cy="60" r="1.7" fill="#111" stroke="none"/>
        <path d="M50 80 L70 80" />
      </g>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 170">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 168 L28 122 Q28 106 46 102 L78 102 Q96 106 96 122 L96 168" fill="#f4f1ea"/>
        <path d="M52 102 L52 92 M72 102 L72 92" />
        <circle cx="62" cy="58" r="33" fill="#f4f1ea"/>
        <path d="M40 34 Q46 27 52 33 M72 33 Q78 27 84 34" />
        <circle cx="52" cy="55" r="2.4" fill="#111" stroke="none"/>
        <circle cx="72" cy="55" r="2.4" fill="#111" stroke="none"/>
        <path d="M48 70 Q62 84 76 70" />
        <rect x="92" y="120" width="24" height="22" rx="3" fill="#f4f1ea"/>
        <path d="M116 124 Q126 126 116 138" />
        <path d="M94 126 L114 126" />
      </g>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M30 168 L30 120 Q30 104 46 100 L74 100 Q90 104 90 120 L90 168" fill="#f4f1ea"/>
        <path d="M30 132 L44 132 M76 132 L90 132" />
        <path d="M52 100 L52 90 M68 100 L68 90" />
        <ellipse cx="60" cy="60" rx="29" ry="33" fill="#f4f1ea"/>
        <path d="M33 52 Q28 30 44 26 Q52 12 66 22 Q84 18 86 40 Q90 50 84 56" />
        <path d="M40 30 q6 -6 12 0 M62 20 q6 -5 12 2 M78 34 q6 -4 8 4" />
        <circle cx="60" cy="16" r="7" fill="#f4f1ea"/>
        <rect x="40" y="54" width="16" height="11" rx="2" fill="#f4f1ea"/>
        <rect x="64" y="54" width="16" height="11" rx="2" fill="#f4f1ea"/>
        <path d="M56 59 L64 59" />
        <circle cx="48" cy="59.5" r="1.7" fill="#111" stroke="none"/>
        <circle cx="72" cy="59.5" r="1.7" fill="#111" stroke="none"/>
        <path d="M52 80 Q60 84 68 80" />
      </g>
    </symbol>

    <!-- THE CLANKER: drawn INSIDE a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g fill="none" stroke="#d9d9d9" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M60 20 L60 8" stroke="#bdbdbd"/>
        <circle cx="60" cy="6" r="3" fill="#bdbdbd" stroke="none"/>
        <rect x="30" y="20" width="60" height="54" rx="7" fill="#2b2b2b" stroke="#8f8f8f"/>
        <rect x="40" y="36" width="15" height="7" rx="2.5" fill="#cfe8ff" stroke="none"/>
        <rect x="65" y="36" width="15" height="7" rx="2.5" fill="#cfe8ff" stroke="none"/>
        <g stroke="#9a9a9a" stroke-width="2">
          <path d="M44 58 L76 58" />
          <path d="M46 63 L74 63" />
          <path d="M52 55 L52 66 M60 55 L60 66 M68 55 L68 66" />
        </g>
      </g>
    </symbol>
  </defs>

  <!-- paper backdrop -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL BORDERS ===================== -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>

  <!-- ============ PANEL 1 : standup; Dailbert reports his blocker ============ -->
  <g>
    <path d="M12 300 L388 300" stroke="#111" stroke-width="1.4" opacity="0.35"/>

    <use href="#dailbert" x="30" y="150" width="120" height="170"/>
    <!-- phone in hand -->
    <rect x="140" y="228" width="16" height="26" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <path d="M143 233 L153 233 M143 238 L153 238 M143 243 L150 243" stroke="#111" stroke-width="1.3"/>

    <use href="#doug" x="240" y="160" width="130" height="170"/>

    <path d="M40 40 Q40 24 66 24 L360 24 Q386 24 386 46 L386 84 Q386 106 360 106 L150 106 L132 126 L138 106 L66 106 Q40 106 40 84 Z"
          fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="213" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Standup. I'm still blocked</text>
    <text x="213" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">on the ticket to un-gate</text>
    <text x="213" y="90" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">the coffee machine.</text>
  </g>

  <!-- ============ PANEL 2 : clanker in the wall monitor answers ============ -->
  <g transform="translate(414,0)">
    <path d="M12 300 L388 300" stroke="#111" stroke-width="1.4" opacity="0.35"/>

    <use href="#priya" x="46" y="150" width="120" height="170"/>

    <!-- wall monitor with clanker -->
    <rect x="228" y="96" width="150" height="112" rx="6" fill="#1c2126" stroke="#111" stroke-width="2.8"/>
    <rect x="236" y="104" width="134" height="96" rx="3" fill="#232a30"/>
    <g stroke="#3a444c" stroke-width="1" opacity="0.6">
      <path d="M240 112 L366 112 M240 122 L366 122 M240 132 L366 132"/>
    </g>
    <use href="#clanker" x="248" y="106" width="110" height="110"/>
    <path d="M288 208 L288 220 M318 208 L318 220 M274 220 L332 220" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

    <!-- dashed tail to the monitor (never to a person) -->
    <path d="M228 118 Q210 108 196 104" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>

    <rect x="24" y="34" width="184" height="82" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="29" y="39" width="174" height="72" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="116" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">That ticket is blocked</text>
    <text x="116" y="79" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">by the coffee KPI</text>
    <text x="116" y="98" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">being green.</text>
  </g>

  <!-- ============ PANEL 3 : Priya's dry button; Doug beams ============ -->
  <g transform="translate(828,0)">
    <path d="M12 300 L388 300" stroke="#111" stroke-width="1.4" opacity="0.35"/>

    <use href="#priya" x="34" y="150" width="120" height="170"/>
    <use href="#doug" x="220" y="160" width="130" height="170"/>

    <!-- Priya balloon -->
    <path d="M18 34 Q18 20 44 20 L228 20 Q254 20 254 42 L254 80 Q254 102 228 102 L120 102 L104 120 L110 102 L44 102 Q18 102 18 80 Z"
          fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="136" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">So to fix the coffee,</text>
    <text x="136" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">we need the coffee</text>
    <text x="136" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">dashboard fixed.</text>

    <!-- Doug small balloon -->
    <path d="M270 130 Q270 118 290 118 L378 118 Q394 118 394 132 L394 152 Q394 166 378 166 L326 166 L316 180 L320 166 L290 166 Q270 166 270 152 Z"
          fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="332" y="142" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">I brought my</text>
    <text x="332" y="159" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">own thermos.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>