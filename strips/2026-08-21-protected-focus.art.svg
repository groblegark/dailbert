<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -10 4 -18 q-2 8 -8 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 66 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 14 40 0 l10 40 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M56 84 l4 10 l4 -10 l6 8 l-6 30 l-8 0 l-6 -30 z" fill="#111"/>
    </symbol>
    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="50" r="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M56 14 q6 -6 2 -12 q-1 6 -5 4" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="3.2" fill="#111"/>
      <circle cx="72" cy="46" r="3.2" fill="#111"/>
      <path d="M46 62 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M34 90 q26 12 52 0 l8 44 q-34 12 -68 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="84" y="104" width="30" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M114 110 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M90 100 q6 -8 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="50" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 40 q-6 -32 30 -34 q36 2 30 34 q-14 -14 -30 -12 q-16 -2 -30 12 z" fill="#111"/>
      <rect x="40" y="46" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="46" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="51" x2="63" y2="51" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="52" r="2" fill="#111"/>
      <circle cx="71" cy="52" r="2" fill="#111"/>
      <path d="M52 70 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M36 88 q24 12 48 0 l8 42 q-32 12 -64 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M44 92 l-4 26" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M76 92 l4 26" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>
    <!-- CLANKER (drawn inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#8c8c8c" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="4" fill="#8c8c8c"/>
      <rect x="24" y="20" width="72" height="60" rx="7" fill="#3a3a3a" stroke="#9a9a9a" stroke-width="2.4"/>
      <rect x="31" y="27" width="58" height="46" rx="4" fill="#2a2a2a" stroke="#6f6f6f" stroke-width="1.6"/>
      <rect x="37" y="38" width="18" height="8" rx="2.5" fill="#bfe3ff"/>
      <rect x="65" y="38" width="18" height="8" rx="2.5" fill="#bfe3ff"/>
      <line x1="40" y1="60" x2="80" y2="60" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="40" y1="65" x2="80" y2="65" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="48" y1="56" x2="48" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
      <line x1="60" y1="56" x2="60" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
      <line x1="72" y1="56" x2="72" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="3" y="3" width="396" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- hard summer blinds -->
      <g stroke="#d8d2c4" stroke-width="7">
        <line x1="250" y1="18" x2="392" y2="18"/>
        <line x1="250" y1="34" x2="392" y2="34"/>
        <line x1="250" y1="50" x2="392" y2="50"/>
      </g>
      <rect x="30" y="250" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <!-- monitor + clanker -->
      <rect x="222" y="150" width="150" height="100" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="232" y="160" width="130" height="80" rx="4" fill="#1d1d1d"/>
      <rect x="286" y="250" width="22" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="250" y="168" width="94" height="94"/>
      <use href="#dailbert" x="40" y="120" width="120" height="200"/>
      <!-- Dailbert speech -->
      <path d="M40 60 h178 v50 h-118 l-14 16 l2 -16 h-48 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="129" y="82" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Half the floor's on</text>
      <text x="129" y="100" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">vacation. Find me a</text>
      <text x="129" y="118" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">slot with no meetings.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="417" y="3" width="396" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="445" y="250" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <use href="#dailbert" x="460" y="128" width="110" height="190"/>
      <!-- monitor + clanker -->
      <rect x="726" y="150" width="80" height="100" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="733" y="158" width="66" height="70" rx="3" fill="#1d1d1d"/>
      <rect x="756" y="250" width="20" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="733" y="160" width="66" height="66"/>
      <!-- clanker balloon: rectangular, dashed tail to surface -->
      <line x1="740" y1="150" x2="712" y2="118" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="474" y="40" width="288" height="86" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="618" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Done. I cleared it, declined</text>
      <text x="618" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">the rest, and protected your</text>
      <text x="618" y="98" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">focus. First fully open slot</text>
      <text x="618" y="116" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">is now on your calendar.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="858" y="252" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <!-- big monitor showing the invite -->
      <rect x="960" y="60" width="248" height="192" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="970" y="70" width="228" height="172" rx="4" fill="#f8f6ef" stroke="#111" stroke-width="1.6"/>
      <rect x="1062" y="252" width="24" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- invite content -->
      <line x1="970" y1="94" x2="1198" y2="94" stroke="#111" stroke-width="1.6"/>
      <text x="1084" y="88" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">CALENDAR HOLD</text>
      <text x="1084" y="122" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="16" fill="#111" font-weight="bold">Title: rest</text>
      <text x="1084" y="150" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Tue, Sep 9, 2031</text>
      <text x="1084" y="172" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">9:00 AM - 9:00 AM</text>
      <line x1="988" y1="188" x2="1180" y2="188" stroke="#c9c2b2" stroke-width="1.4"/>
      <text x="1084" y="210" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111" opacity="0.75">Guests: you, The Clanker</text>
      <!-- tiny clanker reflected in screen corner -->
      <use href="#clanker" x="1150" y="200" width="46" height="46"/>
      <!-- Dailbert deadpan -->
      <use href="#dailbert" x="852" y="132" width="118" height="196"/>
      <!-- Dailbert dry button -->
      <path d="M846 46 h150 v52 h-70 l-14 16 l-2 -16 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="921" y="66" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Zero minutes, five</text>
      <text x="921" y="84" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">years out. With you.</text>
    </g>
  </g>
</svg>