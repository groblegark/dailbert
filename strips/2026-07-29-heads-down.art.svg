      <path d="M25 50 Q22 26 50 24 Q78 26 75 50 Q70 38 62 36 Q66 30 55 30 Q60 34 50 33 Q40 34 45 30 Q34 30 38 36 Q30 38 25 50 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <path d="M50 24 Q52 14 60 16 Q54 18 56 24" fill="#111" stroke="#111" stroke-width="1.6"/>
