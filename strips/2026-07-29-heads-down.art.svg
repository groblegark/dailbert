      <rect x="28" y="34" width="16" height="7" rx="3" fill="#bfe9ff"/>
      <rect x="56" y="34" width="16" height="7" rx="3" fill="#bfe9ff"/>
      <line x1="34" y1="58" x2="66" y2="58" stroke="#bcbcbc" stroke-width="2"/>
