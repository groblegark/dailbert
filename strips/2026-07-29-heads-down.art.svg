    </g>
    <line x1="1040" y1="176" x2="1030" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <g>
      <rect x="852" y="22" width="230" height="72" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="967" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Your status is blank,</text>
      <text x="967" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Priya. Shall I fill</text>
      <text x="967" y="81" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">it in for you?</text>
    </g>
    <g>
      <path d="M840 150 h150 a9 9 0 0 1 9 9 v28 a9 9 0 0 1 -9 9 h-96 l-14 14 l0 -14 h-40 a9 9 0 0 1 -9 -9 v-28 a9 9 0 0 1 9 -9 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="915" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It's blank on</text>
      <text x="915" y="189" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">purpose.</text>
    </g>
