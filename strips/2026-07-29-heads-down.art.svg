  <g>
    <rect x="0" y="292" width="400" height="10" fill="#111"/>
    <use href="#dailbert" x="40" y="150" width="120" height="156"/>
    <rect x="250" y="150" width="118" height="92" rx="5" fill="#1c1c1c" stroke="#111" stroke-width="3"/>
    <rect x="256" y="156" width="106" height="80" rx="3" fill="#232323"/>
    <rect x="298" y="242" width="22" height="14" fill="#111"/>
    <rect x="278" y="256" width="62" height="6" rx="2" fill="#111"/>
    <use href="#clanker" x="272" y="160" width="76" height="68"/>
    <g>
      <path d="M150 40 h150 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-70 l-16 16 l0 -16 h-64 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="225" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Setting my status to</text>
      <text x="225" y="79" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">"heads down, do not</text>
      <text x="225" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">disturb" for the day.</text>
    </g>
  </g>

  <g>
    <rect x="414" y="292" width="400" height="10" fill="#111"/>
    <use href="#doug" x="470" y="150" width="120" height="156"/>
    <use href="#dailbert" x="640" y="150" width="120" height="156"/>
    <rect x="700" y="150" width="96" height="72" rx="4" fill="#2a2a2a" stroke="#111" stroke-width="2.6"/>
    <use href="#clanker" x="716" y="156" width="64" height="58"/>
    <line x1="726" y1="150" x2="700" y2="118" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <g>
      <rect x="500" y="26" width="252" height="88" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="626" y="47" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">You said do not disturb.</text>
      <text x="626" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I moved your 11 meetings,</text>
      <text x="626" y="85" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">held your tickets, and told</text>
      <text x="626" y="104" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Doug you left the country.</text>
    </g>
    <g>
      <path d="M436 210 h120 a9 9 0 0 1 9 9 v30 a9 9 0 0 1 -9 9 h-70 l-14 14 l0 -14 h-36 a9 9 0 0 1 -9 -9 v-30 a9 9 0 0 1 9 -9 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="500" y="230" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Bon voyage,</text>
      <text x="500" y="249" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">buddy.</text>
    </g>
  </g>

  <g>
    <rect x="828" y="292" width="400" height="10" fill="#111"/>
    <use href="#priya" x="880" y="150" width="120" height="156"/>
    <g>
      <rect x="1000" y="230" width="120" height="10" rx="2" fill="#111"/>
      <rect x="1010" y="176" width="100" height="58" rx="3" fill="#1c1c1c" stroke="#111" stroke-width="2.6"/>
