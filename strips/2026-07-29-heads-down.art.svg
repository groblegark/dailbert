      <line x1="44" y1="53" x2="44" y2="63" stroke="#bcbcbc" stroke-width="1.6"/>
      <line x1="50" y1="53" x2="50" y2="63" stroke="#bcbcbc" stroke-width="1.6"/>
      <line x1="56" y1="53" x2="56" y2="63" stroke="#bcbcbc" stroke-width="1.6"/>
