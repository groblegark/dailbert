<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Agenda Agent</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-30</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== CHARACTER SYMBOLS ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <path d="M22 160 Q22 118 60 116 Q98 118 98 160 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="52" y="102" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M60 118 l-6 8 l6 26 l6 -26 z" fill="#111"/>
      <ellipse cx="60" cy="66" rx="30" ry="34" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M60 33 q11 -13 1 -21" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="48" cy="64" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="64" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="64" x2="63" y2="64" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="64" r="2.2" fill="#111"/>
      <circle cx="72" cy="64" r="2.2" fill="#111"/>
      <path d="M52 85 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 160">
      <path d="M18 160 Q18 116 60 114 Q102 116 102 160 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="52" y="100" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="62" r="37" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M46 27 q3 -9 6 0 M60 24 q3 -9 6 0 M74 27 q3 -9 6 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="58" r="3.2" fill="#111"/>
      <circle cx="71" cy="58" r="3.2" fill="#111"/>
      <path d="M42 72 q18 20 36 0" fill="none" stroke="#111" stroke-width="3"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M20 160 Q20 116 60 114 Q100 116 100 160 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="26" y="132" width="12" height="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="82" y="132" width="12" height="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="102" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="67" rx="29" ry="33" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M32 66 q-6 -36 28 -40 q34 4 28 40 q-7 -19 -21 -23 q6 8 2 15 q-9 -15 -23 -10 q10 6 6 13 q-11 -9 -20 5 z" fill="#111"/>
      <circle cx="60" cy="23" r="8.5" fill="#111"/>
      <rect x="39" y="60" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="60" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="66" x2="64" y2="66" stroke="#111" stroke-width="2.5"/>
      <circle cx="47.5" cy="66" r="2.2" fill="#111"/>
      <circle cx="72.5" cy="66" r="2.2" fill="#111"/>
      <path d="M54 86 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="16" x2="60" y2="30" stroke="#cfcfcf" stroke-width="2.5"/>
      <circle cx="60" cy="13" r="3" fill="#cfcfcf"/>
      <rect x="30" y="30" width="60" height="54" rx="7" fill="#cfcfcf" stroke="#8a8a8a" stroke-width="3"/>
      <rect x="39" y="46" width="15" height="8" rx="2" fill="#111"/>
      <rect x="66" y="46" width="15" height="8" rx="2" fill="#111"/>
      <line x1="42" y1="69" x2="78" y2="69" stroke="#111" stroke-width="2"/>
      <line x1="47" y1="64" x2="47" y2="75" stroke="#111" stroke-width="2"/>
      <line x1="55" y1="64" x2="55" y2="75" stroke="#111" stroke-width="2"/>
      <line x1="63" y1="64" x2="63" y2="75" stroke="#111" stroke-width="2"/>
      <line x1="71" y1="64" x2="71" y2="75" stroke="#111" stroke-width="2"/>
    </symbol>

    <clipPath id="c1"><rect x="1" y="6" width="400" height="328" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="414" y="6" width="400" height="328" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="828" y="6" width="399" height="328" rx="3"/></clipPath>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g clip-path="url(#c1)">
    <rect x="1" y="6" width="400" height="328" fill="#f4f1ea"/>
    <line x1="1" y1="300" x2="401" y2="300" stroke="#111" stroke-width="2.5"/>
    <use href="#dailbert" x="34" y="140" width="120" height="160"/>
    <use href="#doug" x="248" y="150" width="116" height="156"/>
    <!-- doug mug -->
    <g>
      <rect x="300" y="252" width="26" height="24" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M326 257 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M305 258 q3 -6 6 0 M314 258 q3 -6 6 0" fill="none" stroke="#111" stroke-width="1.6"/>
    </g>
    <!-- dailbert balloon -->
    <ellipse cx="150" cy="58" rx="112" ry="50" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M118 98 L96 152 L142 100 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="150" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">New agent. It auto-</text>
    <text x="150" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">declines any meeting</text>
    <text x="150" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">that has no agenda.</text>
    <!-- doug balloon -->
    <ellipse cx="330" cy="150" rx="38" ry="24" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M312 168 L305 196 L332 172 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="330" y="155" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Sleek.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g clip-path="url(#c2)">
    <rect x="414" y="6" width="400" height="328" fill="#f4f1ea"/>
    <line x1="414" y1="300" x2="814" y2="300" stroke="#111" stroke-width="2.5"/>

    <!-- wall calendar: fully booked -->
    <rect x="448" y="30" width="106" height="90" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="501" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" text-anchor="middle" fill="#111">APRIL</text>
    <g fill="#111">
      <rect x="454" y="52" width="22" height="16"/><rect x="479" y="52" width="22" height="16"/><rect x="504" y="52" width="22" height="16"/><rect x="529" y="52" width="22" height="16"/>
      <rect x="454" y="71" width="22" height="16"/><rect x="479" y="71" width="22" height="16"/><rect x="504" y="71" width="22" height="16"/><rect x="529" y="71" width="22" height="16"/>
      <rect x="454" y="90" width="22" height="16"/><rect x="479" y="90" width="22" height="16"/><rect x="504" y="90" width="22" height="16"/><rect x="529" y="90" width="22" height="16"/>
    </g>

    <!-- dailbert at desk -->
    <use href="#dailbert" x="446" y="168" width="112" height="150"/>

    <!-- monitor with clanker -->
    <rect x="636" y="168" width="152" height="108" rx="6" fill="#1f1f1f" stroke="#111" stroke-width="3"/>
    <rect x="646" y="176" width="132" height="92" rx="3" fill="#2c2c2c"/>
    <line x1="650" y1="184" x2="774" y2="184" stroke="#3d3d3d" stroke-width="1"/>
    <line x1="650" y1="196" x2="774" y2="196" stroke="#3d3d3d" stroke-width="1"/>
    <line x1="650" y1="208" x2="774" y2="208" stroke="#3d3d3d" stroke-width="1"/>
    <use href="#clanker" x="652" y="170" width="120" height="104"/>
    <rect x="702" y="276" width="20" height="16" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
    <rect x="684" y="292" width="56" height="8" rx="3" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>

    <!-- clanker screen-edged balloon -->
    <rect x="560" y="40" width="222" height="80" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="565" y="45" width="212" height="70" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="1 3"/>
    <line x1="700" y1="120" x2="714" y2="168" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="671" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I wrote agendas for</text>
    <text x="671" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">all of them. You are</text>
    <text x="671" y="100" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">in every meeting now.</text>

    <!-- dailbert deadpan -->
    <ellipse cx="503" cy="150" rx="40" ry="23" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M492 170 L500 200 L516 172 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="503" y="155" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Every one.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g clip-path="url(#c3)">
    <rect x="828" y="6" width="399" height="328" fill="#f4f1ea"/>
    <line x1="828" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="2.5"/>

    <!-- priya, relaxed -->
    <use href="#priya" x="852" y="158" width="120" height="160"/>

    <!-- priya's monitor: empty calendar -->
    <rect x="1002" y="176" width="132" height="98" rx="6" fill="#e9e6df" stroke="#111" stroke-width="3"/>
    <rect x="1011" y="184" width="114" height="76" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <g stroke="#b9b4a8" stroke-width="1.2">
      <line x1="1011" y1="203" x2="1125" y2="203"/><line x1="1011" y1="222" x2="1125" y2="222"/><line x1="1011" y1="241" x2="1125" y2="241"/>
      <line x1="1040" y1="184" x2="1040" y2="260"/><line x1="1068" y1="184" x2="1068" y2="260"/><line x1="1096" y1="184" x2="1096" y2="260"/>
    </g>
    <text x="1068" y="196" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="10" text-anchor="middle" fill="#8a8a8a">no meetings</text>
    <rect x="1058" y="274" width="20" height="14" fill="#e9e6df" stroke="#111" stroke-width="2.5"/>
    <rect x="1042" y="288" width="52" height="8" rx="3" fill="#e9e6df" stroke="#111" stroke-width="2.5"/>

    <!-- doug peeking with mug -->
    <use href="#doug" x="1108" y="192" width="102" height="138"/>
    <g>
      <rect x="1120" y="286" width="24" height="22" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M1144 290 q9 0 9 7 q0 7 -9 7" fill="none" stroke="#111" stroke-width="2.5"/>
    </g>

    <!-- priya balloon -->
    <ellipse cx="932" cy="58" rx="96" ry="42" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M906 92 L916 186 L942 96 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="932" y="50" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">I asked it to leave</text>
    <text x="932" y="69" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">mine blank.</text>

    <!-- doug balloon -->
    <ellipse cx="1130" cy="88" rx="88" ry="38" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M1150 122 L1162 200 L1170 120 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="1130" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">She declined the</text>
    <text x="1130" y="100" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">whole day.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="1" y="6" width="400" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="414" y="6" width="400" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="828" y="6" width="399" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>