      <path d="M40 92 L50 104 L60 92" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 104 L45 112 L50 140 L55 112 Z" fill="#111"/>
      <path d="M43 92 L43 82 M57 92 L57 82" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="52" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 22 q11 -9 8 3 q-2 7 -9 2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="52" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="52" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="49" y1="52" x2="51" y2="52" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="52" r="2" fill="#111"/>
      <circle cx="60" cy="52" r="2" fill="#111"/>
      <path d="M44 68 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 110 160">
      <path d="M18 158 L24 100 Q55 82 86 100 L92 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M44 96 L55 108 L66 96" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M46 94 L46 84 M64 94 L64 84" stroke="#111" stroke-width="2.5"/>
      <circle cx="55" cy="52" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="50" r="2.6" fill="#111"/>
      <circle cx="65" cy="50" r="2.6" fill="#111"/>
      <path d="M41 62 Q55 80 69 62" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 106 Q28 118 32 124" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="20" y="120" width="24" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M44 125 q11 3 0 13" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M27 116 q4 -6 0 -11 M37 116 q4 -6 0 -11" fill="none" stroke="#8a8f93" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 100 170">
      <path d="M16 168 L22 102 Q50 84 78 102 L84 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M38 98 L50 118 L62 98" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 108 L46 116 L50 144 L54 116 Z" fill="#111"/>
      <path d="M42 96 L42 86 M58 96 L58 86" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="60" rx="25" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 42 L22 4 L46 36 Z" fill="#111"/>
      <path d="M66 42 L78 4 L54 36 Z" fill="#111"/>
      <circle cx="42" cy="60" r="1.7" fill="#111"/>
      <circle cx="58" cy="60" r="1.7" fill="#111"/>
      <path d="M43 72 h14" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M78 106 Q94 92 90 72" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="90" cy="68" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE CLANKER -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="4" x2="50" y2="20" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="4" r="3.6" fill="#111"/>
      <rect x="20" y="20" width="60" height="52" rx="7" fill="#cfd3d6" stroke="#111" stroke-width="2.5"/>
      <rect x="13" y="34" width="8" height="20" rx="2" fill="#cfd3d6" stroke="#111" stroke-width="2.5"/>
      <rect x="79" y="34" width="8" height="20" rx="2" fill="#cfd3d6" stroke="#111" stroke-width="2.5"/>
      <rect x="28" y="33" width="17" height="8" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="55" y="33" width="17" height="8" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M30 44 l-4 5 M40 44 l-3 6 M62 44 l-3 6 M70 44 l-4 5" stroke="#8a8f93" stroke-width="1.3"/>
      <rect x="32" y="52" width="36" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M40 52 v13 M47 52 v13 M54 52 v13 M61 52 v13" stroke="#111" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g clip-path="url(#pan)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>
    <line x1="1" y1="306" x2="399" y2="306" stroke="#111" stroke-width="1.5"/>
    <!-- desk + laptop -->
    <rect x="26" y="256" width="150" height="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="40" y1="267" x2="40" y2="306" stroke="#111" stroke-width="2.5"/>
    <line x1="162" y1="267" x2="162" y2="306" stroke="#111" stroke-width="2.5"/>
    <path d="M66 256 L70 234 L120 234 L124 256 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M70 234 L74 214 L118 214 L122 234" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- figures -->
    <use href="#dailbert" transform="translate(35,150) scale(1.15)"/>
    <use href="#doug" transform="translate(210,150) scale(1.2)"/>
    <!-- balloons -->
    <rect x="18" y="26" width="158" height="52" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <path d="M92 76 L84 74 L96 150 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="97" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Forget this whole</text>
    <text x="97" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">place exists.</text>
    <rect x="205" y="22" width="184" height="54" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <path d="M288 74 L300 72 L280 150 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="297" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Three-day weekend!</text>
    <text x="297" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">What'll you do?</text>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)" clip-path="url(#pan)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>
    <line x1="1" y1="306" x2="399" y2="306" stroke="#111" stroke-width="1.5"/>
    <!-- door -->
    <rect x="300" y="150" width="72" height="156" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="310" y="164" width="52" height="130" fill="none" stroke="#111" stroke-width="1.5"/>
    <circle cx="316" cy="232" r="3.5" fill="#111"/>
    <!-- desk + monitor -->
    <rect x="26" y="262" width="158" height="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="40" y1="273" x2="40" y2="306" stroke="#111" stroke-width="2.5"/>
    <line x1="170" y1="273" x2="170" y2="306" stroke="#111" stroke-width="2.5"/>
    <rect x="98" y="250" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="82" y="262" width="46" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="38" y="173" width="130" height="92" rx="5" fill="#565b5f" stroke="#111" stroke-width="2.5"/>
    <path d="M42 190 h122 M42 210 h122 M42 232 h122" stroke="#6d7276" stroke-width="1.1"/>
    <use href="#clanker" transform="translate(52,180) scale(0.76)"/>
    <!-- boss walking out, waving -->
    <use href="#boss" transform="translate(212,146) scale(1.16)"/>
    <!-- boss balloon -->
    <rect x="178" y="22" width="178" height="54" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <path d="M266 74 L278 72 L272 150 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="267" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Closed till Tuesday.</text>
    <text x="267" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Don't check email.</text>
    <!-- clanker balloon -->
    <rect x="28" y="92" width="150" height="52" rx="3" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <line x1="100" y1="144" x2="96" y2="173" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="103" y="114" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I'll hold it all.</text>
    <text x="103" y="132" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Go rest.</text>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)" clip-path="url(#pan)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea"/>
    <line x1="1" y1="306" x2="399" y2="306" stroke="#111" stroke-width="1.5"/>
    <!-- night window with clanker reflection -->
    <rect x="248" y="40" width="142" height="204" fill="#3c4144" stroke="#111" stroke-width="3"/>
    <use href="#clanker" transform="translate(256,66) scale(0.86)"/>
    <rect x="248" y="40" width="142" height="204" fill="#5a6064" opacity="0.32"/>
    <path d="M262 44 L310 240 M300 44 L360 240" stroke="#7d8286" stroke-width="1.4" opacity="0.55"/>
    <line x1="319" y1="40" x2="319" y2="244" stroke="#111" stroke-width="2"/>
    <line x1="248" y1="142" x2="390" y2="142" stroke="#111" stroke-width="2"/>
    <rect x="248" y="40" width="142" height="204" fill="none" stroke="#111" stroke-width="3"/>
    <!-- empty desk + dark (off) monitor -->
    <rect x="18" y="252" width="168" height="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="32" y1="263" x2="32" y2="306" stroke="#111" stroke-width="2.5"/>
    <line x1="172" y1="263" x2="172" y2="306" stroke="#111" stroke-width="2.5"/>
    <rect x="92" y="240" width="14" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="76" y="252" width="46" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="40" y="176" width="118" height="66" rx="5" fill="#565b5f" stroke="#111" stroke-width="2.5"/>
    <!-- empty swivel chair, turned away -->
    <rect x="96" y="176" width="44" height="58" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="118" cy="240" rx="30" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="118" y1="248" x2="118" y2="278" stroke="#111" stroke-width="2.5"/>
    <path d="M118 278 L94 300 M118 278 L118 302 M118 278 L142 300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="94" cy="302" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="118" cy="304" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="142" cy="302" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- clanker balloon -->
    <rect x="34" y="26" width="176" height="52" rx="3" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <line x1="204" y1="66" x2="268" y2="92" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="122" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Take your time.</text>
    <text x="122" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I've got Monday.</text>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>
</svg>