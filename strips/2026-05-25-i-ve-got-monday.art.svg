<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="pan"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 160">
