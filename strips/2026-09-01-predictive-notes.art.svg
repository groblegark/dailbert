<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <path d="M40 76 q20 12 40 0 l10 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 l-6 8 l6 34 l6 -34 z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="82" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q10 -8 4 -14 q-2 8 -10 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="2" fill="#111"/>
      <circle cx="72" cy="42" r="2" fill="#111"/>
      <path d="M50 62 q10 4 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DAILBERT (flat/uneasy mouth) ===== -->
    <symbol id="dailbertFlat" viewBox="0 0 120 160">
      <path d="M40 76 q20 12 40 0 l10 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 l-6 8 l6 34 l6 -34 z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="82" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q10 -8 4 -14 q-2 8 -10 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="2" fill="#111"/>
      <circle cx="72" cy="42" r="2" fill="#111"/>
      <line x1="50" y1="63" x2="70" y2="63" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M40 78 q20 12 40 0 l9 60 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="49" y1="112" x2="52" y2="112" stroke="#111" stroke-width="2.5"/>
      <line x1="68" y1="112" x2="71" y2="112" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M32 40 q-4 -22 14 -30 q6 -8 16 -6 q16 -2 22 12 q10 6 6 24
               q-6 -10 -14 -12 q-14 -6 -28 2 q-12 4 -16 10 z" fill="#111"/>
      <circle cx="60" cy="12" r="6" fill="#111"/>
      <rect x="39" y="40" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="40" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 64 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE CLANKER (inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="30" width="60" height="52" rx="6" fill="#1a1a1a" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="15" r="4" fill="#1a1a1a" stroke="#111" stroke-width="2"/>
      <rect x="40" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <rect x="66" y="46" width="14" height="7" rx="3" fill="#cfd8d0"/>
      <line x1="44" y1="66" x2="76" y2="66" stroke="#cfd8d0" stroke-width="2"/>
      <line x1="48" y1="70" x2="72" y2="70" stroke="#cfd8d0" stroke-width="2"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="1" y1="292" x2="401" y2="292" stroke="#111" stroke-width="2.5"/>
      <line x1="1" y1="256" x2="401" y2="256" stroke="#111" stroke-width="2.5"/>
      <rect x="214" y="150" width="150" height="104" rx="5" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <rect x="222" y="158" width="134" height="80" rx="2" fill="#0d0d0d"/>
      <rect x="274" y="254" width="30" height="4" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <text x="289" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#7fe3a0">notes_agent.py</text>
      <line x1="230" y1="188" x2="348" y2="188" stroke="#2f6f45" stroke-width="2.4"/>
      <line x1="230" y1="200" x2="330" y2="200" stroke="#2f6f45" stroke-width="2.4"/>
      <line x1="230" y1="212" x2="348" y2="212" stroke="#2f6f45" stroke-width="2.4"/>
      <line x1="230" y1="224" x2="314" y2="224" stroke="#2f6f45" stroke-width="2.4"/>
      <use href="#dailbert" x="20" y="112" width="150" height="200"/>
      <g>
        <rect x="26" y="30" width="196" height="86" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M84 114 l2 22 l18 -18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="124" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">An agent that drafts</text>
        <text x="124" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">my 1:1 notes.</text>
        <text x="124" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">So I never forget</text>
        <text x="124" y="111" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">what was said.</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="414" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="292" x2="815" y2="292" stroke="#111" stroke-width="2.5"/>
      <line x1="414" y1="256" x2="815" y2="256" stroke="#111" stroke-width="2.5"/>
      <use href="#dailbertFlat" x="430" y="118" width="140" height="188"/>
      <rect x="616" y="128" width="164" height="118" rx="5" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <rect x="625" y="137" width="146" height="86" rx="2" fill="#0c1414"/>
      <rect x="683" y="246" width="30" height="4" fill="#1f1f1f" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="654" y="146" width="88" height="88"/>
      <line x1="654" y1="164" x2="600" y2="118" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="446" y="36" width="240" height="84" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="450" y="40" width="232" height="76" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="566" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Done. Your 1:1 with</text>
      <text x="566" y="79" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Priya went well.</text>
      <text x="566" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">She was happy. No</text>
      <text x="566" y="113" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">action items.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="1" width="399" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="292" x2="1227" y2="292" stroke="#111" stroke-width="2.5"/>
      <line x1="828" y1="256" x2="1227" y2="256" stroke="#111" stroke-width="2.5"/>
      <circle cx="1188" cy="42" r="19" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="1188" y1="42" x2="1188" y2="30" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="1188" y1="42" x2="1197" y2="47" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <use href="#dailbertFlat" x="846" y="128" width="140" height="188"/>
      <use href="#priya" x="1030" y="120" width="146" height="196"/>
      <g>
        <rect x="900" y="40" width="196" height="66" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M1040 104 l2 22 l18 -20 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="998" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">We haven't had it.</text>
        <text x="998" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">It's in five minutes.</text>
      </g>
      <g>
        <rect x="848" y="150" width="150" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M902 208 l-2 20 l18 -18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="923" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Let's not spoil</text>
        <text x="923" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">the ending.</text>
      </g>
    </g>
  </g>
</svg>