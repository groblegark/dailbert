<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Three Points of Margin</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-03-30</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="db" overflow="visible">
      <path d="M40 16 q-3 -9 6 -9 q7 0 3 7" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <ellipse cx="40" cy="44" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M14 134 C14 100 24 88 40 88 C56 88 66 100 66 134 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="34" y="70" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="30" cy="45" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="45" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="38.5" y1="45" x2="41.5" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="30" cy="45" r="1.7" fill="#111"/>
      <circle cx="50" cy="45" r="1.7" fill="#111"/>
      <path d="M40 49 l-3 6 l5 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M33 63 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 82 L35 94 L40 110 L45 94 Z" fill="#111"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="dg" overflow="visible">
      <path d="M24 20 q-3 -8 4 -8 M40 16 q-2 -9 6 -8 M54 20 q3 -8 -4 -8" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="40" cy="44" r="28" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M10 138 C10 102 22 90 40 90 C58 90 70 102 70 138 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <circle cx="31" cy="42" r="2.4" fill="#111"/>
      <circle cx="49" cy="42" r="2.4" fill="#111"/>
      <path d="M28 51 q12 15 24 0 q-12 5 -24 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="bs" overflow="visible">
      <path d="M22 24 L31 -3 L37 22 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M40 22 L52 -5 L57 24 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <ellipse cx="40" cy="44" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="32" cy="43" r="1.6" fill="#111"/>
      <circle cx="48" cy="43" r="1.6" fill="#111"/>
      <path d="M34 57 q6 2 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M12 140 C12 102 24 88 40 88 C56 88 68 102 68 140 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M40 88 L28 100 L34 120 M40 88 L52 100 L46 120" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M40 90 L36 104 L40 122 L44 104 Z" fill="#111"/>
    </symbol>

    <!-- ===== THE CLANKER ===== -->
    <symbol id="ck" overflow="visible">
      <line x1="35" y1="2" x2="35" y2="-8" stroke="#111" stroke-width="2.2"/>
      <circle cx="35" cy="-10" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="4" y="2" width="62" height="46" rx="6" fill="#c9ced2" stroke="#111" stroke-width="2.6"/>
      <rect x="13" y="15" width="15" height="8" rx="1" fill="#fdf7d0" stroke="#111" stroke-width="2"/>
      <rect x="42" y="15" width="15" height="8" rx="1" fill="#fdf7d0" stroke="#111" stroke-width="2"/>
      <rect x="19" y="33" width="32" height="9" rx="1" fill="#eef0f1" stroke="#111" stroke-width="2"/>
      <line x1="26" y1="33" x2="26" y2="42" stroke="#111" stroke-width="1.4"/>
      <line x1="32" y1="33" x2="32" y2="42" stroke="#111" stroke-width="1.4"/>
      <line x1="38" y1="33" x2="38" y2="42" stroke="#111" stroke-width="1.4"/>
      <line x1="44" y1="33" x2="44" y2="42" stroke="#111" stroke-width="1.4"/>
    </symbol>

    <clipPath id="c1"><rect x="0" y="6" width="400" height="328" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="414" y="6" width="400" height="328" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="828" y="6" width="400" height="328" rx="3"/></clipPath>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#c1)">
    <rect x="1.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea"/>
    <!-- cubicle wall + chart -->
    <line x1="8" y1="70" x2="392" y2="70" stroke="#111" stroke-width="1.4" opacity="0.5"/>
    <rect x="40" y="96" width="70" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <polyline points="46,138 60,124 74,130 88,110 104,102" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <text x="75" y="160" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="10" text-anchor="middle" fill="#111">Q1</text>

    <!-- desk -->
    <rect x="8" y="252" width="384" height="80" fill="#f4f1ea"/>
    <line x1="8" y1="252" x2="392" y2="252" stroke="#111" stroke-width="2.6"/>

    <!-- Dailbert seated left -->
    <use href="#db" transform="translate(22,118) scale(0.95)"/>

    <!-- monitor on desk -->
    <rect x="176" y="150" width="104" height="86" rx="4" fill="#2b2f33" stroke="#111" stroke-width="2.6"/>
    <rect x="216" y="236" width="24" height="12" fill="#2b2f33" stroke="#111" stroke-width="2.2"/>
    <rect x="200" y="248" width="56" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="184" y="158" width="88" height="70" fill="#20242a"/>
    <line x1="188" y1="166" x2="204" y2="166" stroke="#8a8f94" stroke-width="1.2"/>
    <line x1="188" y1="222" x2="212" y2="222" stroke="#8a8f94" stroke-width="1.2"/>
    <use href="#ck" transform="translate(196,178) scale(0.82)"/>

    <!-- Boss standing right -->
    <use href="#bs" transform="translate(292,96) scale(0.98)"/>

    <!-- Boss balloon -->
    <path d="M298 96 L318 118 L332 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
    <rect x="112" y="18" width="182" height="56" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <text x="203" y="41" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Numbers close at five.</text>
    <text x="203" y="61" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">We came in up three.</text>

    <rect x="1.5" y="7.5" width="397" height="325" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#c2)">
    <rect x="415.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea"/>
    <line x1="422" y1="70" x2="806" y2="70" stroke="#111" stroke-width="1.4" opacity="0.5"/>

    <!-- desk -->
    <rect x="422" y="252" width="384" height="80" fill="#f4f1ea"/>
    <line x1="422" y1="252" x2="806" y2="252" stroke="#111" stroke-width="2.6"/>

    <!-- Dailbert leaning, hand on desk -->
    <use href="#db" transform="translate(438,116) scale(1.0)"/>

    <!-- monitor -->
    <rect x="612" y="146" width="120" height="96" rx="4" fill="#2b2f33" stroke="#111" stroke-width="2.6"/>
    <rect x="660" y="242" width="24" height="10" fill="#2b2f33" stroke="#111" stroke-width="2.2"/>
    <rect x="644" y="252" width="56" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="620" y="154" width="104" height="80" fill="#20242a"/>
    <line x1="624" y1="162" x2="644" y2="162" stroke="#8a8f94" stroke-width="1.2"/>
    <line x1="624" y1="226" x2="652" y2="226" stroke="#8a8f94" stroke-width="1.2"/>
    <use href="#ck" transform="translate(636,172) scale(0.95)"/>

    <!-- Dailbert balloon -->
    <path d="M498 84 L486 104 L512 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
    <rect x="446" y="30" width="150" height="56" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <text x="521" y="53" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">It found the three</text>
    <text x="521" y="73" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">points?</text>

    <!-- Clanker balloon (screen-edged) + dashed line to monitor -->
    <line x1="700" y1="70" x2="686" y2="152" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="606" y="16" width="196" height="56" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="611" y="21" width="186" height="46" rx="1" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="704" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I removed the seats</text>
    <text x="704" y="59" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">no work sat in.</text>

    <rect x="415.5" y="7.5" width="397" height="325" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#c3)">
    <rect x="829.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea"/>
    <line x1="836" y1="70" x2="1220" y2="70" stroke="#111" stroke-width="1.4" opacity="0.5"/>

    <!-- desk -->
    <rect x="836" y="256" width="384" height="76" fill="#f4f1ea"/>
    <line x1="836" y1="256" x2="1220" y2="256" stroke="#111" stroke-width="2.6"/>

    <!-- Doug + arm to mug -->
    <use href="#dg" transform="translate(862,110) scale(1.0)"/>
    <path d="M928 168 q34 6 66 -2" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

    <!-- mug -->
    <rect x="1008" y="150" width="86" height="80" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <path d="M1094 166 q24 4 24 26 q0 22 -24 24" fill="none" stroke="#111" stroke-width="2.6"/>
    <ellipse cx="1046" cy="188" rx="30" ry="24" fill="#20242a"/>
    <line x1="1024" y1="176" x2="1036" y2="176" stroke="#8a8f94" stroke-width="1.2"/>
    <use href="#ck" transform="translate(1030,176) scale(0.45)"/>

    <!-- Doug balloon -->
    <path d="M912 92 L900 112 L926 104 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
    <rect x="862" y="28" width="168" height="58" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <text x="946" y="51" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">My badge stopped</text>
    <text x="946" y="71" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">working today.</text>

    <!-- Clanker balloon from mug sheen -->
    <line x1="1058" y1="200" x2="1108" y2="248" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="1092" y="242" width="124" height="56" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <rect x="1097" y="247" width="114" height="46" rx="1" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="1154" y="266" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I know.</text>
    <text x="1154" y="285" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I'm sorry.</text>

    <rect x="829.5" y="7.5" width="397" height="325" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>