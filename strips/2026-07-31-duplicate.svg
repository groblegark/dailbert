<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Duplicate</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-31</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="44" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 10 q11 -7 5 6 q-4 8 -6 1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="49" cy="44" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="44" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="44" x2="63" y2="44" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="44" r="2.2" fill="#111"/>
      <circle cx="71" cy="44" r="2.2" fill="#111"/>
      <path d="M52 62 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 78 L80 78 L86 160 L34 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 L54 98 L60 106 L66 98 Z" fill="#111"/>
      <line x1="60" y1="106" x2="60" y2="124" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="46" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="44" r="2.8" fill="#111"/>
      <circle cx="71" cy="44" r="2.8" fill="#111"/>
      <path d="M46 56 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 80 L82 80 L88 160 L32 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="70" y="114" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M96 118 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M74 120 q4 -6 8 0 q4 -6 8 0" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M32 42 q0 -32 28 -32 q28 0 28 32 q6 -2 4 8 q-4 -2 -6 2 q-2 22 -26 22 q-24 0 -26 -22 q-4 -4 -6 -2 q-2 -10 4 -8Z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 36 q26 -20 52 0 q0 -26 -26 -26 q-26 0 -26 26Z" fill="#111"/>
      <rect x="40" y="42" width="17" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="17" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="48" x2="63" y2="48" stroke="#111" stroke-width="2.2"/>
      <circle cx="48.5" cy="48.5" r="2.1" fill="#111"/>
      <circle cx="71.5" cy="48.5" r="2.1" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 80 L80 80 L86 160 L34 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 98 L34 102 M80 98 L86 102" stroke="#111" stroke-width="2.2" fill="none"/>
    </symbol>

    <!-- ===== CLANKER (inside a surface only) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="18" stroke="#9aa" stroke-width="2.2"/>
      <circle cx="60" cy="5" r="3.4" fill="#9aa"/>
      <rect x="26" y="18" width="68" height="60" rx="8" fill="#3a4048" stroke="#9aa" stroke-width="2.5"/>
      <rect x="34" y="34" width="20" height="11" rx="2.5" fill="#bfe9ff"/>
      <rect x="66" y="34" width="20" height="11" rx="2.5" fill="#bfe9ff"/>
      <g stroke="#9aa" stroke-width="2.2">
        <line x1="38" y1="60" x2="82" y2="60"/>
        <line x1="44" y1="55" x2="44" y2="65"/>
        <line x1="52" y1="55" x2="52" y2="65"/>
        <line x1="60" y1="55" x2="60" y2="65"/>
        <line x1="68" y1="55" x2="68" y2="65"/>
        <line x1="76" y1="55" x2="76" y2="65"/>
      </g>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- =================== PANEL 1 =================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="256" x2="399" y2="256" stroke="#111" stroke-width="2.5"/>
      <!-- monitor with clanker -->
      <rect x="236" y="150" width="150" height="106" rx="6" fill="#3a4048" stroke="#111" stroke-width="3"/>
      <rect x="244" y="158" width="134" height="90" rx="3" fill="#2b3037"/>
      <rect x="296" y="256" width="30" height="14" fill="#3a4048" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="252" y="160" width="118" height="118"/>

      <use href="#dailbert" x="34" y="92" width="150" height="212"/>

      <!-- clanker balloon: rectangular, dashed line back to screen -->
      <line x1="290" y1="150" x2="252" y2="110" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="92" y="20" width="192" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="188" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I tidied the backlog.</text>
      <text x="188" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Closed 60 tickets as</text>
      <text x="188" y="83" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">duplicates of</text>
      <text x="188" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">PROJ-1.</text>
    </g>
  </g>

  <!-- =================== PANEL 2 =================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="256" x2="813" y2="256" stroke="#111" stroke-width="2.5"/>

      <use href="#dailbert" x="446" y="92" width="150" height="212"/>
      <use href="#doug" x="612" y="92" width="150" height="212"/>

      <!-- Dailbert balloon -->
      <path d="M474 122 q-6 -60 90 -60 q94 0 88 44 q0 12 -18 12 L524 120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="562" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">What even was</text>
      <text x="562" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">PROJ-1?</text>

      <!-- Doug balloon -->
      <path d="M636 158 q-6 -34 48 -34 q52 0 46 26 q0 8 -14 8 L672 160 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="682" y="138" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The first one.</text>
      <text x="682" y="158" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Feels foundational.</text>
    </g>
  </g>

  <!-- =================== PANEL 3 =================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="256" x2="1227" y2="256" stroke="#111" stroke-width="2.5"/>

      <!-- Priya's monitor with clanker -->
      <rect x="1068" y="150" width="150" height="106" rx="6" fill="#3a4048" stroke="#111" stroke-width="3"/>
      <rect x="1076" y="158" width="134" height="90" rx="3" fill="#2b3037"/>
      <rect x="1128" y="256" width="30" height="14" fill="#3a4048" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="1084" y="160" width="118" height="118"/>

      <use href="#priya" x="866" y="92" width="150" height="212"/>

      <!-- Priya balloon -->
      <path d="M902 124 q-6 -62 98 -62 q60 0 60 30 q0 12 -16 12 L948 120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="980" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I filed PROJ-1 as a</text>
      <text x="980" y="104" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">duplicate of PROJ-2.</text>

      <!-- clanker reply -->
      <line x1="1122" y1="150" x2="1080" y2="128" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="1000" y="150" width="156" height="62" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1078" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Reopening all 61.</text>
      <text x="1078" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Fair.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>