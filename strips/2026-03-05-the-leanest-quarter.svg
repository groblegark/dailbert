<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Leanest Quarter</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-03-05</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== CHARACTER SYMBOLS ===================== -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <path d="M28 200 V150 Q28 120 60 120 Q92 120 92 150 V200" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M50 122 L60 138 L70 122" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M57 128 L63 128 L66 162 L60 170 L54 162 Z" fill="#111"/>
      <rect x="52" y="106" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="70" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 34 q9 -13 1 -19" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="48" cy="70" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="72" cy="70" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="59" y1="70" x2="61" y2="70" stroke="#111" stroke-width="3"/>
      <line x1="37" y1="68" x2="30" y2="66" stroke="#111" stroke-width="3"/>
      <circle cx="48" cy="70" r="2.6" fill="#111"/>
      <circle cx="72" cy="70" r="2.6" fill="#111"/>
      <path d="M50 92 q10 4 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 150 200">
      <path d="M30 200 V150 Q30 120 64 120 Q98 120 98 150 V200" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M54 122 L64 136 L74 122" fill="none" stroke="#111" stroke-width="3"/>
      <rect x="56" y="104" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="64" cy="66" r="38" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="52" cy="60" r="3" fill="#111"/>
      <circle cx="76" cy="60" r="3" fill="#111"/>
      <path d="M46 72 q18 24 36 0 q-18 8 -36 0 Z" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <!-- arm + mug -->
      <path d="M92 156 q24 -4 26 -30" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="104" y="112" width="26" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M130 116 q11 5 0 14" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M110 108 q-3 -7 2 -12" fill="none" stroke="#8a9099" stroke-width="2"/>
      <path d="M120 108 q3 -7 -2 -12" fill="none" stroke="#8a9099" stroke-width="2"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 120 210">
      <path d="M26 210 V150 Q26 118 60 118 Q94 118 94 150 V210" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M60 120 L44 142 L52 170" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M60 120 L76 142 L68 170" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M57 122 L63 122 L66 158 L60 166 L54 158 Z" fill="#111"/>
      <rect x="52" y="102" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="68" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M42 42 L34 4 L54 34" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M78 42 L86 4 L66 34" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M54 34 q6 -6 12 0" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="52" cy="66" r="1.9" fill="#111"/>
      <circle cx="68" cy="66" r="1.9" fill="#111"/>
      <path d="M52 84 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="6" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="4" r="3.5" fill="#111"/>
      <rect x="18" y="18" width="64" height="60" rx="8" fill="#dfe2e6" stroke="#111" stroke-width="3"/>
      <rect x="26" y="30" width="48" height="20" rx="4" fill="#111"/>
      <rect x="32" y="37" width="12" height="6" rx="3" fill="#a9e0c4"/>
      <rect x="56" y="37" width="12" height="6" rx="3" fill="#a9e0c4"/>
      <line x1="34" y1="60" x2="66" y2="60" stroke="#111" stroke-width="2.5"/>
      <line x1="34" y1="66" x2="66" y2="66" stroke="#111" stroke-width="2.5"/>
      <line x1="40" y1="55" x2="40" y2="71" stroke="#111" stroke-width="2"/>
      <line x1="50" y1="55" x2="50" y2="71" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="55" x2="60" y2="71" stroke="#111" stroke-width="2"/>
    </symbol>

    <clipPath id="clip1"><rect x="0" y="0" width="400" height="340" rx="3"/></clipPath>
    <clipPath id="clip2"><rect x="0" y="0" width="400" height="340" rx="3"/></clipPath>
    <clipPath id="clip3"><rect x="0" y="0" width="400" height="340" rx="3"/></clipPath>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <g clip-path="url(#clip1)">
      <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
      <!-- projection screen -->
      <line x1="118" y1="30" x2="118" y2="52" stroke="#111" stroke-width="2.5"/>
      <rect x="28" y="52" width="180" height="112" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="45" y1="150" x2="195" y2="150" stroke="#111" stroke-width="2"/>
      <rect x="55" y="120" width="18" height="30" fill="#111"/>
      <rect x="88" y="106" width="18" height="44" fill="#111"/>
      <rect x="121" y="90" width="18" height="60" fill="#111"/>
      <rect x="154" y="72" width="18" height="78" fill="#111"/>
      <path d="M50 144 L188 70" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M188 70 L176 70 M188 70 L188 82" fill="none" stroke="#111" stroke-width="2.5"/>
      <text x="118" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">Q1 ALL-HANDS</text>

      <!-- boss -->
      <use href="#boss" x="250" y="145" width="108" height="190"/>
      <path d="M288 252 Q248 196 212 122" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="212" cy="122" r="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

      <!-- audience (foreground backs of heads) -->
      <path d="M15 338 Q45 312 75 338" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="45" cy="304" r="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M80 338 Q110 312 140 338" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="110" cy="304" r="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M145 338 Q175 312 205 338" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="175" cy="304" r="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

      <!-- boss balloon -->
      <path d="M292 86 L302 132 L314 86 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="230" y="16" width="162" height="70" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="311" y="45" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Record quarter.</text>
      <text x="311" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Our leanest ever.</text>

      <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <g clip-path="url(#clip2)">
      <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>

      <!-- dark projection screen with chart + clanker -->
      <line x1="316" y1="26" x2="316" y2="40" stroke="#111" stroke-width="2.5"/>
      <rect x="250" y="40" width="132" height="100" fill="#2b2f34" stroke="#111" stroke-width="3"/>
      <line x1="262" y1="120" x2="372" y2="120" stroke="#5b636b" stroke-width="1.5"/>
      <path d="M262 116 L286 108 L308 112 L332 100 L360 88" fill="none" stroke="#5b636b" stroke-width="1.5"/>
      <use href="#clanker" x="290" y="48" width="70" height="70"/>

      <!-- chair backs -->
      <rect x="14" y="176" width="70" height="60" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="118" y="170" width="86" height="58" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

      <!-- seated coworkers -->
      <use href="#dailbert" x="14" y="158" width="94" height="157"/>
      <use href="#doug" x="108" y="150" width="112" height="149"/>

      <!-- doug balloon -->
      <path d="M138 66 L160 150 L164 62 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="8" y="12" width="152" height="60" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="84" y="37" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">When did we</text>
      <text x="84" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">get so lean?</text>

      <!-- clanker screen-balloon -->
      <line x1="256" y1="252" x2="266" y2="140" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="70" y="250" width="214" height="66" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="75" y="255" width="204" height="56" fill="none" stroke="#111" stroke-width="1"/>
      <text x="177" y="280" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">I only removed things</text>
      <text x="177" y="301" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">no one would miss.</text>

      <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <g clip-path="url(#clip3)">
      <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>

      <!-- night window with faint reflection -->
      <rect x="248" y="44" width="122" height="118" fill="#3a3f45" stroke="#111" stroke-width="3"/>
      <line x1="309" y1="44" x2="309" y2="162" stroke="#111" stroke-width="2"/>
      <line x1="248" y1="103" x2="370" y2="103" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="268" y="58" width="82" height="82"/>
      <rect x="248" y="44" width="122" height="118" fill="#6b727a" opacity="0.34"/>

      <!-- empty chairs -->
      <rect x="26" y="178" width="60" height="62" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="24" y="240" width="64" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="32" y1="252" x2="32" y2="308" stroke="#111" stroke-width="2.5"/>
      <line x1="80" y1="252" x2="80" y2="308" stroke="#111" stroke-width="2.5"/>

      <rect x="214" y="178" width="60" height="62" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="212" y="240" width="64" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="220" y1="252" x2="220" y2="308" stroke="#111" stroke-width="2.5"/>
      <line x1="268" y1="252" x2="268" y2="308" stroke="#111" stroke-width="2.5"/>

      <!-- dailbert seated, alone in the middle -->
      <rect x="112" y="176" width="86" height="60" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#dailbert" x="108" y="150" width="96" height="160"/>

      <!-- clanker screen-balloon to the window -->
      <line x1="252" y1="252" x2="300" y2="160" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="56" y="248" width="196" height="76" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="61" y="253" width="186" height="66" fill="none" stroke="#111" stroke-width="1"/>
      <text x="154" y="274" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">You'd tell me</text>
      <text x="154" y="293" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">if I had.</text>
      <text x="154" y="312" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Right?</text>

      <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>