      <line x1="30" y1="180" x2="18" y2="186" stroke="#111" stroke-width="1.5"/>
      <line x1="266" y1="70" x2="278" y2="66" stroke="#111" stroke-width="1.5"/>
      <line x1="266" y1="180" x2="278" y2="186" stroke="#111" stroke-width="1.5"/>
      <rect x="8" y="250" width="384" height="90" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
