      <circle cx="352" cy="42" r="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="352" y1="42" x2="352" y2="32" stroke="#111" stroke-width="2"/>
      <line x1="352" y1="42" x2="360" y2="46" stroke="#111" stroke-width="2"/>
