      <rect x="36" y="54" width="224" height="166" rx="8" fill="#111"/>
      <rect x="44" y="62" width="208" height="150" fill="#d8d5cd"/>
      <use href="#clanker" x="71" y="66" width="150" height="145"/>
      <line x1="30" y1="70" x2="18" y2="66" stroke="#111" stroke-width="1.5"/>
