      <path d="M210 52 h170 v56 h-64 l-8 10 l-4 -10 h-94 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="295" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Welcome to Pilot</text>
      <text x="295" y="89" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Office Hours. I have</text>
      <text x="295" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">forty slides.</text>
      <line x1="188" y1="90" x2="216" y2="90" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <use href="#dailbert" x="70" y="158" width="104" height="140"/>
      <use href="#doug" x="196" y="158" width="112" height="150"/>
      <rect x="40" y="292" width="330" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
    </g>
  </g>

  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="250" x2="814" y2="250" stroke="#111" stroke-width="2"/>
      <use href="#slide" x="438" y="44" width="176" height="114"/>
      <use href="#clanker" x="542" y="52" width="66" height="66"/>
      <path d="M470 40 h172 v70 h-66 l-8 10 l-4 -10 h-94 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="556" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Any questions? ...No?</text>
      <text x="556" y="77" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">All right, I have one.</text>
      <text x="556" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">&quot;How is the pilot going?&quot;</text>
      <line x1="602" y1="90" x2="574" y2="92" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <use href="#dailbert" x="484" y="158" width="104" height="140"/>
      <use href="#doug" x="610" y="158" width="112" height="150"/>
      <rect x="454" y="292" width="330" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
      <path d="M470 214 h118 v32 h-64 l-7 9 l-4 -9 h-43 Z" fill="#f4f1ea" stroke="#111" stroke-width="1.8" stroke-linejoin="round"/>
      <text x="529" y="235" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Do we answer?</text>
    </g>
  </g>

  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
