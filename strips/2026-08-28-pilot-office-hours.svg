      <use href="#slide" x="852" y="44" width="176" height="114"/>
      <use href="#clanker" x="956" y="52" width="66" height="66"/>
      <path d="M872 40 h182 v72 h-70 l-8 10 l-4 -10 h-100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="963" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Going well, thank you.</text>
      <text x="963" y="77" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">And great question,</text>
      <text x="963" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">by the way. Slide two.</text>
      <line x1="1016" y1="90" x2="988" y2="92" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <use href="#dailbert" x="888" y="158" width="104" height="140"/>
      <use href="#doug" x="1014" y="158" width="112" height="150"/>
      <rect x="868" y="292" width="330" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
      <path d="M1024 216 h150 v32 h-66 l-7 9 l-4 -9 h-73 Z" fill="#f4f1ea" stroke="#111" stroke-width="1.8" stroke-linejoin="round"/>
      <text x="1099" y="237" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">It has follow-ups.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>