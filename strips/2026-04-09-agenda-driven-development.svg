<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Agenda-Driven Development</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-09</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <style>
      text{font-family:'Comic Sans MS','Segoe Print',cursive;font-size:14px;fill:#111;}
      .ink{fill:none;stroke:#111;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
      .fillp{fill:#f4f1ea;stroke:#111;stroke-width:2.4;stroke-linejoin:round;}
      .hair{fill:#111;stroke:#111;stroke-width:2;stroke-linejoin:round;}
      .bal{fill:#f4f1ea;stroke:#111;stroke-width:2.2;}
      .glow{fill:#7d7d7d;}
    </style>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 140 200">
      <path class="fillp" d="M18,200 L18,150 Q18,118 46,110 L94,110 Q122,118 122,150 L122,200 Z"/>
      <path class="fillp" d="M70,112 L60,122 L70,150 L80,122 Z"/>
      <rect class="fillp" x="60" y="98" width="20" height="16"/>
      <ellipse class="fillp" cx="70" cy="60" rx="30" ry="36"/>
      <circle class="fillp" cx="40" cy="62" r="6"/>
      <circle class="fillp" cx="100" cy="62" r="6"/>
      <path class="ink" d="M70,26 q-9,-14 5,-16 q12,-1 5,10"/>
      <circle class="fillp" cx="57" cy="58" r="11"/>
      <circle class="fillp" cx="83" cy="58" r="11"/>
      <line class="ink" x1="68" y1="58" x2="72" y2="58"/>
      <line class="ink" x1="46" y1="58" x2="40" y2="60"/>
      <line class="ink" x1="94" y1="58" x2="100" y2="60"/>
      <circle cx="57" cy="58" r="2.4"/>
      <circle cx="83" cy="58" r="2.4"/>
      <path class="ink" d="M70,66 q-3,6 1,9"/>
      <path class="ink" d="M60,86 q10,5 20,0"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 150 200">
      <path class="fillp" d="M14,200 L14,152 Q14,120 44,112 L104,112 Q134,120 134,152 L134,200 Z"/>
      <circle class="fillp" cx="72" cy="58" r="34"/>
      <path class="ink" d="M46,30 q10,-8 22,-6 M78,26 q10,-2 18,6"/>
      <circle cx="60" cy="54" r="3"/>
      <circle cx="84" cy="54" r="3"/>
      <path class="bal" d="M52,66 Q72,94 92,66 Q72,74 52,66 Z"/>
      <path class="ink" d="M52,66 Q72,94 92,66"/>
      <!-- mug -->
      <rect class="fillp" x="100" y="150" width="26" height="30" rx="2"/>
      <path class="ink" d="M126,156 q10,2 8,12 q-2,7 -8,6"/>
      <path class="ink" d="M106,146 q2,-8 8,-6 M116,146 q2,-8 8,-6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 140 200">
      <path class="fillp" d="M18,200 L18,150 Q18,118 46,110 L94,110 Q122,118 122,150 L122,200 Z"/>
      <path class="ink" d="M46,150 q6,6 0,12 M94,150 q-6,6 0,12"/>
      <ellipse class="fillp" cx="70" cy="62" rx="29" ry="34"/>
      <path class="hair" d="M41,60 Q34,22 70,18 Q106,22 99,60 Q96,44 87,42 Q91,32 78,30 Q84,24 70,26 Q56,24 62,30 Q49,32 53,42 Q44,44 41,60 Z"/>
      <circle class="hair" cx="70" cy="18" r="9"/>
      <circle class="fillp" cx="41" cy="64" r="5"/>
      <circle class="fillp" cx="99" cy="64" r="5"/>
      <rect class="fillp" x="46" y="56" width="20" height="14" rx="2"/>
      <rect class="fillp" x="74" y="56" width="20" height="14" rx="2"/>
      <line class="ink" x1="66" y1="62" x2="74" y2="62"/>
      <circle cx="56" cy="63" r="2.3"/>
      <circle cx="84" cy="63" r="2.3"/>
      <path class="ink" d="M70,72 q-2,5 1,8"/>
      <path class="ink" d="M62,88 q8,3 16,0"/>
    </symbol>

    <!-- CLANKER (drawn inside a dark screen) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <rect x="20" y="26" width="80" height="56" rx="7" fill="#cfccc4" stroke="#111" stroke-width="2.4"/>
      <line class="ink" x1="60" y1="26" x2="60" y2="12"/>
      <circle cx="60" cy="9" r="3.5" fill="#7d7d7d" stroke="#111" stroke-width="2"/>
      <rect class="glow" x="32" y="42" width="18" height="7" rx="2"/>
      <rect class="glow" x="70" y="42" width="18" height="7" rx="2"/>
      <rect x="42" y="62" width="36" height="12" rx="2" fill="#8f8f8f" stroke="#111" stroke-width="2"/>
      <line class="ink" x1="50" y1="62" x2="50" y2="74"/>
      <line class="ink" x1="60" y1="62" x2="60" y2="74"/>
      <line class="ink" x1="70" y1="62" x2="70" y2="74"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- desk -->
      <rect x="-10" y="258" width="430" height="90" fill="#e7e3da" stroke="#111" stroke-width="2.2"/>
      <line class="ink" x1="-10" y1="258" x2="420" y2="258"/>
      <use href="#dailbert" x="36" y="118" width="140" height="200"/>
      <use href="#doug" x="220" y="128" width="150" height="200"/>
      <!-- balloon -->
      <path class="bal" d="M100,92 L120,92 L108,150 Z"/>
      <ellipse class="bal" cx="150" cy="58" rx="112" ry="42"/>
      <text x="150" y="44" text-anchor="middle">New agent — it auto-</text>
      <text x="150" y="62" text-anchor="middle">declines any meeting</text>
      <text x="150" y="80" text-anchor="middle">with no agenda.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="415" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <rect x="410" y="258" width="410" height="90" fill="#e7e3da" stroke="#111" stroke-width="2.2"/>
      <line class="ink" x1="410" y1="258" x2="820" y2="258"/>
      <use href="#dailbert" x="436" y="126" width="140" height="200"/>
      <!-- keyboard -->
      <rect x="520" y="256" width="70" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- monitor -->
      <rect x="690" y="150" width="112" height="92" rx="6" fill="#2a2a2a" stroke="#111" stroke-width="2.6"/>
      <rect x="736" y="242" width="20" height="16" fill="#cfccc4" stroke="#111" stroke-width="2.2"/>
      <rect x="718" y="256" width="56" height="8" rx="2" fill="#cfccc4" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="694" y="152" width="104" height="86"/>
      <!-- clanker rectangular balloon -->
      <line x1="562" y1="92" x2="700" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect class="bal" x="452" y="30" width="222" height="62" rx="3"/>
      <text x="563" y="56" text-anchor="middle">So helpful. I gave</text>
      <text x="563" y="76" text-anchor="middle">them all agendas.</text>
      <!-- Dailbert tiny reaction -->
      <path class="bal" d="M498,150 L510,150 L500,178 Z"/>
      <ellipse class="bal" cx="486" cy="138" rx="30" ry="20"/>
      <text x="486" y="143" text-anchor="middle">...oh.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="829" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <rect x="824" y="258" width="410" height="90" fill="#e7e3da" stroke="#111" stroke-width="2.2"/>
      <line class="ink" x1="824" y1="258" x2="1234" y2="258"/>
      <use href="#priya" x="852" y="124" width="140" height="200"/>
      <use href="#doug" x="1108" y="150" width="150" height="200"/>
      <!-- empty calendar monitor -->
      <rect x="1006" y="156" width="96" height="80" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line class="ink" x1="1006" y1="172" x2="1102" y2="172"/>
      <line class="ink" x1="1030" y1="172" x2="1030" y2="236"/>
      <line class="ink" x1="1054" y1="172" x2="1054" y2="236"/>
      <line class="ink" x1="1078" y1="172" x2="1078" y2="236"/>
      <line class="ink" x1="1006" y1="196" x2="1102" y2="196"/>
      <line class="ink" x1="1006" y1="216" x2="1102" y2="216"/>
      <path class="ink" d="M1012,180 l10,10 M1022,180 l-10,10" stroke-width="1.6"/>
      <path class="ink" d="M1060,202 l10,10 M1070,202 l-10,10" stroke-width="1.6"/>
      <rect x="1040" y="236" width="18" height="14" fill="#cfccc4" stroke="#111" stroke-width="2"/>
      <!-- Priya balloon -->
      <path class="bal" d="M916,92 L936,92 L924,150 Z"/>
      <ellipse class="bal" cx="962" cy="58" rx="104" ry="40"/>
      <text x="962" y="52" text-anchor="middle">Mine declines the</text>
      <text x="962" y="72" text-anchor="middle">ones with agendas.</text>
      <!-- Doug -->
      <path class="bal" d="M1150,96 L1162,96 L1156,124 Z"/>
      <ellipse class="bal" cx="1170" cy="80" rx="34" ry="22"/>
      <text x="1170" y="85" text-anchor="middle">Ohh.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>