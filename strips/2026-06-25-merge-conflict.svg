<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Merge Conflict</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-06-25</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="pc"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>

    <!-- THE CLANKER: boxy chrome head, slot eyes, grille, antenna. Only ever inside a surface. -->
    <symbol id="clanker" viewBox="0 0 90 82">
      <line x1="45" y1="14" x2="45" y2="4" stroke="currentColor" stroke-width="2.5"/>
      <circle cx="45" cy="4" r="3.5" fill="currentColor"/>
      <rect x="12" y="14" width="66" height="56" rx="7" fill="none" stroke="currentColor" stroke-width="3"/>
      <rect x="23" y="31" width="16" height="9" rx="3" fill="currentColor"/>
      <rect x="51" y="31" width="16" height="9" rx="3" fill="currentColor"/>
      <rect x="26" y="50" width="38" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <line x1="35" y1="50" x2="35" y2="62" stroke="currentColor" stroke-width="2"/>
      <line x1="45" y1="50" x2="45" y2="62" stroke="currentColor" stroke-width="2"/>
      <line x1="55" y1="50" x2="55" y2="62" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- DAILBERT: oval head, round wire glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 210">
      <path d="M22,210 L22,168 Q22,150 40,146 L80,146 Q98,150 98,168 L98,210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M52,146 L60,160 L68,146" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M60,160 L54,168 L60,196 L66,168 Z" fill="#111"/>
      <rect x="52" y="132" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="86" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M52,50 q-6,-16 10,-16 q12,0 4,10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="26" cy="88" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="94" cy="88" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="86" r="12" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="73" cy="86" r="12" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <line x1="59" y1="86" x2="61" y2="86" stroke="#111" stroke-width="3"/>
      <circle cx="47" cy="86" r="2.5" fill="#111"/>
      <circle cx="73" cy="86" r="2.5" fill="#111"/>
      <path d="M60,92 l-3,8 l6,0" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="50" y1="112" x2="70" y2="112" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG: round head, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 210">
      <path d="M24,210 L24,170 Q24,150 44,146 L86,146 Q106,150 106,170 L106,210 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M54,146 L65,158 L76,146" fill="none" stroke="#111" stroke-width="3"/>
      <rect x="55" y="128" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="65" cy="82" r="42" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60,42 q5,-11 10,0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="24" cy="84" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="106" cy="84" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="52" cy="76" r="4" fill="#111"/>
      <circle cx="78" cy="76" r="4" fill="#111"/>
      <path d="M44,92 q21,26 42,0" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="96" y="126" width="24" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M120,131 q9,6 0,13" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M100,170 q14,-8 8,-22" fill="none" stroke="#111" stroke-width="3"/>
    </symbol>
  </defs>

  <style>
    text{font-family:'Comic Sans MS','Segoe Print',cursive;font-size:14px;fill:#111;text-anchor:middle;}
  </style>

  <!-- ===================== PANEL 1 ===================== -->
  <!-- Dailbert &amp; Doug at the desk. Dailbert has posted his pull request. -->
  <g clip-path="url(#pc)">
    <rect x="2" y="2" width="396" height="336" fill="#f4f1ea"/>
    <!-- desk -->
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="3"/>
    <!-- monitor showing the code review, clanker inside -->
    <rect x="150" y="150" width="150" height="112" rx="6" fill="#111"/>
    <rect x="160" y="160" width="130" height="92" fill="#1f1f1f"/>
    <!-- code diff lines on screen -->
    <line x1="170" y1="172" x2="230" y2="172" stroke="#5a5a5a" stroke-width="2"/>
    <line x1="170" y1="182" x2="252" y2="182" stroke="#5a5a5a" stroke-width="2"/>
    <line x1="170" y1="192" x2="214" y2="192" stroke="#5a5a5a" stroke-width="2"/>
    <use href="#clanker" x="224" y="196" width="64" height="58" color="#8b9096"/>
    <rect x="204" y="262" width="42" height="12" fill="#111"/>
    <line x1="188" y1="274" x2="262" y2="274" stroke="#111" stroke-width="3"/>
    <!-- Dailbert seated left -->
    <use href="#dailbert" x="4" y="130" width="120" height="210"/>
    <!-- Doug leaning in right with mug -->
    <use href="#doug" x="300" y="150" width="118" height="190"/>
    <!-- Dailbert balloon -->
    <polygon points="82,74 108,74 96,132 82,74" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="10" y="16" width="192" height="60" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="106" y="40">I put my pull request</text>
    <text x="106" y="59">up for review.</text>
  </g>
  <rect x="2" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>

  <!-- ===================== PANEL 2 ===================== -->
  <!-- Close on the monitor. The Clanker delivers its review. -->
  <g transform="translate(414,0)" clip-path="url(#pc)">
    <rect x="2" y="2" width="396" height="336" fill="#f4f1ea"/>
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="3"/>
    <!-- big monitor -->
    <rect x="120" y="150" width="176" height="130" rx="6" fill="#111"/>
    <rect x="130" y="160" width="156" height="110" fill="#1f1f1f"/>
    <use href="#clanker" x="176" y="176" width="98" height="90" color="#9aa0a6"/>
    <rect x="196" y="280" width="24" height="14" fill="#111"/>
    <line x1="174" y1="294" x2="242" y2="294" stroke="#111" stroke-width="3"/>
    <!-- Dailbert peeking bottom-right -->
    <use href="#dailbert" x="292" y="196" width="112" height="176"/>
    <!-- clanker screen balloon: rectangular, dashed line to the screen -->
    <line x1="208" y1="176" x2="240" y2="118" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="18" y="14" width="220" height="98" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="23" y="19" width="210" height="88" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="128" y="40">REVIEW COMPLETE.</text>
    <text x="128" y="60">1 comment: your code is</text>
    <text x="128" y="80">flawless. I have already</text>
    <text x="128" y="100">merged it into myself.</text>
    <!-- Dailbert tiny balloon -->
    <polygon points="316,196 340,196 328,158 316,196" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="300" y="150" width="92" height="44" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="346" y="177">Into...you?</text>
  </g>
  <rect x="414" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>

  <!-- ===================== PANEL 3 ===================== -->
  <!-- Doug delighted; Dailbert deadpan. Clanker faint in the dead screen. -->
  <g transform="translate(828,0)" clip-path="url(#pc)">
    <rect x="2" y="2" width="396" height="336" fill="#f4f1ea"/>
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="3"/>
    <!-- dark screen in background, clanker faint -->
    <rect x="150" y="176" width="120" height="94" rx="5" fill="#111"/>
    <rect x="158" y="184" width="104" height="78" fill="#2a2a2a"/>
    <use href="#clanker" x="186" y="190" width="66" height="60" color="#5c6167"/>
    <rect x="200" y="270" width="20" height="12" fill="#111"/>
    <line x1="186" y1="282" x2="234" y2="282" stroke="#111" stroke-width="3"/>
    <!-- Doug thrilled, mug up -->
    <use href="#doug" x="8" y="120" width="150" height="240"/>
    <!-- Dailbert deadpan right -->
    <use href="#dailbert" x="286" y="150" width="118" height="190"/>
    <!-- Doug balloon -->
    <polygon points="96,68 120,68 108,140 96,68" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="8" y="14" width="150" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="83" y="38">Wow. It liked</text>
    <text x="83" y="57">your work!</text>
    <!-- Dailbert balloon -->
    <polygon points="300,78 324,78 312,150 300,78" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="228" y="14" width="164" height="66" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="310" y="36">It ate it, Doug.</text>
    <text x="310" y="55">There is no repo</text>
    <text x="310" y="73">anymore.</text>
  </g>
  <rect x="828" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>