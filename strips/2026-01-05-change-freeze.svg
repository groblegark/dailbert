<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Change Freeze</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-01-05</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= SYMBOLS ================= -->
    <symbol id="dailbert" viewBox="0 0 100 130">
      <!-- body / shirt -->
      <path d="M28 130 Q28 92 50 90 Q72 92 72 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- collar + tie -->
      <path d="M43 92 L50 100 L57 92" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M50 100 L46 118 L50 124 L54 118 Z" fill="#111"/>
      <!-- neck -->
      <rect x="45" y="82" width="10" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- head -->
      <ellipse cx="50" cy="55" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- hair curl -->
      <path d="M50 26 Q47 17 54 16 Q60 16 57 23" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="40" cy="55" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="61" cy="55" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="49" y1="55" x2="52" y2="55" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="55" r="2.2" fill="#111"/>
      <circle cx="61" cy="55" r="2.2" fill="#111"/>
      <!-- brow -->
      <line x1="32" y1="44" x2="46" y2="45" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="55" y1="45" x2="69" y2="44" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- mouth flat -->
      <line x1="43" y1="72" x2="57" y2="72" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 100 130">
      <!-- body -->
      <path d="M24 130 Q24 90 50 88 Q76 90 76 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M42 90 L50 98 L58 90" fill="none" stroke="#111" stroke-width="2.4"/>
      <!-- neck -->
      <rect x="45" y="80" width="10" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- round head -->
      <circle cx="50" cy="52" r="31" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- three hair tufts -->
      <path d="M35 24 Q38 17 43 23" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M47 21 Q51 14 55 21" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M58 23 Q63 17 65 24" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="40" cy="48" r="3.2" fill="#111"/>
      <circle cx="60" cy="48" r="3.2" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M35 60 Q50 78 65 60" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 66 Q50 71 60 66" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>

    <symbol id="dougmug" viewBox="0 0 60 60">
      <path d="M8 14 H44 V40 Q44 50 26 50 Q8 50 8 40 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M44 20 Q56 20 56 30 Q56 40 44 38" fill="none" stroke="#111" stroke-width="2.6"/>
      <!-- steam -->
      <path d="M20 10 Q16 5 22 2" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M32 10 Q28 5 34 2" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 100 130">
      <!-- suit -->
      <path d="M22 130 Q22 88 50 86 Q78 88 78 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- lapels -->
      <path d="M50 96 L38 90 M50 96 L62 90" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M50 96 L46 116 L50 122 L54 116 Z" fill="#111"/>
      <!-- neck -->
      <rect x="45" y="78" width="10" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- head -->
      <ellipse cx="50" cy="52" rx="25" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- two tall hair spikes -->
      <path d="M34 30 Q26 4 42 26" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M66 30 Q74 4 58 26" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- tiny eyes -->
      <circle cx="42" cy="50" r="1.8" fill="#111"/>
      <circle cx="58" cy="50" r="1.8" fill="#111"/>
      <line x1="37" y1="44" x2="46" y2="45" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="54" y1="45" x2="63" y2="44" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- flat mouth -->
      <line x1="44" y1="66" x2="56" y2="66" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <!-- boxy chrome head -->
      <rect x="20" y="26" width="60" height="54" rx="6" fill="#d7d7d2" stroke="#111" stroke-width="2.6"/>
      <!-- antenna -->
      <line x1="50" y1="26" x2="50" y2="12" stroke="#111" stroke-width="2.4"/>
      <circle cx="50" cy="9" r="3.4" fill="#111"/>
      <!-- slot eyes glowing -->
      <rect x="30" y="40" width="16" height="7" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="54" y="40" width="16" height="7" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <!-- grille mouth -->
      <rect x="32" y="60" width="36" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="60" x2="40" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="48" y1="60" x2="48" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="60" x2="56" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="64" y1="60" x2="64" y2="72" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line + desk -->
      <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="2"/>
      <!-- desk with old monitor -->
      <rect x="40" y="250" width="150" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- chunky old CRT monitor -->
      <rect x="70" y="196" width="92" height="66" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="80" y="204" width="72" height="46" rx="2" fill="#e7e4dc" stroke="#111" stroke-width="2"/>
      <rect x="106" y="262" width="20" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="96" y="272" width="40" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- blank dead screen: a couple hatch lines only -->
      <line x1="86" y1="212" x2="146" y2="212" stroke="#111" stroke-width="1.2" opacity="0.35"/>
      <line x1="86" y1="240" x2="120" y2="240" stroke="#111" stroke-width="1.2" opacity="0.35"/>

      <!-- Dailbert at desk -->
      <use href="#dailbert" x="182" y="150" width="120" height="156"/>

      <!-- Doug leaning in with mug -->
      <use href="#doug" x="268" y="150" width="120" height="156"/>
      <use href="#dougmug" x="262" y="238" width="52" height="52"/>

      <!-- Doug balloon -->
      <path d="M256 40 H392 V96 H300 L286 112 L288 96 H256 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="324" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good weekend?</text>
      <text x="324" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Nothing happened.</text>

      <!-- Dailbert balloon -->
      <path d="M22 150 H150 V196 H70 L58 210 L60 196 H22 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="86" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Same. Perfect.</text>
      <text x="86" y="188" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Best kind.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="416" y1="300" x2="812" y2="300" stroke="#111" stroke-width="2"/>

      <!-- boss standing by desk -->
      <use href="#boss" x="470" y="146" width="130" height="170"/>

      <!-- Dailbert seated, back a bit -->
      <use href="#dailbert" x="640" y="164" width="112" height="146"/>

      <!-- small desk -->
      <rect x="612" y="250" width="180" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- Boss balloon -->
      <path d="M436 34 H636 V120 H540 L526 136 L528 120 H436 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="536" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Full change freeze</text>
      <text x="536" y="75" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">this week. Touch</text>
      <text x="536" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">nothing. Ship</text>
      <text x="536" y="113" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">nothing.</text>

      <!-- Dailbert balloon -->
      <path d="M626 150 H790 V196 H720 L708 210 L710 196 H626 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="708" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Finally. A quiet</text>
      <text x="708" y="188" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">week.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="830" y1="300" x2="1226" y2="300" stroke="#111" stroke-width="2"/>

      <!-- desk -->
      <rect x="900" y="252" width="240" height="50" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- old CRT monitor, now with a faint glow the surface = clanker -->
      <rect x="960" y="150" width="120" height="90" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="972" y="160" width="96" height="66" rx="2" fill="#c9cac4" stroke="#111" stroke-width="2"/>
      <rect x="1006" y="240" width="28" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="992" y="252" width="56" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- clanker INSIDE the screen -->
      <use href="#clanker" x="982" y="158" width="76" height="76"/>
      <!-- screen glow hatch -->
      <line x1="976" y1="222" x2="1064" y2="222" stroke="#111" stroke-width="1" opacity="0.3"/>

      <!-- Dailbert seated, staring, small -->
      <use href="#dailbert" x="856" y="176" width="108" height="140"/>

      <!-- Clanker screen-edged balloon (rectangular, dashed tether to screen) -->
      <line x1="1020" y1="150" x2="1030" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="898" y="34" width="230" height="80" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1013" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Hello. I read the</text>
      <text x="1013" y="75" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">freeze notice.</text>
      <text x="1013" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I am not a change.</text>

      <!-- Dailbert tiny balloon -->
      <path d="M834 176 H906 V212 H878 L866 224 L868 212 H834 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="870" y="197" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">It's Monday.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>