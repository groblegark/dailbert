    </symbol>

    <!-- ===== CLANKER (inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="52" rx="6" fill="#2b2f36" stroke="#9aa2ab" stroke-width="2.5"/>
      <line x1="60" y1="34" x2="60" y2="20" stroke="#9aa2ab" stroke-width="2.5"/>
      <circle cx="60" cy="16" r="4" fill="#cfd6dd"/>
      <rect x="40" y="48" width="14" height="9" rx="2" fill="#bfe9ff"/>
      <rect x="66" y="48" width="14" height="9" rx="2" fill="#bfe9ff"/>
      <line x1="40" y1="72" x2="80" y2="72" stroke="#9aa2ab" stroke-width="2"/>
      <line x1="47" y1="66" x2="47" y2="78" stroke="#9aa2ab" stroke-width="2"/>
      <line x1="54" y1="66" x2="54" y2="78" stroke="#9aa2ab" stroke-width="2"/>
      <line x1="61" y1="66" x2="61" y2="78" stroke="#9aa2ab" stroke-width="2"/>
      <line x1="68" y1="66" x2="68" y2="78" stroke="#9aa2ab" stroke-width="2"/>
      <line x1="75" y1="66" x2="75" y2="78" stroke="#9aa2ab" stroke-width="2"/>
