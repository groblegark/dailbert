      <ellipse cx="60" cy="42" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 10 q7 -8 3 -14 q9 4 4 14" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
