      <path d="M84 128 h18" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="27" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
