      <circle cx="71" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 58 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 74 L82 74 L88 150 L32 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
