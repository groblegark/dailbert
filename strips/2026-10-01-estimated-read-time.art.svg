    <rect x="210" y="130" width="150" height="110" rx="6" fill="#e7e3da" stroke="#111" stroke-width="2.5"/>
    <rect x="222" y="142" width="126" height="86" rx="3" fill="#2b2f36"/>
    <rect x="266" y="240" width="38" height="14" fill="#111"/>
    <rect x="252" y="252" width="66" height="8" rx="2" fill="#111"/>
    <use href="#clanker" x="238" y="128" width="96" height="96"/>
    <rect x="230" y="200" width="112" height="20" rx="4" fill="#bfe9ff" stroke="#9aa2ab" stroke-width="1.5"/>
    <text x="286" y="214" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">READ TIME: 2 min</text>
    <path d="M120 40 h175 a8 8 0 0 1 8 8 v40 a8 8 0 0 1 -8 8 h-175 a8 8 0 0 1 -8 -8 v-40 a8 8 0 0 1 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="255" y1="104" x2="270" y2="140" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="207" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I added a read-time</text>
    <text x="207" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">badge to everything.</text>
    <text x="207" y="98" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">So you can plan.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="434" y="250" width="360" height="10" fill="#111"/>
    <use href="#doug" x="450" y="120" width="120" height="160"/>
    <use href="#dailbert" x="640" y="120" width="120" height="160"/>
    <path d="M470 30 h150 a8 8 0 0 1 8 8 v52 a8 8 0 0 1 -8 8 h-100 l-14 16 v-16 h-36 a8 8 0 0 1 -8 -8 v-52 a8 8 0 0 1 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="545" y="52" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">One-line email.</text>
    <text x="545" y="72" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Badge says forty</text>
    <text x="545" y="90" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">minutes.</text>
    <path d="M655 108 h120 a8 8 0 0 1 8 8 v30 a8 8 0 0 1 -8 8 h-70 l-12 14 v-14 h-38 a8 8 0 0 1 -8 -8 v-30 a8 8 0 0 1 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="720" y="128" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">The thread I sent</text>
    <text x="720" y="146" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">you says nine seconds.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="848" y="250" width="360" height="10" fill="#111"/>
    <use href="#priya" x="860" y="120" width="120" height="160"/>
    <rect x="1010" y="180" width="120" height="70" rx="4" fill="#e7e3da" stroke="#111" stroke-width="2.5"/>
    <rect x="1020" y="188" width="100" height="54" rx="2" fill="#2b2f36"/>
    <rect x="1000" y="248" width="140" height="10" rx="2" fill="#111"/>
    <rect x="1028" y="200" width="84" height="18" rx="4" fill="#bfe9ff" stroke="#9aa2ab" stroke-width="1.5"/>
    <text x="1070" y="213" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" fill="#111">READ TIME: 0 min</text>
    <path d="M865 26 h240 a8 8 0 0 1 8 8 v48 a8 8 0 0 1 -8 8 h-150 l-14 16 v-16 h-76 a8 8 0 0 1 -8 -8 v-48 a8 8 0 0 1 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="985" y="48" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I filtered my inbox</text>
    <text x="985" y="66" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">to hide anything the</text>
    <text x="985" y="84" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">badge scores over ten.</text>
    <use href="#clanker" x="1045" y="120" width="60" height="60"/>
    <path d="M1075 148 h115 a6 6 0 0 1 6 6 v22 a6 6 0 0 1 -6 6 h-115 a6 6 0 0 1 -6 -6 v-22 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <line x1="1075" y1="150" x2="1085" y2="162" stroke="#111" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="1132" y="164" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">Your inbox is</text>
    <text x="1132" y="178" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">empty now.</text>
  </g>
