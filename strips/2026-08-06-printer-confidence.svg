<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Printer Confidence</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-06</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q7 -9 1 -12 q9 2 4 12" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 64 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 80 L80 80 L88 150 L32 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 80 L54 100 L60 108 L66 100 Z" fill="#111"/>
      <line x1="60" y1="108" x2="60" y2="132" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 L82 84 L90 154 L30 154 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M82 96 q22 6 24 26" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="98" y="120" width="24" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M122 124 q9 3 0 12" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M103 126 h14 M103 131 h14" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 170">
      <ellipse cx="60" cy="48" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 46 q-2 -30 29 -32 q31 2 29 32 q-6 -14 -29 -14 q-23 0 -29 14 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <path d="M52 16 q8 -12 18 -4 q6 -6 12 2" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="60" cy="12" r="6" fill="#111"/>
      <rect x="42" y="42" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="47" r="1.9" fill="#111"/>
      <circle cx="70" cy="47" r="1.9" fill="#111"/>
      <path d="M52 66 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 82 L80 82 L86 152 L34 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M40 96 l-12 22" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M80 96 l12 22" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M34 100 h14 M72 100 h14" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- THE CLANKER (screen face only) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <rect x="24" y="20" width="72" height="60" rx="7" fill="#1c1c1c" stroke="#7d7d7d" stroke-width="2.4"/>
      <line x1="60" y1="20" x2="60" y2="8" stroke="#9a9a9a" stroke-width="2.2"/>
      <circle cx="60" cy="6" r="3" fill="#9a9a9a"/>
      <rect x="34" y="36" width="18" height="9" rx="2.5" fill="#bfe3ff"/>
      <rect x="68" y="36" width="18" height="9" rx="2.5" fill="#bfe3ff"/>
      <g stroke="#9a9a9a" stroke-width="2" stroke-linecap="round">
        <line x1="40" y1="62" x2="40" y2="70"/>
        <line x1="48" y1="62" x2="48" y2="70"/>
        <line x1="56" y1="62" x2="56" y2="70"/>
        <line x1="64" y1="62" x2="64" y2="70"/>
        <line x1="72" y1="62" x2="72" y2="70"/>
        <line x1="80" y1="62" x2="80" y2="70"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANELS ================= -->
  <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <line x1="8" y1="300" x2="393" y2="300" stroke="#111" stroke-width="1.6"/>
    <!-- dying desk plant -->
    <g>
      <path d="M356 292 l6 -22 h22 l6 22 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M368 270 q-6 -20 -12 -24 M373 270 q0 -22 -2 -30 M378 270 q6 -18 12 -26" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M362 250 q-3 6 -8 4 M383 248 q4 5 9 2" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- The printer -->
    <g>
      <rect x="120" y="196" width="150" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="120" y="196" width="150" height="20" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="140" y="240" width="110" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <g transform="translate(224,200) scale(0.42)">
        <use href="#clanker" width="120" height="100"/>
      </g>
      <circle cx="150" cy="208" r="3" fill="#111"/>
      <circle cx="162" cy="208" r="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <rect x="150" y="246" width="70" height="40" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <line x1="158" y1="256" x2="212" y2="256" stroke="#111" stroke-width="1.4"/>
      <line x1="158" y1="264" x2="200" y2="264" stroke="#111" stroke-width="1.4"/>
    </g>

    <use href="#dailbert" x="14" y="128" width="120" height="170"/>

    <!-- clanker balloon -->
    <line x1="228" y1="212" x2="250" y2="126" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="238" y="70" width="152" height="58" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="314" y="90" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Print job complete.</text>
    <text x="314" y="108" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I also queued the</text>
    <text x="314" y="125" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">other 399 copies.</text>

    <!-- Dailbert balloon -->
    <path d="M40 150 h100 v34 h-60 l-12 12 v-12 h-28 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="90" y="170" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I asked for one.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <line x1="421" y1="300" x2="806" y2="300" stroke="#111" stroke-width="1.6"/>

    <g>
      <rect x="470" y="200" width="140" height="82" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="470" y="200" width="140" height="18" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="486" y="240" width="108" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <g transform="translate(566,203) scale(0.4)">
        <use href="#clanker" width="120" height="100"/>
      </g>
      <path d="M470 282 l-6 12 h150 l-8 -14 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <g stroke="#111" stroke-width="1.5" fill="none">
        <path d="M474 289 h140"/>
        <path d="M470 294 h150"/>
        <path d="M478 285 h132"/>
      </g>
      <rect x="500" y="248" width="66" height="34" fill="#f4f1ea" stroke="#111" stroke-width="1.6" transform="rotate(4 533 265)"/>
      <rect x="512" y="252" width="66" height="34" fill="#f4f1ea" stroke="#111" stroke-width="1.6" transform="rotate(-6 545 269)"/>
    </g>

    <use href="#doug" x="640" y="126" width="120" height="170"/>

    <path d="M628 138 h132 v34 h-70 l-12 12 v-12 h-50 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="694" y="158" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Big report today,</text>
    <text x="694" y="175" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">huh.</text>

    <use href="#dailbert" x="426" y="132" width="110" height="160"/>
    <path d="M446 150 h74 v30 h-32 l-10 11 v-11 h-32 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="483" y="169" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">It's a receipt.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <line x1="835" y1="300" x2="1220" y2="300" stroke="#111" stroke-width="1.6"/>

    <g>
      <rect x="874" y="204" width="130" height="80" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="874" y="204" width="130" height="18" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="890" y="242" width="98" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- DEAD screen: no clanker, just dark -->
      <rect x="962" y="207" width="34" height="26" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="2"/>
      <!-- cord unplugged -->
      <path d="M874 270 q-28 26 -46 10" fill="none" stroke="#111" stroke-width="2.4"/>
      <rect x="822" y="272" width="12" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="824" y1="272" x2="824" y2="266" stroke="#111" stroke-width="2"/>
      <line x1="832" y1="272" x2="832" y2="266" stroke="#111" stroke-width="2"/>
    </g>

    <use href="#priya" x="1024" y="128" width="120" height="170"/>

    <path d="M1008 148 h122 v34 h-52 l-12 12 v-12 h-58 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1069" y="168" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Some jobs print</text>
    <text x="1069" y="185" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">better off.</text>

    <use href="#dailbert" x="838" y="150" width="100" height="146"/>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>