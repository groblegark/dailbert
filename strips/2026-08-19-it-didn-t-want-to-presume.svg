<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">It Didn't Want to Presume</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-19</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 13 q10 -12 2 -18 q-4 8 -8 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.2" fill="#111"/>
      <circle cx="71" cy="46" r="2.2" fill="#111"/>
      <path d="M52 65 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M50 78 v10 h20 v-10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 96 q26 -14 52 0 l6 84 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M52 90 l8 8 l8 -8" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M60 98 l-4 10 l4 30 l4 -30 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="48" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 22 q6 -8 12 -3 M60 16 q4 -7 10 -2 M78 24 q7 -6 10 1" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="46" r="2.8" fill="#111"/>
      <circle cx="72" cy="46" r="2.8" fill="#111"/>
      <path d="M46 58 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M52 80 v8 h16 v-8 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M32 98 q28 -12 56 0 l4 82 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M84 120 q22 6 26 26" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="98" y="140" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M124 146 q10 2 8 12 q-2 6 -8 4" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M104 148 q6 -6 14 0" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="40" rx="34" ry="32" fill="#111"/>
      <circle cx="60" cy="20" r="12" fill="#111"/>
      <ellipse cx="60" cy="48" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 34 q8 -10 16 -6 q6 -8 16 -3 q8 -4 14 5" fill="#111" stroke="#111" stroke-width="2"/>
      <rect x="40" y="44" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.3"/>
      <rect x="62" y="44" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.3"/>
      <line x1="58" y1="50" x2="62" y2="50" stroke="#111" stroke-width="2.3"/>
      <circle cx="49" cy="50" r="2" fill="#111"/>
      <circle cx="71" cy="50" r="2" fill="#111"/>
      <path d="M53 66 q7 2 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M52 76 v9 h16 v-9 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 94 q26 -12 52 0 l6 86 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 128 q10 4 8 14 M92 128 q-10 4 -8 14" fill="none" stroke="#111" stroke-width="2.3"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="14" x2="60" y2="2" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="3" r="3" fill="#111"/>
      <rect x="22" y="14" width="76" height="70" rx="9" fill="#d9d9d9" stroke="#111" stroke-width="2.6"/>
      <rect x="30" y="22" width="60" height="54" rx="6" fill="#c2c2c2" stroke="#111" stroke-width="1.6"/>
      <rect x="37" y="34" width="20" height="9" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="63" y="34" width="20" height="9" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="42" y="56" width="36" height="12" rx="2" fill="#d9d9d9" stroke="#111" stroke-width="1.8"/>
      <line x1="49" y1="56" x2="49" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="56" y1="56" x2="56" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="63" y1="56" x2="63" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="70" y1="56" x2="70" y2="68" stroke="#111" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="2" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="2" y1="252" x2="400" y2="252" stroke="#111" stroke-width="1.6"/>
      <!-- CALENDAR POSTER on wall -->
      <rect x="34" y="66" width="168" height="176" rx="4" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <line x1="34" y1="96" x2="202" y2="96" stroke="#111" stroke-width="1.8"/>
      <text x="118" y="88" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" font-weight="bold" fill="#111">TEAM CALENDAR</text>
      <text x="118" y="118" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="30" font-weight="bold" fill="#111">2026&#8211;2031</text>
      <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">
        <text x="66" y="152">2026</text><text x="118" y="152">2027</text><text x="170" y="152">2028</text>
        <text x="66" y="184">2029</text><text x="118" y="184">2030</text>
        <text x="170" y="184" font-weight="bold">2031</text>
      </g>
      <rect x="151" y="172" width="38" height="16" rx="3" fill="none" stroke="#111" stroke-width="2"/>
      <text x="118" y="216" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10.5" fill="#555" font-style="italic">didn't want to presume</text>

      <!-- PRIYA looking up at it -->
      <use href="#priya" x="244" y="120" width="120" height="200"/>
      <path d="M276 214 q-24 -22 -50 -34" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

      <!-- Priya balloon -->
      <g>
        <path d="M212 20 h172 q10 0 10 10 v40 q0 10 -10 10 h-72 l-16 16 l2 -16 h-86 q-10 0 -10 -10 v-40 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="298" y="42" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">This goes out</text>
        <text x="298" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">five years.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="415" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="415" y1="252" x2="812" y2="252" stroke="#111" stroke-width="1.6"/>

      <!-- MONITOR on a desk with clanker inside -->
      <rect x="448" y="180" width="120" height="5" fill="#111"/>
      <rect x="498" y="150" width="24" height="30" fill="#c9c9c9" stroke="#111" stroke-width="2"/>
      <rect x="452" y="58" width="126" height="94" rx="6" fill="#111"/>
      <rect x="458" y="64" width="114" height="82" rx="4" fill="#2b2b2b"/>
      <g stroke="#4d4d4d" stroke-width="1"><line x1="460" y1="72" x2="570" y2="72"/><line x1="460" y1="138" x2="570" y2="138"/></g>
      <use href="#clanker" x="465" y="70" width="100" height="92"/>

      <!-- Priya still there, listening -->
      <use href="#priya" x="626" y="130" width="120" height="200"/>

      <!-- dashed tail from clanker surface to balloon -->
      <path d="M556 66 q12 -10 24 -12" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

      <!-- Clanker screen-edged balloon -->
      <g>
        <rect x="560" y="14" width="240" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <rect x="564" y="18" width="232" height="62" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="680" y="37" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I stopped at 2031.</text>
        <text x="680" y="55" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">It felt forward enough</text>
        <text x="680" y="73" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">without presuming.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="829" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="829" y1="252" x2="1226" y2="252" stroke="#111" stroke-width="1.6"/>

      <!-- monitor with clanker, off to left -->
      <rect x="852" y="96" width="98" height="74" rx="6" fill="#111"/>
      <rect x="857" y="101" width="88" height="64" rx="4" fill="#2b2b2b"/>
      <use href="#clanker" x="862" y="106" width="78" height="72"/>
      <rect x="888" y="170" width="22" height="26" fill="#c9c9c9" stroke="#111" stroke-width="2"/>
      <rect x="866" y="196" width="66" height="5" fill="#111"/>

      <!-- Doug with mug, quietly pleased -->
      <use href="#doug" x="972" y="122" width="130" height="200"/>

      <!-- dashed tail clanker -> balloon -->
      <path d="M934 116 q16 -8 28 -8" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

      <!-- clanker button balloon -->
      <g>
        <rect x="948" y="16" width="256" height="52" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <rect x="952" y="20" width="248" height="44" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="1076" y="36" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Also the poster</text>
        <text x="1076" y="54" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">only fit six squares.</text>
      </g>

      <!-- Doug balloon, small, warm -->
      <g>
        <path d="M994 176 h144 q8 0 8 8 v26 q0 8 -8 8 h-62 l-12 14 l1 -14 h-71 q-8 0 -8 -8 v-26 q0 -8 8 -8 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="1066" y="196" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I'm on it clear</text>
        <text x="1066" y="213" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">through 2031.</text>
      </g>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>