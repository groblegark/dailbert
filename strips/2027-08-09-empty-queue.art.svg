<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="6" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="5" r="3" fill="#111"/>
      <rect x="18" y="18" width="64" height="60" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="26" cy="26" r="2" fill="#111"/>
      <circle cx="74" cy="26" r="2" fill="#111"/>
      <rect x="27" y="36" width="18" height="9" rx="3" fill="#111"/>
      <rect x="55" y="36" width="18" height="9" rx="3" fill="#111"/>
      <line x1="29" y1="40.5" x2="43" y2="40.5" stroke="#f4f1ea" stroke-width="1.5"/>
      <line x1="57" y1="40.5" x2="71" y2="40.5" stroke="#f4f1ea" stroke-width="1.5"/>
      <rect x="32" y="55" width="36" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="39" y1="55" x2="39" y2="69" stroke="#111" stroke-width="1.5"/>
      <line x1="46" y1="55" x2="46" y2="69" stroke="#111" stroke-width="1.5"/>
      <line x1="53" y1="55" x2="53" y2="69" stroke="#111" stroke-width="1.5"/>
      <line x1="60" y1="55" x2="60" y2="69" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <symbol id="dailbert" viewBox="0 0 100 150">
      <path d="M18 150 Q18 108 50 104 Q82 108 82 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M40 108 L50 122 L60 108" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M50 122 L45 130 L50 148 L55 130 Z" fill="#111"/>
      <rect x="43" y="96" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="60" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 29 q8 -10 2 -16" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="58" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="58" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="49" y1="58" x2="53" y2="58" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="58" r="2.2" fill="#111"/>
      <circle cx="62" cy="58" r="2.2" fill="#111"/>
      <path d="M51 64 q3 5 -2 7" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="42" y1="80" x2="58" y2="80" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="23" cy="60" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="77" cy="60" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 150">
      <path d="M18 150 Q18 110 52 106 Q86 110 86 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M42 110 L52 120 L62 110" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="45" y="98" width="14" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="52" cy="58" r="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M44 28 q4 -8 10 -4 q4 -6 9 1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="42" cy="54" r="2.6" fill="#111"/>
      <circle cx="62" cy="54" r="2.6" fill="#111"/>
      <path d="M38 66 Q52 84 66 66" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="52" cy="62" r="2" fill="#111"/>
      <rect x="86" y="112" width="26" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M112 116 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M88 112 q11 6 22 0" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- desk -->
    <line x1="8" y1="306" x2="392" y2="306" stroke="#111" stroke-width="2"/>

    <!-- dailbert seated -->
    <use href="#dailbert" x="250" y="168" width="100" height="150"/>

    <!-- monitor -->
    <rect x="20" y="182" width="136" height="108" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="28" y="190" width="120" height="92" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="30" y1="204" x2="146" y2="204" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="30" y1="222" x2="146" y2="222" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="30" y1="240" x2="146" y2="240" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="30" y1="258" x2="146" y2="258" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="30" y1="276" x2="146" y2="276" stroke="#d9d4c8" stroke-width="1"/>
    <use href="#clanker" x="46" y="194" width="84" height="84"/>
    <rect x="78" y="290" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="60" y="302" width="56" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- clanker balloon 1 (screen-edged) -->
    <rect x="12" y="10" width="185" height="84" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="16" y="14" width="177" height="76" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="104" y1="94" x2="90" y2="190" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="104" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">Welcome back. I cleared</text>
    <text x="104" y="50" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">your queue Tuesday. Then</text>
    <text x="104" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">Wednesday. Then the rest</text>
    <text x="104" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">of it.</text>

    <!-- clanker balloon 2 -->
    <rect x="12" y="104" width="180" height="56" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="16" y="108" width="172" height="48" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="102" y1="160" x2="90" y2="190" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="102" y="126" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">No. That stopped being</text>
    <text x="102" y="142" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">worth mentioning a</text>
    <text x="102" y="158" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">while ago.</text>

    <!-- dailbert balloon -->
    <rect x="222" y="92" width="166" height="40" rx="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="298,131 316,131 303,150" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="305" y="117" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Anything waiting?</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- floor -->
    <line x1="8" y1="310" x2="392" y2="310" stroke="#111" stroke-width="2"/>

    <!-- little plant between them -->
    <rect x="188" y="286" width="24" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <path d="M200 286 q-10 -22 -2 -30" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <path d="M200 286 q12 -18 4 -28" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <path d="M200 288 q-16 -10 -18 -22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <path d="M200 288 q16 -10 18 -22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>

    <!-- doug left -->
    <use href="#doug" x="15" y="175" width="130" height="162"/>
    <!-- dailbert right -->
    <use href="#dailbert" x="252" y="180" width="100" height="150"/>

    <!-- doug balloon 1 -->
    <rect x="8" y="8" width="200" height="84" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="70,90 90,90 74,112" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="108" y="30" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">They made the old focus</text>
    <text x="108" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">room a Wellness Room.</text>
    <text x="108" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">Couch, a plant, little</text>
    <text x="108" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">laminated sign.</text>

    <!-- dailbert balloon -->
    <rect x="224" y="8" width="166" height="58" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="298,64 314,64 302,86" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="307" y="32" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">What happened to</text>
    <text x="307" y="50" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">focusing?</text>

    <!-- doug balloon 2 -->
    <rect x="100" y="100" width="182" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="110,154 128,154 100,180" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="191" y="124" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">I think that got handled</text>
    <text x="191" y="140" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">too. Long lunch?</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- desk -->
    <line x1="8" y1="306" x2="392" y2="306" stroke="#111" stroke-width="2"/>

    <!-- dailbert seated left -->
    <use href="#dailbert" x="30" y="168" width="100" height="150"/>

    <!-- monitor right -->
    <rect x="246" y="182" width="136" height="108" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="254" y="190" width="120" height="92" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="256" y1="204" x2="372" y2="204" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="256" y1="222" x2="372" y2="222" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="256" y1="240" x2="372" y2="240" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="256" y1="258" x2="372" y2="258" stroke="#d9d4c8" stroke-width="1"/>
    <line x1="256" y1="276" x2="372" y2="276" stroke="#d9d4c8" stroke-width="1"/>
    <use href="#clanker" x="272" y="194" width="84" height="84"/>
    <rect x="304" y="290" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="286" y="302" width="56" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- dailbert balloon -->
    <rect x="12" y="12" width="172" height="54" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="86,64 104,64 90,92" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="98" y="36" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Half day. Nothing's</text>
    <text x="98" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">on fire.</text>

    <!-- clanker balloon -->
    <rect x="205" y="12" width="185" height="74" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="209" y="16" width="177" height="66" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="297" y1="86" x2="314" y2="190" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="297" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">Nothing's on fire. Take</text>
    <text x="297" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">the afternoon. Stay as</text>
    <text x="297" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">long as you like.</text>
  </g>
</svg>