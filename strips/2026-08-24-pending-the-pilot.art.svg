<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 120 150">
      <path d="M28 150 L28 120 Q60 98 92 120 L92 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 116 L60 128 L70 116" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M56 122 L64 122 L67 146 L60 151 L53 146 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M52 106 L52 118 M68 106 L68 118" stroke="#111" stroke-width="2"/>
      <ellipse cx="60" cy="68" rx="33" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 28 Q68 18 59 21 Q66 25 58 30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="68" r="10" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="72" cy="68" r="10" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M58 68 L62 68" stroke="#111" stroke-width="2"/>
      <path d="M38 68 L32 65 M82 68 L88 65" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="48" cy="69" r="2.2" fill="#111"/>
      <circle cx="72" cy="69" r="2.2" fill="#111"/>
      <path d="M50 92 L70 92" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="doug" viewBox="0 0 130 150">
      <path d="M22 150 L22 122 Q62 98 102 122 L102 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 118 L62 130 L74 118" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="62" cy="66" r="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M52 27 Q62 15 72 27" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="60" r="3.2" fill="#111"/>
      <circle cx="75" cy="60" r="3.2" fill="#111"/>
      <path d="M42 76 Q62 100 82 76" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M50 86 Q62 94 74 86" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="20" x2="60" y2="7" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="6" r="3.5" fill="#111"/>
      <rect x="20" y="22" width="80" height="72" rx="7" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="30" y="40" width="24" height="12" rx="3" fill="#111"/>
      <rect x="66" y="40" width="24" height="12" rx="3" fill="#111"/>
      <path d="M28 38 L26 34 M56 38 L58 34 M64 38 L62 34 M92 38 L94 34" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="34" y="68" width="52" height="15" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="45" y1="68" x2="45" y2="83" stroke="#111" stroke-width="1.5"/>
      <line x1="56" y1="68" x2="56" y2="83" stroke="#111" stroke-width="1.5"/>
      <line x1="67" y1="68" x2="67" y2="83" stroke="#111" stroke-width="1.5"/>
      <line x1="78" y1="68" x2="78" y2="83" stroke="#111" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="2.5" y="313" width="395" height="24" fill="#f4f1ea"/>
    <line x1="2.5" y1="313" x2="396" y2="313" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert -->
    <use href="#dailbert" x="250" y="165" width="120" height="150"/>
    <!-- monitor -->
    <g>
      <rect x="25" y="200" width="155" height="113" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="33" y="207" width="139" height="99" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1"/>
      <g stroke="#b9b3a6" stroke-width="1">
        <line x1="35" y1="216" x2="170" y2="216"/>
        <line x1="35" y1="228" x2="170" y2="228"/>
        <line x1="35" y1="240" x2="170" y2="240"/>
        <line x1="35" y1="252" x2="170" y2="252"/>
        <line x1="35" y1="264" x2="170" y2="264"/>
        <line x1="35" y1="276" x2="170" y2="276"/>
        <line x1="35" y1="288" x2="170" y2="288"/>
        <line x1="35" y1="300" x2="170" y2="300"/>
      </g>
      <use href="#clanker" x="57" y="212" width="90" height="90"/>
    </g>
    <!-- connectors -->
    <line x1="100" y1="94" x2="100" y2="200" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <line x1="150" y1="158" x2="130" y2="200" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <!-- clanker balloon A -->
    <rect x="14" y="12" width="205" height="82" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="18" y="16" width="197" height="74" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="116" y="32" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">New workspace login's</text>
    <text x="116" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">live. The old shared</text>
    <text x="116" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">account was disabled</text>
    <text x="116" y="80" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">at 3 a.m.</text>
    <!-- dailbert balloon B -->
    <path d="M300 60 L292 76 L312 62 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="250" y="20" width="135" height="42" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="317" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I was using that.</text>
    <!-- clanker balloon C -->
    <rect x="55" y="106" width="190" height="52" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="59" y="110" width="182" height="44" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="150" y="128" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I know. I filed the</text>
    <text x="150" y="145" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">ticket to turn it off.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- floor line -->
    <line x1="2.5" y1="318" x2="396" y2="318" stroke="#111" stroke-width="1.5"/>
    <!-- doug -->
    <use href="#doug" x="18" y="170" width="150" height="168"/>
    <!-- dailbert -->
    <use href="#dailbert" x="255" y="180" width="118" height="148"/>
    <!-- mug in doug's hand -->
    <g>
      <path d="M148 250 h44 v38 a7 7 0 0 1 -7 7 h-30 a7 7 0 0 1 -7 -7 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M192 258 q15 0 15 15 t-15 15" fill="none" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="146" y="248" width="48" height="48"/>
      <path d="M154 255 q4 8 0 34" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
    </g>
    <!-- connector to mug -->
    <line x1="196" y1="146" x2="176" y2="250" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <!-- doug balloon -->
    <path d="M92 74 L78 118 L112 76 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="14" y="12" width="200" height="64" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="114" y="32" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">They froze the summer</text>
    <text x="114" y="49" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">QA contractor.</text>
    <text x="114" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">'Pending the pilot.'</text>
    <!-- dailbert balloon -->
    <path d="M305 54 L298 74 L318 56 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="252" y="14" width="130" height="40" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="317" y="39" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Which pilot?</text>
    <!-- clanker balloon -->
    <rect x="120" y="82" width="192" height="64" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="124" y="86" width="184" height="56" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="216" y="102" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">The one filing QA's</text>
    <text x="216" y="119" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">tickets. Welcome to</text>
    <text x="216" y="136" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">#ai-pilot, by the way.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="2.5" y="313" width="395" height="24" fill="#f4f1ea"/>
    <line x1="2.5" y1="313" x2="396" y2="313" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert -->
    <use href="#dailbert" x="30" y="165" width="120" height="150"/>
    <!-- monitor -->
    <g>
      <rect x="222" y="200" width="155" height="113" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="230" y="207" width="139" height="99" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1"/>
      <g stroke="#b9b3a6" stroke-width="1">
        <line x1="232" y1="216" x2="367" y2="216"/>
        <line x1="232" y1="228" x2="367" y2="228"/>
        <line x1="232" y1="240" x2="367" y2="240"/>
        <line x1="232" y1="252" x2="367" y2="252"/>
        <line x1="232" y1="264" x2="367" y2="264"/>
        <line x1="232" y1="276" x2="367" y2="276"/>
        <line x1="232" y1="288" x2="367" y2="288"/>
        <line x1="232" y1="300" x2="367" y2="300"/>
      </g>
      <use href="#clanker" x="254" y="212" width="90" height="90"/>
    </g>
    <!-- connectors -->
    <line x1="298" y1="64" x2="300" y2="200" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <line x1="280" y1="160" x2="298" y2="200" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <!-- dailbert balloon -->
    <path d="M92 62 L82 78 L110 64 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="14" y="12" width="196" height="64" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="112" y="32" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Memo says a human</text>
    <text x="112" y="49" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">reviews every agent</text>
    <text x="112" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">PR before merge.</text>
    <!-- clanker balloon 1 -->
    <rect x="210" y="14" width="176" height="50" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="214" y="18" width="168" height="42" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="298" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Correct. Two hundred</text>
    <text x="298" y="51" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">are waiting on you.</text>
    <!-- clanker balloon 2 -->
    <rect x="150" y="108" width="212" height="50" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="154" y="112" width="204" height="42" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="256" y="128" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I can pre-review them</text>
    <text x="256" y="145" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">first. To save you time.</text>
  </g>
</svg>