<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">No Agenda</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <g id="dailbert">
      <path d="M-30 96 Q0 60 30 96 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-8 58 l8 9 l8 -9" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M0 62 l-5 8 l5 22 l5 -22 z" fill="#111"/>
      <ellipse cx="0" cy="0" rx="24" ry="28" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="-24" cy="2" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="24" cy="2" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M-3 -28 q-7 -11 5 -12 q-7 6 3 10" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-9" cy="-2" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="9" cy="-2" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="-1" y1="-2" x2="1" y2="-2" stroke="#111" stroke-width="2.2"/>
      <circle cx="-9" cy="-2" r="1.6" fill="#111"/>
      <circle cx="9" cy="-2" r="1.6" fill="#111"/>
      <path d="M-6 15 q6 4 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- ===== DOUG ===== -->
    <g id="doug">
      <path d="M-34 96 Q0 62 34 96 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="28" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="-28" cy="2" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="28" cy="2" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M-7 -28 q3 -7 6 0 M3 -28 q3 -7 6 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-10" cy="-4" r="2.6" fill="#111"/>
      <circle cx="10" cy="-4" r="2.6" fill="#111"/>
      <path d="M-14 7 q14 17 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- ===== PRIYA ===== -->
    <g id="priya">
      <path d="M-30 96 Q0 60 30 96 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-25 8 q-9 -36 25 -38 q34 2 25 38 q-7 -19 -25 -19 q-18 0 -25 19 z" fill="#111"/>
      <ellipse cx="0" cy="3" rx="20" ry="24" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="0" cy="-31" r="9" fill="#111"/>
      <path d="M-20 -13 a5 5 0 0 1 10 0 M-6 -19 a5 5 0 0 1 11 0 M9 -14 a5 5 0 0 1 9 0" fill="#111"/>
      <rect x="-16" y="-5" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="2" y="-5" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="-2" y1="0" x2="2" y2="0" stroke="#111" stroke-width="2"/>
      <circle cx="-9" cy="0" r="1.6" fill="#111"/>
      <circle cx="9" cy="0" r="1.6" fill="#111"/>
      <path d="M-6 16 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- ===== MUG ===== -->
    <g id="mug">
      <rect x="-11" y="-9" width="22" height="20" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M11 -4 q9 1 9 8 q0 7 -9 7" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M-5 -16 q4 -4 0 -8 M4 -16 q4 -4 0 -8" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- ===== CLANKER ===== -->
    <g id="clanker">
      <rect x="-27" y="-24" width="54" height="47" rx="6" fill="#dcdcdc" stroke="#111" stroke-width="2.5"/>
      <line x1="0" y1="-24" x2="0" y2="-37" stroke="#111" stroke-width="2"/>
      <circle cx="0" cy="-40" r="3" fill="#111"/>
      <rect x="-18" y="-11" width="13" height="6" rx="2" fill="#111"/>
      <rect x="5" y="-11" width="13" height="6" rx="2" fill="#111"/>
      <line x1="-16" y1="-8" x2="-7" y2="-8" stroke="#93b3cc" stroke-width="2"/>
      <line x1="7" y1="-8" x2="16" y2="-8" stroke="#93b3cc" stroke-width="2"/>
      <rect x="-17" y="6" width="34" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="-9" y1="6" x2="-9" y2="16" stroke="#111" stroke-width="1.4"/>
      <line x1="-2" y1="6" x2="-2" y2="16" stroke="#111" stroke-width="1.4"/>
      <line x1="5" y1="6" x2="5" y2="16" stroke="#111" stroke-width="1.4"/>
      <line x1="12" y1="6" x2="12" y2="16" stroke="#111" stroke-width="1.4"/>
    </g>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2"/>
    <use href="#dailbert" transform="translate(118,196)"/>
    <use href="#doug" transform="translate(300,208)"/>
    <use href="#mug" transform="translate(258,246)"/>
    <!-- speech: Dailbert -->
    <path d="M118 96 L100 128 L134 122 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <ellipse cx="150" cy="58" rx="112" ry="41" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="150" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">New agent. It declines</text>
    <text x="150" y="68" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">meetings with no agenda.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="414" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="424" y1="300" x2="804" y2="300" stroke="#111" stroke-width="2"/>
    <!-- monitor -->
    <rect x="470" y="150" width="164" height="112" rx="6" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="481" y="161" width="142" height="90" rx="3" fill="#eef0f1" stroke="#111" stroke-width="1.5"/>
    <line x1="490" y1="245" x2="614" y2="200" stroke="#c9cdd0" stroke-width="2"/>
    <line x1="490" y1="228" x2="614" y2="183" stroke="#c9cdd0" stroke-width="2"/>
    <rect x="544" y="262" width="16" height="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="522" y="278" width="60" height="7" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(552,201)"/>
    <use href="#dailbert" transform="translate(742,196)"/>
    <!-- clanker balloon -->
    <line x1="540" y1="150" x2="540" y2="96" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="444" y="24" width="196" height="60" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="542" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It worked. Calendar's</text>
    <text x="542" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">clear. I declined lunch.</text>
    <!-- dailbert reply -->
    <path d="M742 96 L726 118 L754 116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <ellipse cx="742" cy="72" rx="60" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="742" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">Lunch had</text>
    <text x="742" y="83" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">no agenda.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="838" y1="300" x2="1218" y2="300" stroke="#111" stroke-width="2"/>
    <use href="#doug" transform="translate(918,210)"/>
    <use href="#mug" transform="translate(876,250)"/>
    <use href="#priya" transform="translate(1088,198)"/>
    <!-- Doug -->
    <path d="M918 108 L902 132 L934 128 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <ellipse cx="928" cy="66" rx="66" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="928" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">You building</text>
    <text x="928" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">one too?</text>
    <!-- Priya -->
    <path d="M1088 100 L1070 128 L1102 122 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <ellipse cx="1120" cy="66" rx="78" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="1120" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">No. I read</text>
    <text x="1120" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">the invite.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>