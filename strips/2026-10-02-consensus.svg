<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Consensus</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-10-02</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#dfe6e2"/>
      <rect width="6" height="1.4" y="0" fill="#b9c6c0"/>
    </pattern>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f4f1ea"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="1"/>
    </pattern>

    <!-- Clanker face: box robot head, drawn WITHIN a surface -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <rect x="6" y="10" width="88" height="72" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="10" x2="50" y2="0" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="0" r="3" fill="#111"/>
      <rect x="16" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="58" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="20" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <rect x="62" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <rect x="24" y="56" width="52" height="16" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="34" y1="56" x2="34" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="44" y1="56" x2="44" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="56" x2="54" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="56" x2="64" y2="72" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M28 168 L28 132 Q60 108 92 132 L92 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 128 L60 150 L68 128" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 150 L54 160 L60 178 L66 160 Z" fill="#111"/>
      <rect x="52" y="118" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="80" rx="38" ry="44" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M60 36 q8 -12 -2 -16" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="45" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="76" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="58" y1="78" x2="63" y2="78" stroke="#111" stroke-width="2.6"/>
      <circle cx="45" cy="78" r="2.4" fill="#111"/>
      <circle cx="76" cy="78" r="2.4" fill="#111"/>
      <line x1="50" y1="104" x2="70" y2="104" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair pulled up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M22 168 L22 130 Q60 106 98 130 L98 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 128 L60 144 L70 128" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="52" y="118" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="80" rx="37" ry="42" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- dark curly hair pulled up: fringe (kept above the glasses) -->
      <path d="M24 72 Q19 38 46 28 Q60 20 76 28 Q101 38 96 72 Q90 56 79 51 Q76 60 69 55 Q65 46 57 51 Q51 45 45 53 Q39 49 35 58 Q29 58 27 70 Z" fill="#111" stroke="#111" stroke-width="2"/>
      <!-- bun on top -->
      <circle cx="60" cy="24" r="11" fill="#111" stroke="#111" stroke-width="2"/>
      <!-- side curls -->
      <circle cx="29" cy="66" r="4.5" fill="#111"/>
      <circle cx="91" cy="66" r="4.5" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="33" y="72" width="24" height="16" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="63" y="72" width="24" height="16" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="57" y1="80" x2="63" y2="80" stroke="#111" stroke-width="2.6"/>
      <circle cx="45" cy="80" r="2.4" fill="#111"/>
      <circle cx="75" cy="80" r="2.4" fill="#111"/>
      <line x1="52" y1="104" x2="68" y2="104" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- BOSS: two tall hair spikes, tiny eyes, suit and tie -->
    <symbol id="boss" viewBox="0 0 120 190">
      <path d="M24 188 L24 148 Q60 122 96 148 L96 188 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 146 L60 168 L48 178" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M68 146 L60 168 L72 178" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M60 150 L55 158 L60 182 L65 158 Z" fill="#111"/>
      <rect x="52" y="134" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="92" rx="34" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- two tall hair spikes -->
      <path d="M40 62 Q30 16 50 40 Q54 20 60 44 Q66 18 70 42 Q90 14 80 62" fill="#f4f1ea" stroke="#111" stroke-width="2.8" stroke-linejoin="round"/>
      <circle cx="49" cy="90" r="2.2" fill="#111"/>
      <circle cx="71" cy="90" r="2.2" fill="#111"/>
      <path d="M50 110 Q60 118 70 110" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="8" y1="300" x2="396" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="8" y1="326" x2="396" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Boss, gloating -->
    <use href="#boss" x="14" y="128" width="150" height="238"/>

    <!-- Monitor with clanker -->
    <g>
      <rect x="250" y="196" width="140" height="100" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="262" y="208" width="116" height="76" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="280" y="211" width="80" height="72"/>
      <rect x="304" y="296" width="32" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="288" y="304" width="64" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Boss balloon -->
    <g>
      <rect x="118" y="14" width="176" height="72" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M150 84 L138 108 L172 86 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="206" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">A swarm of forty</text>
      <text x="206" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">agents. Shipped the</text>
      <text x="206" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">feature by lunch.</text>
    </g>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="196" y="98" width="198" height="66" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="201" y="103" width="188" height="56" rx="4" fill="none" stroke="#111" stroke-width="1.4"/>
      <path d="M300 164 L302 176 L310 188 L316 200" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="295" y="122" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">All forty reviewed</text>
      <text x="295" y="139" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">each other. Zero</text>
      <text x="295" y="156" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">objections filed.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="416" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="422" y1="300" x2="810" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="422" y1="326" x2="810" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Priya at her laptop, reading the diff -->
    <use href="#priya" x="446" y="132" width="150" height="212"/>

    <!-- Priya's laptop on desk (low, in front of torso; face stays clear) -->
    <g>
      <rect x="466" y="296" width="120" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="482" y="272" width="88" height="26" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2.5"/>
      <line x1="490" y1="280" x2="558" y2="280" stroke="#111" stroke-width="1.6"/>
      <line x1="490" y1="290" x2="546" y2="290" stroke="#111" stroke-width="2.6"/>
    </g>

    <!-- Dailbert, deadpan -->
    <use href="#dailbert" x="650" y="150" width="150" height="212"/>

    <!-- Dailbert balloon -->
    <g>
      <rect x="616" y="14" width="180" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M700 78 L712 100 L724 80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="706" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">Priya, it's already</text>
      <text x="706" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">merged. You can</text>
      <text x="706" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">stop reading.</text>
    </g>

    <!-- Priya balloon -->
    <g>
      <rect x="428" y="96" width="184" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M500 160 L490 182 L520 162 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="520" y="118" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">Line 12 assumes the</text>
      <text x="520" y="136" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">list is never empty.</text>
      <text x="520" y="154" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">It's sometimes empty.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="830" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="836" y1="300" x2="1224" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="836" y1="326" x2="1224" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Boss right, deflating -->
    <use href="#boss" x="1064" y="128" width="150" height="238"/>

    <!-- Priya left, calm -->
    <use href="#priya" x="852" y="132" width="150" height="212"/>

    <!-- Priya's laptop (low, in front of torso) -->
    <g>
      <rect x="874" y="296" width="116" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="890" y="272" width="84" height="26" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2.5"/>
      <line x1="898" y1="280" x2="966" y2="280" stroke="#111" stroke-width="1.6"/>
      <line x1="898" y1="290" x2="954" y2="290" stroke="#111" stroke-width="2.6"/>
    </g>

    <!-- Boss balloon -->
    <g>
      <rect x="960" y="14" width="200" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M1080 78 L1092 100 L1104 80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="1060" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">But forty of them</text>
      <text x="1060" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">looked at it and</text>
      <text x="1060" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" text-anchor="middle">agreed it was fine.</text>
    </g>

    <!-- Priya balloon (the button) -->
    <g>
      <rect x="846" y="96" width="192" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M918 160 L908 182 L938 162 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="942" y="126" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Forty agreeing was</text>
      <text x="942" y="144" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">the bug.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>