<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <!-- hair bun -->
      <path d="M38 40 Q34 14 60 12 Q88 12 84 40 Z" fill="#111"/>
      <circle cx="60" cy="20" r="11" fill="#111"/>
      <!-- head -->
      <ellipse cx="60" cy="48" rx="26" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <!-- hair sides -->
      <path d="M34 42 Q30 22 48 20 Q42 34 44 48 Z" fill="#111"/>
      <path d="M86 42 Q90 22 72 20 Q78 34 76 48 Z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="42" y="44" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="44" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="49" x2="63" y2="49" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="49" r="2" fill="#111"/>
      <circle cx="70" cy="49" r="2" fill="#111"/>
      <!-- calm mouth -->
      <path d="M52 64 Q60 68 68 64" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck + body, rolled sleeves -->
      <rect x="54" y="74" width="12" height="10" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M32 150 Q30 96 60 90 Q90 96 88 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <!-- rolled sleeve cuffs -->
      <path d="M34 118 L30 150 L44 150 L46 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M86 118 L90 150 L76 150 L74 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <line x1="32" y1="118" x2="47" y2="118" stroke="#111" stroke-width="3"/>
      <line x1="88" y1="118" x2="73" y2="118" stroke="#111" stroke-width="3"/>
    </symbol>

    <!-- CLANKER: chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="6" r="4" fill="#111"/>
      <rect x="26" y="20" width="68" height="60" rx="8" fill="#d7d7d2" stroke="#111" stroke-width="3"/>
      <rect x="34" y="34" width="22" height="10" rx="3" fill="#111"/>
      <rect x="64" y="34" width="22" height="10" rx="3" fill="#111"/>
      <rect x="37" y="36" width="7" height="6" rx="1" fill="#bfe3ff"/>
      <rect x="67" y="36" width="7" height="6" rx="1" fill="#bfe3ff"/>
      <line x1="38" y1="60" x2="82" y2="60" stroke="#111" stroke-width="2.5"/>
      <line x1="38" y1="66" x2="82" y2="66" stroke="#111" stroke-width="2.5"/>
      <line x1="46" y1="56" x2="46" y2="70" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="56" x2="60" y2="70" stroke="#111" stroke-width="2.5"/>
      <line x1="74" y1="56" x2="74" y2="70" stroke="#111" stroke-width="2.5"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="c1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- desk -->
      <rect x="0" y="250" width="400" height="90" fill="#eae6dc"/>
      <line x1="0" y1="250" x2="400" y2="250" stroke="#111" stroke-width="2.5"/>
      <!-- Priya at desk -->
      <use href="#priya" x="30" y="120" width="120" height="200"/>
      <!-- monitor with clanker -->
      <rect x="238" y="150" width="140" height="100" rx="6" fill="#111"/>
      <rect x="246" y="158" width="124" height="84" rx="3" fill="#1c1c1c"/>
      <rect x="292" y="250" width="32" height="16" fill="#111"/>
      <rect x="276" y="266" width="64" height="8" rx="2" fill="#111"/>
      <use href="#clanker" x="270" y="168" width="76" height="76"/>

      <!-- Priya balloon -->
      <path d="M96 44 Q96 26 138 26 L206 26 Q226 26 226 44 L226 74 Q226 92 206 92 L150 92 L136 108 L138 92 Q96 92 96 74 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="161" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Find me the Q3</text>
      <text x="161" y="68" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">onboarding doc.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="c2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <rect x="414" y="250" width="400" height="90" fill="#eae6dc"/>
      <line x1="414" y1="250" x2="814" y2="250" stroke="#111" stroke-width="2.5"/>
      <!-- Priya, unimpressed, arms same -->
      <use href="#priya" x="444" y="120" width="120" height="200"/>
      <!-- monitor -->
      <rect x="652" y="150" width="140" height="100" rx="6" fill="#111"/>
      <rect x="660" y="158" width="124" height="84" rx="3" fill="#1c1c1c"/>
      <rect x="706" y="250" width="32" height="16" fill="#111"/>
      <rect x="690" y="266" width="64" height="8" rx="2" fill="#111"/>
      <use href="#clanker" x="684" y="168" width="76" height="76"/>

      <!-- clanker screen-edged balloon, dashed line to surface -->
      <line x1="700" y1="150" x2="678" y2="118" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
      <rect x="470" y="20" width="220" height="96" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="474" y1="24" x2="686" y2="24" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="580" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">4,000 highly relevant</text>
      <text x="580" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">results. None are it.</text>
      <text x="580" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I could just write you</text>
      <text x="580" y="106" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">a new one instead.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="c3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <rect x="828" y="250" width="400" height="90" fill="#eae6dc"/>
      <line x1="828" y1="250" x2="1228" y2="250" stroke="#111" stroke-width="2.5"/>
      <!-- Priya reaching to mouse, calm -->
      <use href="#priya" x="858" y="120" width="120" height="200"/>
      <!-- monitor showing a folder -->
      <rect x="1066" y="150" width="140" height="100" rx="6" fill="#111"/>
      <rect x="1074" y="158" width="124" height="84" rx="3" fill="#f4f1ea"/>
      <rect x="1120" y="250" width="32" height="16" fill="#111"/>
      <rect x="1104" y="266" width="64" height="8" rx="2" fill="#111"/>
      <!-- folder icons on screen -->
      <path d="M1084 176 h18 l4 5 h14 v20 h-36 z" fill="#d7d7d2" stroke="#111" stroke-width="2"/>
      <path d="M1130 176 h18 l4 5 h14 v20 h-36 z" fill="#d7d7d2" stroke="#111" stroke-width="2"/>
      <!-- highlighted file -->
      <rect x="1084" y="210" width="106" height="16" rx="2" fill="#bfe3ff" stroke="#111" stroke-width="2"/>
      <text x="1137" y="222" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#111">Q3_onboarding.doc</text>
      <!-- cursor -->
      <path d="M1148 204 l0 14 l4 -4 l3 6 l3 -1 l-3 -6 l6 0 z" fill="#111"/>

      <!-- Priya small button balloon -->
      <path d="M896 40 Q896 24 936 24 L1016 24 Q1036 24 1036 40 L1036 66 Q1036 82 1016 82 L960 82 L946 98 L948 82 Q896 82 896 66 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="966" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Found it.</text>
      <text x="966" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Two clicks.</text>
    </g>
  </g>
</svg>