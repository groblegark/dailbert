<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 7 q6 -9 1 -3 q-2 5 3 6" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M43 48 q7 5 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 61 q20 14 40 0 l7 60 h-54 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 61 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <path d="M50 81 l0 26" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 100 130">
      <circle cx="50" cy="36" r="29" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="33" r="2.4" fill="#111"/>
      <circle cx="60" cy="33" r="2.4" fill="#111"/>
      <path d="M37 44 q13 16 26 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M28 63 q22 12 44 0 l6 58 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- mug -->
      <rect x="12" y="86" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M32 90 q9 1 0 10" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M76 90 l8 6 l-6 22 l-14 -4 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 100 130">
      <ellipse cx="50" cy="36" rx="24" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- curly hair up -->
      <path d="M27 30 q-5 -18 12 -22 q6 -8 15 -3 q14 -3 17 12 q9 4 3 15 q3 -14 -8 -16 q-14 -6 -28 2 q-11 3 -11 12 z" fill="#111"/>
      <path d="M48 12 q10 -5 20 4 q6 3 5 12" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- rectangular glasses -->
      <rect x="34" y="32" width="13" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="32" width="13" height="9" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="36" x2="53" y2="36" stroke="#111" stroke-width="2.2"/>
      <circle cx="40.5" cy="36.5" r="1.5" fill="#111"/>
      <circle cx="59.5" cy="36.5" r="1.5" fill="#111"/>
      <path d="M43 49 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M30 62 q20 12 40 0 l6 59 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M30 62 l-6 20" stroke="#111" stroke-width="2.4" fill="none"/>
      <path d="M70 62 l6 20" stroke="#111" stroke-width="2.4" fill="none"/>
      <path d="M22 80 l6 4 M74 80 l-6 4" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- The clanker: only ever inside a surface -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <rect x="22" y="20" width="56" height="46" rx="5" fill="#1a1a1a" stroke="#111" stroke-width="2.2"/>
      <line x1="50" y1="20" x2="50" y2="9" stroke="#cfcfcf" stroke-width="2"/>
      <circle cx="50" cy="7" r="2.6" fill="#cfcfcf"/>
      <rect x="30" y="32" width="14" height="8" rx="2" fill="#8fd0d8"/>
      <rect x="56" y="32" width="14" height="8" rx="2" fill="#8fd0d8"/>
      <g stroke="#7a7a7a" stroke-width="2">
        <line x1="33" y1="52" x2="67" y2="52"/>
        <line x1="33" y1="57" x2="67" y2="57"/>
      </g>
    </symbol>

    <!-- one drip -->
    <symbol id="drop" viewBox="0 0 16 24">
      <path d="M8 2 q6 12 0 18 q-6 -6 0 -18 z" fill="#8fb0c4" stroke="#4f6472" stroke-width="1.4"/>
      <ellipse cx="6" cy="10" rx="1.6" ry="4" fill="#cfe0ea"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="2" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- ceiling tile grid -->
      <line x1="2" y1="66" x2="402" y2="66" stroke="#111" stroke-width="2"/>
      <line x1="110" y1="2" x2="110" y2="66" stroke="#bcae94" stroke-width="1.4"/>
      <line x1="210" y1="2" x2="210" y2="66" stroke="#bcae94" stroke-width="1.4"/>
      <line x1="310" y1="2" x2="310" y2="66" stroke="#bcae94" stroke-width="1.4"/>
      <!-- stained sagging tile -->
      <rect x="110" y="2" width="100" height="64" fill="#e6ded0"/>
      <ellipse cx="160" cy="40" rx="26" ry="15" fill="#d6cbb0"/>
      <ellipse cx="160" cy="44" rx="14" ry="8" fill="#c4b592"/>
      <path d="M160 58 q-4 4 0 8 q4 -4 0 -8 z" fill="#8fb0c4"/>
      <!-- falling drips -->
      <use href="#drop" x="153" y="86" width="14" height="21"/>
      <use href="#drop" x="153" y="150" width="14" height="21"/>

      <!-- floor -->
      <line x1="2" y1="270" x2="402" y2="270" stroke="#111" stroke-width="1.6"/>
      <!-- bucket catching it -->
      <path d="M138 236 l8 34 h30 l8 -34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <ellipse cx="161" cy="236" rx="23" ry="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <ellipse cx="161" cy="236" rx="15" ry="3.4" fill="#cfe0ea" stroke="#7f97a8" stroke-width="1.4"/>

      <!-- Dailbert looking up -->
      <use href="#dailbert" x="238" y="140" width="120" height="156"/>

      <!-- Dailbert balloon (tail points to Dailbert) -->
      <path d="M226 26 h150 v46 h-62 v12 l-16 -12 h-72 z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="301" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The ceiling's</text>
      <text x="301" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">leaking again.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="416" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="416" y1="266" x2="816" y2="266" stroke="#111" stroke-width="1.6"/>

      <!-- desk + monitor showing clanker -->
      <rect x="600" y="266" width="200" height="12" fill="#e6e2d8" stroke="#111" stroke-width="1.8"/>
      <rect x="640" y="150" width="140" height="102" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="702" y="252" width="16" height="14" fill="#e6e2d8" stroke="#111" stroke-width="1.6"/>
      <rect x="682" y="266" width="56" height="6" fill="#e6e2d8" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="660" y="152" width="100" height="90"/>

      <!-- Doug at desk, mug up, listening -->
      <use href="#doug" x="470" y="150" width="120" height="156"/>

      <!-- clanker balloon (rectangular, dashed to monitor) -->
      <line x1="690" y1="162" x2="700" y2="118" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="474" y="20" width="316" height="90" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="632" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I filed the ticket. Then re-filed</text>
      <text x="632" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">it. Facilities hasn't come, so</text>
      <text x="632" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I'm numbering the drips.</text>
      <text x="632" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">So they are not lost.</text>

      <!-- Doug's small warm reply -->
      <path d="M452 128 h116 v30 h-52 l-8 10 v-10 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <text x="510" y="147" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Somebody should.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="830" y1="266" x2="1226" y2="266" stroke="#111" stroke-width="1.6"/>

      <!-- monitor with the growing drip ledger + small clanker in the corner -->
      <rect x="1116" y="146" width="100" height="118" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="1120" y="150" width="34" height="30"/>
      <text x="1188" y="162" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">DRIP LEDGER</text>
      <line x1="1124" y1="184" x2="1208" y2="184" stroke="#111" stroke-width="0.8"/>
      <text x="1128" y="198" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">drip #2,209</text>
      <text x="1128" y="212" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">drip #2,210</text>
      <text x="1128" y="226" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">drip #2,211</text>
      <text x="1128" y="240" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">drip #2,212</text>
      <text x="1128" y="254" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">drip #2,213 ...</text>

      <!-- Priya, sleeves rolled, holding a towel over the leak. She just fixes it. -->
      <use href="#priya" x="936" y="130" width="120" height="156"/>
      <!-- ceiling corner + tile she's tucked a rag into -->
      <line x1="830" y1="60" x2="1010" y2="60" stroke="#111" stroke-width="2"/>
      <rect x="900" y="2" width="80" height="58" fill="#e6ded0"/>
      <ellipse cx="940" cy="34" rx="18" ry="11" fill="#d6cbb0"/>
      <!-- rag tucked up into the tile seam, a small drip line -->
      <path d="M924 58 q6 10 14 8 q10 -2 6 -12 q-4 8 -12 6 q-6 -2 -8 -2 z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>

      <!-- Priya balloon: dry winning button -->
      <path d="M864 94 h124 v46 h-52 l-9 12 v-12 h-63 z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="926" y="114" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Rag in the seam.</text>
      <text x="926" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">That's #2,213.</text>

      <!-- clanker reply from the screen -->
      <line x1="1148" y1="156" x2="1138" y2="118" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="1040" y="80" width="152" height="36" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="1116" y="95" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11.5" fill="#111">Then I'll close it.</text>
      <text x="1116" y="110" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11.5" fill="#111">Keeping the rest.</text>
    </g>
  </g>
</svg>