    <!-- monitor -->
    <g>
      <rect x="244" y="120" width="118" height="90" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="4"/>
      <g stroke="#bcb8ad" stroke-width="1.5">
        <line x1="254" y1="200" x2="352" y2="130"/>
        <line x1="254" y1="182" x2="328" y2="130"/>
