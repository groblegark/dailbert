      <rect x="296" y="210" width="14" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="278" y="228" width="50" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    </g>

    <use href="#priya" x="112" y="182"/>

    <!-- priya balloon -->
    <path d="M30 16 h214 a12 12 0 0 1 12 12 v34 a12 12 0 0 1 -12 12 h-118 l-12 15 l-4 -15 h-68 a12 12 0 0 1 -12 -12 v-34 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="137" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I made one form.</text>
    <text x="137" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It approves itself.</text>

    <!-- clanker button balloon (screen-edged) + dashed link -->
    <line x1="303" y1="210" x2="322" y2="232" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="250" y="232" width="132" height="52" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="255" y="237" width="122" height="42" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="316" y="255" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It approved</text>
    <text x="316" y="272" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">that too.</text>
