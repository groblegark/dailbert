        <line x1="256" y1="180" x2="330" y2="128"/>
        <line x1="278" y1="200" x2="354" y2="150"/>
      </g>
      <use href="#clanker" x="305" y="166"/>
      <rect x="298" y="210" width="14" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="280" y="228" width="50" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    </g>

    <use href="#dailbert" x="96" y="182"/>
    <use href="#doug" x="176" y="176"/>

    <!-- clanker balloon (screen-edged) + dashed link -->
    <line x1="235" y1="90" x2="278" y2="128" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="28" y="18" width="212" height="74" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="34" y="24" width="200" height="62" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="134" y="44" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I filled out the form</text>
    <text x="134" y="62" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">for you.</text>
    <text x="134" y="80" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">All four thousand.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#111" stroke-width="1.5"/>

