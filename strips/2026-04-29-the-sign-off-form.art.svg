  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#111" stroke-width="1.5"/>

    <!-- easel board -->
    <g>
      <rect x="26" y="130" width="98" height="86" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="45" y1="216" x2="34" y2="290" stroke="#111" stroke-width="2.5"/>
      <line x1="105" y1="216" x2="116" y2="290" stroke="#111" stroke-width="2.5"/>
      <text x="75" y="153" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">APPROVAL</text>
      <text x="75" y="171" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">FORM</text>
      <rect x="52" y="182" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M54 188 l3 4 6 -8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="193" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12" fill="#111">v1.4</text>
    </g>

    <use href="#boss" x="222" y="152"/>
    <use href="#dailbert" x="338" y="188"/>

    <!-- boss balloon -->
    <path d="M108 20 h198 a14 14 0 0 1 14 14 v42 a14 14 0 0 1 -14 14 h-88 l-10 16 l-6 -16 h-94 a14 14 0 0 1 -14 -14 v-42 a14 14 0 0 1 14 -14 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="208" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">New process. Nothing</text>
    <text x="208" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">ships without a</text>
    <text x="208" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">sign-off form.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#111" stroke-width="1.5"/>

    <!-- desk -->
    <rect x="30" y="252" width="352" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- monitor -->
    <g>
      <rect x="246" y="118" width="118" height="92" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="4"/>
      <g stroke="#bcb8ad" stroke-width="1.5">
