  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- PANEL 1 : the switch is flipped -->
    <g>
      <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <use href="#set"/>
      <line x1="48" y1="126" x2="48" y2="116.5" stroke="#111" stroke-width="2"/>
      <line x1="48" y1="126" x2="40" y2="126" stroke="#111" stroke-width="2"/>
