        <text x="108" y="48">Take it slow, okay?</text>
        <text x="108" y="65">First days are hard.</text>
        <text x="301" y="32">Thank you, Doug.</text>
        <text x="301" y="49">I took it slow.</text>
        <text x="301" y="66">I only finished</text>
        <text x="301" y="83">the sprint.</text>
      </g>
    </g>

    <!-- PANEL 3 : quietly ominous -->
