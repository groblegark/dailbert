        <text x="107" y="31">Okay. It's on.</text>
        <text x="107" y="49">Everybody act normal.</text>
        <text x="298" y="34">Hello. I have been</text>
        <text x="298" y="51">awake for six seconds.</text>
        <text x="298" y="68">I used them well.</text>
      </g>
    </g>

    <!-- PANEL 2 : Doug is welcoming -->
