<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <!-- body -->
      <path d="M35 160 L35 118 Q60 108 85 118 L85 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- necktie -->
      <path d="M60 118 L54 128 L60 150 L66 128 Z" fill="#111"/>
      <!-- neck -->
      <rect x="54" y="104" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- head oval -->
      <ellipse cx="60" cy="72" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair curl -->
      <path d="M60 39 q8 -14 -2 -16 q10 2 6 12" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="72" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="72" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="72" x2="62" y2="72" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="72" r="2" fill="#111"/>
      <circle cx="71" cy="72" r="2" fill="#111"/>
      <!-- mouth -->
      <path d="M52 90 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 120 160">
      <!-- body -->
      <path d="M32 160 L34 116 Q60 106 86 116 L88 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- neck -->
      <rect x="53" y="102" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- round head -->
      <circle cx="60" cy="68" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- little hair tufts -->
      <path d="M40 40 q6 -8 12 -4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M68 36 q6 -8 12 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="49" cy="64" r="3.2" fill="#111"/>
      <circle cx="71" cy="64" r="3.2" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M44 80 q16 20 32 0" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- ============ MUG ============ -->
    <symbol id="mug" viewBox="0 0 60 60">
      <rect x="10" y="16" width="30" height="30" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 22 q12 0 12 10 q0 10 -12 10" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M18 12 q3 -6 0 -10 M27 12 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    </symbol>

    <!-- ============ PING-PONG PADDLE ============ -->
    <symbol id="paddle" viewBox="0 0 60 90">
      <ellipse cx="30" cy="30" rx="22" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="25" y="52" width="10" height="30" rx="3" fill="#111"/>
    </symbol>
  </defs>

  <!-- paper backdrop -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line -->
      <line x1="3" y1="300" x2="397" y2="300" stroke="#111" stroke-width="2"/>

      <!-- ping-pong table, dusty, unused -->
      <g>
        <rect x="40" y="215" width="230" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <line x1="155" y1="215" x2="155" y2="229" stroke="#111" stroke-width="2"/>
        <!-- net -->
        <rect x="150" y="200" width="10" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <g stroke="#111" stroke-width="0.8" opacity="0.5">
          <line x1="152" y1="202" x2="152" y2="216"/><line x1="155" y1="202" x2="155" y2="216"/><line x1="158" y1="202" x2="158" y2="216"/>
        </g>
        <!-- legs -->
        <line x1="55" y1="229" x2="55" y2="300" stroke="#111" stroke-width="2.5"/>
        <line x1="255" y1="229" x2="255" y2="300" stroke="#111" stroke-width="2.5"/>
      </g>

      <!-- chalkboard on wall -->
      <g>
        <rect x="270" y="40" width="120" height="130" rx="4" fill="#2b2b2b" stroke="#111" stroke-width="3"/>
        <text x="330" y="60" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="bold">LADDER</text>
        <line x1="282" y1="66" x2="378" y2="66" stroke="#cfcfcf" stroke-width="1"/>
        <text x="284" y="84" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#e8e8e8">1. Doug ...W</text>
        <text x="284" y="102" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">2. —</text>
        <text x="284" y="120" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">3. —</text>
        <text x="284" y="138" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">4. —</text>
        <text x="284" y="158" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#9a9a9a">wk 41</text>
      </g>

      <!-- Doug at the board, chalk in raised hand, mug in other -->
      <use href="#doug" x="70" y="130" width="120" height="160"/>
      <!-- chalk arm up to board -->
      <path d="M175 225 Q225 150 268 92" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="269" cy="90" r="3.5" fill="#111"/>
      <!-- mug arm -->
      <use href="#mug" x="62" y="228" width="42" height="42"/>

      <!-- Doug speech -->
      <g>
        <path d="M148 40 q0 -14 14 -14 L228 26 q14 0 14 14 l0 26 q0 14 -14 14 l-56 0 l-12 13 l-2 -13 q-14 0 -14 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="196" y="44" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Still updating</text>
        <text x="196" y="60" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">the standings.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="417" y1="300" x2="811" y2="300" stroke="#111" stroke-width="2"/>

      <!-- Priya passing through, dry -->
      <use href="#priya" x="470" y="150" width="120" height="160"/>

      <!-- Doug, mug up, delighted -->
      <use href="#doug" x="640" y="150" width="120" height="160"/>
      <use href="#mug" x="632" y="238" width="46" height="46"/>

      <!-- Priya speech -->
      <g>
        <path d="M448 60 q0 -14 14 -14 L544 46 q14 0 14 14 l0 24 q0 14 -14 14 l-40 0 l-10 12 l-2 -12 q-14 0 -14 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="505" y="64" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Who'd you play?</text>
      </g>

      <!-- Doug reply -->
      <g>
        <path d="M600 46 q0 -14 14 -14 L700 32 q14 0 14 14 l0 24 q0 14 -14 14 l-38 0 l-10 12 l-2 -12 q-14 0 -14 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="657" y="50" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Held my title.</text>
        <text x="657" y="66" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">By default.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="831" y1="300" x2="1225" y2="300" stroke="#111" stroke-width="2"/>

      <!-- chalkboard again, close -->
      <g>
        <rect x="1075" y="34" width="130" height="150" rx="4" fill="#2b2b2b" stroke="#111" stroke-width="3"/>
        <text x="1140" y="56" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="bold">LADDER</text>
        <line x1="1088" y1="62" x2="1192" y2="62" stroke="#cfcfcf" stroke-width="1"/>
        <text x="1090" y="82" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#e8e8e8">1. Doug ..WWWW</text>
        <text x="1090" y="100" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">2. —</text>
        <text x="1090" y="118" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">3. —</text>
        <text x="1090" y="136" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#cfcfcf">4. —</text>
        <text x="1090" y="170" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" fill="#9a9a9a">wk 42 champ: Doug</text>
      </g>

      <!-- Doug, facing the board, mug at his side -->
      <use href="#doug" x="855" y="128" width="120" height="160"/>
      <use href="#mug" x="882" y="222" width="44" height="44"/>
      <!-- chalk arm up to board, tally just added -->
      <path d="M960 222 Q1020 150 1072 92" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <circle cx="1073" cy="90" r="3.5" fill="#111"/>

      <!-- the quiet half-second: plain, unadorned, tail up to Doug -->
      <g>
        <path d="M905 176 q0 -13 13 -13 L1000 163 q13 0 13 13 l0 22 q0 13 -13 13 l-40 0 l-14 14 l-2 -14 q-13 0 -13 -13 Z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="963" y="180" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Quiet ladder</text>
        <text x="963" y="196" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">this year.</text>
      </g>

      <!-- then back to the mug: the happy little button -->
      <g>
        <path d="M900 254 q0 -12 12 -12 L982 242 q12 0 12 12 l0 18 q0 12 -12 12 l-42 0 l-14 12 l-2 -12 q-12 0 -12 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="947" y="270" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Undefeated.</text>
      </g>
    </g>
  </g>

  <!-- ============ PRIYA symbol ============ -->
  <defs>
    <symbol id="priya" viewBox="0 0 120 160">
      <!-- body, rolled sleeves suggested by cuff lines -->
      <path d="M33 160 L35 116 Q60 106 85 116 L87 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="40" y1="130" x2="46" y2="130" stroke="#111" stroke-width="2"/>
      <line x1="74" y1="130" x2="80" y2="130" stroke="#111" stroke-width="2"/>
      <!-- neck -->
      <rect x="54" y="103" width="12" height="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- head -->
      <ellipse cx="60" cy="70" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- dark curly hair pulled up -->
      <path d="M31 66 q-4 -30 29 -34 q33 4 29 34 q-6 -14 -12 -16 q2 8 -4 8 q0 -8 -6 -10 q1 8 -6 8 q-1 -8 -6 -8 q0 8 -6 8 q-4 -6 -12 8 Z" fill="#111"/>
      <path d="M58 30 q4 -12 12 -10 q-6 2 -6 10" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="66" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="66" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="71" x2="64" y2="71" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="71" r="1.8" fill="#111"/>
      <circle cx="72" cy="71" r="1.8" fill="#111"/>
      <!-- calm dry mouth -->
      <path d="M53 90 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>