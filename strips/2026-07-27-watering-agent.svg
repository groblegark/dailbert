<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Watering Agent</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -10 4 -18 q10 6 3 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="45" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="45" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="45" x2="63" y2="45" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="45" r="1.7" fill="#111"/>
      <circle cx="71" cy="45" r="1.7" fill="#111"/>
      <path d="M52 62 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 78 q20 14 40 0 l10 40 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 80 l-7 12 l7 8 l7 -8 z" fill="#111"/>
      <rect x="57" y="100" width="6" height="20" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 160">
      <circle cx="60" cy="46" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="42" r="2.6" fill="#111"/>
      <circle cx="71" cy="42" r="2.6" fill="#111"/>
      <path d="M45 54 q15 20 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 80 q22 14 44 0 l9 40 q-31 12 -62 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M30 40 q-4 -30 30 -32 q34 2 30 32 q-6 -10 -16 -12 q4 8 -4 10 q-4 -8 -12 -8 q-6 6 -12 4 q2 8 -6 6 z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 40 q-4 -30 30 -32 q34 2 30 32 q-6 -10 -16 -12 q4 8 -4 10 q-4 -8 -12 -8 q-6 6 -12 4 q2 8 -6 6 z" fill="#111"/>
      <rect x="40" y="42" width="17" height="13" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <rect x="63" y="42" width="17" height="13" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <line x1="57" y1="48" x2="63" y2="48" stroke="#111" stroke-width="2.3"/>
      <circle cx="48.5" cy="48.5" r="1.7" fill="#111"/>
      <circle cx="71.5" cy="48.5" r="1.7" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.3" stroke-linecap="round"/>
      <path d="M40 82 q20 12 40 0 l9 38 q-29 12 -58 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, slot eyes, grille, antenna (drawn INSIDE a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="24" y="30" width="72" height="62" rx="8" fill="#2a2f35" stroke="#8fa0ad" stroke-width="2.4"/>
      <line x1="60" y1="30" x2="60" y2="14" stroke="#8fa0ad" stroke-width="2.4"/>
      <circle cx="60" cy="11" r="4" fill="#bfe9d0"/>
      <rect x="34" y="46" width="20" height="9" rx="3" fill="#bfe9d0"/>
      <rect x="66" y="46" width="20" height="9" rx="3" fill="#bfe9d0"/>
      <g stroke="#8fa0ad" stroke-width="2.2">
        <line x1="40" y1="72" x2="80" y2="72"/>
        <line x1="40" y1="78" x2="80" y2="78"/>
        <line x1="46" y1="68" x2="46" y2="82"/>
        <line x1="54" y1="68" x2="54" y2="82"/>
        <line x1="62" y1="68" x2="62" y2="82"/>
        <line x1="70" y1="68" x2="70" y2="82"/>
      </g>
    </symbol>

    <!-- DESK PLANT (sad / drooping) -->
    <symbol id="plantsad" viewBox="0 0 90 110">
      <path d="M30 70 l6 34 h18 l6 -34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="45" y1="70" x2="45" y2="40" stroke="#111" stroke-width="2.4"/>
      <path d="M45 46 q-18 -6 -26 8" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 40 q-4 -14 -18 -14" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 44 q16 -6 24 6" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 40 q6 -12 20 -10" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- DESK PLANT (drowned / overwatered, puddle) -->
    <symbol id="plantwet" viewBox="0 0 90 120">
      <path d="M30 70 l6 34 h18 l6 -34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="45" y1="70" x2="45" y2="44" stroke="#111" stroke-width="2.4"/>
      <path d="M45 50 q-16 12 -24 4" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 46 q-6 14 -20 12" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 50 q14 12 22 4" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M45 46 q6 14 18 12" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- drips -->
      <path d="M36 104 q-8 6 0 10" fill="none" stroke="#8fa0ad" stroke-width="2"/>
      <path d="M54 104 q8 6 0 10" fill="none" stroke="#8fa0ad" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANEL BACKGROUNDS ================= -->
  <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  <rect x="828" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

  <!-- =================================================================
       PANEL 1 — Dailbert proudly shows his watering agent to Doug
  ================================================================== -->
  <g>
    <!-- desk / floor line -->
    <line x1="10" y1="300" x2="392" y2="300" stroke="#111" stroke-width="2"/>
    <!-- desk with monitor -->
    <rect x="24" y="222" width="150" height="12" fill="#111"/>
    <rect x="34" y="234" width="10" height="66" fill="#111"/>
    <rect x="154" y="234" width="10" height="66" fill="#111"/>
    <!-- monitor on desk (clanker surface) -->
    <rect x="60" y="150" width="98" height="70" rx="5" fill="#2a2f35" stroke="#111" stroke-width="2.4"/>
    <rect x="66" y="156" width="86" height="58" rx="3" fill="#20252b"/>
    <use href="#clanker" x="72" y="150" width="74" height="74"/>
    <rect x="98" y="220" width="22" height="10" fill="#111"/>
    <rect x="86" y="230" width="46" height="6" fill="#111"/>

    <!-- sad plant on the desk -->
    <use href="#plantsad" x="164" y="140" width="70" height="86"/>

    <!-- Dailbert -->
    <use href="#dailbert" x="238" y="150" width="110" height="150"/>
    <!-- Doug peeking with mug -->
    <use href="#doug" x="316" y="170" width="96" height="130"/>
    <ellipse cx="372" cy="252" rx="12" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <path d="M384 246 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>

    <!-- Dailbert balloon -->
    <path d="M118 40 h150 q10 0 10 10 v40 q0 10 -10 10 h-70 l-14 16 l2 -16 h-68 q-10 0 -10 -10 v-40 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="193" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I built an agent to</text>
    <text x="193" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">water the plant when</text>
    <text x="193" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">the soil gets dry.</text>
  </g>

  <!-- =================================================================
       PANEL 2 — the clanker (in monitor) reports; plant now drowned
  ================================================================== -->
  <g>
    <line x1="424" y1="300" x2="806" y2="300" stroke="#111" stroke-width="2"/>
    <!-- desk -->
    <rect x="440" y="222" width="150" height="12" fill="#111"/>
    <rect x="450" y="234" width="10" height="66" fill="#111"/>
    <rect x="570" y="234" width="10" height="66" fill="#111"/>
    <!-- monitor (clanker surface) -->
    <rect x="476" y="150" width="98" height="70" rx="5" fill="#2a2f35" stroke="#111" stroke-width="2.4"/>
    <rect x="482" y="156" width="86" height="58" rx="3" fill="#20252b"/>
    <use href="#clanker" x="488" y="150" width="74" height="74"/>
    <rect x="514" y="220" width="22" height="10" fill="#111"/>
    <rect x="502" y="230" width="46" height="6" fill="#111"/>

    <!-- drowned plant + puddle -->
    <use href="#plantwet" x="580" y="132" width="70" height="94"/>
    <ellipse cx="612" cy="228" rx="34" ry="7" fill="#8fa0ad" opacity="0.5"/>

    <!-- Doug leaning in, mug -->
    <use href="#doug" x="676" y="168" width="98" height="132"/>
    <ellipse cx="734" cy="250" rx="12" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <path d="M746 244 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>

    <!-- clanker screen-edged balloon + dashed line back to monitor surface -->
    <path d="M470 40 h176 v66 h-176 z" fill="#eef1f4" stroke="#111" stroke-width="2"/>
    <line x1="470" y1="112" x2="525" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="5 5"/>
    <text x="558" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">The soil never got dry</text>
    <text x="558" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">once. Perfect record.</text>
    <text x="558" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Six hundred waterings.</text>
  </g>

  <!-- =================================================================
       PANEL 3 — Priya, dry win: reads the metric
  ================================================================== -->
  <g>
    <line x1="838" y1="300" x2="1220" y2="300" stroke="#111" stroke-width="2"/>
    <!-- desk -->
    <rect x="854" y="222" width="150" height="12" fill="#111"/>
    <rect x="864" y="234" width="10" height="66" fill="#111"/>
    <rect x="984" y="234" width="10" height="66" fill="#111"/>
    <!-- monitor (clanker surface, dashed line target) -->
    <rect x="890" y="150" width="98" height="70" rx="5" fill="#2a2f35" stroke="#111" stroke-width="2.4"/>
    <rect x="896" y="156" width="86" height="58" rx="3" fill="#20252b"/>
    <use href="#clanker" x="902" y="150" width="74" height="74"/>
    <rect x="928" y="220" width="22" height="10" fill="#111"/>
    <rect x="916" y="230" width="46" height="6" fill="#111"/>

    <!-- drowned plant still there -->
    <use href="#plantwet" x="992" y="132" width="66" height="94"/>
    <ellipse cx="1022" cy="228" rx="30" ry="6" fill="#8fa0ad" opacity="0.5"/>

    <!-- Priya, dry and in control -->
    <use href="#priya" x="1058" y="150" width="110" height="150"/>

    <!-- Priya balloon (human, rounded, tail) -->
    <path d="M846 38 h150 q10 0 10 10 v42 q0 10 -10 10 h-58 l-14 16 l2 -16 h-80 q-10 0 -10 -10 v-42 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="921" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">You measured the</text>
    <text x="921" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">wrong plant.</text>
    <text x="921" y="94" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">That one's plastic.</text>

    <!-- small clanker reply from monitor -->
    <path d="M1010 250 h150 v42 h-150 z" fill="#eef1f4" stroke="#111" stroke-width="2"/>
    <line x1="1010" y1="256" x2="978" y2="216" stroke="#111" stroke-width="1.6" stroke-dasharray="5 5"/>
    <text x="1085" y="268" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">It was thriving,</text>
    <text x="1085" y="284" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">though.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>