      <ellipse cx="50" cy="36" rx="23" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M28 30 q-3 -18 12 -22 q6 -8 12 -3 q14 -3 18 12 q4 6 0 14 q-6 -12 -14 -12 q-14 -4 -28 11 z" fill="#111"/>
