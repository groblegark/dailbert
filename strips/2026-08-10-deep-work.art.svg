      <line x1="50" y1="26" x2="50" y2="14" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="12" r="3" fill="#bfe3e0"/>
      <rect x="32" y="38" width="14" height="6" rx="2" fill="#bfe3e0"/>
      <rect x="54" y="38" width="14" height="6" rx="2" fill="#bfe3e0"/>
      <line x1="36" y1="58" x2="64" y2="58" stroke="#8fb8b5" stroke-width="2"/>
      <line x1="40" y1="53" x2="40" y2="63" stroke="#8fb8b5" stroke-width="1.6"/>
      <line x1="50" y1="53" x2="50" y2="63" stroke="#8fb8b5" stroke-width="1.6"/>
      <line x1="60" y1="53" x2="60" y2="63" stroke="#8fb8b5" stroke-width="1.6"/>
