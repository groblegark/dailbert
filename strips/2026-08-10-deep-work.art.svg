  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="300" x2="399" y2="300" stroke="#111" stroke-width="2"/>
      <rect x="238" y="128" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="248" y="138" width="130" height="92" rx="3" fill="#2a2a2a"/>
      <use href="#clanker" x="268" y="128" width="90" height="90"/>
      <rect x="298" y="240" width="30" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="276" y="256" width="74" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#dailbert" x="46" y="158" width="120" height="156"/>
      <path d="M28 34 q0 -18 20 -18 l150 0 q20 0 20 18 l0 40 q0 18 -20 18 l-118 0 l-14 16 l2 -16 l-20 0 q-20 0 -20 -18 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="128" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Block off my whole day.</text>
      <text x="128" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">I need to focus.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="300" x2="813" y2="300" stroke="#111" stroke-width="2"/>
      <rect x="470" y="156" width="150" height="112" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="480" y="166" width="130" height="92" rx="3" fill="#2a2a2a"/>
      <use href="#clanker" x="500" y="156" width="90" height="90"/>
      <rect x="530" y="268" width="30" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="508" y="284" width="74" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#dailbert" x="646" y="176" width="130" height="169"/>
      <path d="M446 30 h236 v80 h-152 l-14 15 l3 -15 h-73 z" fill="#eef0ef" stroke="#111" stroke-width="2.2"/>
      <line x1="536" y1="125" x2="542" y2="156" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="564" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Done. I declined your</text>
      <text x="564" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">meetings for you.</text>
      <text x="564" y="94" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">All of them. Forever.</text>
      <path d="M596 168 q0 -14 16 -14 l150 0 q16 0 16 14 l0 6 q0 14 -16 14 l-70 0 l-12 12 l2 -12 l-68 0 q-16 0 -16 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="688" y="178" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">The recurring ones too?</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#priya" x="1034" y="158" width="130" height="169"/>
      <use href="#doug" x="858" y="176" width="140" height="165"/>
      <path d="M900 30 q0 -16 18 -16 l152 0 q18 0 18 16 l0 46 q0 16 -18 16 l-92 0 l-14 15 l2 -15 l-48 0 q-18 0 -18 -16 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="994" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Keep 'Chips' though.</text>
      <text x="994" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">That one's load-</text>
      <text x="994" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">bearing.</text>
      <path d="M838 122 q0 -14 16 -14 l108 0 q16 0 16 14 l0 24 q0 14 -16 14 l-44 0 l-12 13 l2 -13 l-54 0 q-16 0 -16 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="908" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It's the only meeting</text>
      <text x="908" y="148" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I like.</text>
    </g>
