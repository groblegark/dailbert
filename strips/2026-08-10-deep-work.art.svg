      <rect x="70" y="92" width="20" height="17" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M90 96 q8 0 8 5 q0 5 -8 5" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M75 90 q3 -5 6 0" fill="none" stroke="#111" stroke-width="1.6"/>
