      <line x1="47" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="34" r="1.8" fill="#111"/>
      <circle cx="59" cy="34" r="1.8" fill="#111"/>
      <path d="M42 50 q8 4 15 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
