<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="p1"><rect x="2" y="6" width="398" height="328" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="416" y="6" width="398" height="328" rx="3"/></clipPath>
    <clipPath id="p3"><rect x="830" y="6" width="398" height="328" rx="3"/></clipPath>

    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 190">
      <path d="M30 190 V150 Q30 120 60 118 Q90 120 90 150 V190 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="104" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 118 l-6 8 l6 26 l6 -26 z" fill="#111"/>
      <ellipse cx="60" cy="62" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 28 q11 -12 2 -19" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="60" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="60" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="60" x2="62" y2="60" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="60" r="2.2" fill="#111"/>
      <circle cx="71" cy="60" r="2.2" fill="#111"/>
      <path d="M52 80 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 130 190">
      <path d="M32 190 V150 Q32 122 65 120 Q98 122 98 150 V190 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="57" y="106" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="65" cy="66" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M46 40 q6 -8 12 -4 M60 34 q6 -8 12 -4 M74 40 q6 -6 10 -2" fill="none" stroke="#111" stroke-width="2.2"/>
      <circle cx="55" cy="62" r="3" fill="#111"/>
      <circle cx="75" cy="62" r="3" fill="#111"/>
      <path d="M50 76 q15 16 30 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 190">
      <path d="M28 190 V150 Q28 120 58 118 Q88 120 88 150 V190 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="50" y="104" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 62 q0 -42 32 -46 q32 4 32 46 q-6 -14 -16 -16 q-16 -5 -32 0 q-10 2 -16 16 z" fill="#111"/>
      <ellipse cx="58" cy="60" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="58" cy="15" r="10" fill="#111"/>
      <path d="M32 48 q4 -16 26 -18 q22 2 26 18 q-10 -8 -26 -8 q-16 0 -26 8 z" fill="#111"/>
      <rect x="40" y="53" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="60" y="53" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="58" x2="60" y2="58" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="59" r="2.2" fill="#111"/>
      <circle cx="68" cy="59" r="2.2" fill="#111"/>
      <path d="M50 78 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 190">
      <path d="M28 190 V150 Q28 120 58 118 Q88 120 88 150 V190 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="50" y="104" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M58 120 l-15 11 l11 6 z M58 120 l15 11 l-11 6 z" fill="#111"/>
      <path d="M58 120 l-4 6 l4 20 l4 -20 z" fill="#111"/>
      <ellipse cx="58" cy="66" rx="27" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 42 L36 2 L53 36 Z" fill="#111"/>
      <path d="M74 42 L80 2 L63 36 Z" fill="#111"/>
      <circle cx="50" cy="64" r="1.9" fill="#111"/>
      <circle cx="66" cy="64" r="1.9" fill="#111"/>
      <path d="M50 80 q8 3 16 0" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== CLANKER ===== -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="24" x2="50" y2="10" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="8" r="3" fill="#111"/>
      <rect x="20" y="24" width="60" height="52" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="30" y="38" width="16" height="6" rx="3" fill="#111"/>
      <rect x="54" y="38" width="16" height="6" rx="3" fill="#111"/>
      <line x1="34" y1="60" x2="66" y2="60" stroke="#111" stroke-width="2"/>
      <line x1="38" y1="55" x2="38" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="46" y1="55" x2="46" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="55" x2="54" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="62" y1="55" x2="62" y2="65" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 : the all-hands ============ -->
  <g clip-path="url(#p1)">
    <rect x="2" y="6" width="398" height="328" fill="#f4f1ea"/>
    <!-- easel -->
    <line x1="86" y1="300" x2="70" y2="118" stroke="#111" stroke-width="2.5"/>
    <line x1="150" y1="300" x2="150" y2="118" stroke="#111" stroke-width="2.5"/>
    <rect x="58" y="112" width="108" height="132" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <line x1="66" y1="150" x2="158" y2="150" stroke="#111" stroke-width="1.4"/>
    <text x="112" y="140" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">PROCESS</text>
    <line x1="70" y1="170" x2="150" y2="170" stroke="#111" stroke-width="1.2"/>
    <line x1="70" y1="184" x2="150" y2="184" stroke="#111" stroke-width="1.2"/>
    <line x1="70" y1="198" x2="134" y2="198" stroke="#111" stroke-width="1.2"/>
    <line x1="70" y1="212" x2="150" y2="212" stroke="#111" stroke-width="1.2"/>
    <line x1="70" y1="226" x2="120" y2="226" stroke="#111" stroke-width="1.2"/>
    <!-- floor -->
    <line x1="2" y1="300" x2="400" y2="300" stroke="#111" stroke-width="1.6"/>
    <!-- boss presenting -->
    <use href="#boss" x="196" y="112" width="120" height="190"/>
    <!-- boss pointing arm -->
    <path d="M226 165 q-24 -6 -46 -30" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- audience backs -->
    <path d="M84 330 v-30 q0 -18 26 -18 q26 0 26 18 v30 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <circle cx="110" cy="284" r="17" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M296 330 v-30 q0 -18 26 -18 q26 0 26 18 v30 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <circle cx="322" cy="284" r="17" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- boss balloon -->
    <path d="M262 96 l-6 22 l22 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="270" cy="56" rx="98" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="270" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">New policy: every</text>
    <text x="270" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">report needs a</text>
    <text x="270" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">signed form first.</text>
  </g>

  <!-- ============ PANEL 2 : the clanker over-helps ============ -->
  <g clip-path="url(#p2)">
    <rect x="416" y="6" width="398" height="328" fill="#f4f1ea"/>
    <!-- desk -->
    <rect x="416" y="256" width="398" height="78" fill="#f4f1ea"/>
    <line x1="424" y1="256" x2="806" y2="256" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert behind desk -->
    <use href="#dailbert" x="452" y="112" width="120" height="190"/>
    <!-- stack of forms -->
    <g>
      <rect x="500" y="238" width="70" height="16" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <rect x="505" y="224" width="70" height="16" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <rect x="499" y="210" width="70" height="16" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <rect x="507" y="196" width="70" height="16" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <line x1="512" y1="204" x2="560" y2="204" stroke="#111" stroke-width="1"/>
      <line x1="510" y1="218" x2="558" y2="218" stroke="#111" stroke-width="1"/>
    </g>
    <!-- monitor -->
    <rect x="682" y="248" width="46" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="692" y="230" width="26" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="640" y="150" width="132" height="86" rx="5" fill="#dfe1d8" stroke="#111" stroke-width="2.6"/>
    <rect x="648" y="158" width="116" height="70" rx="3" fill="#d3d6c9" stroke="#111" stroke-width="1.4"/>
    <use href="#clanker" x="666" y="160" width="66" height="66"/>
    <!-- dashed line from balloon to screen -->
    <line x1="620" y1="112" x2="678" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <!-- clanker screen balloon -->
    <rect x="470" y="26" width="184" height="92" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="474" y="30" width="176" height="84" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="562" y="50" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I completed the form.</text>
    <text x="562" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">And the form to</text>
    <text x="562" y="90" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">approve it. You're</text>
    <text x="562" y="110" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">all CC'd.</text>
  </g>

  <!-- ============ PANEL 3 : Priya just does it ============ -->
  <g clip-path="url(#p3)">
    <rect x="830" y="6" width="398" height="328" fill="#f4f1ea"/>
    <line x1="830" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="1.6"/>
    <!-- priya standing -->
    <use href="#priya" x="866" y="110" width="120" height="190"/>
    <!-- priya arm holding one sheet -->
    <path d="M900 210 q22 6 40 -2" fill="none" stroke="#111" stroke-width="2.5"/>
    <rect x="936" y="196" width="40" height="30" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="942" y1="205" x2="970" y2="205" stroke="#111" stroke-width="1"/>
    <line x1="942" y1="212" x2="970" y2="212" stroke="#111" stroke-width="1"/>
    <line x1="942" y1="219" x2="962" y2="219" stroke="#111" stroke-width="1"/>
    <!-- doug seated at right with mug -->
    <path d="M1096 300 v-52 q0 -14 20 -14 h40 q20 0 20 14 v52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <use href="#doug" x="1072" y="150" width="130" height="190"/>
    <!-- mug -->
    <path d="M1146 250 q26 4 40 -6" fill="none" stroke="#111" stroke-width="2.5"/>
    <rect x="1176" y="228" width="26" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <path d="M1202 232 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.2"/>
    <path d="M1182 224 q2 -6 0 -10 M1190 224 q2 -6 0 -10" fill="none" stroke="#111" stroke-width="1.6"/>
    <!-- priya balloon -->
    <path d="M916 96 l-4 20 l20 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="922" cy="60" rx="72" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="922" y="54" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I just ran it</text>
    <text x="922" y="72" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">by hand.</text>
    <!-- doug balloon -->
    <path d="M1140 138 l14 18 l4 -22 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="1128" cy="104" rx="74" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1128" y="98" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It's not</text>
    <text x="1128" y="116" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">approved yet.</text>
    <!-- priya button -->
    <path d="M948 176 l16 8 l-2 -18 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="984" cy="164" rx="44" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="984" y="170" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I know.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="2" y="6" width="398" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="416" y="6" width="398" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  <rect x="830" y="6" width="398" height="328" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
</svg>