<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Out of Office</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-29</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 100 140">
      <ellipse cx="50" cy="42" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 12 q-6 -10 3 -9 q7 1 2 8" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="42" x2="52" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="42" r="2" fill="#111"/>
      <circle cx="60" cy="42" r="2" fill="#111"/>
      <path d="M42 58 q8 4 16 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M42 70 h16 v6 h-16 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M30 82 q20 -12 40 0 l6 54 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M44 78 l6 8 l6 -8" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M50 86 l-4 6 l4 20 l4 -20 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 100 140">
      <circle cx="50" cy="44" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="40" r="2.6" fill="#111"/>
      <circle cx="60" cy="40" r="2.6" fill="#111"/>
      <path d="M38 54 q12 14 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M30 84 q20 -12 40 0 l5 52 h-50 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="60" y="96" width="24" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M84 100 q9 2 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M64 101 h16" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 100 140">
      <circle cx="50" cy="16" r="7" fill="#111"/>
      <ellipse cx="50" cy="46" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 40 q-4 -26 24 -28 q28 2 24 28 q-8 -14 -24 -14 q-16 0 -24 14z" fill="#111"/>
      <rect x="31" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="49" x2="53" y2="49" stroke="#111" stroke-width="2.2"/>
      <circle cx="39" cy="49" r="2" fill="#111"/>
      <circle cx="61" cy="49" r="2" fill="#111"/>
      <path d="M43 63 q7 3 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M28 84 q22 -12 44 0 l6 52 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="40" y1="104" x2="34" y2="104" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="104" x2="66" y2="104" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head inside a surface -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="26" width="52" height="46" rx="6" fill="#c9ccce" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="26" x2="50" y2="14" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="11" r="3.4" fill="#111"/>
      <rect x="32" y="38" width="14" height="7" rx="2.5" fill="#eafcff" stroke="#111" stroke-width="2"/>
      <rect x="54" y="38" width="14" height="7" rx="2.5" fill="#eafcff" stroke="#111" stroke-width="2"/>
      <rect x="34" y="56" width="32" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="56" x2="40" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="46" y1="56" x2="46" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="52" y1="56" x2="52" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="58" y1="56" x2="58" y2="66" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="0" y="270" width="399" height="70" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="0" y1="272" x2="399" y2="272" stroke="#111" stroke-width="2.5"/>

      <use href="#dailbert" x="150" y="120" width="150" height="210"/>
      <path d="M195 220 q-14 26 -8 44" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M255 220 q14 26 8 44" fill="none" stroke="#111" stroke-width="2.4"/>

      <rect x="40" y="150" width="86" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="46" y="156" width="74" height="54" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <line x1="52" y1="166" x2="112" y2="166" stroke="#111" stroke-width="1.4"/>
      <line x1="52" y1="176" x2="104" y2="176" stroke="#111" stroke-width="1.4"/>
      <line x1="52" y1="186" x2="112" y2="186" stroke="#111" stroke-width="1.4"/>
      <line x1="52" y1="196" x2="96" y2="196" stroke="#111" stroke-width="1.4"/>
      <rect x="76" y="216" width="14" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="66" y="226" width="34" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="176" y="266" width="80" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

      <path d="M198 34 q0 -20 22 -20 h140 q22 0 22 20 v34 q0 20 -22 20 h-110 l-16 18 l-2 -18 h-12 q-22 0 -22 -20 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="290" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Wrote an agent to</text>
      <text x="290" y="58" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">answer my email</text>
      <text x="290" y="76" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">while I'm on vacation.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="270" width="399" height="70" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="414" y1="272" x2="813" y2="272" stroke="#111" stroke-width="2.5"/>

      <use href="#doug" x="470" y="118" width="150" height="210"/>
      <use href="#dailbert" x="660" y="122" width="140" height="196"/>

      <path d="M446 30 q0 -18 20 -18 h120 q20 0 20 18 v30 q0 18 -20 18 h-90 l-14 16 l-2 -16 h-14 q-20 0 -20 -18 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="526" y="36" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Nice. How many</text>
      <text x="526" y="53" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">has it sent</text>
      <text x="526" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">so far?</text>

      <path d="M642 118 q0 -16 18 -16 h108 q18 0 18 16 v26 q0 16 -18 16 h-70 l-12 14 l-2 -14 h-24 q-18 0 -18 -16 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="722" y="123" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">One reply.</text>
      <text x="722" y="139" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">To itself.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="270" width="399" height="70" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="828" y1="272" x2="1227" y2="272" stroke="#111" stroke-width="2.5"/>

      <use href="#priya" x="875" y="120" width="150" height="210"/>
      <path d="M920 224 q22 20 55 12" fill="none" stroke="#111" stroke-width="2.4"/>

      <rect x="1010" y="120" width="150" height="112" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="1018" y="128" width="134" height="96" rx="2" fill="#d7dadd" stroke="#111" stroke-width="1.6"/>
      <g stroke="#b7bbbe" stroke-width="1.2">
        <line x1="1022" y1="134" x2="1148" y2="134"/>
        <line x1="1022" y1="140" x2="1148" y2="140"/>
        <line x1="1022" y1="218" x2="1148" y2="218"/>
      </g>
      <use href="#clanker" x="1032" y="128" width="96" height="96"/>
      <rect x="1078" y="232" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="1062" y="248" width="46" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

      <line x1="1098" y1="150" x2="1082" y2="104" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="900" y="14" width="200" height="84" rx="3" fill="#eef1f3" stroke="#111" stroke-width="2.2"/>
      <text x="1000" y="35" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It emailed me. I</text>
      <text x="1000" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">replied. It replied.</text>
      <text x="1000" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">We agreed you're at</text>
      <text x="1000" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">inbox zero.</text>

      <path d="M846 188 q0 -14 16 -14 h72 q16 0 16 14 v22 q0 14 -16 14 h-42 l-12 14 l-2 -14 h-16 q-16 0 -16 -14 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="914" y="203" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Both of you.</text>
      <text x="914" y="220" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Take the week.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>