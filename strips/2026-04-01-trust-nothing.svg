<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Trust Nothing</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-01</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" overflow="visible">
      <path d="M14,152 Q14,104 45,99 Q76,104 76,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="39" y="76" width="12" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45,99 l-6,9 l6,30 l6,-30 Z" fill="#111"/>
      <ellipse cx="45" cy="52" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45,22 q7,-11 13,-4 q-5,-2 -9,4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="35" cy="52" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="55" cy="52" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="43" y1="52" x2="47" y2="52" stroke="#111" stroke-width="2.2"/>
      <line x1="27" y1="51" x2="20" y2="49" stroke="#111" stroke-width="2.2"/>
      <circle cx="35" cy="52" r="2" fill="#111"/>
      <circle cx="55" cy="52" r="2" fill="#111"/>
      <path d="M38,70 q7,4 14,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" overflow="visible">
      <path d="M12,152 Q12,102 45,98 Q78,102 78,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="38" y="74" width="14" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="50" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30,27 q6,-9 13,-6 M50,22 q9,0 13,9" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="36" cy="48" r="2.6" fill="#111"/>
      <circle cx="54" cy="48" r="2.6" fill="#111"/>
      <path d="M29,58 q16,21 32,0" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M29,58 q16,9 32,0" fill="none" stroke="#111" stroke-width="1.6"/>
      <rect x="60" y="120" width="26" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M86,125 q11,3 0,13" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M68,116 q-3,-6 2,-11 M76,116 q3,-6 -2,-11" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- ============ BOSS ============ -->
    <symbol id="boss" overflow="visible">
      <path d="M10,152 Q10,100 48,95 Q86,100 86,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M48,95 l-15,11 l6,22 M48,95 l15,11 l-6,22" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M48,99 l-5,8 l5,24 l5,-24 Z" fill="#111"/>
      <rect x="41" y="76" width="14" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="48" cy="52" rx="26" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M31,27 L22,-7 L45,23 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M51,23 L74,-7 L65,27 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40,45 q4,-3 8,0 M48,45 q4,-3 8,0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="40" cy="51" r="1.7" fill="#111"/>
      <circle cx="56" cy="51" r="1.7" fill="#111"/>
      <path d="M42,65 q6,3 12,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ THE CLANKER (drawn only inside a surface) ============ -->
    <symbol id="clanker" overflow="visible">
      <line x1="45" y1="8" x2="45" y2="-7" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="-10" r="3.5" fill="#111"/>
      <rect x="14" y="8" width="62" height="54" rx="6" fill="#cfcfcf" stroke="#111" stroke-width="2.5"/>
      <rect x="20" y="14" width="50" height="42" rx="4" fill="#e7e7ea" stroke="#111" stroke-width="1.4"/>
      <rect x="26" y="23" width="16" height="7" rx="3.5" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <rect x="48" y="23" width="16" height="7" rx="3.5" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <path d="M24,20 l4,3 M44,20 l-4,3 M46,20 l4,3 M66,20 l-4,3" stroke="#8a8a8a" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="30" y="40" width="30" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <line x1="35" y1="40" x2="35" y2="50" stroke="#111" stroke-width="1.3"/>
      <line x1="40" y1="40" x2="40" y2="50" stroke="#111" stroke-width="1.3"/>
      <line x1="45" y1="40" x2="45" y2="50" stroke="#111" stroke-width="1.3"/>
      <line x1="50" y1="40" x2="50" y2="50" stroke="#111" stroke-width="1.3"/>
      <line x1="55" y1="40" x2="55" y2="50" stroke="#111" stroke-width="1.3"/>
    </symbol>

    <!-- ============ MONITOR housing ============ -->
    <symbol id="monitor" overflow="visible">
      <rect x="0" y="0" width="84" height="80" rx="5" fill="#222" stroke="#111" stroke-width="2.5"/>
      <rect x="6" y="6" width="72" height="60" rx="3" fill="#e6e6ea" stroke="#111" stroke-width="1.6"/>
      <path d="M10,10 l14,14 M10,22 l10,10 M10,34 l6,6" stroke="#c9c9d0" stroke-width="1.4"/>
      <rect x="34" y="80" width="16" height="16" fill="#333" stroke="#111" stroke-width="2"/>
      <rect x="20" y="96" width="44" height="7" rx="2" fill="#333" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL FRAMES ===================== -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="none">
    <!-- desk -->
    <line x1="14" y1="272" x2="386" y2="272" stroke="#111" stroke-width="2.5"/>
    <line x1="30" y1="272" x2="30" y2="330" stroke="#111" stroke-width="1.4"/>
    <line x1="370" y1="272" x2="370" y2="330" stroke="#111" stroke-width="1.4"/>
    <!-- empty chair (thinner office) -->
    <g stroke="#111" stroke-width="1.6" fill="none" opacity="0.5">
      <rect x="150" y="230" width="30" height="26" rx="3"/>
      <line x1="165" y1="256" x2="165" y2="272"/>
    </g>
    <!-- dailbert -->
    <use href="#dailbert" transform="translate(45,120) scale(0.95)"/>
    <!-- monitor + clanker on desk -->
    <use href="#monitor" transform="translate(258,150) scale(0.92)"/>
    <use href="#clanker" transform="translate(263,158) scale(0.92)"/>

    <!-- dailbert balloon -->
    <path d="M105,80 L86,138 L120,82 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <ellipse cx="110" cy="50" rx="86" ry="33" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="110" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It's April Fools' Day.</text>
    <text x="110" y="55" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Everyone lies today.</text>
    <text x="110" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Trust nothing.</text>

    <!-- clanker screen-balloon + dashed line to monitor -->
    <line x1="300" y1="97" x2="303" y2="152" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="212" y="20" width="176" height="76" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="216" y="24" width="168" height="68" rx="1" fill="none" stroke="#111" stroke-width="0.8"/>
    <text x="300" y="43" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Understood.</text>
    <text x="300" y="61" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Today I treat every</text>
    <text x="300" y="79" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">claim as false.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <!-- floor + doorway -->
    <line x1="428" y1="278" x2="800" y2="278" stroke="#111" stroke-width="2.5"/>
    <rect x="436" y="120" width="16" height="158" fill="none" stroke="#111" stroke-width="1.6" opacity="0.5"/>
    <line x1="436" y1="120" x2="452" y2="120" stroke="#111" stroke-width="1.6" opacity="0.5"/>
    <!-- boss (in doorway) -->
    <use href="#boss" transform="translate(455,122) scale(0.98)"/>
    <!-- doug with mug -->
    <use href="#doug" transform="translate(642,128) scale(0.95)"/>

    <!-- boss balloon -->
    <path d="M508,80 L505,110 L525,80 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <ellipse cx="524" cy="49" rx="82" ry="33" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="524" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Relax, everyone —</text>
    <text x="524" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">the layoffs are over.</text>
    <text x="524" y="71" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">We're all safe now.</text>

    <!-- doug balloon -->
    <path d="M700,88 L682,142 L716,88 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <ellipse cx="708" cy="62" rx="72" ry="27" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="708" y="67" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Best news all year!</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <!-- desk -->
    <line x1="842" y1="272" x2="1214" y2="272" stroke="#111" stroke-width="2.5"/>
    <line x1="858" y1="272" x2="858" y2="330" stroke="#111" stroke-width="1.4"/>
    <line x1="1198" y1="272" x2="1198" y2="330" stroke="#111" stroke-width="1.4"/>
    <!-- dailbert, turned to screen -->
    <use href="#dailbert" transform="translate(866,122) scale(0.95)"/>
    <!-- monitor + clanker -->
    <use href="#monitor" transform="translate(1070,150) scale(0.92)"/>
    <use href="#clanker" transform="translate(1075,158) scale(0.92)"/>

    <!-- dailbert quiet balloon -->
    <path d="M918,66 L920,138 L936,68 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <ellipse cx="920" cy="46" rx="42" ry="22" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="920" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="16" text-anchor="middle" fill="#111">...</text>

    <!-- clanker screen-balloon -->
    <line x1="1110" y1="82" x2="1116" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="1004" y="20" width="196" height="62" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="1008" y="24" width="188" height="54" rx="1" fill="none" stroke="#111" stroke-width="0.8"/>
    <text x="1102" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">He said it today.</text>
    <text x="1102" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I've logged it false.</text>

    <!-- clanker small 'sorry' screen-balloon -->
    <line x1="1140" y1="120" x2="1128" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="1112" y="94" width="82" height="28" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="1116" y="98" width="74" height="20" rx="1" fill="none" stroke="#111" stroke-width="0.8"/>
    <text x="1153" y="112" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Sorry.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>