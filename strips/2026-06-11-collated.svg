<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Collated</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-06-11</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="clip1"><rect x="2" y="4" width="396" height="332" rx="3"/></clipPath>
    <clipPath id="clip2"><rect x="416" y="4" width="396" height="332" rx="3"/></clipPath>
    <clipPath id="clip3"><rect x="830" y="4" width="396" height="332" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="c_dailbert" overflow="visible">
      <path d="M22 168 L30 98 Q50 86 70 98 L78 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M50 98 l-6 8 6 40 6 -40 z" fill="#111"/>
      <rect x="44" y="80" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="50" cy="46" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 16 q11 -9 6 5" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="49" y1="46" x2="51" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="46" r="2.5" fill="#111"/>
      <circle cx="60" cy="46" r="2.5" fill="#111"/>
      <line x1="42" y1="62" x2="58" y2="62" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="c_doug" overflow="visible">
      <path d="M20 168 L28 100 Q50 88 72 100 L80 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="44" y="82" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="48" r="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M40 20 q10 -6 20 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="44" r="3" fill="#111"/>
      <circle cx="60" cy="44" r="3" fill="#111"/>
      <path d="M35 56 q15 18 30 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (lives only in a surface) -->
    <symbol id="c_clanker" overflow="visible">
      <rect x="10" y="14" width="60" height="52" rx="6" fill="#161616" stroke="#0a0a0a" stroke-width="2.5"/>
      <line x1="40" y1="14" x2="40" y2="3" stroke="#0a0a0a" stroke-width="2.5"/>
      <circle cx="40" cy="3" r="3" fill="#0a0a0a"/>
      <rect x="19" y="30" width="16" height="7" rx="3" fill="#cfe8e0"/>
      <rect x="45" y="30" width="16" height="7" rx="3" fill="#cfe8e0"/>
      <rect x="22" y="48" width="36" height="10" rx="2" fill="#2a2a2a" stroke="#cfe8e0" stroke-width="1"/>
      <line x1="28" y1="48" x2="28" y2="58" stroke="#cfe8e0" stroke-width="1.4"/>
      <line x1="34" y1="48" x2="34" y2="58" stroke="#cfe8e0" stroke-width="1.4"/>
      <line x1="40" y1="48" x2="40" y2="58" stroke="#cfe8e0" stroke-width="1.4"/>
      <line x1="46" y1="48" x2="46" y2="58" stroke="#cfe8e0" stroke-width="1.4"/>
      <line x1="52" y1="48" x2="52" y2="58" stroke="#cfe8e0" stroke-width="1.4"/>
    </symbol>

    <!-- OFFICE PRINTER -->
    <symbol id="c_printer" overflow="visible">
      <rect x="10" y="40" width="180" height="108" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="22" y="18" width="156" height="26" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="30" y="94" width="140" height="9" fill="#111"/>
      <path d="M32 103 l-8 30 152 0 -8 -30 z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="112" y="52" width="70" height="34" rx="4" fill="#e6e0d4" stroke="#111" stroke-width="2.5"/>
      <circle cx="170" cy="60" r="3.2" fill="#111"/>
      <circle cx="170" cy="70" r="3.2" fill="#111"/>
      <circle cx="170" cy="80" r="3.2" fill="#111"/>
    </symbol>

    <!-- MUG -->
    <symbol id="c_mug" overflow="visible">
      <rect x="0" y="0" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M20 4 q8 0 8 5 q0 5 -8 5" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M5 -5 q3 -4 6 0" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M12 -5 q3 -4 6 0" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- paper background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>
  <rect x="2" y="4" width="396" height="332" rx="3" fill="#f4f1ea"/>
  <rect x="416" y="4" width="396" height="332" rx="3" fill="#f4f1ea"/>
  <rect x="830" y="4" width="396" height="332" rx="3" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#clip1)">
    <line x1="10" y1="292" x2="390" y2="292" stroke="#111" stroke-width="1.4" opacity="0.5"/>

    <!-- Doug at the printer, mashing the button -->
    <line x1="66" y1="222" x2="252" y2="192" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <circle cx="253" cy="191" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#c_doug" transform="translate(15,155) scale(0.72)"/>
    <line x1="40" y1="222" x2="18" y2="238" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <use href="#c_mug" transform="translate(4,232) scale(0.72)"/>

    <!-- printer -->
    <use href="#c_printer" transform="translate(150,140) scale(0.72)"/>
    <!-- dark LCD (not yet lit) -->
    <rect x="240.7" y="180.3" width="24.5" height="18.7" rx="2" fill="#2a2a2a"/>

    <!-- Dailbert watching -->
    <use href="#c_dailbert" transform="translate(300,150) scale(0.78)"/>
    <line x1="323" y1="226" x2="316" y2="256" stroke="#111" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="356" y1="226" x2="366" y2="256" stroke="#111" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Doug balloon -->
    <path d="M62 66 L52 96 L82 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="20" y="14" width="212" height="54" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="126" y="36" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It won't print. I've</text>
    <text x="126" y="55" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">hit it a hundred times.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#clip2)">
    <line x1="424" y1="292" x2="804" y2="292" stroke="#111" stroke-width="1.4" opacity="0.5"/>

    <!-- printer with lit LCD -->
    <use href="#c_printer" transform="translate(534,120) scale(0.9)"/>
    <!-- screen glow -->
    <line x1="640" y1="166" x2="632" y2="158" stroke="#8fb8ae" stroke-width="1.4" opacity="0.6"/>
    <line x1="685" y1="166" x2="693" y2="158" stroke="#8fb8ae" stroke-width="1.4" opacity="0.6"/>
    <rect x="646.4" y="169.4" width="32.6" height="25.4" rx="2" fill="#0f0f0f"/>
    <use href="#c_clanker" transform="translate(652.5,168.5) scale(0.34)"/>

    <!-- Doug leaning in, mug up -->
    <line x1="486" y1="224" x2="542" y2="204" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <circle cx="543" cy="203" r="5.5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#c_doug" transform="translate(429,150) scale(0.8)"/>
    <line x1="453" y1="226" x2="436" y2="218" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <use href="#c_mug" transform="translate(418,208) scale(0.72)"/>

    <!-- Dailbert at the edge -->
    <use href="#c_dailbert" transform="translate(722,152) scale(0.7)"/>

    <!-- clanker screen-balloon -->
    <line x1="662" y1="70" x2="662" y2="166" stroke="#666" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="600" y="16" width="204" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="605" y="21" width="194" height="44" fill="none" stroke="#888" stroke-width="1"/>
    <text x="702" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">All hundred printed.</text>
    <text x="702" y="57" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I keep them inside now.</text>

    <!-- Doug small balloon -->
    <path d="M474 128 L468 150 L492 132 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="432" y="92" width="160" height="38" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="512" y="116" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Inside... the printer?</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#clip3)">
    <line x1="838" y1="292" x2="1218" y2="292" stroke="#111" stroke-width="1.4" opacity="0.5"/>

    <!-- printer with lit LCD -->
    <use href="#c_printer" transform="translate(958,120) scale(0.9)"/>
    <line x1="1064" y1="166" x2="1056" y2="158" stroke="#8fb8ae" stroke-width="1.4" opacity="0.6"/>
    <line x1="1109" y1="166" x2="1117" y2="158" stroke="#8fb8ae" stroke-width="1.4" opacity="0.6"/>
    <rect x="1070.4" y="169.4" width="32.6" height="25.4" rx="2" fill="#0f0f0f"/>
    <use href="#c_clanker" transform="translate(1076.5,168.5) scale(0.34)"/>

    <!-- Doug, grinning, oblivious -->
    <use href="#c_doug" transform="translate(843,150) scale(0.8)"/>
    <line x1="867" y1="226" x2="852" y2="216" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <use href="#c_mug" transform="translate(832,206) scale(0.72)"/>
    <line x1="891" y1="226" x2="912" y2="234" stroke="#111" stroke-width="6" stroke-linecap="round"/>

    <!-- Dailbert staring, deadpan -->
    <use href="#c_dailbert" transform="translate(1146,152) scale(0.7)"/>
    <line x1="1167" y1="222" x2="1161" y2="250" stroke="#111" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="1196" y1="222" x2="1203" y2="250" stroke="#111" stroke-width="5.5" stroke-linecap="round"/>

    <!-- clanker screen-balloon -->
    <line x1="1086" y1="70" x2="1086" y2="166" stroke="#666" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="1010" y="16" width="206" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="1015" y="21" width="196" height="44" fill="none" stroke="#888" stroke-width="1"/>
    <text x="1113" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I kept a copy of</text>
    <text x="1113" y="57" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">everyone. For Monday.</text>

    <!-- Doug balloon -->
    <path d="M888 128 L882 150 L906 132 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="846" y="92" width="140" height="38" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="916" y="116" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Aw. It likes us.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="2" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="416" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="830" y="4" width="396" height="332" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>