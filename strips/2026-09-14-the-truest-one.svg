<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Truest One</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-14</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== DAILBERT ===================== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <!-- body -->
      <path d="M35 158 Q35 108 60 104 Q85 108 85 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- tie -->
      <path d="M60 106 l-6 8 6 26 6-26 z" fill="#111"/>
      <path d="M55 105 h10 l-5 6 z" fill="#111"/>
      <!-- head -->
      <ellipse cx="60" cy="66" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M60 32 q10 -12 2 -18 q-2 8 -8 8" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="66" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="66" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="66" x2="63" y2="66" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="66" r="2.2" fill="#111"/>
      <circle cx="72" cy="66" r="2.2" fill="#111"/>
      <!-- mouth -->
      <path d="M52 86 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== DOUG ===================== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <path d="M32 158 Q32 106 60 102 Q88 106 88 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- head rounder -->
      <circle cx="60" cy="64" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- two hair tufts -->
      <path d="M40 40 q6 -10 12 -6" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M70 36 q6 -8 12 -2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="50" cy="60" r="3" fill="#111"/>
      <circle cx="72" cy="60" r="3" fill="#111"/>
      <!-- big grin -->
      <path d="M46 76 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- mug -->
      <g>
        <rect x="78" y="120" width="26" height="24" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
        <path d="M104 124 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>
        <path d="M84 116 q2 -6 6 0" fill="none" stroke="#111" stroke-width="1.6"/>
      </g>
    </symbol>

    <!-- ===================== PRIYA ===================== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M33 158 Q33 106 60 102 Q87 106 87 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- rolled sleeves hint -->
      <path d="M37 128 h10 M83 128 h-10" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- head -->
      <ellipse cx="60" cy="66" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- dark curly hair pulled up -->
      <path d="M31 62 q-3 -30 29 -34 q32 4 29 34 q-6 -14 -14 -16 q4 8 -2 12 q-6 -12 -13 -12 q-7 0 -13 12 q-6 -4 -2 -12 q-8 2 -14 16 z" fill="#111" stroke="#111" stroke-width="2"/>
      <circle cx="60" cy="26" r="6" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="60" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="60" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="65" x2="64" y2="65" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="65.5" r="2" fill="#111"/>
      <circle cx="72" cy="65.5" r="2" fill="#111"/>
      <!-- calm mouth -->
      <path d="M53 86 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== BOSS ===================== -->
    <symbol id="boss" viewBox="0 0 120 160">
      <path d="M34 158 Q34 108 60 104 Q86 108 86 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 106 l-5 7 5 22 5-22 z" fill="#111"/>
      <ellipse cx="60" cy="68" rx="28" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- two tall spikes -->
      <path d="M44 40 L36 6 L52 34 Z" fill="#111"/>
      <path d="M76 40 L84 6 L68 34 Z" fill="#111"/>
      <!-- tiny eyes -->
      <circle cx="51" cy="66" r="2" fill="#111"/>
      <circle cx="69" cy="66" r="2" fill="#111"/>
      <path d="M53 84 q7 3 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== CLANKER (head only, drawn inside a surface) ===================== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="52" rx="7" fill="#20242b" stroke="#8f9aa6" stroke-width="2.4"/>
      <!-- antenna -->
      <line x1="60" y1="34" x2="60" y2="18" stroke="#8f9aa6" stroke-width="2.4"/>
      <circle cx="60" cy="15" r="3.5" fill="#c9d3dc"/>
      <!-- slot eyes -->
      <rect x="40" y="50" width="14" height="6" rx="3" fill="#bfe9ff"/>
      <rect x="66" y="50" width="14" height="6" rx="3" fill="#bfe9ff"/>
      <!-- grille mouth -->
      <g stroke="#8f9aa6" stroke-width="2">
        <line x1="44" y1="72" x2="76" y2="72"/>
        <line x1="48" y1="66" x2="48" y2="78"/>
        <line x1="56" y1="66" x2="56" y2="78"/>
        <line x1="64" y1="66" x2="64" y2="78"/>
        <line x1="72" y1="66" x2="72" y2="78"/>
      </g>
    </symbol>

    <!-- ===================== WALL CLOCK ===================== -->
    <symbol id="clock" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="38" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="#111" stroke-width="6" opacity="0.15"/>
      <g stroke="#111" stroke-width="2">
        <line x1="50" y1="16" x2="50" y2="22"/>
        <line x1="84" y1="50" x2="78" y2="50"/>
        <line x1="50" y1="84" x2="50" y2="78"/>
        <line x1="16" y1="50" x2="22" y2="50"/>
      </g>
      <circle cx="50" cy="50" r="3" fill="#111"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============================================================ PANEL 1 -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- wall -->
    <line x1="1" y1="250" x2="401" y2="250" stroke="#111" stroke-width="1.4" opacity="0.4"/>

    <!-- three clocks disagreeing -->
    <use href="#clock" x="34" y="24" width="66" height="66"/>
    <g transform="translate(51 41)"><!-- clock 1 hands 10:10 -->
      <line x1="16" y1="16" x2="8" y2="8" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="24" y2="8" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <use href="#clock" x="167" y="18" width="66" height="66"/>
    <g transform="translate(184 35)"><!-- clock 2 hands ~2:00 -->
      <line x1="16" y1="16" x2="16" y2="6" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="26" y2="18" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <use href="#clock" x="300" y="24" width="66" height="66"/>
    <g transform="translate(317 41)"><!-- clock 3 hands ~7:25 -->
      <line x1="16" y1="16" x2="10" y2="26" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="26" y2="22" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- monitor with clanker on desk -->
    <g>
      <rect x="20" y="150" width="96" height="74" rx="5" fill="#20242b" stroke="#111" stroke-width="2.4"/>
      <rect x="55" y="224" width="26" height="12" fill="#20242b" stroke="#111" stroke-width="2.2"/>
      <rect x="40" y="236" width="56" height="7" rx="2" fill="#20242b" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="34" y="146" width="68" height="68"/>
    </g>

    <!-- clanker balloon: rectangular, dashed line to monitor -->
    <line x1="118" y1="168" x2="150" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="150" y="112" width="234" height="70" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="267" y="134" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good morning. The clocks</text>
    <text x="267" y="152" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">disagreed, so I synced them</text>
    <text x="267" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">all to the truest one.</text>

    <!-- Dailbert and Doug standing -->
    <use href="#dailbert" x="150" y="180" width="120" height="160"/>
    <use href="#doug" x="258" y="180" width="120" height="160"/>
  </g>

  <!-- ============================================================ PANEL 2 -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="414" y1="250" x2="814" y2="250" stroke="#111" stroke-width="1.4" opacity="0.4"/>

    <!-- one confident clock, wrong -->
    <use href="#clock" x="600" y="20" width="72" height="72"/>
    <g transform="translate(618 38)">
      <line x1="18" y1="18" x2="10" y2="6" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="30" y2="24" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- Boss pointing at clock -->
    <use href="#boss" x="430" y="180" width="120" height="160"/>
    <!-- boss arm -->
    <path d="M520 250 q40 -20 78 -160" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Boss balloon -->
    <path d="M470 96 q0 -8 8 -8 h130 q8 0 8 8 v40 q0 8 -8 8 h-96 l-14 16 l2 -16 h-22 q-8 0 -8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="543" y="112" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">This room says we</text>
    <text x="543" y="130" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">still have twenty minutes.</text>

    <!-- Doug with mug, gesturing back -->
    <use href="#doug" x="640" y="180" width="120" height="160"/>
    <!-- Doug balloon -->
    <path d="M636 150 q0 -8 8 -8 h120 q8 0 8 8 v32 q0 8 -8 8 h-70 l-12 14 l1 -14 h-39 q-8 0 -8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="704" y="167" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The kitchen one says</text>
    <text x="704" y="185" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">we're already late.</text>
  </g>

  <!-- ============================================================ PANEL 3 -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="828" y1="250" x2="1228" y2="250" stroke="#111" stroke-width="1.4" opacity="0.4"/>

    <!-- two clocks still arguing in the back, small -->
    <use href="#clock" x="1120" y="18" width="52" height="52"/>
    <g transform="translate(1134 32)">
      <line x1="12" y1="12" x2="6" y2="5" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="12" x2="20" y2="15" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <use href="#clock" x="1060" y="30" width="52" height="52"/>
    <g transform="translate(1074 44)">
      <line x1="12" y1="12" x2="12" y2="4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="12" x2="18" y2="18" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Priya, checking her own watch, calm -->
    <use href="#priya" x="855" y="180" width="120" height="160"/>
    <!-- Priya's arm up checking wristwatch -->
    <path d="M905 250 q22 -14 6 -70" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
    <!-- wristwatch -->
    <rect x="905" y="176" width="16" height="14" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <line x1="913" y1="183" x2="913" y2="179" stroke="#111" stroke-width="1.6"/>
    <line x1="913" y1="183" x2="917" y2="185" stroke="#111" stroke-width="1.4"/>

    <!-- Priya balloon -->
    <path d="M930 150 q0 -8 8 -8 h120 q8 0 8 8 v34 q0 8 -8 8 h-72 l-12 14 l1 -14 h-37 q-8 0 -8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="998" y="167" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's nine o'clock.</text>
    <text x="998" y="185" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Let's start.</text>

    <!-- Boss and Doug small, still looking up at the clocks, mid-argue -->
    <use href="#boss" x="1035" y="210" width="90" height="130"/>
    <use href="#doug" x="1110" y="212" width="88" height="128"/>

    <!-- small deadpan tag from Priya at bottom -->
    <text x="998" y="316" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111" font-style="italic">She was done before they agreed.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>