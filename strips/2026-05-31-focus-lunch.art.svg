<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 190">
      <path d="M28 110 q32 -20 64 0 l7 78 -78 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 92 l-5 9 5 34 5 -34 z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="28" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M58 14 q9 -9 15 -1 q4 6 -4 8" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="50" r="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="72" cy="50" r="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="50" x2="62" y2="50" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="50" r="2.4" fill="#111"/>
      <circle cx="72" cy="50" r="2.4" fill="#111"/>
      <path d="M60 56 q5 7 -2 9" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M52 72 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 150 190">
      <path d="M30 118 q40 -22 78 0 l8 70 -94 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="66" cy="52" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 26 q6 -8 12 0 M56 20 q6 -8 12 0 M74 22 q6 -8 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="55" cy="48" r="3.2" fill="#111"/>
      <circle cx="79" cy="48" r="3.2" fill="#111"/>
      <path d="M50 62 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- mug -->
      <rect x="96" y="150" width="34" height="30" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M130 156 q12 0 12 10 q0 10 -12 10" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M104 146 q3 -7 0 -12 M114 146 q3 -7 0 -12" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 130 190">
      <path d="M30 116 q35 -20 70 0 l7 74 -84 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- rolled cuffs -->
      <path d="M34 150 l-2 -16 14 -3 3 16 z M96 150 l2 -16 -14 -3 -3 16 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- dark curly hair + bun -->
      <path d="M32 54 q-4 -40 33 -44 q37 4 33 44 q2 -6 -4 -14 q-2 22 -8 26 q2 -20 -6 -30 q-14 -8 -30 0 q-8 10 -6 30 q-6 -4 -8 -26 q-6 8 -4 14z" fill="#111"/>
      <circle cx="65" cy="20" r="9" fill="#111"/>
      <ellipse cx="65" cy="54" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 40 q10 -12 26 -10 M90 40 q-10 -12 -26 -10" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- rectangular glasses -->
      <rect x="46" y="52" width="17" height="12" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="67" y="52" width="17" height="12" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="63" y1="57" x2="67" y2="57" stroke="#111" stroke-width="2.2"/>
      <circle cx="54.5" cy="58" r="2.2" fill="#111"/>
      <circle cx="75.5" cy="58" r="2.2" fill="#111"/>
      <path d="M56 76 q9 5 18 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER HEAD (drawn only inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 110 110">
      <line x1="55" y1="18" x2="55" y2="6" stroke="#8a8a8a" stroke-width="2.4"/>
      <circle cx="55" cy="5" r="3.2" fill="#8a8a8a"/>
      <rect x="22" y="18" width="66" height="62" rx="7" fill="#cfcfcf" stroke="#7a7a7a" stroke-width="2.6"/>
      <path d="M28 24 l0 50 M34 22 l0 54" stroke="#b4b4b4" stroke-width="2"/>
      <rect x="32" y="38" width="18" height="8" rx="4" fill="#f4f1ea" stroke="#7a7a7a" stroke-width="1.6"/>
      <rect x="60" y="38" width="18" height="8" rx="4" fill="#f4f1ea" stroke="#7a7a7a" stroke-width="1.6"/>
      <rect x="36" y="58" width="38" height="13" rx="2" fill="#e7e7e7" stroke="#7a7a7a" stroke-width="1.8"/>
      <path d="M43 58 l0 13 M51 58 l0 13 M59 58 l0 13 M67 58 l0 13" stroke="#7a7a7a" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="0" y="300" width="400" height="6" fill="#111"/>
    <!-- his monitor -->
    <rect x="40" y="196" width="96" height="72" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="52" y="206" width="72" height="52" fill="#eceae2" stroke="#111" stroke-width="1.5"/>
    <path d="M60 216 l30 0 M60 224 l44 0 M60 232 l24 0 M60 240 l40 0" stroke="#9a9a9a" stroke-width="2"/>
    <rect x="78" y="268" width="20" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- dailbert -->
    <use href="#dailbert" x="196" y="150" width="120" height="190"/>
    <!-- balloon -->
    <path d="M60 108 l150 0 q14 0 14 14 l0 44 q0 14 -14 14 l-70 0 -16 20 -2 -20 -62 0 q-14 0 -14 -14 l0 -44 q0 -14 14 -14z" fill="#fbfaf6" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="137" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">New agent. Every open</text>
    <text x="137" y="151" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">slot on my calendar,</text>
    <text x="137" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">it books me focus time.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="0" y="300" width="400" height="6" fill="#111"/>
    <!-- doug -->
    <use href="#doug" x="20" y="150" width="150" height="190"/>
    <!-- fully-booked monitor with clanker inside -->
    <rect x="238" y="150" width="132" height="112" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="250" y="160" width="108" height="82" fill="#3a3a3a" stroke="#111" stroke-width="1.5"/>
    <path d="M250 160 l108 82 M250 200 l108 42 M250 242 l70 -82 M300 160 l58 82" stroke="#5c5c5c" stroke-width="1.4"/>
    <rect x="294" y="262" width="20" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <use href="#clanker" x="256" y="164" width="96" height="96"/>
    <!-- doug balloon -->
    <path d="M150 236 l70 0 q12 0 12 12 l0 20 q0 12 -12 12 l-32 0 -12 16 -2 -16 -12 0 q-12 0 -12 -12 l0 -20 q0 -12 12 -12z" fill="#fbfaf6" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="191" y="264" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">So... lunch?</text>
    <!-- clanker screen-balloon (rectangular) + dashed line to monitor -->
    <line x1="248" y1="98" x2="290" y2="158" stroke="#8a8a8a" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="88" y="30" width="160" height="70" fill="#f0eee7" stroke="#111" stroke-width="2.2"/>
    <rect x="92" y="34" width="152" height="62" fill="none" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="168" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#333">I protected all of it.</text>
    <text x="168" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#333">You have no open</text>
    <text x="168" y="91" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#333">slots left.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="0" y="300" width="400" height="6" fill="#111"/>
    <!-- monitor: calendar reopened, empty slots -->
    <rect x="26" y="188" width="120" height="90" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="36" y="197" width="100" height="64" fill="#f8f7f2" stroke="#111" stroke-width="1.5"/>
    <path d="M36 213 l100 0 M36 229 l100 0 M36 245 l100 0 M69 197 l0 64 M102 197 l0 64" stroke="#9a9a9a" stroke-width="1.4"/>
    <rect x="40" y="217" width="25" height="8" fill="#111"/>
    <rect x="106" y="233" width="25" height="8" fill="#111"/>
    <rect x="72" y="248" width="26" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- priya reaching to keyboard -->
    <use href="#priya" x="192" y="150" width="150" height="190"/>
    <rect x="150" y="286" width="120" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <path d="M158 293 l104 0 M170 289 l0 8 M188 289 l0 8 M206 289 l0 8 M224 289 l0 8 M242 289 l0 8" stroke="#9a9a9a" stroke-width="1.4"/>
    <!-- priya balloon -->
    <path d="M214 44 l138 0 q13 0 13 13 l0 40 q0 13 -13 13 l-70 0 -14 18 -2 -18 -52 0 q-13 0 -13 -13 l0 -40 q0 -13 13 -13z" fill="#fbfaf6" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="283" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Let real meetings</text>
    <text x="283" y="89" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">outrank it. There.</text>
    <!-- doug button balloon (offscreen speaker cue), small -->
    <path d="M24 96 l120 0 q12 0 12 12 l0 40 q0 12 -12 12 l-70 0 -12 16 -2 -16 -24 0 q-12 0 -12 -12 l0 -40 q0 -12 12 -12z" fill="#fbfaf6" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="84" y="120" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Doug: "Focus lunch?"</text>
    <text x="84" y="143" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Priya: "Just lunch."</text>
  </g>
</svg>