      <path d="M40 92 L50 100 L60 92" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M50 100 l-5 6 l5 22 l5 -22 z" fill="#111"/>
      <ellipse cx="50" cy="48" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 21 q-10 -9 0 -14 q9 -1 5 7" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="48" r="7" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="48" r="7" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="48" x2="53" y2="48" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="48" r="2" fill="#111"/>
      <circle cx="60" cy="48" r="2" fill="#111"/>
      <path d="M44 66 Q50 70 56 66" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 130">
      <path d="M18 130 Q18 92 60 88 Q102 92 102 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="54" y="74" width="12" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="50" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 30 q6 -8 15 -5 M55 24 q9 -6 17 0" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="48" r="3" fill="#111"/>
      <circle cx="70" cy="48" r="3" fill="#111"/>
      <path d="M45 59 Q60 75 75 59" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <g>
        <rect x="90" y="100" width="24" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M114 104 q9 2 9 9 q0 7 -9 6" fill="none" stroke="#111" stroke-width="2.5"/>
        <path d="M97 94 q3 -5 0 -9 M105 94 q3 -5 0 -9" fill="none" stroke="#999" stroke-width="1.6"/>
      </g>
    </symbol>

    <symbol id="priya" viewBox="0 0 100 130">
      <path d="M14 130 Q14 94 50 90 Q86 94 86 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M22 112 h15 M63 112 h15" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="44" y="78" width="12" height="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M24 50 Q19 15 50 11 Q81 15 76 50 Q70 30 50 29 Q30 30 24 50 Z" fill="#111"/>
      <circle cx="50" cy="15" r="9" fill="#111"/>
      <circle cx="28" cy="26" r="4" fill="#111"/>
      <circle cx="72" cy="26" r="4" fill="#111"/>
      <circle cx="22" cy="40" r="4" fill="#111"/>
      <circle cx="78" cy="40" r="4" fill="#111"/>
      <ellipse cx="50" cy="52" rx="22" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 42 Q22 20 50 17 Q78 20 74 42" fill="#111"/>
      <rect x="31" y="47" width="16" height="11" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="53" y="47" width="16" height="11" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="52" x2="53" y2="52" stroke="#111" stroke-width="2.5"/>
      <circle cx="39" cy="52" r="2" fill="#111"/>
      <circle cx="61" cy="52" r="2" fill="#111"/>
      <path d="M44 68 Q50 70 56 68" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 100 140">
      <path d="M12 140 Q12 98 50 94 Q88 98 88 140 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="44" y="82" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 96 L50 108 L58 96" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M50 108 l-4 5 l4 20 l4 -20 z" fill="#111"/>
      <ellipse cx="50" cy="58" rx="22" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M32 40 Q50 30 68 40 L66 46 Q50 38 34 46 Z" fill="#111"/>
      <path d="M35 40 L41 8 L47 38 Z" fill="#111"/>
      <path d="M54 38 L62 5 L69 41 Z" fill="#111"/>
      <circle cx="43" cy="56" r="1.7" fill="#111"/>
      <circle cx="59" cy="56" r="1.7" fill="#111"/>
      <path d="M44 71 Q51 74 58 71" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="4" x2="50" y2="17" stroke="#d8d8d8" stroke-width="2.5"/>
      <circle cx="50" cy="4" r="3.5" fill="#d8d8d8" stroke="#111" stroke-width="1.5"/>
      <rect x="16" y="17" width="68" height="61" rx="9" fill="#d8d8d8" stroke="#111" stroke-width="2.5"/>
      <circle cx="16" cy="48" r="3" fill="#d8d8d8" stroke="#111" stroke-width="2"/>
      <circle cx="84" cy="48" r="3" fill="#d8d8d8" stroke="#111" stroke-width="2"/>
      <rect x="26" y="34" width="20" height="10" rx="4" fill="#eafaff" stroke="#111" stroke-width="2"/>
      <rect x="54" y="34" width="20" height="10" rx="4" fill="#eafaff" stroke="#111" stroke-width="2"/>
      <rect x="33" y="36" width="6" height="6" rx="2" fill="#111"/>
      <rect x="61" y="36" width="6" height="6" rx="2" fill="#111"/>
      <rect x="30" y="56" width="40" height="12" rx="3" fill="#f0f0f0" stroke="#111" stroke-width="2"/>
      <line x1="36" y1="56" x2="36" y2="68" stroke="#111" stroke-width="1.5"/>
      <line x1="42" y1="56" x2="42" y2="68" stroke="#111" stroke-width="1.5"/>
      <line x1="48" y1="56" x2="48" y2="68" stroke="#111" stroke-width="1.5"/>
      <line x1="54" y1="56" x2="54" y2="68" stroke="#111" stroke-width="1.5"/>
      <line x1="60" y1="56" x2="60" y2="68" stroke="#111" stroke-width="1.5"/>
      <line x1="64" y1="56" x2="64" y2="68" stroke="#111" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- PANEL 1 -->
  <g transform="translate(0,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="18" y1="300" x2="382" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- monitor on desk -->
    <rect x="48" y="208" width="118" height="82" rx="4" fill="#16181c" stroke="#111" stroke-width="2.5"/>
    <rect x="98" y="290" width="18" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="62" y="212" width="90" height="74"/>
    <!-- boss -->
    <use href="#boss" x="228" y="120" width="120" height="152"/>
    <!-- balloon -->
    <path d="M255 100 L268 88 L285 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="165" y="26" width="222" height="76" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="276" y="50" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">
      <tspan x="276">The clanker tuned</tspan>
      <tspan x="276" dy="19">everyone's calendars.</tspan>
      <tspan x="276" dy="19">Zero idle time.</tspan>
    </text>
  </g>

  <!-- PANEL 2 -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="18" y1="300" x2="382" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- dailbert seated at desk -->
    <use href="#dailbert" x="150" y="168" width="96" height="126"/>
    <!-- monitor -->
    <rect x="248" y="196" width="120" height="84" rx="4" fill="#16181c" stroke="#111" stroke-width="2.5"/>
    <rect x="298" y="280" width="18" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="262" y="200" width="92" height="76"/>
    <!-- doug -->
    <use href="#doug" x="22" y="150" width="128" height="150"/>
    <!-- doug balloon -->
    <path d="M92 74 L86 88 L110 78 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="24" y="20" width="176" height="58" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="112" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">
      <tspan x="112">It booked lunch</tspan>
      <tspan x="112" dy="19">as a meeting.</tspan>
    </text>
    <!-- clanker screen balloon -->
    <line x1="322" y1="84" x2="308" y2="196" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="250" y="30" width="146" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="323" y="53" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
      <tspan x="323">Lunch is a</tspan>
      <tspan x="323" dy="18">sync now.</tspan>
    </text>
  </g>

  <!-- PANEL 3 -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="18" y1="300" x2="382" y2="300" stroke="#111" stroke-width="2.5"/>
    <!-- monitor showing declined calendar (no clanker: not in room) -->
    <rect x="35" y="196" width="122" height="92" rx="4" fill="#16181c" stroke="#111" stroke-width="2.5"/>
    <rect x="86" y="288" width="18" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <g>
      <rect x="46" y="205" width="100" height="11" rx="2" fill="#3a3d42"/>
      <rect x="46" y="221" width="100" height="11" rx="2" fill="#3a3d42"/>
      <rect x="46" y="237" width="100" height="11" rx="2" fill="#3a3d42"/>
      <line x1="46" y1="210" x2="146" y2="211" stroke="#7c828a" stroke-width="2"/>
      <line x1="46" y1="226" x2="146" y2="227" stroke="#7c828a" stroke-width="2"/>
      <line x1="46" y1="242" x2="146" y2="243" stroke="#7c828a" stroke-width="2"/>
      <rect x="58" y="256" width="76" height="18" rx="3" fill="none" stroke="#9aa0a6" stroke-width="1.6"/>
      <text x="96" y="269" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" fill="#9aa0a6" text-anchor="middle">ALL DECLINED</text>
    </g>
    <!-- priya -->
    <use href="#priya" x="206" y="150" width="112" height="158"/>
    <!-- priya balloon -->
    <path d="M252 94 L246 108 L268 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="168" y="18" width="222" height="80" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="279" y="43" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">
      <tspan x="279">Declined all of it.</tspan>
      <tspan x="279" dy="19">Shipped during the</tspan>
      <tspan x="279" dy="19">meeting about shipping.</tspan>
    </text>
  </g>
</svg>