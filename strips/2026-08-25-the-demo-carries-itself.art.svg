<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== CHARACTER SYMBOLS ===== -->

    <!-- DAILBERT: oval head, round glasses, tie, one curl -->
    <symbol id="dailbert" viewBox="0 0 100 140">
      <ellipse cx="50" cy="34" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 8 q10 -9 4 -16 q9 4 3 13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="41" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="34" r="7" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M43 48 q7 5 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 60 L34 118 Q50 124 66 118 L66 60 Q50 68 34 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 61 L45 74 L50 82 L55 74 Z" fill="#111"/>
      <path d="M50 61 L54 66 L50 70 L46 66 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 100 140">
      <circle cx="50" cy="36" r="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="41" cy="33" r="2.4" fill="#111"/>
      <circle cx="59" cy="33" r="2.4" fill="#111"/>
      <path d="M38 44 q12 14 24 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M32 64 L32 120 Q50 126 68 120 L68 64 Q50 70 32 64 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- mug -->
      <rect x="60" y="86" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <path d="M82 90 q9 0 9 7 q0 7 -9 6" fill="none" stroke="#111" stroke-width="2.3"/>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 100 140">
      <path d="M26 30 q-4 -22 24 -24 q28 2 24 24 q3 6 -3 9 l-42 0 q-6 -3 -3 -9" fill="#111"/>
      <ellipse cx="50" cy="38" rx="22" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26 30 q-4 -22 24 -24 q28 2 24 24 q-8 -8 -24 -8 q-16 0 -24 8" fill="#111"/>
      <rect x="33" y="34" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="34" width="14" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="39" x2="53" y2="39" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="39" r="1.5" fill="#111"/>
      <circle cx="60" cy="39" r="1.5" fill="#111"/>
      <path d="M44 52 q6 4 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 62 L32 120 Q50 126 68 120 L68 62 Q50 68 32 62 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M32 88 l-8 6 M68 88 l8 6" stroke="#111" stroke-width="2.3" stroke-linecap="round"/>
      <path d="M30 84 l6 3 M70 84 l-6 3" stroke="#111" stroke-width="2.3" stroke-linecap="round"/>
    </symbol>

    <!-- BOSS: two hair spikes, tiny eyes, suit/tie -->
    <symbol id="boss" viewBox="0 0 100 140">
      <path d="M34 18 Q30 -8 44 16" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M66 18 Q70 -8 56 16" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <ellipse cx="50" cy="36" rx="23" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="42" cy="35" r="1.8" fill="#111"/>
      <circle cx="58" cy="35" r="1.8" fill="#111"/>
      <path d="M44 47 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 60 L32 120 Q50 126 68 120 L68 60 Q50 68 32 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 60 L42 72 L50 66 L58 72 Z" fill="#111"/>
      <path d="M50 66 L47 88 L50 94 L53 88 Z" fill="#111"/>
    </symbol>

    <!-- THE CLANKER: chrome head in a surface -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="20" y="24" width="60" height="52" rx="8" fill="#dfe3e6" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="24" x2="50" y2="12" stroke="#111" stroke-width="2.3"/>
      <circle cx="50" cy="9" r="4" fill="#c7ccd0" stroke="#111" stroke-width="2.2"/>
      <rect x="30" y="38" width="16" height="9" rx="2.5" fill="#111"/>
      <rect x="54" y="38" width="16" height="9" rx="2.5" fill="#111"/>
      <rect x="32.5" y="40" width="5" height="5" rx="1" fill="#8fe3ff"/>
      <rect x="56.5" y="40" width="5" height="5" rx="1" fill="#8fe3ff"/>
      <g stroke="#111" stroke-width="1.8">
        <line x1="34" y1="60" x2="66" y2="60"/>
        <line x1="34" y1="65" x2="66" y2="65"/>
        <line x1="40" y1="56" x2="40" y2="69"/>
        <line x1="50" y1="56" x2="50" y2="69"/>
        <line x1="60" y1="56" x2="60" y2="69"/>
      </g>
      <rect x="30" y="55" width="40" height="15" rx="3" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>
  </defs>

  <!-- =================== PANEL 1 =================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- conference room floor line -->
      <line x1="0" y1="250" x2="399" y2="250" stroke="#111" stroke-width="2"/>
      <!-- projector screen on wall -->
      <rect x="150" y="30" width="200" height="130" rx="4" fill="#26313a" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="200" y="45" width="100" height="100"/>
      <!-- clanker screen-balloon -->
      <rect x="24" y="30" width="120" height="52" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="150" y1="80" x2="144" y2="70" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="84" y="50" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Running the live</text>
      <text x="84" y="67" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">demo now.</text>
      <!-- Boss presenting -->
      <use href="#boss" x="40" y="150" width="90" height="126"/>
      <!-- Priya seated-ish with laptop -->
      <use href="#priya" x="270" y="150" width="90" height="126"/>
      <rect x="288" y="235" width="60" height="30" rx="3" fill="#dfe3e6" stroke="#111" stroke-width="2.3"/>
      <rect x="292" y="238" width="52" height="20" rx="1" fill="#26313a"/>
    </g>
  </g>

  <!-- =================== PANEL 2 =================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="250" x2="813" y2="250" stroke="#111" stroke-width="2"/>
      <!-- projector screen stalled: spinner + clanker -->
      <rect x="564" y="30" width="200" height="130" rx="4" fill="#26313a" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="614" y="45" width="100" height="100"/>
      <!-- little stall spinner -->
      <circle cx="664" cy="132" r="10" fill="none" stroke="#8fe3ff" stroke-width="2.5" stroke-dasharray="14 8"/>
      <!-- clanker balloon: too-literal edge case -->
      <rect x="438" y="26" width="150" height="66" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="564" y1="86" x2="588" y2="76" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="513" y="46" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">One record has no</text>
      <text x="513" y="62" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">name. I would hate</text>
      <text x="513" y="78" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">to guess wrong.</text>
      <!-- Boss stalling, sweat -->
      <use href="#boss" x="450" y="150" width="90" height="126"/>
      <path d="M470 168 q5 8 0 12" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- boss balloon -->
      <rect x="486" y="150" width="150" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M508 200 l-6 16 l16 -10 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="561" y="172" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Great question! Let's</text>
      <text x="561" y="189" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">let it, uh, think.</text>
      <!-- Priya at laptop, typing -->
      <use href="#priya" x="690" y="150" width="90" height="126"/>
      <rect x="708" y="235" width="60" height="30" rx="3" fill="#dfe3e6" stroke="#111" stroke-width="2.3"/>
      <rect x="712" y="238" width="52" height="20" rx="1" fill="#26313a"/>
    </g>
  </g>

  <!-- =================== PANEL 3 =================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="250" x2="1227" y2="250" stroke="#111" stroke-width="2"/>
      <!-- projector screen now working: clanker + check -->
      <rect x="978" y="30" width="200" height="130" rx="4" fill="#26313a" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="1008" y="42" width="95" height="95"/>
      <path d="M1120 92 l10 12 l20 -26" fill="none" stroke="#8fe3ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Boss beaming, taking credit -->
      <use href="#boss" x="864" y="150" width="90" height="126"/>
      <rect x="900" y="150" width="150" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M922 200 l-6 16 l16 -10 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="975" y="172" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">See? It works itself</text>
      <text x="975" y="189" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">out. Told you.</text>
      <!-- Priya, closing laptop, dry -->
      <use href="#priya" x="1104" y="150" width="90" height="126"/>
      <rect x="1122" y="235" width="60" height="26" rx="3" fill="#dfe3e6" stroke="#111" stroke-width="2.3"/>
      <!-- priya balloon: dry button -->
      <rect x="1030" y="212" width="140" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M1148 258 l14 14 l-2 -18 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1100" y="234" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Sure. I'll leave the</text>
      <text x="1100" y="251" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">null handled.</text>
    </g>
  </g>
</svg>