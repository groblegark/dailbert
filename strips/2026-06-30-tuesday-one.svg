<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">The Tuesday One</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-30</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- Scanline pattern for monitor -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#dfe6e6"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#c7d0d0" stroke-width="1"/>
    </pattern>
    <!-- Hatch for shadow -->
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="1"/>
    </pattern>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <!-- neck/collar -->
      <path d="M50 118 L50 132 Q60 140 70 132 L70 118" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- shoulders -->
      <path d="M30 160 Q30 138 50 130 L70 130 Q90 138 90 160" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- collar Vs -->
      <path d="M50 130 L60 142 L70 130" fill="none" stroke="#111" stroke-width="2"/>
      <!-- tie -->
      <path d="M58 132 L62 132 L64 155 L60 160 L56 155 Z" fill="#111" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- head oval -->
      <ellipse cx="60" cy="72" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- ear -->
      <path d="M94 70 q8 4 0 12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair curl -->
      <path d="M52 34 q6 -14 16 -8 q-8 2 -6 12" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="48" cy="72" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="74" cy="72" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="72" x2="63" y2="72" stroke="#111" stroke-width="2.5"/>
      <line x1="85" y1="70" x2="94" y2="70" stroke="#111" stroke-width="2"/>
      <!-- eyes -->
      <circle cx="48" cy="72" r="2.4" fill="#111"/>
      <circle cx="74" cy="72" r="2.4" fill="#111"/>
      <!-- brows weary -->
      <line x1="40" y1="58" x2="55" y2="61" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="67" y1="61" x2="82" y2="58" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- nose -->
      <path d="M61 78 q4 6 -2 9" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- mouth flat -->
      <line x1="50" y1="98" x2="70" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DAILBERT variant: open mouth -->
    <symbol id="dailbert2" viewBox="0 0 120 160">
      <path d="M50 118 L50 132 Q60 140 70 132 L70 118" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M30 160 Q30 138 50 130 L70 130 Q90 138 90 160" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 130 L60 142 L70 130" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M58 132 L62 132 L64 155 L60 160 L56 155 Z" fill="#111" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
      <ellipse cx="60" cy="72" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M94 70 q8 4 0 12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M52 34 q6 -14 16 -8 q-8 2 -6 12" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="72" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="74" cy="72" r="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="72" x2="63" y2="72" stroke="#111" stroke-width="2.5"/>
      <line x1="85" y1="70" x2="94" y2="70" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="72" r="2.4" fill="#111"/>
      <circle cx="74" cy="72" r="2.4" fill="#111"/>
      <line x1="40" y1="59" x2="55" y2="60" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="67" y1="60" x2="82" y2="59" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M61 78 q4 6 -2 9" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- open mouth -->
      <ellipse cx="60" cy="99" rx="8" ry="6" fill="#fff" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE CLANKER head -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <!-- antenna -->
      <line x1="60" y1="18" x2="60" y2="6" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="3.5" fill="#111"/>
      <!-- head box -->
      <rect x="24" y="18" width="72" height="66" rx="7" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <!-- bolts -->
      <circle cx="32" cy="26" r="2" fill="#111"/>
      <circle cx="88" cy="26" r="2" fill="#111"/>
      <!-- slot eyes glowing -->
      <rect x="33" y="36" width="22" height="11" rx="3" fill="#111"/>
      <rect x="65" y="36" width="22" height="11" rx="3" fill="#111"/>
      <rect x="36" y="39" width="16" height="5" rx="2" fill="#f4f1ea"/>
      <rect x="68" y="39" width="16" height="5" rx="2" fill="#f4f1ea"/>
      <!-- grille mouth -->
      <rect x="38" y="60" width="44" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="46" y1="60" x2="46" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="60" x2="54" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="62" y1="60" x2="62" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="70" y1="60" x2="70" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="74" y1="60" x2="74" y2="76" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="20" y1="288" x2="380" y2="288" stroke="#111" stroke-width="2.5"/>
    <rect x="40" y="252" width="150" height="36" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- monitor off to the side (blank, no clanker) -->
    <rect x="250" y="196" width="110" height="80" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="258" y="204" width="94" height="60" rx="2" fill="url(#scan)" stroke="#111" stroke-width="1.5"/>
    <rect x="296" y="276" width="18" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- coffee cup on desk -->
    <path d="M70 232 L74 252 L96 252 L100 232 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <path d="M100 236 q10 0 8 10 q-2 6 -9 5" fill="none" stroke="#111" stroke-width="2"/>
    <path d="M80 224 q2 -6 -2 -10 M90 224 q2 -6 -2 -10" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <!-- dailbert -->
    <use href="#dailbert" x="105" y="150" width="150" height="200"/>

    <!-- balloon 1 -->
    <path d="M40 96 L40 60 Q40 48 52 48 L212 48 Q224 48 224 60 L224 96 Q224 108 212 108 L120 108 L104 126 L108 108 L52 108 Q40 108 40 96 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="132" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Forty-one tickets.</text>
    <text x="132" y="92" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">On a Tuesday.</text>

    <!-- balloon 2 -->
    <path d="M228 168 L228 138 Q228 126 240 126 L372 126 Q384 126 384 138 L384 168 Q384 180 372 180 L268 180 L214 188 L256 180 L240 180 Q228 180 228 168 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="306" y="150" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Fine. I'm caffeinated.</text>
    <text x="306" y="170" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Let's go.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="434" y1="292" x2="794" y2="292" stroke="#111" stroke-width="2.5"/>
    <!-- monitor with clanker -->
    <rect x="440" y="150" width="150" height="112" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="450" y="160" width="130" height="92" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
    <rect x="500" y="262" width="30" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="480" y="276" width="70" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- clanker inside monitor -->
    <use href="#clanker" x="470" y="164" width="90" height="82"/>
    <!-- scanline overlay over clanker for screen feel -->
    <g opacity="0.25">
      <line x1="452" y1="172" x2="578" y2="172" stroke="#111" stroke-width="1"/>
      <line x1="452" y1="184" x2="578" y2="184" stroke="#111" stroke-width="1"/>
      <line x1="452" y1="196" x2="578" y2="196" stroke="#111" stroke-width="1"/>
      <line x1="452" y1="208" x2="578" y2="208" stroke="#111" stroke-width="1"/>
      <line x1="452" y1="220" x2="578" y2="220" stroke="#111" stroke-width="1"/>
      <line x1="452" y1="232" x2="578" y2="232" stroke="#111" stroke-width="1"/>
    </g>
    <!-- dailbert to right, leaning in surprised -->
    <use href="#dailbert2" x="640" y="150" width="150" height="200"/>

    <!-- dailbert balloon (top) -->
    <path d="M626 92 L626 60 Q626 48 638 48 L788 48 Q800 48 800 60 L800 92 Q800 104 788 104 L720 104 L706 122 L710 104 L638 104 Q626 104 626 92 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="713" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Wait. The board's</text>
    <text x="713" y="92" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">empty.</text>

    <!-- clanker screen balloon (rect double outline) -->
    <rect x="432" y="18" width="184" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="437" y="23" width="174" height="76" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="524" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">Forty of them. Done</text>
    <text x="524" y="59" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">at four this morning.</text>
    <text x="524" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">You were asleep.</text>
    <!-- dashed connector to monitor -->
    <line x1="512" y1="104" x2="512" y2="158" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="848" y1="292" x2="1208" y2="292" stroke="#111" stroke-width="2.5"/>
    <!-- monitor with clanker (angled staging: monitor right) -->
    <rect x="1044" y="150" width="150" height="112" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="1054" y="160" width="130" height="92" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
    <rect x="1104" y="262" width="30" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="1084" y="276" width="70" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- clanker inside monitor -->
    <use href="#clanker" x="1074" y="164" width="90" height="82"/>
    <g opacity="0.25">
      <line x1="1056" y1="172" x2="1182" y2="172" stroke="#111" stroke-width="1"/>
      <line x1="1056" y1="184" x2="1182" y2="184" stroke="#111" stroke-width="1"/>
      <line x1="1056" y1="196" x2="1182" y2="196" stroke="#111" stroke-width="1"/>
      <line x1="1056" y1="208" x2="1182" y2="208" stroke="#111" stroke-width="1"/>
      <line x1="1056" y1="220" x2="1182" y2="220" stroke="#111" stroke-width="1"/>
      <line x1="1056" y1="232" x2="1182" y2="232" stroke="#111" stroke-width="1"/>
    </g>
    <!-- dailbert left, deadpan -->
    <use href="#dailbert" x="852" y="150" width="150" height="200"/>

    <!-- clanker screen balloon (top) -->
    <rect x="982" y="16" width="228" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="987" y="21" width="218" height="76" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="1096" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">I left the printer one.</text>
    <text x="1096" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">You always hum a little</text>
    <text x="1096" y="74" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">when you do that one.</text>
    <!-- dashed connector to monitor -->
    <line x1="1119" y1="102" x2="1119" y2="158" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- dailbert balloon (lower left) -->
    <path d="M848 168 L848 138 Q848 126 860 126 L968 126 Q980 126 980 138 L980 168 Q980 180 968 180 L940 180 L916 200 L924 180 L860 180 Q848 180 848 168 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="914" y="150" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I do not hum.</text>
  </g>
</g>
    
  </svg>