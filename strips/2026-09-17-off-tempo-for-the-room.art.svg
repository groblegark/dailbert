<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DOUG: round head, no glasses, dot eyes, big goofy grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M28 168 L28 118 Q60 100 92 118 L92 168" fill="#f4f1ea"/>
        <path d="M50 116 L60 128 L70 116" fill="#f4f1ea"/>
        <circle cx="60" cy="66" r="42" fill="#f4f1ea"/>
        <circle cx="46" cy="60" r="3.4" fill="#111" stroke="none"/>
        <circle cx="74" cy="60" r="3.4" fill="#111" stroke="none"/>
        <path d="M40 76 Q60 98 80 76" fill="none"/>
        <path d="M100 64 q7 4 0 12" fill="#f4f1ea"/>
      </g>
      <g stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <rect x="14" y="128" width="30" height="26" rx="3" fill="#f4f1ea"/>
        <path d="M44 134 q12 0 12 10 t-12 10" fill="none"/>
        <line x1="14" y1="138" x2="44" y2="138"/>
      </g>
    </symbol>

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 175">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M26 173 L30 120 Q60 104 90 120 L94 173" fill="#f4f1ea"/>
        <path d="M50 116 L60 126 L70 116" fill="#f4f1ea"/>
        <path d="M60 126 L55 150 L60 158 L65 150 Z" fill="#111"/>
        <ellipse cx="60" cy="64" rx="36" ry="42" fill="#f4f1ea"/>
        <path d="M60 22 q10 -12 4 4" fill="none"/>
        <circle cx="47" cy="62" r="11" fill="#f4f1ea"/>
        <circle cx="73" cy="62" r="11" fill="#f4f1ea"/>
        <line x1="58" y1="62" x2="62" y2="62"/>
        <circle cx="47" cy="62" r="2.6" fill="#111" stroke="none"/>
        <circle cx="73" cy="62" r="2.6" fill="#111" stroke="none"/>
        <path d="M50 86 L70 86" fill="none"/>
      </g>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 175">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M26 173 L30 118 Q60 102 90 118 L94 173" fill="#f4f1ea"/>
        <path d="M30 128 q-8 4 -6 16" fill="none"/>
        <path d="M90 128 q8 4 6 16" fill="none"/>
        <path d="M50 114 L60 124 L70 114" fill="#f4f1ea"/>
        <ellipse cx="60" cy="64" rx="35" ry="40" fill="#f4f1ea"/>
        <path d="M28 56 Q22 20 60 18 Q98 20 92 56 Q92 40 78 34 Q60 28 42 34 Q28 40 28 56 Z" fill="#111" stroke="#111"/>
        <path d="M60 18 q4 -12 14 -6" fill="none"/>
        <circle cx="72" cy="10" r="5" fill="#111" stroke="#111"/>
        <rect x="36" y="56" width="20" height="13" rx="2.5" fill="#f4f1ea"/>
        <rect x="64" y="56" width="20" height="13" rx="2.5" fill="#f4f1ea"/>
        <line x1="56" y1="62" x2="64" y2="62"/>
        <circle cx="46" cy="62" r="2.5" fill="#111" stroke="none"/>
        <circle cx="74" cy="62" r="2.5" fill="#111" stroke="none"/>
        <path d="M50 88 Q60 92 70 88" fill="none"/>
      </g>
    </symbol>

    <!-- THE CLANKER: chrome robot head inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <rect x="24" y="26" width="72" height="66" rx="8" fill="#cfd2d0"/>
        <line x1="60" y1="26" x2="60" y2="10"/>
        <circle cx="60" cy="7" r="4" fill="#111"/>
        <rect x="34" y="44" width="22" height="9" rx="3" fill="#111"/>
        <rect x="64" y="44" width="22" height="9" rx="3" fill="#111"/>
        <rect x="37" y="46.5" width="7" height="4" rx="1.5" fill="#f4f1ea" stroke="none"/>
        <rect x="67" y="46.5" width="7" height="4" rx="1.5" fill="#f4f1ea" stroke="none"/>
        <rect x="40" y="66" width="40" height="16" rx="3" fill="#eef0ee"/>
        <line x1="48" y1="66" x2="48" y2="82"/>
        <line x1="56" y1="66" x2="56" y2="82"/>
        <line x1="64" y1="66" x2="64" y2="82"/>
        <line x1="72" y1="66" x2="72" y2="82"/>
      </g>
    </symbol>

    <!-- musical note -->
    <symbol id="note" viewBox="0 0 40 40">
      <g fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
        <path d="M16 8 L16 28" fill="none" stroke-width="2.4"/>
        <path d="M16 8 L30 5 L30 22" fill="none" stroke-width="2.4"/>
        <ellipse cx="12" cy="29" rx="5" ry="4"/>
        <ellipse cx="26" cy="23" rx="5" ry="4"/>
      </g>
    </symbol>
  </defs>

  <!-- PANEL FRAMES -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  </g>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <g stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round">
      <rect x="40" y="14" width="34" height="24" rx="4" fill="#dfe1de"/>
      <circle cx="57" cy="26" r="7" fill="#f4f1ea"/>
      <circle cx="57" cy="26" r="2.5" fill="#111"/>
    </g>
    <use href="#note" x="82" y="14" width="26" height="26"/>
    <g stroke="#9a9a94" stroke-width="1.6" fill="none">
      <path d="M112 18 q8 8 0 16"/>
      <path d="M120 12 q14 14 0 28"/>
    </g>

    <use href="#doug" x="150" y="150" width="150" height="212"/>

    <g>
      <path d="M170 66 h150 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-90 l-16 16 l2 -16 h-46 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="245" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Hey, could we play</text>
      <text x="245" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">that one song of</text>
      <text x="245" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">mine? Just once.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <rect x="470" y="70" width="150" height="130" rx="8" fill="#111"/>
      <rect x="478" y="78" width="134" height="114" rx="5" fill="#1c1c1c"/>
      <g stroke="#3a3a3a" stroke-width="1.4">
        <line x1="484" y1="86" x2="606" y2="86"/>
        <line x1="484" y1="184" x2="606" y2="184"/>
      </g>
      <rect x="536" y="200" width="18" height="14" fill="#111"/>
    </g>
    <use href="#clanker" x="490" y="82" width="110" height="100"/>

    <use href="#doug" x="700" y="150" width="140" height="200"/>

    <line x1="588" y1="120" x2="612" y2="140" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <g>
      <rect x="612" y="56" width="196" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="616" y="60" width="188" height="78" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="710" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I'd love to, Doug.</text>
      <text x="710" y="102" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It reads a little</text>
      <text x="710" y="122" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">off-tempo for the room.</text>
    </g>

    <g>
      <path d="M690 158 h110 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-52 l-14 14 l2 -14 h-46 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="750" y="178" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Totally fair.</text>
      <text x="750" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Maybe tomorrow.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <use href="#priya" x="860" y="150" width="140" height="200"/>
    <use href="#doug" x="1030" y="150" width="150" height="212"/>

    <g fill="#111" stroke="#111" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
      <use href="#note" x="1052" y="96" width="20" height="20"/>
      <use href="#note" x="1076" y="76" width="16" height="16"/>
      <use href="#note" x="1096" y="94" width="13" height="13"/>
    </g>

    <g>
      <path d="M1058 118 h74 a10 10 0 0 1 10 10 v22 a10 10 0 0 1 -10 10 h-30 l-12 12 l2 -12 h-32 a10 10 0 0 1 -10 -10 v-22 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1095" y="136" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">hmm-hmm-</text>
      <text x="1095" y="152" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">hmmmm...</text>
    </g>

    <g>
      <path d="M842 92 h140 a11 11 0 0 1 11 11 v46 a11 11 0 0 1 -11 11 h-44 l-14 15 l2 -15 h-84 a11 11 0 0 1 -11 -11 v-46 a11 11 0 0 1 11 -11 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="912" y="114" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Best-tuned room</text>
      <text x="912" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">in the building,</text>
      <text x="912" y="150" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">and it's him.</text>
    </g>
  </g>
</svg>