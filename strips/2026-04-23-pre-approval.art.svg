      <rect x="27" y="39" width="21" height="10" rx="5" fill="#eef2f6" stroke="#2a2f36" stroke-width="2.2"/>
      <rect x="62" y="39" width="21" height="10" rx="5" fill="#eef2f6" stroke="#2a2f36" stroke-width="2.2"/>
      <path d="M31 44 L44 44 M66 44 L79 44" stroke="#8f99a6" stroke-width="2"/>
      <rect x="38" y="61" width="34" height="12" rx="2" fill="#b9bcc1" stroke="#2a2f36" stroke-width="2.2"/>
      <path d="M45 61 L45 73 M52 61 L52 73 M59 61 L59 73 M66 61 L66 73" stroke="#2a2f36" stroke-width="1.8"/>
