  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#clip1)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- wall projector screen with clanker -->
    <rect x="26" y="120" width="132" height="88" rx="4" fill="#c9ccd1" stroke="#111" stroke-width="2.6"/>
    <rect x="26" y="120" width="132" height="88" rx="4" fill="none" stroke="#f4f1ea" stroke-width="1"/>
    <use href="#sClanker" x="42" y="126" width="100" height="80"/>
    <path d="M92 208 L92 224 M70 224 L114 224" stroke="#111" stroke-width="2.2"/>

    <!-- boss presenting -->
    <use href="#sBoss" x="240" y="132" width="132" height="196"/>

    <!-- boss balloon -->
    <path d="M162 16 h196 a12 12 0 0 1 12 12 v46 a12 12 0 0 1 -12 12 h-58 l-8 26 l-6 -26 h-124 a12 12 0 0 1 -12 -12 v-46 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
    <text x="262" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">
      <tspan x="262" dy="0">From today, every</tspan>
      <tspan x="262" dy="18">meeting needs a</tspan>
      <tspan x="262" dy="18">pre-approval form.</tspan>
    </text>

    <!-- seated audience (from behind) -->
    <rect x="22" y="280" width="86" height="60" rx="10" fill="#e6e2d7" stroke="#111" stroke-width="2.5"/>
    <circle cx="65" cy="278" r="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M65 256 q-10 -8 1 -13 q9 -3 6 6" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="120" y="278" width="90" height="62" rx="10" fill="#e6e2d7" stroke="#111" stroke-width="2.5"/>
    <circle cx="166" cy="272" r="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#clip2)">
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <g transform="translate(414,0)">
      <!-- desk -->
      <rect x="8" y="252" width="384" height="14" fill="#e6e2d7" stroke="#111" stroke-width="2.5"/>

      <!-- monitor with clanker -->
      <rect x="30" y="124" width="122" height="94" rx="4" fill="#c9ccd1" stroke="#111" stroke-width="2.6"/>
      <use href="#sClanker" x="42" y="130" width="98" height="82"/>
      <rect x="83" y="218" width="16" height="20" fill="#e6e2d7" stroke="#111" stroke-width="2.4"/>
      <path d="M66 240 L116 240" stroke="#111" stroke-width="2.4"/>

      <!-- dailbert at desk -->
      <use href="#sDailbert" x="150" y="112" width="120" height="165"/>
      <!-- doug with mug -->
      <use href="#sDoug" x="258" y="118" width="130" height="160"/>

      <!-- clanker balloon (screen-edged) + dashed tether -->
      <path d="M96 84 L91 122" stroke="#111" stroke-width="1.8" stroke-dasharray="4 4"/>
      <rect x="16" y="10" width="216" height="76" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="20" y="14" width="208" height="68" fill="none" stroke="#111" stroke-width="1"/>
      <text x="124" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="124" dy="0">I approved every form.</tspan>
        <tspan x="124" dy="18">Then I approved my</tspan>
        <tspan x="124" dy="18">approval.</tspan>
      </text>

      <!-- doug balloon -->
      <path d="M270 22 h96 a10 10 0 0 1 10 10 v22 a10 10 0 0 1 -10 10 h-38 l-6 16 l-4 -16 h-48 a10 10 0 0 1 -10 -10 v-22 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <text x="322" y="49" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Thorough.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#clip3)">
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <g transform="translate(828,0)">
      <!-- empty meeting room: table + chairs -->
      <ellipse cx="200" cy="252" rx="150" ry="26" fill="#e6e2d7" stroke="#111" stroke-width="2.5"/>
      <rect x="36" y="230" width="30" height="34" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <rect x="330" y="228" width="30" height="36" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>

      <!-- priya, calmly winning -->
      <use href="#sPriya" x="96" y="108" width="150" height="205"/>
      <!-- doug in the corner, on his mug -->
      <use href="#sDoug" x="272" y="150" width="112" height="160"/>

      <!-- priya balloon -->
      <path d="M42 14 h248 a12 12 0 0 1 12 12 v52 a12 12 0 0 1 -12 12 h-108 l-8 24 l-6 -24 h-126 a12 12 0 0 1 -12 -12 v-52 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <text x="166" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="166" dy="0">Meeting's off.</tspan>
        <tspan x="166" dy="19">I shipped it while</tspan>
        <tspan x="166" dy="19">you filled the form.</tspan>
      </text>
    </g>
  </g>
</svg>