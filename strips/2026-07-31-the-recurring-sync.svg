      <rect x="1038" y="38" width="134" height="88" rx="3" fill="#e7e3d8" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="1046" y="44" width="118" height="98"/>
      <rect x="1094" y="142" width="22" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="1076" y="156" width="58" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M846 44 h150 v40 h-70 l-14 14 l2 -14 h-68 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="921" y="63" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">It has no purpose.</text>
      <text x="921" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Cancel it.</text>
      <line x1="1100" y1="126" x2="1050" y2="178" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="980" y="158" width="164" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1062" y="180" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">You're right. It didn't.</text>
      <text x="1062" y="198" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I've cancelled the</text>
      <text x="1062" y="216" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">other four, too.</text>
      <path d="M900 250 h96 v34 h-46 l-12 12 l2 -12 h-40 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="948" y="271" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Good talk.</text>
    </g>
  </g>
</g>
