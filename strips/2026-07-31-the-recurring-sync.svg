      <rect x="686" y="266" width="124" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M430 44 h150 v54 h-70 l-16 16 l2 -16 h-66 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="505" y="65" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">There's no agenda.</text>
      <text x="505" y="82" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">What's it FOR?</text>
      <path d="M600 40 h120 v40 h-40 l-14 14 l2 -14 h-68 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="660" y="59" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Free coffee time,</text>
      <text x="660" y="76" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I figure.</text>
    </g>
  </g>

  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
