      <rect x="296" y="136" width="22" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="278" y="150" width="58" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
