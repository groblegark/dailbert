      <rect x="232" y="26" width="150" height="110" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="240" y="34" width="134" height="86" rx="3" fill="#e7e3d8" stroke="#111" stroke-width="1.6"/>
