      <line x1="307" y1="120" x2="250" y2="170" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="150" y="150" width="150" height="70" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="225" y="172" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">I found time on</text>
      <text x="225" y="189" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">everyone's calendar.</text>
      <text x="225" y="206" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">A daily sync.</text>
      <path d="M150 250 h120 v42 h-70 l-14 14 l2 -14 h-38 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="210" y="269" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Finally. Alignment.</text>
      <text x="210" y="286" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" fill="#111">Every day.</text>
    </g>
  </g>

  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <use href="#dailbert" x="440" y="150" width="120" height="168"/>
      <use href="#doug" x="560" y="150" width="120" height="168"/>
      <rect x="700" y="196" width="96" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="706" y="202" width="84" height="52" rx="2" fill="#e7e3d8" stroke="#111" stroke-width="1.4"/>
