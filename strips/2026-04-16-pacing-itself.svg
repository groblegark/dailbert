<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Pacing Itself</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-16</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="panel"><rect x="0" y="0" width="400" height="340"/></clipPath>

    <symbol id="dailbert" viewBox="0 0 90 160">
      <path d="M45 7 q9 -6 11 2 q1 6 -6 6"/>
      <ellipse cx="45" cy="34" rx="21" ry="25" fill="#f4f1ea"/>
      <path d="M24 34 q-4 2 0 6" fill="#f4f1ea"/>
      <circle cx="36" cy="34" r="8" fill="#fff"/>
      <circle cx="54" cy="34" r="8" fill="#fff"/>
      <line x1="44" y1="34" x2="46" y2="34"/>
      <circle cx="36" cy="34" r="1.7" fill="#111"/>
      <circle cx="54" cy="34" r="1.7" fill="#111"/>
      <path d="M45 40 l-3 5 h5" fill="none"/>
      <line x1="39" y1="50" x2="51" y2="50"/>
      <rect x="40" y="57" width="10" height="8" fill="#f4f1ea"/>
      <path d="M28 66 q17 -6 34 0 l8 74 h-50 z" fill="#f4f1ea"/>
      <path d="M45 66 l-4 6 l4 26 l4 -26 z" fill="#111"/>
      <path d="M40 65 l5 6 l5 -6" fill="none"/>
      <path d="M30 74 q-12 20 -6 40" fill="none"/>
      <path d="M60 74 q15 14 22 27" fill="none"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 90 160">
      <circle cx="45" cy="34" r="24" fill="#f4f1ea"/>
      <circle cx="37" cy="32" r="2.5" fill="#111"/>
      <circle cx="53" cy="32" r="2.5" fill="#111"/>
      <path d="M34 40 q11 13 22 0" fill="none"/>
      <rect x="40" y="56" width="10" height="8" fill="#f4f1ea"/>
      <path d="M26 66 q19 -6 38 0 l7 74 h-52 z" fill="#f4f1ea"/>
      <path d="M40 64 l5 6 l5 -6" fill="none"/>
      <path d="M28 74 q-14 16 -8 34" fill="none"/>
      <path d="M62 74 q13 12 9 28" fill="none"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 90">
      <line x1="50" y1="6" x2="50" y2="20" stroke="#cfd6da"/>
      <circle cx="50" cy="5" r="3" fill="#cfd6da" stroke="#cfd6da"/>
      <rect x="20" y="20" width="60" height="50" rx="6" fill="#3a4048" stroke="#cfd6da" stroke-width="2"/>
      <rect x="28" y="34" width="18" height="6" rx="3" fill="#e6f0f4" stroke="none"/>
      <rect x="54" y="34" width="18" height="6" rx="3" fill="#e6f0f4" stroke="none"/>
      <g stroke="#cfd6da" stroke-width="1.6">
        <line x1="34" y1="53" x2="34" y2="62"/>
        <line x1="42" y1="53" x2="42" y2="62"/>
        <line x1="50" y1="53" x2="50" y2="62"/>
        <line x1="58" y1="53" x2="58" y2="62"/>
        <line x1="66" y1="53" x2="66" y2="62"/>
      </g>
    </symbol>

    <symbol id="plant" viewBox="0 0 70 100">
      <path d="M16 66 h38 l-5 30 h-28 z" fill="#f4f1ea"/>
      <rect x="13" y="60" width="44" height="8" rx="2" fill="#f4f1ea"/>
      <line x1="18" y1="66" x2="52" y2="66" stroke-width="1.4"/>
      <path d="M35 63 C34 40 30 34 20 40" fill="none"/>
      <path d="M37 63 C40 42 48 40 52 50" fill="none"/>
      <path d="M35 63 C36 46 38 44 40 58" fill="none"/>
      <path d="M20 40 q-6 2 -2 8 q6 -1 2 -8" fill="#f4f1ea"/>
      <path d="M52 50 q6 0 6 7 q-6 1 -6 -7" fill="#f4f1ea"/>
    </symbol>
  </defs>

  <!-- panel frames -->
  <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>
  <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>
  <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>

  <!-- ===== PANEL 1 ===== -->
  <g clip-path="url(#panel)" transform="translate(0,0)">
    <path d="M8 274 H392"/>
    <path d="M8 274 v40 M392 274 v40" stroke-width="1.4"/>
    <use href="#plant" transform="translate(150,178) scale(1.1)"/>
    <path d="M158 288 q10 4 20 0" stroke-width="1.4"/>
    <use href="#dailbert" transform="translate(22,96) scale(1.2)"/>
    <!-- watering can -->
    <g>
      <path d="M118 194 h26 v20 h-26 z" fill="#f4f1ea"/>
      <path d="M144 197 l24 -7 l-2 7 l-22 6 z" fill="#f4f1ea"/>
      <path d="M120 194 q13 -13 24 0" fill="none"/>
    </g>
    <g stroke-width="1.5">
      <line x1="170" y1="198" x2="174" y2="206"/>
      <line x1="176" y1="200" x2="180" y2="208"/>
      <line x1="182" y1="202" x2="186" y2="210"/>
    </g>
    <use href="#doug" transform="translate(268,108) scale(1.15)"/>
    <!-- mug -->
    <g>
      <path d="M300 196 h22 v18 h-22 z" fill="#f4f1ea"/>
      <path d="M322 200 q9 1 0 10" fill="none"/>
    </g>

    <!-- Dailbert balloon (left) -->
    <g>
      <path d="M92 56 l6 46 l14 -42 z" fill="#f4f1ea"/>
      <rect x="20" y="22" width="152" height="34" rx="12" fill="#f4f1ea"/>
      <text x="96" y="44" text-anchor="middle" font-size="15" fill="#111" stroke="none">It's pacing itself.</text>
    </g>
    <!-- Doug balloon (right) -->
    <g>
      <path d="M300 66 l4 44 l16 -40 z" fill="#f4f1ea"/>
      <rect x="222" y="20" width="158" height="48" rx="12" fill="#f4f1ea"/>
      <text x="301" y="39" text-anchor="middle" font-size="14" fill="#111" stroke="none">It's been brown</text>
      <text x="301" y="56" text-anchor="middle" font-size="14" fill="#111" stroke="none">since March, buddy.</text>
    </g>
  </g>

  <!-- ===== PANEL 2 ===== -->
  <g clip-path="url(#panel)" transform="translate(414,0)">
    <path d="M8 276 H392"/>
    <path d="M8 276 v40 M392 276 v40" stroke-width="1.4"/>
    <use href="#plant" transform="translate(26,188) scale(1.15)"/>
    <use href="#dailbert" transform="translate(120,104) scale(1.15)"/>
    <!-- monitor -->
    <rect x="270" y="150" width="112" height="92" rx="6" fill="#f4f1ea"/>
    <rect x="280" y="160" width="92" height="72" fill="#20242a" stroke="#111"/>
    <use href="#clanker" transform="translate(287,161) scale(0.78)"/>
    <path d="M326 242 v14 M308 258 h36"/>

    <!-- Dailbert balloon -->
    <g>
      <path d="M118 62 l8 44 l16 -40 z" fill="#f4f1ea"/>
      <rect x="24" y="16" width="170" height="48" rx="12" fill="#f4f1ea"/>
      <text x="109" y="35" text-anchor="middle" font-size="14" fill="#111" stroke="none">You cancel its</text>
      <text x="109" y="52" text-anchor="middle" font-size="14" fill="#111" stroke="none">watering reminder?</text>
    </g>
    <!-- Clanker balloon -->
    <g>
      <polyline points="300,92 312,124 326,160" stroke-dasharray="4 4" stroke-width="1.6" fill="none"/>
      <rect x="200" y="16" width="196" height="76" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="204" y="20" width="188" height="68" fill="none" stroke="#111" stroke-width="1"/>
      <text x="298" y="39" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">It stopped growing.</text>
      <text x="298" y="58" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">I assumed it moved on.</text>
      <text x="298" y="77" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">I wished it well.</text>
    </g>
  </g>

  <!-- ===== PANEL 3 ===== -->
  <g clip-path="url(#panel)" transform="translate(828,0)">
    <path d="M8 276 H392"/>
    <path d="M8 276 v40 M392 276 v40" stroke-width="1.4"/>
    <use href="#doug" transform="translate(18,128) scale(1.1)"/>
    <!-- watering can in Doug's hand -->
    <g>
      <path d="M92 200 h24 v18 h-24 z" fill="#f4f1ea"/>
      <path d="M116 203 l22 -6 l-2 6 l-20 6 z" fill="#f4f1ea"/>
      <path d="M94 200 q12 -12 22 0" fill="none"/>
    </g>
    <g stroke-width="1.5">
      <line x1="140" y1="204" x2="144" y2="212"/>
      <line x1="146" y1="206" x2="150" y2="214"/>
    </g>
    <use href="#plant" transform="translate(120,192) scale(1.1)"/>
    <use href="#dailbert" transform="translate(214,116) scale(1.05)"/>
    <!-- monitor -->
    <rect x="316" y="150" width="74" height="66" rx="5" fill="#f4f1ea"/>
    <rect x="323" y="158" width="60" height="50" fill="#20242a" stroke="#111"/>
    <use href="#clanker" transform="translate(326,158) scale(0.54)"/>
    <path d="M353 216 v10 M338 226 h30"/>

    <!-- Doug balloon -->
    <g>
      <path d="M70 54 l4 40 l18 -36 z" fill="#f4f1ea"/>
      <rect x="22" y="20" width="150" height="34" rx="12" fill="#f4f1ea"/>
      <text x="97" y="42" text-anchor="middle" font-size="14" fill="#111" stroke="none">I'll keep it going!</text>
    </g>
    <!-- Clanker balloon -->
    <g>
      <polyline points="300,86 330,120 354,158" stroke-dasharray="4 4" stroke-width="1.6" fill="none"/>
      <rect x="160" y="12" width="196" height="74" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="164" y="16" width="188" height="66" fill="none" stroke="#111" stroke-width="1"/>
      <text x="258" y="34" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">I don't sort by what</text>
      <text x="258" y="52" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">things are. Only if</text>
      <text x="258" y="70" text-anchor="middle" font-size="13.5" fill="#111" stroke="none">they're still here.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>