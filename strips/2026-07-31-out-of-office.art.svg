<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 150">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 8 q9 -9 4 -16 q10 6 3 16" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="42" r="1.8" fill="#111"/>
      <circle cx="71" cy="42" r="1.8" fill="#111"/>
      <path d="M52 60 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 74 q20 16 40 0 l10 40 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 76 l-6 12 l6 6 l6 -6 z" fill="#111"/>
      <path d="M60 94 l-3 26 M60 94 l3 26" stroke="#111" stroke-width="2" fill="none"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 150">
      <circle cx="60" cy="44" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="40" r="2.6" fill="#111"/>
      <circle cx="72" cy="40" r="2.6" fill="#111"/>
      <path d="M45 54 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 78 q20 14 40 0 l8 40 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="84" y="92" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M110 97 q10 2 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M90 88 q2 -6 6 0 M99 88 q2 -6 6 0" fill="none" stroke="#999" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 150">
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- hair -->
      <path d="M32 40 q-3 -30 28 -32 q31 2 28 32 q-6 -14 -14 -16 q4 8 -2 12 q-3 -10 -12 -11 q3 8 -3 12 q-6 -8 -14 -4 q-2 6 -7 7 z" fill="#111"/>
      <path d="M55 12 q6 -8 12 -3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="40" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="43" x2="64" y2="43" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="44" r="1.8" fill="#111"/>
      <circle cx="72" cy="44" r="1.8" fill="#111"/>
      <path d="M53 60 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 78 q22 14 44 0 l9 40 h-62 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- rolled sleeves hint -->
      <path d="M40 96 l-6 8 M80 96 l6 8" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- THE BOSS -->
    <symbol id="boss" viewBox="0 0 120 150">
      <ellipse cx="60" cy="46" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M40 22 l6 -20 l6 22 M68 22 l6 -22 l6 20" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <circle cx="50" cy="46" r="1.6" fill="#111"/>
      <circle cx="70" cy="46" r="1.6" fill="#111"/>
      <path d="M52 60 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 80 q22 12 44 0 l9 38 h-62 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 82 l-6 10 l6 8 l6 -8 z" fill="#111"/>
    </symbol>

    <!-- THE CLANKER (drawn INSIDE a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="24" y="30" width="72" height="60" rx="8" fill="#20242b" stroke="#111" stroke-width="2.4"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="13" r="4" fill="#cfd6dd" stroke="#111" stroke-width="2"/>
      <!-- slot eyes glow -->
      <rect x="36" y="48" width="18" height="8" rx="3" fill="#bfe9ff"/>
      <rect x="66" y="48" width="18" height="8" rx="3" fill="#bfe9ff"/>
      <!-- grille mouth -->
      <g stroke="#8fb7c9" stroke-width="2">
        <line x1="40" y1="72" x2="80" y2="72"/>
        <line x1="40" y1="78" x2="80" y2="78"/>
      </g>
      <line x1="46" y1="68" x2="46" y2="82" stroke="#20242b" stroke-width="2"/>
      <line x1="60" y1="68" x2="60" y2="82" stroke="#20242b" stroke-width="2"/>
      <line x1="74" y1="68" x2="74" y2="82" stroke="#20242b" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANELS ================= -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="252" width="400" height="14" fill="#111"/>
      <!-- wilting desk plant -->
      <rect x="30" y="234" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M40 234 q-8 -10 -12 -4 M40 234 q10 -8 12 -2 M40 234 q1 -14 -3 -14" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M28 224 q-3 6 -4 2 M52 226 q4 5 6 1" fill="none" stroke="#111" stroke-width="1.8"/>

      <!-- monitor with clanker -->
      <rect x="250" y="150" width="120" height="92" rx="6" fill="#20242b" stroke="#111" stroke-width="2.6"/>
      <rect x="298" y="242" width="24" height="12" fill="#111"/>
      <g transform="translate(255,150) scale(0.92)">
        <use href="#clanker"/>
      </g>

      <!-- Dailbert at desk -->
      <use href="#dailbert" x="70" y="120" width="120" height="150"/>

      <!-- clanker balloon: rectangular, dashed line to screen -->
      <line x1="300" y1="150" x2="250" y2="70" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="150" y="24" width="176" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="238" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Priya is out today.</text>
      <text x="238" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I moved her 4 meetings</text>
      <text x="238" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">to Doug.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="415" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="252" width="400" height="14" fill="#111"/>

      <!-- Doug, mug up, oblivious -->
      <use href="#doug" x="470" y="118" width="120" height="150"/>
      <!-- Dailbert beside him -->
      <use href="#dailbert" x="660" y="122" width="120" height="150"/>

      <!-- Doug balloon -->
      <path d="M470 40 h150 v54 h-70 l-14 16 v-16 h-66 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="545" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Four meetings today.</text>
      <text x="545" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Wild. Popular guy.</text>

      <!-- Dailbert small balloon -->
      <path d="M700 96 h96 v40 h-40 l-12 14 v-14 h-44 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="748" y="120" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">They're all hers.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="829" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="252" width="400" height="14" fill="#111"/>

      <!-- Priya's dark laptop on the desk, clanker in the dead screen -->
      <rect x="1030" y="176" width="130" height="80" rx="5" fill="#2a2f36" stroke="#111" stroke-width="2.6"/>
      <rect x="1018" y="256" width="154" height="10" rx="3" fill="#111"/>
      <g transform="translate(1042,168) scale(0.86)" opacity="0.9">
        <use href="#clanker"/>
      </g>

      <!-- Doug at desk still, mug -->
      <use href="#doug" x="880" y="120" width="120" height="150"/>

      <!-- clanker balloon: dashed line to laptop screen -->
      <line x1="1080" y1="176" x2="1040" y2="96" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="900" y="30" width="200" height="64" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1000" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Priya declined all four.</text>
      <text x="1000" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">From the beach.</text>
      <text x="1000" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">She's very fast.</text>

      <!-- Doug button -->
      <path d="M812 128 h70 v34 h-30 l-12 12 v-12 h-28 z" transform="translate(30,0)" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="877" y="150" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good for her.</text>
    </g>
  </g>
</svg>