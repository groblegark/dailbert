<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->
    <symbol id="dailbert" viewBox="0 0 100 150">
      <path d="M18 150 Q18 100 50 100 Q82 100 82 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M40 104 L50 118 L60 104" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M50 118 L45 140 L50 148 L55 140 Z" fill="#111"/>
      <rect x="44" y="86" width="12" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="52" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 22 q7 -11 13 -3 q-5 1 -7 7" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="52" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="52" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="48.5" y1="52" x2="51.5" y2="52" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="52" r="2.2" fill="#111"/>
      <circle cx="60" cy="52" r="2.2" fill="#111"/>
      <path d="M42 70 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 150">
      <path d="M22 150 Q22 100 60 100 Q98 100 98 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="53" y="84" width="14" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="52" r="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="48" r="2.6" fill="#111"/>
      <circle cx="70" cy="48" r="2.6" fill="#111"/>
      <path d="M45 60 q15 18 30 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M40 24 q6 -7 11 0 M55 20 q6 -7 12 0 M73 24 q5 -7 11 -1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="mug" viewBox="0 0 42 40">
      <rect x="6" y="11" width="22" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M28 16 q9 0 9 8 q0 8 -9 8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M13 7 q2 -4 0 -7 M19 7 q2 -4 0 -7" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 110 150">
      <path d="M20 150 Q20 100 55 100 Q90 100 90 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <!-- rolled-sleeve cuff hints -->
      <path d="M27 128 q6 -6 12 0 M71 128 q6 -6 12 0" fill="none" stroke="#111" stroke-width="2.2"/>
      <rect x="49" y="84" width="12" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair mass -->
      <ellipse cx="55" cy="40" rx="31" ry="30" fill="#111"/>
      <circle cx="55" cy="13" r="9" fill="#111"/>
      <circle cx="29" cy="30" r="8" fill="#111"/>
      <circle cx="81" cy="30" r="8" fill="#111"/>
      <circle cx="32" cy="52" r="7" fill="#111"/>
      <circle cx="78" cy="52" r="7" fill="#111"/>
      <!-- face -->
      <ellipse cx="55" cy="55" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="35" y="49" width="16" height="11" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="59" y="49" width="16" height="11" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="51" y1="54" x2="59" y2="54" stroke="#111" stroke-width="2.5"/>
      <circle cx="43" cy="54.5" r="2.1" fill="#111"/>
      <circle cx="67" cy="54.5" r="2.1" fill="#111"/>
      <path d="M47 72 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="25" x2="50" y2="11" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="9" r="3" fill="#111"/>
      <rect x="20" y="25" width="60" height="50" rx="7" fill="#d7dde1" stroke="#111" stroke-width="3"/>
      <rect x="29" y="38" width="15" height="7" rx="3.5" fill="#aeb6bb" stroke="#111" stroke-width="2"/>
      <rect x="56" y="38" width="15" height="7" rx="3.5" fill="#aeb6bb" stroke="#111" stroke-width="2"/>
      <rect x="33" y="56" width="34" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="56" x2="40" y2="67" stroke="#111" stroke-width="1.4"/>
      <line x1="47" y1="56" x2="47" y2="67" stroke="#111" stroke-width="1.4"/>
      <line x1="54" y1="56" x2="54" y2="67" stroke="#111" stroke-width="1.4"/>
      <line x1="61" y1="56" x2="61" y2="67" stroke="#111" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ============ PANEL FRAMES ============ -->
  <rect x="1.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <rect x="415.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <rect x="829.5" y="7.5" width="397" height="325" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

  <!-- ============ PANEL 1 ============ -->
  <g clip-path="none">
    <!-- desk -->
    <line x1="12" y1="300" x2="388" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="12" y1="300" x2="12" y2="330" stroke="#111" stroke-width="2"/>
    <!-- monitor -->
    <rect x="40" y="150" width="150" height="120" rx="7" fill="#111"/>
    <rect x="47" y="157" width="136" height="98" rx="4" fill="#e9edf0" stroke="#111" stroke-width="2"/>
    <!-- screen glow hatch -->
    <line x1="52" y1="250" x2="70" y2="232" stroke="#c3ccd2" stroke-width="1.5"/>
    <line x1="52" y1="240" x2="62" y2="230" stroke="#c3ccd2" stroke-width="1.5"/>
    <line x1="160" y1="250" x2="178" y2="232" stroke="#c3ccd2" stroke-width="1.5"/>
    <path d="M95 270 h40 v14 h-40 z" fill="#111"/>
    <path d="M85 284 h60 v6 h-60 z" fill="#111"/>
    <use href="#clanker" x="70" y="163" width="88" height="88"/>
    <!-- Dailbert seated -->
    <use href="#dailbert" x="238" y="98" width="150" height="212"/>

    <!-- Clanker balloon (screen-edged, dashed connector) -->
    <path d="M108 92 L128 182" stroke="#111" stroke-width="1.4" stroke-dasharray="3 4"/>
    <rect x="16" y="18" width="182" height="70" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="20" y="22" width="174" height="62" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="107" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">You said you</text>
    <text x="107" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">needed to think.</text>

    <!-- Dailbert balloon -->
    <path d="M300 88 L312 150 L328 90 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="244" y="20" width="150" height="72" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="319" y="50" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">It declined</text>
    <text x="319" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">all my meetings.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <line x1="426" y1="300" x2="802" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="802" y1="300" x2="802" y2="330" stroke="#111" stroke-width="2"/>
    <use href="#doug" x="444" y="110" width="150" height="205"/>
    <use href="#mug" x="524" y="214" width="46" height="44"/>
    <use href="#dailbert" x="630" y="118" width="140" height="200"/>

    <!-- Doug balloon -->
    <path d="M508 88 L522 176 L536 90 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="430" y="18" width="178" height="72" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="519" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">Got mine too.</text>
    <text x="519" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">I never asked.</text>

    <!-- Dailbert balloon -->
    <path d="M690 82 L700 158 L714 84 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="652" y="30" width="150" height="54" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="727" y="63" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">So now what?</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <line x1="840" y1="300" x2="1216" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="840" y1="300" x2="840" y2="330" stroke="#111" stroke-width="2"/>
    <!-- Priya at a laptop, winning -->
    <rect x="905" y="272" width="86" height="10" rx="2" fill="#111"/>
    <path d="M915 272 l6 -30 h54 l6 30 z" fill="#e9edf0" stroke="#111" stroke-width="2"/>
    <use href="#priya" x="870" y="102" width="150" height="216"/>
    <use href="#dailbert" x="1052" y="132" width="130" height="188"/>

    <!-- Priya balloon -->
    <path d="M932 96 L946 172 L960 98 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="846" y="16" width="208" height="82" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="950" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">Set it recurring.</text>
    <text x="950" y="62" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">It won't argue</text>
    <text x="950" y="82" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">with those.</text>

    <!-- Dailbert balloon -->
    <path d="M1108 84 L1116 162 L1128 86 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="1072" y="42" width="132" height="46" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="1138" y="71" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111">...That easy.</text>
  </g>
</svg>