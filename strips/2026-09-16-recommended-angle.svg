<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Recommended Angle</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-16</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="42" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 7 q10 -10 5 4 q-3 6 3 4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="42" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 78 L80 78 L92 150 L28 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 L54 100 L60 108 L66 100 Z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="88" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="46" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="42" r="3" fill="#111"/>
      <circle cx="73" cy="42" r="3" fill="#111"/>
      <path d="M44 56 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 82 L82 82 L92 150 L28 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M30 34 q-4 -22 30 -24 q34 2 30 24 q6 8 -6 12 l-48 0 q-12 -4 -6 -12 Z" fill="#111"/>
      <ellipse cx="60" cy="46" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 30 q-2 -16 26 -18 q28 2 26 18 q-8 -6 -26 -6 q-18 0 -26 6 Z" fill="#111"/>
      <rect x="40" y="40" width="18" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="62" y="40" width="18" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M50 64 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 80 L80 80 L90 150 L30 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- CLANKER (inside a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="28" y="30" width="64" height="54" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="13" r="4" fill="#111"/>
      <rect x="37" y="44" width="16" height="9" rx="2" fill="#111"/>
      <rect x="67" y="44" width="16" height="9" rx="2" fill="#111"/>
      <g stroke="#111" stroke-width="2.5" stroke-linecap="round">
        <line x1="39" y1="70" x2="81" y2="70"/>
        <line x1="45" y1="64" x2="45" y2="76"/>
        <line x1="54" y1="64" x2="54" y2="76"/>
        <line x1="63" y1="64" x2="63" y2="76"/>
        <line x1="72" y1="64" x2="72" y2="76"/>
      </g>
    </symbol>
  </defs>

  <!-- ============================================================= -->
  <!-- PANEL 1 -->
  <!-- ============================================================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <line x1="3" y1="300" x2="397" y2="300" stroke="#111" stroke-width="2"/>

      <!-- clock, just before 3 -->
      <circle cx="345" cy="45" r="22" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="345" y1="45" x2="345" y2="30" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="345" y1="45" x2="356" y2="52" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Dailbert upright in a normal chair -->
      <rect x="60" y="200" width="70" height="14" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="118" y="150" width="14" height="60" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="95" y1="214" x2="95" y2="300" stroke="#111" stroke-width="2.5"/>
      <line x1="70" y1="300" x2="120" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <use href="#dailbert" x="30" y="90" width="120" height="200"/>

      <!-- monitor showing the clanker -->
      <rect x="210" y="150" width="130" height="90" rx="6" fill="#dad6cc" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="215" y="150" width="120" height="120"/>
      <rect x="255" y="240" width="40" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="240" y="250" width="70" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

      <!-- clanker balloon -->
      <line x1="210" y1="118" x2="270" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="4 3"/>
      <rect x="55" y="55" width="165" height="64" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="137" y="78" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I enabled auto-rest</text>
      <text x="137" y="96" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">posture. The chairs</text>
      <text x="137" y="114" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">will find the angle.</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- PANEL 2 -->
  <!-- ============================================================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <line x1="417" y1="300" x2="811" y2="300" stroke="#111" stroke-width="2"/>

      <!-- clock at 3 -->
      <circle cx="760" cy="45" r="22" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="760" y1="45" x2="760" y2="30" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="760" y1="45" x2="772" y2="45" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- DOUG reclined back like a dentist patient -->
      <g transform="translate(560,155) rotate(-42)">
        <rect x="-72" y="50" width="82" height="14" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <rect x="-72" y="-42" width="14" height="96" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <use href="#doug" x="-66" y="-72" width="120" height="200"/>
      </g>
      <line x1="545" y1="205" x2="545" y2="300" stroke="#111" stroke-width="2.5"/>
      <line x1="520" y1="300" x2="570" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- DAILBERT reclined behind -->
      <g transform="translate(735,150) rotate(-42)">
        <rect x="-72" y="50" width="82" height="14" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <rect x="-72" y="-42" width="14" height="96" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <use href="#dailbert" x="-66" y="-74" width="120" height="200"/>
      </g>
      <line x1="716" y1="200" x2="716" y2="300" stroke="#111" stroke-width="2.5"/>
      <line x1="691" y1="300" x2="741" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- motion arc over the tipping row -->
      <path d="M600 92 q16 -11 30 0" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="3 3"/>

      <!-- Doug's mug drifting off his chest, still level -->
      <ellipse cx="470" cy="120" rx="13" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M483 114 q10 4 0 12" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="467" y1="114" x2="467" y2="124" stroke="#111" stroke-width="1.4"/>
      <path d="M462 108 q3 -6 8 -3" fill="none" stroke="#111" stroke-width="1.4"/>

      <!-- Doug balloon -->
      <path d="M448 195 q0 -8 8 -8 h108 q8 0 8 8 v34 q0 8 -8 8 h-66 l-12 13 l0 -13 h-30 q-8 0 -8 -8 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="510" y="211" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I can see the</text>
      <text x="510" y="229" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">ceiling tiles now.</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- PANEL 3 -->
  <!-- ============================================================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <line x1="831" y1="300" x2="1225" y2="300" stroke="#111" stroke-width="2"/>

      <!-- BACKGROUND: the reclined row, small -->
      <g opacity="0.85">
        <g transform="translate(898,122) rotate(-42) scale(0.6)">
          <rect x="-72" y="50" width="82" height="14" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
          <rect x="-72" y="-42" width="14" height="96" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
          <use href="#doug" x="-66" y="-72" width="120" height="200"/>
        </g>
        <line x1="882" y1="167" x2="882" y2="230" stroke="#111" stroke-width="2"/>
        <line x1="866" y1="230" x2="898" y2="230" stroke="#111" stroke-width="2" stroke-linecap="round"/>

        <g transform="translate(988,118) rotate(-42) scale(0.6)">
          <rect x="-72" y="50" width="82" height="14" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
          <rect x="-72" y="-42" width="14" height="96" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
          <use href="#dailbert" x="-66" y="-74" width="120" height="200"/>
        </g>
        <line x1="975" y1="163" x2="975" y2="230" stroke="#111" stroke-width="2"/>
        <line x1="959" y1="230" x2="991" y2="230" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- FOREGROUND: PRIYA bolt upright on a plain stool -->
      <ellipse cx="1090" cy="238" rx="34" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="1066" y1="242" x2="1052" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="1114" y1="242" x2="1128" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="1090" y1="245" x2="1090" y2="300" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="1066" y1="270" x2="1114" y2="270" stroke="#111" stroke-width="2"/>

      <use href="#priya" x="1030" y="86" width="120" height="200"/>

      <!-- laptop on her lap -->
      <g transform="translate(1088,206)">
        <rect x="-30" y="-30" width="60" height="40" rx="3" fill="#dad6cc" stroke="#111" stroke-width="2.5"/>
        <rect x="-34" y="10" width="72" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <text x="0" y="-6" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">SHIP</text>
      </g>

      <!-- Priya balloon -->
      <path d="M905 58 q0 -8 8 -8 h150 q8 0 8 8 v34 q0 8 -8 8 h-92 l-14 13 l2 -13 h-46 q-8 0 -8 -8 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="988" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Stools don't have</text>
      <text x="988" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">an opinion.</text>

      <!-- Dailbert's voice drifting up from the reclined row -->
      <path d="M965 248 q0 -6 6 -6 h108 q6 0 6 6 v20 q0 6 -6 6 h-78 l-10 10 l0 -10 h-20 q-6 0 -6 -6 Z" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <text x="1025" y="264" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Mine does now.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>