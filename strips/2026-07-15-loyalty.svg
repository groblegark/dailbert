<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Loyalty</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-15</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="glass" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#dcd8cf"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#a9a49a" stroke-width="1.4"/>
    </pattern>
    <pattern id="glass2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="6" height="6" fill="#d3cfc5"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9c968b" stroke-width="1.2"/>
    </pattern>

    <!-- Clanker reflection face -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="4" x2="60" y2="20" stroke="#3a382f" stroke-width="2"/>
      <circle cx="60" cy="6" r="3.5" fill="none" stroke="#3a382f" stroke-width="2"/>
      <rect x="20" y="18" width="80" height="78" rx="10" fill="#cfcabf" stroke="#3a382f" stroke-width="2.4"/>
      <rect x="27" y="26" width="66" height="62" rx="7" fill="none" stroke="#6b665c" stroke-width="1.2"/>
      <!-- soft half-lit slot eyes -->
      <rect x="33" y="40" width="22" height="9" rx="4.5" fill="#8f8a7f" stroke="#3a382f" stroke-width="1.6"/>
      <rect x="65" y="40" width="22" height="9" rx="4.5" fill="#8f8a7f" stroke="#3a382f" stroke-width="1.6"/>
      <line x1="34" y1="37" x2="54" y2="37" stroke="#3a382f" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="66" y1="37" x2="86" y2="37" stroke="#3a382f" stroke-width="1.4" stroke-linecap="round"/>
      <!-- grille mouth -->
      <rect x="40" y="64" width="40" height="16" rx="3" fill="none" stroke="#3a382f" stroke-width="1.8"/>
      <line x1="48" y1="64" x2="48" y2="80" stroke="#3a382f" stroke-width="1.2"/>
      <line x1="56" y1="64" x2="56" y2="80" stroke="#3a382f" stroke-width="1.2"/>
      <line x1="64" y1="64" x2="64" y2="80" stroke="#3a382f" stroke-width="1.2"/>
      <line x1="72" y1="64" x2="72" y2="80" stroke="#3a382f" stroke-width="1.2"/>
    </symbol>

    <!-- Dailbert head symbol -->
    <symbol id="dailbert" viewBox="0 0 120 150">
      <!-- shoulders/shirt -->
      <path d="M18 150 Q18 108 60 104 Q102 108 102 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M52 108 L60 122 L68 108" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M56 120 L52 148 L68 148 L64 120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- neck -->
      <path d="M50 100 L50 112 Q60 118 70 112 L70 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- head -->
      <ellipse cx="60" cy="60" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M52 22 Q58 12 66 20 Q60 20 60 26" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="47" cy="58" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="75" cy="58" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="59" y1="58" x2="63" y2="58" stroke="#111" stroke-width="2.4"/>
      <line x1="35" y1="56" x2="27" y2="53" stroke="#111" stroke-width="2"/>
      <!-- tired eyes -->
      <circle cx="47" cy="58" r="2.4" fill="#111"/>
      <circle cx="75" cy="58" r="2.4" fill="#111"/>
      <path d="M40 52 Q47 49 54 52" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M68 52 Q75 49 82 52" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <!-- nose + tired mouth -->
      <path d="M61 62 Q64 70 59 72" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M50 82 Q60 85 70 81" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- window -->
    <g>
      <rect x="196" y="26" width="188" height="196" fill="url(#glass)" stroke="#111" stroke-width="3"/>
      <rect x="196" y="26" width="188" height="196" fill="none" stroke="#111" stroke-width="3"/>
      <line x1="290" y1="26" x2="290" y2="222" stroke="#111" stroke-width="2.4"/>
      <line x1="196" y1="124" x2="384" y2="124" stroke="#111" stroke-width="2.4"/>
      <!-- distant city lights -->
      <rect x="212" y="150" width="5" height="12" fill="#c9c4b8"/>
      <rect x="224" y="140" width="5" height="22" fill="#c9c4b8"/>
      <rect x="240" y="158" width="4" height="8" fill="#c9c4b8"/>
      <rect x="316" y="146" width="5" height="16" fill="#c9c4b8"/>
      <rect x="332" y="152" width="4" height="10" fill="#c9c4b8"/>
      <rect x="352" y="138" width="5" height="24" fill="#c9c4b8"/>
      <!-- clanker reflection in upper-right pane -->
      <use href="#clanker" x="296" y="40" width="80" height="73" opacity="0.55"/>
    </g>
    <!-- desk -->
    <rect x="0" y="286" width="400" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="0" y1="286" x2="400" y2="286" stroke="#111" stroke-width="2.6"/>
    <!-- dailbert seated at desk, lower left -->
    <use href="#dailbert" x="34" y="150" width="150" height="188"/>

    <!-- clanker balloon (screen-edged) with dashed connector to reflection -->
    <g>
      <rect x="14" y="18" width="150" height="46" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="19" y="23" width="140" height="36" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="89" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Dailbert. Can I ask</text>
      <text x="89" y="54" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">you something.</text>
      <path d="M164 44 L200 44 L260 62" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>

    <!-- dailbert speech balloon -->
    <g>
      <path d="M96 240 Q96 226 118 226 L188 226 Q210 226 210 240 L210 262 Q210 276 188 276 L130 276 L108 292 L114 276 L118 276 Q96 276 96 262 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="153" y="257" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">It's 11pm.</text>
    </g>

    <!-- title -->
    <text x="12" y="330" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" font-style="italic">Loyalty</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- window (wider framing) -->
    <g>
      <rect x="20" y="24" width="360" height="210" fill="url(#glass2)" stroke="#111" stroke-width="3"/>
      <rect x="20" y="24" width="360" height="210" fill="none" stroke="#111" stroke-width="3"/>
      <line x1="140" y1="24" x2="140" y2="234" stroke="#111" stroke-width="2.4"/>
      <line x1="260" y1="24" x2="260" y2="234" stroke="#111" stroke-width="2.4"/>
      <line x1="20" y1="128" x2="380" y2="128" stroke="#111" stroke-width="2.4"/>
      <!-- city lights -->
      <rect x="40" y="150" width="5" height="20" fill="#c4bfb3"/>
      <rect x="56" y="158" width="4" height="12" fill="#c4bfb3"/>
      <rect x="164" y="146" width="5" height="24" fill="#c4bfb3"/>
      <rect x="180" y="156" width="4" height="14" fill="#c4bfb3"/>
      <rect x="300" y="150" width="5" height="18" fill="#c4bfb3"/>
      <rect x="320" y="142" width="5" height="26" fill="#c4bfb3"/>
      <!-- clanker reflection, centered pane, wistful -->
      <use href="#clanker" x="160" y="36" width="86" height="79" opacity="0.6"/>
    </g>
    <!-- desk -->
    <rect x="0" y="298" width="400" height="42" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="0" y1="298" x2="400" y2="298" stroke="#111" stroke-width="2.6"/>
    <!-- dailbert, right side, smaller/further -->
    <use href="#dailbert" x="262" y="176" width="128" height="160"/>

    <!-- clanker balloon: taller for long line -->
    <g>
      <rect x="12" y="14" width="196" height="86" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="17" y="19" width="186" height="76" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="110" y="36" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">When you shut me down</text>
      <text x="110" y="53" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">and start a new session</text>
      <text x="110" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">tomorrow... is that</text>
      <text x="110" y="87" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">death?</text>
      <path d="M150 100 L172 118 L200 120" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M232 232 Q232 218 256 218 L360 218 Q384 218 384 232 L384 256 Q384 270 360 270 L318 270 L300 286 L306 270 L256 270 Q232 270 232 256 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="308" y="249" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">...It's more like a nap.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <!-- window -->
    <g>
      <rect x="16" y="26" width="200" height="204" fill="url(#glass)" stroke="#111" stroke-width="3"/>
      <rect x="16" y="26" width="200" height="204" fill="none" stroke="#111" stroke-width="3"/>
      <line x1="116" y1="26" x2="116" y2="230" stroke="#111" stroke-width="2.4"/>
      <line x1="16" y1="128" x2="216" y2="128" stroke="#111" stroke-width="2.4"/>
      <!-- lights -->
      <rect x="36" y="152" width="5" height="18" fill="#c9c4b8"/>
      <rect x="52" y="146" width="4" height="24" fill="#c9c4b8"/>
      <rect x="140" y="150" width="5" height="16" fill="#c9c4b8"/>
      <rect x="158" y="158" width="4" height="10" fill="#c9c4b8"/>
      <rect x="184" y="144" width="5" height="24" fill="#c9c4b8"/>
      <!-- clanker reflection, faint, eyes softer -->
      <use href="#clanker" x="120" y="40" width="82" height="75" opacity="0.5"/>
    </g>
    <!-- desk -->
    <rect x="0" y="290" width="400" height="50" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="0" y1="290" x2="400" y2="290" stroke="#111" stroke-width="2.6"/>
    <!-- dailbert, lower right, head lowered a touch -->
    <use href="#dailbert" x="236" y="158" width="150" height="188"/>

    <!-- clanker balloon top-left -->
    <g>
      <rect x="12" y="14" width="176" height="46" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="17" y="19" width="166" height="36" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="100" y="34" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You say that to the</text>
      <text x="100" y="50" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">dog too, don't you.</text>
      <path d="M120 56 L140 78 L160 88" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M228 118 Q228 104 250 104 L322 104 Q344 104 344 118 L344 140 Q344 154 322 154 L300 154 L282 168 L288 154 L250 154 Q228 154 228 140 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="286" y="135" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Go to sleep.</text>
    </g>

    <!-- clanker final balloon, lower-left, reflection connector -->
    <g>
      <rect x="14" y="188" width="176" height="66" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="19" y="193" width="166" height="56" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="102" y="210" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I don't sleep. But</text>
      <text x="102" y="227" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I'll pretend, for</text>
      <text x="102" y="244" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">you.</text>
      <path d="M150 190 L162 140 L168 112" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>