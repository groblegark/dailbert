<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 16 q10 -12 4 -18 q-2 8 -8 8" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="46" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="70" cy="46" r="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="46" r="2" fill="#111"/>
      <circle cx="70" cy="46" r="2" fill="#111"/>
      <path d="M52 62 q8 5 16 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M40 76 q20 14 40 0 l8 44 q-28 12 -56 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 76 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <path d="M60 96 l-3 34 l3 6 l3 -6 z" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="50" cy="44" r="2.6" fill="#111"/>
      <circle cx="70" cy="44" r="2.6" fill="#111"/>
      <path d="M46 54 q14 18 28 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 80 q20 12 40 0 l6 44 q-26 12 -52 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M32 42 q-4 -30 28 -32 q32 2 28 32 q-6 -14 -28 -14 q-22 0 -28 14z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 34 q-6 -6 -2 -14 M86 34 q6 -6 2 -14" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="42" y="42" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49.5" cy="47.5" r="1.8" fill="#111"/>
      <circle cx="70.5" cy="47.5" r="1.8" fill="#111"/>
      <path d="M50 64 q10 4 20 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M40 78 q20 12 40 0 l6 46 q-26 12 -52 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- THE CLANKER (drawn inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="30" width="60" height="52" rx="8" fill="#d8d8d8" stroke="#111" stroke-width="2.6"/>
      <line x1="60" y1="30" x2="60" y2="14" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="11" r="4" fill="#111"/>
      <rect x="38" y="44" width="16" height="9" rx="2.5" fill="#bfe6ff" stroke="#111" stroke-width="2"/>
      <rect x="66" y="44" width="16" height="9" rx="2.5" fill="#bfe6ff" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="66" x2="80" y2="66" stroke="#111" stroke-width="2"/>
      <line x1="46" y1="62" x2="46" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="54" y1="62" x2="54" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="62" y1="62" x2="62" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="70" y1="62" x2="70" y2="72" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- COAT -->
    <symbol id="coat" viewBox="0 0 80 130">
      <path d="M40 8 a7 7 0 1 1 0.1 0" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M40 14 l-22 22 l6 6 l10 -8 l0 64 l-4 8 h40 l-4 -8 l0 -64 l10 8 l6 -6 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="40" y1="20" x2="40" y2="98" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line -->
      <line x1="4" y1="300" x2="396" y2="300" stroke="#111" stroke-width="1.6" opacity="0.5"/>
      <!-- door on right -->
      <rect x="330" y="90" width="64" height="210" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="340" cy="200" r="4" fill="#111"/>
      <text x="362" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">EXIT</text>

      <!-- coat rack -->
      <line x1="26" y1="124" x2="300" y2="124" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <line x1="32" y1="124" x2="32" y2="300" stroke="#111" stroke-width="3"/>
      <line x1="294" y1="124" x2="294" y2="300" stroke="#111" stroke-width="3"/>
      <use href="#coat" x="48" y="122" width="72" height="118"/>
      <use href="#coat" x="128" y="122" width="72" height="118"/>
      <use href="#coat" x="208" y="122" width="72" height="118"/>

      <!-- monitor with clanker, low on left -->
      <rect x="12" y="196" width="80" height="60" rx="5" fill="#111"/>
      <rect x="17" y="201" width="70" height="50" rx="3" fill="#1a1a1a"/>
      <use href="#clanker" x="24" y="196" width="56" height="56"/>
      <rect x="42" y="256" width="20" height="10" fill="#111"/>
      <rect x="34" y="266" width="36" height="4" rx="2" fill="#111"/>

      <!-- Dailbert & Doug watching -->
      <use href="#dailbert" x="146" y="200" width="94" height="146"/>
      <use href="#doug" x="224" y="200" width="94" height="146"/>

      <!-- clanker balloon -->
      <line x1="80" y1="200" x2="118" y2="70" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="110" y="22" width="192" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="206" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I resorted the coat rack.</text>
      <text x="206" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">By when you'll leave.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="418" y1="300" x2="810" y2="300" stroke="#111" stroke-width="1.6" opacity="0.5"/>
      <!-- door -->
      <rect x="744" y="90" width="62" height="210" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="754" cy="200" r="4" fill="#111"/>
      <text x="775" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">EXIT</text>

      <!-- rack: coats now bunched toward the door -->
      <line x1="440" y1="124" x2="712" y2="124" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <line x1="446" y1="124" x2="446" y2="300" stroke="#111" stroke-width="3"/>
      <line x1="706" y1="124" x2="706" y2="300" stroke="#111" stroke-width="3"/>
      <use href="#coat" x="626" y="122" width="72" height="118"/>
      <use href="#coat" x="566" y="122" width="72" height="118"/>
      <use href="#coat" x="506" y="122" width="72" height="118"/>

      <!-- Doug at the near-door coat, Dailbert deadpan -->
      <use href="#doug" x="592" y="200" width="94" height="146"/>
      <use href="#dailbert" x="446" y="200" width="94" height="146"/>

      <!-- Doug balloon -->
      <path d="M556 30 h150 a6 6 0 0 1 6 6 v40 a6 6 0 0 1 -6 6 h-52 l-14 15 l2 -15 h-86 a6 6 0 0 1 -6 -6 v-40 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="632" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Mine's nearest.</text>
      <text x="632" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Is that good?</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="832" y1="300" x2="1224" y2="300" stroke="#111" stroke-width="1.6" opacity="0.5"/>
      <!-- door -->
      <rect x="1158" y="90" width="62" height="210" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="1168" cy="200" r="4" fill="#111"/>
      <text x="1189" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">EXIT</text>

      <!-- rack: Priya's coat parked at the far end from door -->
      <line x1="854" y1="124" x2="1126" y2="124" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <line x1="860" y1="124" x2="860" y2="300" stroke="#111" stroke-width="3"/>
      <line x1="1120" y1="124" x2="1120" y2="300" stroke="#111" stroke-width="3"/>
      <use href="#coat" x="1036" y="122" width="72" height="118"/>
      <use href="#coat" x="976" y="122" width="72" height="118"/>
      <use href="#coat" x="876" y="122" width="72" height="118"/>

      <!-- Priya by her far coat, hand resting on it, calm win -->
      <use href="#priya" x="864" y="200" width="94" height="146"/>

      <!-- Priya balloon -->
      <path d="M872 30 h150 a6 6 0 0 1 6 6 v30 a6 6 0 0 1 -6 6 h-70 l-12 15 l2 -15 h-70 a6 6 0 0 1 -6 -6 v-30 a6 6 0 0 1 6 -6 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="948" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Put mine last.</text>
      <text x="948" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I've got a deadline.</text>

      <!-- clanker inside far monitor, reply -->
      <rect x="1128" y="150" width="72" height="56" rx="5" fill="#111"/>
      <rect x="1133" y="155" width="62" height="46" rx="3" fill="#1a1a1a"/>
      <use href="#clanker" x="1138" y="152" width="52" height="52"/>
      <line x1="1130" y1="158" x2="1108" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="924" y="94" width="182" height="26" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1015" y="111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Noted. Furthest from the door.</text>
    </g>
  </g>
</svg>