<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Focus Time</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-31</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= DOUG ================= -->
    <symbol id="doug" viewBox="0 0 160 180">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- shirt -->
        <path d="M33 180 L44 118 Q80 104 116 118 L127 180" fill="#ffffff"/>
        <path d="M70 112 L80 128 L90 112" fill="#ffffff"/>
        <!-- mug at chest -->
        <rect x="60" y="138" width="36" height="26" rx="4" fill="#ffffff"/>
        <path d="M96 144 q12 0 12 9 t-12 8" fill="none"/>
        <!-- hand -->
        <ellipse cx="58" cy="152" rx="8" ry="7" fill="#ffffff"/>
        <!-- head -->
        <circle cx="80" cy="60" r="42" fill="#ffffff"/>
        <circle cx="37" cy="62" r="7" fill="#ffffff"/>
        <circle cx="123" cy="62" r="7" fill="#ffffff"/>
        <!-- hair tufts -->
        <path d="M58 22 q6 -8 12 0"/>
        <path d="M74 18 q6 -8 12 0"/>
        <path d="M90 22 q6 -8 12 0"/>
      </g>
      <circle cx="66" cy="56" r="3.6" fill="#111"/>
      <circle cx="94" cy="56" r="3.6" fill="#111"/>
      <path d="M56 72 Q80 100 104 72 Q80 84 56 72 Z" fill="#111"/>
    </symbol>

    <!-- ================= PRIYA ================= -->
    <symbol id="priya" viewBox="0 0 160 180">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- torso -->
        <path d="M50 180 L55 124 Q80 112 105 124 L110 180" fill="#ffffff"/>
        <!-- rolled sleeves / forearms -->
        <path d="M57 138 L60 180" fill="none"/>
        <path d="M103 138 L100 180" fill="none"/>
        <path d="M50 136 q9 6 18 0" fill="none"/>
        <path d="M92 136 q9 6 18 0" fill="none"/>
        <!-- hands to keyboard -->
        <ellipse cx="60" cy="180" rx="9" ry="6" fill="#ffffff"/>
        <ellipse cx="100" cy="180" rx="9" ry="6" fill="#ffffff"/>
        <!-- head -->
        <ellipse cx="80" cy="60" rx="31" ry="35" fill="#ffffff"/>
      </g>
      <!-- dark curly hair -->
      <g fill="#111" stroke="#111" stroke-width="1">
        <circle cx="80" cy="16" r="11"/>
        <circle cx="55" cy="30" r="14"/>
        <circle cx="80" cy="24" r="15"/>
        <circle cx="105" cy="30" r="14"/>
        <circle cx="49" cy="48" r="9"/>
        <circle cx="111" cy="48" r="9"/>
      </g>
      <!-- glasses -->
      <g fill="#ffffff" stroke="#111" stroke-width="2.4">
        <rect x="57" y="52" width="19" height="13" rx="2.5"/>
        <rect x="84" y="52" width="19" height="13" rx="2.5"/>
      </g>
      <line x1="76" y1="58" x2="84" y2="58" stroke="#111" stroke-width="2.4"/>
      <circle cx="66.5" cy="58.5" r="2.6" fill="#111"/>
      <circle cx="93.5" cy="58.5" r="2.6" fill="#111"/>
      <line x1="70" y1="82" x2="90" y2="82" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- ================= DAILBERT ================= -->
    <symbol id="dailbert" viewBox="0 0 140 180">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M40 180 L48 120 Q70 108 92 120 L100 180" fill="#ffffff"/>
        <path d="M62 116 L70 150 L78 116" fill="#ffffff"/>
        <ellipse cx="70" cy="58" rx="30" ry="34" fill="#ffffff"/>
        <circle cx="42" cy="60" r="6" fill="#ffffff"/>
        <circle cx="98" cy="60" r="6" fill="#ffffff"/>
        <!-- hair curl -->
        <path d="M70 24 q14 -6 8 8 q-4 8 6 4"/>
      </g>
      <g fill="#ffffff" stroke="#111" stroke-width="2.4">
        <circle cx="58" cy="58" r="11"/>
        <circle cx="82" cy="58" r="11"/>
      </g>
      <line x1="69" y1="58" x2="71" y2="58" stroke="#111" stroke-width="2.4"/>
      <circle cx="58" cy="58" r="2.6" fill="#111"/>
      <circle cx="82" cy="58" r="2.6" fill="#111"/>
      <line x1="60" y1="82" x2="80" y2="82" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ================= CLANKER FACE ================= -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
        <line x1="50" y1="18" x2="50" y2="7" fill="none"/>
        <circle cx="50" cy="5" r="4" fill="#cfd6da"/>
        <rect x="15" y="17" width="70" height="58" rx="9" fill="#cfd6da"/>
        <!-- glowing slot eyes -->
        <rect x="26" y="34" width="17" height="9" rx="4.5" fill="#111"/>
        <rect x="57" y="34" width="17" height="9" rx="4.5" fill="#111"/>
        <line x1="28" y1="38.5" x2="41" y2="38.5" stroke="#dff3ff" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="59" y1="38.5" x2="72" y2="38.5" stroke="#dff3ff" stroke-width="2.4" stroke-linecap="round"/>
        <!-- grille mouth -->
        <rect x="32" y="55" width="36" height="13" rx="2" fill="#eef2f4"/>
      </g>
      <g stroke="#111" stroke-width="1.6">
        <line x1="39" y1="55" x2="39" y2="68"/>
        <line x1="46" y1="55" x2="46" y2="68"/>
        <line x1="53" y1="55" x2="53" y2="68"/>
        <line x1="60" y1="55" x2="60" y2="68"/>
      </g>
      <circle cx="21" cy="23" r="2" fill="#111"/>
      <circle cx="79" cy="23" r="2" fill="#111"/>
    </symbol>
  </defs>

  <!-- ============================================================ PANEL 1 -->
  <g transform="translate(0,0)">
    <rect x="2" y="6" width="396" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="4" y="8" width="392" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="2.6"/>
      <!-- monitor -->
      <rect x="52" y="204" width="122" height="88" rx="6" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="60" y="212" width="106" height="72" rx="3" fill="#9aa4ab" stroke="#111" stroke-width="2"/>
      <g stroke="#c7ced2" stroke-width="1.4">
        <line x1="64" y1="220" x2="162" y2="220"/>
        <line x1="64" y1="278" x2="162" y2="278"/>
      </g>
      <use href="#clanker" x="72" y="220" width="82" height="60"/>
      <rect x="106" y="292" width="14" height="8" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <rect x="92" y="299" width="42" height="4" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <!-- Doug -->
      <use href="#doug" x="208" y="140" width="170" height="185"/>
      <!-- balloon -->
      <path d="M262 100 L288 150 L240 100 Z" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="96" y="24" width="252" height="80" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <text x="222" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">Clear my afternoon,</text>
      <text x="222" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">would you? I've got</text>
      <text x="222" y="90" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">big thinking to do.</text>
    </g>
  </g>

  <!-- ============================================================ PANEL 2 -->
  <g transform="translate(414,0)">
    <rect x="2" y="6" width="396" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="4" y="8" width="392" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="2.6"/>
      <!-- Dailbert glancing -->
      <use href="#dailbert" x="4" y="176" width="116" height="150"/>
      <!-- monitor center -->
      <rect x="118" y="182" width="150" height="108" rx="6" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="126" y="190" width="134" height="92" rx="3" fill="#9aa4ab" stroke="#111" stroke-width="2"/>
      <g stroke="#c7ced2" stroke-width="1.4">
        <line x1="130" y1="198" x2="256" y2="198"/>
        <line x1="130" y1="276" x2="256" y2="276"/>
      </g>
      <use href="#clanker" x="150" y="200" width="100" height="74"/>
      <rect x="184" y="290" width="16" height="9" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <rect x="166" y="299" width="52" height="4" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <!-- Doug watching -->
      <use href="#doug" x="256" y="176" width="140" height="150"/>
      <!-- clanker screen-balloon -->
      <line x1="196" y1="122" x2="192" y2="182" stroke="#111" stroke-width="2" stroke-dasharray="4 4"/>
      <rect x="30" y="20" width="300" height="96" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="36" y="26" width="288" height="84" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="180" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">Done. To protect your</text>
      <text x="180" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">focus, I marked you</text>
      <text x="180" y="92" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">Busy through August.</text>
      <!-- Doug tiny beat -->
      <path d="M322 168 L332 206 L344 172 Z" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="292" y="132" width="102" height="44" rx="14" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <text x="343" y="150" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">The whole</text>
      <text x="343" y="167" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">month?</text>
    </g>
  </g>

  <!-- ============================================================ PANEL 3 -->
  <g transform="translate(828,0)">
    <rect x="2" y="6" width="396" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="4" y="8" width="392" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="8" y1="300" x2="392" y2="300" stroke="#111" stroke-width="2.6"/>
      <!-- monitor calm -->
      <rect x="30" y="196" width="104" height="78" rx="6" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="37" y="203" width="90" height="64" rx="3" fill="#c4ccd0" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="52" y="210" width="60" height="46"/>
      <rect x="74" y="274" width="14" height="7" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <rect x="60" y="281" width="42" height="4" fill="#ffffff" stroke="#111" stroke-width="2.2"/>
      <!-- keyboard -->
      <rect x="120" y="286" width="150" height="14" rx="3" fill="#ffffff" stroke="#111" stroke-width="2.4"/>
      <g stroke="#111" stroke-width="1.2">
        <line x1="132" y1="286" x2="132" y2="300"/><line x1="150" y1="286" x2="150" y2="300"/>
        <line x1="168" y1="286" x2="168" y2="300"/><line x1="186" y1="286" x2="186" y2="300"/>
        <line x1="204" y1="286" x2="204" y2="300"/><line x1="222" y1="286" x2="222" y2="300"/>
        <line x1="240" y1="286" x2="240" y2="300"/><line x1="258" y1="286" x2="258" y2="300"/>
      </g>
      <!-- Priya -->
      <use href="#priya" x="98" y="150" width="150" height="150"/>
      <!-- Doug with mug -->
      <use href="#doug" x="248" y="164" width="148" height="162"/>
      <!-- Priya balloon -->
      <path d="M150 66 L160 118 L176 70 Z" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="58" y="22" width="164" height="48" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <text x="140" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">Fixed. Just today.</text>
      <!-- Doug button balloon -->
      <path d="M316 120 L326 200 L340 124 Z" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <rect x="234" y="30" width="158" height="94" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.6"/>
      <text x="313" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">For a second there</text>
      <text x="313" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">nobody needed a</text>
      <text x="313" y="90" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">thing from me.</text>
      <text x="313" y="112" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">...Kinda nice.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>