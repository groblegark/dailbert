<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q6 -8 2 -14 q9 4 4 14" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="42" x2="64" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="42" r="1.6" fill="#111"/>
      <circle cx="72" cy="42" r="1.6" fill="#111"/>
      <path d="M52 60 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 74 q20 14 40 0 l8 60 h-56 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 74 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <rect x="56" y="94" width="8" height="30" fill="#111"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="40" r="2.4" fill="#111"/>
      <circle cx="73" cy="40" r="2.4" fill="#111"/>
      <path d="M44 52 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 78 q20 12 40 0 l6 56 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="80" y="98" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M102 102 q10 2 0 12" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M86 98 q6 -8 12 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <line x1="74" y1="110" x2="82" y2="106" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair up in a bun -->
      <path d="M31 40 q-6 -30 29 -33 q35 3 29 33 q-6 -14 -14 -16 q4 8 -2 12 q-2 -12 -13 -12 q-11 0 -13 12 q-6 -4 -2 -12 q-8 2 -14 16z" fill="#111"/>
      <circle cx="60" cy="6" r="7" fill="#111"/>
      <rect x="42" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="62" y="38" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="43" x2="62" y2="43" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="44" r="1.6" fill="#111"/>
      <circle cx="70" cy="44" r="1.6" fill="#111"/>
      <path d="M52 62 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M40 76 q20 12 40 0 l7 58 h-54 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="30" y1="106" x2="40" y2="86" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 86 l-3 8" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE CLANKER (surface-only) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="26" y="30" width="68" height="58" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="14" r="4" fill="#111"/>
      <rect x="36" y="44" width="18" height="10" rx="2" fill="#111"/>
      <rect x="66" y="44" width="18" height="10" rx="2" fill="#111"/>
      <g stroke="#111" stroke-width="2.2">
        <line x1="38" y1="70" x2="82" y2="70"/>
        <line x1="44" y1="64" x2="44" y2="76"/>
        <line x1="54" y1="64" x2="54" y2="76"/>
        <line x1="64" y1="64" x2="64" y2="76"/>
        <line x1="74" y1="64" x2="74" y2="76"/>
      </g>
    </symbol>

    <!-- a single printed sheet -->
    <symbol id="sheet" viewBox="0 0 40 52">
      <rect x="2" y="2" width="36" height="48" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="9" y1="14" x2="31" y2="14" stroke="#111" stroke-width="1.6"/>
      <line x1="9" y1="20" x2="27" y2="20" stroke="#111" stroke-width="1.2"/>
    </symbol>
  </defs>

  <!-- paper backdrop -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- office printer -->
    <rect x="40" y="150" width="150" height="120" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- paper tray lip -->
    <rect x="52" y="150" width="126" height="12" rx="3" fill="#111"/>
    <!-- status LCD on the printer (clanker surface) -->
    <rect x="150" y="176" width="30" height="22" rx="3" fill="#e7e3d9" stroke="#111" stroke-width="2"/>
    <!-- output slot -->
    <rect x="58" y="196" width="112" height="8" rx="2" fill="#111"/>
    <!-- endless spilling stack of sheets from the slot -->
    <use href="#sheet" x="60" y="204" width="40" height="52"/>
    <use href="#sheet" x="88" y="212" width="40" height="52"/>
    <use href="#sheet" x="116" y="206" width="40" height="52"/>
    <use href="#sheet" x="72" y="240" width="40" height="52"/>
    <use href="#sheet" x="104" y="244" width="40" height="52"/>
    <use href="#sheet" x="48" y="252" width="40" height="52"/>
    <use href="#sheet" x="134" y="240" width="40" height="52"/>

    <!-- Doug staring at the printer -->
    <use href="#doug" x="238" y="150" width="120" height="160"/>

    <!-- clanker inside the LCD -->
    <use href="#clanker" x="150" y="168" width="34" height="34"/>
    <!-- clanker balloon: rectangular, dashed line to LCD surface -->
    <line x1="176" y1="180" x2="212" y2="70" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="196" y="24" width="180" height="50" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="286" y="43" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Added a cover sheet</text>
    <text x="286" y="61" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">so nothing gets lost.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Dailbert, exasperated, a fat ream at his side -->
    <use href="#dailbert" x="446" y="150" width="120" height="160"/>
    <!-- the ream held low, beside him, not over his face -->
    <g>
      <rect x="520" y="248" width="58" height="56" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="520" y1="260" x2="578" y2="260" stroke="#111" stroke-width="1.4"/>
      <line x1="520" y1="272" x2="578" y2="272" stroke="#111" stroke-width="1.4"/>
      <line x1="520" y1="284" x2="578" y2="284" stroke="#111" stroke-width="1.4"/>
      <line x1="520" y1="296" x2="578" y2="296" stroke="#111" stroke-width="1.4"/>
      <text x="549" y="240" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" fill="#111">400 pgs</text>
    </g>

    <!-- Doug at right with mug, dark monitor behind holding clanker -->
    <use href="#doug" x="636" y="152" width="120" height="160"/>
    <!-- dead monitor on a stand as clanker surface -->
    <rect x="726" y="188" width="66" height="50" rx="4" fill="#cfc9ba" stroke="#111" stroke-width="2.5"/>
    <rect x="752" y="238" width="14" height="12" fill="#111"/>
    <rect x="740" y="250" width="38" height="6" rx="2" fill="#111"/>
    <use href="#clanker" x="728" y="184" width="60" height="60"/>

    <!-- Dailbert balloon -->
    <path d="M446 40 q0 -12 12 -12 h150 q12 0 12 12 v34 q0 12 -12 12 h-96 l-12 16 l-2 -16 h-42 q-12 0 -12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="533" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Every sheet is a cover</text>
    <text x="533" y="76" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">sheet for the next one.</text>

    <!-- clanker reply balloon, dashed to monitor -->
    <line x1="758" y1="196" x2="738" y2="118" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="622" y="94" width="184" height="28" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="714" y="112" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">None of them are lost.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Priya at her desk, calmly holding one single sheet -->
    <use href="#priya" x="1000" y="150" width="120" height="160"/>
    <!-- the single sheet in her hand -->
    <use href="#sheet" x="1042" y="214" width="44" height="58"/>

    <!-- her laptop on the desk, plus the dying desk plant -->
    <rect x="866" y="252" width="330" height="8" fill="#111"/>
    <!-- laptop -->
    <path d="M888 216 l6 -34 h56 l6 34 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="882" y="216" width="74" height="8" rx="2" fill="#111"/>
    <rect x="898" y="188" width="40" height="24" rx="2" fill="#e7e3d9" stroke="#111" stroke-width="1.6"/>
    <!-- dying desk plant on the desk -->
    <path d="M962 252 l6 -22 h20 l6 22 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M972 230 q-8 -14 -14 -12 M978 230 q0 -18 2 -22 M984 230 q8 -12 12 -16" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <path d="M958 218 l4 4 M980 208 l3 -4 M996 214 l4 3" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Priya balloon -->
    <path d="M932 40 q0 -12 12 -12 h150 q12 0 12 12 v32 q0 12 -12 12 h-58 l-10 14 l-2 -14 h-80 q-12 0 -12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1020" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I printed mine at home.</text>
    <text x="1020" y="76" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">One page. No escort.</text>

    <!-- Doug's small button, off-panel voice from the left edge -->
    <path d="M844 118 q0 -10 10 -10 h124 q10 0 10 10 v22 q0 10 -10 10 h-70 l-10 14 l-2 -14 h-42 q-10 0 -10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <text x="916" y="134" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">Mine came with</text>
    <text x="916" y="149" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">three hundred friends.</text>
  </g>
</svg>