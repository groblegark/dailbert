      <path d="M448 118 q0 -14 16 -14 L588 104 q16 0 16 14 l0 30 q0 14 -16 14 L512 148 L500 176 L494 148 L464 148 q-16 0 -16 -14 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
