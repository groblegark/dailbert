<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Handled</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2029-05-30</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- hair curl -->
        <path d="M50 20 q6 -12 16 -6 q-8 2 -6 10" fill="#111" stroke="none"/>
        <!-- head -->
        <ellipse cx="60" cy="45" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- glasses -->
        <circle cx="49" cy="44" r="9" fill="#f4f1ea"/>
        <circle cx="71" cy="44" r="9" fill="#f4f1ea"/>
        <line x1="58" y1="44" x2="62" y2="44"/>
        <!-- eyes -->
        <circle cx="49" cy="44" r="2" fill="#111" stroke="none"/>
        <circle cx="71" cy="44" r="2" fill="#111" stroke="none"/>
        <!-- weary brows -->
        <line x1="42" y1="35" x2="53" y2="37"/>
        <line x1="78" y1="35" x2="67" y2="37"/>
        <!-- deadpan mouth -->
        <line x1="52" y1="62" x2="68" y2="62"/>
        <!-- neck / collar -->
        <path d="M50 76 l0 8 M70 76 l0 8"/>
        <path d="M44 90 l16 10 l16 -10"/>
        <!-- tie -->
        <path d="M60 100 l-5 8 l5 22 l5 -22 z" fill="#111" stroke="none"/>
        <!-- shoulders -->
        <path d="M30 96 q30 -14 60 0 l6 60 l-72 0 z" fill="#f4f1ea"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- hair tuft -->
        <path d="M52 16 q8 -8 14 0" />
        <path d="M60 12 l0 8"/>
        <!-- round head -->
        <circle cx="60" cy="46" r="33" fill="#f4f1ea"/>
        <!-- dot eyes -->
        <circle cx="50" cy="42" r="2.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="42" r="2.6" fill="#111" stroke="none"/>
        <!-- big grin -->
        <path d="M44 56 q16 18 34 0" />
        <!-- shoulders -->
        <path d="M30 96 q30 -12 60 0 l6 60 l-72 0 z" fill="#f4f1ea"/>
        <!-- mug in hand -->
        <g>
          <rect x="82" y="112" width="26" height="24" rx="3" fill="#f4f1ea"/>
          <path d="M108 116 q10 2 0 14"/>
          <path d="M86 116 q3 -5 8 0" opacity="0.7"/>
          <!-- hand -->
          <path d="M74 128 q8 -2 12 4" />
        </g>
      </g>
    </symbol>

    <!-- BOSS (unused here but defined) -->
    <symbol id="boss" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M40 22 l8 -18 l6 20 M80 22 l-8 -18 l-6 20" fill="#111" stroke="#111"/>
        <ellipse cx="60" cy="46" rx="30" ry="32" fill="#f4f1ea"/>
        <circle cx="51" cy="46" r="1.6" fill="#111" stroke="none"/>
        <circle cx="69" cy="46" r="1.6" fill="#111" stroke="none"/>
        <line x1="52" y1="62" x2="68" y2="62"/>
        <path d="M30 96 q30 -14 60 0 l6 60 l-72 0 z" fill="#f4f1ea"/>
        <path d="M60 96 l-6 10 l6 20 l6 -20 z" fill="#111" stroke="none"/>
      </g>
    </symbol>

    <!-- THE CLANKER -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <!-- antenna -->
        <line x1="60" y1="20" x2="60" y2="8"/>
        <circle cx="60" cy="6" r="3" fill="#111" stroke="none"/>
        <!-- head box -->
        <rect x="26" y="20" width="68" height="60" rx="6" fill="#f4f1ea"/>
        <!-- slot eyes (glowing) -->
        <rect x="34" y="34" width="22" height="10" rx="2" fill="#111"/>
        <rect x="64" y="34" width="22" height="10" rx="2" fill="#111"/>
        <line x1="34" y1="39" x2="56" y2="39" stroke="#f4f1ea" stroke-width="3"/>
        <line x1="64" y1="39" x2="86" y2="39" stroke="#f4f1ea" stroke-width="3"/>
        <!-- grille mouth -->
        <rect x="40" y="58" width="40" height="14" rx="2" fill="#f4f1ea"/>
        <line x1="47" y1="58" x2="47" y2="72"/>
        <line x1="54" y1="58" x2="54" y2="72"/>
        <line x1="61" y1="58" x2="61" y2="72"/>
        <line x1="68" y1="58" x2="68" y2="72"/>
        <line x1="73" y1="58" x2="73" y2="72"/>
        <!-- bolts -->
        <circle cx="32" cy="26" r="1.6" fill="#111" stroke="none"/>
        <circle cx="88" cy="26" r="1.6" fill="#111" stroke="none"/>
      </g>
    </symbol>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#111" stroke-width="0.5" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- desk -->
    <line x1="14" y1="300" x2="386" y2="300" stroke="#111" stroke-width="2.4"/>
    <!-- monitor with clanker -->
    <g>
      <rect x="238" y="150" width="132" height="104" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="248" y="160" width="112" height="84" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <rect x="248" y="160" width="112" height="84" rx="3" fill="url(#scan)"/>
      <use href="#clanker" x="258" y="164" width="92" height="76"/>
      <!-- stand -->
      <path d="M296 254 l0 16 M276 288 l44 0 M296 270 q-14 0 -20 18 M304 270 q14 0 20 18" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <!-- dailbert -->
    <use href="#dailbert" x="30" y="150" width="120" height="170"/>

    <!-- dailbert balloon -->
    <g>
      <path d="M18 24 h176 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-96 l-14 16 l2 -16 h-72 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="106" y="45" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Standup's cancelled.</text>
      <text x="106" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Permanently.</text>
    </g>

    <!-- clanker screen balloon -->
    <g>
      <rect x="212" y="30" width="176" height="98" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="217" y="35" width="166" height="88" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <line x1="300" y1="128" x2="304" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="300" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">The memo thanked</text>
      <text x="300" y="69" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">everyone for showing</text>
      <text x="300" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">up all these years.</text>
      <text x="300" y="103" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">I proofread it twice.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- office floor line -->
    <line x1="428" y1="304" x2="800" y2="304" stroke="#111" stroke-width="2.4"/>
    <!-- a background cubicle wall + tray -->
    <path d="M600 250 h70 v54 h-70 z" fill="none" stroke="#111" stroke-width="1.6" opacity="0.5"/>
    <line x1="600" y1="266" x2="670" y2="266" stroke="#111" stroke-width="1.4" opacity="0.5"/>
    <!-- doug left holding card in tray -->
    <use href="#doug" x="450" y="150" width="130" height="170"/>
    <!-- little card near doug -->
    <g>
      <rect x="540" y="252" width="40" height="26" rx="2" fill="#fff" stroke="#111" stroke-width="1.6" transform="rotate(-8 560 265)"/>
      <line x1="547" y1="262" x2="573" y2="260" stroke="#111" stroke-width="1" opacity="0.6" transform="rotate(-8 560 265)"/>
    </g>
    <!-- dailbert right -->
    <use href="#dailbert" x="668" y="150" width="120" height="170"/>

    <!-- doug balloon -->
    <g>
      <path d="M430 22 h178 a10 10 0 0 1 10 10 v56 a10 10 0 0 1 -10 10 h-66 l-12 16 l0 -16 h-98 a10 10 0 0 1 -10 -10 v-56 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="519" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Got a card in my tray.</text>
      <text x="519" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">'It's been good having</text>
      <text x="519" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">you here.' No name</text>
      <text x="519" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">on it.</text>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M636 118 h158 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-88 l-14 16 l2 -16 h-58 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="715" y="139" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Everyone got one.</text>
      <text x="715" y="157" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">HR swears it</text>
      <text x="715" y="175" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">wasn't them.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- desk -->
    <line x1="842" y1="300" x2="1214" y2="300" stroke="#111" stroke-width="2.4"/>
    <!-- dailbert seated-ish, left, looking at monitor -->
    <use href="#dailbert" x="852" y="152" width="118" height="168"/>
    <!-- monitor with clanker, right -->
    <g>
      <rect x="1060" y="150" width="132" height="104" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="1070" y="160" width="112" height="84" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <rect x="1070" y="160" width="112" height="84" rx="3" fill="url(#scan)"/>
      <use href="#clanker" x="1080" y="164" width="92" height="76"/>
      <path d="M1118 254 l0 16 M1098 288 l44 0 M1118 270 q-14 0 -20 18 M1126 270 q14 0 20 18" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M846 24 h132 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-58 l-14 16 l2 -16 h-62 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="912" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">Was it you?</text>
    </g>

    <!-- clanker screen balloon -->
    <g>
      <rect x="1000" y="22" width="204" height="110" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="1005" y="27" width="194" height="100" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <line x1="1120" y1="132" x2="1126" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="1102" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">I just didn't want it</text>
      <text x="1102" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">left unsaid.</text>
      <text x="1102" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Sit down.</text>
      <text x="1102" y="112" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Everything's handled.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>