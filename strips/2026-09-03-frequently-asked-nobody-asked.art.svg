      <line x1="50" y1="18" x2="50" y2="6" stroke="#8a9099" stroke-width="2"/>
      <circle cx="50" cy="4" r="3" fill="#8a9099"/>
      <rect x="29" y="32" width="16" height="9" rx="2" fill="#cfe8ff"/>
      <rect x="55" y="32" width="16" height="9" rx="2" fill="#cfe8ff"/>
      <g stroke="#6b7580" stroke-width="2">
