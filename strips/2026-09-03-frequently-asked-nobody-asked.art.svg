  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="252" x2="399" y2="252" stroke="#111" stroke-width="2"/>
      <!-- microwave -->
      <g>
        <rect x="52" y="128" width="150" height="95" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <rect x="64" y="140" width="90" height="71" rx="3" fill="#e6e2d8" stroke="#111" stroke-width="2"/>
        <rect x="162" y="140" width="30" height="71" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <circle cx="177" cy="158" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <rect x="168" y="176" width="18" height="6" fill="#111"/>
        <rect x="168" y="188" width="18" height="6" fill="#111"/>
        <!-- feuding sticky notes -->
        <g transform="rotate(-7 88 116)">
          <rect x="70" y="100" width="36" height="32" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
          <line x1="75" y1="109" x2="101" y2="109" stroke="#111" stroke-width="1.4"/>
          <line x1="75" y1="116" x2="101" y2="116" stroke="#111" stroke-width="1.4"/>
          <line x1="75" y1="123" x2="94" y2="123" stroke="#111" stroke-width="1.4"/>
        </g>
        <g transform="rotate(5 142 108)">
          <rect x="122" y="92" width="38" height="34" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
          <line x1="127" y1="101" x2="155" y2="101" stroke="#111" stroke-width="1.4"/>
          <line x1="127" y1="108" x2="155" y2="108" stroke="#111" stroke-width="1.4"/>
          <line x1="127" y1="115" x2="148" y2="115" stroke="#111" stroke-width="1.4"/>
        </g>
        <g transform="rotate(-3 110 86)">
          <rect x="94" y="72" width="34" height="30" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
          <line x1="99" y1="81" x2="123" y2="81" stroke="#111" stroke-width="1.4"/>
          <line x1="99" y1="88" x2="123" y2="88" stroke="#111" stroke-width="1.4"/>
          <line x1="99" y1="95" x2="116" y2="95" stroke="#111" stroke-width="1.4"/>
        </g>
      </g>
      <!-- Dailbert and Priya -->
      <use href="#dailbert" x="228" y="128" width="90" height="120"/>
      <use href="#priya" x="298" y="126" width="92" height="122"/>

      <!-- balloon -->
      <g>
        <path d="M238 42 q0 -14 22 -14 h74 q22 0 22 14 v22 q0 14 -22 14 h-74 q-22 0 -22 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <path d="M300 78 l-6 18 l18 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="297" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Six notes now.</text>
        <text x="297" y="68" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">None of them signed.</text>
      </g>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="252" x2="813" y2="252" stroke="#111" stroke-width="2"/>

      <!-- monitor with clanker -->
      <g>
        <rect x="452" y="130" width="118" height="90" rx="5" fill="#1a1d22" stroke="#111" stroke-width="2.5"/>
        <rect x="462" y="140" width="98" height="70" rx="2" fill="#20242b"/>
        <rect x="498" y="220" width="26" height="14" fill="#1a1d22" stroke="#111" stroke-width="2.5"/>
        <rect x="480" y="234" width="62" height="8" rx="2" fill="#1a1d22" stroke="#111" stroke-width="2.5"/>
        <use href="#clanker" x="471" y="138" width="80" height="72"/>
      </g>

      <!-- pinned tidy FAQ -->
      <g>
        <rect x="612" y="98" width="124" height="152" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="674" y="118" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">MICROWAVE FAQ</text>
        <line x1="624" y1="126" x2="724" y2="126" stroke="#111" stroke-width="1.4"/>
        <text x="624" y="142" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">Q: Whose fish is this?</text>
        <text x="624" y="154" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">A: Unattributed.</text>
        <text x="624" y="172" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">Q: Wipe it up??</text>
        <text x="624" y="184" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">A: Yes. Kindly.</text>
        <text x="624" y="202" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">Q: 90 sec or two min?</text>
        <text x="624" y="214" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">A: Depends on soup.</text>
        <text x="624" y="234" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">v3 - Tone: neutral.</text>
      </g>

      <use href="#priya" x="722" y="126" width="92" height="122"/>

      <!-- clanker balloon -->
      <g>
        <line x1="512" y1="128" x2="530" y2="72" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
        <rect x="454" y="24" width="184" height="48" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="546" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I merged the notes into</text>
        <text x="546" y="61" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">one neutral FAQ.</text>
      </g>

      <!-- Priya reply -->
      <g>
        <path d="M698 88 q0 -12 20 -12 h74 q20 0 20 12 v18 q0 12 -20 12 h-74 q-20 0 -20 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <path d="M742 118 l-4 16 l16 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="755" y="93" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Now there are</text>
        <text x="755" y="109" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">seven notes.</text>
      </g>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
