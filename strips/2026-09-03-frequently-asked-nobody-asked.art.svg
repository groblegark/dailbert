        <line x1="42" y1="52" x2="42" y2="60"/>
        <line x1="50" y1="52" x2="50" y2="60"/>
        <line x1="58" y1="52" x2="58" y2="60"/>
        <line x1="66" y1="52" x2="66" y2="60"/>
