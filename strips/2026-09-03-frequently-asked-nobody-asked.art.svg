      <path d="M33 62 q17 11 34 0 l7 58 h-48 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 66 l-6 26" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M60 66 l6 26" fill="none" stroke="#111" stroke-width="2"/>
