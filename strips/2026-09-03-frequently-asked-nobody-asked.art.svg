        </g>
        <rect x="994" y="126" width="34" height="46" rx="1" fill="#fff" stroke="#111" stroke-width="1.6"/>
        <text x="1011" y="138" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="6" text-anchor="middle" fill="#111">FAQ v4</text>
        <line x1="998" y1="144" x2="1024" y2="144" stroke="#111" stroke-width="1"/>
        <line x1="998" y1="150" x2="1024" y2="150" stroke="#111" stroke-width="1"/>
        <line x1="998" y1="156" x2="1020" y2="156" stroke="#111" stroke-width="1"/>
        <line x1="998" y1="162" x2="1024" y2="162" stroke="#111" stroke-width="1"/>
      </g>

      <!-- Doug, warm, mug + bowl -->
      <use href="#doug" x="1028" y="128" width="120" height="130"/>
      <g>
        <ellipse cx="1052" cy="220" rx="20" ry="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <path d="M1032 220 q20 16 40 0" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <path d="M1045 208 q-3 -8 3 -12" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
        <path d="M1059 208 q-3 -8 3 -12" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Doug balloon -->
      <g>
        <path d="M968 44 q0 -14 22 -14 h112 q22 0 22 14 v22 q0 14 -22 14 h-112 q-22 0 -22 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <path d="M1068 80 l2 20 l16 -14 z" fill="#fff" stroke="#111" stroke-width="2"/>
        <text x="1046" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I never read the notes.</text>
        <text x="1046" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Good soup though.</text>
      </g>
