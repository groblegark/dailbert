<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="22" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 8 q7 -9 3 -14 q9 4 4 13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="41" cy="34" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="59" cy="34" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="47" y1="34" x2="53" y2="34" stroke="#111" stroke-width="2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M43 48 q7 5 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 60 q16 12 32 0 l8 60 h-48 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
