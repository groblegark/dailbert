        <rect x="872" y="148" width="80" height="65" rx="3" fill="#e6e2d8" stroke="#111" stroke-width="2"/>
        <rect x="958" y="148" width="26" height="65" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <rect x="963" y="176" width="16" height="5" fill="#111"/>
        <rect x="963" y="186" width="16" height="5" fill="#111"/>
        <!-- soup inside window -->
        <ellipse cx="912" cy="183" rx="22" ry="14" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
        <path d="M897 180 q6 -6 12 0 q6 6 13 0" fill="none" stroke="#111" stroke-width="1.4"/>
        <!-- notes clustered above -->
        <g transform="rotate(-6 887 126)">
