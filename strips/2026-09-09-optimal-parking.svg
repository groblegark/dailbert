        <text x="97" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">It says my charger slot</text>
        <text x="97" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">is Thursday. At 4:12.</text>
        <text x="97" y="98" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">For nine minutes.</text>
