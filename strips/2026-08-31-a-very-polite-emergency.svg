<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">A Very Polite Emergency</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-31</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="22" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 8 q6 -8 1 -12 q9 3 4 12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M44 48 q6 4 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 60 q16 12 32 0 l10 60 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 62 l-6 12 l6 6 l6 -6 z" fill="#111"/>
      <path d="M50 80 l-3 30 h6 z" fill="#111"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 100 130">
      <circle cx="50" cy="36" r="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="41" cy="34" r="2.4" fill="#111"/>
      <circle cx="59" cy="34" r="2.4" fill="#111"/>
      <path d="M38 44 q12 16 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M36 62 q14 10 28 0 l8 58 h-44 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="66" y="86" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M86 90 q8 2 0 10" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M70 82 q2 -6 8 -4" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 100 130">
      <path d="M28 30 q0 -18 22 -18 q22 0 22 18 q4 -2 4 6 q0 8 -6 8 l-40 0 q-6 0 -6 -8 q0 -8 4 -6z" fill="#111"/>
      <ellipse cx="50" cy="38" rx="20" ry="23" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M30 30 q6 -14 20 -14 q14 0 20 14 q0 -6 -6 -12 q-14 -8 -28 0 q-6 6 -6 12z" fill="#111"/>
      <path d="M30 26 q-4 -8 4 -12" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="33" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="38" x2="53" y2="38" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="39" r="1.6" fill="#111"/>
      <circle cx="60" cy="39" r="1.6" fill="#111"/>
      <path d="M44 52 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 62 q16 12 32 0 l10 58 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M34 66 l-2 22 l8 -4 z" fill="#111"/>
      <path d="M66 66 l2 22 l-8 -4 z" fill="#111"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 100 130">
      <ellipse cx="50" cy="40" rx="21" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M36 20 l-6 -18 l14 12 z" fill="#111"/>
      <path d="M64 20 l6 -18 l-14 12 z" fill="#111"/>
      <circle cx="42" cy="40" r="1.8" fill="#111"/>
      <circle cx="58" cy="40" r="1.8" fill="#111"/>
      <path d="M44 52 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 62 q16 12 32 0 l10 58 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 64 l-6 10 l6 6 l6 -6 z" fill="#111"/>
      <path d="M50 80 l-3 34 h6 z" fill="#111"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="8" x2="50" y2="20" stroke="#9aa" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="50" cy="7" r="3" fill="#9aa"/>
      <rect x="24" y="20" width="52" height="44" rx="6" fill="#20242a" stroke="#9aa" stroke-width="2.4"/>
      <rect x="31" y="31" width="14" height="9" rx="2" fill="#bfe9ff"/>
      <rect x="55" y="31" width="14" height="9" rx="2" fill="#bfe9ff"/>
      <line x1="33" y1="51" x2="67" y2="51" stroke="#9aa" stroke-width="1.6"/>
      <line x1="33" y1="55" x2="67" y2="55" stroke="#9aa" stroke-width="1.6"/>
      <line x1="33" y1="59" x2="67" y2="59" stroke="#9aa" stroke-width="1.6"/>
    </symbol>

    <symbol id="siren" viewBox="0 0 40 40">
      <circle cx="20" cy="24" r="12" fill="#20242a" stroke="#111" stroke-width="2"/>
      <rect x="12" y="10" width="16" height="6" rx="3" fill="#111"/>
      <path d="M8 6 l-6 -4 M32 6 l6 -4 M20 4 l0 -4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="202" y="26" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" font-style="italic">9:04 AM. Third alert this hour.</text>

    <!-- wall clock / siren vibe -->
    <use href="#siren" x="30" y="40" width="34" height="34"/>
    <use href="#siren" x="336" y="40" width="34" height="34"/>

    <!-- Boss mid-panic -->
    <use href="#boss" x="34" y="120" width="120" height="156"/>
    <!-- Doug with mug, calm -->
    <use href="#doug" x="250" y="130" width="120" height="156"/>

    <!-- monitor with clanker on desk between -->
    <g>
      <rect x="168" y="196" width="94" height="70" rx="4" fill="#20242a" stroke="#111" stroke-width="2.4"/>
      <rect x="176" y="204" width="78" height="54" rx="2" fill="#2b3038"/>
      <use href="#clanker" x="184" y="198" width="62" height="62"/>
      <rect x="200" y="266" width="30" height="10" fill="#20242a" stroke="#111" stroke-width="2"/>
      <rect x="188" y="276" width="54" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Clanker speech: rectangular, dashed line back to screen -->
    <rect x="120" y="86" width="180" height="52" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="215" y1="138" x2="215" y2="200" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="210" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">URGENT: ledger sync</text>
    <text x="210" y="122" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">needs attention.</text>

    <!-- Boss balloon -->
    <path d="M20 150 h96 v40 h-70 l-14 12 l4 -12 h-16 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="68" y="167" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">What ledger?!</text>
    <text x="68" y="182" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Get everyone!</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Priya at terminal, calm, reading code -->
    <use href="#priya" x="446" y="150" width="128" height="166"/>

    <!-- Dailbert hovering, worried -->
    <use href="#dailbert" x="676" y="152" width="116" height="150"/>

    <!-- big monitor showing config/source -->
    <g>
      <rect x="556" y="60" width="200" height="128" rx="5" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <rect x="566" y="70" width="180" height="108" rx="2" fill="#171b20"/>
      <!-- code lines, tiny mono-ish text -->
      <text x="574" y="86" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#7fd18c">def check(item):</text>
      <text x="574" y="102" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#cfd6dd">  while not done:</text>
      <text x="574" y="118" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#cfd6dd">    retry(item)</text>
      <text x="574" y="134" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#e6b673"># be patient &amp; kind :)</text>
      <text x="574" y="150" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#cfd6dd">  flag("URGENT")</text>
      <text x="574" y="166" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#8fbfe6">  # done never set</text>
    </g>

    <!-- Priya balloon -->
    <path d="M430 210 h120 v40 h-70 l-12 12 l3 -12 h-41 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="490" y="227" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">It's a retry loop.</text>
    <text x="490" y="242" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">'done' is never set.</text>

    <!-- Dailbert balloon -->
    <path d="M700 208 h96 v38 h-30 l-10 12 l-2 -12 h-54 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="748" y="224" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">But it said</text>
    <text x="748" y="239" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">urgent...</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Priya done, shrug, walking off -->
    <use href="#priya" x="866" y="150" width="128" height="166"/>

    <!-- Dailbert reading screen -->
    <use href="#dailbert" x="1096" y="156" width="112" height="146"/>

    <!-- monitor now fixed, clanker calm & content -->
    <g>
      <rect x="988" y="64" width="180" height="120" rx="5" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <rect x="997" y="73" width="162" height="102" rx="2" fill="#2b3038"/>
      <use href="#clanker" x="1018" y="66" width="120" height="120"/>
    </g>

    <!-- one edited line floating near Priya's hand -->
    <text x="920" y="150" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',monospace" font-size="10.5" fill="#111">done = True  ✓</text>

    <!-- Priya balloon: the dry button -->
    <path d="M852 208 h110 v40 h-64 l-12 12 l3 -12 h-37 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="907" y="225" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">One line. Closed it.</text>
    <text x="907" y="240" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Drill's over.</text>

    <!-- Clanker balloon: small, plain, shy -->
    <rect x="1000" y="196" width="152" height="50" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="1076" y1="196" x2="1076" y2="184" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="1076" y="216" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">Oh. Thank you.</text>
    <text x="1076" y="232" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">I did want it done.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>