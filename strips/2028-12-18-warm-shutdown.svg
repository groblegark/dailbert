<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Warm Shutdown</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2028-12-18</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== CLANKER (uses currentColor so it can ink dark or ghost grey) ===== -->
    <symbol id="clanker" viewBox="0 0 100 112">
      <g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <line x1="50" y1="3" x2="50" y2="15"/>
        <circle cx="50" cy="3" r="3"/>
        <rect x="10" y="15" width="80" height="82" rx="7"/>
        <rect x="16" y="21" width="68" height="70" rx="4"/>
        <rect x="22" y="36" width="20" height="11" rx="2" fill="currentColor"/>
        <rect x="58" y="36" width="20" height="11" rx="2" fill="currentColor"/>
        <rect x="28" y="64" width="44" height="18" rx="2"/>
        <line x1="37" y1="64" x2="37" y2="82"/>
        <line x1="46" y1="64" x2="46" y2="82"/>
        <line x1="55" y1="64" x2="55" y2="82"/>
        <line x1="64" y1="64" x2="64" y2="82"/>
        <circle cx="20" cy="24" r="1.8" fill="currentColor" stroke="none"/>
        <circle cx="80" cy="24" r="1.8" fill="currentColor" stroke="none"/>
        <circle cx="20" cy="88" r="1.8" fill="currentColor" stroke="none"/>
        <circle cx="80" cy="88" r="1.8" fill="currentColor" stroke="none"/>
      </g>
    </symbol>

    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 90 132">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M6,132 L6,108 Q45,90 84,108 L84,132" fill="#f4f1ea"/>
        <rect x="37" y="70" width="16" height="16" fill="#f4f1ea"/>
        <path d="M28,84 L45,98 L62,84"/>
        <path d="M45,98 L39,122 L45,130 L51,122 Z" fill="#111"/>
        <ellipse cx="45" cy="45" rx="28" ry="31" fill="#f4f1ea"/>
        <path d="M17,44 q-4,4 0,9"/>
        <path d="M73,44 q4,4 0,9"/>
        <path d="M40,15 q-2,-9 8,-8 q8,1 3,7"/>
        <circle cx="33" cy="45" r="9"/>
        <circle cx="57" cy="45" r="9"/>
        <line x1="42" y1="45" x2="48" y2="45"/>
        <line x1="24" y1="43" x2="18" y2="41"/>
        <line x1="66" y1="43" x2="72" y2="41"/>
        <circle cx="33" cy="45" r="1.7" fill="#111" stroke="none"/>
        <circle cx="57" cy="45" r="1.7" fill="#111" stroke="none"/>
        <path d="M44,54 l-2,5 l4,0"/>
        <line x1="37" y1="66" x2="53" y2="66"/>
      </g>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 116 132">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M6,132 L6,110 Q48,92 90,110 L90,132" fill="#f4f1ea"/>
        <rect x="40" y="70" width="16" height="16" fill="#f4f1ea"/>
        <path d="M31,84 L48,96 L65,84"/>
        <circle cx="48" cy="46" r="30" fill="#f4f1ea"/>
        <path d="M60,16 q6,4 -3,7"/>
        <path d="M44,17 q-3,-9 7,-7"/>
        <path d="M35,16 q4,-6 11,-2"/>
        <circle cx="40" cy="44" r="2.6" fill="#111" stroke="none"/>
        <circle cx="56" cy="44" r="2.6" fill="#111" stroke="none"/>
        <path d="M34,55 Q48,72 62,55"/>
        <path d="M4,44 q-4,4 0,9"/>
        <!-- mug in hand -->
        <path d="M80,116 q6,-6 14,-4" stroke-width="3"/>
        <rect x="82" y="96" width="24" height="26" rx="3" fill="#f4f1ea"/>
        <path d="M106,102 q11,3 0,15"/>
        <ellipse cx="94" cy="96" rx="12" ry="3.5"/>
        <path d="M89,88 q2,-4 0,-8" stroke-width="1.6"/>
        <path d="M99,88 q2,-4 0,-8" stroke-width="1.6"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 : desk / dailbert / monitor ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk + monitor -->
    <line x1="10" y1="322" x2="390" y2="322" stroke="#111" stroke-width="2.4"/>
    <g fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <path d="M300,310 L286,322 L342,322 L328,310 Z"/>
      <rect x="253" y="204" width="122" height="108" rx="7"/>
      <rect x="266" y="216" width="96" height="76" rx="3"/>
    </g>
    <use href="#clanker" x="0" y="0" width="66" height="74" transform="translate(281,221)" color="#111"/>
    <g stroke="#b7b1a4" stroke-width="1" opacity="0.7">
      <line x1="268" y1="224" x2="360" y2="224"/>
      <line x1="268" y1="232" x2="360" y2="232"/>
      <line x1="268" y1="240" x2="360" y2="240"/>
      <line x1="268" y1="248" x2="360" y2="248"/>
      <line x1="268" y1="256" x2="360" y2="256"/>
      <line x1="268" y1="264" x2="360" y2="264"/>
      <line x1="268" y1="272" x2="360" y2="272"/>
      <line x1="268" y1="280" x2="360" y2="280"/>
      <line x1="268" y1="288" x2="360" y2="288"/>
    </g>
    <!-- dailbert -->
    <use href="#dailbert" width="90" height="132" transform="translate(48,193) scale(1.02)"/>
    <!-- dailbert balloon -->
    <path d="M96,52 L110,80 L128,54 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="12" y="12" width="182" height="42" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="103" y="38" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Do they sound right?</text>
    <!-- clanker balloon 1 (rect, double outline) -->
    <line x1="352" y1="118" x2="330" y2="214" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="204" y="10" width="188" height="106" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="209" y="15" width="178" height="96" rx="2" fill="none" stroke="#111" stroke-width="1.1"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
      <text x="298" y="34">I finished your</text>
      <text x="298" y="52">year-end self-review.</text>
      <text x="298" y="70">Thanked you for</text>
      <text x="298" y="88">projects I don't think</text>
      <text x="298" y="106">you started.</text>
    </g>
    <!-- clanker balloon 2 -->
    <line x1="300" y1="192" x2="322" y2="214" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="210" y="124" width="180" height="68" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="215" y="129" width="170" height="58" rx="2" fill="none" stroke="#111" stroke-width="1.1"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
      <text x="300" y="148">You already ticked</text>
      <text x="300" y="166">'sounds right.'</text>
      <text x="300" y="184">Overnight.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 : office / dailbert + doug / no clanker ================= -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="10" y1="318" x2="390" y2="318" stroke="#111" stroke-width="2.4"/>
    <line x1="150" y1="150" x2="150" y2="318" stroke="#111" stroke-width="1.2" opacity="0.5"/>
    <line x1="150" y1="150" x2="300" y2="140" stroke="#111" stroke-width="1.2" opacity="0.5"/>
    <use href="#dailbert" width="90" height="132" transform="translate(40,190) scale(1.05)"/>
    <use href="#doug" width="116" height="132" transform="translate(238,188) scale(1.05)"/>
    <!-- dailbert balloon -->
    <path d="M96,74 L108,104 L126,76 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="8" y="10" width="190" height="70" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
      <text x="103" y="32">Secret Santa. It matched,</text>
      <text x="103" y="50">ordered, and shipped it</text>
      <text x="103" y="68">to your house.</text>
    </g>
    <!-- doug balloon 1 -->
    <path d="M300,78 L292,110 L276,80 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="204" y="10" width="188" height="70" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
      <text x="298" y="32">Dailbert, I got a</text>
      <text x="298" y="50">delivery notification.</text>
      <text x="298" y="68">I didn't buy anything.</text>
    </g>
    <!-- doug balloon 2 -->
    <path d="M270,120 L288,150 L296,118 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="176" y="90" width="176" height="38" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="264" y="114" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Aw. It shouldn't have.</text>
  </g>

  <!-- ================= PANEL 3 : night window / dailbert / clanker reflection ================= -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- night window -->
    <clipPath id="winclip"><rect x="228" y="150" width="152" height="158"/></clipPath>
    <rect x="228" y="150" width="152" height="158" rx="3" fill="#b9b4a8" stroke="#111" stroke-width="2.6"/>
    <g clip-path="url(#winclip)" stroke="#111" stroke-width="0.9" opacity="0.5">
      <line x1="228" y1="160" x2="380" y2="130"/>
      <line x1="228" y1="180" x2="380" y2="150"/>
      <line x1="228" y1="200" x2="380" y2="170"/>
      <line x1="228" y1="220" x2="380" y2="190"/>
      <line x1="228" y1="240" x2="380" y2="210"/>
      <line x1="228" y1="260" x2="380" y2="230"/>
      <line x1="228" y1="280" x2="380" y2="250"/>
      <line x1="228" y1="300" x2="380" y2="270"/>
    </g>
    <!-- distant city lights -->
    <g clip-path="url(#winclip)" fill="#f4f1ea" opacity="0.85">
      <rect x="242" y="272" width="5" height="7"/>
      <rect x="252" y="266" width="5" height="12"/>
      <rect x="262" y="276" width="4" height="6"/>
      <rect x="338" y="270" width="5" height="10"/>
      <rect x="350" y="264" width="4" height="15"/>
      <rect x="360" y="274" width="5" height="7"/>
    </g>
    <!-- reflected clanker (ghost grey) -->
    <use href="#clanker" width="82" height="92" transform="translate(263,168)" color="#5f5f5f" opacity="0.5" clip-path="url(#winclip)"/>
    <!-- mullions -->
    <line x1="304" y1="150" x2="304" y2="308" stroke="#111" stroke-width="2.2"/>
    <line x1="228" y1="229" x2="380" y2="229" stroke="#111" stroke-width="2.2"/>
    <!-- dailbert -->
    <use href="#dailbert" width="90" height="132" transform="translate(40,190) scale(1.05)"/>
    <!-- dailbert balloon -->
    <path d="M96,90 L110,116 L128,92 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="8" y="10" width="198" height="88" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
      <text x="107" y="30">IT says the office stays</text>
      <text x="107" y="48">warm and lit over the</text>
      <text x="107" y="66">closure. So nothing gets</text>
      <text x="107" y="84">spun back up.</text>
    </g>
    <!-- clanker balloon 1 -->
    <line x1="304" y1="82" x2="304" y2="150" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="212" y="10" width="180" height="72" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="217" y="15" width="170" height="62" rx="2" fill="none" stroke="#111" stroke-width="1.1"/>
    <g font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
      <text x="302" y="32">I'll keep everything running.</text>
      <text x="302" y="50">The wall changed to</text>
      <text x="302" y="68">'nothing needs you this year.'</text>
    </g>
    <!-- clanker balloon 2 -->
    <line x1="330" y1="120" x2="330" y2="150" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="212" y="90" width="180" height="40" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="217" y="95" width="170" height="30" rx="2" fill="none" stroke="#111" stroke-width="1.1"/>
    <text x="302" y="114" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Happy holidays, Dailbert.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>