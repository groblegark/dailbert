      <path d="M28 36 q-4 -22 20 -28 q10 -6 24 0 q22 6 20 26 q6 4 2 12" fill="#111"/>
      <ellipse cx="60" cy="46" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30 34 q10 -14 30 -14 q22 0 30 14 q-6 -3 -14 -2 q-16 -6 -32 0 q-9 -1 -14 2z" fill="#111"/>
      <rect x="40" y="42" width="17" height="13" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="42" width="17" height="13" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="48" x2="63" y2="48" stroke="#111" stroke-width="2.5"/>
      <circle cx="48.5" cy="48.5" r="2.3" fill="#111"/>
      <circle cx="71.5" cy="48.5" r="2.3" fill="#111"/>
      <path d="M50 66 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 92 q22 14 44 0 l6 58 q-28 12 -56 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
