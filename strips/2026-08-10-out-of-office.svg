      <path d="M76 108 l6 20" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="4" fill="#111"/>
      <rect x="26" y="20" width="68" height="60" rx="8" fill="#d9d6cf" stroke="#111" stroke-width="2.5"/>
      <rect x="34" y="36" width="22" height="12" rx="3" fill="#111"/>
      <rect x="64" y="36" width="22" height="12" rx="3" fill="#111"/>
      <rect x="37" y="39" width="7" height="6" rx="1.5" fill="#bfe3ff"/>
      <rect x="67" y="39" width="7" height="6" rx="1.5" fill="#bfe3ff"/>
