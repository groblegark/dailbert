      <circle cx="49" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="42" x2="62" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2.4" fill="#111"/>
      <circle cx="71" cy="42" r="2.4" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 90 q20 16 40 0 l6 60 q-26 12 -52 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="77" x2="60" y2="92" stroke="#111" stroke-width="2.5"/>
      <path d="M60 92 l-7 12 l7 8 l7 -8 z" fill="#111"/>
      <path d="M53 100 l-7 34 l6 3 l7 -30 z" fill="#111"/>
    </symbol>

