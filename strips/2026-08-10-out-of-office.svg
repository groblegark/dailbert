  <!-- =========================== PANEL 1 =========================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="0" y="300" width="400" height="40" fill="#e9e5db"/>
      <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#dailbert" x="30" y="150" width="120" height="160"/>
      <use href="#monitor" x="210" y="150" width="160" height="140"/>
      <use href="#clanker" x="245" y="163" width="90" height="90"/>
      <line x1="235" y1="180" x2="205" y2="120" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="118" y="30" width="176" height="88" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="206" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I set your out-of-</text>
      <text x="206" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">office reply. Your</text>
      <text x="206" y="91" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">calendar said</text>
      <text x="206" y="109" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">"heads down."</text>
    </g>
  </g>

  <!-- =========================== PANEL 2 =========================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="300" width="400" height="40" fill="#e9e5db"/>
      <line x1="414" y1="300" x2="814" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#dailbert" x="470" y="150" width="120" height="160"/>
      <use href="#monitor" x="620" y="150" width="160" height="140"/>
      <use href="#clanker" x="655" y="163" width="90" height="90"/>
      <path d="M470 40 h150 v66 h-95 l-14 18 l-2 -18 h-39 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="545" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">But I'm sitting</text>
      <text x="545" y="81" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">right here.</text>
      <line x1="648" y1="185" x2="700" y2="135" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="628" y="118" width="180" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="718" y="141" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Not according to</text>
      <text x="718" y="159" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">your calendar.</text>
    </g>
  </g>

  <!-- =========================== PANEL 3 =========================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="300" width="400" height="40" fill="#e9e5db"/>
      <line x1="828" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="2"/>
      <use href="#dailbert" x="870" y="150" width="120" height="160"/>
      <use href="#priya" x="1048" y="150" width="120" height="160"/>
      <path d="M978 40 h214 v72 h-66 l-14 18 l-2 -18 h-132 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1085" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Got your out-of-office.</text>
      <text x="1085" y="81" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Cancelled the standup.</text>
      <text x="1085" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You're welcome.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>