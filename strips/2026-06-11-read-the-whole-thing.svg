<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Onboarding</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-11</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#111"/>
      <rect width="4" height="1.4" y="1.4" fill="#2b2b2b"/>
    </pattern>

    <!-- CLANKER: boxy chrome robot head, appears only inside a monitor -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="6" x2="50" y2="20" stroke="#f4f1ea" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="6" r="3.5" fill="#f4f1ea"/>
      <rect x="20" y="20" width="60" height="58" rx="7" fill="none" stroke="#f4f1ea" stroke-width="3" stroke-linejoin="round"/>
      <rect x="26" y="26" width="48" height="46" rx="4" fill="none" stroke="#f4f1ea" stroke-width="1.6"/>
      <!-- glowing slot eyes -->
      <rect x="31" y="36" width="15" height="8" rx="2" fill="#f4f1ea"/>
      <rect x="54" y="36" width="15" height="8" rx="2" fill="#f4f1ea"/>
      <!-- grille mouth -->
      <rect x="34" y="56" width="32" height="10" rx="2" fill="none" stroke="#f4f1ea" stroke-width="2"/>
      <line x1="40" y1="56" x2="40" y2="66" stroke="#f4f1ea" stroke-width="1.6"/>
      <line x1="46" y1="56" x2="46" y2="66" stroke="#f4f1ea" stroke-width="1.6"/>
      <line x1="52" y1="56" x2="52" y2="66" stroke="#f4f1ea" stroke-width="1.6"/>
      <line x1="58" y1="56" x2="58" y2="66" stroke="#f4f1ea" stroke-width="1.6"/>
    </symbol>

    <!-- DAILBERT: tired office man, glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M52 8 q10 -8 12 4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- ears -->
      <circle cx="30" cy="48" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="90" cy="48" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- glasses -->
      <circle cx="48" cy="44" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="74" cy="44" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="59" y1="44" x2="63" y2="44" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="44" r="2.2" fill="#111"/>
      <circle cx="74" cy="44" r="2.2" fill="#111"/>
      <!-- weary brows -->
      <path d="M40 33 q8 -3 16 1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M66 34 q8 -4 16 -1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- flat mouth -->
      <path d="M50 66 q11 4 22 -1" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- collar + tie + body -->
      <path d="M34 82 q26 20 52 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M44 84 L60 96 L76 84" fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 96 l-5 10 l5 26 l5 -26 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M22 168 q0 -60 38 -74 q38 14 38 74" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    </symbol>

    <!-- BOSS: two pointed hair spikes, beady eyes, suit + tie -->
    <symbol id="boss" viewBox="0 0 120 170">
      <path d="M40 20 L30 -2 L52 16 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M70 16 L86 -4 L80 20 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <ellipse cx="60" cy="48" rx="29" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="30" cy="50" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="90" cy="50" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="46" r="2.4" fill="#111"/>
      <circle cx="72" cy="46" r="2.4" fill="#111"/>
      <path d="M44 38 h12" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M66 38 h12" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 64 q11 6 22 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 84 q26 20 52 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M44 86 L60 98 L76 86" fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 98 l-5 10 l5 24 l5 -24 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M22 168 q0 -58 38 -72 q38 14 38 72" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    </symbol>
  </defs>

  <!-- ==================== PANEL 1 ==================== -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <!-- desk -->
    <line x1="8" y1="286" x2="392" y2="286" stroke="#111" stroke-width="2.4"/>
    <!-- monitor with clanker -->
    <g>
      <rect x="232" y="150" width="140" height="112" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="242" y="160" width="120" height="92" rx="4" fill="#111"/>
      <rect x="242" y="160" width="120" height="92" rx="4" fill="url(#scan)" opacity="0.55"/>
      <use href="#clanker" x="257" y="162" width="90" height="90"/>
      <rect x="294" y="262" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="270" y="276" width="64" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </g>
    <!-- dailbert at desk -->
    <use href="#dailbert" x="18" y="150" width="150" height="212"/>

    <!-- clanker balloon (screen-edged, dashed connector to monitor) -->
    <rect x="14" y="14" width="238" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <rect x="20" y="20" width="226" height="74" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <path d="M240 94 L300 150" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="133" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Morning. I read the</text>
    <text x="133" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">entire codebase while</text>
    <text x="133" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">you were asleep.</text>

    <!-- dailbert speech balloon -->
    <path d="M118 214 q-8 8 -2 18 l-14 6 l10 -4 q6 6 18 6 h60 q10 0 10 -12 v-6 q0 -12 -10 -12 h-70 q-8 0 -8 4 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="160" y="238" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">...all of it?</text>
  </g>

  <!-- ==================== PANEL 2 ==================== -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="422" y1="286" x2="806" y2="286" stroke="#111" stroke-width="2.4"/>
    <!-- boss, arms feel raised via pose; place boss on right gesturing -->
    <use href="#boss" x="636" y="150" width="150" height="212"/>
    <!-- boss raised arm accent -->
    <path d="M700 232 q26 -30 44 -18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M690 236 q-26 -22 -46 -6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
    <!-- dailbert on left -->
    <use href="#dailbert" x="430" y="152" width="150" height="212"/>

    <!-- boss balloon top-right -->
    <rect x="560" y="14" width="238" height="86" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <path d="M690 98 l6 26 l16 -22 z" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="679" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Onboarded overnight!</text>
    <text x="679" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Do you know what that</text>
    <text x="679" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">does for velocity?</text>

    <!-- dailbert balloon lower-left -->
    <rect x="426" y="196" width="180" height="76" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <path d="M500 270 l-4 24 l20 -18 z" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="516" y="222" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">It hasn't had coffee.</text>
    <text x="516" y="240" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I haven't had coffee.</text>
  </g>

  <!-- ==================== PANEL 3 ==================== -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="836" y1="286" x2="1220" y2="286" stroke="#111" stroke-width="2.4"/>
    <!-- monitor with clanker on left this time -->
    <g>
      <rect x="856" y="156" width="140" height="112" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="866" y="166" width="120" height="92" rx="4" fill="#111"/>
      <rect x="866" y="166" width="120" height="92" rx="4" fill="url(#scan)" opacity="0.55"/>
      <use href="#clanker" x="881" y="168" width="90" height="90"/>
      <rect x="918" y="268" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="894" y="282" width="64" height="6" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </g>
    <!-- dailbert on right, weary -->
    <use href="#dailbert" x="1050" y="152" width="150" height="212"/>

    <!-- clanker balloon 1 -->
    <rect x="1012" y="14" width="200" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <rect x="1018" y="20" width="188" height="40" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <path d="M1012 52 L960 168" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="1112" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I left your TODOs alone.</text>

    <!-- clanker balloon 2 -->
    <rect x="850" y="78" width="234" height="86" rx="4" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <rect x="856" y="84" width="222" height="74" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <path d="M926 164 L928 166" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <path d="M960 158 L940 166" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="967" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You sound tired in the</text>
    <text x="967" y="124" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">comments. I wanted to</text>
    <text x="967" y="142" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">check you were okay.</text>
  </g>
</g>
    
  </svg>