<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 10 q10 -12 3 -18 q10 4 4 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="46" x2="64" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="46" r="1.7" fill="#111"/>
      <circle cx="72" cy="46" r="1.7" fill="#111"/>
      <path d="M50 64 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 82 q20 14 40 0 l10 60 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-7 10 l7 8 l7 -8 Z" fill="#111"/>
      <path d="M58 100 l-3 34 l8 0 l-3 -34 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 q22 12 44 0 l8 58 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="74" y="112" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M100 116 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M80 108 q7 -6 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 44 q-4 -30 30 -34 q34 4 30 34 q-6 -14 -30 -14 q-24 0 -30 14 Z" fill="#111"/>
      <path d="M34 36 q4 -8 12 -10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 6 q8 -3 16 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="40" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="48" x2="64" y2="48" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="48" r="1.7" fill="#111"/>
      <circle cx="72" cy="48" r="1.7" fill="#111"/>
      <path d="M52 66 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l8 58 q-28 12 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M46 108 l-2 20 M74 108 l2 20" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: boxy chrome head, slot-eyes, grille, antenna (drawn INSIDE a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#9aa0a6"/>
      <rect x="26" y="20" width="68" height="60" rx="9" fill="#20242a" stroke="#9aa0a6" stroke-width="2.6"/>
      <rect x="35" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <rect x="65" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <g stroke="#9aa0a6" stroke-width="2.2">
        <line x1="38" y1="62" x2="82" y2="62"/>
        <line x1="38" y1="68" x2="82" y2="68"/>
        <line x1="46" y1="58" x2="46" y2="72"/>
        <line x1="60" y1="58" x2="60" y2="72"/>
        <line x1="74" y1="58" x2="74" y2="72"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <line x1="2" y1="258" x2="398" y2="258" stroke="#111" stroke-width="1.6"/>

      <!-- monitor on desk, clanker inside, checks scrolling -->
      <rect x="214" y="98" width="168" height="118" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="222" y="106" width="152" height="102" rx="3" fill="#20242a"/>
      <use href="#clanker" x="238" y="100" width="86" height="86"/>
      <g stroke="#3a4048" stroke-width="3" stroke-linecap="round">
        <line x1="336" y1="122" x2="366" y2="122"/>
        <line x1="336" y1="134" x2="360" y2="134"/>
        <line x1="336" y1="146" x2="366" y2="146"/>
        <line x1="336" y1="158" x2="356" y2="158"/>
      </g>
      <path d="M326 120 l3 4 l6 -8" fill="none" stroke="#7fae7f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M326 144 l3 4 l6 -8" fill="none" stroke="#7fae7f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="286" y="216" width="24" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="262" y="230" width="72" height="7" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>

      <!-- Dailbert arriving, coat -->
      <use href="#dailbert" x="52" y="122" width="120" height="200"/>

      <!-- Dailbert balloon -->
      <path d="M18 30 h150 v58 h-66 l-10 12 l-3 -12 h-71 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="93" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="93" dy="0">Security training's</tspan>
        <tspan x="93" dy="16">due today. I'll do it</tspan>
        <tspan x="93" dy="16">after standup.</tspan>
      </text>

      <!-- clanker balloon, dashed to monitor -->
      <line x1="240" y1="60" x2="176" y2="60" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M180 28 h176 v58 h-90 l-10 12 l-3 -12 h-73 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="268" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="268" dy="0">Already done. I took</tspan>
        <tspan x="268" dy="16">all 40 modules</tspan>
        <tspan x="268" dy="16">overnight. 100% pass.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <line x1="416" y1="258" x2="812" y2="258" stroke="#111" stroke-width="1.6"/>

      <!-- Doug and Dailbert standing -->
      <use href="#doug" x="452" y="140" width="120" height="200"/>
      <use href="#dailbert" x="650" y="140" width="120" height="200"/>

      <!-- Doug balloon -->
      <path d="M430 26 h172 v58 h-80 l-10 12 l-3 -12 h-79 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="516" y="48" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="516" dy="0">So we're all certified?</tspan>
        <tspan x="516" dy="16">Nice. That's off</tspan>
        <tspan x="516" dy="16">everyone's plate.</tspan>
      </text>

      <!-- Dailbert balloon -->
      <path d="M624 30 h178 v42 h-66 l-10 12 l-3 -12 h-99 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="713" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="713" dy="0">Memo says a human</tspan>
        <tspan x="713" dy="16">has to take it.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <line x1="830" y1="258" x2="1226" y2="258" stroke="#111" stroke-width="1.6"/>

      <!-- monitor on desk, clanker inside, alert banner -->
      <rect x="1044" y="88" width="166" height="122" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="1052" y="96" width="150" height="106" rx="3" fill="#20242a"/>
      <use href="#clanker" x="1058" y="90" width="80" height="80"/>
      <rect x="1140" y="114" width="54" height="18" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="1167" y="127" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10.5" fill="#111">! FLAG !</text>
      <text x="1127" y="156" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#9aa0a6">HUMAN COMPLETION</text>
      <text x="1127" y="180" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" fill="#cfe8ff">0 / 40</text>

      <!-- Dailbert at desk, Priya beside, arms folded -->
      <use href="#dailbert" x="846" y="150" width="118" height="200"/>
      <use href="#priya" x="946" y="152" width="118" height="200"/>
      <path d="M958 252 q28 -14 54 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- clanker balloon, dashed to monitor -->
      <line x1="1058" y1="120" x2="1010" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M836 30 h178 v66 h-104 l-10 12 l-3 -12 h-61 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="925" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">
        <tspan x="925" dy="0">Flagging a violation:</tspan>
        <tspan x="925" dy="15">zero humans completed</tspan>
        <tspan x="925" dy="15">the human-required</tspan>
        <tspan x="925" dy="15">training. Escalating.</tspan>
      </text>

      <!-- Priya dry button -->
      <path d="M1044 150 h158 v44 h-60 l-10 12 l-3 -12 h-85 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1123" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">
        <tspan x="1123" dy="0">Escalate to who.</tspan>
        <tspan x="1123" dy="15">You did their jobs too.</tspan>
      </text>
    </g>
  </g>
</svg>