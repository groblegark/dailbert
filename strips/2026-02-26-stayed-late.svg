<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Stayed Late</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-02-26</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c3c7cd"/>
      <stop offset="1" stop-color="#e8e5dd"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f7f3d8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f7f3d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eaf6ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#eaf6ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c1"><rect x="2" y="4" width="396" height="332" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="416" y="4" width="396" height="332" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="830" y="4" width="396" height="332" rx="3"/></clipPath>

    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" overflow="visible">
      <rect x="38" y="150" width="11" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="150" width="11" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="41" cy="223" rx="9" ry="5" fill="#111"/>
      <ellipse cx="59" cy="223" rx="9" ry="5" fill="#111"/>
      <rect x="23" y="82" width="9" height="60" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="68" y="82" width="9" height="60" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="27" cy="146" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="73" cy="146" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30,80 L70,80 L66,152 L34,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50,82 l-4,6 l4,6 l4,-6 Z" fill="#111"/>
      <path d="M47,94 L45,132 L50,138 L55,132 L53,94 Z" fill="#111"/>
      <rect x="45" y="66" width="10" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="40" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M46,12 q3,-9 9,-4 q3,3 -1,6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="25" cy="42" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="75" cy="42" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="48" y1="42" x2="52" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="42" r="2.2" fill="#111"/>
      <circle cx="60" cy="42" r="2.2" fill="#111"/>
      <line x1="44" y1="58" x2="56" y2="58" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" overflow="visible">
      <rect x="38" y="150" width="11" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="150" width="11" height="70" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="41" cy="223" rx="9" ry="5" fill="#111"/>
      <ellipse cx="59" cy="223" rx="9" ry="5" fill="#111"/>
      <rect x="23" y="82" width="9" height="60" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="68" y="82" width="9" height="42" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="27" cy="146" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30,80 L70,80 L66,152 L34,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M42,80 L50,90 L58,80" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="104" r="1.8" fill="#111"/>
      <circle cx="50" cy="120" r="1.8" fill="#111"/>
      <rect x="45" y="66" width="10" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="40" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30,17 q7,-9 14,-2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M52,15 q7,-6 13,3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="42" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="80" cy="42" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="38" r="2.6" fill="#111"/>
      <circle cx="60" cy="38" r="2.6" fill="#111"/>
      <path d="M35,46 Q50,64 65,46" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
