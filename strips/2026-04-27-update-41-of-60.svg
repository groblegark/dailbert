<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Update 41 of 60</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 190">
      <path d="M30 185 Q30 122 46 108 L74 108 Q90 122 90 185" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M58 108 L52 142 L60 154 L68 142 L62 108 Z" fill="#111"/>
      <rect x="53" y="97" width="14" height="14" fill="#fff" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="60" rx="30" ry="34" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M60 27 q11 -11 5 2 q-3 6 3 5" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="49" cy="60" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="60" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="60" x2="62" y2="60" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="60" r="2.6" fill="#111"/>
      <circle cx="71" cy="60" r="2.6" fill="#111"/>
      <path d="M52 82 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 190">
      <path d="M27 185 Q27 120 46 108 L78 108 Q96 120 96 185" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="53" y="96" width="16" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="61" cy="58" r="33" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="50" cy="55" r="3.2" fill="#111"/>
      <circle cx="72" cy="55" r="3.2" fill="#111"/>
      <path d="M45 66 q16 20 32 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 190">
      <path d="M24 185 Q24 118 44 106 L80 106 Q100 118 100 185" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="54" y="93" width="15" height="16" fill="#fff" stroke="#111" stroke-width="3"/>
      <ellipse cx="61" cy="58" rx="29" ry="32" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M33 56 q-5 -31 28 -34 q33 3 28 34 q-6 -15 -14 -17 q3 8 -3 11 q-4 -9 -11 -9 q-7 0 -11 9 q-6 -3 -3 -11 q-8 2 -14 17 z" fill="#111"/>
      <circle cx="61" cy="19" r="8" fill="#111"/>
      <rect x="41" y="52" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="65" y="52" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="57" x2="65" y2="57" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="57.5" r="2.3" fill="#111"/>
      <circle cx="73" cy="57.5" r="2.3" fill="#111"/>
      <path d="M52 78 q9 4 18 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- rolled sleeve cuffs -->
      <path d="M44 118 l-6 4" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M96 118 l6 4" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 190">
      <path d="M27 185 Q27 120 45 108 L78 108 Q96 120 96 185" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M58 108 L53 152 L61 162 L69 152 L64 108 Z" fill="#111"/>
