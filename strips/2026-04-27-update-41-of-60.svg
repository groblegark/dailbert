  <style>
    text{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;fill:#111;}
    .sp{font-size:15px;}
  </style>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk + dark monitor -->
    <line x1="150" y1="256" x2="398" y2="256" stroke="#111" stroke-width="3"/>
    <rect x="272" y="182" width="96" height="74" rx="6" fill="#23272e" stroke="#111" stroke-width="3"/>
    <rect x="279" y="189" width="82" height="60" fill="#12151b"/>
    <path d="M304 256 l6 -14 h20 l6 14 z" fill="#23272e" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- boss -->
    <use href="#boss" x="25" y="68" width="155" height="245"/>
    <!-- balloon -->
    <path d="M110 74 L112 112 L142 74 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="28" y="14" width="205" height="62" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text class="sp" x="130" y="40" text-anchor="middle">Clanker runs standup</text>
    <text class="sp" x="130" y="60" text-anchor="middle">now. Keeps it tight.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="2" y1="262" x2="398" y2="262" stroke="#111" stroke-width="3"/>
    <!-- wall clock, lots of time gone -->
    <circle cx="56" cy="66" r="30" fill="#fff" stroke="#111" stroke-width="3"/>
    <circle cx="56" cy="66" r="2.5" fill="#111"/>
    <line x1="56" y1="66" x2="56" y2="46" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="66" x2="72" y2="72" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="40" x2="56" y2="45" stroke="#111" stroke-width="2"/>
    <line x1="56" y1="87" x2="56" y2="92" stroke="#111" stroke-width="2"/>
    <line x1="35" y1="66" x2="40" y2="66" stroke="#111" stroke-width="2"/>
    <line x1="72" y1="66" x2="77" y2="66" stroke="#111" stroke-width="2"/>
    <!-- monitor with clanker -->
    <rect x="150" y="148" width="134" height="104" rx="8" fill="#23272e" stroke="#111" stroke-width="3"/>
    <rect x="158" y="156" width="118" height="88" fill="#111820"/>
    <use href="#clanker" x="166" y="158" width="100" height="90"/>
    <path d="M204 260 l6 -8 h20 l6 8 z" fill="#23272e" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- doug, glazed, with mug -->
    <use href="#doug" x="280" y="122" width="130" height="205"/>
    <line x1="326" y1="176" x2="342" y2="176" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="350" y1="176" x2="366" y2="176" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M300 214 h28 v22 a4 4 0 0 1 -4 4 h-20 a4 4 0 0 1 -4 -4 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M328 219 q10 0 10 9 t-10 9" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- clanker screen-edged balloon (dashed to monitor) -->
    <line x1="204" y1="96" x2="216" y2="148" stroke="#111" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="92" y="14" width="216" height="82" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="97" y="19" width="206" height="72" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text class="sp" x="200" y="40" text-anchor="middle">Update 41 of 60.</text>
    <text class="sp" x="200" y="60" text-anchor="middle">Doug reopened his</text>
    <text class="sp" x="200" y="80" text-anchor="middle">own ticket. Twice.</text>
    <!-- doug balloon -->
    <path d="M332 136 L340 158 L358 136 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="300" y="98" width="94" height="40" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text class="sp" x="347" y="123" text-anchor="middle">That tracks.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="2" y1="258" x2="398" y2="258" stroke="#111" stroke-width="3"/>
    <!-- monitor, now dark/off (clanker gone: standup over) -->
    <rect x="188" y="158" width="112" height="88" rx="8" fill="#23272e" stroke="#111" stroke-width="3"/>
    <rect x="196" y="166" width="96" height="72" fill="#0d0f13"/>
    <circle cx="244" cy="200" r="1.6" fill="#3a4150"/>
    <path d="M226 254 l6 -8 h20 l6 8 z" fill="#23272e" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="205" cy="241" r="3" fill="#6b7280"/>
    <!-- priya, reaching to switch it off -->
    <use href="#priya" x="18" y="92" width="145" height="230"/>
    <path d="M112 206 Q160 214 202 240" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <path d="M108 200 l-7 5" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <circle cx="204" cy="241" r="5" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <!-- doug in the corner, mug -->
    <use href="#doug" x="300" y="182" width="95" height="150"/>
    <path d="M314 236 h22 v17 a3 3 0 0 1 -3 3 h-16 a3 3 0 0 1 -3 -3 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M336 240 q8 0 8 7 t-8 7" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- priya balloon -->
    <path d="M96 74 L92 110 L122 74 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="30" y="14" width="186" height="62" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text class="sp" x="123" y="40" text-anchor="middle">Blocked? Anyone?</text>
    <text class="sp" x="123" y="60" text-anchor="middle">...No. We're done.</text>
    <!-- doug button balloon -->
    <path d="M338 154 L346 194 L362 154 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="276" y="108" width="118" height="48" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text class="sp" x="335" y="130" text-anchor="middle">It was getting</text>
    <text class="sp" x="335" y="149" text-anchor="middle">good, though.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>