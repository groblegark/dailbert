      <ellipse cx="61" cy="58" rx="28" ry="31" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M40 33 L33 3 L53 30 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M62 30 L82 3 L83 34 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M40 34 q21 -9 43 0" fill="#111"/>
      <circle cx="52" cy="56" r="2.1" fill="#111"/>
      <circle cx="70" cy="56" r="2.1" fill="#111"/>
      <path d="M54 74 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <!-- ===== CLANKER (only ever inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <line x1="55" y1="26" x2="55" y2="11" stroke="#8b93a1" stroke-width="3"/>
      <circle cx="55" cy="8" r="4" fill="#8b93a1"/>
      <rect x="20" y="26" width="70" height="54" rx="7" fill="#2b303a" stroke="#8b93a1" stroke-width="3"/>
      <rect x="30" y="42" width="20" height="8" rx="3" fill="#bfe6ff"/>
      <rect x="60" y="42" width="20" height="8" rx="3" fill="#bfe6ff"/>
      <rect x="34" y="62" width="42" height="10" rx="2" fill="#0c0e12" stroke="#8b93a1" stroke-width="1.5"/>
      <line x1="41" y1="62" x2="41" y2="72" stroke="#5a6270" stroke-width="2"/>
      <line x1="48" y1="62" x2="48" y2="72" stroke="#5a6270" stroke-width="2"/>
      <line x1="55" y1="62" x2="55" y2="72" stroke="#5a6270" stroke-width="2"/>
      <line x1="62" y1="62" x2="62" y2="72" stroke="#5a6270" stroke-width="2"/>
      <line x1="69" y1="62" x2="69" y2="72" stroke="#5a6270" stroke-width="2"/>
    </symbol>
