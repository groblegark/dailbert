    <path d="M1000 46 Q1000 30 1042 30 L1108 30 Q1126 30 1126 46 L1126 66 Q1126 82 1108 82 L1088 82 L1078 94 L1078 82 L1042 82 Q1000 82 1000 66 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
