    <text x="321" y="48" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Made Ravi a</text>
    <text x="321" y="65" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">thank-you card.</text>
