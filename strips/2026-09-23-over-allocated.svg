      <g>
        <use href="#note" x="1014" y="70" width="24" height="24"/>
        <use href="#note" x="1042" y="72" width="24" height="24"/>
        <use href="#note" x="1070" y="70" width="24" height="24"/>
        <use href="#note" x="1098" y="72" width="24" height="24"/>
        <use href="#note" x="1126" y="70" width="24" height="24"/>
        <use href="#note" x="1154" y="72" width="24" height="24"/>
