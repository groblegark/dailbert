<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Over-Allocated</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-23</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q11 -9 5 3 q-2 6 -9 3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="7.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="42" r="7.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56.5" y1="42" x2="63.5" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="42" r="1.8" fill="#111"/>
      <circle cx="71" cy="42" r="1.8" fill="#111"/>
      <path d="M52 60 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M44 76 L76 76 L84 152 L36 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 76 L54 96 L60 104 L66 96 Z" fill="#111"/>
      <line x1="60" y1="76" x2="60" y2="84" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 140 170">
      <circle cx="62" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="42" r="2.7" fill="#111"/>
      <circle cx="74" cy="42" r="2.7" fill="#111"/>
      <path d="M46 54 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M42 80 L82 80 L90 154 L34 154 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug arm -->
      <path d="M84 102 q22 4 30 20" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="108" y="118" width="20" height="17" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M128 122 q7 2 0 9" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M113 118 q1 -6 6 -6" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 170">
      <ellipse cx="60" cy="44" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair pulled up -->
      <path d="M32 42 q-7 -24 15 -32 q11 -5 21 1 q21 7 17 31 q-13 -13 -27 -11 q-16 -2 -26 10z" fill="#111"/>
      <circle cx="61" cy="12" r="7" fill="#111"/>
      <path d="M30 42 q-4 9 3 18 q-2 -11 4 -15z" fill="#111"/>
      <path d="M90 42 q4 9 -3 18 q2 -11 -4 -15z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="42" y="41" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="41" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="49.5" cy="46" r="1.5" fill="#111"/>
      <circle cx="70.5" cy="46" r="1.5" fill="#111"/>
      <path d="M52 62 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- body, sleeves rolled -->
      <path d="M44 76 L76 76 L84 152 L36 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M44 104 l-6 4 M76 104 l6 4" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER (inside a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="4" x2="60" y2="18" stroke="#3a5a6a" stroke-width="2.4"/>
      <circle cx="60" cy="4" r="3.2" fill="#5a7a8a"/>
      <rect x="26" y="18" width="68" height="56" rx="8" fill="#c9d4d8" stroke="#3a5a6a" stroke-width="2.6"/>
      <rect x="34" y="36" width="20" height="12" rx="3" fill="#0f2a33" stroke="#3a5a6a" stroke-width="1.6"/>
      <rect x="66" y="36" width="20" height="12" rx="3" fill="#0f2a33" stroke="#3a5a6a" stroke-width="1.6"/>
      <rect x="36.5" y="38.5" width="7" height="7" rx="1.5" fill="#8fd6e8"/>
      <rect x="68.5" y="38.5" width="7" height="7" rx="1.5" fill="#8fd6e8"/>
      <rect x="40" y="58" width="40" height="9" rx="2" fill="#0f2a33" stroke="#3a5a6a" stroke-width="1.6"/>
      <line x1="46" y1="58" x2="46" y2="67" stroke="#5a7a8a" stroke-width="1.4"/>
      <line x1="54" y1="58" x2="54" y2="67" stroke="#5a7a8a" stroke-width="1.4"/>
      <line x1="62" y1="58" x2="62" y2="67" stroke="#5a7a8a" stroke-width="1.4"/>
      <line x1="70" y1="58" x2="70" y2="67" stroke="#5a7a8a" stroke-width="1.4"/>
    </symbol>

    <!-- a single sticky note -->
    <symbol id="note" viewBox="0 0 24 24">
      <rect x="1" y="1" width="22" height="22" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <path d="M1 1 L23 1 L23 7 Z" fill="#111" opacity="0.12"/>
      <line x1="5" y1="9" x2="16" y2="9" stroke="#111" stroke-width="1" opacity="0.4"/>
      <line x1="5" y1="14" x2="18" y2="14" stroke="#111" stroke-width="1" opacity="0.4"/>
    </symbol>
  </defs>

  <!-- background paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- floor line -->
      <rect x="0" y="258" width="400" height="82" fill="#e7e2d6"/>
      <line x1="0" y1="258" x2="400" y2="258" stroke="#111" stroke-width="2"/>

      <!-- monitor with clanker -->
      <rect x="238" y="150" width="150" height="112" rx="6" fill="#0f2a33" stroke="#111" stroke-width="3"/>
      <rect x="248" y="160" width="130" height="92" rx="3" fill="#12333d"/>
      <use href="#clanker" x="255" y="166" width="118" height="108"/>
      <rect x="303" y="262" width="20" height="12" fill="#0f2a33" stroke="#111" stroke-width="2.5"/>
      <rect x="283" y="274" width="60" height="7" rx="2" fill="#0f2a33" stroke="#111" stroke-width="2.5"/>

      <!-- Doug at his collage desk -->
      <use href="#doug" x="24" y="128" width="140" height="170"/>

      <!-- clanker balloon: rectangular, dashed line to screen -->
      <line x1="235" y1="112" x2="300" y2="168" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="52" y="24" width="188" height="86" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="146" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Doug, your sticky-note</text>
      <text x="146" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">pad is over-allocated.</text>
      <text x="146" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Two pads this quarter.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
