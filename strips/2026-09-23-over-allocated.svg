        <use href="#note" x="1070" y="130" width="24" height="24"/>
        <use href="#note" x="1098" y="132" width="24" height="24"/>
        <use href="#note" x="1126" y="130" width="24" height="24"/>
        <use href="#note" x="1154" y="132" width="24" height="24"/>
        <use href="#note" x="1182" y="130" width="24" height="24"/>
        <use href="#note" x="1016" y="160" width="24" height="24"/>
        <use href="#note" x="1044" y="162" width="24" height="24"/>
        <use href="#note" x="1072" y="160" width="24" height="24"/>
        <use href="#note" x="1100" y="162" width="24" height="24"/>
        <use href="#note" x="1128" y="160" width="24" height="24"/>
        <use href="#note" x="1156" y="162" width="24" height="24"/>
        <use href="#note" x="1184" y="160" width="24" height="24"/>
      </g>

      <!-- Priya at a monitor with the clanker -->
      <rect x="848" y="150" width="140" height="112" rx="6" fill="#0f2a33" stroke="#111" stroke-width="3"/>
      <rect x="857" y="159" width="122" height="94" rx="3" fill="#12333d"/>
      <use href="#clanker" x="864" y="166" width="108" height="100"/>
      <rect x="908" y="262" width="20" height="12" fill="#0f2a33" stroke="#111" stroke-width="2.5"/>
      <rect x="888" y="274" width="60" height="7" rx="2" fill="#0f2a33" stroke="#111" stroke-width="2.5"/>

      <!-- Priya -->
      <use href="#priya" x="946" y="176" width="118" height="165"/>

      <!-- clanker small earnest balloon, dashed to screen -->
      <line x1="908" y1="148" x2="912" y2="168" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="834" y="16" width="176" height="60" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="922" y="36" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">He has forty-one notes</text>
      <text x="922" y="53" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">and a two-pad budget.</text>
      <text x="922" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It doesn't reconcile.</text>

      <!-- Priya balloon, dry win -->
      <rect x="1030" y="150" width="158" height="60" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M1050 208 l-9 16 l19 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1109" y="172" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">He bought them himself.</text>
      <text x="1109" y="190" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Stop counting his wall.</text>
