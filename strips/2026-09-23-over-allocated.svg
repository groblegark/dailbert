      <g>
        <use href="#note" x="442" y="76" width="26" height="26"/>
        <use href="#note" x="473" y="78" width="26" height="26"/>
        <use href="#note" x="504" y="75" width="26" height="26"/>
        <use href="#note" x="535" y="79" width="26" height="26"/>
        <use href="#note" x="566" y="76" width="26" height="26"/>
        <use href="#note" x="597" y="78" width="26" height="26"/>
        <use href="#note" x="628" y="75" width="26" height="26"/>
        <use href="#note" x="446" y="108" width="26" height="26"/>
        <use href="#note" x="478" y="110" width="26" height="26"/>
        <use href="#note" x="509" y="107" width="26" height="26"/>
        <use href="#note" x="540" y="110" width="26" height="26"/>
        <use href="#note" x="571" y="108" width="26" height="26"/>
        <use href="#note" x="602" y="109" width="26" height="26"/>
        <use href="#note" x="633" y="107" width="26" height="26"/>
        <use href="#note" x="442" y="140" width="26" height="26"/>
        <use href="#note" x="474" y="142" width="26" height="26"/>
        <use href="#note" x="505" y="139" width="26" height="26"/>
        <use href="#note" x="536" y="142" width="26" height="26"/>
        <use href="#note" x="567" y="140" width="26" height="26"/>
        <use href="#note" x="598" y="141" width="26" height="26"/>
        <use href="#note" x="629" y="139" width="26" height="26"/>
        <use href="#note" x="448" y="172" width="26" height="26"/>
        <use href="#note" x="479" y="174" width="26" height="26"/>
        <use href="#note" x="510" y="171" width="26" height="26"/>
        <use href="#note" x="541" y="174" width="26" height="26"/>
        <use href="#note" x="572" y="172" width="26" height="26"/>
        <use href="#note" x="603" y="173" width="26" height="26"/>
        <use href="#note" x="634" y="171" width="26" height="26"/>
      </g>

      <!-- Priya standing, looking at wall, dry -->
      <use href="#priya" x="622" y="152" width="120" height="170"/>
      <!-- Doug beaming beside the wall -->
      <use href="#doug" x="428" y="170" width="130" height="160"/>

      <!-- Doug balloon -->
      <rect x="452" y="16" width="158" height="42" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M492 56 l4 15 l14 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="531" y="33" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Two's plenty. These</text>
      <text x="531" y="51" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">are already up.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
