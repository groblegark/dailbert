    <g clip-path="url(#c2)">
      <rect x="414" y="262" width="400" height="78" fill="#e7e2d6"/>
      <line x1="414" y1="262" x2="814" y2="262" stroke="#111" stroke-width="2"/>

      <!-- Doug's enormous sticky-note collage wall -->
