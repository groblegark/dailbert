<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, wire glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="46" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 11 q10 -12 2 -8 q9 3 -1 9" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.2" fill="#111"/>
      <circle cx="71" cy="46" r="2.2" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M50 79 v10 h20 v-10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 96 q26 -14 52 0 l6 66 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 90 l-5 8 l5 40 l5 -40 z" fill="#111"/>
      <path d="M50 89 l10 9 l10 -9" fill="none" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 170">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 20 q6 -8 12 -2 M68 18 q6 -6 12 2" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="44" r="2.8" fill="#111"/>
      <circle cx="71" cy="44" r="2.8" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M44 58 q16 8 32 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M32 100 q28 -14 56 0 l6 62 h-68 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 86 v12 h20 v-12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <g>
        <rect x="86" y="120" width="26" height="24" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
        <path d="M112 125 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.4"/>
        <path d="M92 120 q7 -18 16 0" fill="none" stroke="#111" stroke-width="1.6"/>
        <path d="M80 128 q8 -4 12 2 q-2 8 -12 6 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      </g>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <circle cx="60" cy="16" r="10" fill="#111"/>
      <ellipse cx="60" cy="48" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 44 q-4 -30 29 -34 q33 4 29 34 q-8 -16 -29 -16 q-21 0 -29 16" fill="#111" stroke="#111" stroke-width="2"/>
      <path d="M31 44 q3 8 5 14 M89 44 q-3 8 -5 14" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="40" y="44" width="17" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="63" y="44" width="17" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="49" x2="63" y2="49" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="49" r="2" fill="#111"/>
      <circle cx="71" cy="49" r="2" fill="#111"/>
      <path d="M53 68 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M50 80 v10 h20 v-10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M32 98 q28 -13 56 0 l5 64 h-66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 128 h14 M84 128 h-14" fill="none" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- CLANKER: chrome box head, slot eyes, grille mouth, antenna (INSIDE a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="14" x2="60" y2="30" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="12" r="3.4" fill="#9aa0a6"/>
      <rect x="28" y="30" width="64" height="52" rx="7" fill="#2b2f33" stroke="#9aa0a6" stroke-width="2.4"/>
      <rect x="38" y="44" width="16" height="7" rx="3.5" fill="#cfd6da"/>
      <rect x="66" y="44" width="16" height="7" rx="3.5" fill="#cfd6da"/>
      <rect x="42" y="62" width="36" height="12" rx="2" fill="#1b1e21" stroke="#9aa0a6" stroke-width="1.6"/>
      <line x1="49" y1="62" x2="49" y2="74" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="56" y1="62" x2="56" y2="74" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="63" y1="62" x2="63" y2="74" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="70" y1="62" x2="70" y2="74" stroke="#9aa0a6" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- =================================================================== -->
  <!-- PANEL 1 -->
  <!-- =================================================================== -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <line x1="0" y1="292" x2="400" y2="292" stroke="#111" stroke-width="2.4"/>

    <use href="#dailbert" x="30" y="150" width="120" height="170"/>

    <g>
      <rect x="228" y="150" width="150" height="112" rx="6" fill="#e9e6df" stroke="#111" stroke-width="2.6"/>
      <rect x="238" y="160" width="130" height="92" rx="3" fill="#20242a"/>
      <line x1="244" y1="168" x2="362" y2="168" stroke="#3a4048" stroke-width="1"/>
      <line x1="244" y1="176" x2="362" y2="176" stroke="#3a4048" stroke-width="1"/>
      <path d="M290 262 h26 l6 18 h-38 z" fill="#e9e6df" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="248" y="168" width="110" height="80"/>
    </g>

    <g>
      <path d="M96 60 h150 a10 10 0 0 1 10 10 v42 a10 10 0 0 1 -10 10 h-86 l-18 16 l2 -16 h-48 a10 10 0 0 1 -10 -10 v-42 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="171" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Summarize my inbox.</text>
      <text x="171" y="103" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Two hundred unread.</text>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- PANEL 2 -->
  <!-- =================================================================== -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <line x1="414" y1="292" x2="814" y2="292" stroke="#111" stroke-width="2.4"/>

    <use href="#dailbert" x="444" y="150" width="120" height="170"/>

    <g>
      <rect x="642" y="150" width="150" height="112" rx="6" fill="#e9e6df" stroke="#111" stroke-width="2.6"/>
      <rect x="652" y="160" width="130" height="92" rx="3" fill="#20242a"/>
      <line x1="658" y1="168" x2="776" y2="168" stroke="#3a4048" stroke-width="1"/>
      <line x1="658" y1="176" x2="776" y2="176" stroke="#3a4048" stroke-width="1"/>
      <path d="M704 262 h26 l6 18 h-38 z" fill="#e9e6df" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="662" y="168" width="110" height="80"/>
    </g>

    <!-- CLANKER balloon: rectangular, screen-edged, dashed line to surface -->
    <g>
      <path d="M628 116 L672 168" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="466" y="48" width="168" height="66" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="470" y="52" width="160" height="58" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="550" y="76" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Summary complete.</text>
      <text x="550" y="99" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16.5" fill="#111" font-weight="bold">&quot;They need you.&quot;</text>
    </g>

    <!-- Dailbert small reply balloon, tucked between him and the monitor -->
    <g>
      <path d="M540 216 h96 a9 9 0 0 1 9 9 v22 a9 9 0 0 1 -9 9 h-58 l-20 14 l3 -14 h-21 a9 9 0 0 1 -9 -9 v-22 a9 9 0 0 1 9 -9 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="592" y="241" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Who needs me?</text>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- PANEL 3 -->
  <!-- =================================================================== -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <line x1="828" y1="292" x2="1228" y2="292" stroke="#111" stroke-width="2.4"/>

    <use href="#dailbert" x="858" y="150" width="120" height="170"/>

    <g>
      <rect x="1056" y="150" width="150" height="112" rx="6" fill="#e9e6df" stroke="#111" stroke-width="2.6"/>
      <rect x="1066" y="160" width="130" height="92" rx="3" fill="#20242a"/>
      <line x1="1072" y1="168" x2="1190" y2="168" stroke="#3a4048" stroke-width="1"/>
      <line x1="1072" y1="176" x2="1190" y2="176" stroke="#3a4048" stroke-width="1"/>
      <path d="M1118 262 h26 l6 18 h-38 z" fill="#e9e6df" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="1076" y="168" width="110" height="80"/>
    </g>

    <!-- Dailbert question balloon -->
    <g>
      <path d="M884 46 h120 a9 9 0 0 1 9 9 v22 a9 9 0 0 1 -9 9 h-60 l-15 13 l1 -13 h-46 a9 9 0 0 1 -9 -9 v-22 a9 9 0 0 1 9 -9 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="953" y="71" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">For what, though?</text>
    </g>

    <!-- CLANKER final over-compressed balloon -->
    <g>
      <path d="M1042 130 L1086 168" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="884" y="104" width="158" height="44" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="888" y="108" width="150" height="36" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="963" y="131" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="17" fill="#111" font-weight="bold">&quot;You.&quot;</text>
    </g>
  </g>
</svg>