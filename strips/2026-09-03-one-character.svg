<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">One Character</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-03</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 4 q7 -8 3 1 q-2 5 4 3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="40" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="34" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="34" x2="53" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="40" cy="34" r="1.8" fill="#111"/>
      <circle cx="60" cy="34" r="1.8" fill="#111"/>
      <path d="M43 50 q7 5 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 L70 64 L78 126 L22 126 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 64 L44 82 L50 90 L56 82 Z" fill="#111"/>
      <line x1="50" y1="64" x2="50" y2="70" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 100 130">
      <circle cx="50" cy="36" r="31" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="34" r="2.6" fill="#111"/>
      <circle cx="60" cy="34" r="2.6" fill="#111"/>
      <path d="M38 44 q12 12 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M32 67 L68 67 L74 126 L26 126 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="70" y="92" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M90 96 q8 3 0 10" fill="none" stroke="#111" stroke-width="2.2"/>
      <line x1="72" y1="98" x2="88" y2="98" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 100 130">
      <path d="M24 30 q0 -22 26 -22 q26 0 26 22 q4 -6 2 -14 q-6 -4 -28 -4 q-22 0 -28 6 q-2 8 2 12 Z" fill="#111"/>
      <ellipse cx="50" cy="36" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M25 30 q0 -24 25 -24 q25 0 25 24 q-8 -10 -25 -10 q-17 0 -25 10 Z" fill="#111"/>
      <path d="M48 6 q10 -3 16 4 q6 5 4 14" fill="#111"/>
      <rect x="32" y="30" width="15" height="11" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="53" y="30" width="15" height="11" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="35" x2="53" y2="35" stroke="#111" stroke-width="2.2"/>
      <circle cx="39.5" cy="35.5" r="1.8" fill="#111"/>
      <circle cx="60.5" cy="35.5" r="1.8" fill="#111"/>
      <path d="M44 50 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M32 64 L68 64 L74 126 L26 126 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- rolled sleeves hint -->
      <line x1="34" y1="86" x2="30" y2="86" stroke="#111" stroke-width="2.2"/>
      <line x1="66" y1="86" x2="70" y2="86" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 100 130">
      <ellipse cx="50" cy="40" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 22 L26 2 L44 18 Z" fill="#111"/>
      <path d="M66 22 L74 2 L56 18 Z" fill="#111"/>
      <circle cx="42" cy="40" r="1.6" fill="#111"/>
      <circle cx="58" cy="40" r="1.6" fill="#111"/>
      <path d="M44 52 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M32 67 L68 67 L74 126 L26 126 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M50 67 L44 82 L50 88 L56 82 Z" fill="#111"/>
    </symbol>

    <!-- ===== CLANKER (inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="22" y="26" width="56" height="46" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="50" y1="26" x2="50" y2="14" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="11" r="3.2" fill="#111"/>
      <rect x="30" y="38" width="15" height="9" rx="2" fill="#111"/>
      <rect x="55" y="38" width="15" height="9" rx="2" fill="#111"/>
      <line x1="33" y1="60" x2="67" y2="60" stroke="#111" stroke-width="2"/>
      <line x1="38" y1="55" x2="38" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="46" y1="55" x2="46" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="55" x2="54" y2="65" stroke="#111" stroke-width="2"/>
      <line x1="62" y1="55" x2="62" y2="65" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- big wall screen with clanker -->
    <rect x="26" y="26" width="150" height="104" rx="4" fill="#e7e3d8" stroke="#111" stroke-width="2.6"/>
    <!-- screen glow hatching -->
    <g stroke="#c9c4b6" stroke-width="1.4">
      <line x1="32" y1="34" x2="170" y2="34"/>
      <line x1="32" y1="122" x2="170" y2="122"/>
    </g>
    <use href="#clanker" x="66" y="30" width="70" height="70"/>
    <text x="101" y="120" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111" font-weight="bold">P1 — WAR ROOM</text>

    <!-- clanker balloon (screen-edged, dashed to surface) -->
    <rect x="196" y="34" width="180" height="60" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="176" y1="70" x2="196" y2="64" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="286" y="56" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I have opened a</text>
    <text x="286" y="73" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Priority One</text>
    <text x="286" y="90" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">incident.</text>

    <!-- Boss panicking -->
    <use href="#boss" x="40" y="150" width="100" height="130"/>
    <!-- Dailbert -->
    <use href="#dailbert" x="150" y="160" width="95" height="130"/>
    <!-- Doug -->
    <use href="#doug" x="255" y="158" width="100" height="130"/>

    <!-- Boss shout balloon -->
    <path d="M26 250 h120 v40 h-70 l-10 12 l-2 -12 h-38 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="86" y="266" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111" font-weight="bold">EVERYONE</text>
    <text x="86" y="283" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111" font-weight="bold">ON THE CALL!</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Priya at a monitor, reading -->
    <use href="#priya" x="30" y="150" width="100" height="130"/>

    <!-- her monitor showing the config -->
    <rect x="150" y="120" width="220" height="120" rx="5" fill="#e7e3d8" stroke="#111" stroke-width="2.6"/>
    <rect x="150" y="240" width="220" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="245" y="250" width="30" height="24" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <!-- config lines -->
    <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#111">
      <text x="164" y="142">port: 8080</text>
      <text x="164" y="162">retries: 3</text>
      <text x="164" y="182">timeout: 30</text>
      <text x="164" y="202">host: prod,</text>
      <text x="164" y="222">region: us-1</text>
    </g>
    <!-- circle on the stray comma -->
    <ellipse cx="238" cy="197" rx="14" ry="12" fill="none" stroke="#111" stroke-width="2.4"/>
    <line x1="252" y1="188" x2="300" y2="150" stroke="#111" stroke-width="1.6"/>
    <text x="336" y="150" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">a comma</text>

    <!-- Priya balloon -->
    <path d="M60 40 h160 v54 h-70 l-12 14 l-2 -14 h-76 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="140" y="60" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">The outage is one</text>
    <text x="140" y="78" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">extra comma.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- Priya walking out with lunch, calm -->
    <use href="#priya" x="40" y="150" width="100" height="130"/>
    <!-- lunch bag in hand -->
    <path d="M118 210 h26 v34 h-26 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <path d="M118 210 q13 -8 26 0" fill="none" stroke="#111" stroke-width="2.2"/>
    <line x1="131" y1="210" x2="131" y2="216" stroke="#111" stroke-width="2"/>

    <!-- Boss and Doug still catching up, behind -->
    <use href="#boss" x="215" y="168" width="90" height="120"/>
    <use href="#doug" x="290" y="166" width="95" height="122"/>

    <!-- wall screen, now closed -->
    <rect x="210" y="30" width="150" height="96" rx="4" fill="#e7e3d8" stroke="#111" stroke-width="2.6"/>
    <use href="#clanker" x="248" y="34" width="66" height="66"/>
    <!-- dashed clanker balloon -->
    <rect x="30" y="30" width="168" height="58" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="210" y1="70" x2="198" y2="60" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="114" y="52" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Incident closed by</text>
    <text x="114" y="70" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Priya. Root cause:</text>
    <text x="114" y="82" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">lunch.</text>

    <!-- Boss balloon -->
    <path d="M226 250 h130 v40 h-60 l-10 12 l-2 -12 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="291" y="267" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Wait — is it fixed</text>
    <text x="291" y="284" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">or is she at lunch?</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>