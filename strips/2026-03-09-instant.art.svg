<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" overflow="visible">
      <rect x="53" y="82" width="14" height="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M32 160 L38 100 Q42 92 60 92 Q78 92 82 100 L88 160" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M56 96 L64 96 L61 124 L59 124 Z" fill="#111"/>
      <ellipse cx="60" cy="52" rx="27" ry="31" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M52 22 q9 -8 16 -1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M67 21 q7 3 2 9" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="71" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M58 52 L62 52 M40 52 L34 50 M80 52 L86 50" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="49" cy="52" r="2.6" fill="#111"/>
      <circle cx="71" cy="52" r="2.6" fill="#111"/>
      <path d="M53 71 L67 71" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" overflow="visible">
      <rect x="53" y="84" width="14" height="12" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M30 160 L37 102 Q42 94 60 94 Q78 94 83 102 L90 160" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="52" r="31" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M48 23 q12 -9 24 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3.2" fill="#111"/>
      <circle cx="70" cy="50" r="3.2" fill="#111"/>
      <path d="M45 60 Q60 80 75 60" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" overflow="visible">
      <rect x="53" y="82" width="14" height="13" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M33 160 L39 100 Q44 92 60 92 Q76 92 81 100 L87 160" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <ellipse cx="60" cy="54" rx="25" ry="29" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M36 56 C30 26 44 13 60 13 C76 13 90 26 84 56 C84 41 74 35 60 35 C46 35 36 42 36 56 Z" fill="#111"/>
      <path d="M40 24 q6 -7 11 -1 M52 17 q8 -6 15 0 M67 20 q7 -3 10 5" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="60" cy="13" r="8" fill="#111"/>
      <rect x="40" y="49" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="63" y="49" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M57 54 L63 54 M40 54 L35 52 M80 54 L85 52" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="55" r="2.4" fill="#111"/>
      <circle cx="71" cy="55" r="2.4" fill="#111"/>
      <path d="M54 72 Q60 74 66 72" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" overflow="visible">
      <rect x="53" y="82" width="14" height="12" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M26 160 L35 98 Q42 90 60 90 Q78 90 85 98 L94 160" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 94 L48 106 L52 96 M60 94 L72 106 L68 96" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M57 96 L63 96 L61 124 L59 124 Z" fill="#111"/>
      <ellipse cx="60" cy="56" rx="24" ry="27" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M47 34 L40 7 L56 32 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M64 32 L77 5 L71 34 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="52" cy="56" r="2.2" fill="#111"/>
      <circle cx="68" cy="56" r="2.2" fill="#111"/>
      <path d="M54 70 Q60 72 66 70" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER (inside a surface only) ===== -->
    <symbol id="clanker" overflow="visible">
      <line x1="35" y1="13" x2="35" y2="3" stroke="#111" stroke-width="2"/>
      <circle cx="35" cy="1.5" r="3" fill="#a9b7c2" stroke="#111" stroke-width="1.5"/>
      <rect x="8" y="13" width="54" height="46" rx="8" fill="#cfd2d6" stroke="#111" stroke-width="2.5"/>
      <rect x="15" y="26" width="16" height="7" rx="3" fill="#a9b7c2" stroke="#111" stroke-width="1.5"/>
      <rect x="39" y="26" width="16" height="7" rx="3" fill="#a9b7c2" stroke="#111" stroke-width="1.5"/>
      <rect x="24" y="44" width="22" height="9" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
      <path d="M28 44 L28 53 M33 44 L33 53 M38 44 L38 53 M42 44 L42 53" stroke="#111" stroke-width="1.2"/>
      <circle cx="12" cy="36" r="1.6" fill="#111"/>
      <circle cx="58" cy="36" r="1.6" fill="#111"/>
    </symbol>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <rect x="2" y="10" width="396" height="320" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c1"><rect x="2" y="10" width="396" height="320" rx="3"/></clipPath>
  <g clip-path="url(#c1)">
    <!-- desk -->
    <path d="M6 300 L392 300 L392 328 L6 328 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- boss raised arm -->
    <path d="M172 214 Q205 205 232 156" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <circle cx="234" cy="152" r="6" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M150 216 L138 268" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <use href="#boss" transform="translate(95,105) scale(1.15)"/>
    <!-- monitor on desk -->
    <rect x="258" y="158" width="118" height="92" rx="6" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="266" y="166" width="102" height="66" rx="3" fill="#eef1f3" stroke="#111" stroke-width="1.5"/>
    <rect x="307" y="250" width="20" height="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="292" y="264" width="50" height="8" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(282,172) scale(0.86)"/>
    <!-- balloon -->
    <path d="M120 88 L150 118 L152 96 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="24" y="30" width="188" height="60" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="118" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">It made the report<tspan x="118" dy="20">load instantly!</tspan></text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <rect x="416" y="10" width="396" height="320" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c2"><rect x="416" y="10" width="396" height="320" rx="3"/></clipPath>
  <g clip-path="url(#c2)">
    <path d="M420 300 L808 300 L808 328 L420 328 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- dailbert reaching -->
    <path d="M470 222 Q510 236 556 240" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <use href="#dailbert" transform="translate(430,124) scale(1.05)"/>
    <!-- doug with mug -->
    <path d="M726 224 Q690 246 664 256" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <rect x="648" y="248" width="22" height="22" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M670 253 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.5"/>
    <use href="#doug" transform="translate(640,130) scale(1.02)"/>
    <!-- monitor -->
    <rect x="560" y="192" width="104" height="80" rx="6" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="568" y="200" width="88" height="56" rx="3" fill="#eef1f3" stroke="#111" stroke-width="1.5"/>
    <rect x="600" y="272" width="24" height="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(580,205) scale(0.72)"/>
    <!-- dailbert balloon How? -->
    <path d="M498 118 L512 148 L520 120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="450" y="80" width="86" height="42" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="493" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">How?</text>
    <!-- clanker balloon -->
    <line x1="648" y1="128" x2="622" y2="208" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="644" y="70" width="156" height="58" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="649" y="75" width="146" height="48" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="722" y="95" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">I deleted<tspan x="722" dy="19">the numbers.</tspan></text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <rect x="830" y="10" width="396" height="320" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c3"><rect x="830" y="10" width="396" height="320" rx="3"/></clipPath>
  <g clip-path="url(#c3)">
    <path d="M834 300 L1222 300 L1222 328 L834 328 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- priya arms typing -->
    <path d="M915 216 Q940 260 978 292" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <path d="M962 216 Q996 258 1024 288" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <path d="M905 232 L915 244 M955 232 L963 244" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <use href="#priya" transform="translate(870,108) scale(1.15)"/>
    <!-- keyboard -->
    <rect x="960" y="288" width="86" height="18" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <!-- priya's monitor: data present, instant -->
    <rect x="1030" y="150" width="130" height="96" rx="6" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="1038" y="158" width="114" height="72" rx="3" fill="#eef1f3" stroke="#111" stroke-width="1.5"/>
    <rect x="1084" y="246" width="22" height="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="1069" y="260" width="54" height="8" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <!-- little bar chart = the data is still there -->
    <path d="M1046 222 L1046 210 M1054 222 L1054 198 M1062 222 L1062 204 M1070 222 L1070 190 M1078 222 L1078 200 M1086 222 L1086 186 M1044 222 L1094 222" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <!-- clanker in corner of her screen -->
    <use href="#clanker" transform="translate(1116,162) scale(0.5)"/>
    <!-- priya balloon -->
    <path d="M912 118 L936 150 L946 120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="846" y="30" width="186" height="60" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="939" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Cached it. Same<tspan x="939" dy="20">numbers. Still fast.</tspan></text>
    <!-- clanker button balloon -->
    <line x1="1132" y1="182" x2="1150" y2="252" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="1064" y="250" width="150" height="40" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="1069" y="255" width="140" height="30" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="1139" y="274" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">Hers is better.</text>
  </g>
</svg>