<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 160 260">
      <path d="M38 260 C38 198 54 172 80 172 C106 172 122 198 122 260" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M66 178 L80 192 L94 178" fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M76 190 L84 190 L82 200 L88 234 L80 244 L72 234 L78 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <ellipse cx="80" cy="78" rx="40" ry="46" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="40" cy="82" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="120" cy="82" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 34 Q64 14 84 24 Q72 30 70 40" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="64" cy="76" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="96" cy="76" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M77 76 H83" stroke="#111" stroke-width="2.5"/>
      <path d="M51 74 L42 71" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M109 74 L118 71" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="64" cy="76" r="2.6" fill="#111"/>
      <circle cx="96" cy="76" r="2.6" fill="#111"/>
      <path d="M80 84 L75 94 L83 94" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M68 104 H92" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 160 260">
      <path d="M34 260 C34 194 54 168 80 168 C106 168 126 194 126 260" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M80 172 L58 206 L74 172" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M80 172 L102 206 L86 172" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M74 172 L86 172 L84 206 L80 214 L76 206 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M76 186 L84 186 L82 202 L80 212 L78 202 Z" fill="#111"/>
      <ellipse cx="80" cy="90" rx="38" ry="42" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M58 54 Q50 24 40 6 Q66 26 74 52 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M86 52 Q94 26 120 6 Q110 24 102 54 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M60 78 L74 80" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M86 80 L100 78" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="68" cy="86" r="2.2" fill="#111"/>
      <circle cx="92" cy="86" r="2.2" fill="#111"/>
      <path d="M80 92 L77 100 L83 100" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M70 110 H90" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 92">
      <path d="M60 6 V18" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="60" cy="6" r="3.2" fill="#111"/>
      <rect x="16" y="18" width="88" height="62" rx="9" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="24" cy="26" r="2" fill="#111"/>
      <circle cx="96" cy="26" r="2" fill="#111"/>
      <rect x="30" y="36" width="24" height="11" rx="3" fill="#111"/>
      <rect x="66" y="36" width="24" height="11" rx="3" fill="#111"/>
      <rect x="36" y="58" width="48" height="14" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M44 58 V72 M52 58 V72 M60 58 V72 M68 58 V72 M76 58 V72" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <clipPath id="mugclip"><rect x="0" y="6" width="66" height="52" rx="8"/></clipPath>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#boss" x="25" y="95" width="150" height="245"/>
    <use href="#dailbert" x="225" y="95" width="150" height="245"/>

    <!-- Boss balloon -->
    <path d="M92 78 L100 138 L108 80 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="18" y="18" width="170" height="58" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="103" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Dailbert, your team's</text>
    <text x="103" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">velocity is up 300%.</text>

    <!-- Dailbert balloon -->
    <path d="M292 78 L300 125 L308 80 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="213" y="18" width="172" height="58" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="299" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">That's the clankers.</text>
    <text x="299" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">They do the work.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <path d="M30 300 H370" stroke="#111" stroke-width="2" opacity="0.45"/>
    <use href="#boss" x="20" y="105" width="150" height="235"/>
    <use href="#dailbert" x="245" y="110" width="150" height="230"/>

    <!-- Boss mug with clanker reflection -->
    <g transform="translate(178,240)">
      <rect x="0" y="6" width="66" height="52" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M66 20 q20 3 20 18 q0 15 -20 18" fill="none" stroke="#111" stroke-width="3"/>
      <g clip-path="url(#mugclip)">
        <use href="#clanker" x="6" y="12" width="54" height="41" opacity="0.5"/>
      </g>
      <path d="M2 14 H64" stroke="#111" stroke-width="2" fill="none"/>
      <path d="M10 16 Q18 34 12 54" stroke="#8a8a8a" stroke-width="2" fill="none" opacity="0.7"/>
    </g>

    <!-- Boss balloon -->
    <path d="M87 100 L95 146 L103 102 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="12" y="12" width="182" height="92" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="103" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">So I'm promoting you.</text>
    <text x="103" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Leadership is taking</text>
    <text x="103" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">credit for what the</text>
    <text x="103" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">machines do.</text>

    <!-- Clanker screen balloon + dashed connector to mug -->
    <path d="M300 80 L196 262" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="5 5"/>
    <rect x="222" y="16" width="166" height="64" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="227" y="21" width="156" height="54" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="305" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Finally, a role he</text>
    <text x="305" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">is qualified for.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <path d="M30 300 H370" stroke="#111" stroke-width="2" opacity="0.45"/>
    <use href="#dailbert" x="20" y="105" width="150" height="235"/>
    <use href="#boss" x="245" y="105" width="150" height="235"/>

    <!-- Boss mug with clanker reflection (silent) -->
    <g transform="translate(250,240)">
      <rect x="0" y="6" width="66" height="52" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M66 20 q20 3 20 18 q0 15 -20 18" fill="none" stroke="#111" stroke-width="3"/>
      <g clip-path="url(#mugclip)">
        <use href="#clanker" x="6" y="12" width="54" height="41" opacity="0.5"/>
      </g>
      <path d="M2 14 H64" stroke="#111" stroke-width="2" fill="none"/>
      <path d="M10 16 Q18 34 12 54" stroke="#8a8a8a" stroke-width="2" fill="none" opacity="0.7"/>
    </g>

    <!-- Dailbert balloon -->
    <path d="M87 68 L95 132 L103 70 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="14" y="14" width="162" height="58" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="95" y="40" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Did the coffee</text>
    <text x="95" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">just talk?</text>

    <!-- Boss balloon -->
    <path d="M312 92 L320 146 L328 94 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="212" y="12" width="178" height="84" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="301" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Coffee can't talk,</text>
    <text x="301" y="56" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Dailbert. Have you</text>
    <text x="301" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">been sleeping?</text>
  </g>
</svg>