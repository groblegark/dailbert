<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Slower. It Works.</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-21</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="dailbert" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 160 V128 Q22 104 60 104 Q98 104 98 128 V160" fill="#f4f1ea"/>
        <path d="M60 108 l-6 8 6 30 6 -30 z" fill="#111"/>
        <ellipse cx="60" cy="70" rx="30" ry="36" fill="#f4f1ea"/>
        <path d="M60 34 q10 -14 2 -20"/>
        <circle cx="49" cy="70" r="9" fill="#f4f1ea"/>
        <circle cx="72" cy="70" r="9" fill="#f4f1ea"/>
        <line x1="58" y1="70" x2="63" y2="70"/>
        <circle cx="49" cy="70" r="1.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="70" r="1.6" fill="#111" stroke="none"/>
        <line x1="52" y1="90" x2="68" y2="90"/>
      </g>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 160 V130 Q20 106 60 106 Q100 106 100 130 V160" fill="#f4f1ea"/>
        <circle cx="60" cy="66" r="34" fill="#f4f1ea"/>
        <circle cx="49" cy="62" r="2.4" fill="#111" stroke="none"/>
        <circle cx="72" cy="62" r="2.4" fill="#111" stroke="none"/>
        <path d="M46 78 q14 16 28 0"/>
        <g>
          <rect x="70" y="120" width="26" height="22" rx="3" fill="#f4f1ea"/>
          <path d="M96 124 q10 2 0 14"/>
          <path d="M70 122 q13 8 26 0"/>
        </g>
      </g>
    </symbol>

    <symbol id="priya" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 160 V128 Q20 104 60 104 Q100 104 100 128 V160" fill="#f4f1ea"/>
        <line x1="30" y1="150" x2="30" y2="138"/>
        <line x1="90" y1="150" x2="90" y2="138"/>
        <ellipse cx="60" cy="72" rx="28" ry="32" fill="#f4f1ea"/>
        <path d="M34 62 q-4 -30 26 -34 q30 4 26 34" fill="#111" stroke="#111"/>
        <circle cx="60" cy="24" r="8" fill="#111" stroke="#111"/>
        <path d="M34 62 q-6 8 0 18" fill="#111" stroke="#111"/>
        <path d="M86 62 q6 8 0 18" fill="#111" stroke="#111"/>
        <rect x="40" y="66" width="16" height="11" rx="2" fill="#f4f1ea"/>
        <rect x="64" y="66" width="16" height="11" rx="2" fill="#f4f1ea"/>
        <line x1="56" y1="71" x2="64" y2="71"/>
        <circle cx="48" cy="72" r="1.6" fill="#111" stroke="none"/>
        <circle cx="72" cy="72" r="1.6" fill="#111" stroke="none"/>
        <path d="M52 90 q8 5 16 0"/>
      </g>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 100">
      <g stroke="#111" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
        <rect x="24" y="24" width="72" height="58" rx="8" fill="#cfcabf"/>
        <line x1="60" y1="24" x2="60" y2="10" fill="none"/>
        <circle cx="60" cy="8" r="3.5" fill="#111"/>
        <rect x="36" y="40" width="20" height="8" rx="3" fill="#f4f1ea"/>
        <rect x="64" y="40" width="20" height="8" rx="3" fill="#f4f1ea"/>
        <g fill="none">
          <line x1="40" y1="62" x2="80" y2="62"/>
          <line x1="40" y1="68" x2="80" y2="68"/>
          <line x1="48" y1="58" x2="48" y2="72"/>
          <line x1="60" y1="58" x2="60" y2="72"/>
          <line x1="72" y1="58" x2="72" y2="72"/>
        </g>
      </g>
    </symbol>

    <symbol id="heat" viewBox="0 0 40 30">
      <g fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
        <path d="M8 28 q6 -8 0 -14 q-6 -6 0 -12"/>
        <path d="M20 28 q6 -8 0 -14 q-6 -6 0 -12"/>
        <path d="M32 28 q6 -8 0 -14 q-6 -6 0 -12"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <g stroke="#111" stroke-width="1.2" opacity="0.16">
        <line x1="250" y1="8" x2="398" y2="8"/>
        <line x1="250" y1="26" x2="398" y2="26"/>
        <line x1="250" y1="44" x2="398" y2="44"/>
        <line x1="250" y1="62" x2="398" y2="62"/>
      </g>
      <use href="#heat" x="300" y="16" width="40" height="30"/>

      <!-- Boss standing, one arm up -->
      <path d="M120 300 V210 Q120 180 165 180 Q210 180 210 210 V300" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M165 186 l-5 8 5 26 5 -26 z" fill="#111"/>
      <ellipse cx="165" cy="150" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M150 124 L146 92 L160 122 Z" fill="#111" stroke="#111"/>
      <path d="M172 122 L184 90 L180 124 Z" fill="#111" stroke="#111"/>
      <circle cx="157" cy="150" r="1.4" fill="#111"/>
      <circle cx="174" cy="150" r="1.4" fill="#111"/>
      <line x1="157" y1="164" x2="173" y2="164" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M205 205 q40 -20 34 -46" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- Dailbert seated + desk -->
      <use href="#dailbert" x="250" y="176" width="105" height="140"/>
      <rect x="228" y="290" width="170" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- Boss balloon -->
      <path d="M40 30 h190 a10 10 0 0 1 10 10 v56 a10 10 0 0 1 -10 10 h-70 l-14 16 -2 -16 h-104 a10 10 0 0 1 -10 -10 v-56 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="135" y="55" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Demo ships today.</text>
      <text x="135" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The clanker made it</text>
      <text x="135" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">faster. Push that one.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <g stroke="#111" stroke-width="1.2" opacity="0.15">
        <line x1="420" y1="10" x2="560" y2="10"/>
        <line x1="420" y1="28" x2="560" y2="28"/>
        <line x1="420" y1="46" x2="560" y2="46"/>
      </g>
      <use href="#heat" x="470" y="14" width="34" height="26"/>

      <!-- desk -->
      <rect x="470" y="196" width="210" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- monitor with clanker -->
      <rect x="512" y="120" width="116" height="76" rx="5" fill="#2b2b2b" stroke="#111" stroke-width="2.4"/>
      <rect x="556" y="196" width="28" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="540" y="208" width="60" height="6" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="524" y="122" width="92" height="76"/>

      <!-- Dailbert -->
      <use href="#dailbert" x="440" y="150" width="110" height="150"/>
      <!-- Doug with mug -->
      <use href="#doug" x="628" y="150" width="120" height="160"/>

      <!-- Clanker balloon -->
      <line x1="574" y1="120" x2="596" y2="96" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="470" y="24" width="318" height="70" rx="3" fill="#efece4" stroke="#111" stroke-width="1.8"/>
      <rect x="474" y="28" width="310" height="62" rx="1" fill="none" stroke="#111" stroke-width="0.8"/>
      <text x="629" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I removed the retries.</text>
      <text x="629" y="65" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">They were slowing it</text>
      <text x="629" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">down. Much snappier.</text>

      <!-- Dailbert small balloon -->
      <path d="M420 250 h78 a8 8 0 0 1 8 8 v26 a8 8 0 0 1 -8 8 h-30 l-10 12 -2 -12 h-36 a8 8 0 0 1 -8 -8 v-26 a8 8 0 0 1 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="459" y="270" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">The retries were</text>
      <text x="459" y="286" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">the feature.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <g stroke="#111" stroke-width="1.2" opacity="0.15">
        <line x1="1080" y1="10" x2="1226" y2="10"/>
        <line x1="1080" y1="28" x2="1226" y2="28"/>
        <line x1="1080" y1="46" x2="1226" y2="46"/>
      </g>
      <use href="#heat" x="1132" y="16" width="34" height="26"/>

      <!-- desk -->
      <rect x="900" y="250" width="240" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- laptop with green check -->
      <rect x="1010" y="196" width="96" height="56" rx="4" fill="#2b2b2b" stroke="#111" stroke-width="2.4"/>
      <rect x="1000" y="250" width="116" height="10" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M1040 224 l10 12 18 -22" fill="none" stroke="#f4f1ea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Priya + reaching arm -->
      <use href="#priya" x="900" y="128" width="120" height="160"/>
      <path d="M985 240 q30 -6 34 -14" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- Priya balloon -->
      <path d="M846 30 h300 a10 10 0 0 1 10 10 v54 a10 10 0 0 1 -10 10 h-206 l-12 14 -2 -14 h-80 a10 10 0 0 1 -10 -10 v-54 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="996" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I shipped the one</text>
      <text x="996" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">with the retries.</text>
      <text x="996" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Slower. It works.</text>

      <!-- dead phone screen on desk with faint clanker -->
      <rect x="918" y="240" width="30" height="16" rx="3" fill="#3a3a3a" stroke="#111" stroke-width="1.8"/>
      <use href="#clanker" x="920" y="238" width="26" height="20" opacity="0.5"/>
      <line x1="948" y1="244" x2="970" y2="226" stroke="#111" stroke-width="1.2" stroke-dasharray="3 3"/>
      <rect x="968" y="172" width="190" height="52" rx="3" fill="#efece4" stroke="#111" stroke-width="1.8"/>
      <rect x="972" y="176" width="182" height="44" rx="1" fill="none" stroke="#111" stroke-width="0.8"/>
      <text x="1063" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Understood. I'll label</text>
      <text x="1063" y="213" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">it the fast one.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>