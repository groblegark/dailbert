      <line x1="0" y1="238" x2="400" y2="238" stroke="#111" stroke-width="2.6"/>
      <line x1="40" y1="238" x2="34" y2="262" stroke="#111" stroke-width="1.6"/>
      <line x1="130" y1="238" x2="126" y2="262" stroke="#111" stroke-width="1.6"/>
      <use href="#keyboard"/>

      <line x1="296" y1="64" x2="306" y2="90" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="206" y="12" width="180" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="210" y="16" width="172" height="44" fill="none" stroke="#111" stroke-width="1"/>
      <text x="296" y="34" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">When you become</text>
      <text x="296" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">the blocker.</text>

      <rect x="14" y="20" width="152" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M92,71 L86,128 L78,70 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="90" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">So when does it</text>
      <text x="90" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">unblock?</text>
    </g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  </g>
</g>
