    <line x1="30" y1="238" x2="24" y2="262" stroke="#111" stroke-width="1.6"/>
    <line x1="120" y1="238" x2="116" y2="262" stroke="#111" stroke-width="1.6"/>
    <use href="#keyboard"/>
    <rect x="40" y="214" width="46" height="24" rx="1" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <line x1="46" y1="221" x2="80" y2="221" stroke="#111" stroke-width="1.2"/>
    <line x1="46" y1="227" x2="80" y2="227" stroke="#111" stroke-width="1.2"/>
    <line x1="46" y1="233" x2="72" y2="233" stroke="#111" stroke-width="1.2"/>

    <line x1="290" y1="52" x2="306" y2="90" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="206" y="12" width="168" height="40" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="210" y="16" width="160" height="32" fill="none" stroke="#111" stroke-width="1"/>
    <text x="290" y="37" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">PROJ-71 is blocked.</text>

    <rect x="22" y="60" width="150" height="46" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <path d="M92,105 L86,128 L78,104 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="97" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Blocked by what?</text>
  </g>
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea"/>
    <g clip-path="url(#pc)">
