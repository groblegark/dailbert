      <line x1="60" y1="238" x2="54" y2="262" stroke="#111" stroke-width="1.6"/>
      <line x1="150" y1="238" x2="146" y2="262" stroke="#111" stroke-width="1.6"/>
      <use href="#keyboard"/>

      <line x1="294" y1="80" x2="306" y2="90" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="204" y="10" width="180" height="70" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="208" y="14" width="172" height="62" fill="none" stroke="#111" stroke-width="1"/>
      <text x="294" y="32" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">It is blocked by a</text>
      <text x="294" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">ticket that does not</text>
      <text x="294" y="68" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">exist yet.</text>

      <rect x="16" y="16" width="168" height="40" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M96,55 L96,120 L84,54 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="100" y="41" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Just unblock it, easy.</text>
    </g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.6"/>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea"/>
