<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Back Monday</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-13</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" overflow="visible">
      <path d="M12,130 L12,95 Q12,74 50,72 Q88,74 88,95 L88,130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="43" y="60" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50,72 L42,88 L50,120 L58,88 Z" fill="#111"/>
      <ellipse cx="50" cy="38" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50,9 q10,-6 6,4 q-3,6 -9,1" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="40" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="40" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="48.5" y1="40" x2="51.5" y2="40" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="40" r="2" fill="#111"/>
      <circle cx="60" cy="40" r="2" fill="#111"/>
      <path d="M42,55 q8,4 16,0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <!-- ===== DOUG ===== -->
    <symbol id="doug" overflow="visible">
      <path d="M8,130 L8,96 Q8,74 50,72 Q92,74 92,96 L92,130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="43" y="58" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="36" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M38,9 q4,-6 7,0 M50,6 q4,-6 7,0 M62,9 q4,-6 7,0" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="34" r="2.6" fill="#111"/>
      <circle cx="60" cy="34" r="2.6" fill="#111"/>
      <path d="M35,43 q15,15 30,0" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="70" y="104" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M92,108 q9,2 0,11" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="74" y1="111" x2="88" y2="111" stroke="#111" stroke-width="2"/>
    </symbol>
    <!-- ===== PRIYA ===== -->
    <symbol id="priya" overflow="visible">
      <path d="M10,130 L10,96 Q10,74 50,72 Q90,74 90,96 L90,130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M22,102 q6,-8 6,-18 M78,102 q-6,-8 -6,-18" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="43" y="58" width="14" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="50" cy="39" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M26,42 Q21,11 50,9 Q79,11 74,42 Q70,23 58,17 Q50,15 42,17 Q30,23 26,42 Z" fill="#111"/>
      <circle cx="50" cy="9" r="7" fill="#111"/>
      <circle cx="27" cy="36" r="4.5" fill="#111"/>
      <circle cx="73" cy="36" r="4.5" fill="#111"/>
      <rect x="31" y="34" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="53" y="34" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="39" x2="53" y2="39" stroke="#111" stroke-width="2.5"/>
      <circle cx="39" cy="39.5" r="2" fill="#111"/>
      <circle cx="61" cy="39.5" r="2" fill="#111"/>
      <path d="M43,55 q7,3 14,0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <!-- ===== CLANKER (drawn inside a screen) ===== -->
    <symbol id="clanker" overflow="visible">
      <line x1="38" y1="14" x2="38" y2="4" stroke="#dfe3e6" stroke-width="2"/>
      <circle cx="38" cy="3" r="2.6" fill="#dfe3e6"/>
      <rect x="6" y="14" width="64" height="50" rx="7" fill="#8b9096" stroke="#dfe3e6" stroke-width="2"/>
      <rect x="15" y="27" width="18" height="7" rx="3" fill="#cfeeff"/>
      <rect x="43" y="27" width="18" height="7" rx="3" fill="#cfeeff"/>
      <rect x="20" y="45" width="36" height="12" rx="2" fill="#3a3d42" stroke="#dfe3e6" stroke-width="1.5"/>
      <line x1="26" y1="45" x2="26" y2="57" stroke="#8b9096" stroke-width="1.5"/>
      <line x1="32" y1="45" x2="32" y2="57" stroke="#8b9096" stroke-width="1.5"/>
      <line x1="38" y1="45" x2="38" y2="57" stroke="#8b9096" stroke-width="1.5"/>
      <line x1="44" y1="45" x2="44" y2="57" stroke="#8b9096" stroke-width="1.5"/>
      <line x1="50" y1="45" x2="50" y2="57" stroke="#8b9096" stroke-width="1.5"/>
    </symbol>
  </defs>

  <style>
    text{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;fill:#111;}
  </style>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <rect x="8" y="272" width="384" height="66" fill="#f4f1ea"/>
    <line x1="8" y1="272" x2="392" y2="272" stroke="#111" stroke-width="2.5"/>
    <!-- laptop -->
    <rect x="66" y="238" width="52" height="34" rx="2" fill="#d9dde0" stroke="#111" stroke-width="2.5"/>
    <path d="M60,272 L124,272 L118,266 L66,266 Z" fill="#eceae3" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- figures -->
    <use href="#dailbert" x="45" y="140"/>
    <use href="#doug" x="205" y="140"/>
    <!-- balloon -->
    <path d="M104,70 L92,150 L128,70 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="52" y="16" width="214" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="159" y="40" text-anchor="middle" font-size="15">Auto-reply's on.</text>
    <text x="159" y="60" text-anchor="middle" font-size="15">Out till Monday.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="8" y="264" width="384" height="74" fill="#f4f1ea"/>
    <line x1="8" y1="264" x2="392" y2="264" stroke="#111" stroke-width="2.5"/>
    <!-- monitor -->
    <rect x="240" y="150" width="126" height="102" rx="4" fill="#2f3237" stroke="#111" stroke-width="2.5"/>
    <rect x="248" y="158" width="110" height="86" rx="3" fill="#3a3d42"/>
    <rect x="290" y="252" width="26" height="12" fill="#2f3237" stroke="#111" stroke-width="2.5"/>
    <rect x="276" y="262" width="54" height="5" rx="2" fill="#2f3237" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(250,160) scale(1.35)"/>
    <!-- Priya -->
    <use href="#priya" x="30" y="140"/>
    <!-- clanker balloon -->
    <line x1="300" y1="150" x2="278" y2="94" stroke="#111" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="150" y="16" width="232" height="78" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="266" y="40" text-anchor="middle" font-size="15">While he was out I</text>
    <text x="266" y="60" text-anchor="middle" font-size="15">answered all forty</text>
    <text x="266" y="80" text-anchor="middle" font-size="15">emails as him.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="8" y="264" width="384" height="74" fill="#f4f1ea"/>
    <line x1="8" y1="264" x2="392" y2="264" stroke="#111" stroke-width="2.5"/>
    <!-- monitor -->
    <rect x="240" y="150" width="126" height="102" rx="4" fill="#2f3237" stroke="#111" stroke-width="2.5"/>
    <rect x="248" y="158" width="110" height="86" rx="3" fill="#3a3d42"/>
    <rect x="290" y="252" width="26" height="12" fill="#2f3237" stroke="#111" stroke-width="2.5"/>
    <rect x="276" y="262" width="54" height="5" rx="2" fill="#2f3237" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(250,160) scale(1.35)"/>
    <!-- Priya with mug -->
    <use href="#priya" x="30" y="140"/>
    <rect x="118" y="196" width="22" height="19" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M140,200 q9,2 0,11" fill="none" stroke="#111" stroke-width="2.5"/>
    <path d="M124,192 q2,-6 4,0 M132,192 q2,-6 4,0" fill="none" stroke="#111" stroke-width="1.8"/>
    <!-- Priya balloon -->
    <path d="M78,66 L72,150 L104,66 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="20" y="14" width="176" height="54" rx="14" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="108" y="37" text-anchor="middle" font-size="15">They all just say</text>
    <text x="108" y="57" text-anchor="middle" font-size="15">'Back Monday.'</text>
    <!-- clanker balloon (button) -->
    <line x1="300" y1="150" x2="286" y2="140" stroke="#111" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="152" y="86" width="224" height="54" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="264" y="109" text-anchor="middle" font-size="15">I didn't want to</text>
    <text x="264" y="129" text-anchor="middle" font-size="15">overpromise.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>