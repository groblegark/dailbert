  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="8"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- figures -->
      <use href="#dailbert" x="150" y="120" width="92" height="156"/>
      <use href="#boss" x="282" y="74" width="104" height="177"/>
      <!-- boss gesturing arm -->
      <path d="M306 176 q-30 4 -52 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M254 200 l-8 0 M254 200 l4 7" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- monitor -->
      <rect x="44" y="172" width="80" height="60" rx="5" fill="#161616" stroke="#111" stroke-width="2.5"/>
      <line x1="52" y1="226" x2="116" y2="226" stroke="#333" stroke-width="1"/>
      <use href="#clanker" x="56" y="178" width="56" height="56"/>
      <rect x="76" y="232" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="252" x2="108" y2="252" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- desk -->
      <rect x="14" y="258" width="372" height="82" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- boss balloon -->
      <path d="M118 16 h172 a12 12 0 0 1 12 12 v32 a12 12 0 0 1 -12 12 h-142 l-14 16 l2 -16 h-18 a12 12 0 0 1 -12 -12 v-32 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="204" y="40" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="204" dy="0">The clanker's minding</tspan>
        <tspan x="204" dy="18">our focus time this week.</tspan>
      </text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="1.5" y="1.5" width="397" height="337" rx="8"/></clipPath>
    <g clip-path="url(#clip2)">
      <use href="#doug" x="236" y="104" width="126" height="194"/>
      <!-- monitor -->
      <rect x="26" y="110" width="170" height="120" rx="6" fill="#141414" stroke="#111" stroke-width="2.5"/>
      <line x1="34" y1="122" x2="60" y2="122" stroke="#2f2f2f" stroke-width="1"/>
      <line x1="34" y1="132" x2="52" y2="132" stroke="#2f2f2f" stroke-width="1"/>
      <use href="#clanker" x="55" y="128" width="112" height="112"/>
      <rect x="100" y="230" width="22" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="80" y1="252" x2="142" y2="252" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- desk -->
      <rect x="14" y="258" width="372" height="82" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- clanker balloon (screen-edged) + dashed connector -->
      <line x1="176" y1="74" x2="150" y2="110" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="118" y="14" width="200" height="58" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="218" y="38" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="218" dy="0">I booked a daily meeting</tspan>
        <tspan x="218" dy="18">so nobody books meetings.</tspan>
      </text>
      <!-- doug balloon -->
      <path d="M258 92 h104 a10 10 0 0 1 10 10 v20 a10 10 0 0 1 -10 10 h-42 l-14 14 l2 -14 h-50 a10 10 0 0 1 -10 -10 v-20 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="310" y="118" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">That's a meeting.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="1.5" y="1.5" width="397" height="337" rx="8"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- priya -->
      <use href="#priya" x="52" y="96" width="112" height="190"/>
      <!-- priya typing arms -->
      <path d="M74 216 q-4 20 24 30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M150 216 q6 20 -18 30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- laptop -->
      <path d="M78 250 l90 0 l10 -12 l-90 0 Z" fill="#cfcfcf" stroke="#111" stroke-width="2.5"/>
      <rect x="94" y="206" width="72" height="34" rx="3" fill="#dcdcdc" stroke="#111" stroke-width="2.5"/>
      <!-- small monitor with clanker -->
      <rect x="250" y="168" width="96" height="72" rx="5" fill="#161616" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="266" y="180" width="54" height="54"/>
      <rect x="290" y="240" width="16" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="278" y1="252" x2="322" y2="252" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- desk -->
      <rect x="14" y="258" width="372" height="82" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- dailbert peeking -->
      <use href="#dailbert" x="178" y="200" width="60" height="102"/>
      <!-- priya balloon -->
      <path d="M96 16 h158 a12 12 0 0 1 12 12 v30 a12 12 0 0 1 -12 12 h-108 l-14 16 l2 -16 h-38 a12 12 0 0 1 -12 -12 v-30 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="175" y="40" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="175" dy="0">I made it recurring.</tspan>
        <tspan x="175" dy="18">It recurs never.</tspan>
      </text>
      <!-- clanker small balloon -->
      <line x1="300" y1="146" x2="298" y2="168" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="248" y="110" width="118" height="36" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="307" y="133" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Focus protected.</text>
      <!-- dailbert small balloon -->
      <path d="M150 180 h96 a9 9 0 0 1 9 9 v14 a9 9 0 0 1 -9 9 h-30 l-12 12 l2 -12 h-56 a9 9 0 0 1 -9 -9 v-14 a9 9 0 0 1 9 -9 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <text x="198" y="201" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Empty cron. She won.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>