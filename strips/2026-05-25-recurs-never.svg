      <path d="M50 28 q9 -9 2 -17" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="58" r="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="58" r="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="58" x2="52" y2="58" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="58" r="2.5" fill="#111"/>
      <circle cx="62" cy="58" r="2.5" fill="#111"/>
      <path d="M42 80 q8 5 16 0" fill="none" stroke="#111" stroke-width="2"/>
