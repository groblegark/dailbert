    <symbol id="doug" viewBox="0 0 110 170" overflow="visible">
      <path d="M18 170 Q18 112 55 112 Q92 112 92 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="49" y="98" width="12" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="55" cy="58" r="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 27 q3 -6 6 -2 M55 25 q3 -6 6 -1" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="45" cy="55" r="3" fill="#111"/>
      <circle cx="66" cy="55" r="3" fill="#111"/>
      <path d="M40 66 q15 22 30 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="70" y="128" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M96 132 q11 5 0 15" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M78 128 q2 -9 6 -9" fill="none" stroke="#111" stroke-width="2" opacity="0.5"/>
