      <line x1="32" y1="40" x2="32" y2="50" stroke="#111" stroke-width="1.5"/>
      <line x1="40" y1="40" x2="40" y2="50" stroke="#111" stroke-width="1.5"/>
      <line x1="48" y1="40" x2="48" y2="50" stroke="#111" stroke-width="1.5"/>
