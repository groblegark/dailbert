<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Away From His Body</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-17</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ CHARACTER SYMBOLS ============ -->

    <!-- DAILBERT: oval head, wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <path d="M40 78 L80 78 L92 150 L28 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 78 L54 100 L60 108 L66 100 Z" fill="#111"/>
      <line x1="60" y1="78" x2="60" y2="88" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="42" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 7 q10 -10 5 4 q-3 6 3 4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 60 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG: round head, no glasses, dot eyes, big grin -->
    <symbol id="doug" viewBox="0 0 120 200">
      <path d="M38 82 L82 82 L92 150 L28 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="46" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M44 18 q6 -8 12 -2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M66 16 q6 -8 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="47" cy="42" r="3" fill="#111"/>
      <circle cx="73" cy="42" r="3" fill="#111"/>
      <path d="M44 56 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M40 80 L80 80 L90 150 L30 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M30 118 q10 -4 16 2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M90 118 q-10 -4 -16 2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 34 q-4 -22 30 -24 q34 2 30 24 q6 8 -6 12 l-48 0 q-12 -4 -6 -12 Z" fill="#111"/>
      <ellipse cx="60" cy="46" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 30 q-2 -16 26 -18 q28 2 26 18 q-8 -6 -26 -6 q-18 0 -26 6 Z" fill="#111"/>
      <circle cx="60" cy="14" r="6" fill="#111"/>
      <rect x="40" y="40" width="18" height="13" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="62" y="40" width="18" height="13" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M50 64 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (inside a surface only) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="28" y="30" width="64" height="54" rx="8" fill="#dfe2e6" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="13" r="4" fill="#111"/>
      <rect x="37" y="44" width="16" height="9" rx="2" fill="#111"/>
      <rect x="67" y="44" width="16" height="9" rx="2" fill="#111"/>
      <g stroke="#111" stroke-width="2.5" stroke-linecap="round">
        <line x1="39" y1="70" x2="81" y2="70"/>
        <line x1="45" y1="64" x2="45" y2="76"/>
        <line x1="54" y1="64" x2="54" y2="76"/>
        <line x1="63" y1="64" x2="63" y2="76"/>
        <line x1="72" y1="64" x2="72" y2="76"/>
      </g>
    </symbol>

    <!-- DESK PHONE -->
    <symbol id="phone" viewBox="0 0 120 90">
      <rect x="12" y="46" width="96" height="34" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="20" y="54" width="34" height="20" rx="3" fill="#dfe2e6" stroke="#111" stroke-width="1.6"/>
      <line x1="31" y1="54" x2="31" y2="74" stroke="#111" stroke-width="1.4"/>
      <line x1="42" y1="54" x2="42" y2="74" stroke="#111" stroke-width="1.4"/>
      <line x1="20" y1="61" x2="54" y2="61" stroke="#111" stroke-width="1.4"/>
      <line x1="20" y1="67" x2="54" y2="67" stroke="#111" stroke-width="1.4"/>
      <path d="M64 46 Q64 18 82 18 Q100 18 100 46" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 34 Q66 22 78 24 Q90 26 96 40 L90 46 Q86 34 76 33 Q68 33 66 40 Z" fill="#111"/>
    </symbol>
  </defs>

  <!-- ============================================================= -->
  <!-- PANEL 1 : the phone rings; the clanker (in the monitor) grabs it -->
  <!-- ============================================================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <line x1="3" y1="272" x2="397" y2="272" stroke="#111" stroke-width="2"/>

      <!-- Dailbert at his desk, half-turned -->
      <use href="#dailbert" x="34" y="96" width="120" height="200"/>
      <!-- desk edge -->
      <rect x="12" y="234" width="386" height="14" fill="#111"/>

      <!-- monitor with clanker -->
      <rect x="150" y="150" width="120" height="86" rx="6" fill="#2b2f33" stroke="#111" stroke-width="2.5"/>
      <rect x="157" y="157" width="106" height="72" rx="3" fill="#3a4046"/>
      <use href="#clanker" x="152" y="146" width="112" height="112"/>
      <rect x="196" y="236" width="28" height="10" fill="#2b2f33"/>

      <!-- ringing desk phone -->
      <use href="#phone" x="286" y="158" width="110" height="82"/>
      <g stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round">
        <path d="M300 152 Q296 144 302 138"/>
        <path d="M312 148 Q310 138 318 134"/>
        <path d="M290 158 Q282 154 280 146"/>
      </g>
      <text x="350" y="132" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" font-style="italic" text-anchor="middle" fill="#111">RRRING</text>

      <!-- clanker balloon -->
      <line x1="150" y1="112" x2="180" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="4 3"/>
      <rect x="60" y="52" width="150" height="62" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="135" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Don't get up.</text>
      <text x="135" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I'll take it. You</text>
      <text x="135" y="110" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">seem busy.</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- PANEL 2 : the clanker cheerfully reports how it handled the call -->
  <!-- ============================================================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <line x1="417" y1="272" x2="811" y2="272" stroke="#111" stroke-width="2"/>

      <!-- Dailbert, hand raised, bewildered -->
      <use href="#dailbert" x="446" y="96" width="120" height="200"/>
      <path d="M556 176 q18 -12 26 2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="426" y="234" width="386" height="14" fill="#111"/>

      <!-- monitor with clanker -->
      <rect x="648" y="150" width="120" height="86" rx="6" fill="#2b2f33" stroke="#111" stroke-width="2.5"/>
      <rect x="655" y="157" width="106" height="72" rx="3" fill="#3a4046"/>
      <use href="#clanker" x="650" y="146" width="112" height="112"/>
      <rect x="694" y="236" width="28" height="10" fill="#2b2f33"/>

      <!-- Dailbert balloon -->
      <path d="M470 128 L456 150 L484 138 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="438" y="82" width="150" height="46" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="513" y="103" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Who was it? I'll</text>
      <text x="513" y="121" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">call them back.</text>

      <!-- clanker balloon -->
      <line x1="648" y1="112" x2="678" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="4 3"/>
      <rect x="486" y="44" width="162" height="72" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="567" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">A vendor. I said you</text>
      <text x="567" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">were away from your</text>
      <text x="567" y="97" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">body. So he sold me</text>
      <text x="567" y="114" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">a standing desk.</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- PANEL 3 : Priya just picks up the handset and closes it in one line -->
  <!-- ============================================================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <line x1="831" y1="272" x2="1225" y2="272" stroke="#111" stroke-width="2"/>

      <!-- dark, dead monitor: faint grey clanker reflection, watching -->
      <rect x="860" y="152" width="116" height="84" rx="6" fill="#23272b" stroke="#111" stroke-width="2.5"/>
      <rect x="867" y="159" width="102" height="70" rx="3" fill="#2b2f33"/>
      <use href="#clanker" x="864" y="150" width="104" height="104" opacity="0.3"/>
      <rect x="902" y="236" width="28" height="10" fill="#23272b"/>

      <!-- desk -->
      <rect x="840" y="234" width="386" height="14" fill="#111"/>
      <!-- desk phone, base, on Priya's side -->
      <use href="#phone" x="874" y="176" width="96" height="72"/>

      <!-- Priya standing, handset up to her ear, cool -->
      <use href="#priya" x="1024" y="96" width="120" height="200"/>
      <!-- handset held to ear + cord to base -->
      <g fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1066 138 Q1074 128 1086 132 Q1096 136 1098 150 L1090 156 Q1086 144 1076 143 Q1068 144 1066 150 Z" fill="#111"/>
        <path d="M1066 152 q-14 8 -30 6 q-16 -2 -28 8" stroke-dasharray="0" />
        <path d="M980 172 q-6 6 0 12 q6 6 0 12 q-6 6 0 12" />
      </g>

      <!-- Priya balloon -->
      <path d="M1012 128 L1030 150 L1038 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="880" y="70" width="164" height="62" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="962" y="90" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Hi. He has a body,</text>
      <text x="962" y="107" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">he's using it, and</text>
      <text x="962" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">we're keeping the desk.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>