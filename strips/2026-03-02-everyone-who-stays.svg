      <path d="M42,102 L52,150 M78,102 L68,150" stroke="#111" stroke-width="2.5" fill="none"/>
      <path d="M60,120 L54,127 L60,160 L66,127 Z" fill="#111"/>
      <rect x="53" y="84" width="14" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="60" rx="26" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <line x1="50" y1="58" x2="56" y2="58" stroke="#111" stroke-width="2.6"/>
      <line x1="66" y1="58" x2="72" y2="58" stroke="#111" stroke-width="2.6"/>
      <path d="M53,74 q7,3 14,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- MUG -->
    <symbol id="mug" viewBox="0 0 60 60">
      <path d="M22,10 q4,-6 0,-11" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
