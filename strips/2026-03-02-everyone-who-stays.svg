      <circle cx="72" cy="50" r="2.4" fill="#111"/>
      <path d="M61,58 q3,4 -2,6" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M52,72 q9,3 18,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 180">
      <path d="M32,180 L32,120 Q32,104 52,100 L68,100 Q88,104 88,120 L88,180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M52,100 L60,118 L68,100" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="130" r="2.2" fill="#111"/>
      <circle cx="60" cy="144" r="2.2" fill="#111"/>
      <rect x="53" y="84" width="14" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="54" r="34" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M46,24 q6,-6 12,-1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M62,23 q7,-5 12,1" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
