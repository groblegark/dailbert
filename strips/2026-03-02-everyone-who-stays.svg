  <!-- ================= PANEL 1 ================= -->
  <rect x="2" y="3" width="396" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="8" y1="305" x2="392" y2="305" stroke="#111" stroke-width="2"/>
  <!-- plant -->
  <path d="M30,300 L30,272 L52,272 L52,300 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <path d="M41,272 q-10,-16 -3,-28 q6,10 3,28" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
  <path d="M41,272 q10,-14 4,-26 q-5,10 -4,26" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
  <!-- figures -->
  <use href="#doug" x="55" y="95" width="120" height="180"/>
  <use href="#dailbert" x="235" y="95" width="120" height="180"/>
  <!-- desk -->
  <rect x="10" y="250" width="382" height="58" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <line x1="10" y1="262" x2="392" y2="262" stroke="#111" stroke-width="1.6"/>
  <use href="#mug" x="150" y="212" width="52" height="52"/>
  <!-- balloons -->
  <ellipse cx="96" cy="52" rx="63" ry="31" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <path d="M92,80 L118,80 L104,118 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="96" y="47" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Hear the reorg</text>
  <text x="96" y="65" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">rumor?</text>

  <ellipse cx="302" cy="50" rx="73" ry="32" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <path d="M292,78 L316,78 L300,116 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="302" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">There's always</text>
  <text x="302" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">a reorg rumor.</text>

  <!-- ================= PANEL 2 ================= -->
  <rect x="416" y="3" width="392" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="422" y1="305" x2="804" y2="305" stroke="#111" stroke-width="2"/>
  <!-- wall clock -->
  <circle cx="452" cy="70" r="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="452" y1="70" x2="452" y2="61" stroke="#111" stroke-width="2"/>
  <line x1="452" y1="70" x2="459" y2="73" stroke="#111" stroke-width="2"/>
  <!-- boss -->
  <use href="#boss" x="440" y="110" width="120" height="195"/>
  <!-- monitor on wall -->
  <rect x="648" y="118" width="150" height="122" rx="6" fill="#111"/>
  <rect x="656" y="126" width="134" height="106" fill="#232323"/>
  <line x1="660" y1="150" x2="786" y2="150" stroke="#3a3a3a" stroke-width="1.4"/>
  <line x1="660" y1="200" x2="786" y2="200" stroke="#3a3a3a" stroke-width="1.4"/>
  <use href="#clanker" x="663" y="132" width="120" height="120"/>
  <!-- boss balloon -->
  <ellipse cx="530" cy="58" rx="67" ry="32" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <path d="M512,84 L536,84 L520,124 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="530" y="53" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Make it leaner.</text>
  <text x="530" y="71" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">But nobody goes.</text>
  <!-- clanker balloon (screen-edged) -->
  <rect x="636" y="30" width="156" height="54" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <line x1="714" y1="84" x2="722" y2="118" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="714" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Nobody who stays</text>
  <text x="714" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">goes.</text>

  <!-- ================= PANEL 3 ================= -->
  <rect x="830" y="3" width="392" height="334" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="836" y1="305" x2="1218" y2="305" stroke="#111" stroke-width="2"/>
  <!-- dailbert facing right -->
  <g transform="translate(978,110) scale(-1,1)">
    <use href="#dailbert" x="0" y="0" width="115" height="180"/>
  </g>
  <!-- desk -->
  <rect x="838" y="252" width="380" height="56" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <line x1="838" y1="264" x2="1218" y2="264" stroke="#111" stroke-width="1.6"/>
  <!-- monitor on desk -->
  <rect x="1104" y="256" width="22" height="10" fill="#111"/>
  <rect x="1034" y="148" width="150" height="112" rx="6" fill="#111"/>
  <rect x="1042" y="156" width="134" height="96" fill="#232323"/>
  <line x1="1046" y1="180" x2="1172" y2="180" stroke="#3a3a3a" stroke-width="1.4"/>
  <line x1="1046" y1="222" x2="1172" y2="222" stroke="#3a3a3a" stroke-width="1.4"/>
  <use href="#clanker" x="1038" y="158" width="92" height="92"/>
  <!-- org chart in screen -->
  <rect x="1122" y="166" width="34" height="15" fill="none" stroke="#8f9aa0" stroke-width="1.6"/>
  <path d="M1139,181 L1139,190 M1113,190 L1165,190 M1113,190 L1113,198 M1165,190 L1165,198" stroke="#8f9aa0" stroke-width="1.4" fill="none"/>
  <rect x="1098" y="198" width="30" height="14" fill="none" stroke="#8f9aa0" stroke-width="1.6"/>
  <rect x="1150" y="198" width="30" height="14" fill="none" stroke="#8f9aa0" stroke-width="1.6"/>
  <path d="M1113,212 L1113,222 M1128,222 L1128,230" stroke="#5f676c" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
  <rect x="1116" y="230" width="28" height="14" fill="none" stroke="#5f676c" stroke-width="1.4" stroke-dasharray="3 3"/>
  <!-- clanker balloon -->
  <rect x="882" y="24" width="176" height="74" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <line x1="1002" y1="98" x2="1052" y2="156" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="970" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It's leaner now.</text>
  <text x="970" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Everyone left</text>
  <text x="970" y="86" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">is still here.</text>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>