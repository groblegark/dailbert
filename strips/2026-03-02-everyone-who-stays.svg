      <line x1="70" y1="16" x2="70" y2="32" stroke="#d9d9d9" stroke-width="3"/>
      <circle cx="70" cy="12" r="4" fill="#d9d9d9"/>
      <rect x="34" y="32" width="72" height="62" rx="11" fill="none" stroke="#d9d9d9" stroke-width="3.5"/>
      <circle cx="34" cy="63" r="4" fill="#d9d9d9"/>
      <circle cx="106" cy="63" r="4" fill="#d9d9d9"/>
      <rect x="45" y="50" width="20" height="9" rx="4" fill="#bfeff2"/>
      <rect x="75" y="50" width="20" height="9" rx="4" fill="#bfeff2"/>
      <rect x="52" y="72" width="36" height="12" rx="2" fill="none" stroke="#d9d9d9" stroke-width="2.5"/>
      <line x1="61" y1="72" x2="61" y2="84" stroke="#d9d9d9" stroke-width="2"/>
      <line x1="70" y1="72" x2="70" y2="84" stroke="#d9d9d9" stroke-width="2"/>
      <line x1="79" y1="72" x2="79" y2="84" stroke="#d9d9d9" stroke-width="2"/>
    </symbol>
