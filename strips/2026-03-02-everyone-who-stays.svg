      <path d="M60,20 q9,-11 15,-2 q-6,-3 -9,4" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M33,52 q-6,1 -5,8" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
