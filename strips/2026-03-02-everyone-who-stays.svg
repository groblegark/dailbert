      <circle cx="72" cy="50" r="3" fill="#111"/>
      <path d="M44,60 q17,24 34,0 q-17,7 -34,0 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 195">
      <path d="M46,36 L44,2 L61,32 Z" fill="#111"/>
      <path d="M60,32 L76,3 L74,38 Z" fill="#111"/>
      <path d="M30,195 L30,120 Q30,104 50,100 L70,100 Q90,104 90,120 L90,195 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
