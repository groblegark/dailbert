        <text x="120" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Wrote a little agent.</text>
        <text x="120" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Waters the plant while</text>
        <text x="120" y="80" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Rob's on vacation.</text>
      </g>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
