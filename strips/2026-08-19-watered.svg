      <line x1="540" y1="170" x2="600" y2="120" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <g>
        <rect x="588" y="30" width="212" height="90" fill="#eef1f2" stroke="#111" stroke-width="2.5"/>
        <text x="694" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">You said "keep it</text>
        <text x="694" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">moist." It ran the</text>
        <text x="694" y="88" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">check 400 times.</text>
        <text x="694" y="108" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">It is very moist now.</text>
      </g>
