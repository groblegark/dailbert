<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">To Be Safe</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-08</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="40" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 6 q10 -10 4 -16 q10 6 -2 18" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="40" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="40" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="40" x2="63" y2="40" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="40" r="2" fill="#111"/>
      <circle cx="71" cy="40" r="2" fill="#111"/>
      <path d="M52 58 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 74 q22 14 44 0 l10 60 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 74 l-7 14 l7 8 l7 -8 z" fill="#111"/>
      <path d="M60 96 l-4 30 h8 z" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="42" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="38" r="3" fill="#111"/>
      <circle cx="72" cy="38" r="3" fill="#111"/>
      <path d="M44 50 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M36 78 q24 14 48 0 l8 58 h-64 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="82" y="104" width="24" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M106 110 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M28 112 q-4 -20 54 -6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M30 34 q4 -26 30 -26 q26 0 30 26 q6 -2 4 8 q-6 4 -10 -2 q-4 30 -24 30 q-20 0 -24 -30 q-4 6 -10 2 q-2 -10 4 -8z" fill="#111"/>
      <ellipse cx="60" cy="42" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M30 34 q4 -26 30 -26 q26 0 30 26 q-30 -14 -60 0z" fill="#111"/>
      <rect x="40" y="36" width="18" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="62" y="36" width="18" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="42" x2="62" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 58 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M38 72 q22 12 44 0 l8 62 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- rolled sleeves hint -->
      <line x1="40" y1="98" x2="34" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="80" y1="98" x2="86" y2="98" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="52" rx="6" fill="#1c1c1c" stroke="#3a3a3a" stroke-width="2.5"/>
      <line x1="60" y1="34" x2="60" y2="20" stroke="#8a8a8a" stroke-width="2.5"/>
      <circle cx="60" cy="16" r="4" fill="#8a8a8a"/>
      <rect x="38" y="46" width="16" height="9" rx="2" fill="#bfe3d0"/>
      <rect x="66" y="46" width="16" height="9" rx="2" fill="#bfe3d0"/>
      <g stroke="#6b6b6b" stroke-width="2">
        <line x1="40" y1="70" x2="80" y2="70"/>
        <line x1="40" y1="76" x2="80" y2="76"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- =================================================================== -->
  <!-- PANEL 1 -->
  <!-- =================================================================== -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- monitor on desk with clanker -->
      <rect x="40" y="150" width="360" height="16" fill="#e7e2d6" stroke="#111" stroke-width="2"/>
      <!-- monitor -->
      <rect x="60" y="70" width="150" height="100" rx="6" fill="#111" stroke="#111" stroke-width="3"/>
      <rect x="70" y="80" width="130" height="80" rx="3" fill="#1c1c1c"/>
      <g transform="translate(85 78) scale(0.85)">
        <use href="#clanker"/>
      </g>
      <rect x="120" y="170" width="30" height="14" fill="#2a2a2a"/>
      <rect x="108" y="184" width="54" height="8" rx="2" fill="#111"/>

      <!-- Dailbert reading at desk, right side -->
      <use href="#dailbert" x="248" y="112" width="120" height="200"/>

      <!-- clanker balloon (screen-edged, dashed line back to surface) -->
      <line x1="150" y1="60" x2="210" y2="42" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="150" y="10" width="230" height="48" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="154" y="14" width="222" height="40" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="265" y="30" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Clear-the-fridge Friday</text>
      <text x="265" y="47" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">reminder. Sent it now.</text>

      <!-- Dailbert reply -->
      <path d="M212 108 q0 -34 90 -34 q60 0 60 22 q0 22 -60 22 q-28 0 -40 6 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="286" y="90" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's Tuesday.</text>
      <text x="286" y="107" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Friday's Friday.</text>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- PANEL 2 -->
  <!-- =================================================================== -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- clanker balloon top -->
      <line x1="500" y1="66" x2="470" y2="42" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="470" y="8" width="330" height="60" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="474" y="12" width="322" height="52" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="635" y="27" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Four days early, yes.</text>
      <text x="635" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">To be safe. I also went</text>
      <text x="635" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">ahead and labeled a container.</text>

      <!-- The fridge, open, center -->
      <rect x="480" y="120" width="180" height="200" rx="8" fill="#ece6da" stroke="#111" stroke-width="2.5"/>
      <line x1="480" y1="196" x2="660" y2="196" stroke="#111" stroke-width="2"/>
      <rect x="640" y="150" width="8" height="30" rx="3" fill="#111"/>
      <rect x="640" y="212" width="8" height="30" rx="3" fill="#111"/>
      <!-- shelf items -->
      <rect x="500" y="150" width="34" height="34" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="548" y="156" width="26" height="28" rx="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="590" y="150" width="30" height="34" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- the mystery container, labeled, on lower shelf -->
      <rect x="512" y="230" width="80" height="52" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="552" cy="230" rx="40" ry="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- sticky label -->
      <rect x="516" y="244" width="72" height="30" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
      <text x="552" y="257" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">CHILI</text>
      <text x="552" y="269" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">(conf. 0.61)</text>

      <!-- Doug peering in, right -->
      <use href="#doug" x="668" y="118" width="120" height="200"/>
    </g>
  </g>

  <!-- =================================================================== -->
  <!-- PANEL 3 -->
  <!-- =================================================================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- the container held up, close, with label -->
      <use href="#priya" x="860" y="118" width="120" height="200"/>
      <use href="#doug" x="1080" y="118" width="120" height="200"/>

      <!-- container Priya holds -->
      <rect x="978" y="196" width="70" height="46" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="1013" cy="196" rx="35" ry="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="982" y="208" width="62" height="26" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
      <text x="1013" y="220" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">CHILI</text>
      <text x="1013" y="231" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">(conf. 0.61)</text>

      <!-- Doug's line -->
      <path d="M1090 132 q0 -30 -70 -30 q-46 0 -46 20 q0 20 46 20 q22 0 34 6 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1020" y="115" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Is it chili?</text>

      <!-- Priya's button line -->
      <path d="M905 150 q0 -30 -34 -30 q-30 0 -30 20 q0 20 30 20 q12 0 18 6 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="872" y="134" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">Mine.</text>
      <text x="872" y="149" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">Yogurt.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>