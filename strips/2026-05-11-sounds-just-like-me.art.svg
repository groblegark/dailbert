  <line x1="520" y1="106" x2="520" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
  <rect x="426" y="16" width="214" height="90" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="431" y="21" width="204" height="80" rx="3" fill="none" stroke="#111" stroke-width="1.2"/>
  <text x="533" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Doug's replies are all</text>
  <text x="533" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">one line. I've sent it</text>
  <text x="533" y="84" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">forty times today.</text>
  <!-- Doug balloon -->
  <path d="M690 100 L712 100 L702 174 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="636" y="42" width="156" height="60" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <text x="714" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">That's the me</text>
  <text x="714" y="86" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">they know.</text>

  <!-- ============ PANEL 3 ============ -->
  <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
