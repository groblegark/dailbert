      <line x1="50" y1="80" x2="70" y2="80" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 170">
      <path d="M18 170 Q18 120 40 110 L80 110 Q102 120 102 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 110 l10 10 l10 -10" fill="none" stroke="#111" stroke-width="3"/>
      <rect x="52" y="99" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="55" r="35" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="26" cy="56" r="5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
