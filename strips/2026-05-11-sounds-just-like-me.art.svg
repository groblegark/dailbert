      <circle cx="31" cy="60" r="5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="89" cy="60" r="5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 22 q6 -11 14 -4 q-4 2 -6 8" fill="none" stroke="#111" stroke-width="3"/>
      <line x1="40" y1="45" x2="52" y2="48" stroke="#111" stroke-width="2"/>
      <line x1="80" y1="45" x2="68" y2="48" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="56" r="9" fill="#fff" stroke="#111" stroke-width="3"/>
