      <ellipse cx="60" cy="56" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="32" cy="58" r="4.5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="88" cy="58" r="4.5" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M31 56 Q26 20 60 18 Q94 20 89 56 Q90 38 76 28 Q68 22 60 23 Q52 22 44 28 Q30 38 31 56 Z" fill="#111"/>
      <circle cx="60" cy="14" r="9" fill="#111"/>
      <circle cx="33" cy="42" r="6" fill="#111"/>
      <circle cx="87" cy="42" r="6" fill="#111"/>
      <rect x="39" y="50" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="63" y="50" width="18" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="3"/>
