  <rect x="884" y="296" width="104" height="12" rx="2" fill="#cfd4d8" stroke="#111" stroke-width="2"/>
  <line x1="898" y1="296" x2="898" y2="308" stroke="#9a9a9a" stroke-width="1.2"/>
  <line x1="916" y1="296" x2="916" y2="308" stroke="#9a9a9a" stroke-width="1.2"/>
  <line x1="934" y1="296" x2="934" y2="308" stroke="#9a9a9a" stroke-width="1.2"/>
  <line x1="952" y1="296" x2="952" y2="308" stroke="#9a9a9a" stroke-width="1.2"/>
  <line x1="970" y1="296" x2="970" y2="308" stroke="#9a9a9a" stroke-width="1.2"/>
  <rect x="836" y="310" width="384" height="28" fill="#e7e2d6" stroke="#111" stroke-width="2"/>
  <!-- Priya balloon -->
  <path d="M905 78 L927 78 L916 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="840" y="18" width="206" height="62" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <text x="943" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I set yours to wait</text>
  <text x="943" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">till you've read them.</text>
  <!-- Doug quiet balloon -->
  <path d="M1102 96 L1124 96 L1114 174 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="1046" y="40" width="150" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <text x="1121" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Huh. People</text>
  <text x="1121" y="84" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">wrote back.</text>
</svg>