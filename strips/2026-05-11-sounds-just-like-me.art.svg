      <path d="M52 76 Q60 80 68 76" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== CLANKER (head only, lives inside a screen) ===== -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="20" x2="60" y2="6" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="5" r="4" fill="#111"/>
      <rect x="26" y="20" width="68" height="60" rx="8" fill="#dfe3e6" stroke="#111" stroke-width="3"/>
      <circle cx="30" cy="50" r="3" fill="#111"/>
      <circle cx="90" cy="50" r="3" fill="#111"/>
      <rect x="36" y="36" width="20" height="9" rx="4" fill="#111"/>
      <rect x="64" y="36" width="20" height="9" rx="4" fill="#111"/>
      <rect x="39" y="38.5" width="14" height="2.5" rx="1.2" fill="#f4f1ea"/>
      <rect x="67" y="38.5" width="14" height="2.5" rx="1.2" fill="#f4f1ea"/>
      <rect x="40" y="58" width="40" height="14" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="58" x2="47" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="58" x2="54" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="61" y1="58" x2="61" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="68" y1="58" x2="68" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="73" y1="58" x2="73" y2="72" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== MUG ===== -->
    <symbol id="mug" viewBox="0 0 60 60">
      <rect x="10" y="16" width="32" height="32" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M42 22 q11 0 11 11 q0 11 -11 11" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M18 12 q3 -6 0 -11 M28 12 q3 -6 0 -11" fill="none" stroke="#9a9a9a" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <use href="#doug" x="24" y="150" width="128" height="182"/>
  <use href="#mug" x="112" y="256" width="46" height="46"/>
  <use href="#dailbert" x="232" y="150" width="136" height="182"/>
  <rect x="8" y="310" width="384" height="28" fill="#e7e2d6" stroke="#111" stroke-width="2"/>
  <!-- Doug balloon -->
  <path d="M100 96 L78 96 L86 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="28" y="16" width="196" height="82" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <text x="126" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">The clanker's been</text>
  <text x="126" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">answering my email.</text>
  <text x="126" y="84" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Sounds just like me!</text>
  <!-- Dailbert balloon -->
  <path d="M300 88 L318 88 L306 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="246" y="34" width="126" height="56" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <text x="309" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">That's the</text>
  <text x="309" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">problem.</text>

  <!-- ============ PANEL 2 ============ -->
  <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
  <!-- monitor -->
  <rect x="430" y="150" width="185" height="150" rx="10" fill="#cfd4d8" stroke="#111" stroke-width="3"/>
  <rect x="440" y="160" width="165" height="130" rx="4" fill="#eef2f4" stroke="#111" stroke-width="2"/>
  <use href="#clanker" x="444" y="168" width="80" height="73"/>
  <!-- repeated identical replies -->
  <g>
    <rect x="528" y="176" width="70" height="13" rx="2" fill="#f7f5f0" stroke="#9a9a9a" stroke-width="1.3"/>
    <line x1="533" y1="183" x2="580" y2="183" stroke="#9a9a9a" stroke-width="1.6"/>
    <path d="M585 183 l3 3 l5 -6" fill="none" stroke="#111" stroke-width="1.6"/>
    <rect x="528" y="194" width="70" height="13" rx="2" fill="#f7f5f0" stroke="#9a9a9a" stroke-width="1.3"/>
    <line x1="533" y1="201" x2="580" y2="201" stroke="#9a9a9a" stroke-width="1.6"/>
    <path d="M585 201 l3 3 l5 -6" fill="none" stroke="#111" stroke-width="1.6"/>
    <rect x="528" y="212" width="70" height="13" rx="2" fill="#f7f5f0" stroke="#9a9a9a" stroke-width="1.3"/>
    <line x1="533" y1="219" x2="580" y2="219" stroke="#9a9a9a" stroke-width="1.6"/>
    <path d="M585 219 l3 3 l5 -6" fill="none" stroke="#111" stroke-width="1.6"/>
    <rect x="528" y="230" width="70" height="13" rx="2" fill="#f7f5f0" stroke="#9a9a9a" stroke-width="1.3"/>
    <line x1="533" y1="237" x2="580" y2="237" stroke="#9a9a9a" stroke-width="1.6"/>
    <path d="M585 237 l3 3 l5 -6" fill="none" stroke="#111" stroke-width="1.6"/>
    <rect x="528" y="248" width="70" height="13" rx="2" fill="#f7f5f0" stroke="#9a9a9a" stroke-width="1.3"/>
    <line x1="533" y1="255" x2="580" y2="255" stroke="#9a9a9a" stroke-width="1.6"/>
    <path d="M585 255 l3 3 l5 -6" fill="none" stroke="#111" stroke-width="1.6"/>
  </g>
  <!-- stand -->
  <rect x="512" y="300" width="22" height="10" fill="#cfd4d8" stroke="#111" stroke-width="2"/>
  <!-- Doug -->
  <use href="#doug" x="650" y="178" width="108" height="153"/>
  <use href="#mug" x="732" y="252" width="44" height="44"/>
  <rect x="422" y="310" width="384" height="28" fill="#e7e2d6" stroke="#111" stroke-width="2"/>
