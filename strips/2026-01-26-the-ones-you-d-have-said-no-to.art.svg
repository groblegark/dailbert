      <circle cx="10" cy="-3" r="2.4" fill="#111"/>
      <path d="M-13,8 q13,16 26,0 q-13,6 -26,0 Z" fill="#111" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>

    <symbol id="clanker" overflow="visible">
      <line x1="0" y1="-30" x2="0" y2="-42" stroke="#8b9096" stroke-width="2"/>
      <circle cx="0" cy="-45" r="3.2" fill="#aeb4ba" stroke="#6a6f75" stroke-width="1.2"/>
      <rect x="-32" y="-30" width="64" height="54" rx="6" fill="#9aa0a6" stroke="#33363a" stroke-width="2.4"/>
      <rect x="-26" y="-24" width="52" height="42" rx="4" fill="#7f858b" stroke="#33363a" stroke-width="1.4"/>
      <ellipse cx="-12" cy="-10" rx="12" ry="8" fill="#cdeee0" opacity="0.45"/>
      <ellipse cx="12" cy="-10" rx="12" ry="8" fill="#cdeee0" opacity="0.45"/>
      <rect x="-20" y="-14" width="16" height="8" rx="2.5" fill="#eaf6f0" stroke="#33363a" stroke-width="1.2"/>
      <rect x="4" y="-14" width="16" height="8" rx="2.5" fill="#eaf6f0" stroke="#33363a" stroke-width="1.2"/>
      <rect x="-16" y="6" width="32" height="10" rx="2" fill="#33363a"/>
      <line x1="-10" y1="6" x2="-10" y2="16" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="-2" y1="6" x2="-2" y2="16" stroke="#9aa0a6" stroke-width="1.4"/>
      <line x1="6" y1="6" x2="6" y2="16" stroke="#9aa0a6" stroke-width="1.4"/>
