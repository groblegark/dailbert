      <path d="M-34,112 C-36,66 -22,50 0,50 C22,50 36,66 34,112 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="-9" y="30" width="18" height="22" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-28,64 q-16,4 -20,12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <ellipse cx="-52" cy="74" rx="8" ry="2.5" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <rect x="-60" y="74" width="16" height="18" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M-44,78 q7,2 0,10" fill="none" stroke="#111" stroke-width="2"/>
