    <clipPath id="c2"><rect x="414" y="0" width="400" height="340"/></clipPath>
    <clipPath id="c3"><rect x="828" y="0" width="400" height="340"/></clipPath>

    <symbol id="dailbert" overflow="visible">
      <path d="M-32,112 C-34,66 -20,48 0,48 C20,48 34,66 32,112 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M0,48 L-6,60 L0,96 L6,60 Z" fill="#111"/>
      <rect x="-8" y="30" width="16" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-2,-28 q10,-8 2,-16 q-2,6 2,10" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="-10" cy="-2" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="10" cy="-2" r="8.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-1.5" y1="-2" x2="1.5" y2="-2" stroke="#111" stroke-width="2"/>
      <line x1="-18.5" y1="-3" x2="-24" y2="-6" stroke="#111" stroke-width="2"/>
      <line x1="18.5" y1="-3" x2="24" y2="-6" stroke="#111" stroke-width="2"/>
      <circle cx="-10" cy="-2" r="1.8" fill="#111"/>
