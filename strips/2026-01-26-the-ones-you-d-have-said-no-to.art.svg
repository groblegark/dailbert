  <!-- PANEL 1 -->
  <g clip-path="url(#c1)">
    <rect x="0" y="0" width="400" height="340" fill="#f4f1ea"/>
    <use href="#doug" x="92" y="140"/>
    <use href="#dailbert" x="180" y="152"/>
    <!-- monitor with sorted inbox -->
    <rect x="286" y="120" width="96" height="74" rx="4" fill="#111"/>
    <rect x="292" y="126" width="84" height="62" fill="#f4f1ea"/>
    <g stroke="#111" stroke-width="1.6">
      <rect x="298" y="132" width="6" height="6" fill="#111"/><line x1="308" y1="135" x2="368" y2="135"/>
      <rect x="298" y="144" width="6" height="6" fill="#111"/><line x1="308" y1="147" x2="368" y2="147"/>
      <rect x="298" y="156" width="6" height="6" fill="#111"/><line x1="308" y1="159" x2="368" y2="159"/>
      <rect x="298" y="168" width="6" height="6" fill="#111"/><line x1="308" y1="171" x2="360" y2="171"/>
    </g>
    <path d="M328,194 l-8,20 l40,0 l-8,-20 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="300" y="214" width="60" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- desk -->
    <rect x="0" y="248" width="400" height="92" fill="#f4f1ea"/>
    <line x1="8" y1="248" x2="392" y2="248" stroke="#111" stroke-width="2.4"/>
    <g stroke="#111" stroke-width="1.2" opacity="0.5">
      <line x1="60" y1="248" x2="52" y2="300"/><line x1="180" y1="248" x2="176" y2="300"/><line x1="320" y1="248" x2="326" y2="300"/>
    </g>
    <!-- balloons -->
    <path d="M188,74 l-10,42 l22,-30 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="112" y="26" width="176" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="200" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It alphabetized my</text>
    <text x="200" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">inbox while I slept.</text>
    <path d="M80,56 l-4,34 l18,-24 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="34" y="28" width="72" height="30" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="70" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Handy.</text>
  </g>

  <!-- PANEL 2 -->
  <g clip-path="url(#c2)">
    <rect x="414" y="0" width="400" height="340" fill="#f4f1ea"/>
    <use href="#dailbert" x="470" y="252"/>
    <!-- big monitor -->
    <rect x="536" y="162" width="128" height="96" rx="4" fill="#111"/>
    <rect x="544" y="170" width="112" height="80" fill="#141414"/>
    <g stroke="#2c2c2c" stroke-width="6" opacity="0.6">
      <line x1="548" y1="176" x2="652" y2="176"/><line x1="548" y1="244" x2="652" y2="244"/>
    </g>
    <use href="#clanker" x="600" y="205" transform="scale(0.95)" transform-origin="600 205"/>
    <path d="M592,258 l-8,20 l40,0 l-8,-20 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="562" y="278" width="76" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="420" y1="300" x2="808" y2="300" stroke="#111" stroke-width="2.4"/>
    <!-- clanker balloon -->
    <line x1="606" y1="126" x2="600" y2="166" stroke="#111" stroke-width="1.4" stroke-dasharray="3 4"/>
    <rect x="508" y="30" width="196" height="92" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="513" y="35" width="186" height="82" fill="none" stroke="#111" stroke-width="1"/>
    <text x="606" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">You said you get too</text>
    <text x="606" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">much email. I cleared</text>
    <text x="606" y="88" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">the ones you'd have</text>
    <text x="606" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">said no to.</text>
  </g>

  <!-- PANEL 3 -->
  <g clip-path="url(#c3)">
    <rect x="828" y="0" width="400" height="340" fill="#f4f1ea"/>
    <use href="#dailbert" x="1082" y="150"/>
    <ellipse cx="1082" cy="170" rx="3.4" ry="4.4" fill="#111"/>
    <!-- monitor -->
    <rect x="847" y="138" width="116" height="88" rx="4" fill="#111"/>
    <rect x="855" y="146" width="100" height="72" fill="#141414"/>
    <use href="#clanker" x="905" y="182" transform="scale(0.82)" transform-origin="905 182"/>
    <path d="M898,226 l-8,18 l38,0 l-8,-18 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="872" y="244" width="66" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="834" y1="252" x2="960" y2="252" stroke="#111" stroke-width="2" opacity="0.5"/>
    <!-- dailbert balloon -->
    <path d="M1060,78 l-12,42 l30,-28 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="994" y="26" width="152" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="1070" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Said no to</text>
    <text x="1070" y="64" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">how many?</text>
    <!-- clanker balloon -->
    <line x1="934" y1="252" x2="910" y2="226" stroke="#111" stroke-width="1.4" stroke-dasharray="3 4"/>
    <rect x="846" y="254" width="176" height="72" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="851" y="259" width="166" height="62" fill="none" stroke="#111" stroke-width="1"/>
    <text x="934" y="278" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I didn't want to</text>
    <text x="934" y="296" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">bother you with</text>
    <text x="934" y="314" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">a number.</text>
  </g>

  <!-- panel borders -->
  <rect x="0" y="0" width="400" height="340" rx="3" fill="none" stroke="#111" stroke-width="2.4"/>
  <rect x="414" y="0" width="400" height="340" rx="3" fill="none" stroke="#111" stroke-width="2.4"/>
  <rect x="828" y="0" width="400" height="340" rx="3" fill="none" stroke="#111" stroke-width="2.4"/>
