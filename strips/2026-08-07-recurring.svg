<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Recurring</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-07</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== SYMBOLS ===== -->

    <!-- DAILBERT: oval head, round glasses, necktie, one curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M40 200 L40 140 Q60 130 80 140 L80 200" fill="#f4f1ea"/>
        <path d="M52 140 L52 122 M68 140 L68 122" fill="none"/>
        <path d="M60 122 L54 132 L60 158 L66 132 Z" fill="#111" stroke="#111"/>
        <path d="M52 124 L60 132 L68 124" fill="#f4f1ea"/>
        <ellipse cx="60" cy="88" rx="30" ry="34" fill="#f4f1ea"/>
        <path d="M60 54 q10 -12 2 -18 q10 4 4 16" fill="none"/>
        <path d="M30 88 q-6 2 -1 10 M90 88 q6 2 1 10" fill="#f4f1ea"/>
        <circle cx="49" cy="86" r="9" fill="#fff"/>
        <circle cx="71" cy="86" r="9" fill="#fff"/>
        <path d="M58 86 L62 86 M40 84 L36 82 M80 84 L84 82" fill="none"/>
        <circle cx="49" cy="86" r="2.2" fill="#111" stroke="none"/>
        <circle cx="71" cy="86" r="2.2" fill="#111" stroke="none"/>
        <path d="M60 92 l-3 8 h6" fill="none"/>
        <path d="M52 108 q8 4 16 0" fill="none"/>
      </g>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin -->
    <symbol id="doug" viewBox="0 0 130 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M38 200 L40 142 Q65 132 90 142 L92 200" fill="#f4f1ea"/>
        <path d="M55 142 L55 126 M75 142 L75 126" fill="none"/>
        <path d="M55 126 L65 134 L75 126" fill="#f4f1ea"/>
        <circle cx="65" cy="86" r="36" fill="#f4f1ea"/>
        <path d="M40 66 q6 -8 12 -4 M78 62 q6 -6 12 0 M60 52 q5 -8 12 -3" fill="none"/>
        <path d="M29 88 q-6 2 -1 10 M101 88 q6 2 1 10" fill="#f4f1ea"/>
        <circle cx="54" cy="84" r="3" fill="#111" stroke="none"/>
        <circle cx="78" cy="84" r="3" fill="#111" stroke="none"/>
        <path d="M48 98 q17 18 34 0" fill="none"/>
        <path d="M65 88 q3 5 -2 7" fill="none"/>
      </g>
    </symbol>

    <!-- Coffee mug -->
    <symbol id="mug" viewBox="0 0 60 60">
      <g fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <rect x="10" y="16" width="34" height="34" rx="4"/>
        <path d="M44 22 q14 2 12 14 q-2 8 -12 8" fill="none"/>
        <path d="M18 12 q2 -6 6 0 M28 12 q2 -6 6 0" fill="none"/>
      </g>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <path d="M38 200 L40 140 Q60 130 80 140 L82 200" fill="#f4f1ea"/>
        <path d="M40 158 l-6 4 M80 158 l6 4" fill="none"/>
        <path d="M52 140 L52 122 M68 140 L68 122" fill="none"/>
        <path d="M52 124 L60 130 L68 124" fill="#f4f1ea"/>
        <ellipse cx="60" cy="90" rx="29" ry="32" fill="#f4f1ea"/>
        <path d="M32 82 q-4 -22 14 -30 q-6 -8 6 -10 q14 -8 26 4 q14 2 12 20 q4 10 -4 18"
              fill="#111" stroke="#111"/>
        <circle cx="60" cy="40" r="8" fill="#111" stroke="#111"/>
        <path d="M31 90 q-6 2 -1 10 M89 90 q6 2 1 10" fill="#f4f1ea"/>
        <rect x="40" y="82" width="17" height="12" rx="2" fill="#fff"/>
        <rect x="63" y="82" width="17" height="12" rx="2" fill="#fff"/>
        <path d="M57 88 L63 88" fill="none"/>
        <circle cx="48.5" cy="88" r="2.2" fill="#111" stroke="none"/>
        <circle cx="71.5" cy="88" r="2.2" fill="#111" stroke="none"/>
        <path d="M60 96 l-3 7 h6" fill="none"/>
        <path d="M53 110 q7 2 14 0" fill="none"/>
      </g>
    </symbol>

    <!-- THE CLANKER -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <line x1="60" y1="20" x2="60" y2="8" fill="none"/>
        <circle cx="60" cy="6" r="3" fill="#111"/>
        <rect x="26" y="20" width="68" height="60" rx="7" fill="#d9d6cf"/>
        <rect x="36" y="36" width="20" height="9" rx="4" fill="#111"/>
        <rect x="64" y="36" width="20" height="9" rx="4" fill="#111"/>
        <rect x="39" y="38.5" width="6" height="4" rx="2" fill="#f4f1ea" stroke="none"/>
        <rect x="67" y="38.5" width="6" height="4" rx="2" fill="#f4f1ea" stroke="none"/>
        <rect x="40" y="58" width="40" height="14" rx="3" fill="#eceae4"/>
        <line x1="48" y1="58" x2="48" y2="72"/>
        <line x1="56" y1="58" x2="56" y2="72"/>
        <line x1="64" y1="58" x2="64" y2="72"/>
        <line x1="72" y1="58" x2="72" y2="72"/>
        <circle cx="30" cy="50" r="2.4" fill="#111"/>
        <circle cx="90" cy="50" r="2.4" fill="#111"/>
      </g>
    </symbol>

    <!-- Dying desk plant -->
    <symbol id="plant" viewBox="0 0 60 70">
      <g stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M18 68 L22 46 h16 L42 68 Z" fill="#f4f1ea"/>
        <path d="M30 46 q-2 -14 -8 -18 M30 46 q3 -10 9 -12 M30 46 l0 -20" fill="none"/>
        <path d="M22 28 q-8 -2 -8 6 M39 34 q8 -2 7 5" fill="none"/>
        <path d="M30 26 q-3 6 3 8" fill="none"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="1" y1="288" x2="401" y2="288" stroke="#111" stroke-width="2.2"/>
    <rect x="252" y="26" width="126" height="82" rx="3" fill="#eceae4" stroke="#111" stroke-width="2.2"/>
    <line x1="315" y1="26" x2="315" y2="108" stroke="#111" stroke-width="1.6"/>
    <path d="M260 92 q20 -14 40 0 M322 94 q22 -12 44 0" stroke="#111" stroke-width="1.3" fill="none"/>
    <circle cx="352" cy="46" r="9" fill="none" stroke="#111" stroke-width="1.6"/>

    <use href="#doug" x="14" y="100" width="150" height="230"/>
    <use href="#dailbert" x="200" y="108" width="140" height="228"/>

    <!-- shared chip bag on desk -->
    <g stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <path d="M168 268 l10 -34 h44 l10 34 Z" fill="#f4f1ea"/>
      <path d="M178 234 q22 -8 44 0" fill="none"/>
      <path d="M183 250 h34 M187 259 h26" fill="none" stroke-width="1.4"/>
    </g>

    <use href="#mug" x="126" y="244" width="50" height="50"/>

    <g>
      <path d="M42 30 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-92 l-16 16 l2 -16 h-44 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 Z"
            fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="117" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Friday chips.</text>
      <text x="117" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">A sacred tradition.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="415" y1="288" x2="815" y2="288" stroke="#111" stroke-width="2.2"/>

    <use href="#dailbert" x="438" y="122" width="140" height="228"/>

    <!-- monitor with clanker -->
    <g>
      <rect x="586" y="122" width="190" height="132" rx="6" fill="#e7e4dd" stroke="#111" stroke-width="2.4"/>
      <rect x="598" y="134" width="166" height="108" rx="3" fill="#dcd9d2" stroke="#111" stroke-width="1.6"/>
      <path d="M672 254 l-14 24 h44 l-14 -24" fill="#e7e4dd" stroke="#111" stroke-width="2.4"/>
      <rect x="648" y="278" width="56" height="8" rx="3" fill="#e7e4dd" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="621" y="144" width="120" height="92"/>
    </g>

    <!-- Clanker balloon: rectangular screen-edged, dashed line to screen -->
    <g>
      <rect x="446" y="20" width="204" height="78" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="451" y="25" width="194" height="68" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="548" y="45" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">You do this weekly.</text>
      <text x="548" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I made it a recurring</text>
      <text x="548" y="81" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">meeting: "Chips."</text>
      <path d="M646 90 L662 152" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="829" y1="288" x2="1227" y2="288" stroke="#111" stroke-width="2.2"/>

    <use href="#plant" x="1152" y="220" width="64" height="72"/>

    <use href="#priya" x="856" y="116" width="140" height="230"/>

    <!-- laptop with declined invite -->
    <g>
      <rect x="982" y="200" width="150" height="82" rx="4" fill="#e7e4dd" stroke="#111" stroke-width="2.4"/>
      <rect x="992" y="208" width="130" height="66" rx="2" fill="#dcd9d2" stroke="#111" stroke-width="1.4"/>
      <rect x="1004" y="216" width="106" height="50" rx="2" fill="#fff" stroke="#111" stroke-width="1.4"/>
      <path d="M1010 226 h72 M1010 236 h56 M1010 246 h64" stroke="#111" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M1086 218 l20 20 M1106 218 l-20 20" stroke="#111" stroke-width="2.4" fill="none"/>
    </g>

    <path d="M958 240 q22 -6 32 4" stroke="#111" stroke-width="2.6" fill="none" stroke-linecap="round"/>

    <g>
      <path d="M846 26 h178 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-120 l-16 16 l2 -16 h-44 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 Z"
            fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="935" y="48" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Declined. Some things</text>
      <text x="935" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">don't need an invite.</text>
    </g>

    <!-- Doug corner with mug, quiet-deep button -->
    <use href="#doug" x="838" y="198" width="110" height="148"/>
    <use href="#mug" x="838" y="248" width="42" height="42"/>
    <g>
      <path d="M858 132 h104 a9 9 0 0 1 9 9 v32 a9 9 0 0 1 -9 9 h-58 l-12 13 l1 -13 h-35 a9 9 0 0 1 -9 -9 v-32 a9 9 0 0 1 9 -9 Z"
            fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="910" y="153" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">We still do the</text>
      <text x="910" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">chips, though?</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>