<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Great, Will Do</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-14</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <g id="dailbert">
      <path d="M-32,6 L-26,-46 Q0,-60 26,-46 L32,6" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-11,-46 L0,-35 L11,-46" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="-6" y="-54" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M0,-35 L-5,-16 L0,-6 L5,-16 Z" fill="#111"/>
      <ellipse cx="0" cy="-72" rx="20" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-2,-96 q7,-9 13,-3 q4,4 -2,7" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-8" cy="-74" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="8" cy="-74" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-1" y1="-74" x2="1" y2="-74" stroke="#111" stroke-width="2"/>
      <line x1="-15" y1="-74" x2="-20" y2="-72" stroke="#111" stroke-width="2"/>
      <circle cx="-8" cy="-74" r="1.6" fill="#111"/>
      <circle cx="8" cy="-74" r="1.6" fill="#111"/>
      <path d="M-6,-58 q6,4 12,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- DOUG -->
    <g id="doug">
      <path d="M-33,6 L-27,-46 Q0,-60 27,-46 L33,6" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-10,-46 L0,-36 L10,-46" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="-6" y="-54" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <ellipse cx="0" cy="-72" rx="23" ry="23" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-14,-92 q6,-6 11,-1 M2,-93 q6,-5 11,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-9" cy="-74" r="2.4" fill="#111"/>
      <circle cx="9" cy="-74" r="2.4" fill="#111"/>
      <path d="M-13,-64 q13,15 26,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- PRIYA -->
    <g id="priya">
      <path d="M-32,6 L-26,-46 Q0,-60 26,-46 L32,6" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-26,-30 q6,4 8,-2 M18,-32 q6,6 8,0" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M-11,-46 L0,-36 L11,-46" fill="none" stroke="#111" stroke-width="2"/>
      <ellipse cx="0" cy="-72" rx="20" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-21,-74 Q-24,-102 0,-104 Q24,-102 21,-74 Q14,-92 0,-91 Q-14,-92 -21,-74 Z" fill="#111"/>
      <circle cx="0" cy="-103" r="7" fill="#111"/>
      <rect x="-17" y="-79" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="3" y="-79" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-3" y1="-74" x2="3" y2="-74" stroke="#111" stroke-width="2"/>
      <circle cx="-10" cy="-74" r="1.6" fill="#111"/>
      <circle cx="10" cy="-74" r="1.6" fill="#111"/>
      <line x1="-6" y1="-57" x2="6" y2="-57" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- CLANKER (drawn only inside a surface) -->
    <g id="clanker">
      <line x1="0" y1="-30" x2="0" y2="-44" stroke="#aeb6bb" stroke-width="2"/>
      <circle cx="0" cy="-46" r="3" fill="#aeb6bb"/>
      <rect x="-26" y="-30" width="52" height="52" rx="6" fill="#4a5058" stroke="#cfd6da" stroke-width="2"/>
      <rect x="-19" y="-14" width="15" height="7" rx="3" fill="#9fe6d8"/>
      <rect x="4" y="-14" width="15" height="7" rx="3" fill="#9fe6d8"/>
      <rect x="-16" y="3" width="32" height="15" rx="2" fill="#333a40" stroke="#cfd6da" stroke-width="1.5"/>
      <path d="M-9,3 V18 M-2,3 V18 M5,3 V18 M12,3 V18" stroke="#cfd6da" stroke-width="1.5"/>
    </g>
    <!-- MUG -->
    <g id="mug">
      <rect x="-9" y="-14" width="17" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M8,-10 q8,2 0,11" fill="none" stroke="#111" stroke-width="2.5"/>
    </g>
