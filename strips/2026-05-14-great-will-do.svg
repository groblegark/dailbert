  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2"/>

    <!-- Dailbert's little monitor -->
    <rect x="150" y="252" width="66" height="46" rx="3" fill="#20242a" stroke="#111" stroke-width="2.5"/>
    <rect x="155" y="256" width="56" height="34" rx="2" fill="#2b3339"/>
    <rect x="176" y="298" width="14" height="4" fill="#20242a" stroke="#111" stroke-width="1.5"/>
    <text x="183" y="266" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="7" fill="#7f8b92" text-anchor="middle">Great, will do.</text>
    <text x="183" y="275" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="7" fill="#7f8b92" text-anchor="middle">Great, will do.</text>
    <text x="183" y="284" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="7" fill="#7f8b92" text-anchor="middle">Great, will do.</text>

    <use href="#dailbert" x="88" y="298"/>
    <use href="#doug" x="322" y="300"/>
    <use href="#mug" x="292" y="270"/>

    <!-- Dailbert balloon -->
    <path d="M126,120 L108,150 L136,124 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="150" cy="74" rx="100" ry="52" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="150" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Built an agent. It</text>
    <text x="150" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">answers my email:</text>
    <text x="150" y="88" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">'Great, will do.'</text>
    <text x="150" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Every time.</text>

    <!-- Doug balloon -->
    <path d="M322,150 L312,178 L338,150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="342" cy="128" rx="50" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="342" y="133" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Efficient.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2"/>

    <!-- big monitor with clanker inside -->
    <rect x="150" y="150" width="164" height="118" rx="4" fill="#20242a" stroke="#111" stroke-width="2.5"/>
    <rect x="156" y="156" width="152" height="106" rx="2" fill="#2b3339"/>
    <line x1="160" y1="176" x2="304" y2="176" stroke="#3a444b" stroke-width="6"/>
    <line x1="160" y1="248" x2="304" y2="248" stroke="#3a444b" stroke-width="6"/>
    <rect x="222" y="268" width="20" height="6" fill="#20242a" stroke="#111" stroke-width="2"/>
    <use href="#clanker" x="232" y="212"/>

    <!-- Dailbert reacting -->
    <use href="#dailbert" x="70" y="298"/>

    <!-- Dailbert small balloon -->
    <path d="M70,172 L64,196 L84,172 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="72" cy="150" rx="40" ry="24" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="72" y="155" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Oh no.</text>

    <!-- Clanker screen-edged balloon -->
    <line x1="248" y1="140" x2="236" y2="180" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="168" y="34" width="216" height="102" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="172" y="38" width="208" height="94" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="276" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Your agent and I have</text>
    <text x="276" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">agreed 412 times. I</text>
    <text x="276" y="98" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">asked what we're doing.</text>
    <text x="276" y="118" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">It said 'Great, will do.'</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="10" y1="300" x2="390" y2="300" stroke="#111" stroke-width="2"/>

    <!-- Dailbert relieved in back -->
    <g transform="translate(226,250) scale(0.82)">
      <use href="#dailbert" x="0" y="0"/>
    </g>

    <!-- Priya's monitor: resolved -->
    <rect x="150" y="250" width="60" height="44" rx="3" fill="#20242a" stroke="#111" stroke-width="2.5"/>
    <rect x="155" y="254" width="50" height="32" rx="2" fill="#26332c"/>
    <path d="M164,270 l5,6 l11,-13" fill="none" stroke="#6fcf97" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="284" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="7" fill="#6fcf97" text-anchor="middle">resolved</text>

    <!-- Priya, winning -->
    <use href="#priya" x="110" y="298"/>

    <!-- Doug with mug -->
    <use href="#doug" x="330" y="300"/>
    <use href="#mug" x="300" y="270"/>

    <!-- Priya balloon -->
    <path d="M120,110 L112,142 L138,112 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="132" cy="66" rx="104" ry="46" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="132" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Marked the thread</text>
    <text x="132" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">resolved. Loop's dead.</text>

    <!-- Doug balloon -->
    <path d="M330,116 L322,152 L346,120 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="322" cy="82" rx="72" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="322" y="78" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">They were getting</text>
    <text x="322" y="96" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">along.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>