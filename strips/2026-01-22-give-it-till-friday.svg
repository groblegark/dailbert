  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- PANEL 1 -->
  <g transform="translate(0,0)" clip-path="url(#pan)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- projector slide -->
    <path d="M97,30 V20" stroke="#111" stroke-width="2" fill="none"/>
    <rect x="82" y="14" width="30" height="8" rx="2" fill="#111"/>
    <rect x="22" y="30" width="150" height="104" rx="3" fill="#eef0e8" stroke="#111" stroke-width="2.5"/>
    <text x="97" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="22" text-anchor="middle" fill="#111">AGENT</text>
    <text x="97" y="102" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">ONBOARDING</text>
    <!-- boss -->
    <use href="#boss" x="210" y="150" width="130" height="185"/>
    <path d="M262,266 Q215,200 180,134" stroke="#111" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M180,134 l-12,-5" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- audience -->
    <use href="#dailbert" x="40" y="165" width="112" height="145"/>
    <use href="#doug" x="120" y="170" width="112" height="145"/>
    <!-- desk -->
    <rect x="-2" y="300" width="404" height="44" fill="#e7e2d6" stroke="#111" stroke-width="2.5"/>
    <!-- balloon -->
    <path d="M268,226 L276,241 L284,226 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="216" y="174" width="180" height="54" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="306" y="200" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">This week, it learns</text>
    <text x="306" y="218" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">what each of you does.</text>
  </g>

  <!-- PANEL 2 -->
  <g transform="translate(414,0)" clip-path="url(#pan)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- boss half at left -->
    <use href="#boss" x="-46" y="150" width="130" height="185"/>
    <!-- seated pair -->
    <use href="#dailbert" x="95" y="155" width="120" height="155"/>
    <use href="#doug" x="235" y="155" width="120" height="155"/>
    <!-- desk -->
    <rect x="-2" y="300" width="404" height="44" fill="#e7e2d6" stroke="#111" stroke-width="2.5"/>
    <!-- notepad -->
    <rect x="112" y="306" width="46" height="24" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M118,313 h34 M118,319 h30 M118,325 h34" stroke="#111" stroke-width="1.2" fill="none"/>
    <!-- boss balloon -->
    <path d="M14,220 L19,238 L30,220 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="8" y="176" width="168" height="46" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="92" y="203" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Give it till Friday.</text>
    <!-- doug balloon -->
    <path d="M286,198 L293,218 L302,198 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="252" y="150" width="120" height="50" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="312" y="171" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">How long&apos;s</text>
    <text x="312" y="189" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">that take?</text>
  </g>

  <!-- PANEL 3 -->
  <g transform="translate(828,0)" clip-path="url(#pan)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- projector mount + screen -->
    <path d="M203,36 V24" stroke="#111" stroke-width="2" fill="none"/>
    <rect x="191" y="18" width="24" height="8" rx="2" fill="#111"/>
    <rect x="96" y="36" width="214" height="150" rx="4" fill="#2b2b2b" stroke="#111" stroke-width="3"/>
    <!-- glow halo + hatch -->
    <ellipse cx="184" cy="112" rx="86" ry="64" fill="#363636"/>
    <path d="M128,80 l-20,-14 M128,150 l-20,14 M240,80 l20,-14 M240,150 l20,14 M184,54 v-12 M184,172 v12" stroke="#454545" stroke-width="1.5" fill="none"/>
    <!-- clanker inside the screen -->
    <use href="#clanker" x="126" y="54" width="116" height="116"/>
    <!-- foreground silhouettes, backlit -->
    <path d="M120,340 C120,302 140,288 165,288 C190,288 210,302 210,340 Z" fill="#111"/>
    <ellipse cx="165" cy="282" rx="25" ry="27" fill="#111"/>
    <path d="M151,258 c-3,-11 13,-13 11,-3" fill="none" stroke="#111" stroke-width="3"/>
    <path d="M205,340 C205,304 226,292 250,292 C274,292 296,304 296,340 Z" fill="#111"/>
    <ellipse cx="250" cy="286" rx="27" ry="27" fill="#111"/>
    <rect x="292" y="300" width="16" height="20" rx="3" fill="#111"/>
    <path d="M308,304 q8,3 0,11" fill="none" stroke="#111" stroke-width="3"/>
    <!-- clanker screen balloon + dashed line to the surface -->
    <path d="M244,86 L300,120" stroke="#111" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
    <rect x="244" y="40" width="152" height="58" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="249" y="45" width="142" height="48" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="320" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I finished Tuesday.</text>
    <text x="320" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">There wasn&apos;t much.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>