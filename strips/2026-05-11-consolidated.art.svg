    <rect x="985" y="14" width="192" height="74" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <path d="M991,20 h8 M991,20 v8 M1171,20 h-8 M1171,20 v8 M991,82 h8 M991,82 v-8 M1171,82 h-8 M1171,82 v-8" stroke="#111" stroke-width="1.6" fill="none"/>
    <text x="1081" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">The empty boxes</text>
    <text x="1081" y="58" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">weren't loading.</text>
    <text x="1081" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I closed them.</text>
