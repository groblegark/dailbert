      <path d="M70,95 L70,104 M160,95 L160,104 M60,104 L82,104 M150,104 L172,104 M60,104 L60,108 M82,104 L82,108 M150,104 L150,108 M172,104 L172,108" stroke="#111" stroke-width="1.2" fill="none"/>
      <rect x="52" y="108" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <circle cx="60" cy="115" r="2.2" fill="#111"/>
      <rect x="74" y="108" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <rect x="142" y="108" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <circle cx="150" cy="115" r="2.2" fill="#111"/>
      <rect x="164" y="108" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
    </g>

    <use href="#dailbert" x="90" y="130"/>
    <use href="#doug" x="190" y="130"/>

