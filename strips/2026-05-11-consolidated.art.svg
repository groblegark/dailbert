      <circle cx="84" cy="33" r="2" fill="#8a8a8a"/>
      <path d="M34,44 l-4,-3 M32,52 l-5,1 M86,44 l4,-3 M88,52 l5,1" stroke="#9a9a9a" stroke-width="1.2"/>
