    <path d="M270,72 L258,104 L284,74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="232" y="20" width="150" height="54" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="307" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">They redid the</text>
    <text x="307" y="64" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">org chart. Tidy.</text>
  </g>

