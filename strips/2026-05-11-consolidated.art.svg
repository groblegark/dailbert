    <rect x="700" y="16" width="110" height="50" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="755" y="37" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Where'd</text>
    <text x="755" y="55" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">everyone go?</text>
