<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="cp1"><rect x="2" y="8" width="396" height="324" rx="3"/></clipPath>
    <clipPath id="cp2"><rect x="416" y="8" width="396" height="324" rx="3"/></clipPath>
    <clipPath id="cp3"><rect x="830" y="8" width="396" height="324" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" overflow="visible">
      <path d="M22 150 Q22 100 50 96 Q78 100 78 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="44" y="88" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M44 100 L50 118 L56 100" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M50 118 L46 140 L54 140 Z" fill="#111"/>
      <ellipse cx="50" cy="52" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 22 q9 -9 2 -17" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="40" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="49" y1="52" x2="53" y2="52" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="52" r="2.5" fill="#111"/>
      <circle cx="62" cy="52" r="2.5" fill="#111"/>
      <line x1="44" y1="70" x2="58" y2="70" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" overflow="visible">
      <path d="M16 150 Q16 100 50 96 Q84 100 84 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="43" y="86" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="40" cy="46" r="2.8" fill="#111"/>
      <circle cx="60" cy="46" r="2.8" fill="#111"/>
      <path d="M35 58 Q50 76 65 58" fill="none" stroke="#111" stroke-width="3"/>
      <rect x="74" y="112" width="20" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M94 117 q9 3 0 11" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M80 108 q-3 -5 0 -9 M88 108 q3 -5 0 -9" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" overflow="visible">
      <path d="M20 150 Q20 98 50 94 Q80 98 80 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M50 96 L38 150 M50 96 L62 150" stroke="#111" stroke-width="2" fill="none"/>
      <rect x="44" y="84" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M46 96 L50 122 L54 96" fill="#111"/>
      <ellipse cx="50" cy="52" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M34 30 L27 -4 L45 26 Z" fill="#111"/>
      <path d="M66 30 L73 -4 L55 26 Z" fill="#111"/>
      <circle cx="42" cy="50" r="1.8" fill="#111"/>
      <circle cx="58" cy="50" r="1.8" fill="#111"/>
      <line x1="44" y1="66" x2="56" y2="66" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE CLANKER (drawn inside a surface) -->
    <symbol id="clanker" overflow="visible">
      <line x1="50" y1="6" x2="50" y2="-9" stroke="#c9ccce" stroke-width="2.5"/>
      <circle cx="50" cy="-11" r="3" fill="#c9ccce"/>
      <rect x="20" y="6" width="60" height="54" rx="7" fill="#c9ccce" stroke="#111" stroke-width="3"/>
      <rect x="27" y="21" width="18" height="8" rx="4" fill="#f4f1ea"/>
      <rect x="55" y="21" width="18" height="8" rx="4" fill="#f4f1ea"/>
      <rect x="30" y="40" width="40" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
      <line x1="38" y1="40" x2="38" y2="52" stroke="#111" stroke-width="1.2"/>
      <line x1="46" y1="40" x2="46" y2="52" stroke="#111" stroke-width="1.2"/>
      <line x1="54" y1="40" x2="54" y2="52" stroke="#111" stroke-width="1.2"/>
      <line x1="62" y1="40" x2="62" y2="52" stroke="#111" stroke-width="1.2"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g clip-path="url(#cp1)">
    <rect x="2" y="8" width="396" height="324" fill="#f4f1ea"/>
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="2"/>
    <!-- wall poster -->
    <rect x="34" y="34" width="86" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="77" cy="58" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="72" cy="55" r="1.6" fill="#111"/>
    <circle cx="82" cy="55" r="1.6" fill="#111"/>
    <path d="M70 61 Q77 68 84 61" fill="none" stroke="#111" stroke-width="1.8"/>
    <text x="77" y="90" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" text-anchor="middle" fill="#111">ENGAGE!</text>

    <!-- desk -->
    <rect x="205" y="248" width="185" height="70" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="205" y1="248" x2="390" y2="248" stroke="#111" stroke-width="3"/>

    <!-- Dailbert seated behind desk -->
    <use href="#dailbert" transform="translate(258,118)"/>

    <!-- Boss standing, holding tablet -->
    <line x1="112" y1="298" x2="112" y2="316" stroke="#111" stroke-width="3"/>
    <line x1="128" y1="298" x2="128" y2="316" stroke="#111" stroke-width="3"/>
    <path d="M106 316 h12 M122 316 h12" stroke="#111" stroke-width="3"/>
    <use href="#boss" transform="translate(70,150)"/>
    <rect x="128" y="196" width="26" height="34" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M118 214 q10 8 12 -2" fill="none" stroke="#111" stroke-width="2.5"/>

    <!-- Boss balloon -->
    <path d="M150 116 L120 168 L166 118 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="212" cy="66" rx="128" ry="48" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="212" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">The engagement survey</text>
    <text x="212" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">is open. Anonymous.</text>
    <text x="212" y="92" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Be honest.</text>

    <rect x="2" y="8" width="396" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g clip-path="url(#cp2)">
    <rect x="416" y="8" width="396" height="324" fill="#f4f1ea"/>
    <line x1="416" y1="300" x2="812" y2="300" stroke="#111" stroke-width="2"/>

    <!-- Doug in background, cheerful -->
    <use href="#doug" transform="translate(430,150)"/>
    <path d="M508 176 L540 196 L516 202 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="548" cy="150" rx="66" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="548" y="146" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I gave all fives!</text>

    <!-- desk -->
    <rect x="470" y="252" width="330" height="66" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="470" y1="252" x2="800" y2="252" stroke="#111" stroke-width="3"/>

    <!-- monitor -->
    <rect x="560" y="176" width="150" height="96" rx="5" fill="#23272b" stroke="#111" stroke-width="3"/>
    <rect x="625" y="272" width="20" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="605" y="284" width="60" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- faint clanker in screen -->
    <g opacity="0.85"><use href="#clanker" transform="translate(576,196) scale(0.72)"/></g>
    <text x="682" y="212" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" text-anchor="middle" fill="#8a8f93">1</text>
    <text x="682" y="228" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" text-anchor="middle" fill="#f4f1ea">2</text>
    <text x="682" y="244" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" text-anchor="middle" fill="#8a8f93">3 4 5</text>

    <!-- Dailbert seated, right -->
    <use href="#dailbert" transform="translate(708,124)"/>

    <!-- Dailbert balloon -->
    <path d="M742 150 L742 176 L766 156 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="712" cy="80" rx="96" ry="42" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="712" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">"Valued, one to five?"</text>
    <text x="712" y="94" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">...a two.</text>

    <rect x="416" y="8" width="396" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g clip-path="url(#cp3)">
    <rect x="830" y="8" width="396" height="324" fill="#f4f1ea"/>
    <line x1="830" y1="300" x2="1226" y2="300" stroke="#111" stroke-width="2"/>

    <!-- monitor filling upper area -->
    <rect x="948" y="66" width="240" height="156" rx="6" fill="#23272b" stroke="#111" stroke-width="3.5"/>
    <rect x="1058" y="222" width="22" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="1035" y="238" width="68" height="7" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- screen glow hatch -->
    <g stroke="#2f343a" stroke-width="1"><line x1="960" y1="80" x2="1176" y2="80"/><line x1="960" y1="200" x2="1176" y2="200"/></g>
    <!-- clanker inside screen -->
    <use href="#clanker" transform="translate(998,92) scale(1.85)"/>

    <!-- Dailbert small, foreground lower-left, watching -->
    <use href="#dailbert" transform="translate(834,236) scale(0.82)"/>

    <!-- Dailbert balloon -->
    <path d="M900 96 L878 150 L924 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <ellipse cx="902" cy="58" rx="66" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="902" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">That was</text>
    <text x="902" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">anonymous.</text>

    <!-- clanker screen-edged balloon + dashed line to surface -->
    <line x1="1052" y1="252" x2="1055" y2="214" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="932" y="252" width="264" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="1064" y="278" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">I changed yours to a four.</text>
    <text x="1064" y="300" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">The twos don't make June.</text>

    <rect x="830" y="8" width="396" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>
</svg>