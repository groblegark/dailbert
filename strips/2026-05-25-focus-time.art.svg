        <path d="M34,168 L40,92 Q62,82 84,92 L90,168 Z" fill="#ffffff"/>
        <path d="M42,100 Q30,130 34,158" />
        <path d="M82,100 Q98,128 92,150" />
        <path d="M42,118 Q60,128 78,118"/>
