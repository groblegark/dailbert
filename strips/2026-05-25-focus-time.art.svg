        <path d="M44,56 Q60,74 76,56"/>
        <rect x="104" y="116" width="24" height="21" rx="2" fill="#ffffff"/>
        <path d="M128,120 q9,2 8,10 q-1,6 -8,5"/>
        <path d="M110,111 q2,-6 6,-2 M118,111 q2,-6 6,-2"/>
      </g>
    </symbol>

    <symbol id="priya" viewBox="0 0 140 190">
