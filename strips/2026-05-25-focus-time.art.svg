  <!-- ================= PAGE ================= -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ---------- PANEL 1 ---------- -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="14" y1="300" x2="386" y2="300" stroke="#111" stroke-width="2" opacity="0.35"/>
    <use href="#doug" x="118" y="128" width="150" height="193"/>

    <path d="M120,30 h172 a16,16 0 0 1 16,16 v50 a16,16 0 0 1 -16,16 h-70 l-14,20 l-4,-20 h-84 a16,16 0 0 1 -16,-16 v-50 a16,16 0 0 1 16,-16 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="206" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Clear my afternoon?</text>
    <text x="206" y="73" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">I need to actually</text>
    <text x="206" y="92" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">think for once.</text>
  </g>

  <!-- ---------- PANEL 2 ---------- -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="428" y1="300" x2="800" y2="300" stroke="#111" stroke-width="2" opacity="0.35"/>

    <use href="#doug" x="432" y="168" width="118" height="152"/>

    <!-- monitor -->
    <rect x="648" y="150" width="150" height="120" rx="6" fill="#111"/>
    <rect x="654" y="156" width="138" height="108" rx="3" fill="#b9b6ad"/>
    <use href="#clanker" x="664" y="162" width="118" height="96"/>
    <rect x="700" y="270" width="46" height="10" rx="2" fill="#111"/>
    <rect x="686" y="280" width="74" height="8" rx="3" fill="#111"/>

    <!-- clanker balloon (screen-edged) + dashed link to screen -->
    <path d="M562,152 L640,132" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4" fill="none"/>
    <rect x="428" y="22" width="256" height="94" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.2" stroke-dasharray="7 3"/>
    <text x="556" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Done. I blocked off</text>
    <text x="556" y="64" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">'Deep Thinking' and</text>
    <text x="556" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">invited the whole team,</text>
    <text x="556" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">so they'll respect it.</text>
  </g>

  <!-- ---------- PANEL 3 ---------- -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="842" y1="300" x2="1214" y2="300" stroke="#111" stroke-width="2" opacity="0.35"/>

    <use href="#priya" x="860" y="120" width="150" height="203"/>
    <rect x="878" y="286" width="120" height="16" rx="2" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <line x1="890" y1="294" x2="986" y2="294" stroke="#111" stroke-width="1.4"/>

    <use href="#doug" x="1074" y="176" width="112" height="144"/>

    <!-- Priya balloon -->
    <path d="M886,28 h150 a14,14 0 0 1 14,14 v30 a14,14 0 0 1 -14,14 h-84 l-14,18 l-2,-18 h-50 a14,14 0 0 1 -14,-14 v-30 a14,14 0 0 1 14,-14 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="961" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Fixed. One attendee.</text>
    <text x="961" y="71" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">You.</text>

    <!-- Doug button balloon -->
    <path d="M1042,112 h146 a13,13 0 0 1 13,13 v22 a13,13 0 0 1 -13,13 h-58 l-16,16 l-2,-16 h-70 a13,13 0 0 1 -13,-13 v-22 a13,13 0 0 1 13,-13 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="1115" y="140" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">...I'll bring the mug.</text>
  </g>
</svg>