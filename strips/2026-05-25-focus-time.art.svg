<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ================= SYMBOLS ================= -->
    <symbol id="dailbert" viewBox="0 0 120 180">
      <g fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M36,150 L42,86 Q58,78 74,86 L80,150 Z" fill="#ffffff"/>
        <path d="M58,88 L54,112 L62,112 Z" fill="#111"/>
        <path d="M50,86 L58,94 L66,86" fill="none"/>
        <ellipse cx="58" cy="48" rx="25" ry="29" fill="#f4f1ea"/>
        <path d="M58,20 q9,-11 15,-3 q4,6 -3,9" fill="none"/>
        <circle cx="48" cy="49" r="9" fill="#ffffff"/>
        <circle cx="68" cy="49" r="9" fill="#ffffff"/>
        <line x1="57" y1="49" x2="59" y2="49"/>
        <circle cx="48" cy="49" r="2.2" fill="#111" stroke="none"/>
        <circle cx="68" cy="49" r="2.2" fill="#111" stroke="none"/>
        <path d="M60,58 q3,3 0,5"/>
        <path d="M50,68 q8,4 16,0"/>
