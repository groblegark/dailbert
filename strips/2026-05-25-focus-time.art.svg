        <circle cx="78" cy="18" r="8" fill="#111"/>
        <rect x="45" y="50" width="16" height="11" rx="2" fill="#ffffff"/>
        <rect x="66" y="50" width="16" height="11" rx="2" fill="#ffffff"/>
        <line x1="61" y1="55" x2="66" y2="55"/>
        <circle cx="53" cy="55.5" r="1.8" fill="#111" stroke="none"/>
        <circle cx="74" cy="55.5" r="1.8" fill="#111" stroke="none"/>
        <path d="M54,70 q9,4 16,-1"/>
      </g>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 92">
      <g fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="50" y1="6" x2="50" y2="18"/>
        <circle cx="50" cy="5" r="3.4" fill="#111"/>
        <rect x="20" y="18" width="60" height="58" rx="7" fill="#cfccc4"/>
        <rect x="26" y="23" width="48" height="8" rx="3" fill="#e6e3db"/>
        <rect x="30" y="40" width="15" height="9" rx="3" fill="#f7f4ec"/>
        <rect x="55" y="40" width="15" height="9" rx="3" fill="#f7f4ec"/>
        <line x1="33" y1="44.5" x2="42" y2="44.5" stroke-width="2"/>
        <line x1="58" y1="44.5" x2="67" y2="44.5" stroke-width="2"/>
