<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <style>
      .ink{fill:none;stroke:#111;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}
      .thin{fill:none;stroke:#111;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
      .fillp{fill:#f4f1ea;stroke:#111;stroke-width:2.6;stroke-linejoin:round;}
      .balloon{fill:#f4f1ea;stroke:#111;stroke-width:2.4;}
      .tx{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;font-size:14px;fill:#111;text-anchor:middle;}
      .txw{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;font-size:14px;fill:#f4f1ea;text-anchor:middle;}
      .grey{fill:none;stroke:#7a8088;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    </style>

    <clipPath id="p1"><rect x="0" y="8" width="400" height="324" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="414" y="8" width="400" height="324" rx="3"/></clipPath>
    <clipPath id="p3"><rect x="828" y="8" width="400" height="324" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 240">
      <path class="fillp" d="M30 112 Q30 100 42 98 L58 98 Q70 100 70 112 L72 168 L28 168 Z"/>
      <path class="fillp" d="M28 168 L32 228 L45 228 L49 182 L51 228 L64 228 L70 168 Z"/>
      <ellipse cx="35" cy="230" rx="10" ry="5" fill="#111"/>
      <ellipse cx="59" cy="230" rx="10" ry="5" fill="#111"/>
      <path class="ink" d="M31 106 L20 140"/>
      <path class="ink" d="M69 106 L80 140"/>
      <path class="ink" d="M50 98 L44 106 L50 138 L56 106 Z" fill="#111"/>
      <path class="thin" d="M42 99 L50 108 L58 99"/>
      <rect x="45" y="85" width="10" height="15" class="fillp"/>
      <ellipse cx="50" cy="50" rx="26" ry="30" class="fillp"/>
      <path class="ink" d="M52 21 q-3 -9 6 -8 q6 1 2 8"/>
      <circle cx="40" cy="50" r="8" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="50" r="8" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="48" y1="50" x2="52" y2="50" class="thin"/>
      <line x1="68" y1="49" x2="75" y2="47" class="thin"/>
      <circle cx="40" cy="51" r="2.2" fill="#111"/>
      <circle cx="60" cy="51" r="2.2" fill="#111"/>
      <path class="thin" d="M34 46 q6 -3 12 0"/>
      <path class="thin" d="M54 46 q6 -3 12 0"/>
      <path class="thin" d="M50 56 l-3 7 l4 0"/>
      <line x1="43" y1="70" x2="57" y2="70" class="ink"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 110 240">
      <path class="fillp" d="M32 114 Q32 100 47 98 L64 98 Q80 100 80 114 L84 168 L28 168 Z"/>
      <path class="fillp" d="M28 168 L33 228 L47 228 L51 182 L54 228 L68 228 L74 168 Z"/>
      <ellipse cx="37" cy="230" rx="10" ry="5" fill="#111"/>
      <ellipse cx="63" cy="230" rx="10" ry="5" fill="#111"/>
      <path class="fillp" d="M80 110 Q98 104 98 86"/>
      <path class="ink" d="M80 110 Q98 104 98 86" fill="none" stroke-width="7"/>
      <circle cx="98" cy="82" r="7" class="fillp"/>
      <rect x="45" y="84" width="14" height="16" class="fillp"/>
      <circle cx="52" cy="50" r="31" class="fillp"/>
      <circle cx="44" cy="47" r="3.2" fill="#111"/>
      <circle cx="61" cy="47" r="3.2" fill="#111"/>
      <path class="ink" d="M39 58 Q52 78 66 58 Q52 66 39 58Z" fill="#fff"/>
      <!-- mug in left hand -->
      <g>
        <rect x="14" y="120" width="18" height="15" rx="2" class="fillp"/>
        <path class="ink" d="M32 123 q9 0 9 6 q0 6 -9 6"/>
        <path class="thin" d="M18 116 q2 -5 -1 -9"/>
        <path class="thin" d="M27 116 q2 -5 -1 -9"/>
        <path class="ink" d="M30 130 L36 168"/>
      </g>
    </symbol>

    <!-- CLANKER -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <line x1="50" y1="20" x2="50" y2="8" class="thin" stroke="#dfe7ee"/>
      <circle cx="50" cy="6" r="3.5" fill="#dfe7ee" stroke="#9aa3ab" stroke-width="1.5"/>
      <rect x="17" y="20" width="66" height="54" rx="9" fill="#b9c0c7" stroke="#111" stroke-width="2.6"/>
      <rect x="24" y="27" width="52" height="24" rx="5" fill="#2b3037"/>
      <rect x="29" y="35" width="16" height="8" rx="4" fill="#cfeaff"/>
      <rect x="55" y="35" width="16" height="8" rx="4" fill="#cfeaff"/>
      <rect x="34" y="56" width="32" height="12" rx="2" fill="#8f979f" stroke="#111" stroke-width="1.8"/>
      <line x1="41" y1="56" x2="41" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="47" y1="56" x2="47" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="53" y1="56" x2="53" y2="68" stroke="#111" stroke-width="1.4"/>
      <line x1="59" y1="56" x2="59" y2="68" stroke="#111" stroke-width="1.4"/>
      <circle cx="20" cy="47" r="2.5" fill="#111"/>
      <circle cx="80" cy="47" r="2.5" fill="#111"/>
    </symbol>

    <!-- EMPTY CHAIR -->
    <symbol id="chair" viewBox="0 0 60 92">
      <rect x="15" y="8" width="30" height="34" rx="7" class="fillp"/>
      <rect x="10" y="42" width="40" height="11" rx="4" class="fillp"/>
      <line x1="30" y1="53" x2="30" y2="72" class="ink"/>
      <path class="ink" d="M14 82 L30 72 L46 82"/>
      <circle cx="14" cy="84" r="3.5" class="fillp"/>
      <circle cx="46" cy="84" r="3.5" class="fillp"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#p1)">
    <rect x="0" y="8" width="400" height="324" rx="3" fill="#f4f1ea"/>
    <!-- back wall + floor -->
    <line x1="10" y1="298" x2="392" y2="298" class="thin"/>
    <line x1="345" y1="70" x2="345" y2="298" class="thin"/>
    <path class="thin" d="M345 70 L392 70 L392 298"/>
    <text x="368" y="120" class="tx" font-size="12" transform="rotate(90 368 120)">EXIT</text>
    <!-- empty chair (thinned office) -->
    <use href="#chair" x="18" y="222" width="52" height="80"/>
    <use href="#chair" x="150" y="228" width="46" height="70"/>
    <!-- Dailbert at his desk -->
    <use href="#dailbert" x="58" y="108" width="83" height="199"/>
    <rect x="30" y="256" width="160" height="46" class="fillp"/>
    <rect x="150" y="238" width="34" height="22" rx="2" class="fillp"/>
    <rect x="155" y="242" width="24" height="14" fill="#2b3037"/>
    <!-- Doug leaving toward the door -->
    <use href="#doug" x="238" y="96" width="96" height="209"/>

    <!-- balloons -->
    <path class="balloon" d="M232 78 L246 92 L262 82 Z"/>
    <ellipse cx="308" cy="52" rx="76" ry="29" class="balloon"/>
    <text x="308" y="47" class="tx">Night! Say bye to</text>
    <text x="308" y="64" class="tx">the place for me.</text>

    <path class="balloon" d="M96 92 L86 118 L110 96 Z"/>
    <ellipse cx="86" cy="60" rx="74" ry="29" class="balloon"/>
    <text x="86" y="55" class="tx">It's just me and</text>
    <text x="86" y="72" class="tx">the lights, Doug.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#p2)">
    <rect x="414" y="8" width="400" height="324" rx="3" fill="#f4f1ea"/>
    <g transform="translate(414,0)">
      <line x1="10" y1="298" x2="392" y2="298" class="thin"/>
      <!-- door frame + light switch on wall -->
      <path class="thin" d="M40 60 L40 298"/>
      <path class="thin" d="M40 60 L92 60 L92 298"/>
      <rect x="100" y="176" width="16" height="26" rx="2" class="fillp"/>
      <rect x="105" y="182" width="6" height="13" fill="#111"/>
      <!-- empty chairs, the thinned floor -->
      <use href="#chair" x="238" y="206" width="60" height="92"/>
      <use href="#chair" x="316" y="222" width="52" height="80"/>
      <use href="#chair" x="196" y="234" width="44" height="68"/>
      <!-- Dailbert, coat on, hand toward switch -->
      <use href="#dailbert" x="96" y="98" width="86" height="206"/>
      <path class="ink" d="M120 210 L112 190"/>

      <!-- balloon -->
      <path class="balloon" d="M172 78 L160 100 L188 82 Z"/>
      <ellipse cx="228" cy="52" rx="92" ry="30" class="balloon"/>
      <text x="228" y="57" class="tx">...Night, everybody.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#p3)">
    <rect x="828" y="8" width="400" height="324" rx="3" fill="#f4f1ea"/>
    <g transform="translate(828,0)">
      <!-- lights off -->
      <rect x="6" y="11" width="388" height="318" rx="3" fill="#454a52"/>
      <line x1="10" y1="298" x2="392" y2="298" class="grey"/>
      <path class="grey" d="M300 60 L300 298"/>
      <path class="grey" d="M300 60 L360 60 L360 298"/>
      <!-- Dailbert silhouette leaving through the door -->
      <g fill="#20242a" stroke="#20242a">
        <path d="M312 116 q-3 -14 12 -14 q14 0 12 14 q-1 12 -12 12 q-11 0 -12 -12Z"/>
        <path d="M304 158 q0 -22 20 -22 q20 0 20 22 L346 236 L302 236 Z"/>
        <path d="M306 236 L310 296 L322 296 L324 250 L327 296 L340 296 L344 236Z"/>
        <path d="M344 168 L352 130"/>
      </g>
      <path class="grey" d="M356 210 q-8 -3 -8 3"/>
      <!-- desk with glowing monitor -->
      <rect x="150" y="238" width="120" height="52" fill="#3a3f47" stroke="#7a8088" stroke-width="2"/>
      <rect x="150" y="164" width="112" height="80" rx="4" fill="#151a1f" stroke="#7a8088" stroke-width="2.4"/>
      <rect x="200" y="244" width="12" height="10" fill="#3a3f47" stroke="#7a8088" stroke-width="2"/>
      <!-- screen glow -->
      <g stroke="#6f7a86" stroke-width="1" opacity="0.6">
        <line x1="158" y1="172" x2="254" y2="236"/>
        <line x1="178" y1="170" x2="254" y2="220"/>
        <line x1="158" y1="196" x2="230" y2="236"/>
      </g>
      <use href="#clanker" x="164" y="172" width="84" height="76"/>

      <!-- clanker screen balloon + dashed line to the monitor -->
      <path stroke="#111" stroke-width="1.6" stroke-dasharray="4 4" fill="none" d="M120 96 L172 168"/>
      <rect x="24" y="34" width="184" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="28" y="38" width="176" height="52" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="116" y="60" class="tx">They can't hear you.</text>
      <text x="116" y="80" class="tx">I can.</text>
    </g>
  </g>

  <!-- panel borders on top -->
  <rect x="0" y="8" width="400" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="414" y="8" width="400" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="828" y="8" width="400" height="324" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</svg>