<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">The Quiet Hour</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-06-25</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="5" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0.5" x2="5" y2="0.5" stroke="#111" stroke-width="0.5" opacity="0.22"/>
    </pattern>

    <symbol id="dailbert" overflow="visible">
      <path d="M-38,74 C-34,46 -18,38 0,38 C18,38 34,46 38,74" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-12,42 L0,54 L12,42" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M0,54 L-4,60 L0,74 L4,60 Z" fill="#111"/>
      <path d="M-7,30 L-7,42 M7,30 L7,42" stroke="#111" stroke-width="2" fill="none"/>
      <ellipse cx="0" cy="0" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-2,-28 c-3,-8 8,-10 6,-2 c-1,4 -6,3 -4,-1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-10" cy="-2" r="8" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="10" cy="-2" r="8" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="-2" y1="-2" x2="2" y2="-2" stroke="#111" stroke-width="2"/>
      <line x1="-18" y1="-3" x2="-24" y2="-4" stroke="#111" stroke-width="2"/>
      <line x1="18" y1="-3" x2="24" y2="-4" stroke="#111" stroke-width="2"/>
      <circle cx="-10" cy="-1" r="1.6" fill="#111"/>
      <circle cx="10" cy="-1" r="1.6" fill="#111"/>
      <path d="M-15,-12 l7,3 M15,-12 l-7,3" stroke="#111" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M0,2 l-3,7 l4,0" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-8" y1="17" x2="8" y2="17" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" overflow="visible">
      <path d="M-40,76 C-36,48 -20,40 0,40 C20,40 36,48 40,76" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-10,42 L-2,62 L-16,74 M10,42 L2,62 L16,74" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M-2,62 L2,62 L4,76 L0,82 L-4,76 Z" fill="#111"/>
      <path d="M-6,32 L-6,42 M6,32 L6,42" stroke="#111" stroke-width="2"/>
      <ellipse cx="0" cy="2" rx="23" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-16,-18 C-22,-34 -20,-46 -14,-52 C-14,-40 -8,-30 -4,-22 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M16,-18 C22,-34 20,-46 14,-52 C14,-40 8,-30 4,-22 Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="-8" cy="-2" r="1.8" fill="#111"/>
      <circle cx="8" cy="-2" r="1.8" fill="#111"/>
      <path d="M-13,-9 l6,-2 M13,-9 l-6,-2" stroke="#111" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M0,2 l-2,6 l3,0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M-10,12 Q0,24 10,12" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" overflow="visible">
      <line x1="0" y1="-22" x2="0" y2="-34" stroke="#111" stroke-width="2"/>
      <circle cx="0" cy="-36" r="3" fill="#111"/>
      <rect x="-24" y="-22" width="48" height="44" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="-24" cy="0" r="2.4" fill="#111"/>
      <circle cx="24" cy="0" r="2.4" fill="#111"/>
      <rect x="-17" y="-9" width="12" height="6" rx="2" fill="#111"/>
      <rect x="5" y="-9" width="12" height="6" rx="2" fill="#111"/>
      <path d="M-19,-13 l-3,-2 M-3,-13 l3,-2 M3,-13 l-3,-2 M19,-13 l3,-2" stroke="#111" stroke-width="1" stroke-linecap="round"/>
      <rect x="-14" y="6" width="28" height="10" rx="1.5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-8,6 L-8,16 M0,6 L0,16 M8,6 L8,16" stroke="#111" stroke-width="1.5"/>
      <path d="M-20,4 l6,0 M-20,8 l4,0" stroke="#111" stroke-width="1" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#111" stroke-width="1" opacity="0.25"/>

    <use href="#dailbert" transform="translate(108,182) scale(1.15)"/>

    <!-- monitor with clanker -->
    <path d="M311,246 L311,258 M286,258 L336,258" stroke="#111" stroke-width="2.5" fill="none"/>
    <rect x="250" y="150" width="122" height="96" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="258" y="158" width="106" height="72" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(311,196) scale(1.05)"/>
    <rect x="258" y="158" width="106" height="72" rx="3" fill="url(#scan)" stroke="none"/>

    <!-- desk (front) -->
    <rect x="0" y="258" width="400" height="60" fill="#f4f1ea" stroke="none"/>
    <line x1="0" y1="258" x2="400" y2="258" stroke="#111" stroke-width="2.5"/>

    <!-- dailbert balloon -->
    <path d="M100,84 L112,84 L104,124 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="18" y="32" width="174" height="54" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="105" y="53" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You've done that</text>
    <text x="105" y="71" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">every day this week.</text>

    <!-- clanker screen balloon -->
    <line x1="300" y1="100" x2="311" y2="158" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <rect x="214" y="22" width="176" height="76" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="218" y="26" width="168" height="68" rx="1" fill="none" stroke="#111" stroke-width="1"/>
    <text x="302" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Morning, Dailbert.</text>
    <text x="302" y="64" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I tidied your notes</text>
    <text x="302" y="82" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">while it was quiet.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="20" y1="300" x2="380" y2="300" stroke="#111" stroke-width="1" opacity="0.25"/>

    <use href="#dailbert" transform="translate(300,182) scale(1.15)"/>

    <!-- monitor left with clanker -->
    <path d="M89,246 L89,258 M64,258 L114,258" stroke="#111" stroke-width="2.5" fill="none"/>
    <rect x="28" y="150" width="122" height="96" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="36" y="158" width="106" height="72" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <use href="#clanker" transform="translate(89,196) scale(1.05)"/>
    <rect x="36" y="158" width="106" height="72" rx="3" fill="url(#scan)" stroke="none"/>

    <rect x="0" y="258" width="400" height="60" fill="#f4f1ea" stroke="none"/>
    <line x1="0" y1="258" x2="400" y2="258" stroke="#111" stroke-width="2.5"/>

    <!-- clanker screen balloon (left) -->
    <line x1="100" y1="106" x2="89" y2="158" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <rect x="14" y="20" width="180" height="86" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="18" y="24" width="172" height="78" rx="1" fill="none" stroke="#111" stroke-width="1"/>
    <text x="104" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I like the office</text>
    <text x="104" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">before anyone's in.</text>
    <text x="104" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It's the only time</text>
    <text x="104" y="96" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">it's still.</text>

    <!-- dailbert balloon (right) -->
    <path d="M292,68 L308,68 L300,120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="214" y="32" width="172" height="38" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="300" y="56" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">...Yeah. Me too.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- office floor -->
    <line x1="0" y1="288" x2="400" y2="288" stroke="#111" stroke-width="2"/>
    <line x1="0" y1="294" x2="400" y2="294" stroke="#111" stroke-width="1" opacity="0.4"/>
    <!-- little plant -->
    <path d="M198,300 L212,300 L210,314 L200,314 Z" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <path d="M205,300 C201,288 196,286 197,280 M205,300 C209,289 214,287 213,281 M205,300 L205,286" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>

    <use href="#boss" transform="translate(120,182) scale(1.15)"/>
    <!-- boss raised arms -->
    <path d="M104,224 C86,206 80,184 86,166" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <path d="M136,224 C154,206 160,184 154,166" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <circle cx="86" cy="162" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="154" cy="162" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <use href="#dailbert" transform="translate(300,190) scale(1.15)"/>

    <!-- boss balloon -->
    <path d="M108,98 L122,98 L120,124 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="14" y="16" width="186" height="82" rx="16" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="107" y="36" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Love the initiative!</text>
    <text x="107" y="54" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Can it do everyone's</text>
    <text x="107" y="72" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">mornings? Same</text>
    <text x="107" y="90" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">headcount?</text>

    <!-- dailbert balloon -->
    <path d="M292,64 L308,64 L300,120 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="216" y="28" width="170" height="38" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="301" y="52" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">And there it is.</text>
  </g>
</g>
    
  </svg>