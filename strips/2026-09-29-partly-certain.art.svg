<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 8 q10 -8 6 4 q8 -2 0 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 58 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M42 76 L78 76 L88 152 L32 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 78 L54 96 L60 100 L66 96 Z" fill="#111"/>
      <line x1="60" y1="100" x2="60" y2="122" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="40" r="2.6" fill="#111"/>
      <circle cx="72" cy="40" r="2.6" fill="#111"/>
      <path d="M44 54 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 80 L80 80 L90 152 L30 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="80" y="106" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M104 110 q10 3 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M85 102 q3 -6 6 0" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 42 q-4 -30 29 -32 q33 2 29 32 q-6 -16 -29 -14 q-23 -2 -29 14" fill="#111"/>
      <path d="M34 32 q6 -6 12 -3" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <rect x="41" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="48" r="2" fill="#111"/>
      <circle cx="71" cy="48" r="2" fill="#111"/>
      <path d="M52 64 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M42 80 L78 80 L86 152 L34 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M42 98 L34 120 M78 98 L86 120" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE CLANKER (drawn inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="30" y="34" width="60" height="50" rx="6" fill="#2c3138" stroke="#cfcfcf" stroke-width="2.4"/>
      <line x1="60" y1="34" x2="60" y2="20" stroke="#cfcfcf" stroke-width="2.2"/>
      <circle cx="60" cy="17" r="3.2" fill="#cfcfcf"/>
      <rect x="40" y="48" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <rect x="66" y="48" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <g stroke="#8fd3ef" stroke-width="2">
        <line x1="42" y1="70" x2="78" y2="70"/>
        <line x1="42" y1="76" x2="78" y2="76"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="1" y1="256" x2="399" y2="256" stroke="#111" stroke-width="1.6"/>

    <!-- lobby display -->
    <rect x="150" y="22" width="224" height="150" rx="6" fill="#2c3138" stroke="#111" stroke-width="2.6"/>
    <rect x="252" y="172" width="20" height="16" fill="#111"/>
    <rect x="228" y="188" width="68" height="8" rx="2" fill="#111"/>
    <text x="262" y="52" text-anchor="middle" fill="#bfe9ff" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15">LOBBY  ·  TODAY</text>
    <!-- sun -->
    <circle cx="200" cy="98" r="14" fill="none" stroke="#ffe08a" stroke-width="2.6"/>
    <g stroke="#ffe08a" stroke-width="2.4" stroke-linecap="round">
      <line x1="200" y1="74" x2="200" y2="80"/>
      <line x1="200" y1="116" x2="200" y2="122"/>
      <line x1="174" y1="98" x2="180" y2="98"/>
      <line x1="220" y1="98" x2="226" y2="98"/>
      <line x1="182" y1="80" x2="186" y2="84"/>
      <line x1="218" y1="80" x2="214" y2="84"/>
    </g>
    <text x="298" y="106" text-anchor="middle" fill="#bfe9ff" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="21">72°  Sunny</text>
    <text x="262" y="152" text-anchor="middle" fill="#8fd3ef" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13">confidence: 61%</text>

    <!-- Doug + Dailbert in lobby -->
    <use href="#doug" x="16" y="196" width="118" height="150"/>
    <use href="#dailbert" x="98" y="204" width="110" height="146"/>

    <!-- Doug balloon (raised, tail down to Doug) -->
    <path d="M18 26 h150 a10 10 0 0 1 10 10 v26 a10 10 0 0 1 -10 10 h-84 l-16 16 l2 -16 h-52 a10 10 0 0 1 -10 -10 v-26 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="93" y="48" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">The weather sign</text>
    <text x="93" y="66" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">has a footnote now.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="415" y1="256" x2="813" y2="256" stroke="#111" stroke-width="1.6"/>

    <!-- display with clanker inside -->
    <rect x="556" y="18" width="224" height="152" rx="6" fill="#2c3138" stroke="#111" stroke-width="2.6"/>
    <use href="#clanker" x="608" y="20" width="120" height="120"/>

    <!-- clanker balloon: screen-edged rectangle, dashed line back to the display surface -->
    <line x1="668" y1="70" x2="628" y2="198" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
    <rect x="452" y="196" width="268" height="90" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="456" y="200" width="260" height="82" rx="2" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
    <text x="586" y="224" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">I do not control the sky.</text>
    <text x="586" y="244" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">It is one of the few things</text>
    <text x="586" y="264" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">I am unsure about.</text>

    <!-- Dailbert alone, looking up -->
    <use href="#dailbert" x="20" y="192" width="118" height="150"/>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <line x1="829" y1="256" x2="1227" y2="256" stroke="#111" stroke-width="1.6"/>

    <!-- display, now rain, high confidence -->
    <rect x="978" y="22" width="224" height="150" rx="6" fill="#2c3138" stroke="#111" stroke-width="2.6"/>
    <rect x="1080" y="172" width="20" height="16" fill="#111"/>
    <rect x="1056" y="188" width="68" height="8" rx="2" fill="#111"/>
    <text x="1090" y="52" text-anchor="middle" fill="#bfe9ff" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15">LOBBY  ·  NOW</text>
    <!-- cloud -->
    <path d="M1044 96 a13 13 0 0 1 24 -6 a11 11 0 0 1 15 11 h-38 a10 10 0 0 1 -1 -5 z" fill="#cfcfcf"/>
    <g stroke="#8fd3ef" stroke-width="2.6" stroke-linecap="round">
      <line x1="1050" y1="110" x2="1046" y2="122"/>
      <line x1="1062" y1="110" x2="1058" y2="122"/>
      <line x1="1074" y1="110" x2="1070" y2="122"/>
    </g>
    <text x="1120" y="106" text-anchor="middle" fill="#bfe9ff" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="20">Rain</text>
    <text x="1090" y="152" text-anchor="middle" fill="#8fd3ef" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13">confidence: 100%</text>

    <!-- Priya, dry, sleeves rolled -->
    <use href="#priya" x="852" y="200" width="116" height="146"/>

    <!-- Priya balloon: the button (raised, tail down to Priya) -->
    <path d="M846 26 h168 a10 10 0 0 1 10 10 v26 a10 10 0 0 1 -10 10 h-84 l-16 16 l2 -16 h-70 a10 10 0 0 1 -10 -10 v-26 a10 10 0 0 1 10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="930" y="48" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">It rounds up when</text>
    <text x="930" y="66" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14">it stops guessing.</text>
  </g>
</svg>