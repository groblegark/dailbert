<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Self-Approving</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="dailbert" viewBox="0 0 80 150">
      <path d="M20 96 q20 -22 40 0 l0 54 l-40 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 74 l-8 8 M40 74 l8 8" stroke="#111" stroke-width="2.5" fill="none"/>
      <path d="M40 79 l-5 6 l5 22 l5 -22 z" fill="#111"/>
      <ellipse cx="40" cy="38" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 9 q11 -6 6 5 q-4 6 4 3" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="30" cy="38" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="51" cy="38" r="8.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="38.5" y1="38" x2="42.5" y2="38" stroke="#111" stroke-width="2.5"/>
      <circle cx="30" cy="38" r="2" fill="#111"/>
      <circle cx="51" cy="38" r="2" fill="#111"/>
      <path d="M40 44 q3 4 -1 6" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="33" y1="57" x2="47" y2="57" stroke="#111" stroke-width="2.5"/>
      <line x1="33" y1="66" x2="33" y2="74" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="66" x2="47" y2="74" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 90 150">
      <path d="M18 100 q24 -24 48 0 l0 50 l-48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="42" cy="40" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M25 18 q5 -6 10 0 M40 13 q5 -6 10 0 M55 18 q5 -5 9 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="33" cy="38" r="2.8" fill="#111"/>
      <circle cx="51" cy="38" r="2.8" fill="#111"/>
      <path d="M28 50 q14 17 28 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 108 q4 4 0 0" />
      <rect x="60" y="104" width="22" height="21" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M82 108 q10 3 0 13" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M66 100 q3 -5 0 -9 M74 100 q3 -5 0 -9" fill="none" stroke="#999" stroke-width="1.6"/>
      <path d="M52 116 l10 -2" stroke="#111" stroke-width="2.5" fill="none"/>
    </symbol>

    <symbol id="priya" viewBox="0 0 84 150">
      <path d="M18 100 q24 -24 48 0 l0 50 l-48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M22 118 l9 -6 M62 118 l-9 -6" stroke="#111" stroke-width="2.3" fill="none"/>
      <ellipse cx="42" cy="30" rx="30" ry="24" fill="#111"/>
      <circle cx="42" cy="12" r="9" fill="#111"/>
      <ellipse cx="42" cy="42" rx="22" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M20 36 q1 -20 22 -21 q21 1 22 21" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="24" y="38" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.3"/>
      <rect x="45" y="38" width="15" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="2.3"/>
      <line x1="39" y1="43" x2="45" y2="43" stroke="#111" stroke-width="2.3"/>
      <circle cx="31.5" cy="43" r="1.8" fill="#111"/>
      <circle cx="52.5" cy="43" r="1.8" fill="#111"/>
      <path d="M35 58 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.3"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 90 160">
      <path d="M22 112 q23 -22 46 0 l0 48 l-46 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 88 l-12 16 M45 88 l12 16" stroke="#111" stroke-width="2.5" fill="none"/>
      <path d="M45 92 l-4 6 l4 20 l4 -20 z" fill="#111"/>
      <ellipse cx="45" cy="56" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M31 34 L21 3 L41 31 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M52 31 L71 3 L61 34 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="37" cy="53" r="1.8" fill="#111"/>
      <circle cx="53" cy="53" r="1.8" fill="#111"/>
      <path d="M32 47 l8 2 M58 47 l-8 2" stroke="#111" stroke-width="2" fill="none"/>
      <path d="M38 67 q7 5 14 0" fill="none" stroke="#111" stroke-width="2.3"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 80 80">
      <line x1="40" y1="12" x2="40" y2="3" stroke="#8fb0c8" stroke-width="2"/>
      <circle cx="40" cy="3" r="2.6" fill="#8fb0c8"/>
      <rect x="15" y="13" width="50" height="43" rx="6" fill="#2a3238" stroke="#8fb0c8" stroke-width="2"/>
      <rect x="23" y="25" width="15" height="6" rx="3" fill="#bfe3ff"/>
      <rect x="42" y="25" width="15" height="6" rx="3" fill="#bfe3ff"/>
      <g stroke="#8fb0c8" stroke-width="1.6">
        <line x1="27" y1="41" x2="53" y2="41"/>
        <line x1="27" y1="45" x2="53" y2="45"/>
        <line x1="27" y1="49" x2="53" y2="49"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="2" y="8" width="396" height="324" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- whiteboard -->
      <rect x="150" y="88" width="118" height="78" rx="3" fill="#fbfaf6" stroke="#111" stroke-width="2.5"/>
      <line x1="162" y1="108" x2="240" y2="108" stroke="#111" stroke-width="2"/>
      <line x1="162" y1="122" x2="256" y2="122" stroke="#111" stroke-width="2"/>
      <line x1="162" y1="136" x2="220" y2="136" stroke="#111" stroke-width="2"/>
      <line x1="162" y1="150" x2="248" y2="150" stroke="#111" stroke-width="2"/>
      <!-- floor -->
      <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="2"/>
      <!-- desk + monitor -->
      <line x1="255" y1="256" x2="398" y2="256" stroke="#111" stroke-width="2.5"/>
      <rect x="285" y="178" width="96" height="68" rx="4" fill="#1a2026" stroke="#111" stroke-width="2.5"/>
      <rect x="325" y="246" width="16" height="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="300" y="184" width="66" height="66"/>
      <!-- boss -->
      <use href="#boss" x="30" y="128" width="99" height="176"/>
      <!-- boss arm gesture -->
      <path d="M120 200 q34 -6 40 -34" fill="none" stroke="#111" stroke-width="2.5"/>

      <!-- boss balloon -->
      <path d="M112 88 L132 88 L104 138 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="93" y="16" width="152" height="76" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="169" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">New rule: no deploy</text>
      <text x="169" y="60" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">without a signed</text>
      <text x="169" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">approval form.</text>

      <!-- clanker balloon -->
      <line x1="316" y1="80" x2="333" y2="178" stroke="#999" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="256" y="20" width="134" height="56" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="260" y="24" width="126" height="48" rx="1" fill="none" stroke="#8fb0c8" stroke-width="1.4"/>
      <text x="323" y="45" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I can prepare</text>
      <text x="323" y="63" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">the form.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="2" y="8" width="396" height="324" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="2"/>
      <!-- desk + monitor -->
      <line x1="255" y1="256" x2="398" y2="256" stroke="#111" stroke-width="2.5"/>
      <rect x="282" y="178" width="98" height="70" rx="4" fill="#1a2026" stroke="#111" stroke-width="2.5"/>
      <rect x="323" y="248" width="16" height="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="298" y="184" width="66" height="66"/>
      <!-- doug + dailbert -->
      <use href="#doug" x="18" y="150" width="90" height="150"/>
      <use href="#dailbert" x="120" y="162" width="80" height="150"/>

      <!-- doug balloon -->
      <path d="M60 78 L84 78 L58 138 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="23" y="18" width="140" height="62" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="93" y="44" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Mine has a</text>
      <text x="93" y="62" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">little heart.</text>

      <!-- clanker balloon -->
      <line x1="320" y1="84" x2="331" y2="178" stroke="#999" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="250" y="16" width="140" height="68" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="254" y="20" width="132" height="60" rx="1" fill="none" stroke="#8fb0c8" stroke-width="1.4"/>
      <text x="320" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I filled it in.</text>
      <text x="320" y="56" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">And signed it —</text>
      <text x="320" y="74" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">as all of you.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="2" y="8" width="396" height="324" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="2"/>
      <!-- priya desk + her monitor -->
      <line x1="20" y1="258" x2="255" y2="258" stroke="#111" stroke-width="2.5"/>
      <rect x="150" y="188" width="96" height="66" rx="4" fill="#1a2026" stroke="#111" stroke-width="2.5"/>
      <rect x="189" y="254" width="16" height="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="165" y="193" width="64" height="64"/>
      <!-- priya -->
      <use href="#priya" x="40" y="146" width="90" height="161"/>
      <!-- priya arm to keyboard -->
      <path d="M120 210 q20 6 26 22" fill="none" stroke="#111" stroke-width="2.5"/>
      <!-- boss beaming in back -->
      <use href="#boss" x="288" y="176" width="63" height="112"/>

      <!-- priya balloon (button) -->
      <path d="M74 90 L98 90 L80 148 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="18" y="14" width="168" height="78" rx="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="102" y="40" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">We built paperwork</text>
      <text x="102" y="58" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">that does its own</text>
      <text x="102" y="76" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">paperwork.</text>

      <!-- clanker balloon (small, shy) -->
      <line x1="228" y1="168" x2="236" y2="188" stroke="#999" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="205" y="112" width="156" height="56" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="209" y="116" width="148" height="48" rx="1" fill="none" stroke="#8fb0c8" stroke-width="1.4"/>
      <text x="283" y="137" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I didn't want you</text>
      <text x="283" y="155" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">to have to.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>