<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 200 260">
      <path d="M36,260 L50,196 Q100,172 150,196 L164,260 Z" fill="#fff" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <path d="M84,196 L100,214 L116,196" fill="none" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <path d="M100,204 l-9,9 l9,9 l9,-9 Z" fill="#111"/>
      <path d="M100,222 l-8,34 l8,10 l8,-10 Z" fill="#111"/>
      <ellipse cx="100" cy="100" rx="40" ry="49" fill="#fff" stroke="#111" stroke-width="4"/>
      <circle cx="60" cy="102" r="7" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <circle cx="140" cy="102" r="7" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <path d="M100,52 q-3,-16 13,-15 q9,1 5,10" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <circle cx="83" cy="100" r="13" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <circle cx="117" cy="100" r="13" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <line x1="96" y1="100" x2="104" y2="100" stroke="#111" stroke-width="3.5"/>
      <line x1="70" y1="98" x2="60" y2="96" stroke="#111" stroke-width="3"/>
      <line x1="130" y1="98" x2="140" y2="96" stroke="#111" stroke-width="3"/>
      <circle cx="83" cy="100" r="3" fill="#111"/>
      <circle cx="117" cy="100" r="3" fill="#111"/>
      <path d="M100,104 l-4,11 l7,0" fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M88,130 q12,3 24,0" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="doug" viewBox="0 0 200 260">
      <path d="M34,260 L48,198 Q100,174 152,198 L166,260 Z" fill="#fff" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <path d="M82,198 L100,214 L118,198" fill="none" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="100" cy="98" r="48" fill="#fff" stroke="#111" stroke-width="4"/>
      <circle cx="52" cy="100" r="7" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <circle cx="148" cy="100" r="7" fill="#fff" stroke="#111" stroke-width="3.5"/>
      <path d="M74,58 q10,-12 22,-6 M100,50 q10,-10 22,-2 M86,52 q6,-8 14,-4" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="84" cy="90" r="4" fill="#111"/>
      <circle cx="116" cy="90" r="4" fill="#111"/>
      <path d="M76,106 q24,30 48,0 q-24,10 -48,0 Z" fill="#fff" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <path d="M140,214 h34 v36 h-34 Z" fill="#fff" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
      <path d="M174,222 q16,4 0,22" fill="none" stroke="#111" stroke-width="4"/>
      <path d="M150,206 q-4,-8 2,-14 M164,206 q-4,-8 2,-14" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="clanker" viewBox="0 0 200 200">
      <line x1="100" y1="42" x2="100" y2="20" stroke="#b7b7b7" stroke-width="4"/>
      <circle cx="100" cy="15" r="5" fill="#d8d8d8"/>
      <rect x="46" y="42" width="108" height="92" rx="10" fill="#4a4a4a" stroke="#bdbdbd" stroke-width="4"/>
      <circle cx="46" cy="88" r="5" fill="#6a6a6a" stroke="#bdbdbd" stroke-width="2"/>
      <circle cx="154" cy="88" r="5" fill="#6a6a6a" stroke="#bdbdbd" stroke-width="2"/>
      <rect x="62" y="66" width="30" height="12" rx="6" fill="#dedede"/>
      <rect x="108" y="66" width="30" height="12" rx="6" fill="#dedede"/>
      <rect x="66" y="98" width="68" height="24" rx="4" fill="none" stroke="#bdbdbd" stroke-width="3"/>
      <line x1="80" y1="98" x2="80" y2="122" stroke="#bdbdbd" stroke-width="2"/>
      <line x1="92" y1="98" x2="92" y2="122" stroke="#bdbdbd" stroke-width="2"/>
      <line x1="104" y1="98" x2="104" y2="122" stroke="#bdbdbd" stroke-width="2"/>
      <line x1="116" y1="98" x2="116" y2="122" stroke="#bdbdbd" stroke-width="2"/>
    </symbol>
