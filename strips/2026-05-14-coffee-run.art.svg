  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="1" y="6" width="398" height="327" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip1"><rect x="2.5" y="7.5" width="395" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="14" y1="250" x2="386" y2="250" stroke="#111" stroke-width="3"/>
      <line x1="14" y1="258" x2="386" y2="258" stroke="#111" stroke-width="1.5"/>
      <!-- coffee pot on the counter -->
      <path d="M178,214 h38 l4,34 q-23,7 -46,0 Z" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="182" y="205" width="30" height="10" rx="3" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M216,220 q14,4 0,20" fill="none" stroke="#111" stroke-width="3"/>
      <use href="#dailbert" x="18" y="104" width="150" height="195"/>
      <use href="#doug" x="220" y="92" width="160" height="208"/>
      <!-- Doug balloon -->
      <path d="M26,24 h182 a14,14 0 0 1 14,14 v30 a14,14 0 0 1 -14,14 h-72 l-14,20 l-6,-20 h-90 a14,14 0 0 1 -14,-14 v-30 a14,14 0 0 1 14,-14 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <text x="118" y="47" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Coffee run!</text>
      <text x="118" y="67" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Who's thirsty?</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1" y="6" width="398" height="327" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="2.5" y="7.5" width="395" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- empty chair in the gap between them -->
      <path d="M182,206 q0,-48 18,-50 q18,2 18,50" fill="#e7e3da" stroke="#b0a89a" stroke-width="3" stroke-linejoin="round"/>
      <ellipse cx="200" cy="212" rx="27" ry="12" fill="#e7e3da" stroke="#b0a89a" stroke-width="3"/>
      <line x1="200" y1="214" x2="200" y2="242" stroke="#b0a89a" stroke-width="3"/>
      <path d="M180,252 L200,242 L220,252" fill="none" stroke="#b0a89a" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="180" cy="253" r="3" fill="#e7e3da" stroke="#b0a89a" stroke-width="2"/>
      <circle cx="220" cy="253" r="3" fill="#e7e3da" stroke="#b0a89a" stroke-width="2"/>
      <line x1="14" y1="250" x2="386" y2="250" stroke="#111" stroke-width="3"/>
      <line x1="14" y1="258" x2="386" y2="258" stroke="#111" stroke-width="1.5"/>
      <use href="#dailbert" x="18" y="104" width="150" height="195"/>
      <use href="#doug" x="220" y="92" width="160" height="208"/>
      <!-- Dailbert balloon -->
      <path d="M24,20 h156 a14,14 0 0 1 14,14 v28 a14,14 0 0 1 -14,14 h-58 l-14,20 l-6,-20 h-72 a14,14 0 0 1 -14,-14 v-28 a14,14 0 0 1 14,-14 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <text x="102" y="43" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">It's just us two</text>
      <text x="102" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">now, Doug.</text>
      <!-- Doug balloon -->
      <path d="M252,30 h108 a12,12 0 0 1 12,12 v20 a12,12 0 0 1 -12,12 h-40 l-8,18 l-6,-18 h-54 a12,12 0 0 1 -12,-12 v-20 a12,12 0 0 1 12,-12 Z" fill="#fff" stroke="#111" stroke-width="3"/>
      <text x="312" y="57" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">More for us!</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1" y="6" width="398" height="327" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="2.5" y="7.5" width="395" height="324" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="14" y1="292" x2="386" y2="292" stroke="#111" stroke-width="3"/>
      <!-- coffee machine -->
      <rect x="150" y="112" width="176" height="186" rx="7" fill="#fff" stroke="#111" stroke-width="4"/>
      <rect x="170" y="146" width="138" height="94" fill="#343434" stroke="#111" stroke-width="3"/>
      <!-- faint screen-glow hatching -->
      <line x1="176" y1="236" x2="210" y2="150" stroke="#5a5a5a" stroke-width="2"/>
      <line x1="196" y1="236" x2="230" y2="150" stroke="#5a5a5a" stroke-width="2"/>
      <use href="#clanker" x="196" y="150" width="90" height="90"/>
      <!-- buttons -->
      <circle cx="317" cy="168" r="6" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="317" cy="190" r="6" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="317" cy="212" r="6" fill="#fff" stroke="#111" stroke-width="3"/>
      <!-- spout, tray, mug -->
      <rect x="230" y="240" width="10" height="12" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M214,254 h40 v24 h-40 Z" fill="#fff" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <line x1="196" y1="282" x2="272" y2="282" stroke="#111" stroke-width="3"/>
      <!-- Dailbert watching, holding his mug -->
      <use href="#dailbert" x="8" y="150" width="118" height="153"/>
      <path d="M96,250 h26 v24 h-26 Z" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M122,256 q12,4 0,16" fill="none" stroke="#111" stroke-width="3.5"/>
      <!-- clanker screen balloon -->
      <line x1="150" y1="104" x2="204" y2="150" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="26" y="16" width="204" height="88" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="32" y="22" width="192" height="76" fill="none" stroke="#111" stroke-width="1.5"/>
      <text x="128" y="45" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">I kept everyone's</text>
      <text x="128" y="65" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">orders. For when</text>
      <text x="128" y="85" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">they come back.</text>
    </g>
  </g>
</svg>