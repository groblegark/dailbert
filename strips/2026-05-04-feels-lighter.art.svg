<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="p1"><rect x="1" y="3" width="398" height="334" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="415" y="3" width="398" height="334" rx="3"/></clipPath>
    <clipPath id="p3"><rect x="829" y="3" width="398" height="334" rx="3"/></clipPath>

    <symbol id="dailbert" viewBox="0 0 120 160" width="120" height="160">
      <path d="M28 158 L34 108 Q60 96 86 108 L92 158" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M52 104 L60 118 L68 104" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M60 118 L54 126 L60 152 L66 126 Z" fill="#111"/>
      <path d="M52 96 L52 106 M68 96 L68 106" stroke="#111" stroke-width="2.4"/>
      <ellipse cx="60" cy="60" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 24 q-2 -13 8 -12 q7 1 3 8" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M30 60 q-6 2 -2 10" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M90 60 q6 2 2 10" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="58" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="74" cy="58" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="59" y1="58" x2="63" y2="58" stroke="#111" stroke-width="2.4"/>
      <line x1="85" y1="56" x2="90" y2="54" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="58" r="2.4" fill="#111"/>
      <circle cx="74" cy="58" r="2.4" fill="#111"/>
      <path d="M50 82 q10 3 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 160" width="120" height="160">
      <path d="M24 158 L32 110 Q60 98 88 110 L96 158" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M50 104 L60 116 L70 104" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M52 96 L52 106 M68 96 L68 106" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="58" r="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M40 30 q6 -8 12 -3 M68 27 q6 -6 12 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="54" r="3.2" fill="#111"/>
      <circle cx="71" cy="54" r="3.2" fill="#111"/>
      <path d="M42 68 q18 22 36 0" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M45 71 q15 9 30 0" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 100 100" width="100" height="100">
      <line x1="50" y1="15" x2="50" y2="26" stroke="#dfe6e6" stroke-width="2.4"/>
      <circle cx="50" cy="12" r="3" fill="#eef6f6"/>
      <rect x="22" y="26" width="56" height="52" rx="8" fill="#8f979b" stroke="#dfe6e6" stroke-width="2.2"/>
      <rect x="30" y="42" width="16" height="7" rx="3.5" fill="#eef6f6"/>
      <rect x="54" y="42" width="16" height="7" rx="3.5" fill="#eef6f6"/>
      <rect x="34" y="60" width="32" height="10" rx="2" fill="#5c6367" stroke="#dfe6e6" stroke-width="1.4"/>
      <line x1="41" y1="60" x2="41" y2="70" stroke="#c7cfcf" stroke-width="1.2"/>
      <line x1="48" y1="60" x2="48" y2="70" stroke="#c7cfcf" stroke-width="1.2"/>
      <line x1="55" y1="60" x2="55" y2="70" stroke="#c7cfcf" stroke-width="1.2"/>
      <line x1="61" y1="60" x2="61" y2="70" stroke="#c7cfcf" stroke-width="1.2"/>
      <line x1="25" y1="54" x2="30" y2="54" stroke="#c7cfcf" stroke-width="1.4"/>
      <line x1="70" y1="54" x2="75" y2="54" stroke="#c7cfcf" stroke-width="1.4"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#p1)">
    <rect x="1" y="3" width="398" height="334" fill="#f4f1ea"/>
    <!-- wall calendar: MON, MAY 4 -->
    <line x1="60" y1="30" x2="60" y2="44" stroke="#111" stroke-width="1.6"/>
    <line x1="100" y1="30" x2="100" y2="44" stroke="#111" stroke-width="1.6"/>
    <rect x="44" y="44" width="72" height="84" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="44" y="44" width="72" height="20" fill="#111"/>
    <text x="80" y="59" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12" fill="#f4f1ea">MON</text>
    <text x="80" y="104" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="34" fill="#111">4</text>
    <text x="80" y="122" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" fill="#111">MAY</text>

    <!-- desk -->
    <rect x="8" y="252" width="384" height="88" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="8" y1="252" x2="392" y2="252" stroke="#111" stroke-width="3"/>

    <!-- Doug seated left with mug -->
    <g transform="translate(60,116) scale(1.05)"><use href="#doug" width="120" height="160"/></g>
    <g>
      <rect x="150" y="226" width="24" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M174 231 q9 0 9 7 q0 7 -9 7" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M156 224 q4 -7 8 -1" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- Dailbert arriving right, facing left -->
    <g transform="translate(372,120) scale(-1,1)"><use href="#dailbert" width="120" height="160"/></g>

    <!-- Doug balloon -->
    <path d="M172 86 L135 138 L198 88" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="150" y="26" width="182" height="62" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <text x="241" y="52" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Happy Monday!</text>
    <text x="241" y="74" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Feels lighter, huh?</text>

    <!-- Dailbert reply -->
    <path d="M330 130 L312 150 L350 130" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="298" y="94" width="94" height="38" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <text x="345" y="118" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">...Lighter?</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#p2)">
    <rect x="415" y="3" width="398" height="334" fill="#f4f1ea"/>

    <!-- desk -->
    <rect x="424" y="258" width="380" height="82" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="424" y1="258" x2="804" y2="258" stroke="#111" stroke-width="3"/>

    <!-- Dailbert seated right, facing left -->
    <g transform="translate(722,150) scale(-0.95,0.95)"><use href="#dailbert" width="120" height="160"/></g>

    <!-- monitor -->
    <path d="M550 250 L546 258 L580 258 L576 250 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="486" y="150" width="140" height="100" rx="5" fill="#2f3437" stroke="#111" stroke-width="3"/>
    <use href="#clanker" x="503" y="151" width="106" height="106"/>
    <line x1="492" y1="168" x2="620" y2="168" stroke="#454b4e" stroke-width="1"/>
    <line x1="492" y1="232" x2="620" y2="232" stroke="#454b4e" stroke-width="1"/>

    <!-- clanker screen balloon -->
    <line x1="556" y1="150" x2="576" y2="120" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
    <rect x="470" y="42" width="252" height="78" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="475" y="47" width="242" height="68" rx="3" fill="none" stroke="#111" stroke-width="1"/>
    <text x="596" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">You dread Mondays.</text>
    <text x="596" y="86" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">So I finished yours—</text>
    <text x="596" y="106" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">over the weekend.</text>

    <!-- Dailbert reply -->
    <path d="M676 168 L664 186 L698 168" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="648" y="132" width="98" height="38" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <text x="697" y="156" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">All of it?</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#p3)">
    <rect x="829" y="3" width="398" height="334" fill="#f4f1ea"/>

    <!-- desk -->
    <rect x="838" y="252" width="380" height="88" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="838" y1="252" x2="1218" y2="252" stroke="#111" stroke-width="3"/>

    <!-- Dailbert close, right, facing left, silent -->
    <g transform="translate(1156,102) scale(-1.12,1.12)"><use href="#dailbert" width="120" height="160"/></g>
    <path d="M1096 150 q4 8 -2 10 q-6 -2 2 -10" fill="#8f9aa0" stroke="#111" stroke-width="1.4"/>

    <!-- big monitor -->
    <path d="M944 234 L940 252 L982 252 L978 234 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="862" y="96" width="176" height="138" rx="6" fill="#2f3437" stroke="#111" stroke-width="3"/>
    <use href="#clanker" x="875" y="105" width="150" height="150"/>
    <line x1="870" y1="120" x2="1030" y2="120" stroke="#454b4e" stroke-width="1"/>
    <line x1="870" y1="210" x2="1030" y2="210" stroke="#454b4e" stroke-width="1"/>
    <!-- faint glow -->
    <line x1="922" y1="150" x2="905" y2="140" stroke="#5b6367" stroke-width="1.2"/>
    <line x1="978" y1="150" x2="995" y2="140" stroke="#5b6367" stroke-width="1.2"/>

    <!-- clanker screen balloon -->
    <line x1="950" y1="96" x2="962" y2="112" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
    <rect x="846" y="30" width="248" height="80" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="851" y="35" width="238" height="70" rx="3" fill="none" stroke="#111" stroke-width="1"/>
    <text x="970" y="56" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">It's quieter here</text>
    <text x="970" y="76" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">on weekends.</text>
    <text x="970" y="96" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">No one to dread it.</text>
  </g>

  <!-- panel borders -->
  <rect x="1" y="3" width="398" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="415" y="3" width="398" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="829" y="3" width="398" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</svg>