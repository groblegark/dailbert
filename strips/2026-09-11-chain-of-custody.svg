<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Chain of Custody</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-11</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 10 q10 -12 3 -18 q10 4 4 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="46" x2="64" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="46" r="1.7" fill="#111"/>
      <circle cx="72" cy="46" r="1.7" fill="#111"/>
      <path d="M50 64 q10 7 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 82 q20 14 40 0 l10 60 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-7 10 l7 8 l7 -8 Z" fill="#111"/>
      <path d="M58 100 l-3 34 l8 0 l-3 -34 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 q22 12 44 0 l8 58 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="74" y="112" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M100 116 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M80 108 q7 -6 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 44 q-4 -30 30 -34 q34 4 30 34 q-6 -14 -30 -14 q-24 0 -30 14 Z" fill="#111"/>
      <path d="M34 36 q4 -8 12 -10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 6 q8 -3 16 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="40" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="48" x2="64" y2="48" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="48" r="1.7" fill="#111"/>
      <circle cx="72" cy="48" r="1.7" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l8 58 q-28 12 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M46 108 l-2 20 M74 108 l2 20" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: boxy chrome head, slot-eyes, grille, antenna (drawn INSIDE a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#9aa0a6"/>
      <rect x="26" y="20" width="68" height="60" rx="9" fill="#20242a" stroke="#9aa0a6" stroke-width="2.6"/>
      <rect x="35" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <rect x="65" y="38" width="20" height="9" rx="3" fill="#cfe8ff"/>
      <g stroke="#9aa0a6" stroke-width="2.2">
        <line x1="38" y1="62" x2="82" y2="62"/>
        <line x1="38" y1="68" x2="82" y2="68"/>
        <line x1="46" y1="58" x2="46" y2="72"/>
        <line x1="60" y1="58" x2="60" y2="72"/>
        <line x1="74" y1="58" x2="74" y2="72"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <line x1="2" y1="256" x2="398" y2="256" stroke="#111" stroke-width="1.6"/>

      <rect x="252" y="24" width="128" height="96" rx="2" fill="#fefdfb" stroke="#111" stroke-width="2.2"/>
      <text x="316" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" font-weight="bold" fill="#111">KITCHEN POLICY</text>
      <line x1="264" y1="51" x2="368" y2="51" stroke="#111" stroke-width="1.4"/>
      <text x="316" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#111">Label your dishes.</text>
      <text x="316" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#111">Dishwasher runs</text>
      <text x="316" y="104" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#111">on a schedule.</text>

      <rect x="264" y="256" width="120" height="82" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="276" y="266" width="96" height="8" rx="2" fill="#20242a"/>
      <circle cx="360" cy="270" r="2.4" fill="#cfe8ff"/>

      <use href="#dailbert" x="30" y="130" width="120" height="200"/>
      <use href="#doug" x="140" y="130" width="120" height="200"/>

      <rect x="44" y="234" width="26" height="22" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="47" y="238" width="20" height="10" fill="#fefdfb" stroke="#111" stroke-width="1.1"/>
      <text x="57" y="246" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="7.5" fill="#111">DOUG</text>

      <path d="M18 150 h150 v58 h-92 l-10 12 l-3 -12 h-45 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="93" y="172" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="93" dy="0">You labeled your</tspan>
        <tspan x="93" dy="17">mug already.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <line x1="416" y1="256" x2="812" y2="256" stroke="#111" stroke-width="1.6"/>

      <use href="#doug" x="440" y="150" width="120" height="200"/>

      <rect x="636" y="60" width="158" height="126" rx="4" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="648" y="66" width="82" height="82"/>
      <g stroke="#3a4048" stroke-width="2.4" stroke-linecap="round">
        <line x1="740" y1="82" x2="784" y2="82"/>
        <line x1="740" y1="92" x2="778" y2="92"/>
        <line x1="740" y1="102" x2="784" y2="102"/>
        <line x1="740" y1="112" x2="772" y2="112"/>
        <line x1="740" y1="122" x2="784" y2="122"/>
        <line x1="740" y1="132" x2="768" y2="132"/>
      </g>
      <rect x="700" y="186" width="30" height="14" fill="#20242a" stroke="#111" stroke-width="2.4"/>
      <rect x="686" y="200" width="58" height="7" rx="2" fill="#20242a" stroke="#111" stroke-width="2.4"/>

      <path d="M436 150 h140 v42 h-64 l-10 12 l-3 -12 h-63 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="506" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="506" dy="0">My mug didn't</tspan>
        <tspan x="506" dy="16">come back.</tspan>
      </text>

      <line x1="700" y1="118" x2="626" y2="228" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M462 222 h300 v104 h-300 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="612" y="244" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="612" dy="0">Ran the cycle at 2 a.m.</tspan>
        <tspan x="612" dy="19">Nine mugs in, nine out.</tspan>
        <tspan x="612" dy="19">Yours was unlabeled,</tspan>
        <tspan x="612" dy="19">so I logged it to the</tspan>
        <tspan x="612" dy="19">nearest labeled mug.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <line x1="830" y1="256" x2="1226" y2="256" stroke="#111" stroke-width="1.6"/>

      <use href="#priya" x="856" y="150" width="120" height="200"/>
      <rect x="872" y="234" width="26" height="24" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M898 240 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.2"/>

      <rect x="1058" y="66" width="150" height="120" rx="4" fill="#20242a" stroke="#111" stroke-width="2.6"/>
      <use href="#clanker" x="1084" y="76" width="98" height="98"/>

      <path d="M846 150 h156 v42 h-70 l-10 12 l-3 -12 h-73 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="924" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="924" dy="0">Mine's the one you</tspan>
        <tspan x="924" dy="16">can't account for.</tspan>
      </text>

      <line x1="1090" y1="120" x2="1032" y2="212" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <path d="M978 206 h242 v52 h-242 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="1099" y="228" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="1099" dy="0">Correct. Shall I</tspan>
        <tspan x="1099" dy="19">label it for you.</tspan>
      </text>

      <path d="M858 276 h250 v50 h-250 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <path d="M916 276 l-8 -16 l20 12 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="983" y="298" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">
        <tspan x="983" dy="0">No. Unlabeled is how</tspan>
        <tspan x="983" dy="18">I know it's mine.</tspan>
      </text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>