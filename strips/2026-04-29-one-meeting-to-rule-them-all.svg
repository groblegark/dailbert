    <rect x="248" y="120" width="128" height="96" rx="6" fill="#2b2f36" stroke="#111" stroke-width="3"/>
    <rect x="256" y="128" width="112" height="80" rx="4" fill="#20242b"/>
    <line x1="262" y1="200" x2="362" y2="140" stroke="#3a4048" stroke-width="1.5"/>
    <line x1="262" y1="184" x2="350" y2="136" stroke="#3a4048" stroke-width="1.5"/>
    <use href="#clanker" x="272" y="128" width="80" height="80"/>
    <rect x="300" y="216" width="24" height="14" fill="#c8ccd2" stroke="#111" stroke-width="2.5"/>
    <rect x="286" y="229" width="52" height="8" rx="3" fill="#c8ccd2" stroke="#111" stroke-width="2.5"/>

    <!-- dailbert -->
    <use href="#dailbert" x="34" y="112" width="104" height="161"/>

    <!-- dailbert balloon -->
    <ellipse cx="98" cy="54" rx="74" ry="33" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M92 84 L86 110 L108 82 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="98" y="49" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I've got six meetings</text>
    <text x="98" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">at two.</text>

    <!-- clanker balloon -->
    <line x1="304" y1="70" x2="312" y2="120" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="238" y="30" width="132" height="40" rx="3" fill="#eef2f6" stroke="#111" stroke-width="2.5"/>
    <rect x="242" y="34" width="124" height="32" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="304" y="55" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I can fix that.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="14" y1="252" x2="386" y2="252" stroke="#111" stroke-width="3"/>

