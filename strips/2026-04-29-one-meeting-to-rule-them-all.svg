      <circle cx="50" cy="5" r="3.5" fill="#9aa3ad" stroke="#111" stroke-width="1.5"/>
      <rect x="20" y="18" width="60" height="54" rx="8" fill="#c8ccd2" stroke="#111" stroke-width="3"/>
