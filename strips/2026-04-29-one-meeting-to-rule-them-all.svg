  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="14" y1="252" x2="386" y2="252" stroke="#111" stroke-width="3"/>

