    <!-- doug right with mug -->
    <use href="#doug" x="286" y="114" width="106" height="164"/>
    <use href="#mug" x="292" y="196" width="42" height="40"/>

    <!-- clanker balloon top -->
    <line x1="205" y1="76" x2="205" y2="132" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="116" y="20" width="178" height="56" rx="3" fill="#eef2f6" stroke="#111" stroke-width="2.5"/>
    <rect x="120" y="24" width="170" height="48" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="205" y="43" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Done — I merged them</text>
    <text x="205" y="61" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">into one meeting.</text>

    <!-- dailbert balloon -->
    <ellipse cx="70" cy="86" rx="60" ry="31" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M66 114 L58 138 L84 112 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="70" y="81" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">...with all forty</text>
    <text x="70" y="98" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">people?</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="14" y1="252" x2="386" y2="252" stroke="#111" stroke-width="3"/>

    <!-- priya walking through -->
    <use href="#priya" x="58" y="112" width="108" height="165"/>
    <!-- doug with mug -->
    <use href="#doug" x="270" y="118" width="104" height="160"/>
    <use href="#mug" x="276" y="200" width="42" height="40"/>

    <!-- priya balloon -->
    <ellipse cx="118" cy="56" rx="80" ry="34" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M112 88 L104 114 L128 86 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="118" y="51" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Decline it. I shipped</text>
    <text x="118" y="68" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">the thing yesterday.</text>

    <!-- doug balloon -->
    <ellipse cx="322" cy="66" rx="62" ry="27" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M318 90 L312 112 L334 88 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="322" y="71" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">She always does.</text>
  </g>
</g>
