    <rect x="194" y="222" width="24" height="14" fill="#c8ccd2" stroke="#111" stroke-width="2.5"/>
    <rect x="182" y="235" width="48" height="8" rx="3" fill="#c8ccd2" stroke="#111" stroke-width="2.5"/>

    <!-- dailbert left -->
