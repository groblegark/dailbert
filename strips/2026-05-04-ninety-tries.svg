<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Ninety Tries</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-04</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="cp1"><rect x="4" y="4" width="392" height="332" rx="3"/></clipPath>
    <clipPath id="cp2"><rect x="418" y="4" width="392" height="332" rx="3"/></clipPath>
    <clipPath id="cp3"><rect x="832" y="4" width="392" height="332" rx="3"/></clipPath>

    <!-- DOUG: round head, dot eyes, big grin -->
    <g id="doug">
      <path d="M28,152 Q30,98 55,92 L85,92 Q112,98 112,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M55,94 L70,110 L85,94" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="70" cy="52" r="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M48,26 q6,-8 12,-2 M62,19 q8,-7 15,0 M82,24 q7,-6 12,3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="58" cy="50" r="4" fill="#111"/>
      <circle cx="82" cy="50" r="4" fill="#111"/>
      <path d="M50,64 Q70,90 90,64 Q70,74 50,64 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <g id="priya">
      <path d="M26,152 Q28,100 54,94 L86,94 Q114,100 114,152 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M36,122 q9,7 0,16 M104,122 q-9,7 0,16" fill="none" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="70" cy="55" rx="31" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M40,52 Q33,18 70,14 Q107,18 100,52 Q95,34 84,30 Q92,21 70,21 Q48,21 56,30 Q45,34 40,52 Z" fill="#111"/>
      <circle cx="70" cy="12" r="9" fill="#111"/>
      <circle cx="45" cy="34" r="6" fill="#111"/>
      <circle cx="95" cy="34" r="6" fill="#111"/>
      <rect x="49" y="47" width="18" height="13" rx="2" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
      <rect x="73" y="47" width="18" height="13" rx="2" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
      <line x1="67" y1="53" x2="73" y2="53" stroke="#111" stroke-width="2.5"/>
      <circle cx="58" cy="54" r="2.6" fill="#111"/>
      <circle cx="82" cy="54" r="2.6" fill="#111"/>
      <path d="M60,74 Q70,79 80,74" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- THE CLANKER: chrome head, slot eyes, grille, antenna -->
    <g id="clanker">
      <line x1="50" y1="20" x2="50" y2="9" stroke="#8f9aa3" stroke-width="2.5"/>
      <circle cx="50" cy="6" r="3.4" fill="#bfe6f2"/>
      <rect x="24" y="20" width="52" height="46" rx="6" fill="#1c2026" stroke="#8f9aa3" stroke-width="2.5"/>
      <rect x="31" y="33" width="15" height="6" rx="3" fill="#bfe6f2"/>
      <rect x="54" y="33" width="15" height="6" rx="3" fill="#bfe6f2"/>
      <g stroke="#8f9aa3" stroke-width="2">
        <line x1="34" y1="50" x2="34" y2="58"/>
        <line x1="40" y1="50" x2="40" y2="58"/>
        <line x1="46" y1="50" x2="46" y2="58"/>
        <line x1="52" y1="50" x2="52" y2="58"/>
        <line x1="58" y1="50" x2="58" y2="58"/>
        <line x1="64" y1="50" x2="64" y2="58"/>
      </g>
    </g>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#cp1)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <use href="#doug" transform="translate(24,148)"/>

    <!-- monitor -->
    <rect x="305" y="266" width="22" height="20" fill="#cbc5b6" stroke="#111" stroke-width="2.5"/>
    <rect x="252" y="168" width="126" height="100" rx="6" fill="#cbc5b6" stroke="#111" stroke-width="3"/>
    <rect x="260" y="176" width="110" height="84" fill="#23262b"/>
    <use href="#clanker" transform="translate(276,185) scale(0.78)" opacity="0.55"/>

    <!-- empty mug on desk -->
    <rect x="150" y="264" width="34" height="26" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M184,270 q12,0 12,9 q0,9 -12,9" fill="none" stroke="#111" stroke-width="2.5"/>

    <!-- desk -->
    <rect x="4" y="300" width="392" height="38" fill="#e6e1d4" stroke="#111" stroke-width="2"/>

    <!-- balloon -->
    <path d="M88,80 108,80 96,162 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="24" y="24" width="158" height="60" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="103" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Coffee, pal.</text>
    <text x="103" y="72" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">Surprise me.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#cp2)">
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- Doug small, mug up -->
    <use href="#doug" transform="translate(414,196) scale(0.66)"/>
    <rect x="470" y="250" width="26" height="20" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M496,254 q9,0 9,7 q0,7 -9,7" fill="none" stroke="#111" stroke-width="2.5"/>

    <!-- big monitor -->
    <rect x="648" y="248" width="22" height="16" fill="#cbc5b6" stroke="#111" stroke-width="2.5"/>
    <rect x="560" y="92" width="196" height="156" rx="8" fill="#cbc5b6" stroke="#111" stroke-width="3"/>
    <rect x="570" y="102" width="176" height="132" fill="#23262b"/>
    <g stroke="#33414d" stroke-width="2" opacity="0.7">
      <line x1="586" y1="118" x2="730" y2="118"/>
      <line x1="586" y1="222" x2="730" y2="222"/>
    </g>
    <use href="#clanker" transform="translate(573,95) scale(1.7)"/>

    <!-- clanker rectangular balloon + dashed tail -->
    <line x1="700" y1="96" x2="672" y2="104" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="592" y="14" width="216" height="80" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="597" y="19" width="206" height="70" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="700" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You ask every day.</text>
    <text x="700" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Ninety guesses.</text>
    <text x="700" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You liked one.</text>

    <!-- desk -->
    <rect x="418" y="300" width="392" height="38" fill="#e6e1d4" stroke="#111" stroke-width="2"/>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#cp3)">
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <use href="#doug" transform="translate(846,148)"/>
    <use href="#priya" transform="translate(1024,148)"/>

    <!-- Doug's new tall cup + steam -->
    <path d="M949,208 q6,-12 0,-22 M961,208 q7,-13 0,-24 M973,208 q6,-12 0,-22" fill="none" stroke="#8f9aa3" stroke-width="2" stroke-linecap="round"/>
    <rect x="944" y="212" width="36" height="60" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="944" y1="224" x2="980" y2="224" stroke="#111" stroke-width="2"/>

    <!-- desk -->
    <rect x="832" y="300" width="392" height="38" fill="#e6e1d4" stroke="#111" stroke-width="2"/>

    <!-- Doug quiet-then-warm balloon -->
    <path d="M896,82 916,82 906,162 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="836" y="20" width="150" height="66" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="911" y="41" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">...ninety tries.</text>
    <text x="911" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Anyway.</text>
    <text x="911" y="79" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good cup.</text>

    <!-- Priya dry button -->
    <path d="M1086,72 1106,72 1096,164 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="1030" y="16" width="176" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="1118" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It'll get the</text>
    <text x="1118" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">other 89.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>