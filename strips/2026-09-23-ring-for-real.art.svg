<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" viewBox="0 0 100 140">
      <ellipse cx="50" cy="34" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 7 q8 -9 3 -14 q9 4 4 13" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="33" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="33" r="6" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47" y1="33" x2="53" y2="33" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="33" r="1.6" fill="#111"/>
      <circle cx="59" cy="33" r="1.6" fill="#111"/>
      <path d="M43 48 q7 5 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 60 q16 10 32 0 l7 55 q-23 8 -46 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 60 l-6 12 l6 6 l6 -6 z" fill="#111"/>
      <path d="M50 78 l-3 30 l3 4 l3 -4 z" fill="#111"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 100 140">
      <circle cx="50" cy="36" r="29" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="33" r="2.4" fill="#111"/>
      <circle cx="60" cy="33" r="2.4" fill="#111"/>
      <path d="M38 44 q12 13 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M32 63 q18 10 36 0 l6 52 q-24 8 -48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- arm to mug -->
      <path d="M70 82 q22 4 24 22" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="86" y="98" width="20" height="17" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M106 102 q8 0 8 6 q0 6 -8 6" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ============ PRIYA ============ -->
    <symbol id="priya" viewBox="0 0 100 150">
      <!-- hair bun -->
      <ellipse cx="50" cy="20" rx="10" ry="8" fill="#111"/>
      <ellipse cx="50" cy="38" rx="25" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M25 36 q-2 -22 25 -24 q27 2 25 24 q-8 -12 -25 -12 q-17 0 -25 12z" fill="#111"/>
      <path d="M25 36 q4 10 3 20" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M75 36 q-4 10 -3 20" fill="none" stroke="#111" stroke-width="2.4"/>
      <rect x="34" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="52" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="48" y1="38" x2="52" y2="38" stroke="#111" stroke-width="2"/>
      <circle cx="41" cy="39" r="1.6" fill="#111"/>
      <circle cx="59" cy="39" r="1.6" fill="#111"/>
      <path d="M44 52 q6 4 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M33 64 q17 10 34 0 l7 56 q-24 8 -48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- rolled sleeve hint -->
      <path d="M33 88 q6 4 10 2" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M67 88 q-6 4 -10 2" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ============ BOSS ============ -->
    <symbol id="boss" viewBox="0 0 100 150">
      <path d="M36 16 l6 -14 l4 12 l4 -14 l5 15 l4 -12 l5 15" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <ellipse cx="50" cy="36" rx="23" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="42" cy="35" r="1.6" fill="#111"/>
      <circle cx="58" cy="35" r="1.6" fill="#111"/>
      <path d="M44 47 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 60 q16 9 32 0 l6 55 q-22 8 -44 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 60 l-7 10 l7 8 l7 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M50 78 l-3 32 l3 4 l3 -4 z" fill="#111"/>
    </symbol>

    <!-- ============ CLANKER ============ -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="30" width="52" height="42" rx="6" fill="#3a3f45" stroke="#cdd2d6" stroke-width="2.2"/>
      <line x1="50" y1="30" x2="50" y2="18" stroke="#cdd2d6" stroke-width="2.2"/>
      <circle cx="50" cy="15" r="3.4" fill="#cdd2d6"/>
      <rect x="31" y="41" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <rect x="55" y="41" width="14" height="8" rx="2" fill="#bfe9ff"/>
      <line x1="33" y1="61" x2="67" y2="61" stroke="#cdd2d6" stroke-width="2"/>
      <line x1="38" y1="57" x2="38" y2="65" stroke="#cdd2d6" stroke-width="1.6"/>
      <line x1="46" y1="57" x2="46" y2="65" stroke="#cdd2d6" stroke-width="1.6"/>
      <line x1="54" y1="57" x2="54" y2="65" stroke="#cdd2d6" stroke-width="1.6"/>
      <line x1="62" y1="57" x2="62" y2="65" stroke="#cdd2d6" stroke-width="1.6"/>
    </symbol>

    <!-- ============ BELL ============ -->
    <symbol id="bell" viewBox="0 0 60 90">
      <!-- mount base -->
      <rect x="10" y="70" width="40" height="8" rx="2" fill="#caa53a" stroke="#111" stroke-width="2"/>
      <line x1="30" y1="70" x2="30" y2="52" stroke="#111" stroke-width="2.4"/>
      <!-- brass dome -->
      <path d="M8 52 q22 -40 44 0 z" fill="#e8c65a" stroke="#111" stroke-width="2.4"/>
      <path d="M8 52 q22 -40 44 0" fill="none" stroke="#fff6d8" stroke-width="1.6" opacity="0.6"/>
      <ellipse cx="30" cy="52" rx="22" ry="4" fill="#caa53a" stroke="#111" stroke-width="2.2"/>
      <circle cx="30" cy="14" r="4" fill="#e8c65a" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- shelf/desk with bell -->
      <line x1="0" y1="250" x2="400" y2="250" stroke="#111" stroke-width="2"/>
      <!-- the bell on a little wall bracket -->
      <use href="#bell" x="250" y="70" width="88" height="132"/>
      <text x="294" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" font-weight="bold">SHIP IT</text>

      <!-- Dailbert and Doug looking at it -->
      <use href="#dailbert" x="18" y="150" width="120" height="168"/>
      <use href="#doug" x="115" y="155" width="120" height="168"/>

      <!-- Dailbert balloon -->
      <path d="M30 40 h150 v52 h-95 l-14 16 l-2 -16 h-39 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="105" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">New rule: you ring</text>
      <text x="105" y="78" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">the bell when it</text>
      <text x="105" y="96" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">actually ships.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="250" x2="828" y2="250" stroke="#111" stroke-width="2"/>

      <!-- Monitor with clanker on desk -->
      <rect x="470" y="150" width="120" height="88" rx="5" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <rect x="512" y="238" width="36" height="12" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="486" y="158" width="88" height="76"/>

      <!-- Boss, arms up, half-drunk on the program -->
      <use href="#boss" x="640" y="150" width="120" height="168"/>
      <path d="M700 205 q30 -6 44 -30" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- Clanker balloon: rectangular screen-edged, dashed line to monitor -->
      <line x1="530" y1="150" x2="560" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="440" y="28" width="200" height="88" rx="2" fill="#eef1f4" stroke="#111" stroke-width="2"/>
      <rect x="444" y="32" width="192" height="80" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="540" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I can ring it for you.</text>
      <text x="540" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">The build is 94% likely</text>
      <text x="540" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">to go green. I rounded</text>
      <text x="540" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">up. It felt kind.</text>

      <!-- Boss balloon -->
      <path d="M700 40 h108 v40 h-40 l-12 14 l-2 -14 h-54 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="754" y="58" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Automate the</text>
      <text x="754" y="75" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">bell!</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="250" x2="1242" y2="250" stroke="#111" stroke-width="2"/>

      <!-- bell on bracket, mid-ring -->
      <use href="#bell" x="905" y="40" width="80" height="120"/>
      <!-- ring lines -->
      <path d="M900 70 q-10 -6 -14 -16" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M990 70 q10 -6 14 -16" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M895 88 q-14 0 -22 -6" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M995 88 q14 0 22 -6" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>

      <!-- Priya ringing it, arm raised to the pull -->
      <use href="#priya" x="895" y="150" width="120" height="180"/>
      <path d="M958 200 q10 -30 -12 -52" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- Doug cheering with mug raised -->
      <use href="#doug" x="1050" y="160" width="115" height="160"/>

      <!-- cheer marks -->
      <text x="1130" y="150" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="20" fill="#111" font-weight="bold">!</text>
      <text x="1040" y="130" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="20" fill="#111" font-weight="bold">*</text>

      <!-- Priya balloon -->
      <path d="M846 34 h150 v40 h-70 l-12 14 l-2 -14 h-66 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="921" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">It shipped. I was</text>
      <text x="921" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">here for it.</text>

      <!-- Doug balloon -->
      <path d="M1050 40 h116 v36 h-42 l-12 12 l-2 -12 h-58 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1108" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">100%. I saw it.</text>
    </g>
  </g>
</svg>