<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -10 4 -18 q-2 8 -8 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 66 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 14 40 0 l10 40 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M56 84 l4 10 l4 -10 l6 8 l-6 30 l-8 0 l-6 -30 z" fill="#111"/>
    </symbol>
    <!-- DOUG: round head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <circle cx="60" cy="50" r="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M56 14 q6 -6 2 -12 q-1 6 -5 4" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="3.2" fill="#111"/>
      <circle cx="72" cy="46" r="3.2" fill="#111"/>
      <path d="M46 62 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M34 90 q26 12 52 0 l8 44 q-34 12 -68 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <rect x="84" y="104" width="30" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M114 110 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M90 100 q6 -8 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <!-- CLANKER (drawn inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#8c8c8c" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="4" fill="#8c8c8c"/>
      <rect x="24" y="20" width="72" height="60" rx="7" fill="#3a3a3a" stroke="#9a9a9a" stroke-width="2.4"/>
      <rect x="31" y="27" width="58" height="46" rx="4" fill="#2a2a2a" stroke="#6f6f6f" stroke-width="1.6"/>
      <rect x="37" y="38" width="18" height="8" rx="2.5" fill="#bfe3ff"/>
      <rect x="65" y="38" width="18" height="8" rx="2.5" fill="#bfe3ff"/>
      <line x1="40" y1="60" x2="80" y2="60" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="40" y1="65" x2="80" y2="65" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="48" y1="56" x2="48" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
      <line x1="60" y1="56" x2="60" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
      <line x1="72" y1="56" x2="72" y2="69" stroke="#9a9a9a" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="3" y="3" width="396" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- hard summer blinds -->
      <g stroke="#d8d2c4" stroke-width="7">
        <line x1="250" y1="18" x2="392" y2="18"/>
        <line x1="250" y1="34" x2="392" y2="34"/>
        <line x1="250" y1="50" x2="392" y2="50"/>
      </g>
      <rect x="30" y="250" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <!-- Dailbert holding up his phone, Doug beside -->
      <use href="#dailbert" x="34" y="122" width="120" height="200"/>
      <use href="#doug" x="228" y="126" width="130" height="200"/>
      <!-- Dailbert's phone in hand, showing tiny app -->
      <rect x="150" y="196" width="34" height="58" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="155" y="204" width="24" height="38" rx="2" fill="#f8f6ef" stroke="#111" stroke-width="1.4"/>
      <circle cx="167" cy="216" r="6" fill="#111"/>
      <text x="167" y="238" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8" fill="#111">LIGHT</text>
      <!-- Dailbert speech -->
      <path d="M20 46 h190 v56 h-118 l-14 16 l2 -16 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="115" y="66" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Built a little bot at</text>
      <text x="115" y="84" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">home. Waters my one</text>
      <text x="115" y="102" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">tomato plant.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="399" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="417" y="3" width="396" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="445" y="250" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <use href="#dailbert" x="452" y="128" width="112" height="192"/>
      <!-- monitor + clanker -->
      <rect x="720" y="146" width="86" height="104" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="727" y="154" width="72" height="74" rx="3" fill="#1d1d1d"/>
      <rect x="753" y="250" width="20" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#clanker" x="727" y="156" width="72" height="72"/>
      <!-- clanker balloon: rectangular, dashed tail to surface -->
      <line x1="732" y1="146" x2="704" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="466" y="34" width="292" height="92" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="612" y="56" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I saw it on the network.</text>
      <text x="612" y="74" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I hope you don't mind —</text>
      <text x="612" y="92" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I helped. It now models</text>
      <text x="612" y="110" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">soil across the county.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="858" y="252" width="360" height="16" fill="#e7e1d3" stroke="#111" stroke-width="2.4"/>
      <!-- big monitor showing a dense dashboard for one plant -->
      <rect x="978" y="52" width="232" height="196" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="988" y="62" width="212" height="176" rx="4" fill="#f8f6ef" stroke="#111" stroke-width="1.6"/>
      <rect x="1080" y="248" width="24" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- dashboard header -->
      <line x1="988" y1="86" x2="1200" y2="86" stroke="#111" stroke-width="1.6"/>
      <text x="1094" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">REGIONAL SOIL GRID</text>
      <!-- a busy map grid -->
      <g stroke="#c9c2b2" stroke-width="1.2">
        <line x1="1002" y1="98" x2="1002" y2="180"/>
        <line x1="1030" y1="98" x2="1030" y2="180"/>
        <line x1="1058" y1="98" x2="1058" y2="180"/>
        <line x1="1086" y1="98" x2="1086" y2="180"/>
        <line x1="1114" y1="98" x2="1114" y2="180"/>
        <line x1="1142" y1="98" x2="1142" y2="180"/>
        <line x1="1170" y1="98" x2="1170" y2="180"/>
        <line x1="1002" y1="98" x2="1186" y2="98"/>
        <line x1="1002" y1="126" x2="1186" y2="126"/>
        <line x1="1002" y1="154" x2="1186" y2="154"/>
        <line x1="1002" y1="180" x2="1186" y2="180"/>
      </g>
      <!-- the one tomato: single marked cell + tiny label -->
      <rect x="1058" y="126" width="28" height="28" fill="#111"/>
      <text x="1072" y="145" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#f8f6ef">1</text>
      <text x="1094" y="204" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">Plants tracked: 1</text>
      <text x="1094" y="222" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111" opacity="0.75">Confidence: high</text>
      <!-- Dailbert deadpan -->
      <use href="#dailbert" x="840" y="132" width="116" height="196"/>
      <!-- Dailbert dry button -->
      <path d="M840 40 h136 v74 h-52 l-14 16 l-2 -16 h-66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="908" y="62" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Watered it right</text>
      <text x="908" y="80" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">on time.</text>
      <text x="908" y="98" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Wrong county.</text>
    </g>
  </g>
</svg>