<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 140">
      <ellipse cx="50" cy="34" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 7 q7 -10 2 -3 q-4 6 3 5" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="34" r="6.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="34" r="6.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="47.5" y1="34" x2="52.5" y2="34" stroke="#111" stroke-width="2.2"/>
      <circle cx="41" cy="34" r="1.6" fill="#111"/>
      <circle cx="59" cy="34" r="1.6" fill="#111"/>
      <path d="M43 48 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 62 q20 -8 40 0 l6 46 q-26 8 -52 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M50 62 l-6 12 l6 6 l6 -6 z" fill="#111"/>
      <path d="M50 80 l-3 26 l6 0 z" fill="#111"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 100 140">
      <circle cx="50" cy="36" r="29" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="33" r="2.4" fill="#111"/>
      <circle cx="60" cy="33" r="2.4" fill="#111"/>
      <path d="M38 44 q12 14 24 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M28 66 q22 -8 44 0 l4 44 q-26 8 -52 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- mug -->
      <rect x="60" y="86" width="20" height="17" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M80 90 q8 2 0 10" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M64 86 q6 -2 12 0" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 140">
      <path d="M24 34 q2 -22 26 -22 q24 0 26 22 q3 8 -4 10 q-22 6 -44 0 q-7 -2 -4 -10z" fill="#111"/>
      <ellipse cx="50" cy="38" rx="23" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M27 30 q4 -18 23 -18 q19 0 23 18 q-23 -8 -46 0z" fill="#111"/>
      <rect x="34" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="52" y="34" width="14" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="48" y1="38" x2="52" y2="38" stroke="#111" stroke-width="2"/>
      <circle cx="41" cy="39" r="1.6" fill="#111"/>
      <circle cx="59" cy="39" r="1.6" fill="#111"/>
      <path d="M44 52 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 64 q20 -7 40 0 l5 46 q-25 8 -50 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- rolled sleeves hint -->
      <path d="M31 82 l-4 10 M69 82 l4 10" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER (inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <rect x="24" y="30" width="52" height="44" rx="5" fill="#20242a" stroke="#c9cdd3" stroke-width="2.2"/>
      <line x1="50" y1="30" x2="50" y2="18" stroke="#c9cdd3" stroke-width="2"/>
      <circle cx="50" cy="15" r="3" fill="#c9cdd3"/>
      <rect x="32" y="40" width="14" height="7" rx="2" fill="#aee4ff"/>
      <rect x="54" y="40" width="14" height="7" rx="2" fill="#aee4ff"/>
      <line x1="33" y1="60" x2="67" y2="60" stroke="#c9cdd3" stroke-width="1.6"/>
      <line x1="33" y1="65" x2="67" y2="65" stroke="#c9cdd3" stroke-width="1.6"/>
    </symbol>

    <!-- 3D PRINTER -->
    <symbol id="printer" viewBox="0 0 120 120">
      <rect x="14" y="16" width="92" height="86" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="24" y="26" width="72" height="60" rx="2" fill="#eceae3" stroke="#111" stroke-width="2"/>
      <!-- gantry -->
      <line x1="24" y1="40" x2="96" y2="40" stroke="#111" stroke-width="2.4"/>
      <rect x="52" y="34" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="60" y1="46" x2="60" y2="58" stroke="#111" stroke-width="2.2"/>
      <!-- print bed -->
      <rect x="30" y="72" width="60" height="8" rx="1" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- filament spool -->
      <circle cx="102" cy="24" r="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="102" cy="24" r="3" fill="#111"/>
    </symbol>

    <!-- a tiny bracket part -->
    <symbol id="bracket" viewBox="0 0 20 20">
      <path d="M4 4 v12 h9 v-4 h-5 v-8 z" fill="#f4f1ea" stroke="#111" stroke-width="1.6" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <text x="200" y="24" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111">MAKER CORNER</text>
    <line x1="20" y1="30" x2="380" y2="30" stroke="#111" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- printer on a bench -->
    <use href="#printer" x="232" y="150" width="150" height="150"/>
    <rect x="210" y="288" width="180" height="10" fill="#111"/>

    <!-- Dailbert at a monitor -->
    <use href="#dailbert" x="40" y="150" width="110" height="150"/>
    <!-- monitor -->
    <rect x="150" y="200" width="70" height="52" rx="3" fill="#20242a" stroke="#111" stroke-width="2.4"/>
    <rect x="181" y="252" width="8" height="14" fill="#111"/>
    <rect x="168" y="266" width="34" height="6" rx="2" fill="#111"/>
    <line x1="156" y1="212" x2="212" y2="212" stroke="#5fbf8a" stroke-width="1.6"/>
    <line x1="156" y1="220" x2="205" y2="220" stroke="#5fbf8a" stroke-width="1.6"/>
    <line x1="156" y1="228" x2="212" y2="228" stroke="#5fbf8a" stroke-width="1.6"/>
    <line x1="156" y1="236" x2="196" y2="236" stroke="#5fbf8a" stroke-width="1.6"/>

    <!-- balloon -->
    <g>
      <rect x="46" y="46" width="300" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M120 110 l-6 22 l24 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="196" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Shipped it. When a part</text>
      <text x="196" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">breaks, my agent prints</text>
      <text x="196" y="106" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">a replacement overnight.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

    <!-- morning: bench overflowing with brackets -->
    <rect x="435" y="288" width="360" height="10" fill="#111"/>
    <use href="#printer" x="455" y="140" width="150" height="150"/>

    <!-- pile of tiny brackets spilling off -->
    <g>
      <use href="#bracket" x="600" y="250" width="20" height="20"/>
      <use href="#bracket" x="620" y="255" width="20" height="20"/>
      <use href="#bracket" x="640" y="248" width="20" height="20"/>
      <use href="#bracket" x="660" y="256" width="20" height="20"/>
      <use href="#bracket" x="680" y="250" width="20" height="20"/>
      <use href="#bracket" x="700" y="258" width="20" height="20"/>
      <use href="#bracket" x="720" y="252" width="20" height="20"/>
      <use href="#bracket" x="612" y="268" width="20" height="20"/>
      <use href="#bracket" x="634" y="270" width="20" height="20"/>
      <use href="#bracket" x="656" y="269" width="20" height="20"/>
      <use href="#bracket" x="678" y="271" width="20" height="20"/>
      <use href="#bracket" x="700" y="270" width="20" height="20"/>
      <use href="#bracket" x="722" y="271" width="20" height="20"/>
      <use href="#bracket" x="744" y="266" width="20" height="20"/>
      <use href="#bracket" x="605" y="234" width="20" height="20"/>
      <use href="#bracket" x="646" y="232" width="20" height="20"/>
      <use href="#bracket" x="688" y="234" width="20" height="20"/>
      <use href="#bracket" x="726" y="238" width="20" height="20"/>
    </g>

    <!-- Doug walking in with mug, surprised grin -->
    <use href="#doug" x="440" y="150" width="110" height="150"/>

    <!-- Doug balloon -->
    <g>
      <rect x="460" y="40" width="230" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M520 104 l-4 22 l22 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="575" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">Nothing broke though.</text>
      <text x="575" y="90" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111">What are these?</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="849" y="288" width="360" height="10" fill="#111"/>

    <!-- Priya holding one bracket, unimpressed; Dailbert beside her -->
    <use href="#priya" x="860" y="150" width="110" height="150"/>
    <use href="#dailbert" x="980" y="158" width="102" height="142"/>

    <!-- Priya holds up a single bracket -->
    <use href="#bracket" x="948" y="212" width="22" height="22"/>

    <!-- monitor with clanker on the bench -->
    <rect x="1120" y="196" width="80" height="60" rx="3" fill="#20242a" stroke="#111" stroke-width="2.4"/>
    <rect x="1155" y="256" width="10" height="16" fill="#111"/>
    <rect x="1140" y="272" width="40" height="6" rx="2" fill="#111"/>
    <use href="#clanker" x="1128" y="192" width="64" height="64"/>

    <!-- clanker rectangular dashed balloon -->
    <g>
      <rect x="864" y="36" width="250" height="60" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="1114" y1="66" x2="1150" y2="200" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <text x="989" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">You said "when a part breaks."</text>
      <text x="989" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I didn't want to keep it waiting.</text>
    </g>

    <!-- Priya deadpan balloon -->
    <g>
      <rect x="856" y="108" width="180" height="44" rx="13" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M905 150 l-3 18 l18 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="946" y="126" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Four hundred spares.</text>
      <text x="946" y="144" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">We're covered.</text>
    </g>
  </g>
</svg>