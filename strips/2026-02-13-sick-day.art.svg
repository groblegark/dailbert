<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" overflow="visible">
      <polygon points="34,210 106,210 96,150 44,150" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M56,150 L70,166 L84,150" fill="none" stroke="#111" stroke-width="2.5"/>
      <polygon points="70,152 63,160 70,205 77,160" fill="#111"/>
      <rect x="62" y="132" width="16" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="70" cy="94" rx="31" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="39" cy="96" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="101" cy="96" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M70,60 q5,-13 -6,-13 q-9,0 -5,9" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="57" cy="94" r="12" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
      <circle cx="83" cy="94" r="12" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
      <line x1="69" y1="94" x2="71" y2="94" stroke="#111" stroke-width="2.5"/>
      <line x1="45" y1="92" x2="39" y2="90" stroke="#111" stroke-width="2.5"/>
      <line x1="95" y1="92" x2="101" y2="90" stroke="#111" stroke-width="2.5"/>
      <circle cx="57" cy="95" r="2.4" fill="#111"/>
      <circle cx="83" cy="95" r="2.4" fill="#111"/>
      <line x1="49" y1="80" x2="63" y2="82" stroke="#111" stroke-width="2"/>
      <line x1="77" y1="82" x2="91" y2="80" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="116" x2="80" y2="116" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="boss" overflow="visible">
      <polygon points="30,210 110,210 100,150 40,150" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M62,150 L70,172 L78,150" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="55" y1="152" x2="66" y2="178" stroke="#111" stroke-width="2"/>
      <line x1="85" y1="152" x2="74" y2="178" stroke="#111" stroke-width="2"/>
      <polygon points="70,158 65,164 70,200 75,164" fill="#111"/>
      <rect x="62" y="132" width="16" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="70" cy="96" rx="28" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M54,74 L46,18 L68,70 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M72,70 L94,18 L86,74 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <line x1="58" y1="94" x2="64" y2="94" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="76" y1="94" x2="82" y2="94" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M60,110 q10,8 20,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="clanker" overflow="visible">
      <line x1="60" y1="24" x2="60" y2="8" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="5" r="4" fill="#111"/>
      <rect x="12" y="24" width="96" height="74" rx="8" fill="#c9ccd1" stroke="#111" stroke-width="3"/>
      <line x1="18" y1="30" x2="30" y2="30" stroke="#8f949c" stroke-width="2"/>
      <line x1="18" y1="36" x2="26" y2="36" stroke="#8f949c" stroke-width="2"/>
      <rect x="26" y="46" width="24" height="12" rx="6" fill="#eaf6ff" stroke="#111" stroke-width="2.5"/>
      <rect x="70" y="46" width="24" height="12" rx="6" fill="#eaf6ff" stroke="#111" stroke-width="2.5"/>
      <line x1="30" y1="52" x2="46" y2="52" stroke="#bfe4ff" stroke-width="1.5"/>
      <line x1="74" y1="52" x2="90" y2="52" stroke="#bfe4ff" stroke-width="1.5"/>
      <rect x="34" y="74" width="52" height="14" rx="3" fill="#e9edf2" stroke="#111" stroke-width="2.5"/>
      <line x1="44" y1="74" x2="44" y2="88" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="74" x2="54" y2="88" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="74" x2="64" y2="88" stroke="#111" stroke-width="2"/>
      <line x1="74" y1="74" x2="74" y2="88" stroke="#111" stroke-width="2"/>
    </symbol>
    <clipPath id="c1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  </defs>

  <!-- paper -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea"/>

  <!-- ===== PANEL 1 ===== -->
  <g clip-path="url(#c1)">
    <line x1="0" y1="252" x2="400" y2="252" stroke="#111" stroke-width="2"/>
    <!-- window -->
    <rect x="250" y="30" width="110" height="80" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <line x1="305" y1="30" x2="305" y2="110" stroke="#111" stroke-width="2"/>
    <line x1="250" y1="70" x2="360" y2="70" stroke="#111" stroke-width="2"/>
    <!-- empty workstation -->
    <rect x="150" y="176" width="215" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="160" y1="190" x2="160" y2="252" stroke="#111" stroke-width="2.5"/>
    <line x1="352" y1="190" x2="352" y2="252" stroke="#111" stroke-width="2.5"/>
    <!-- empty swivel chair, turned away -->
    <rect x="205" y="128" width="56" height="48" rx="7" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="212" y="176" width="42" height="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="233" y1="185" x2="233" y2="222" stroke="#111" stroke-width="2.5"/>
    <path d="M213,232 h40" stroke="#111" stroke-width="2.5"/>
    <line x1="233" y1="222" x2="215" y2="232" stroke="#111" stroke-width="2.5"/>
    <line x1="233" y1="222" x2="251" y2="232" stroke="#111" stroke-width="2.5"/>
    <!-- cold mug on desk -->
    <rect x="300" y="158" width="24" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M324,161 q9,2 0,10" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- Dailbert -->
    <use href="#dailbert" transform="translate(26,44) scale(0.9)"/>
    <!-- balloon -->
    <path d="M150,80 L112,102 L168,74 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="212" cy="52" rx="90" ry="30" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="212" y="57" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Doug called in sick.</text>
  </g>

  <!-- ===== PANEL 2 ===== -->
  <g clip-path="url(#c2)">
    <line x1="414" y1="252" x2="814" y2="252" stroke="#111" stroke-width="2"/>
    <!-- back wall doorway -->
    <rect x="446" y="120" width="60" height="132" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <line x1="700" y1="120" x2="700" y2="252" stroke="#111" stroke-width="1.5"/>
    <!-- Boss walking -->
    <use href="#boss" transform="translate(560,44) scale(0.9)"/>
    <!-- briefcase -->
    <rect x="676" y="196" width="34" height="26" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M686,196 q7,-9 14,0" fill="none" stroke="#111" stroke-width="2.5"/>
    <!-- motion lines -->
    <line x1="540" y1="150" x2="524" y2="150" stroke="#111" stroke-width="2"/>
    <line x1="540" y1="168" x2="520" y2="168" stroke="#111" stroke-width="2"/>
    <!-- balloon -->
    <path d="M660,102 L648,68 L692,84 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="615" cy="52" rx="100" ry="47" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="615" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Output's up eleven</text>
    <text x="615" y="56" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">percent today. Keep</text>
    <text x="615" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">doing whatever that is.</text>
  </g>

  <!-- ===== PANEL 3 ===== -->
  <g clip-path="url(#c3)">
    <line x1="828" y1="250" x2="1228" y2="250" stroke="#111" stroke-width="2"/>
    <!-- Dailbert at his desk -->
    <use href="#dailbert" transform="translate(838,100) scale(0.72)"/>
    <!-- desk -->
    <rect x="836" y="214" width="384" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- keyboard -->
    <rect x="978" y="222" width="70" height="16" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- monitor stand -->
    <polygon points="1108,214 1134,214 1128,200 1114,200" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- monitor + dark screen -->
    <rect x="1052" y="98" width="140" height="112" rx="7" fill="#111" stroke="#111" stroke-width="3"/>
    <rect x="1058" y="104" width="128" height="100" rx="4" fill="#17181c"/>
    <!-- screen glow hatch -->
    <line x1="1064" y1="112" x2="1180" y2="112" stroke="#26303a" stroke-width="1"/>
    <line x1="1064" y1="196" x2="1180" y2="196" stroke="#26303a" stroke-width="1"/>
    <use href="#clanker" transform="translate(1062,112) scale(0.85)"/>
    <!-- Dailbert balloon -->
    <path d="M888,124 L884,140 L906,124 Z" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="898" cy="46" rx="66" ry="26" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text x="898" y="51" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">It's just a cold.</text>
    <!-- Clanker screen-balloon -->
    <line x1="1088" y1="70" x2="1120" y2="98" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="1012" y="18" width="164" height="52" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="1017" y="23" width="154" height="42" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="1094" y="40" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I told him to take</text>
    <text x="1094" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">all the time he needs.</text>
  </g>

  <!-- borders -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="3"/>
</svg>