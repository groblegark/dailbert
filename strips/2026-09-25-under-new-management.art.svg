<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 9 q10 -9 4 -16" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="42" x2="62" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2.2" fill="#111"/>
      <circle cx="71" cy="42" r="2.2" fill="#111"/>
      <path d="M52 60 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M52 74 l0 8 l16 0 l0 -8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 92 q26 -16 52 0 l4 62 l-60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 82 l-6 8 l6 26 l6 -26 z" fill="#111"/>
      <path d="M52 82 l8 8 l8 -8" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 170">
      <circle cx="60" cy="44" r="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 18 q6 -7 12 -2 M60 12 q6 -6 12 0 M78 20 q7 -5 10 2" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="3" fill="#111"/>
      <circle cx="71" cy="42" r="3" fill="#111"/>
      <path d="M44 54 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M50 78 l0 8 l20 0 l0 -8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M30 96 q30 -16 60 0 l4 60 l-68 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M84 118 q22 6 26 22" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="100" y="138" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M122 142 q9 2 0 12" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M104 138 l14 0" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <ellipse cx="60" cy="24" rx="20" ry="14" fill="#111"/>
      <ellipse cx="60" cy="44" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 40 q-3 -30 30 -34 q33 4 30 34 q-8 -16 -30 -16 q-22 0 -30 16 z" fill="#111"/>
      <rect x="40" y="40" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="64" y="40" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="56" y1="45" x2="64" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="46" r="2" fill="#111"/>
      <circle cx="72" cy="46" r="2" fill="#111"/>
      <path d="M53 62 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M52 76 l0 8 l16 0 l0 -8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M32 94 q28 -16 56 0 l4 62 l-64 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 120 l10 0 M84 120 l-10 0" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="26" y="30" width="68" height="60" rx="8" fill="#cdd3d8" stroke="#111" stroke-width="2.6"/>
      <line x1="60" y1="30" x2="60" y2="14" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="11" r="4" fill="#9aa3ab" stroke="#111" stroke-width="2"/>
      <rect x="36" y="46" width="18" height="8" rx="3" fill="#eef7ff" stroke="#111" stroke-width="2"/>
      <rect x="66" y="46" width="18" height="8" rx="3" fill="#eef7ff" stroke="#111" stroke-width="2"/>
      <rect x="40" y="68" width="40" height="12" rx="2" fill="#9aa3ab" stroke="#111" stroke-width="2"/>
      <line x1="48" y1="68" x2="48" y2="80" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="68" x2="56" y2="80" stroke="#111" stroke-width="1.6"/>
      <line x1="64" y1="68" x2="64" y2="80" stroke="#111" stroke-width="1.6"/>
      <line x1="72" y1="68" x2="72" y2="80" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- A nameplate (desk wedge) -->
    <symbol id="plate" viewBox="0 0 160 60">
      <path d="M6 46 L154 46 L150 58 L10 58 Z" fill="#d8d2c4" stroke="#111" stroke-width="2.4"/>
      <rect x="10" y="8" width="140" height="38" rx="3" fill="#efe9dc" stroke="#111" stroke-width="2.4"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#c1)">
    <!-- desk surface -->
    <rect x="1.5" y="256" width="397" height="83" fill="#eae5d9"/>
    <line x1="1.5" y1="256" x2="398.5" y2="256" stroke="#111" stroke-width="2.4"/>

    <!-- Dailbert at desk -->
    <use href="#dailbert" x="34" y="118" width="120" height="170"/>

    <!-- monitor on desk with clanker -->
    <rect x="256" y="150" width="118" height="92" rx="5" fill="#1b1b1b" stroke="#111" stroke-width="2.6"/>
    <rect x="265" y="159" width="100" height="74" rx="3" fill="#20272c"/>
    <use href="#clanker" x="281" y="158" width="68" height="68"/>
    <rect x="302" y="242" width="24" height="12" fill="#1b1b1b" stroke="#111" stroke-width="2"/>
    <rect x="290" y="254" width="48" height="6" rx="2" fill="#1b1b1b" stroke="#111" stroke-width="2"/>

    <!-- clanker balloon -->
    <line x1="304" y1="146" x2="300" y2="128" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="196" y="66" width="182" height="62" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="287" y="90" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I made everyone</text>
    <text x="287" y="110" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">fresh nameplates.</text>

    <!-- Dailbert line -->
    <rect x="116" y="150" width="98" height="30" rx="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M124 178 l-10 16 l20 -8 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M124 180 l20 0" stroke="#fff" stroke-width="2.4"/>
    <text x="165" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">You did what.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#c2)">
    <!-- desk surface -->
    <rect x="415.5" y="256" width="397" height="83" fill="#eae5d9"/>
    <line x1="415.5" y1="256" x2="812.5" y2="256" stroke="#111" stroke-width="2.4"/>

    <!-- Doug leaning in, grinning, mug -->
    <use href="#doug" x="620" y="110" width="130" height="170"/>

    <!-- Dailbert's plate, set back -->
    <use href="#plate" x="440" y="196" width="170" height="62"/>
    <text x="525" y="224" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">DAILBERT</text>
    <text x="525" y="242" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#333" font-style="italic">"it's not a bug"</text>

    <!-- Doug's plate, front and center -->
    <use href="#plate" x="470" y="266" width="190" height="70"/>
    <text x="565" y="298" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="17" fill="#111">DOUG</text>
    <text x="565" y="318" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#333" font-style="italic">"sounds good"</text>

    <!-- Doug line -->
    <rect x="620" y="40" width="128" height="34" rx="9" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M660 72 l-8 20 l24 -12 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M660 74 l16 -2" stroke="#fff" stroke-width="2.4"/>
    <text x="684" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Mine's perfect.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="c3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#c3)">
    <!-- desk surface -->
    <rect x="829.5" y="256" width="397" height="83" fill="#eae5d9"/>
    <line x1="829.5" y1="256" x2="1226.5" y2="256" stroke="#111" stroke-width="2.4"/>

    <!-- Priya, calm, looking down at her plate -->
    <use href="#priya" x="1078" y="112" width="120" height="170"/>

    <!-- Priya's plate front -->
    <use href="#plate" x="866" y="258" width="210" height="74"/>
    <text x="971" y="290" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="17" fill="#111">PRIYA</text>
    <text x="971" y="310" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#333" font-style="italic">"I'll take it from here"</text>

    <!-- monitor with clanker -->
    <rect x="852" y="122" width="96" height="74" rx="5" fill="#1b1b1b" stroke="#111" stroke-width="2.4"/>
    <rect x="860" y="130" width="80" height="58" rx="3" fill="#20272c"/>
    <use href="#clanker" x="870" y="128" width="60" height="60"/>
    <rect x="888" y="196" width="20" height="10" fill="#1b1b1b" stroke="#111" stroke-width="1.8"/>
    <rect x="878" y="206" width="40" height="5" rx="2" fill="#1b1b1b" stroke="#111" stroke-width="1.8"/>

    <!-- clanker balloon -->
    <line x1="912" y1="118" x2="905" y2="128" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="878" y="40" width="200" height="66" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="978" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Yours was the one</text>
    <text x="978" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I was surest of.</text>

    <!-- Priya dry reply -->
    <rect x="1044" y="156" width="86" height="30" rx="8" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M1120 184 l14 14 l-22 -6 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M1112 186 l16 0" stroke="#fff" stroke-width="2.4"/>
    <text x="1087" y="176" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Checks out.</text>
  </g>
</svg>