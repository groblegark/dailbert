      <rect x="36" y="20" width="210" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="141" y="45" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Total outage.</text>
      <text x="141" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">The Clanker's gone!</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="2" y="278" width="396" height="60" fill="#ece8df"/>
      <line x1="2" y1="278" x2="398" y2="278" stroke="#111" stroke-width="2.5"/>

