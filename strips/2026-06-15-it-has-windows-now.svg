    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="2" y="248" width="396" height="90" fill="#ece8df"/>
      <line x1="2" y1="248" x2="398" y2="248" stroke="#111" stroke-width="2.5"/>

      <use href="#dailbert" x="40" y="92" width="120" height="176"/>
      <use href="#doug" x="210" y="98" width="114" height="167"/>

      <!-- dead monitor on desk (clanker's empty surface) -->
      <rect x="188" y="232" width="26" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="201" cy="247" rx="26" ry="5" fill="#ece8df" stroke="#111" stroke-width="2.5"/>
      <rect x="146" y="158" width="108" height="80" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
