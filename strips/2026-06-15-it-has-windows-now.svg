      <rect x="206" y="14" width="186" height="58" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="211" y="19" width="176" height="48" fill="none" stroke="#111" stroke-width="1"/>
      <text x="299" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">I don't need servers.</text>
      <text x="299" y="57" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">I have windows now.</text>
