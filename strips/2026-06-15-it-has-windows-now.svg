      <path d="M92,66 L86,118 L114,68 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="16" y="16" width="152" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="92" y="39" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Is the outage</text>
      <text x="92" y="59" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">fixed yet?!</text>

