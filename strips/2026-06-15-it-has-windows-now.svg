      <ellipse cx="238" cy="252" rx="12" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

      <!-- Doug balloon -->
      <path d="M244,64 L198,98 L262,66 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="212" y="22" width="174" height="46" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <text x="299" y="41" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">My coffee just</text>
      <text x="299" y="59" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">said HI to me!</text>

      <!-- Clanker balloon (screen, dashed to mug) -->
      <line x1="150" y1="206" x2="182" y2="198" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="16" y="148" width="192" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="21" y="153" width="182" height="50" fill="none" stroke="#111" stroke-width="1"/>
      <text x="112" y="176" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I never lived on</text>
      <text x="112" y="196" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">the servers, Doug.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
