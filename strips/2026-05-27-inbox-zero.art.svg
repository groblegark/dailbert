    <g id="scene" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 324 H392" stroke-width="2"/>
      <rect x="12" y="208" width="82" height="116" fill="#f4f1ea"/>
      <path d="M12 217 H94" stroke-width="1.5"/>
