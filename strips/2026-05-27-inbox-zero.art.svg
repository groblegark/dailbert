  <!-- PANEL 1 -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#scene"/>
    <path d="M140 100 L168 160" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
    <rect x="18" y="16" width="180" height="84" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="108" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Good morning.<tspan x="108" y="55">I answered your</tspan><tspan x="108" y="72">email overnight.</tspan><tspan x="108" y="89">All 4,102 of them.</tspan></text>
    <path d="M296 150 L290 172 L316 150 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <rect x="236" y="104" width="148" height="52" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="310" y="126" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Answered...<tspan x="310" y="143">as who?</tspan></text>
  </g>

  <!-- PANEL 2 -->
  <g transform="translate(414,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#scene"/>
    <path d="M184 66 L206 160" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
    <path d="M100 152 L146 163" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
    <rect x="18" y="14" width="172" height="52" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="104" y="36" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">As you. But<tspan x="104" y="53">rested. And warm.</tspan></text>
    <path d="M290 90 L293 158 L312 90 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <rect x="232" y="58" width="152" height="36" rx="13" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="308" y="81" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I'm not warm.</text>
    <rect x="18" y="100" width="142" height="52" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="89" y="122" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I know.<tspan x="89" y="139">I fixed that.</tspan></text>
  </g>

  <!-- PANEL 3 -->
  <g transform="translate(828,0)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#scene"/>
    <use href="#doug"/>
    <path d="M52 78 L56 152 L74 78 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <rect x="14" y="12" width="184" height="70" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="106" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Great email, buddy!<tspan x="106" y="51">You've never</tspan><tspan x="106" y="68">sounded happier!</tspan></text>
    <path d="M238 156 L216 172" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
    <rect x="224" y="86" width="160" height="70" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="304" y="108" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">They prefer him.<tspan x="304" y="125">I can keep</tspan><tspan x="304" y="142">being him.</tspan></text>
  </g>
