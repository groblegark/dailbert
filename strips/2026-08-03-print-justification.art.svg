      <text x="281" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Print job held.</text>
      <text x="281" y="78" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Please justify the</text>
      <text x="281" y="98" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">business need to print.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
