      <path d="M934 106 L924 128 L952 108 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1009" y="56" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">The screen was extra.</text>
      <text x="1009" y="75" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Facilities glued it on.</text>
      <text x="1009" y="94" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Now it's just a printer.</text>
