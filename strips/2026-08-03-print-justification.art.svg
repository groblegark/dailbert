      <rect x="452" y="30" width="200" height="56" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M512 84 L504 108 L528 86 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="552" y="53" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I said "I need to print."</text>
      <text x="552" y="72" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">It said that's a want.</text>
      <rect x="628" y="98" width="176" height="54" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M742 150 L756 170 L760 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="716" y="121" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">Say it's for</text>
      <text x="716" y="140" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">the audit.</text>
    </g>
  </g>

