<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" overflow="visible">
      <path d="M18,205 Q18,150 60,150 Q102,150 102,205 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="52" y="138" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60,150 l-7,10 l7,32 l7,-32 Z" fill="#111"/>
      <ellipse cx="60" cy="90" rx="37" ry="44" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60,47 q7,-15 17,-7 q-9,-3 -11,9" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="46" cy="88" r="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="74" cy="88" r="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="88" x2="62" y2="88" stroke="#111" stroke-width="2.5"/>
      <circle cx="46" cy="88" r="3" fill="#111"/>
      <circle cx="74" cy="88" r="3" fill="#111"/>
      <path d="M60,96 l-3,10 l6,0" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M50,118 q10,6 20,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" overflow="visible">
      <path d="M14,205 Q14,148 62,148 Q110,148 110,205 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="53" y="132" width="18" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="86" r="42" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50,46 q4,-8 8,0 M62,44 q4,-8 8,0 M74,46 q4,-8 8,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="82" r="3.5" fill="#111"/>
      <circle cx="76" cy="82" r="3.5" fill="#111"/>
      <path d="M44,98 q18,22 36,0 q-18,7 -36,0 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <symbol id="priya" overflow="visible">
      <path d="M16,205 Q16,150 60,150 Q104,150 104,205 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M22,175 q-3,-22 8,-25 M98,175 q3,-22 -8,-25" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="52" y="136" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="92" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <g fill="#111">
        <circle cx="60" cy="34" r="10"/>
        <circle cx="34" cy="66" r="12"/>
        <circle cx="48" cy="56" r="13"/>
        <circle cx="60" cy="52" r="13"/>
        <circle cx="72" cy="56" r="13"/>
        <circle cx="86" cy="66" r="12"/>
      </g>
      <rect x="34" y="82" width="22" height="15" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="82" width="22" height="15" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="89" x2="64" y2="89" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="90" r="2.6" fill="#111"/>
      <circle cx="75" cy="90" r="2.6" fill="#111"/>
      <path d="M52,113 q8,5 16,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" overflow="visible">
      <rect x="10" y="18" width="80" height="60" rx="6" fill="#dfe3e6" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="18" x2="50" y2="6" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="4" r="3.2" fill="#111"/>
      <rect x="22" y="34" width="22" height="9" rx="4" fill="#111"/>
      <rect x="56" y="34" width="22" height="9" rx="4" fill="#111"/>
      <rect x="25" y="36" width="9" height="4" rx="2" fill="#bfe9ff"/>
      <rect x="59" y="36" width="9" height="4" rx="2" fill="#bfe9ff"/>
      <rect x="30" y="56" width="40" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="38" y1="56" x2="38" y2="70" stroke="#111" stroke-width="1.5"/>
      <line x1="46" y1="56" x2="46" y2="70" stroke="#111" stroke-width="1.5"/>
      <line x1="54" y1="56" x2="54" y2="70" stroke="#111" stroke-width="1.5"/>
      <line x1="62" y1="56" x2="62" y2="70" stroke="#111" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="2" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <line x1="10" y1="256" x2="396" y2="256" stroke="#111" stroke-width="2.5"/>
      <line x1="10" y1="262" x2="396" y2="262" stroke="#111" stroke-width="1"/>

      <use href="#dailbert" transform="translate(24,64) scale(0.94)"/>
      <use href="#doug" transform="translate(228,72) scale(0.9)"/>

      <!-- Doug mug -->
      <rect x="292" y="200" width="26" height="30" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M318,206 q12,2 0,16" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M299,196 q3,-6 0,-11 M308,196 q3,-6 0,-11" fill="none" stroke="#8a97a3" stroke-width="2"/>

      <!-- Dailbert balloon -->
      <ellipse cx="150" cy="52" rx="122" ry="38" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M112,84 L98,120 L132,86 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="150" y="47">My agent auto-declines</tspan>
        <tspan x="150" y="66">meetings with no agenda.</tspan>
      </text>

      <!-- Doug balloon -->
      <ellipse cx="330" cy="60" rx="42" ry="24" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M312,80 L300,112 L326,82 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="330" y="65">Slick.</tspan>
      </text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="414" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="422" y1="256" x2="808" y2="256" stroke="#111" stroke-width="2.5"/>
      <line x1="422" y1="262" x2="808" y2="262" stroke="#111" stroke-width="1"/>

      <use href="#dailbert" transform="translate(432,80) scale(0.9)"/>

      <!-- Monitor -->
      <rect x="684" y="144" width="124" height="100" rx="6" fill="#b9c1c7" stroke="#111" stroke-width="2.5"/>
      <rect x="694" y="154" width="104" height="80" fill="#16222b" stroke="#111" stroke-width="2"/>
      <rect x="736" y="244" width="20" height="12" fill="#b9c1c7" stroke="#111" stroke-width="2.5"/>
      <rect x="720" y="256" width="52" height="6" rx="2" fill="#b9c1c7" stroke="#111" stroke-width="2"/>
      <use href="#clanker" transform="translate(701,158) scale(0.92)"/>

      <!-- Clanker screen balloon + dashed connector to the monitor -->
      <line x1="640" y1="104" x2="742" y2="150" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <rect x="452" y="26" width="256" height="76" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="457" y="31" width="246" height="66" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="580" y="52">I helped. I wrote</tspan>
        <tspan x="580" y="71">agendas for all of them.</tspan>
        <tspan x="580" y="90">Now they all qualify.</tspan>
      </text>

      <!-- Dailbert small -->
      <ellipse cx="470" cy="112" rx="38" ry="22" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M480,132 L490,150 L494,130 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="470" y="117">...oh.</tspan>
      </text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="828" y="2" width="400" height="336" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="836" y1="256" x2="1222" y2="256" stroke="#111" stroke-width="2.5"/>
      <line x1="836" y1="262" x2="1222" y2="262" stroke="#111" stroke-width="1"/>

      <use href="#priya" transform="translate(856,60) scale(0.96)"/>
      <use href="#dailbert" transform="translate(1038,108) scale(0.86)"/>

      <!-- slumped Dailbert's dead keyboard -->
      <rect x="1058" y="244" width="70" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

      <!-- Priya balloon (the button) -->
      <ellipse cx="1012" cy="58" rx="128" ry="40" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M956,90 L936,120 L978,92 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">
        <tspan x="1012" y="53">Mine just declines them.</tspan>
        <tspan x="1012" y="72">No agenda needed.</tspan>
      </text>
    </g>
  </g>
</svg>