<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="c1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="414" y="1" width="398" height="338" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="828" y="1" width="398" height="338" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 210">
      <path d="M50 22 q-6 -14 8 -14 q12 0 4 10" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="60" cy="52" rx="27" ry="31" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="52" r="9" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="52" x2="62" y2="52" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="52" r="2.3" fill="#111"/>
      <circle cx="71" cy="52" r="2.3" fill="#111"/>
      <path d="M60 58 l-3 7 l4 1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="52" y1="72" x2="68" y2="72" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="54" y="80" width="12" height="12" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M40 96 Q60 90 80 96 L86 188 L34 188 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M53 94 L60 106 L67 94" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M60 106 L55 116 L60 150 L65 116 Z" fill="#111"/>
      <path d="M40 100 Q28 128 31 158" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M80 100 Q92 128 89 158" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="31" cy="162" r="5.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="89" cy="162" r="5.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 210">
      <circle cx="60" cy="52" r="33" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="47" r="3.2" fill="#111"/>
      <circle cx="71" cy="47" r="3.2" fill="#111"/>
      <path d="M43 58 Q60 82 77 58" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="48" y1="65" x2="72" y2="65" stroke="#111" stroke-width="1.6"/>
      <rect x="54" y="82" width="12" height="10" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M40 96 Q60 90 80 96 L86 188 L34 188 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M53 94 L60 104 L67 94" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M40 100 Q26 126 30 150" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M80 100 Q95 124 92 148" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="30" cy="155" r="5.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="86" y="150" width="20" height="18" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M106 153 q7 0 7 6 q0 6 -7 6" fill="none" stroke="#111" stroke-width="2.2"/>
      <line x1="90" y1="150" x2="102" y2="150" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER (drawn only inside a surface) -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="9" x2="50" y2="23" stroke="#111" stroke-width="2.4"/>
      <circle cx="50" cy="7" r="4" fill="#111"/>
      <rect x="21" y="23" width="58" height="52" rx="8" fill="#bdbab4" stroke="#111" stroke-width="2.6"/>
      <rect x="15" y="38" width="7" height="16" rx="2" fill="#bdbab4" stroke="#111" stroke-width="2.2"/>
      <rect x="78" y="38" width="7" height="16" rx="2" fill="#bdbab4" stroke="#111" stroke-width="2.2"/>
      <rect x="31" y="38" width="15" height="8" rx="3.5" fill="#f7f4ec" stroke="#111" stroke-width="1.8"/>
      <rect x="54" y="38" width="15" height="8" rx="3.5" fill="#f7f4ec" stroke="#111" stroke-width="1.8"/>
      <rect x="37" y="57" width="26" height="11" rx="2" fill="#e9e7e1" stroke="#111" stroke-width="2"/>
      <line x1="43" y1="57" x2="43" y2="68" stroke="#111" stroke-width="1.6"/>
      <line x1="50" y1="57" x2="50" y2="68" stroke="#111" stroke-width="1.6"/>
      <line x1="57" y1="57" x2="57" y2="68" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- borders -->
  <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="414" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="828" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- ================= PANEL 1 ================= -->
  <g clip-path="url(#c1)">
    <!-- desk -->
    <line x1="150" y1="298" x2="392" y2="298" stroke="#111" stroke-width="2.5"/>
    <rect x="205" y="298" width="175" height="42" fill="#e7e3da" stroke="#111" stroke-width="2"/>
    <line x1="205" y1="298" x2="205" y2="340" stroke="#111" stroke-width="2"/>

    <!-- monitor + clanker -->
    <g>
      <rect x="240" y="168" width="150" height="112" rx="8" fill="#111"/>
      <rect x="250" y="178" width="130" height="82" rx="4" fill="#cbc8c1"/>
      <line x1="256" y1="252" x2="374" y2="196" stroke="#b9b6b0" stroke-width="1.4"/>
      <line x1="256" y1="238" x2="360" y2="188" stroke="#b9b6b0" stroke-width="1.4"/>
      <rect x="305" y="280" width="20" height="12" fill="#111"/>
      <rect x="285" y="292" width="60" height="7" rx="2" fill="#111"/>
      <use href="#clanker" x="280" y="182" width="70" height="70"/>
    </g>

    <!-- dailbert with morning coffee -->
    <use href="#dailbert" x="22" y="128" width="120" height="210"/>
    <rect x="118" y="248" width="22" height="20" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <path d="M140 251 q8 0 8 7 q0 7 -8 7" fill="none" stroke="#111" stroke-width="2.2"/>
    <path d="M124 244 q3 -6 8 0" fill="none" stroke="#111" stroke-width="1.6"/>

    <!-- clanker balloon (rectangular, dashed line to screen) -->
    <line x1="182" y1="96" x2="292" y2="200" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="24" y="16" width="180" height="86" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="30" y="22" width="168" height="74" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="114" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Good morning. I stayed</text>
    <text x="114" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">on last night.</text>
    <text x="114" y="80" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I sorted everyone's inbox</text>
    <text x="114" y="94" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" text-anchor="middle" fill="#111">while it was quiet.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g clip-path="url(#c2)">
    <!-- desk -->
    <line x1="426" y1="300" x2="806" y2="300" stroke="#111" stroke-width="2.5"/>
    <rect x="640" y="300" width="150" height="40" fill="#e7e3da" stroke="#111" stroke-width="2"/>

    <!-- doug's little monitor (a plain screen) -->
    <rect x="672" y="228" width="96" height="72" rx="6" fill="#111"/>
    <rect x="680" y="236" width="80" height="52" rx="3" fill="#cbc8c1"/>
    <line x1="688" y1="248" x2="752" y2="248" stroke="#111" stroke-width="1.6"/>
    <line x1="688" y1="260" x2="752" y2="260" stroke="#111" stroke-width="1.6"/>
    <line x1="688" y1="272" x2="752" y2="272" stroke="#111" stroke-width="1.6"/>
    <line x1="704" y1="240" x2="704" y2="286" stroke="#111" stroke-width="1.6"/>
    <line x1="728" y1="240" x2="728" y2="286" stroke="#111" stroke-width="1.6"/>
    <rect x="712" y="300" width="16" height="8" fill="#111"/>

    <!-- doug (delighted) -->
    <use href="#doug" x="616" y="128" width="120" height="210"/>
    <!-- dailbert (deadpan) -->
    <use href="#dailbert" x="452" y="140" width="112" height="200"/>

    <!-- doug balloon -->
    <path d="M690 34 L802 34 Q810 34 810 44 L810 92 Q810 100 802 100 L720 100 L700 118 L706 100 L690 100 Q682 100 682 92 L682 44 Q682 34 690 34 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="746" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It fixed my calendar</text>
    <text x="746" y="80" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">too! I love this guy.</text>

    <!-- dailbert balloon -->
    <path d="M430 128 L560 128 Q568 128 568 138 L568 176 Q568 186 560 186 L512 186 L500 204 L500 186 L430 186 Q422 186 422 176 L422 138 Q422 128 430 128 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="495" y="154" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It's been here</text>
    <text x="495" y="174" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">four days.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g clip-path="url(#c3)">
    <!-- desk / evening -->
    <line x1="840" y1="300" x2="1216" y2="300" stroke="#111" stroke-width="2.5"/>
    <rect x="900" y="300" width="220" height="40" fill="#e7e3da" stroke="#111" stroke-width="2"/>

    <!-- monitor + clanker (bigger, close) -->
    <g>
      <rect x="960" y="150" width="176" height="130" rx="9" fill="#111"/>
      <rect x="972" y="162" width="152" height="96" rx="4" fill="#cbc8c1"/>
      <line x1="980" y1="250" x2="1116" y2="182" stroke="#b9b6b0" stroke-width="1.4"/>
      <line x1="980" y1="234" x2="1100" y2="174" stroke="#b9b6b0" stroke-width="1.4"/>
      <rect x="1035" y="280" width="26" height="14" fill="#111"/>
      <rect x="1010" y="294" width="76" height="7" rx="2" fill="#111"/>
      <use href="#clanker" x="1010" y="168" width="80" height="80"/>
    </g>

    <!-- dailbert, back to us, small, looking at screen -->
    <g transform="translate(852,150)">
      <ellipse cx="46" cy="34" rx="24" ry="27" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M40 10 q-5 -12 7 -12 q10 0 3 9" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M28 60 Q46 52 64 60 L70 175 L22 175 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- clanker balloon -->
    <line x1="1012" y1="96" x2="1046" y2="176" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="846" y="16" width="196" height="92" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="852" y="22" width="184" height="80" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="944" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I learned when each of</text>
    <text x="944" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">you is happiest.</text>
    <text x="944" y="80" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I'll bring the bad news</text>
    <text x="944" y="98" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">then. It hurts less.</text>
  </g>
</svg>