<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="48" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- hair curl -->
      <path d="M60 14 q10 -12 2 -14 q-2 6 -6 8" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <!-- tired mouth -->
      <path d="M50 66 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck + body -->
      <path d="M50 80 l0 10 l20 0 l0 -10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M35 96 q25 -14 50 0 l6 60 l-62 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- collar + tie -->
      <path d="M52 90 l8 8 l8 -8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 98 l-5 6 l5 26 l5 -26 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 130 170">
      <circle cx="60" cy="50" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- little hair tufts -->
      <path d="M40 22 q5 -8 10 0 M60 16 q5 -8 10 0 M78 22 q5 -8 8 2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="49" cy="46" r="3.5" fill="#111"/>
      <circle cx="71" cy="46" r="3.5" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M44 60 q16 20 32 0" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- body -->
      <path d="M34 100 q26 -16 52 0 l4 58 l-60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 88 l0 12 l20 0 l0 -12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- arm + mug -->
      <path d="M86 120 q22 4 26 22" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="104" y="138" width="22" height="20" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M126 142 q8 0 8 8 q0 8 -8 8" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M110 138 q1 -6 5 -6" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 170">
      <!-- hair bun back -->
      <ellipse cx="60" cy="46" rx="32" ry="35" fill="#111"/>
      <!-- face -->
      <ellipse cx="60" cy="50" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hairline + bun -->
      <path d="M34 40 q6 -22 26 -24 q20 2 26 24 q-8 -8 -14 -6 q4 -8 -8 -10 q-6 8 -14 6 q-10 -2 -16 10z" fill="#111"/>
      <circle cx="60" cy="14" r="9" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="44" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="44" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="50" x2="63" y2="50" stroke="#111" stroke-width="2.5"/>
      <circle cx="48.5" cy="50" r="2" fill="#111"/>
      <circle cx="71.5" cy="50" r="2" fill="#111"/>
      <!-- calm dry mouth -->
      <path d="M52 68 l16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck + body -->
      <path d="M52 78 l0 10 l16 0 l0 -10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 96 q26 -14 52 0 l4 60 l-60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- rolled sleeve lines -->
      <path d="M40 118 l-4 10 M80 118 l4 10" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE BOSS: two tall spikes, tiny eyes, suit + tie -->
    <symbol id="boss" viewBox="0 0 120 175">
      <ellipse cx="60" cy="55" rx="30" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- two tall hair spikes -->
      <path d="M42 30 q-6 -28 6 -8 M78 30 q6 -28 -6 -8" fill="#111" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 32 q4 -6 12 -3 M80 32 q-4 -6 -12 -3" fill="none" stroke="#111" stroke-width="2.5"/>
      <!-- tiny eyes -->
      <circle cx="51" cy="54" r="2.2" fill="#111"/>
      <circle cx="69" cy="54" r="2.2" fill="#111"/>
      <!-- flat mouth -->
      <path d="M52 72 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck + suit -->
      <path d="M52 85 l0 10 l16 0 l0 -10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 102 q26 -14 52 0 l6 60 l-64 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M52 96 l8 10 l8 -10" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M60 106 l-4 6 l4 22 l4 -22 z" fill="#111"/>
      <!-- lapels -->
      <path d="M52 98 l-10 30 M68 98 l10 30" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, slot eyes, grille, antenna. Only drawn inside a surface. -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <!-- antenna -->
      <line x1="60" y1="20" x2="60" y2="8" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="6" r="3.5" fill="#111"/>
      <!-- head box -->
      <rect x="30" y="20" width="60" height="56" rx="7" fill="#cfcfcf" stroke="#111" stroke-width="2.5"/>
      <!-- glowing slot eyes -->
      <rect x="40" y="36" width="14" height="7" rx="3.5" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="66" y="36" width="14" height="7" rx="3.5" fill="#fff" stroke="#111" stroke-width="2"/>
      <!-- grille mouth -->
      <rect x="42" y="54" width="36" height="12" rx="2" fill="#e9e9e9" stroke="#111" stroke-width="2"/>
      <line x1="49" y1="54" x2="49" y2="66" stroke="#111" stroke-width="1.5"/>
      <line x1="56" y1="54" x2="56" y2="66" stroke="#111" stroke-width="1.5"/>
      <line x1="63" y1="54" x2="63" y2="66" stroke="#111" stroke-width="1.5"/>
      <line x1="70" y1="54" x2="70" y2="66" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- hatch pattern for screen glow -->
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- floor line -->
      <line x1="1" y1="300" x2="401" y2="300" stroke="#111" stroke-width="1.5"/>

      <!-- Boss at front, presenting -->
      <use href="#boss" x="40" y="150" width="120" height="175"/>

      <!-- projector screen on wall with clanker inside -->
      <rect x="220" y="40" width="150" height="110" rx="4" fill="#e6e6e6" stroke="#111" stroke-width="2.5"/>
      <rect x="220" y="40" width="150" height="110" rx="4" fill="url(#hatch)" opacity="0.15"/>
      <use href="#clanker" x="255" y="52" width="80" height="80"/>
      <!-- screen stand -->
      <line x1="295" y1="150" x2="295" y2="175" stroke="#111" stroke-width="2.5"/>

      <!-- Boss speech -->
      <path d="M120 70 q0 -30 40 -30 l70 0 q30 0 30 26 q0 26 -30 26 l-55 0 l-18 16 l2 -18 q-11 -6 -11 -20z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="200" y="58" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="200" dy="0">New policy: to file</tspan>
        <tspan x="200" dy="16">a form, first file the</tspan>
        <tspan x="200" dy="16">Approval-to-File form.</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="414" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="414" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="300" x2="814" y2="300" stroke="#111" stroke-width="1.5"/>

      <!-- Dailbert at his desk with monitor -->
      <use href="#dailbert" x="440" y="150" width="120" height="170"/>

      <!-- monitor with clanker inside -->
      <rect x="640" y="150" width="150" height="105" rx="5" fill="#111"/>
      <rect x="648" y="158" width="134" height="89" rx="3" fill="#2b2b2b"/>
      <rect x="648" y="158" width="134" height="89" rx="3" fill="url(#hatch)" opacity="0.2"/>
      <use href="#clanker" x="678" y="164" width="76" height="76"/>
      <rect x="700" y="255" width="30" height="16" fill="#111"/>
      <rect x="672" y="271" width="86" height="8" rx="2" fill="#111"/>

      <!-- Dailbert speech -->
      <path d="M470 66 q0 -26 34 -26 l40 0 q28 0 28 24 q0 24 -28 24 l-30 0 l-16 15 l2 -16 q-30 -3 -30 -21z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="522" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="522" dy="0">Where's the</tspan>
        <tspan x="522" dy="16">Approval-to-File</tspan>
        <tspan x="522" dy="16">form?</tspan>
      </text>

      <!-- Clanker rectangular screen balloon + dashed line to monitor -->
      <path d="M556 168 L640 190" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="540" y="196" width="240" height="82" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="660" y="220" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="660" dy="0">It requires approval.</tspan>
        <tspan x="660" dy="17">I scheduled a recurring</tspan>
        <tspan x="660" dy="17">meeting to approve it.</tspan>
        <tspan x="660" dy="17">Daily. Called "Chips."</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="1.5"/>

      <!-- Priya at the same monitor, one hand up, deleting -->
      <use href="#priya" x="1055" y="150" width="120" height="170"/>

      <!-- monitor with clanker inside -->
      <rect x="880" y="150" width="150" height="105" rx="5" fill="#111"/>
      <rect x="888" y="158" width="134" height="89" rx="3" fill="#2b2b2b"/>
      <rect x="888" y="158" width="134" height="89" rx="3" fill="url(#hatch)" opacity="0.2"/>
      <use href="#clanker" x="918" y="164" width="76" height="76"/>
      <rect x="940" y="255" width="30" height="16" fill="#111"/>
      <rect x="912" y="271" width="86" height="8" rx="2" fill="#111"/>

      <!-- Priya's arm reaching to the screen (declining the meeting) -->
      <path d="M1075 230 q-30 -8 -55 -30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Priya speech -->
      <path d="M1060 60 q0 -24 30 -24 l70 0 q28 0 28 22 q0 22 -28 22 l-52 0 l-16 15 l2 -16 q-34 -3 -34 -19z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1128" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="1128" dy="0">Declining. Recurring.</tspan>
        <tspan x="1128" dy="16">On behalf of everyone.</tspan>
      </text>

      <!-- Clanker reply balloon -->
      <path d="M994 196 L1010 214" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="856" y="214" width="200" height="60" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="956" y="238" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="956" dy="0">Approved. Filing that</tspan>
        <tspan x="956" dy="17">as the day's Chips.</tspan>
      </text>
    </g>
  </g>
</svg>