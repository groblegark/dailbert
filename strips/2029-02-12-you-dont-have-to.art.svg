<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <style>
      .t{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;fill:#111;text-anchor:middle;}
      .sl{font-family:'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif;fill:#111;text-anchor:middle;}
    </style>

    <symbol id="dailbert" viewBox="0 0 120 180">
      <path d="M28 180 V150 Q28 128 60 128 Q92 128 92 150 V180" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M49 132 L60 145 L71 132" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 145 L55 152 L60 172 L65 152 Z" fill="#111"/>
      <rect x="53" y="117" width="14" height="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="78" rx="33" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M55 40 Q60 28 67 35 Q73 42 63 45" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="76" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="74" cy="76" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="59" y1="76" x2="63" y2="76" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="76" r="2.3" fill="#111"/>
      <circle cx="74" cy="76" r="2.3" fill="#111"/>
      <line x1="51" y1="101" x2="69" y2="101" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 140 180">
      <path d="M26 180 V150 Q26 128 62 128 Q98 128 98 150 V180" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M48 132 L62 146 L76 132" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="54" y="117" width="16" height="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="78" r="41" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 42 Q57 30 63 40 Q69 30 76 42" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="72" r="3.2" fill="#111"/>
      <circle cx="75" cy="72" r="3.2" fill="#111"/>
      <path d="M44 90 Q62 114 80 90" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M90 150 Q108 150 112 166" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="98" y="150" width="28" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M126 156 q9 2 9 9 q0 7 -9 9" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M104 154 v18" stroke="#111" stroke-width="1.4" opacity="0.5"/>
      <path d="M108 146 q-3 -5 1 -9 M116 146 q-3 -5 1 -9" fill="none" stroke="#111" stroke-width="1.4" opacity="0.6"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="4" x2="60" y2="20" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="3.5" fill="#111"/>
      <rect x="16" y="20" width="88" height="78" rx="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="24" cy="59" r="2" fill="#111"/>
      <circle cx="96" cy="59" r="2" fill="#111"/>
      <rect x="30" y="40" width="26" height="11" rx="3" fill="#111"/>
      <rect x="64" y="40" width="26" height="11" rx="3" fill="#111"/>
      <line x1="30" y1="34" x2="34" y2="37" stroke="#111" stroke-width="1.5"/>
      <line x1="43" y1="32" x2="43" y2="36" stroke="#111" stroke-width="1.5"/>
      <line x1="56" y1="34" x2="52" y2="37" stroke="#111" stroke-width="1.5"/>
      <line x1="64" y1="34" x2="68" y2="37" stroke="#111" stroke-width="1.5"/>
      <line x1="77" y1="32" x2="77" y2="36" stroke="#111" stroke-width="1.5"/>
      <line x1="90" y1="34" x2="86" y2="37" stroke="#111" stroke-width="1.5"/>
      <rect x="34" y="66" width="52" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="44" y1="66" x2="44" y2="86" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="66" x2="54" y2="86" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="66" x2="64" y2="86" stroke="#111" stroke-width="2"/>
      <line x1="74" y1="66" x2="74" y2="86" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <use href="#dailbert" x="18" y="150" width="120" height="180"/>

    <!-- desk band (front) -->
    <rect x="4" y="302" width="392" height="36" fill="#f4f1ea"/>
    <line x1="4" y1="302" x2="396" y2="302" stroke="#111" stroke-width="2.5"/>

    <!-- monitor -->
    <rect x="298" y="270" width="14" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M284 300 L326 300 L318 288 L292 288 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="240" y="175" width="130" height="95" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="246" y="181" width="118" height="83" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
    <use href="#clanker" x="270" y="184" width="82" height="75"/>
    <g stroke="#111" stroke-width="1" opacity="0.16">
      <line x1="247" y1="192" x2="363" y2="192"/>
      <line x1="247" y1="202" x2="363" y2="202"/>
      <line x1="247" y1="212" x2="363" y2="212"/>
      <line x1="247" y1="222" x2="363" y2="222"/>
      <line x1="247" y1="232" x2="363" y2="232"/>
      <line x1="247" y1="242" x2="363" y2="242"/>
      <line x1="247" y1="252" x2="363" y2="252"/>
    </g>
    <text class="sl" x="305" y="258" font-size="12" opacity="0.85">today</text>

    <!-- clanker connector (dashed, to monitor) -->
    <line x1="301" y1="112" x2="305" y2="175" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>

    <!-- dailbert speech -->
    <path d="M80 92 L102 92 L84 150 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="16" y="18" width="182" height="78" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text class="t" x="107" y="44" font-size="14">The Today tile dropped</text>
    <text class="t" x="107" y="63" font-size="14">the date this month.</text>
    <text class="t" x="107" y="82" font-size="14">Just says 'today' now.</text>

    <!-- clanker screen balloon -->
    <rect x="208" y="14" width="184" height="98" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="213" y="19" width="174" height="88" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <text class="t" x="300" y="40" font-size="14">It kept agreeing with</text>
    <text class="t" x="300" y="58" font-size="14">the calendar. The date</text>
    <text class="t" x="300" y="76" font-size="14">started to feel like</text>
    <text class="t" x="300" y="94" font-size="14">a formality.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- doorway (back) -->
    <rect x="150" y="128" width="78" height="174" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="163" y1="128" x2="163" y2="302" stroke="#111" stroke-width="1.5" opacity="0.5"/>
    <!-- badge reader + beep -->
    <rect x="231" y="196" width="12" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <circle cx="237" cy="204" r="2" fill="#111"/>
    <path d="M249 200 q6 8 0 16 M256 195 q9 13 0 26" fill="none" stroke="#111" stroke-width="1.6" opacity="0.7"/>

    <use href="#dailbert" x="24" y="150" width="120" height="180"/>
    <use href="#doug" x="248" y="150" width="140" height="180"/>

    <!-- floor -->
    <line x1="4" y1="304" x2="396" y2="304" stroke="#111" stroke-width="2.5"/>

    <!-- dailbert speech (left) -->
    <path d="M92 90 L112 90 L96 150 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="14" y="18" width="178" height="76" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text class="t" x="103" y="43" font-size="14">Ambient access.</text>
    <text class="t" x="103" y="61" font-size="14">Facilities called it</text>
    <text class="t" x="103" y="79" font-size="14">a rolling schedule.</text>

    <!-- doug speech 1 (top right) -->
    <path d="M304 86 L326 86 L312 148 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="204" y="15" width="184" height="74" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text class="t" x="296" y="40" font-size="14">Door was already open.</text>
    <text class="t" x="296" y="58" font-size="14">I badged it anyway.</text>
    <text class="t" x="296" y="76" font-size="14">Keeps the habit up.</text>

    <!-- doug speech 2 (lower right) -->
    <path d="M300 148 L318 142 L308 190 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="214" y="108" width="150" height="40" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text class="t" x="289" y="133" font-size="14">I like the beep.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <use href="#dailbert" x="252" y="150" width="120" height="180"/>

    <!-- desk band (front) -->
    <rect x="4" y="302" width="392" height="36" fill="#f4f1ea"/>
    <line x1="4" y1="302" x2="396" y2="302" stroke="#111" stroke-width="2.5"/>

    <!-- monitor (left) -->
    <rect x="93" y="270" width="14" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M79 300 L121 300 L113 288 L87 288 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="30" y="170" width="140" height="100" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="36" y="176" width="128" height="88" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
    <use href="#clanker" x="58" y="179" width="82" height="75"/>
    <g stroke="#111" stroke-width="1" opacity="0.16">
      <line x1="37" y1="187" x2="163" y2="187"/>
      <line x1="37" y1="197" x2="163" y2="197"/>
      <line x1="37" y1="207" x2="163" y2="207"/>
      <line x1="37" y1="217" x2="163" y2="217"/>
      <line x1="37" y1="227" x2="163" y2="227"/>
      <line x1="37" y1="237" x2="163" y2="237"/>
      <line x1="37" y1="247" x2="163" y2="247"/>
    </g>
    <text class="sl" x="100" y="259" font-size="11" opacity="0.85">Q1: done / doing / you</text>

    <!-- clanker connector (dashed, to monitor) -->
    <line x1="100" y1="112" x2="100" y2="170" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>

    <!-- clanker screen balloon (left) -->
    <rect x="12" y="14" width="182" height="98" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="17" y="19" width="172" height="88" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <text class="t" x="103" y="40" font-size="14">I left you the parts</text>
    <text class="t" x="103" y="58" font-size="14">you'd have missed.</text>
    <text class="t" x="103" y="76" font-size="14">Drift in when you</text>
    <text class="t" x="103" y="94" font-size="14">feel like it.</text>

    <!-- dailbert speech (right) -->
    <path d="M300 96 L322 96 L306 150 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="208" y="20" width="184" height="78" rx="13" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <text class="t" x="300" y="46" font-size="14">Q1 plan's in the folder.</text>
    <text class="t" x="300" y="65" font-size="14">My whole column says</text>
    <text class="t" x="300" y="84" font-size="14">'you don't have to.'</text>
  </g>
</svg>