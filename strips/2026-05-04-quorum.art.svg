<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <g id="dailbert">
      <path d="M-34 60 Q0 34 34 60 L34 80 -34 80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 40 l-6 8 6 26 6-26 z" fill="#111"/>
      <path d="M-9 38 L0 48 9 38" fill="none" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="0" cy="6" rx="24" ry="28" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-2 -21 q-9 -10 2 -14 q9 -1 4 9" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-10" cy="4" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="10" cy="4" r="8" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="-2" y1="4" x2="2" y2="4" stroke="#111" stroke-width="2.5"/>
      <circle cx="-10" cy="4" r="2" fill="#111"/>
      <circle cx="10" cy="4" r="2" fill="#111"/>
      <path d="M-6 22 q6 4 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- DOUG -->
    <g id="doug">
      <path d="M-36 60 Q0 32 36 60 L36 80 -36 80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="8" r="26" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-16 -12 q16 -10 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-9" cy="4" r="2.6" fill="#111"/>
      <circle cx="9" cy="4" r="2.6" fill="#111"/>
      <path d="M-13 14 q13 15 26 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- PRIYA -->
    <g id="priya">
      <path d="M-34 60 Q0 34 34 60 L34 82 -34 82 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M-10 40 L0 54 10 40" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M28 44 l6 8 M-28 44 l-6 8" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="0" cy="8" rx="23" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-23 6 C-27 -22 -6 -31 0 -31 C6 -31 27 -22 23 6 C17 -13 6 -17 0 -17 C-6 -17 -17 -13 -23 6 Z" fill="#111"/>
      <circle cx="0" cy="-31" r="8" fill="#111"/>
      <circle cx="-15" cy="-6" r="4" fill="#111"/>
      <circle cx="15" cy="-6" r="4" fill="#111"/>
      <rect x="-19" y="2" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="4" y="2" width="15" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="-4" y1="7" x2="4" y2="7" stroke="#111" stroke-width="2.2"/>
      <circle cx="-11.5" cy="7.5" r="2" fill="#111"/>
      <circle cx="11.5" cy="7.5" r="2" fill="#111"/>
      <path d="M-7 24 q7 3 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- BOSS -->
    <g id="boss">
      <path d="M-34 60 Q0 34 34 60 L34 82 -34 82 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 42 l-5 7 5 30 5-30 z" fill="#111"/>
      <path d="M-9 40 L0 50 9 40" fill="none" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="0" cy="8" rx="22" ry="25" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-12 -14 L-21 -46 L-3 -17 Z" fill="#111" stroke-linejoin="round"/>
      <path d="M12 -14 L21 -46 L3 -17 Z" fill="#111" stroke-linejoin="round"/>
      <circle cx="-8" cy="6" r="1.9" fill="#111"/>
      <circle cx="8" cy="6" r="1.9" fill="#111"/>
      <path d="M-6 20 q6 3 12 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- CLANKER (drawn inside a surface only) -->
    <g id="clanker">
      <line x1="0" y1="-34" x2="0" y2="-24" stroke="#c9c9c9" stroke-width="2.5"/>
      <circle cx="0" cy="-37" r="3" fill="#c9c9c9"/>
      <rect x="-26" y="-24" width="52" height="46" rx="6" fill="#3a3d40" stroke="#d6d6d6" stroke-width="2.5"/>
      <rect x="-18" y="-12" width="14" height="7" rx="3" fill="#e6eef2"/>
      <rect x="4" y="-12" width="14" height="7" rx="3" fill="#e6eef2"/>
      <rect x="-16" y="4" width="32" height="13" rx="2" fill="#222" stroke="#d6d6d6" stroke-width="1.4"/>
      <line x1="-9" y1="4" x2="-9" y2="17" stroke="#d6d6d6" stroke-width="1.3"/>
      <line x1="-2" y1="4" x2="-2" y2="17" stroke="#d6d6d6" stroke-width="1.3"/>
      <line x1="5" y1="4" x2="5" y2="17" stroke="#d6d6d6" stroke-width="1.3"/>
      <line x1="12" y1="4" x2="12" y2="17" stroke="#d6d6d6" stroke-width="1.3"/>
    </g>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- whiteboard -->
    <rect x="28" y="42" width="150" height="100" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="103" y="88" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="16" fill="#111">APPROVAL</text>
    <text x="103" y="112" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="16" fill="#111">COMMITTEE</text>
    <path d="M40 122 q60 8 126 0" fill="none" stroke="#111" stroke-width="2"/>
    <!-- boss -->
    <g transform="translate(232,150)">
      <use href="#boss"/>
      <path d="M-20 44 Q-70 20 -92 -6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-94" cy="-8" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    </g>
    <!-- audience (foreground, backs of heads) -->
    <path d="M40 338 Q40 300 78 300 Q116 300 116 338 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <circle cx="78" cy="300" r="20" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M118 338 Q118 302 154 302 Q190 302 190 338 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <circle cx="154" cy="302" r="19" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- balloon -->
    <path d="M198 16 h180 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-118 l-16 18 l2 -18 h-48 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="298" y="40" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Nothing ships without</text>
    <text x="298" y="58" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">committee sign-off.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- mounted wall screen -->
    <line x1="520" y1="30" x2="520" y2="44" stroke="#111" stroke-width="2.5"/>
    <rect x="446" y="44" width="150" height="106" rx="5" fill="#2c2f31" stroke="#111" stroke-width="3"/>
    <line x1="454" y1="52" x2="470" y2="52" stroke="#4c4f51" stroke-width="1.5"/>
    <line x1="454" y1="60" x2="466" y2="60" stroke="#4c4f51" stroke-width="1.5"/>
    <g transform="translate(521,98)">
      <use href="#clanker"/>
    </g>
    <!-- doug with mug -->
    <g transform="translate(722,182)">
      <use href="#doug"/>
      <path d="M18 52 q22 6 30 -6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <rect x="748" y="196" width="22" height="24" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M770 200 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.5"/>
    <path d="M754 190 q-3 -6 2 -10 M762 190 q-3 -6 2 -10" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    <!-- dashed leader from clanker balloon to screen -->
    <path d="M544 172 L528 150" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <!-- clanker balloon (screen-edged rectangle) -->
    <rect x="450" y="172" width="212" height="56" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="556" y="196" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">To be helpful, I took</text>
    <text x="556" y="216" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">all seven seats.</text>
    <!-- doug balloon -->
    <path d="M648 98 h116 a10 10 0 0 1 10 10 v22 a10 10 0 0 1 -10 10 h-30 l-14 16 l0 -16 h-72 a10 10 0 0 1 -10 -10 v-22 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="706" y="126" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Efficient.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- figures -->
    <g transform="translate(948,178)">
      <use href="#priya"/>
    </g>
    <g transform="translate(1132,194)">
      <use href="#dailbert"/>
    </g>
    <!-- desk over lower bodies -->
    <rect x="831" y="252" width="394" height="86" fill="#f4f1ea"/>
    <line x1="833" y1="252" x2="1225" y2="252" stroke="#111" stroke-width="2.5"/>
    <!-- laptop -->
    <rect x="1002" y="212" width="66" height="40" rx="2" fill="#2c2f31" stroke="#111" stroke-width="2.5"/>
    <path d="M994 252 h82 l6 12 h-94 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1035" y="230" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="11" fill="#e6eef2">DEPLOY</text>
    <text x="1035" y="244" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12" fill="#e6eef2">&#10003; live</text>
    <!-- priya balloon -->
    <path d="M856 28 h164 a10 10 0 0 1 10 10 v26 a10 10 0 0 1 -10 10 h-58 l-14 18 l-2 -18 h-90 a10 10 0 0 1 -10 -10 v-26 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="948" y="56" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Then it's unanimous.</text>
    <!-- dailbert balloon -->
    <path d="M1058 40 h146 a10 10 0 0 1 10 10 v44 a10 10 0 0 1 -10 10 h-52 l-16 16 l0 -16 h-78 a10 10 0 0 1 -10 -10 v-44 a10 10 0 0 1 10 -10 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1131" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Seven yeses.</text>
    <text x="1131" y="86" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">One robot.</text>
  </g>
</svg>