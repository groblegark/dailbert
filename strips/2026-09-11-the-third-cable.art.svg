<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 10 q10 -12 3 -18 q10 4 4 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="46" x2="64" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="46" r="1.7" fill="#111"/>
      <circle cx="72" cy="46" r="1.7" fill="#111"/>
      <path d="M50 64 q10 7 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 82 q20 14 40 0 l10 60 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M60 82 l-7 10 l7 8 l7 -8 Z" fill="#111"/>
      <path d="M58 100 l-3 34 l8 0 l-3 -34 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="44" r="2.6" fill="#111"/>
      <circle cx="72" cy="44" r="2.6" fill="#111"/>
      <path d="M44 58 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 84 q22 12 44 0 l8 58 q-30 12 -60 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="74" y="112" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M100 116 q10 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M80 108 q7 -6 14 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <ellipse cx="60" cy="48" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 44 q-4 -30 30 -34 q34 4 30 34 q-6 -14 -30 -14 q-24 0 -30 14 Z" fill="#111"/>
      <path d="M34 36 q4 -8 12 -10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 6 q8 -3 16 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="40" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="42" width="16" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="48" x2="64" y2="48" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="48" r="1.7" fill="#111"/>
      <circle cx="72" cy="48" r="1.7" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l8 58 q-28 12 -56 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M46 108 l-2 20 M74 108 l2 20" fill="none" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: boxy chrome head, slot-eyes, grille, antenna. Dim reflection only. -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="10" x2="60" y2="24" stroke="#8f9296" stroke-width="2.2"/>
      <circle cx="60" cy="10" r="3" fill="#8f9296"/>
      <rect x="28" y="24" width="64" height="56" rx="8" fill="none" stroke="#8f9296" stroke-width="2.4"/>
      <rect x="37" y="40" width="18" height="8" rx="3" fill="#8f9296"/>
      <rect x="65" y="40" width="18" height="8" rx="3" fill="#8f9296"/>
      <g stroke="#8f9296" stroke-width="1.8">
        <line x1="40" y1="62" x2="80" y2="62"/>
        <line x1="46" y1="58" x2="46" y2="70"/>
        <line x1="60" y1="58" x2="60" y2="70"/>
        <line x1="74" y1="58" x2="74" y2="70"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 : the fight ============ -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <!-- conference-room wall TV, dead: NO SIGNAL -->
      <rect x="196" y="30" width="188" height="112" rx="4" fill="#111" stroke="#111" stroke-width="3"/>
      <rect x="205" y="39" width="170" height="94" rx="2" fill="#1b1e22"/>
      <text x="290" y="90" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#5a5f64">NO SIGNAL</text>
      <line x1="290" y1="142" x2="290" y2="150" stroke="#111" stroke-width="3"/>
      <rect x="260" y="150" width="60" height="6" rx="2" fill="#111"/>

      <!-- Dailbert kneeling at the wall, holding a cable up to the TV -->
      <use href="#dailbert" x="212" y="150" width="120" height="200"/>

      <!-- a small heap of two rejected cables on the floor -->
      <path d="M120 322 q30 -22 60 -6" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M130 330 q34 -16 58 4" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>

      <!-- the third cable, from Dailbert's hand up toward the TV port -->
      <path d="M280 236 q-20 -30 8 -46 q22 -12 6 -40" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

      <!-- Doug watching from the left, mug up -->
      <use href="#doug" x="40" y="146" width="120" height="200"/>

      <!-- Dailbert balloon -->
      <path d="M212 40 h168 v56 h-70 l-10 12 l-3 -12 h-85 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="296" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="296" dy="0">Third cable.</tspan>
        <tspan x="296" dy="17">Try it now.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 : it works ============ -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <!-- TV now ON, showing a plain, mundane slide -->
      <rect x="612" y="30" width="188" height="112" rx="4" fill="#111" stroke="#111" stroke-width="3"/>
      <rect x="621" y="39" width="170" height="94" rx="2" fill="#dfe6ea"/>
      <rect x="634" y="52" width="140" height="10" rx="2" fill="#9aa6ac"/>
      <rect x="634" y="70" width="112" height="7" rx="2" fill="#bcc5ca"/>
      <rect x="634" y="84" width="126" height="7" rx="2" fill="#bcc5ca"/>
      <rect x="634" y="98" width="90" height="7" rx="2" fill="#bcc5ca"/>
      <line x1="706" y1="142" x2="706" y2="150" stroke="#111" stroke-width="3"/>
      <rect x="676" y="150" width="60" height="6" rx="2" fill="#111"/>

      <!-- Dailbert standing back, hands slightly raised: don't touch it -->
      <use href="#dailbert" x="628" y="150" width="120" height="200"/>

      <!-- Doug front-left, mug lifted a touch, delighted -->
      <use href="#doug" x="440" y="150" width="120" height="200"/>

      <!-- Doug balloon -->
      <path d="M430 150 h158 v42 h-72 l-10 12 l-3 -12 h-73 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="509" y="170" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="509" dy="0">It's showing.</tspan>
        <tspan x="509" dy="16">It's actually showing.</tspan>
      </text>

      <!-- Dailbert balloon -->
      <path d="M612 40 h176 v40 h-40 l-10 12 l-3 -12 h-123 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="700" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="700" dy="0">Don't touch it.</tspan>
        <tspan x="700" dy="16">Don't touch anything.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 3 : Friday, quietly ahead ============ -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <!-- darkening evening window, left, with a faint silent clanker reflection -->
      <rect x="846" y="26" width="118" height="290" rx="3" fill="#c6cacd" stroke="#111" stroke-width="2.6"/>
      <rect x="854" y="34" width="102" height="274" rx="2" fill="#adb2b6"/>
      <line x1="905" y1="34" x2="905" y2="308" stroke="#c6cacd" stroke-width="2"/>
      <line x1="854" y1="170" x2="956" y2="170" stroke="#c6cacd" stroke-width="2"/>
      <!-- low evening light streak -->
      <line x1="862" y1="48" x2="900" y2="86" stroke="#bcc0c4" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
      <line x1="912" y1="196" x2="948" y2="232" stroke="#bcc0c4" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
      <!-- faint clanker in the glass: dim, no balloon, says nothing -->
      <use href="#clanker" x="900" y="188" width="62" height="62" opacity="0.32"/>

      <!-- Doug and Dailbert heading out together -->
      <use href="#doug" x="984" y="150" width="120" height="200"/>
      <use href="#dailbert" x="1098" y="150" width="120" height="200"/>

      <!-- Doug balloon: the warm-dim beat -->
      <path d="M978 40 h150 v42 h-52 l-10 12 l-3 -12 h-85 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="1053" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="1053" dy="0">We should quit</tspan>
        <tspan x="1053" dy="16">while we're ahead.</tspan>
      </text>

      <!-- Dailbert dry button balloon -->
      <path d="M1090 120 h124 v40 h-40 l-10 12 l-3 -12 h-71 Z" fill="#fefdfb" stroke="#111" stroke-width="2"/>
      <text x="1152" y="140" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">
        <tspan x="1152" dy="0">Leave it on</tspan>
        <tspan x="1152" dy="16">all weekend.</tspan>
      </text>
    </g>
  </g>
</svg>