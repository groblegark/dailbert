  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- set -->
    <path d="M12 148 L388 148" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M10 300 L390 300" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M148 252 L332 252" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M158 254 L158 300 M322 254 L322 300" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="150" y="246" width="34" height="6" rx="1" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <!-- monitor -->
    <path d="M235 244 L235 252" fill="none" stroke="#111" stroke-width="4"/>
    <path d="M218 252 L252 252" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    <rect x="180" y="184" width="110" height="60" rx="3" fill="#111" stroke="#111" stroke-width="2.5"/>
    <path d="M188 192 L258 192 M188 198 L248 198 M188 204 L262 204 M188 210 L252 210 M188 216 L260 216" fill="none" stroke="#9a9a9a" stroke-width="1.3"/>
    <rect x="272" y="190" width="6" height="46" fill="none" stroke="#9a9a9a" stroke-width="1"/>
    <rect x="273.5" y="206" width="3" height="7" fill="#9a9a9a"/>
    <rect x="216" y="226" width="48" height="12" fill="#333" stroke="#777" stroke-width="1"/>
    <text x="240" y="235" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="8" fill="#777" text-anchor="middle">ACCEPT</text>
    <!-- figures -->
    <use href="#dailbert" x="90" y="186"/>
    <use href="#doug" x="328" y="166"/>
    <!-- Dailbert balloon -->
    <rect x="18" y="14" width="185" height="70" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M100 78 L116 150 L128 78" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <text x="110" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">I am actually reading</text>
    <text x="110" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">the terms.</text>
    <text x="110" y="75" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Page sixty-one.</text>
    <!-- Doug balloon -->
    <rect x="213" y="14" width="174" height="70" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M312 78 L348 158 L334 78" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <text x="300" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">I accepted mine in</text>
    <text x="300" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">the parking lot.</text>
    <text x="300" y="75" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">It was one sentence.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- set -->
    <path d="M12 148 L388 148" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M10 300 L390 300" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M148 252 L332 252" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M158 254 L158 300 M322 254 L322 300" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="150" y="246" width="34" height="6" rx="1" fill="#fff" stroke="#111" stroke-width="1.5"/>
    <!-- monitor -->
    <path d="M235 244 L235 252" fill="none" stroke="#111" stroke-width="4"/>
    <path d="M218 252 L252 252" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    <rect x="180" y="184" width="110" height="60" rx="3" fill="#111" stroke="#111" stroke-width="2.5"/>
    <path d="M188 192 L258 192 M188 198 L248 198 M188 210 L252 210 M188 216 L260 216" fill="none" stroke="#9a9a9a" stroke-width="1.3"/>
    <path d="M188 204 L264 204" fill="none" stroke="#fff" stroke-width="2.2"/>
    <rect x="272" y="190" width="6" height="46" fill="none" stroke="#9a9a9a" stroke-width="1"/>
    <rect x="273.5" y="212" width="3" height="7" fill="#9a9a9a"/>
    <rect x="216" y="226" width="48" height="12" fill="#333" stroke="#777" stroke-width="1"/>
    <text x="240" y="235" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="8" fill="#777" text-anchor="middle">ACCEPT</text>
    <!-- figures -->
    <use href="#dailbert" x="90" y="186"/>
    <path d="M110 226 Q97 214 103 201" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="104" cy="199" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <use href="#doug" x="316" y="166"/>
    <!-- Dailbert balloon -->
    <rect x="18" y="14" width="185" height="70" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M100 78 L116 150 L128 78" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <text x="110" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">One sentence? Mine</text>
    <text x="110" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">has a chapter about</text>
    <text x="110" y="75" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">my dreams.</text>
    <!-- Doug balloon -->
    <rect x="213" y="14" width="174" height="70" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M306 78 L338 158 L328 78" fill="#fff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <text x="300" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">Mine just said</text>
    <text x="300" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">"Doug, we're good."</text>
    <text x="300" y="75" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" fill="#111" text-anchor="middle">And we are.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- set -->
    <path d="M8 318 L392 318" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M96 278 L392 278" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M110 280 L110 318 M378 280 L378 318" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
