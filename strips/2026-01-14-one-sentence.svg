<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">One Sentence</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-01-14</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="dailbert" overflow="visible">
      <!-- chair -->
      <path d="M6 42 L4 90" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M2 92 L48 92" fill="none" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M26 92 L26 106" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M10 112 L42 112" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M26 106 L12 112 M26 106 L40 112" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <!-- legs -->
      <path d="M21 76 L21 90 L54 90 L54 106" fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
      <ellipse cx="60" cy="110" rx="8" ry="4" fill="#111"/>
      <!-- torso -->
      <path d="M19 33 Q13 55 17 76 L47 76 Q49 52 42 33 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M28 33 L31 39 M40 33 L37 39" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M31 34 L37 34 L35 51 L32 51 Z" fill="#111" stroke="#111" stroke-width="1"/>
      <!-- arm to keyboard -->
      <path d="M44 44 Q58 52 68 62" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="70" cy="63" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- head -->
      <ellipse cx="30" cy="18" rx="17" ry="15" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M23 4 Q30 -9 39 3 Q33 -2 28 3" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="26" cy="19" r="6" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="19" r="6" fill="#fff" stroke="#111" stroke-width="2"/>
      <path d="M32 19 L34 19" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M20 19 L14 17" fill="none" stroke="#111" stroke-width="1.8"/>
      <circle cx="27" cy="19" r="1.6" fill="#111"/>
      <circle cx="41" cy="19" r="1.6" fill="#111"/>
      <path d="M32 29 L42 28" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" overflow="visible">
      <!-- legs -->
      <path d="M22 96 L22 126 M40 96 L40 126" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="18" cy="130" rx="8" ry="4" fill="#111"/>
      <ellipse cx="44" cy="130" rx="8" ry="4" fill="#111"/>
      <!-- torso -->
      <path d="M15 33 Q7 63 13 96 L49 96 Q55 63 45 33 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M25 33 L30 39 L35 33" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <!-- far arm -->
      <path d="M46 42 Q54 60 48 74" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="48" cy="76" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <!-- mug arm -->
      <path d="M18 42 Q8 52 6 58" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="-6" y="56" width="15" height="15" rx="1.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M-6 59 Q-14 63.5 -6 68" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="6" cy="59" r="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-2 52 q2 -4 0 -8 M4 52 q2 -4 0 -8" fill="none" stroke="#9a9a9a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- head -->
      <circle cx="30" cy="17" r="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M22 3 L20 -2 M30 1 L30 -4 M38 3 L40 -2" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="23" cy="13" r="1.7" fill="#111"/>
      <circle cx="34" cy="13" r="1.7" fill="#111"/>
      <path d="M18 21 Q28 33 39 21" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" overflow="visible">
      <path d="M30 8 L30 -1" fill="none" stroke="#9a9a9a" stroke-width="2"/>
      <circle cx="30" cy="-4" r="3" fill="#9a9a9a" stroke="#9a9a9a" stroke-width="1"/>
      <rect x="4" y="8" width="52" height="42" rx="6" fill="#b9b9b9" stroke="#9a9a9a" stroke-width="2.5"/>
      <rect x="12" y="19" width="14" height="6" rx="2" fill="#fff" stroke="#555" stroke-width="1.5"/>
      <rect x="34" y="19" width="14" height="6" rx="2" fill="#fff" stroke="#555" stroke-width="1.5"/>
      <rect x="16" y="33" width="28" height="10" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
      <path d="M22 33 L22 43 M28 33 L28 43 M34 33 L34 43 M40 33 L40 43" fill="none" stroke="#555" stroke-width="1.3"/>
    </symbol>
