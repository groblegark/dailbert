    <path d="M176 166 L190 152 M176 178 L202 152 M356 166 L342 152 M356 178 L330 152" fill="none" stroke="#9a9a9a" stroke-width="1"/>
    <path d="M176 252 L190 266 M330 266 L356 240" fill="none" stroke="#9a9a9a" stroke-width="1"/>
    <!-- the clanker, on the screen only -->
    <use href="#clanker" x="236" y="178"/>
    <!-- remaining terms, still scrolling -->
    <path d="M182 244 L300 244 M182 251 L288 251 M182 258 L296 258" fill="none" stroke="#9a9a9a" stroke-width="1.3"/>
    <rect x="344" y="158" width="6" height="102" fill="none" stroke="#9a9a9a" stroke-width="1"/>
    <rect x="345.5" y="246" width="3" height="8" fill="#9a9a9a"/>
    <!-- dailbert -->
    <use href="#dailbert" x="30" y="206"/>
    <path d="M88 216 q4 6 0 10 q-5 -4 0 -10" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
    <!-- clanker balloon -->
    <rect x="150" y="12" width="224" height="104" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="154" y="16" width="216" height="96" fill="none" stroke="#111" stroke-width="0.8"/>
    <path d="M250 116 L255 150" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="262" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Everyone receives the</text>
    <text x="262" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">terms they will accept.</text>
    <text x="262" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Yours are still being</text>
    <text x="262" y="88" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">written, Dailbert.</text>
    <text x="262" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You keep objecting.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>