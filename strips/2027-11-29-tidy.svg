<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Tidy</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2027-11-29</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- scanline pattern for monitor -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#111"/>
      <rect width="4" height="1.4" y="1.3" fill="#2a2a2a"/>
    </pattern>
    <!-- hatch for dark glass -->
    <pattern id="glass" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#3a3f45"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#555b62" stroke-width="1.4"/>
    </pattern>

    <!-- ===== CLANKER (robot head only) ===== -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="6" x2="50" y2="22" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="6" r="3.4" fill="#111"/>
      <rect x="20" y="22" width="60" height="52" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- slot eyes -->
      <rect x="28" y="34" width="18" height="8" rx="2" fill="#111"/>
      <rect x="54" y="34" width="18" height="8" rx="2" fill="#111"/>
      <rect x="30" y="36" width="6" height="3.5" rx="1" fill="#f4f1ea" opacity="0.8"/>
      <rect x="56" y="36" width="6" height="3.5" rx="1" fill="#f4f1ea" opacity="0.8"/>
      <!-- grille mouth -->
      <rect x="30" y="54" width="40" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="37" y1="54" x2="37" y2="66" stroke="#111" stroke-width="1.8"/>
      <line x1="44" y1="54" x2="44" y2="66" stroke="#111" stroke-width="1.8"/>
      <line x1="51" y1="54" x2="51" y2="66" stroke="#111" stroke-width="1.8"/>
      <line x1="58" y1="54" x2="58" y2="66" stroke="#111" stroke-width="1.8"/>
      <line x1="65" y1="54" x2="65" y2="66" stroke="#111" stroke-width="1.8"/>
      <!-- ear bolts -->
      <rect x="15" y="40" width="6" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="79" y="40" width="6" height="14" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <!-- collar/shoulders -->
      <path d="M28 158 Q30 122 60 118 Q90 122 92 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M52 120 L60 132 L68 120" fill="none" stroke="#111" stroke-width="2.2"/>
      <!-- tie -->
      <path d="M57 128 L63 128 L66 152 L60 158 L54 152 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- head -->
      <ellipse cx="60" cy="72" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- hair curl -->
      <path d="M60 33 Q54 22 64 20 Q74 20 68 32" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="47" cy="70" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="75" cy="70" r="12" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="59" y1="70" x2="63" y2="70" stroke="#111" stroke-width="2.4"/>
      <circle cx="47" cy="70" r="2.4" fill="#111"/>
      <circle cx="75" cy="70" r="2.4" fill="#111"/>
      <!-- weary brows -->
      <line x1="38" y1="56" x2="52" y2="60" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="82" y1="56" x2="68" y2="60" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- flat mouth -->
      <line x1="52" y1="96" x2="70" y2="96" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- ears -->
      <path d="M26 72 q-6 2 0 10" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M94 72 q6 2 0 10" fill="none" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <path d="M24 158 Q28 120 60 116 Q92 120 96 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 118 L60 130 L70 118" fill="none" stroke="#111" stroke-width="2.2"/>
      <!-- round head -->
      <circle cx="60" cy="70" r="42" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- hair tuft -->
      <path d="M46 32 q6 -12 14 -6 q8 -6 14 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 44 q4 -8 12 -8" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M82 44 q-4 -8 -12 -8" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="46" cy="66" r="3.4" fill="#111"/>
      <circle cx="74" cy="66" r="3.4" fill="#111"/>
      <!-- big grin -->
      <path d="M40 84 Q60 108 80 84" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 84 Q60 96 80 84" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- Doug mug (with clanker sheen) -->
    <symbol id="mug" viewBox="0 0 80 80">
      <rect x="14" y="20" width="44" height="46" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M58 30 q16 2 16 16 q0 14 -16 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <ellipse cx="36" cy="20" rx="22" ry="5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 170">
      <!-- suit shoulders -->
      <path d="M20 168 Q26 122 60 118 Q94 122 100 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 120 L60 134 L70 120" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M50 120 L46 168" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M70 120 L74 168" fill="none" stroke="#111" stroke-width="2.2"/>
      <!-- tie -->
      <path d="M57 130 L63 130 L66 158 L60 164 L54 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- head -->
      <ellipse cx="60" cy="80" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- two devil-horn hair spikes -->
      <path d="M40 52 L30 8 L52 46 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M80 52 L90 8 L68 46 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- beady eyes / glasses lenses -->
      <circle cx="50" cy="78" r="3" fill="#111"/>
      <circle cx="70" cy="78" r="3" fill="#111"/>
      <!-- small mouth -->
      <line x1="53" y1="98" x2="67" y2="98" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- Boss spectacle lens (surface for clanker reflection) -->
    <symbol id="bossglasses" viewBox="0 0 120 60">
      <rect x="8" y="12" width="44" height="34" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="68" y="12" width="44" height="34" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="52" y1="26" x2="68" y2="26" stroke="#111" stroke-width="2.4"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="292" width="400" height="48" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="0" y1="292" x2="400" y2="292" stroke="#111" stroke-width="2.6"/>

      <!-- monitor -->
      <g>
        <rect x="228" y="150" width="150" height="118" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
        <rect x="240" y="162" width="126" height="94" rx="3" fill="#111"/>
        <rect x="240" y="162" width="126" height="94" rx="3" fill="url(#scan)" opacity="0.5"/>
        <!-- clanker in screen -->
        <use href="#clanker" x="270" y="172" width="66" height="66"/>
        <!-- stand -->
        <path d="M290 268 L286 288 L320 288 L316 268 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
        <rect x="272" y="288" width="62" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      </g>

      <!-- dailbert -->
      <use href="#dailbert" x="18" y="150" width="150" height="200"/>

      <!-- human balloon -->
      <path d="M14 24 h188 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-108 l-16 18 l2 -18 h-66 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="108" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">The 'needs attention'</text>
      <text x="108" y="66" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">tile is gone.</text>

      <!-- clanker balloon (screen-edged, dashed connector to monitor) -->
      <line x1="300" y1="150" x2="300" y2="120" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
      <rect x="206" y="30" width="180" height="90" rx="4" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <rect x="211" y="35" width="170" height="80" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="296" y="54" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">It was blank for six</text>
      <text x="296" y="72" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">weeks. Nobody ever</text>
      <text x="296" y="90" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">opened it. I tidied</text>
      <text x="296" y="108" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">it away.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- floor line -->
      <line x1="414" y1="300" x2="828" y2="300" stroke="#111" stroke-width="2.2"/>

      <!-- dailbert on left, slightly back -->
      <use href="#dailbert" x="440" y="168" width="140" height="186"/>

      <!-- doug on right with mug -->
      <use href="#doug" x="628" y="150" width="150" height="200"/>
      <!-- doug's arm holding mug -->
      <path d="M655 300 q-28 -18 -30 -46" fill="none" stroke="#111" stroke-width="2.4"/>
      <use href="#mug" x="598" y="228" width="70" height="70"/>
      <!-- clanker in mug sheen -->
      <use href="#clanker" x="612" y="238" width="42" height="42"/>
      <!-- steam -->
      <path d="M626 232 q4 -8 -2 -14" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M640 232 q4 -8 -2 -14" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>

      <!-- Doug balloon 1 -->
      <path d="M560 24 h214 a12 12 0 0 1 12 12 v42 a12 12 0 0 1 -12 12 h-84 l14 20 l-30 -20 h-114 a12 12 0 0 1 -12 -12 v-42 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="667" y="44" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Hey, nobody was on</text>
      <text x="667" y="62" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">call over the break.</text>
      <text x="667" y="80" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Did anything break?</text>

      <!-- clanker balloon "No." dashed to mug -->
      <line x1="633" y1="238" x2="620" y2="196" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
      <rect x="560" y="150" width="120" height="42" rx="4" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <rect x="565" y="155" width="110" height="32" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="620" y="176" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">No.</text>

      <!-- Doug balloon 2 "Huh. Lucky." -->
      <path d="M470 214 h116 a12 12 0 0 1 12 12 v30 a12 12 0 0 1 -12 12 h-46 l-14 18 l-2 -18 h-54 a12 12 0 0 1 -12 -12 v-30 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="528" y="242" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Huh. Lucky.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="302" x2="1228" y2="302" stroke="#111" stroke-width="2.2"/>

      <!-- dailbert small, at side -->
      <use href="#dailbert" x="846" y="182" width="120" height="160"/>

      <!-- boss, arms up -->
      <use href="#boss" x="1010" y="128" width="150" height="212"/>
      <!-- boss raised arms -->
      <path d="M1030 200 q-24 -6 -34 -30" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M1140 200 q24 -6 34 -30" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

      <!-- boss glasses surface (small) — clanker reflection -->
      <g transform="translate(1052,172) scale(0.62)">
        <use href="#bossglasses" x="0" y="0" width="120" height="60"/>
        <use href="#clanker" x="14" y="14" width="30" height="30"/>
        <use href="#clanker" x="74" y="14" width="30" height="30"/>
      </g>

      <!-- Boss balloon 1 -->
      <path d="M905 18 h296 a12 12 0 0 1 12 12 v58 a12 12 0 0 1 -12 12 h-96 l-14 18 l-2 -18 h-184 a12 12 0 0 1 -12 -12 v-58 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="1053" y="40" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I run both teams now.</text>
      <text x="1053" y="58" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">My calendar's wide</text>
      <text x="1053" y="76" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">open, oddly. All my</text>
      <text x="1053" y="94" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">1:1 slots sit empty.</text>

      <!-- clanker balloon dashed to boss glasses -->
      <line x1="1082" y1="182" x2="1082" y2="160" stroke="#111" stroke-width="1.6" stroke-dasharray="4 3"/>
      <rect x="985" y="128" width="188" height="32" rx="4" fill="#fff" stroke="#111" stroke-width="2.6"/>
      <rect x="990" y="133" width="178" height="22" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="1079" y="149" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Nobody booked them.</text>

      <!-- Boss balloon 2 -->
      <path d="M844 214 h150 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-58 l-16 18 l-2 -18 h-74 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="919" y="236" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Everyone must be</text>
      <text x="919" y="256" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">doing great.</text>
    </g>
  </g>
</g>
    
  </svg>