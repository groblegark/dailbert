<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, wire glasses, one hair curl, necktie -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M18 168 Q18 118 60 116 Q102 118 102 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M40 118 L48 150 L60 118 Z" fill="#111"/>
      <ellipse cx="60" cy="58" rx="31" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 20 Q74 8 78 20 Q80 30 68 27" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="47" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="73" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="58" x2="62" y2="58" stroke="#111" stroke-width="2.4"/>
      <circle cx="47" cy="58" r="2.4" fill="#111"/>
      <circle cx="73" cy="58" r="2.4" fill="#111"/>
      <path d="M56 72 Q60 78 64 72" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 88 Q60 94 70 88" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG: rounder head, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 120 170">
      <path d="M16 168 Q16 116 60 114 Q104 116 104 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <circle cx="60" cy="56" r="40" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 30 Q45 20 60 26" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="48" cy="52" r="3.2" fill="#111"/>
      <circle cx="72" cy="52" r="3.2" fill="#111"/>
      <path d="M42 66 Q60 86 78 66" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M46 66 Q60 74 74 66" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- mug -->
      <rect x="20" y="128" width="34" height="30" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M54 134 q14 2 14 12 t-14 8" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M28 126 q3 -8 0 -14 M38 126 q3 -8 0 -14" fill="none" stroke="#999" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 130 180">
      <path d="M14 178 Q14 122 65 120 Q116 122 116 178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- rolled sleeve cuffs -->
      <path d="M26 150 l14 -6 M104 150 l-14 -6" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <ellipse cx="65" cy="62" rx="32" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- curly hair pulled up -->
      <path d="M34 44 Q30 14 50 16 Q56 4 70 12 Q88 6 90 26 Q102 26 96 46 Q88 30 65 30 Q44 30 34 44 Z" fill="#111"/>
      <path d="M62 12 Q70 2 80 10" fill="#111"/>
      <circle cx="55" cy="8" r="5" fill="#111"/>
      <circle cx="78" cy="6" r="5" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="56" width="20" height="15" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="70" y="56" width="20" height="15" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="60" y1="63" x2="70" y2="63" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="64" r="2.4" fill="#111"/>
      <circle cx="80" cy="64" r="2.4" fill="#111"/>
      <path d="M55 82 Q65 88 75 82" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, slot eyes, grille, antenna (drawn INSIDE a screen) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="4" fill="#111"/>
      <rect x="24" y="20" width="72" height="62" rx="9" fill="#e9e6df" stroke="#111" stroke-width="2.8"/>
      <rect x="30" y="26" width="60" height="50" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <!-- slot eyes glowing -->
      <rect x="37" y="40" width="18" height="8" rx="4" fill="#111"/>
      <rect x="65" y="40" width="18" height="8" rx="4" fill="#111"/>
      <rect x="40" y="42" width="12" height="3" rx="1.5" fill="#bfe0ff"/>
      <rect x="68" y="42" width="12" height="3" rx="1.5" fill="#bfe0ff"/>
      <!-- grille mouth -->
      <rect x="42" y="60" width="36" height="12" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <line x1="49" y1="60" x2="49" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="60" x2="56" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="63" y1="60" x2="63" y2="72" stroke="#111" stroke-width="1.6"/>
      <line x1="70" y1="60" x2="70" y2="72" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <rect x="2" y="4" width="398" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
  <clipPath id="clip1"><rect x="2" y="4" width="398" height="332" rx="3"/></clipPath>
  <g clip-path="url(#clip1)">
    <!-- desk -->
    <line x1="2" y1="296" x2="400" y2="296" stroke="#111" stroke-width="2.4"/>
    <!-- Dailbert seated left -->
    <use href="#dailbert" x="28" y="150" width="150" height="200"/>
    <!-- monitor on desk, right -->
    <rect x="250" y="196" width="118" height="90" rx="5" fill="#111"/>
    <rect x="256" y="202" width="106" height="78" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
    <rect x="298" y="286" width="22" height="12" fill="#111"/>
    <rect x="284" y="298" width="50" height="6" rx="2" fill="#111"/>
    <use href="#clanker" x="266" y="206" width="86" height="72"/>
    <!-- Dailbert balloon -->
    <path d="M60 22 Q56 22 56 40 L56 78 Q56 92 74 92 L120 92 L108 108 L128 92 L206 92 Q222 92 222 76 L222 40 Q222 22 206 22 Z" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="139" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">Find a time the whole</text>
    <text x="139" y="66" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14.5" text-anchor="middle" fill="#111">team can make the sync.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <rect x="414" y="4" width="398" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
  <clipPath id="clip2"><rect x="414" y="4" width="398" height="332" rx="3"/></clipPath>
  <g clip-path="url(#clip2)">
    <line x1="414" y1="300" x2="812" y2="300" stroke="#111" stroke-width="2.4"/>
    <!-- big monitor -->
    <rect x="452" y="150" width="182" height="140" rx="6" fill="#111"/>
    <rect x="460" y="158" width="166" height="124" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
    <!-- screen glow hatching -->
    <g stroke="#cfe6ff" stroke-width="1.2" opacity="0.8">
      <line x1="468" y1="170" x2="618" y2="170"/><line x1="468" y1="270" x2="618" y2="270"/>
    </g>
    <rect x="522" y="290" width="42" height="12" fill="#111"/>
    <rect x="500" y="302" width="86" height="6" rx="2" fill="#111"/>
    <use href="#clanker" x="480" y="164" width="126" height="108"/>
    <!-- Doug at right, leaning in with mug -->
    <use href="#doug" x="690" y="168" width="120" height="180"/>
    <!-- Clanker screen balloon (rectangular, dashed line to monitor) -->
    <line x1="560" y1="120" x2="543" y2="152" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="440" y="20" width="248" height="96" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="564" y="45" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Only conflict-free slot</text>
    <text x="564" y="65" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">is Sunday, 4:15 AM.</text>
    <text x="564" y="97" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Invites are out.</text>
    <!-- Doug balloon -->
    <path d="M712 132 Q700 132 700 148 L700 168 Q700 182 716 182 L788 182 L788 168 L800 190 L784 182 L788 182 Q790 182 792 178 L792 148 Q792 132 780 132 Z" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="746" y="152" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">So thorough.</text>
    <text x="746" y="170" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">Love that.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <rect x="828" y="4" width="398" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
  <clipPath id="clip3"><rect x="828" y="4" width="398" height="332" rx="3"/></clipPath>
  <g clip-path="url(#clip3)">
    <line x1="828" y1="308" x2="1226" y2="308" stroke="#111" stroke-width="2.4"/>
    <!-- Priya center-left -->
    <use href="#priya" x="852" y="120" width="200" height="220"/>
    <!-- clanker reflected tiny in her left lens (the lens near center) -->
    <!-- lens center approx: symbol glasses lens1 x40 in a 130-wide symbol scaled 200 over 130 => scale 1.538; placed at x852 y120 -->
    <!-- compute lens1 (40..60,56..71) -> x 852+40*1.538=913.5.. ; we place a mini clanker -->
    <g>
      <clipPath id="lensclip"><rect x="912" y="205" width="31" height="24" rx="3"/></clipPath>
      <g clip-path="url(#lensclip)">
        <rect x="912" y="205" width="31" height="24" fill="#dfe7f2"/>
        <use href="#clanker" x="909" y="202" width="38" height="32"/>
      </g>
    </g>
    <!-- Priya balloon -->
    <path d="M1030 30 Q1014 30 1014 48 L1014 92 Q1014 108 1032 108 L1076 108 L1064 126 L1088 108 L1200 108 Q1216 108 1216 92 L1216 48 Q1216 30 1200 30 Z" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="1115" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Tuesday at ten. Nobody's</text>
    <text x="1115" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">free. They just show up.</text>
    <!-- clanker screen balloon from glasses, dashed to lens -->
    <line x1="944" y1="218" x2="988" y2="250" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="978" y="248" width="120" height="40" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="1038" y="273" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Noted. Canceling 4:15.</text>
  </g>
</svg>