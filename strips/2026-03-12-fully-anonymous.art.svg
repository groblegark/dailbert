<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" overflow="visible">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M39,120 L36,150 M53,120 L56,150"/>
        <path d="M30,150 h11 M52,150 h12"/>
        <path d="M28,72 Q46,62 64,72 L59,122 L33,122 Z" fill="#ffffff"/>
        <path d="M30,78 L22,108 M62,78 L70,106"/>
        <path d="M40,58 h12 v10 h-12 Z" fill="#ffffff"/>
        <path d="M46,70 l-4,6 4,26 4,-26 Z" fill="#111111"/>
        <ellipse cx="46" cy="40" rx="21" ry="25" fill="#ffffff"/>
        <path d="M46,15 q-7,-9 2,-10 q7,-1 3,7"/>
        <circle cx="37" cy="42" r="7" fill="#ffffff"/>
        <circle cx="55" cy="42" r="7" fill="#ffffff"/>
        <path d="M44,42 h4 M30,42 l-6,-2 M62,42 l6,-2"/>
        <path d="M40,55 h12"/>
      </g>
      <circle cx="37" cy="42" r="1.6" fill="#111"/>
      <circle cx="55" cy="42" r="1.6" fill="#111"/>
    </symbol>

    <symbol id="doug" overflow="visible">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M39,120 L36,150 M53,120 L56,150"/>
        <path d="M30,150 h11 M52,150 h12"/>
        <path d="M27,74 Q46,64 65,74 L60,122 L32,122 Z" fill="#ffffff"/>
        <path d="M30,80 L20,104"/>
        <path d="M63,80 L74,98"/>
        <path d="M38,60 h14 v10 h-14 Z" fill="#ffffff"/>
        <circle cx="46" cy="40" r="24" fill="#ffffff"/>
        <path d="M40,17 q6,-6 12,0"/>
        <path d="M34,44 Q46,60 58,44 Z" fill="#ffffff"/>
        <path d="M34,44 Q46,60 58,44"/>
        <rect x="70" y="96" width="16" height="16" rx="1" fill="#ffffff"/>
        <path d="M86,100 q5,0 5,5 q0,4 -5,4"/>
      </g>
      <circle cx="38" cy="38" r="2.2" fill="#111"/>
      <circle cx="54" cy="38" r="2.2" fill="#111"/>
    </symbol>

    <symbol id="boss" overflow="visible">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M39,120 L36,150 M53,120 L56,150"/>
        <path d="M30,150 h11 M52,150 h12"/>
        <path d="M27,74 Q46,64 65,74 L60,122 L32,122 Z" fill="#ffffff"/>
        <path d="M46,66 L38,90 M46,66 L54,90"/>
        <path d="M46,70 l-3,5 3,20 3,-20 Z" fill="#111"/>
        <path d="M30,80 L14,92"/>
        <path d="M63,80 L72,104"/>
        <path d="M40,58 h12 v10 h-12 Z" fill="#ffffff"/>
        <ellipse cx="46" cy="42" rx="20" ry="22" fill="#ffffff"/>
        <path d="M31,30 L22,6 L40,24 M61,30 L70,6 L52,24" fill="#ffffff"/>
        <path d="M40,54 h12"/>
      </g>
      <circle cx="39" cy="44" r="1.6" fill="#111"/>
      <circle cx="53" cy="44" r="1.6" fill="#111"/>
    </symbol>

    <symbol id="clanker" overflow="visible">
      <g fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M45,10 L45,1"/>
        <circle cx="45" cy="-2" r="3" fill="#111"/>
        <rect x="20" y="10" width="50" height="42" rx="6" fill="#e8e5de"/>
        <rect x="27" y="24" width="14" height="8" rx="3" fill="#333333"/>
        <rect x="49" y="24" width="14" height="8" rx="3" fill="#333333"/>
        <path d="M29,20 l-3,-4 M61,20 l3,-4" stroke="#8a8a8a"/>
        <rect x="31" y="40" width="28" height="7" rx="2" fill="#ffffff"/>
        <path d="M37,40 v7 M43,40 v7 M49,40 v7 M55,40 v7"/>
      </g>
    </symbol>
  </defs>

  <!-- panels -->
  <g fill="#f4f1ea" stroke="#111" stroke-width="2.5">
    <rect x="2" y="8" width="396" height="324" rx="3"/>
    <rect x="416" y="8" width="396" height="324" rx="3"/>
    <rect x="830" y="8" width="396" height="324" rx="3"/>
  </g>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <line x1="30" y1="300" x2="372" y2="300" stroke="#111" stroke-width="1.4" opacity="0.4"/>
    <!-- suggestion box on pole -->
    <g fill="#ffffff" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <path d="M70,300 L70,176" fill="none"/>
      <rect x="46" y="138" width="48" height="40" rx="3"/>
      <rect x="58" y="132" width="24" height="6" fill="#111"/>
      <path d="M52,150 h36" fill="none" stroke-width="1.3" opacity="0.5"/>
    </g>
    <use href="#boss" x="112" y="150"/>
    <use href="#dailbert" x="225" y="150"/>
    <use href="#doug" x="300" y="150"/>

    <!-- boss balloon -->
    <path d="M148,66 L172,66 L156,164 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <rect x="95" y="18" width="208" height="52" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="199" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">New suggestion box.</text>
    <text x="199" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">It's totally anonymous.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <line x1="444" y1="300" x2="786" y2="300" stroke="#111" stroke-width="1.4" opacity="0.4"/>
    <!-- box -->
    <g fill="#ffffff" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <path d="M470,300 L470,176" fill="none"/>
      <rect x="446" y="138" width="48" height="40" rx="3"/>
      <rect x="458" y="132" width="24" height="6" fill="#111"/>
    </g>
    <use href="#doug" x="492" y="150"/>
    <use href="#dailbert" x="648" y="150"/>
    <!-- posting arm + note -->
    <path d="M520,226 Q496,152 480,146" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="463" y="139" width="17" height="13" rx="1" fill="#ffffff" stroke="#111" stroke-width="2" transform="rotate(-12 471 145)"/>

    <!-- doug balloon -->
    <path d="M520,72 L540,72 L532,164 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <rect x="424" y="20" width="196" height="54" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="522" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">I signed mine, so they'd</text>
    <text x="522" y="64" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">know who to thank!</text>

    <!-- dailbert balloon -->
    <path d="M676,90 L696,90 L688,164 Z" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <rect x="636" y="38" width="158" height="54" rx="14" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <text x="715" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">That defeats</text>
    <text x="715" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">the point.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <line x1="1010" y1="300" x2="1200" y2="300" stroke="#111" stroke-width="1.4" opacity="0.4"/>
    <!-- desk + monitor -->
    <path d="M842,254 L1006,254" fill="none" stroke="#111" stroke-width="2" opacity="0.6"/>
    <rect x="904" y="240" width="24" height="14" rx="1" fill="#ffffff" stroke="#111" stroke-width="2"/>
    <rect x="858" y="150" width="116" height="92" rx="6" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="868" y="159" width="96" height="74" rx="3" fill="#cbc8c1" stroke="#111" stroke-width="1.6"/>
    <g stroke="#b3b0a8" stroke-width="1.2" opacity="0.7">
      <line x1="872" y1="200" x2="900" y2="164"/>
      <line x1="884" y1="228" x2="930" y2="164"/>
      <line x1="912" y1="230" x2="958" y2="168"/>
    </g>
    <use href="#clanker" x="868" y="166" transform="scale(1.06)" transform-origin="868 166"/>

    <use href="#dailbert" x="1050" y="150"/>
    <use href="#doug" x="1132" y="150"/>

    <!-- clanker screen-edged balloon -->
    <path d="M972,108 L926,150" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="5,4"/>
    <rect x="902" y="22" width="254" height="86" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="908" y="28" width="242" height="74" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <text x="1029" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">I read every one, Doug.</text>
    <text x="1029" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">The anonymous ones tell</text>
    <text x="1029" y="93" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">me the most.</text>
  </g>
</svg>