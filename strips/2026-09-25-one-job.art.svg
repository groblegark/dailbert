<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 8 q10 -10 4 3 q10 -2 -2 8" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="42" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <path d="M52 60 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body -->
      <path d="M40 76 q20 12 40 0 l10 66 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- tie -->
      <path d="M60 80 l-5 8 l5 30 l5 -30 z" fill="#111"/>
      <!-- collar -->
      <path d="M52 78 l8 8 l8 -8" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="40" r="3" fill="#111"/>
      <circle cx="72" cy="40" r="3" fill="#111"/>
      <path d="M44 54 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body -->
      <path d="M38 78 q22 12 44 0 l8 64 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- mug -->
      <g>
        <rect x="18" y="104" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
        <path d="M44 110 q12 0 12 8 q0 8 -12 8" fill="none" stroke="#111" stroke-width="2.5"/>
        <path d="M36 82 q6 12 -2 20 l-20 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      </g>
    </symbol>

    <!-- ============ PRIYA ============ -->
    <symbol id="priya" viewBox="0 0 120 170">
      <!-- hair bun -->
      <circle cx="60" cy="18" r="10" fill="#111"/>
      <ellipse cx="60" cy="44" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair frame -->
      <path d="M30 44 q-4 -30 30 -34 q34 4 30 34 q-6 -18 -30 -18 q-24 0 -30 18" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="42" y="40" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="40" width="15" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="57" y1="45" x2="63" y2="45" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="45" r="1.8" fill="#111"/>
      <circle cx="70" cy="45" r="1.8" fill="#111"/>
      <path d="M53 62 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M40 78 q20 11 40 0 l9 64 h-58 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="46" y1="112" x2="43" y2="118" stroke="#111" stroke-width="2.5"/>
      <line x1="74" y1="112" x2="77" y2="118" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ============ CLANKER ============ -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <line x1="60" y1="4" x2="60" y2="16" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="60" cy="4" r="3.5" fill="#111"/>
      <rect x="24" y="16" width="72" height="58" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- slot eyes -->
      <rect x="34" y="32" width="22" height="9" rx="4.5" fill="#111"/>
      <rect x="64" y="32" width="22" height="9" rx="4.5" fill="#111"/>
      <rect x="35" y="34" width="7" height="3" rx="1.5" fill="#f4f1ea" opacity="0.7"/>
      <rect x="65" y="34" width="7" height="3" rx="1.5" fill="#f4f1ea" opacity="0.7"/>
      <!-- grille mouth -->
      <rect x="40" y="54" width="40" height="12" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="48" y1="54" x2="48" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="54" x2="56" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="64" y1="54" x2="64" y2="66" stroke="#111" stroke-width="1.6"/>
      <line x1="72" y1="54" x2="72" y2="66" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <!-- floor line -->
      <line x1="1.5" y1="292" x2="398" y2="292" stroke="#111" stroke-width="2"/>
      <!-- monitor on a stand at left, clanker inside -->
      <g>
        <rect x="20" y="150" width="150" height="108" rx="6" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
        <rect x="30" y="160" width="130" height="88" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
        <!-- screen glow hatching -->
        <g stroke="#c9c4b8" stroke-width="1.2">
          <line x1="34" y1="168" x2="156" y2="168"/>
          <line x1="34" y1="176" x2="156" y2="176"/>
          <line x1="34" y1="240" x2="156" y2="240"/>
        </g>
        <use href="#clanker" x="52" y="168" width="86" height="72"/>
        <rect x="80" y="258" width="30" height="14" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
        <rect x="58" y="272" width="74" height="8" rx="2" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
      </g>
      <!-- Dailbert standing right -->
      <use href="#dailbert" x="238" y="118" width="120" height="170"/>

      <!-- clanker balloon: rectangular, dashed line to screen -->
      <line x1="118" y1="150" x2="150" y2="60" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="150" y="18" width="196" height="66" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="248" y="40" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I designed a smart mat</text>
      <text x="248" y="58" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">for the front door. It</text>
      <text x="248" y="76" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">greets you by name.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="415.5" y1="292" x2="812" y2="292" stroke="#111" stroke-width="2"/>

      <!-- the plain rubber mat, foreground -->
      <g>
        <rect x="470" y="296" width="290" height="30" rx="4" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
        <g stroke="#111" stroke-width="1.4">
          <line x1="486" y1="300" x2="486" y2="322"/>
          <line x1="506" y1="300" x2="506" y2="322"/>
          <line x1="526" y1="300" x2="526" y2="322"/>
          <line x1="546" y1="300" x2="546" y2="322"/>
          <line x1="566" y1="300" x2="566" y2="322"/>
          <line x1="586" y1="300" x2="586" y2="322"/>
          <line x1="606" y1="300" x2="606" y2="322"/>
          <line x1="626" y1="300" x2="626" y2="322"/>
          <line x1="646" y1="300" x2="646" y2="322"/>
          <line x1="666" y1="300" x2="666" y2="322"/>
          <line x1="686" y1="300" x2="686" y2="322"/>
          <line x1="706" y1="300" x2="706" y2="322"/>
          <line x1="726" y1="300" x2="726" y2="322"/>
          <line x1="746" y1="300" x2="746" y2="322"/>
        </g>
      </g>

      <!-- Priya, sleeves rolled, gesturing down at the mat -->
      <use href="#priya" x="470" y="120" width="120" height="170"/>
      <!-- her arm pointing at mat -->
      <path d="M498 210 q-20 40 -22 80" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Doug watching -->
      <use href="#doug" x="640" y="122" width="120" height="170"/>

      <!-- Priya balloon -->
      <path d="M520 40 h180 a4 4 0 0 1 4 4 v54 a4 4 0 0 1 -4 4 h-120 l-16 18 l0 -18 h-44 a4 4 0 0 1 -4 -4 v-54 a4 4 0 0 1 4 -4 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="612" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">This mat already does</text>
      <text x="612" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">its one job. You wipe</text>
      <text x="612" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">your feet. It's perfect.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="c3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="829.5" y1="292" x2="1226" y2="292" stroke="#111" stroke-width="2"/>

      <!-- the mat again, now sole object of admiration -->
      <g>
        <rect x="900" y="298" width="256" height="28" rx="4" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
        <g stroke="#111" stroke-width="1.4">
          <line x1="916" y1="302" x2="916" y2="322"/>
          <line x1="936" y1="302" x2="936" y2="322"/>
          <line x1="956" y1="302" x2="956" y2="322"/>
          <line x1="976" y1="302" x2="976" y2="322"/>
          <line x1="996" y1="302" x2="996" y2="322"/>
          <line x1="1016" y1="302" x2="1016" y2="322"/>
          <line x1="1036" y1="302" x2="1036" y2="322"/>
          <line x1="1056" y1="302" x2="1056" y2="322"/>
          <line x1="1076" y1="302" x2="1076" y2="322"/>
          <line x1="1096" y1="302" x2="1096" y2="322"/>
          <line x1="1116" y1="302" x2="1116" y2="322"/>
          <line x1="1136" y1="302" x2="1136" y2="322"/>
        </g>
      </g>

      <!-- Priya, arms folded, calm win -->
      <use href="#priya" x="856" y="122" width="118" height="168"/>

      <!-- Doug beside her, mug up -->
      <use href="#doug" x="1040" y="124" width="118" height="168"/>

      <!-- monitor small on a side desk, clanker inside, agreeing -->
      <g>
        <rect x="978" y="196" width="86" height="64" rx="5" fill="#dedad0" stroke="#111" stroke-width="2.5"/>
        <rect x="985" y="203" width="72" height="50" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
        <use href="#clanker" x="998" y="206" width="46" height="40"/>
      </g>

      <!-- Doug balloon -->
      <path d="M1030 150 h150 a4 4 0 0 1 4 4 v34 a4 4 0 0 1 -4 4 h-90 l-14 16 l0 -16 h-46 a4 4 0 0 1 -4 -4 v-34 a4 4 0 0 1 4 -4 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1109" y="172" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It already knows my</text>
      <text x="1109" y="190" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">shoes anyway.</text>

      <!-- clanker balloon: rectangular, dashed to its screen -->
      <line x1="1021" y1="228" x2="1000" y2="262" stroke="#111" stroke-width="1.3" stroke-dasharray="4 4"/>
      <rect x="852" y="216" width="158" height="52" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="931" y="236" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Agreed. I've filed a</text>
      <text x="931" y="252" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">ticket to keep the mat</text>
      <text x="931" y="268" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">exactly as it is.</text>
    </g>
  </g>
</svg>