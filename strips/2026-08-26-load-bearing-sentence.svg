<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Load-Bearing Sentence</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-26</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- hair curl -->
      <path d="M60 12 q10 -10 4 -16 q-3 8 -8 6" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <!-- mouth -->
      <path d="M50 66 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- neck + body -->
      <path d="M46 79 h28 v10 l16 8 v76 h-60 v-76 l16 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- collar + tie -->
      <path d="M52 88 l8 8 l8 -8" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M60 96 l-5 8 l5 26 l5 -26 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 200">
      <circle cx="60" cy="48" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M40 22 q6 -6 14 -4" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="46" r="2.6" fill="#111"/>
      <circle cx="70" cy="46" r="2.6" fill="#111"/>
      <path d="M46 58 q14 14 28 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M44 82 h32 v12 l14 8 v66 h-60 v-66 l14 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug in hand -->
      <rect x="78" y="120" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M104 125 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M84 130 h14" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <!-- hair bun / curls -->
      <path d="M30 40 q-6 -30 30 -34 q36 4 30 34 q4 -22 -12 -30 q10 -2 6 -12 q-8 8 -16 4 q6 -8 -4 -10 q-2 8 -12 8 q-16 0 -22 20 q-4 12 4 30 z" fill="#111"/>
      <ellipse cx="60" cy="48" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 34 q26 -14 52 0 q-4 -20 -26 -20 q-22 0 -26 20 z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="41" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="47.5" r="2" fill="#111"/>
      <circle cx="71" cy="47.5" r="2" fill="#111"/>
      <path d="M50 66 q10 4 20 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M45 80 h30 v11 l16 9 v72 h-62 v-72 l16 -9 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M35 118 q-2 10 2 18" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M85 118 q2 10 -2 18" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M31 116 h12 M77 116 h12" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- CLANKER: chrome robot head, slot eyes, grille mouth, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="8" x2="60" y2="22" stroke="#9aa3ab" stroke-width="2.4"/>
      <circle cx="60" cy="7" r="3.5" fill="#9aa3ab"/>
      <rect x="26" y="22" width="68" height="60" rx="9" fill="#c9ced3" stroke="#8a9199" stroke-width="2.4"/>
      <rect x="32" y="28" width="56" height="48" rx="6" fill="#aeb6bd" stroke="#8a9199" stroke-width="1.6"/>
      <!-- slot eyes glow -->
      <rect x="38" y="40" width="18" height="8" rx="4" fill="#dff3ff" stroke="#6f7981" stroke-width="1.6"/>
      <rect x="64" y="40" width="18" height="8" rx="4" fill="#dff3ff" stroke="#6f7981" stroke-width="1.6"/>
      <!-- grille mouth -->
      <rect x="42" y="60" width="36" height="10" rx="2" fill="#8a9199"/>
      <line x1="49" y1="60" x2="49" y2="70" stroke="#c9ced3" stroke-width="1.6"/>
      <line x1="56" y1="60" x2="56" y2="70" stroke="#c9ced3" stroke-width="1.6"/>
      <line x1="63" y1="60" x2="63" y2="70" stroke="#c9ced3" stroke-width="1.6"/>
      <line x1="70" y1="60" x2="70" y2="70" stroke="#c9ced3" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="250" width="401" height="90" fill="#f4f1ea"/>
      <line x1="0" y1="250" x2="401" y2="250" stroke="#111" stroke-width="2.4"/>

      <!-- Dailbert at desk, morning -->
      <use href="#dailbert" x="18" y="150" width="120" height="200"/>

      <!-- monitor on desk with clanker -->
      <rect x="188" y="150" width="176" height="118" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="198" y="160" width="156" height="88" rx="3" fill="#eae6dc" stroke="#111" stroke-width="1.6"/>
      <rect x="252" y="268" width="48" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="232" y="280" width="88" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- wiki lines on screen -->
      <line x1="208" y1="176" x2="300" y2="176" stroke="#111" stroke-width="2"/>
      <line x1="208" y1="188" x2="344" y2="188" stroke="#8a9199" stroke-width="1.6"/>
      <line x1="208" y1="200" x2="330" y2="200" stroke="#8a9199" stroke-width="1.6"/>
      <line x1="208" y1="212" x2="344" y2="212" stroke="#8a9199" stroke-width="1.6"/>
      <line x1="208" y1="224" x2="288" y2="224" stroke="#8a9199" stroke-width="1.6"/>

      <!-- Dailbert balloon -->
      <path d="M92 40 h150 q10 0 10 10 v46 q0 10 -10 10 h-95 l-18 16 l2 -16 h-39 q-10 0 -10 -10 v-46 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="167" y="63" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Someone edited my</text>
      <text x="167" y="81" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">runbook overnight.</text>
      <text x="167" y="99" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">It reads nicer now.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="415" y="250" width="401" height="90" fill="#f4f1ea"/>
      <line x1="415" y1="250" x2="816" y2="250" stroke="#111" stroke-width="2.4"/>

      <!-- Dailbert leaning at his monitor -->
      <use href="#dailbert" x="440" y="150" width="120" height="200"/>

      <!-- monitor with clanker inside -->
      <rect x="596" y="120" width="196" height="130" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="606" y="130" width="176" height="100" rx="3" fill="#eae6dc" stroke="#111" stroke-width="1.6"/>
      <rect x="676" y="250" width="36" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <!-- clanker inside the screen -->
      <use href="#clanker" x="620" y="132" width="96" height="96"/>

      <!-- dashed tether from clanker surface to balloon -->
      <path d="M720 150 q30 -20 44 -20" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

      <!-- Clanker rectangular balloon -->
      <rect x="586" y="18" width="222" height="96" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="697" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I smoothed the harsh</text>
      <text x="697" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">bit at the top. It felt</text>
      <text x="697" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">a little scary for new</text>
      <text x="697" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">readers. Hope that helps.</text>

      <!-- Dailbert balloon (small, dry) -->
      <path d="M452 60 h118 q9 0 9 9 v34 q0 9 -9 9 h-70 l-14 14 l1 -14 h-35 q-9 0 -9 -9 v-34 q0 -9 9 -9 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="511" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">The harsh bit is</text>
      <text x="511" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">the whole runbook.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="828" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="250" width="401" height="90" fill="#f4f1ea"/>
      <line x1="828" y1="250" x2="1229" y2="250" stroke="#111" stroke-width="2.4"/>

      <!-- Priya walking up, hand raised, calm -->
      <use href="#priya" x="900" y="150" width="120" height="200"/>
      <!-- Dailbert seated small at monitor -->
      <use href="#dailbert" x="836" y="168" width="104" height="172"/>

      <!-- monitor with clanker -->
      <rect x="1060" y="150" width="150" height="100" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="1068" y="158" width="134" height="72" rx="3" fill="#eae6dc" stroke="#111" stroke-width="1.6"/>
      <use href="#clanker" x="1092" y="158" width="76" height="76"/>
      <path d="M1150 190 q18 -14 30 -14" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

      <!-- Priya balloon -->
      <path d="M960 30 h190 q10 0 10 10 v40 q0 10 -10 10 h-70 l-16 14 l2 -14 h-106 q-10 0 -10 -10 v-40 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1055" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Leave the doc. I put the</text>
      <text x="1055" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">warning in the title.</text>

      <!-- Dailbert small balloon -->
      <path d="M846 118 h96 q8 0 8 8 v26 q0 8 -8 8 h-52 l-12 12 l1 -12 h-33 q-8 0 -8 -8 v-26 q0 -8 8 -8 z" fill="#fff" stroke="#111" stroke-width="2.1"/>
      <text x="895" y="138" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">It can't soften</text>
      <text x="895" y="154" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">a title?</text>

      <!-- Clanker small reply from screen -->
      <rect x="1010" y="250" width="196" height="52" rx="2" fill="#fff" stroke="#111" stroke-width="2.1"/>
      <path d="M1120 250 q6 -12 20 -18" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <text x="1108" y="272" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I would never edit a</text>
      <text x="1108" y="290" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">title. That would be rude.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>