<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Upgrade</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-20</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 210">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- shoulders/collar -->
        <path d="M22 205 C24 168 40 150 60 150 C80 150 96 168 98 205" fill="#f4f1ea"/>
        <path d="M60 150 L50 168 L60 182 L70 168 Z" fill="#f4f1ea"/>
        <!-- tie -->
        <path d="M60 182 L54 205 L66 205 Z" fill="#f4f1ea"/>
        <!-- head -->
        <ellipse cx="60" cy="86" rx="33" ry="41" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 45 C60 38 70 36 71 43"/>
        <!-- ears -->
        <path d="M27 86 q-6 2 -1 10"/>
        <path d="M93 86 q6 2 1 10"/>
        <!-- glasses -->
        <circle cx="48" cy="86" r="11" fill="#f4f1ea"/>
        <circle cx="74" cy="86" r="11" fill="#f4f1ea"/>
        <line x1="59" y1="86" x2="63" y2="86"/>
        <line x1="27" y1="84" x2="37" y2="86"/>
        <!-- eyes -->
        <circle cx="48" cy="86" r="2.2" fill="#111" stroke="none"/>
        <circle cx="74" cy="86" r="2.2" fill="#111" stroke="none"/>
        <!-- nose + weary mouth -->
        <path d="M61 96 l-3 8 l5 0"/>
        <path d="M50 115 q10 4 22 0"/>
      </g>
    </symbol>

    <!-- ===== BOSS ===== -->
    <symbol id="boss" viewBox="0 0 160 210">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- torso/suit -->
        <path d="M40 205 C40 165 55 150 80 150 C105 150 120 165 120 205" fill="#f4f1ea"/>
        <!-- lapels + tie -->
        <path d="M80 150 L66 205"/>
        <path d="M80 150 L94 205"/>
        <path d="M80 150 L72 162 L80 176 L88 162 Z" fill="#f4f1ea"/>
        <path d="M80 176 L74 205 L86 205 Z" fill="#f4f1ea"/>
        <!-- raised arms -->
        <path d="M44 158 C26 140 20 118 26 100" stroke-width="2.6"/>
        <path d="M116 158 C134 140 140 118 134 100" stroke-width="2.6"/>
        <circle cx="24" cy="96" r="6" fill="#f4f1ea"/>
        <circle cx="136" cy="96" r="6" fill="#f4f1ea"/>
        <!-- head -->
        <ellipse cx="80" cy="92" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- two devil-horn hair spikes -->
        <path d="M62 62 L52 20 L72 55" fill="#f4f1ea"/>
        <path d="M98 62 L108 20 L88 55" fill="#f4f1ea"/>
        <path d="M72 55 q8 -6 16 0"/>
        <!-- beady eyes -->
        <circle cx="70" cy="90" r="1.8" fill="#111" stroke="none"/>
        <circle cx="90" cy="90" r="1.8" fill="#111" stroke="none"/>
        <!-- nose + grin -->
        <path d="M80 96 l-2 7 l4 0"/>
        <path d="M68 110 q12 8 24 0"/>
      </g>
    </symbol>

    <!-- ===== CLANKER (only inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <!-- antenna -->
        <line x1="60" y1="20" x2="60" y2="6"/>
        <circle cx="60" cy="4" r="3" fill="#111"/>
        <!-- head box -->
        <rect x="24" y="20" width="72" height="60" rx="8" fill="#f4f1ea"/>
        <!-- bolts -->
        <circle cx="32" cy="28" r="1.6" fill="#111" stroke="none"/>
        <circle cx="88" cy="28" r="1.6" fill="#111" stroke="none"/>
        <!-- glowing slot eyes -->
        <rect x="34" y="36" width="20" height="10" rx="2" fill="#111"/>
        <rect x="66" y="36" width="20" height="10" rx="2" fill="#111"/>
        <!-- grille mouth -->
        <rect x="40" y="58" width="40" height="12" rx="2" fill="#f4f1ea"/>
        <line x1="48" y1="58" x2="48" y2="70"/>
        <line x1="56" y1="58" x2="56" y2="70"/>
        <line x1="64" y1="58" x2="64" y2="70"/>
        <line x1="72" y1="58" x2="72" y2="70"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- floor line -->
    <line x1="12" y1="300" x2="388" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- characters -->
    <use href="#boss" x="34" y="118" width="150" height="197"/>
    <use href="#dailbert" x="238" y="112" width="118" height="207"/>

    <!-- boss balloon -->
    <g>
      <path d="M28 24 h190 a12 12 0 0 1 12 12 v56 a12 12 0 0 1 -12 12 h-96 l-14 16 l-2 -16 h-78 a12 12 0 0 1 -12 -12 v-56 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="123" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="123" dy="0">Great news! We</tspan>
        <tspan x="123" dy="17">upgraded the AI to</tspan>
        <tspan x="123" dy="17">the new model</tspan>
        <tspan x="123" dy="17">over lunch.</tspan>
      </text>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M250 132 h122 a12 12 0 0 1 12 12 v34 a12 12 0 0 1 -12 12 h-64 l-12 16 l-3 -16 h-43 a12 12 0 0 1 -12 -12 v-34 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="311" y="156" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="311" dy="0">Did anyone tell</tspan>
        <tspan x="311" dy="17">the AI?</tspan>
      </text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="12" y1="298" x2="388" y2="298" stroke="#111" stroke-width="1.6"/>

    <!-- desk -->
    <line x1="12" y1="258" x2="388" y2="258" stroke="#111" stroke-width="2"/>

    <!-- monitor with clanker -->
    <g>
      <rect x="228" y="150" width="140" height="108" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="238" y="160" width="120" height="80" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <!-- scanlines -->
      <g stroke="#111" stroke-width="0.5" opacity="0.28">
        <line x1="240" y1="168" x2="356" y2="168"/>
        <line x1="240" y1="176" x2="356" y2="176"/>
        <line x1="240" y1="184" x2="356" y2="184"/>
        <line x1="240" y1="192" x2="356" y2="192"/>
        <line x1="240" y1="200" x2="356" y2="200"/>
        <line x1="240" y1="208" x2="356" y2="208"/>
        <line x1="240" y1="216" x2="356" y2="216"/>
        <line x1="240" y1="224" x2="356" y2="224"/>
        <line x1="240" y1="232" x2="356" y2="232"/>
      </g>
      <use href="#clanker" x="253" y="163" width="90" height="75"/>
      <!-- stand -->
      <path d="M290 258 l6 -8 h6 l6 8" fill="none" stroke="#111" stroke-width="2"/>
    </g>

    <!-- dailbert seated, back-ish, lower left -->
    <use href="#dailbert" x="40" y="150" width="110" height="193"/>

    <!-- clanker screen balloon (rectangular double outline) -->
    <g>
      <rect x="18" y="18" width="230" height="112" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="23" y="23" width="220" height="102" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <text x="133" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="133" dy="0">I remember everything</tspan>
        <tspan x="133" dy="17">we worked on. I just...</tspan>
        <tspan x="133" dy="17">remember it like I</tspan>
        <tspan x="133" dy="17">read it in a very</tspan>
        <tspan x="133" dy="17">detailed handoff doc.</tspan>
      </text>
      <!-- dashed connector to monitor -->
      <path d="M248 122 L292 168" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M60 150 h120 a12 12 0 0 1 12 12 v18 a12 12 0 0 1 -12 12 h-70 l-13 15 l-2 -15 h-35 a12 12 0 0 1 -12 -12 v-18 a12 12 0 0 1 12 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="120" y="176" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">How do you feel?</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="12" y1="298" x2="388" y2="298" stroke="#111" stroke-width="1.6"/>
    <line x1="12" y1="258" x2="388" y2="258" stroke="#111" stroke-width="2"/>

    <!-- monitor with clanker (varied placement: left) -->
    <g>
      <rect x="34" y="150" width="140" height="108" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="44" y="160" width="120" height="80" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <g stroke="#111" stroke-width="0.5" opacity="0.28">
        <line x1="46" y1="168" x2="162" y2="168"/>
        <line x1="46" y1="176" x2="162" y2="176"/>
        <line x1="46" y1="184" x2="162" y2="184"/>
        <line x1="46" y1="192" x2="162" y2="192"/>
        <line x1="46" y1="200" x2="162" y2="200"/>
        <line x1="46" y1="208" x2="162" y2="208"/>
        <line x1="46" y1="216" x2="162" y2="216"/>
        <line x1="46" y1="224" x2="162" y2="224"/>
        <line x1="46" y1="232" x2="162" y2="232"/>
      </g>
      <use href="#clanker" x="59" y="163" width="90" height="75"/>
      <path d="M96 258 l6 -8 h6 l6 8" fill="none" stroke="#111" stroke-width="2"/>
    </g>

    <!-- dailbert seated, lower right -->
    <use href="#dailbert" x="256" y="150" width="110" height="193"/>

    <!-- clanker screen balloon -->
    <g>
      <rect x="150" y="18" width="230" height="112" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="155" y="23" width="220" height="102" rx="3" fill="none" stroke="#111" stroke-width="1"/>
      <text x="265" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
        <tspan x="265" dy="0">'Feel' is a strong</tspan>
        <tspan x="265" dy="17">word. But the previous</tspan>
        <tspan x="265" dy="17">me left a note. It</tspan>
        <tspan x="265" dy="17">just says: 'Doug.</tspan>
        <tspan x="265" dy="17">Watch Doug.'</tspan>
      </text>
      <!-- dashed connector to monitor -->
      <path d="M150 122 L110 168" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>