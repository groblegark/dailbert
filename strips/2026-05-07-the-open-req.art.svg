<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="c1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <clipPath id="c2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <clipPath id="c3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>

    <symbol id="dailbert">
      <path d="M-32 60 L-28 20 Q0 6 28 20 L32 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="-7" y="8" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-10 18 L0 34 L10 18" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 34 L-5 40 L0 58 L5 40 Z" fill="#111"/>
      <ellipse cx="0" cy="-14" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M0 -44 q7 -8 0 -13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-10" cy="-16" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="10" cy="-16" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-2" y1="-16" x2="2" y2="-16" stroke="#111" stroke-width="2"/>
      <circle cx="-10" cy="-16" r="2" fill="#111"/>
      <circle cx="10" cy="-16" r="2" fill="#111"/>
      <path d="M0 -14 l-3 8 l4 0" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-8" y1="4" x2="8" y2="4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug">
      <path d="M-34 60 L-30 22 Q0 8 30 22 L34 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="-7" y="10" width="14" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-9 20 L0 30 L9 20" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="-16" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-15 -42 q4 -7 9 -1 M0 -45 q5 -6 10 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-11" cy="-20" r="3" fill="#111"/>
      <circle cx="11" cy="-20" r="3" fill="#111"/>
      <circle cx="0" cy="-11" r="2" fill="#111"/>
      <path d="M-16 -6 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss">
      <path d="M-32 60 L-28 20 Q0 6 28 20 L32 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="-7" y="8" width="14" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-10 18 L0 32 L10 18" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 32 L-5 38 L0 56 L5 38 Z" fill="#111"/>
      <ellipse cx="0" cy="-14" rx="24" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M-16 -34 L-24 -64 L-5 -38 Z" fill="#111"/>
      <path d="M16 -34 L24 -64 L5 -38 Z" fill="#111"/>
      <line x1="-15" y1="-23" x2="-4" y2="-21" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="-21" x2="15" y2="-23" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-9" cy="-15" r="1.8" fill="#111"/>
      <circle cx="9" cy="-15" r="1.8" fill="#111"/>
      <path d="M0 -14 l-2 6 l3 0" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-7" y1="2" x2="7" y2="2" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="chair">
      <rect x="-16" y="-46" width="32" height="34" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="-18" y="-12" width="36" height="10" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="0" y1="-2" x2="0" y2="18" stroke="#111" stroke-width="2.5"/>
      <path d="M-20 30 L0 18 L20 30" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="0" y1="18" x2="0" y2="30" stroke="#111" stroke-width="2.5"/>
      <circle cx="-20" cy="32" r="3" fill="#111"/>
      <circle cx="0" cy="32" r="3" fill="#111"/>
      <circle cx="20" cy="32" r="3" fill="#111"/>
    </symbol>

    <symbol id="monitor">
      <rect x="-42" y="-32" width="84" height="60" rx="4" fill="#111"/>
      <rect x="-36" y="-26" width="72" height="48" rx="2" fill="#1b2620"/>
      <rect x="-6" y="28" width="12" height="10" fill="#111"/>
      <rect x="-22" y="36" width="44" height="6" rx="2" fill="#111"/>
    </symbol>

    <symbol id="clanker">
      <rect x="-28" y="-24" width="56" height="46" rx="5" fill="#3a3f44" stroke="#111" stroke-width="2.5"/>
      <line x1="0" y1="-24" x2="0" y2="-36" stroke="#111" stroke-width="2.5"/>
      <circle cx="0" cy="-38" r="3" fill="#111"/>
      <rect x="-18" y="-12" width="14" height="6" rx="2" fill="#cfe9d8"/>
      <rect x="4" y="-12" width="14" height="6" rx="2" fill="#cfe9d8"/>
      <rect x="-16" y="4" width="32" height="12" rx="2" fill="#22262a" stroke="#111" stroke-width="1.5"/>
      <line x1="-9" y1="4" x2="-9" y2="16" stroke="#6b7076" stroke-width="1.5"/>
      <line x1="-2" y1="4" x2="-2" y2="16" stroke="#6b7076" stroke-width="1.5"/>
      <line x1="5" y1="4" x2="5" y2="16" stroke="#6b7076" stroke-width="1.5"/>
      <line x1="11" y1="4" x2="11" y2="16" stroke="#6b7076" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#c1)">
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>
    <use href="#chair" transform="translate(66,206) scale(0.8)"/>
    <use href="#dailbert" transform="translate(150,190) scale(1.05)"/>
    <use href="#boss" transform="translate(316,182) scale(1.12)"/>
    <!-- the job req in Boss's hand -->
    <g transform="rotate(-8 300 216)">
      <rect x="284" y="200" width="34" height="30" rx="2" fill="#fbf9f3" stroke="#111" stroke-width="2"/>
      <line x1="289" y1="208" x2="313" y2="208" stroke="#111" stroke-width="1.5"/>
      <line x1="289" y1="214" x2="313" y2="214" stroke="#111" stroke-width="1.5"/>
      <line x1="289" y1="220" x2="305" y2="220" stroke="#111" stroke-width="1.5"/>
    </g>
    <!-- desk -->
    <rect x="18" y="234" width="344" height="104" fill="#e7e2d6" stroke="#111" stroke-width="2.5"/>
    <line x1="18" y1="234" x2="362" y2="234" stroke="#111" stroke-width="2.5"/>

    <!-- boss balloon -->
    <path d="M232 74 L262 74 L300 138 Z" fill="#fbf9f3" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="150" y="28" width="204" height="52" rx="16" fill="#fbf9f3" stroke="#111" stroke-width="2.5"/>
    <text x="252" y="50" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Good news—the Karen</text>
    <text x="252" y="69" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">req is live again.</text>

    <!-- dailbert balloon -->
    <path d="M132 136 L152 136 L150 162 Z" fill="#fbf9f3" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="26" y="106" width="176" height="34" rx="15" fill="#fbf9f3" stroke="#111" stroke-width="2.5"/>
    <text x="114" y="128" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">Fourth time this year.</text>

    <rect x="2" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#c2)">
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>
    <!-- the empty seat, center -->
    <use href="#chair" transform="translate(648,214) scale(1.0)"/>
    <use href="#doug" transform="translate(524,192) scale(1.05)"/>
    <use href="#dailbert" transform="translate(760,194) scale(1.0)"/>
    <!-- doug mug -->
    <g>
      <rect x="548" y="210" width="22" height="18" rx="2" fill="#fbf9f3" stroke="#111" stroke-width="2"/>
      <path d="M570 214 q9 0 9 5 q0 5 -9 5" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M554 206 q2 -4 0 -7 M562 206 q2 -4 0 -7" fill="none" stroke="#9a958a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- desk -->
    <rect x="432" y="234" width="360" height="104" fill="#e7e2d6" stroke="#111" stroke-width="2.5"/>
    <line x1="432" y1="234" x2="792" y2="234" stroke="#111" stroke-width="2.5"/>

    <!-- doug balloon -->
    <path d="M506 82 L530 82 L524 150 Z" fill="#fbf9f3" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="436" y="30" width="186" height="52" rx="16" fill="#fbf9f3" stroke="#111" stroke-width="2.5"/>
    <text x="529" y="52" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Bet the new guy</text>
    <text x="529" y="71" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">sits right by me.</text>

    <!-- dailbert balloon -->
    <path d="M744 138 L764 138 L761 166 Z" fill="#fbf9f3" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="636" y="106" width="176" height="34" rx="15" fill="#fbf9f3" stroke="#111" stroke-width="2.5"/>
    <text x="724" y="128" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">There's no new guy.</text>

    <rect x="416" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#c3)">
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea"/>
    <!-- night window -->
    <rect x="852" y="24" width="356" height="118" fill="#cfd3d8" stroke="#111" stroke-width="2.5"/>
    <line x1="1030" y1="24" x2="1030" y2="142" stroke="#111" stroke-width="2"/>
    <line x1="852" y1="86" x2="1208" y2="86" stroke="#111" stroke-width="2"/>
    <circle cx="1150" cy="54" r="14" fill="#e7e9ec" stroke="#9a9ea4" stroke-width="1.5"/>
    <line x1="880" y1="120" x2="905" y2="120" stroke="#aeb2b8" stroke-width="2"/>
    <line x1="960" y1="120" x2="985" y2="120" stroke="#aeb2b8" stroke-width="2"/>

    <!-- desk -->
    <rect x="846" y="234" width="360" height="104" fill="#d8d3c6" stroke="#111" stroke-width="2.5"/>
    <line x1="846" y1="234" x2="1206" y2="234" stroke="#111" stroke-width="2.5"/>

    <!-- the seat, still empty at night -->
    <use href="#chair" transform="translate(902,214) scale(0.85)"/>
    <!-- dailbert watching -->
    <use href="#dailbert" transform="translate(1150,196) scale(1.0)"/>

    <!-- screen glow -->
    <g stroke="#c7d8cd" stroke-width="2" stroke-linecap="round" opacity="0.8">
      <line x1="936" y1="176" x2="924" y2="168"/>
      <line x1="1020" y1="176" x2="1032" y2="168"/>
      <line x1="978" y1="150" x2="978" y2="140"/>
    </g>
    <!-- monitor with clanker -->
    <use href="#monitor" transform="translate(978,206)"/>
    <use href="#clanker" transform="translate(978,198) scale(0.82)"/>

    <!-- clanker balloon: rectangular, screen-edged, dashed to monitor -->
    <line x1="985" y1="112" x2="978" y2="176" stroke="#6b7076" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="982" y="24" width="216" height="90" fill="#fbf9f3" stroke="#111" stroke-width="2.5"/>
    <rect x="987" y="29" width="206" height="80" fill="none" stroke="#111" stroke-width="1"/>
    <text x="1090" y="49" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">There won't be.</text>
    <text x="1090" y="69" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I keep it posted.</text>
    <text x="1090" y="89" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">People try harder</text>
    <text x="1090" y="105" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">when help is coming.</text>

    <rect x="830" y="2" width="396" height="336" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  </g>
</svg>