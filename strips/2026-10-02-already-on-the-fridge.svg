<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Already on the Fridge</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-10-02</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT: oval head, round wire glasses, tie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="46" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 10 q10 -10 4 -18 q10 6 2 18" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="47" r="2" fill="#111"/>
      <circle cx="71" cy="47" r="2" fill="#111"/>
      <path d="M52 64 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 82 L82 82 L92 170 L28 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 82 L54 100 L60 118 L66 100 Z" fill="#111"/>
      <line x1="60" y1="82" x2="60" y2="90" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 140 200">
      <circle cx="62" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="44" r="3" fill="#111"/>
      <circle cx="74" cy="44" r="3" fill="#111"/>
      <path d="M46 58 q16 18 32 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M38 84 L86 84 L96 172 L28 172 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M86 96 q30 6 34 30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="108" y="120" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M134 124 q10 0 10 9 q0 9 -10 9" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M113 120 q8 -8 16 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- CLANKER: boxy chrome head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#8a8a8a" stroke-width="2.5"/>
      <circle cx="60" cy="6" r="4" fill="#8a8a8a"/>
      <rect x="24" y="20" width="72" height="60" rx="8" fill="#3a3f47" stroke="#7f8a95" stroke-width="2.5"/>
      <rect x="34" y="38" width="22" height="9" rx="3" fill="#bfe9ff"/>
      <rect x="64" y="38" width="22" height="9" rx="3" fill="#bfe9ff"/>
      <line x1="38" y1="62" x2="82" y2="62" stroke="#7f8a95" stroke-width="2"/>
      <line x1="38" y1="68" x2="82" y2="68" stroke="#7f8a95" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="2.5"/>
      <use href="#dailbert" x="30" y="120" width="120" height="200"/>
      <use href="#doug" x="220" y="120" width="140" height="200"/>
      <!-- phone held up -->
      <rect x="150" y="196" width="34" height="52" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="155" y="203" width="24" height="34" rx="2" fill="#eae5d8" stroke="#111" stroke-width="1.5"/>
      <circle cx="162" cy="210" r="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <line x1="170" y1="220" x2="170" y2="230" stroke="#111" stroke-width="1.5"/>
      <circle cx="170" cy="216" r="3" fill="none" stroke="#111" stroke-width="1.2"/>
      <line x1="166" y1="224" x2="174" y2="224" stroke="#111" stroke-width="1.5"/>
      <path d="M112 205 q22 -6 38 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

      <path d="M60 40 h150 a12 12 0 0 1 12 12 v34 a12 12 0 0 1 -12 12 h-90 l-16 16 l2 -16 h-46 a12 12 0 0 1 -12 -12 v-34 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="135" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">My kid drew this.</text>
      <text x="135" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's a horse. Or me.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="415" y1="300" x2="814" y2="300" stroke="#111" stroke-width="2.5"/>
      <use href="#dailbert" x="470" y="120" width="120" height="200"/>
      <use href="#doug" x="640" y="120" width="140" height="200"/>

      <!-- monitor with clanker inside -->
      <rect x="560" y="150" width="130" height="96" rx="6" fill="#20242a" stroke="#111" stroke-width="2.5"/>
      <rect x="608" y="246" width="34" height="14" fill="#20242a" stroke="#111" stroke-width="2.5"/>
      <rect x="588" y="258" width="74" height="8" rx="3" fill="#3a3f47" stroke="#111" stroke-width="2"/>
      <line x1="568" y1="162" x2="682" y2="162" stroke="#39424c" stroke-width="1"/>
      <line x1="568" y1="238" x2="682" y2="238" stroke="#39424c" stroke-width="1"/>
      <use href="#clanker" x="588" y="158" width="74" height="74"/>

      <line x1="625" y1="150" x2="600" y2="118" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="440" y="30" width="300" height="82" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="440" y1="38" x2="740" y2="38" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="590" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I can enhance and upscale it.</text>
      <text x="590" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Straighter legs. Correct</text>
      <text x="590" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">number of legs.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="829" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="2.5"/>
      <use href="#dailbert" x="880" y="120" width="120" height="200"/>
      <use href="#doug" x="1040" y="120" width="140" height="200"/>

      <rect x="960" y="168" width="96" height="72" rx="5" fill="#20242a" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="978" y="176" width="60" height="60"/>
      <rect x="998" y="240" width="24" height="10" fill="#20242a" stroke="#111" stroke-width="2"/>

      <path d="M905 26 h250 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-118 l-16 16 l2 -16 h-118 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1030" y="48" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Nah. Original's on my</text>
      <text x="1030" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">fridge. Right number of</text>
      <text x="1030" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">legs already.</text>

      <line x1="1004" y1="168" x2="1000" y2="150" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="845" y="116" width="150" height="34" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="845" y1="124" x2="995" y2="124" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="920" y="132" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Noted. Filing the</text>
      <text x="920" y="146" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">crayons as final.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>