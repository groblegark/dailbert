<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Oh, Good</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2029-04-30</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)"><defs><style>text{font-family:'Comic Sans MS','Segoe Print',cursive;font-size:14px;fill:#111;text-anchor:middle}.i{fill:none;stroke:#111;stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}.paper{fill:#f4f1ea}.fill{fill:#111}.b{fill:#f4f1ea;stroke:#111;stroke-width:3}.c{fill:none;stroke:#111;stroke-width:1.4;stroke-dasharray:4 4}</style>

