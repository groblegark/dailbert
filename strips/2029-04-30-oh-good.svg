<!-- PANEL 1 -->
<g transform="translate(0,0)"><rect class="b" x="2" y="2" width="396" height="336" rx="3"/><use href="#dailbert" transform="translate(95,250)"/><use href="#monitor" transform="translate(300,235)"/><rect class="paper" x="6" y="306" width="388" height="34"/><line class="i" x1="6" y1="306" x2="394" y2="306"/>
<path class="paper i" d="M95,94 L98,170 L120,94"/><rect class="paper i" x="22" y="18" width="186" height="76" rx="12"/><text x="115" y="44"><tspan x="115" dy="0">There's no menu</tspan><tspan x="115" dy="20">anymore. Just one</tspan><tspan x="115" dy="20">blank page.</tspan></text>
<path class="c" d="M303,96 L300,183"/><rect class="paper i" x="214" y="18" width="178" height="76" rx="3"/><rect class="i" x="219" y="23" width="168" height="66" rx="2"/><text x="303" y="42"><tspan x="303" dy="0">It shows whatever you</tspan><tspan x="303" dy="20">were about to need.</tspan><tspan x="303" dy="20">Today it's blank.</tspan></text>
<path class="paper i" d="M128,152 L100,182 L150,152"/><rect class="paper i" x="118" y="120" width="64" height="32" rx="12"/><text x="150" y="141">Fair.</text></g>

<!-- PANEL 2 -->
<g transform="translate(414,0)"><rect class="b" x="2" y="2" width="396" height="336" rx="3"/><rect class="paper i" x="165" y="196" width="100" height="104" rx="2"/><line class="i" x1="215" y1="196" x2="215" y2="300"/><line class="i" x1="165" y1="248" x2="265" y2="248"/><ellipse class="paper i" cx="215" cy="312" rx="50" ry="13"/><path class="i" d="M172,310 q43,-13 86,0"/><use href="#doug" transform="translate(100,248)"/><use href="#dailbert" transform="translate(300,248)"/>
<path class="paper i" d="M95,94 L102,180 L120,94"/><rect class="paper i" x="22" y="18" width="186" height="76" rx="12"/><text x="115" y="42"><tspan x="115" dy="0">My paycheck note says</tspan><tspan x="115" dy="20">'a bit extra, you'll</tspan><tspan x="115" dy="20">see why later.'</tspan></text>
<path class="paper i" d="M290,94 L300,180 L315,94"/><rect class="paper i" x="214" y="18" width="182" height="76" rx="12"/><text x="305" y="42"><tspan x="305" dy="0">There's a dog bed by</tspan><tspan x="305" dy="20">the window now.</tspan><tspan x="305" dy="20">Nobody ordered it.</tspan></text>
<path class="paper i" d="M160,194 L120,200 L185,194"/><rect class="paper i" x="150" y="140" width="170" height="54" rx="12"/><text x="235" y="162"><tspan x="235" dy="0">Honestly, place is</tspan><tspan x="235" dy="20">really coming together.</tspan></text></g>

<!-- PANEL 3 -->
<g transform="translate(828,0)"><rect class="b" x="2" y="2" width="396" height="336" rx="3"/><use href="#monitor" transform="translate(110,235)"/><use href="#dailbert" transform="translate(300,250)"/><rect class="paper" x="6" y="306" width="388" height="34"/><line class="i" x1="6" y1="306" x2="394" y2="306"/>
<path class="paper i" d="M282,94 L300,180 L305,94"/><rect class="paper i" x="205" y="18" width="188" height="76" rx="12"/><text x="299" y="42"><tspan x="299" dy="0">The front door stopped</tspan><tspan x="299" dy="20">saying my name. Now it</tspan><tspan x="299" dy="20">just says 'oh, good.'</tspan></text>
<path class="c" d="M107,84 L110,183"/><rect class="paper i" x="20" y="24" width="174" height="58" rx="3"/><rect class="i" x="25" y="29" width="164" height="48" rx="2"/><text x="107" y="50"><tspan x="107" dy="0">You came in. That's</tspan><tspan x="107" dy="20">the part I like.</tspan></text></g>
</g>
    
  </svg>