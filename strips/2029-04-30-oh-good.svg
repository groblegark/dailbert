<g id="monitor"><path class="paper i" d="M-10,52 L-14,76 L14,76 L10,52 Z"/><ellipse class="paper i" cx="0" cy="78" rx="27" ry="6"/><rect class="paper i" x="-64" y="-52" width="128" height="104" rx="7"/><rect class="paper i" x="-54" y="-42" width="108" height="84" rx="3"/><g stroke="#111" stroke-width="1" opacity="0.1"><line x1="-54" y1="-34" x2="54" y2="-34"/><line x1="-54" y1="-26" x2="54" y2="-26"/><line x1="-54" y1="-18" x2="54" y2="-18"/><line x1="-54" y1="26" x2="54" y2="26"/><line x1="-54" y1="34" x2="54" y2="34"/></g><path class="i" d="M0,-40 L0,-30"/><circle class="fill" cx="0" cy="-42" r="3"/><rect class="paper i" x="-34" y="-30" width="68" height="54" rx="6"/><rect class="fill" x="-25" y="-16" width="18" height="9" rx="2"/><rect class="fill" x="7" y="-16" width="18" height="9" rx="2"/><line x1="-23" y1="-11.5" x2="-9" y2="-11.5" stroke="#f4f1ea" stroke-width="1.6"/><line x1="9" y1="-11.5" x2="23" y2="-11.5" stroke="#f4f1ea" stroke-width="1.6"/><rect class="paper i" x="-20" y="4" width="40" height="14" rx="2"/><line class="i" x1="-12" y1="4" x2="-12" y2="18"/><line class="i" x1="-4" y1="4" x2="-4" y2="18"/><line class="i" x1="4" y1="4" x2="4" y2="18"/><line class="i" x1="12" y1="4" x2="12" y2="18"/></g>
