        <text x="112" y="56" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">I merged your seven</text>
        <text x="112" y="74" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">recurring meetings into</text>
        <text x="112" y="92" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" fill="#111">one. Less switching.</text>
      </g>
    </g>
