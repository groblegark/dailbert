      <text x="716" y="172" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Backlog: zero.</text>
      <path d="M454 30 h116 q8 0 8 8 v36 q0 8 -8 8 h-50 l-14 18 l-2 -18 h-50 q-8 0 -8 -8 v-36 q0 -8 8 -8 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="512" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Clean burndown.</text>
      <text x="512" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Love it.</text>
    </g>
