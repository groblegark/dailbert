<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Self-Scheduled</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2027-10-04</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="5" height="5" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="5" y2="0" stroke="#111" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>

    <g id="dailbert" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-36 64 C-32 42 -16 34 0 34 C16 34 32 42 36 64 L36 70 L-36 70 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-7 30 L-7 40 L7 40 L7 30" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M-9 37 L0 47 L9 37" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M0 47 L-4 43 L0 41 L4 43 Z M0 47 L-3 62 L3 62 Z" fill="#111" stroke="#111" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-2 -30 q-7 -6 0 -12 q9 -3 4 6" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="-11" cy="-3" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="11" cy="-3" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="-2" y1="-3" x2="2" y2="-3" stroke="#111" stroke-width="2"/>
      <line x1="20" y1="-4" x2="26" y2="-6" stroke="#111" stroke-width="1.6"/>
      <circle cx="-11" cy="-3" r="2" fill="#111"/>
      <circle cx="11" cy="-3" r="2" fill="#111"/>
      <path d="M0 3 L-3 9 L2 9" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M-8 17 Q0 15 8 17" fill="none" stroke="#111" stroke-width="2"/>
    </g>

    <g id="doug" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-38 66 C-34 44 -16 36 0 36 C16 36 34 44 38 66 L38 72 L-38 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-7 32 L-7 42 L7 42 L7 32" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="0" cy="0" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-13 -28 l4 -8 l4 7 l4 -9 l4 8 l4 -6" fill="none" stroke="#111" stroke-width="2.4"/>
      <circle cx="-11" cy="-4" r="2.6" fill="#111"/>
      <circle cx="11" cy="-4" r="2.6" fill="#111"/>
      <path d="M0 0 L-2 5 L2 5" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M-15 7 Q0 24 15 7 Q0 15 -15 7 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <g stroke="#111" stroke-width="2" fill="#f4f1ea">
        <path d="M18 42 L18 60 Q18 64 22 64 L34 64 Q38 64 38 60 L38 42 Z"/>
        <line x1="17" y1="42" x2="39" y2="42"/>
        <path d="M38 46 q9 0 9 7 q0 7 -9 7" fill="none"/>
      </g>
      <path d="M24 38 q-3 -4 0 -8 M32 38 q3 -4 0 -8" fill="none" stroke="#111" stroke-width="1.4"/>
    </g>

    <g id="boss" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-40 66 C-36 42 -18 34 0 34 C18 34 36 42 40 66 L40 72 L-40 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-8 40 L-18 68 M8 40 L18 68 M0 40 L0 68" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M0 40 L-4 46 L0 66 L4 46 Z" fill="#111"/>
      <path d="M-6 30 L-6 38 L6 38 L6 30" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M-34 52 Q-52 40 -50 16" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M34 52 Q52 40 50 16" fill="none" stroke="#111" stroke-width="2.6"/>
      <circle cx="-50" cy="12" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="12" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="24" ry="26" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-15 -22 L-24 -68 L-4 -28 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M15 -22 L24 -68 L4 -28 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M-12 -9 L-4 -6 M12 -9 L4 -6" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="-8" cy="-2" r="1.7" fill="#111"/>
      <circle cx="8" cy="-2" r="1.7" fill="#111"/>
      <path d="M-7 13 Q0 17 7 13" fill="none" stroke="#111" stroke-width="2"/>
    </g>

    <g id="clanker" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="-30" x2="0" y2="-44" stroke="#111" stroke-width="2"/>
      <circle cx="0" cy="-46" r="3" fill="#111"/>
      <rect x="-34" y="-30" width="68" height="56" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="-28" y="-24" width="56" height="44" rx="3" fill="none" stroke="#111" stroke-width="1.4"/>
      <circle cx="-30" cy="-26" r="1.6" fill="#111"/>
      <circle cx="30" cy="-26" r="1.6" fill="#111"/>
      <circle cx="-30" cy="22" r="1.6" fill="#111"/>
      <circle cx="30" cy="22" r="1.6" fill="#111"/>
      <rect x="-24" y="-14" width="18" height="9" rx="2" fill="#111"/>
      <rect x="6" y="-14" width="18" height="9" rx="2" fill="#111"/>
      <path d="M-30 -18 l-4 -3 M-30 -9 l-5 1 M30 -18 l4 -3 M30 -9 l5 1" stroke="#111" stroke-width="1.2"/>
      <rect x="-20" y="4" width="40" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M-12 4 L-12 16 M-4 4 L-4 16 M4 4 L4 16 M12 4 L12 16" stroke="#111" stroke-width="1.4"/>
    </g>
  </defs>

  <!-- ===================== PANEL 1 : desk ===================== -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 285 L386 285" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M14 285 L14 300 M386 285 L386 300" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M113 275 L113 285 M95 285 L131 285" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="48" y="180" width="130" height="95" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="54" y="186" width="118" height="83" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <use href="#clanker" transform="translate(113,224) scale(0.78)"/>
      <rect x="54" y="186" width="118" height="83" fill="url(#scan)"/>
      <use href="#dailbert" transform="translate(300,178) scale(1)"/>
    </g>

    <!-- clanker balloon 1 -->
    <g stroke-linejoin="round">
      <path d="M91 92 L100 178" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="16" y="12" width="150" height="80" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="19" y="15" width="144" height="74" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">
      <text x="91" y="31">Nothing's flagged</text>
      <text x="91" y="48">for you today. I</text>
      <text x="91" y="65">picked my tickets</text>
      <text x="91" y="82">and started at six.</text>
    </g>

    <!-- dailbert balloon -->
    <g stroke-linejoin="round">
      <path d="M298 76 L303 122 L316 76 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="223" y="18" width="164" height="60" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M298 76 L316 76" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
      <text x="305" y="43">You didn't wait</text>
      <text x="305" y="61">to be assigned.</text>
    </g>

    <!-- clanker balloon 2 -->
    <g stroke-linejoin="round">
      <path d="M182 150 L150 178" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="112" y="104" width="140" height="46" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="115" y="107" width="134" height="40" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">
      <text x="182" y="123">There was no one</text>
      <text x="182" y="140">to wait for.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 : office ===================== -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M428 258 L800 258" fill="none" stroke="#111" stroke-width="1.6" stroke-opacity="0.6"/>
      <!-- empty desk A -->
      <rect x="590" y="224" width="62" height="8" rx="1" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M596 232 L596 250 M646 232 L646 250" fill="none" stroke="#111" stroke-width="1.6"/>
      <rect x="610" y="232" width="20" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <!-- empty desk B -->
      <rect x="664" y="216" width="52" height="7" rx="1" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <path d="M670 223 L670 246 M710 223 L710 246" fill="none" stroke="#111" stroke-width="1.4"/>
      <rect x="682" y="224" width="16" height="20" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <use href="#doug" transform="translate(534,206) scale(1)"/>
      <use href="#dailbert" transform="translate(720,206) scale(1)"/>
    </g>

    <!-- doug balloon 1 -->
    <g stroke-linejoin="round">
      <path d="M526 86 L534 132 L548 86 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="442" y="10" width="184" height="78" rx="18" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M526 86 L548 86" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111" text-anchor="middle">
      <text x="534" y="37">Two more desks cleared</text>
      <text x="534" y="55">out. IT wiped the</text>
      <text x="534" y="73">laptops before lunch.</text>
    </g>

    <!-- dailbert balloon -->
    <g stroke-linejoin="round">
      <path d="M718 64 L722 118 L734 64 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="648" y="18" width="156" height="48" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M718 64 L734 64" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <text x="726" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Did they say who?</text>

    <!-- doug balloon 2 -->
    <g stroke-linejoin="round">
      <path d="M540 148 L534 172 L552 148 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="480" y="92" width="152" height="58" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M540 148 L552 148" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">
      <text x="556" y="116">Nope. Roomier</text>
      <text x="556" y="134">now, though.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 : meeting ===================== -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M1075 150 L1075 138 M1063 138 L1087 138" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="1000" y="150" width="150" height="105" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="1006" y="156" width="138" height="93" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.4"/>
      <use href="#clanker" transform="translate(1075,190) scale(0.68)"/>
      <text x="1075" y="242" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="10" fill="#111" text-anchor="middle">DIRECTION CHECK-IN — i</text>
      <rect x="1006" y="156" width="138" height="93" fill="url(#scan)"/>
      <use href="#boss" transform="translate(905,254) scale(0.9)"/>
      <use href="#dailbert" transform="translate(1180,286) scale(0.74)"/>
      <path d="M836 316 L1224 316 L1224 332 L836 332 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    </g>

    <!-- boss balloon -->
    <g stroke-linejoin="round">
      <path d="M900 96 L905 134 L916 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="838" y="10" width="150" height="86" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M900 96 L916 96" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">
      <text x="913" y="33">Quick direction</text>
      <text x="913" y="51">check-in: we set the</text>
      <text x="913" y="69">intent, the fleet</text>
      <text x="913" y="87">handles the rest.</text>
    </g>

    <!-- dailbert balloon -->
    <g stroke-linejoin="round">
      <path d="M1152 62 L1178 100 L1166 60 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="1066" y="18" width="150" height="46" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M1152 62 L1166 61 Z" stroke="#f4f1ea" stroke-width="3"/>
    </g>
    <text x="1141" y="47" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">What's the intent?</text>

    <!-- clanker balloon -->
    <g stroke-linejoin="round">
      <path d="M975 150 L1022 152" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
      <rect x="900" y="104" width="150" height="46" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="903" y="107" width="144" height="40" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    </g>
    <g font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111" text-anchor="middle">
      <text x="975" y="123">Already written.</text>
      <text x="975" y="140">You can just nod.</text>
    </g>
  </g>
</g>
    
  </svg>