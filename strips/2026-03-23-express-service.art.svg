      <path d="M44 100 L55 112 L66 100" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="47" y="84" width="16" height="14" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="55" cy="50" r="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M31 30 q6 -8 12 -3 M79 32 q-4 -9 -12 -4" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
