<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>

    <symbol id="dailbert" viewBox="0 0 100 150">
      <path d="M18 150 V120 Q18 100 50 100 Q82 100 82 120 V150 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M40 104 L50 118 L60 104" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M50 118 L46 128 L50 140 L54 128 Z" fill="#111"/>
      <rect x="43" y="90" width="14" height="14" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="50" cy="52" rx="26" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M49 22 q7 -13 11 -1 q-4 5 -9 2" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="52" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="52" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="48" y1="52" x2="52" y2="52" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="52" r="2.2" fill="#111"/>
      <circle cx="60" cy="52" r="2.2" fill="#111"/>
      <path d="M50 58 v6" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M42 73 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 130 160">
