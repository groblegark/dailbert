      <path d="M88 120 Q108 118 108 138" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="96" y="132" width="26" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M122 137 q10 2 0 12" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M104 128 q-3 -6 2 -10 M114 128 q3 -6 -2 -10" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="6" x2="60" y2="24" stroke="#111" stroke-width="3"/>
      <circle cx="60" cy="5" r="4" fill="#111"/>
      <rect x="24" y="24" width="72" height="62" rx="8" fill="#d9d6cf" stroke="#111" stroke-width="3"/>
      <rect x="34" y="40" width="21" height="9" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="65" y="40" width="21" height="9" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="40" y="42" width="9" height="5" fill="#111"/>
      <rect x="71" y="42" width="9" height="5" fill="#111"/>
      <rect x="40" y="62" width="40" height="14" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="47" y1="62" x2="47" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="62" x2="54" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="62" x2="60" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="66" y1="62" x2="66" y2="76" stroke="#111" stroke-width="2"/>
      <line x1="73" y1="62" x2="73" y2="76" stroke="#111" stroke-width="2"/>
