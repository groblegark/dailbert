    <rect x="1000" y="20" width="100" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="1015" y1="20" x2="1010" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="1035" y1="20" x2="1030" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="1055" y1="20" x2="1050" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="1075" y1="20" x2="1070" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="1210" y1="42" x2="1210" y2="320" stroke="#c9c5bb" stroke-width="2"/>
    <line x1="955" y1="256" x2="1218" y2="256" stroke="#111" stroke-width="2.5"/>
    <line x1="970" y1="256" x2="970" y2="266" stroke="#111" stroke-width="2.5"/>
    <line x1="838" y1="320" x2="1222" y2="320" stroke="#111" stroke-width="2.5"/>

    <!-- large button panel with readout (surface) -->
    <rect x="846" y="150" width="66" height="168" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="851" y="156" width="56" height="30" rx="2" fill="#cfccc4" stroke="#111" stroke-width="2"/>
    <g opacity="0.8"><use href="#clanker" x="857" y="150" width="44" height="41"/></g>
    <!-- floor buttons: most dark/unlit, one lit -->
    <circle cx="864" cy="206" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="893" cy="206" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="864" cy="226" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="893" cy="226" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="864" cy="246" r="5" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <circle cx="893" cy="246" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="864" cy="266" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="893" cy="266" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="864" cy="286" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="893" cy="286" r="5" fill="#111" stroke="#111" stroke-width="1.8"/>

    <!-- figures -->
    <use href="#dailbert" x="922" y="158" width="112" height="172"/>
    <use href="#doug" x="1074" y="158" width="130" height="172"/>

    <!-- Doug quiet balloon -->
    <path d="M1130 112 L1136 128 L1118 116" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="1052" y="46" width="156" height="68" rx="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="1130" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">...Fewer light up</text>
    <text x="1130" y="90" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">every week.</text>
  </g>

  <!-- panel borders on top -->
  <rect x="3" y="3" width="394" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="417" y="3" width="394" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
  <rect x="831" y="3" width="394" height="334" rx="3" fill="none" stroke="#111" stroke-width="3"/>
