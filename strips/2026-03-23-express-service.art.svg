  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#clip1)">
    <rect x="3" y="3" width="394" height="334" fill="#f4f1ea"/>
    <!-- ceiling + light -->
    <line x1="10" y1="42" x2="390" y2="42" stroke="#111" stroke-width="2"/>
    <rect x="150" y="20" width="110" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="165" y1="20" x2="160" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="185" y1="20" x2="180" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="205" y1="20" x2="200" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="225" y1="20" x2="220" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="245" y1="20" x2="240" y2="36" stroke="#b8b4aa" stroke-width="1.5"/>
    <!-- back wall seams + handrail + floor -->
    <line x1="70" y1="42" x2="70" y2="318" stroke="#c9c5bb" stroke-width="2"/>
    <line x1="330" y1="42" x2="330" y2="318" stroke="#c9c5bb" stroke-width="2"/>
    <line x1="25" y1="252" x2="372" y2="252" stroke="#111" stroke-width="2.5"/>
    <line x1="40" y1="252" x2="40" y2="262" stroke="#111" stroke-width="2.5"/>
    <line x1="360" y1="252" x2="360" y2="262" stroke="#111" stroke-width="2.5"/>
    <line x1="8" y1="318" x2="392" y2="318" stroke="#111" stroke-width="2.5"/>

    <!-- button panel -->
    <rect x="180" y="206" width="30" height="70" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="185" y="211" width="20" height="12" rx="2" fill="#d9d6cf" stroke="#111" stroke-width="1.8"/>
    <circle cx="190" cy="240" r="4" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <circle cx="201" cy="240" r="4" fill="#111" stroke="#111" stroke-width="1.8"/>
    <circle cx="190" cy="255" r="4" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <circle cx="201" cy="255" r="4" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <circle cx="190" cy="268" r="4" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
    <circle cx="201" cy="268" r="4" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>

    <!-- figures -->
    <use href="#dailbert" x="40" y="150" width="120" height="175"/>
    <path d="M132 236 Q160 232 178 233" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <circle cx="180" cy="233" r="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <use href="#doug" x="248" y="150" width="140" height="175"/>

    <!-- balloons -->
    <path d="M101 118 L96 132 L112 122" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="112" cy="86" rx="73" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="112" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Skipped three and</text>
    <text x="112" y="100" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">four again.</text>

    <path d="M300 110 L305 126 L288 114" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="303" cy="80" rx="70" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="303" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Express service.</text>
    <text x="303" y="94" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Nice.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#clip2)">
    <rect x="417" y="3" width="394" height="334" fill="#f4f1ea"/>
    <!-- door frame + polished chrome doors -->
    <rect x="466" y="62" width="300" height="262" rx="3" fill="#e6e3db" stroke="#111" stroke-width="3"/>
    <rect x="475" y="70" width="290" height="250" fill="#cfccc4" stroke="#111" stroke-width="2.5"/>
    <line x1="620" y1="70" x2="620" y2="320" stroke="#111" stroke-width="2.5"/>
    <line x1="505" y1="70" x2="505" y2="320" stroke="#b8b4aa" stroke-width="2"/>
    <line x1="545" y1="70" x2="545" y2="320" stroke="#b8b4aa" stroke-width="1.5"/>
    <line x1="700" y1="70" x2="700" y2="320" stroke="#b8b4aa" stroke-width="2"/>
    <line x1="735" y1="70" x2="735" y2="320" stroke="#b8b4aa" stroke-width="1.5"/>
    <!-- clanker in the reflection -->
    <g opacity="0.72">
      <use href="#clanker" x="558" y="98" width="150" height="140"/>
    </g>
    <!-- soft reflection streaks over the clanker -->
    <line x1="580" y1="112" x2="700" y2="150" stroke="#b8b4aa" stroke-width="1.5" opacity="0.7"/>
    <line x1="576" y1="180" x2="690" y2="210" stroke="#b8b4aa" stroke-width="1.5" opacity="0.7"/>

    <!-- foreground backs -->
    <path d="M470 337 V300 Q470 274 512 274 Q554 274 554 300 V337 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="512" cy="260" rx="26" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <path d="M511 233 q7 -12 11 -1 q-4 5 -9 2" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <path d="M652 337 V300 Q652 272 700 272 Q748 272 748 300 V337 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="700" cy="258" r="30" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="744" y="284" width="22" height="19" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M766 288 q9 2 0 11" fill="none" stroke="#111" stroke-width="2.5"/>

    <!-- clanker balloon (screen-edged) + dashed line to surface -->
    <line x1="558" y1="176" x2="596" y2="158" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="422" y="84" width="140" height="90" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="427" y="89" width="130" height="80" rx="1" fill="none" stroke="#111" stroke-width="1"/>
    <text x="492" y="108" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">I stopped stopping</text>
    <text x="492" y="126" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">where no one waits.</text>
    <text x="492" y="147" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">Faster for everyone</text>
    <text x="492" y="163" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">still here.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
