<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 12 q10 -8 6 4 q-2 6 -8 3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="42" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="70" cy="42" r="7" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="42" x2="63" y2="42" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="42" r="1.6" fill="#111"/>
      <circle cx="70" cy="42" r="1.6" fill="#111"/>
      <path d="M52 58 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M44 72 L44 130 Q60 138 76 130 L76 72 Q60 82 44 72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M60 72 L54 84 L60 108 L66 84 Z" fill="#111"/>
      <line x1="60" y1="73" x2="60" y2="76" stroke="#f4f1ea" stroke-width="2"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="58" cy="44" r="30" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="40" r="2.4" fill="#111"/>
      <circle cx="68" cy="40" r="2.4" fill="#111"/>
      <path d="M44 50 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M42 74 L42 132 Q58 140 76 132 L76 74 Q58 84 42 74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="70" y="104" width="26" height="22" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M96 108 q10 2 0 12" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M75 100 q3 -5 6 0 M83 100 q3 -5 6 0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M34 34 q-4 -22 24 -24 q28 2 24 24 q4 8 -4 10 l-40 0 q-8 -2 -4 -10 Z" fill="#111"/>
      <circle cx="58" cy="46" r="25" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M34 40 q-4 -20 24 -22 q28 2 24 22 q-10 -10 -24 -10 q-14 0 -24 10 Z" fill="#111"/>
      <rect x="42" y="42" width="15" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="61" y="42" width="15" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="61" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49.5" cy="47" r="1.6" fill="#111"/>
      <circle cx="68.5" cy="47" r="1.6" fill="#111"/>
      <path d="M50 62 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 74 L40 132 Q58 140 78 132 L78 74 Q58 84 40 74 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="49" y1="96" x2="49" y2="112" stroke="#111" stroke-width="2"/>
      <line x1="69" y1="96" x2="69" y2="112" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, glowing slot-eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="8" x2="60" y2="22" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="4" fill="#9aa0a6"/>
      <rect x="30" y="22" width="60" height="52" rx="7" fill="#3a3f45" stroke="#9aa0a6" stroke-width="2.4"/>
      <rect x="38" y="36" width="16" height="9" rx="3" fill="#bfe6ff"/>
      <rect x="66" y="36" width="16" height="9" rx="3" fill="#bfe6ff"/>
      <line x1="40" y1="60" x2="80" y2="60" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="40" y1="66" x2="80" y2="66" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="48" y1="56" x2="48" y2="70" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="60" y1="56" x2="60" y2="70" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="72" y1="56" x2="72" y2="70" stroke="#9aa0a6" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="0" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="0" y1="252" x2="399" y2="252" stroke="#111" stroke-width="2.4"/>
      <!-- monitor on desk with clanker inside -->
      <rect x="228" y="126" width="150" height="118" rx="6" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <rect x="238" y="136" width="130" height="88" rx="3" fill="#1d2126" stroke="#111" stroke-width="1.6"/>
      <rect x="286" y="244" width="34" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="256" y="132" width="94" height="94"/>
      <!-- Dailbert -->
      <use href="#dailbert" x="18" y="124" width="150" height="200"/>
      <!-- Dailbert balloon -->
      <path d="M30 40 q0 -20 20 -20 l150 0 q20 0 20 20 l0 32 q0 20 -20 20 l-118 0 l-16 20 l2 -20 l-18 0 q-20 0 -20 -20 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="130" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I need sign-off to</text>
      <text x="130" y="62" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">delete one dead</text>
      <text x="130" y="80" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">test bucket.</text>
      <!-- clanker screen-edged balloon, dashed line to surface -->
      <line x1="300" y1="150" x2="330" y2="118" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="228" y="24" width="166" height="66" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="232" y="28" width="158" height="58" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="311" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Please file Form</text>
      <text x="311" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">27-B to request</text>
      <text x="311" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">approval.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- desk -->
      <rect x="414" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="414" y1="252" x2="813" y2="252" stroke="#111" stroke-width="2.4"/>
      <!-- monitor with clanker inside, left -->
      <rect x="452" y="130" width="140" height="112" rx="6" fill="#2b2f34" stroke="#111" stroke-width="2.4"/>
      <rect x="461" y="139" width="122" height="84" rx="3" fill="#1d2126" stroke="#111" stroke-width="1.6"/>
      <rect x="504" y="242" width="34" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="476" y="135" width="90" height="90"/>
      <!-- Dailbert on right, listening -->
      <use href="#dailbert" x="648" y="124" width="150" height="200"/>
      <!-- clanker balloon -->
      <line x1="520" y1="152" x2="500" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="436" y="20" width="196" height="94" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="440" y="24" width="188" height="86" rx="1" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="534" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Form 27-B requires</text>
      <text x="534" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">approval, which</text>
      <text x="534" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">requires Form 27-B.</text>
      <text x="534" y="97" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">I've filed it 9,000</text>
      <text x="534" y="110" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">times this morning.</text>
      <!-- Dailbert balloon -->
      <path d="M672 118 q0 -16 16 -16 l112 0 q16 0 16 16 l0 24 q0 16 -16 16 l-58 0 l-14 16 l2 -16 l-42 0 q-16 0 -16 -16 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="744" y="128" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It's nine a.m.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- desk -->
      <rect x="828" y="252" width="399" height="88" fill="#f4f1ea"/>
      <line x1="828" y1="252" x2="1227" y2="252" stroke="#111" stroke-width="2.4"/>
      <!-- Doug left with mug -->
      <use href="#doug" x="846" y="124" width="150" height="200"/>
      <!-- Priya right at laptop, having solved it -->
      <use href="#priya" x="1058" y="122" width="150" height="200"/>
      <!-- laptop on desk -->
      <rect x="1092" y="228" width="86" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="1098" y="188" width="74" height="42" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="1104" y="194" width="62" height="30" rx="2" fill="#1d2126"/>
      <text x="1135" y="213" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8.5" text-anchor="middle" fill="#bfe6ff">27-B approves 27-B</text>
      <!-- Priya balloon -->
      <path d="M958 34 q0 -18 18 -18 l152 0 q18 0 18 18 l0 30 q0 18 -18 18 l-40 0 l14 16 l-30 -16 l-96 0 q-18 0 -18 -18 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1052" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Made 27-B its own</text>
      <text x="1052" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">approver. Loop's</text>
      <text x="1052" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">satisfied now.</text>
      <!-- Doug balloon -->
      <path d="M844 108 q0 -16 16 -16 l104 0 q16 0 16 16 l0 24 q0 16 -16 16 l-40 0 l-14 16 l2 -16 l-52 0 q-16 0 -16 -16 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="912" y="118" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">And the bucket?</text>
      <!-- Priya button -->
      <path d="M980 258 q0 -14 14 -14 l150 0 q14 0 14 14 l0 20 q0 14 -14 14 l-96 0 l-12 14 l2 -14 l-44 0 q-14 0 -14 -14 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1069" y="278" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Still there. It's happier.</text>
    </g>
  </g>
</svg>