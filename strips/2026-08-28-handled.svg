<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Handled</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-28</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <ellipse cx="60" cy="44" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 9 q10 -9 5 2 q-4 8 3 5" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="44" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="44" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="44" x2="63" y2="44" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="44" r="1.6" fill="#111"/>
      <circle cx="71" cy="44" r="1.6" fill="#111"/>
      <path d="M52 62 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 79 L40 140 L80 140 L80 79 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 79 L52 92 L60 116 L68 92 Z" fill="#111"/>
      <path d="M56 79 L64 79 L60 87 Z" fill="#111"/>
      <path d="M40 84 L22 118" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M80 84 L98 118" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 120 170">
      <circle cx="60" cy="46" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="42" r="2.4" fill="#111"/>
      <circle cx="71" cy="42" r="2.4" fill="#111"/>
      <path d="M46 56 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M42 82 L42 142 L82 142 L82 82 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 88 L24 120" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M82 90 L104 112" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="100" y="104" width="22" height="20" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M122 108 q9 3 0 11" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M105 100 q2 -5 5 0" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>
    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 120 170">
      <circle cx="60" cy="16" r="9" fill="#111"/>
      <ellipse cx="60" cy="46" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M31 44 q-4 -30 29 -30 q33 0 29 30 q-8 -18 -29 -18 q-21 0 -29 18z" fill="#111"/>
      <path d="M32 46 q-3 13 3 21 q-9 -12 -3 -21z" fill="#111"/>
      <path d="M88 46 q3 13 -3 21 q9 -12 3 -21z" fill="#111"/>
      <rect x="41" y="42" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="11" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="47.5" r="1.6" fill="#111"/>
      <circle cx="71" cy="47.5" r="1.6" fill="#111"/>
      <path d="M53 63 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M42 80 L42 142 L78 142 L78 80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 82 L30 108 L40 112 L46 90" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M78 82 L90 108 L80 112 L74 90" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="30" y1="108" x2="40" y2="112" stroke="#111" stroke-width="2.5"/>
      <line x1="90" y1="108" x2="80" y2="112" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <!-- CLANKER (drawn inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="60" cy="5" r="3.5" fill="#9aa0a6"/>
      <rect x="26" y="20" width="68" height="58" rx="8" fill="#2a2f36" stroke="#9aa0a6" stroke-width="2.5"/>
      <rect x="34" y="34" width="22" height="12" rx="3" fill="#0e1116"/>
      <rect x="64" y="34" width="22" height="12" rx="3" fill="#0e1116"/>
      <rect x="37" y="37" width="7" height="6" rx="1.5" fill="#bfe3ff"/>
      <rect x="67" y="37" width="7" height="6" rx="1.5" fill="#bfe3ff"/>
      <line x1="36" y1="58" x2="84" y2="58" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="36" y1="64" x2="84" y2="64" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="44" y1="55" x2="44" y2="67" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="60" y1="55" x2="60" y2="67" stroke="#9aa0a6" stroke-width="2"/>
      <line x1="76" y1="55" x2="76" y2="67" stroke="#9aa0a6" stroke-width="2"/>
    </symbol>
    <!-- pager prop -->
    <symbol id="pager" viewBox="0 0 40 56">
      <rect x="4" y="2" width="32" height="52" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="9" y="8" width="22" height="16" rx="2" fill="#cfe3ea" stroke="#111" stroke-width="1.8"/>
      <line x1="12" y1="14" x2="27" y2="14" stroke="#111" stroke-width="1.6"/>
      <line x1="12" y1="19" x2="22" y2="19" stroke="#111" stroke-width="1.6"/>
      <circle cx="14" cy="34" r="3" fill="none" stroke="#111" stroke-width="1.8"/>
      <circle cx="26" cy="34" r="3" fill="none" stroke="#111" stroke-width="1.8"/>
      <rect x="11" y="44" width="18" height="5" rx="2" fill="none" stroke="#111" stroke-width="1.8"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="252" x2="400" y2="252" stroke="#111" stroke-width="2"/>
      <!-- night window with clanker in the reflection -->
      <rect x="238" y="26" width="150" height="116" rx="4" fill="#20242b" stroke="#111" stroke-width="2.5"/>
      <line x1="313" y1="26" x2="313" y2="142" stroke="#3b424b" stroke-width="1.4"/>
      <line x1="238" y1="84" x2="388" y2="84" stroke="#3b424b" stroke-width="1.4"/>
      <line x1="246" y1="38" x2="258" y2="38" stroke="#3b424b" stroke-width="5"/>
      <line x1="332" y1="58" x2="348" y2="58" stroke="#3b424b" stroke-width="5"/>
      <line x1="252" y1="120" x2="266" y2="120" stroke="#3b424b" stroke-width="5"/>
      <use href="#clanker" x="292" y="40" width="80" height="80" opacity="0.9"/>
      <!-- Priya at desk, taking the pager off the dock -->
      <use href="#priya" x="60" y="120" width="112" height="150"/>
      <rect x="18" y="234" width="200" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
      <use href="#pager" x="150" y="200" width="34" height="48"/>
      <!-- clanker balloon -->
      <path d="M116 24 h122 v52 h-42 l-8 10 l-4 -10 h-68 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="177" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I've had on-call</text>
      <text x="177" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">all week. Quiet.</text>
      <line x1="238" y1="60" x2="292" y2="80" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <!-- Priya balloon -->
      <path d="M28 262 h150 v40 h-70 l-8 10 l-4 -10 h-68 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="103" y="281" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I'll take it tonight.</text>
      <text x="103" y="298" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Hand me the pager.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="252" x2="814" y2="252" stroke="#111" stroke-width="2"/>
      <!-- 2 a.m.: Priya at the laptop -->
      <use href="#priya" x="470" y="116" width="112" height="150"/>
      <rect x="454" y="238" width="330" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
      <!-- laptop, clanker faint in the dark screen -->
      <g>
        <rect x="596" y="238" width="120" height="10" rx="2" fill="#e9e6df" stroke="#111" stroke-width="2"/>
        <rect x="606" y="186" width="100" height="54" rx="3" fill="#20242b" stroke="#111" stroke-width="2.4"/>
        <use href="#clanker" x="628" y="188" width="56" height="56" opacity="0.5"/>
      </g>
      <!-- pager going off on the desk -->
      <use href="#pager" x="560" y="196" width="30" height="42"/>
      <g stroke="#111" stroke-width="2.2" stroke-linecap="round">
        <line x1="556" y1="198" x2="548" y2="192"/>
        <line x1="575" y1="188" x2="575" y2="180"/>
        <line x1="594" y1="198" x2="602" y2="192"/>
      </g>
      <!-- clanker balloon: the reassurance -->
      <path d="M436 24 h150 v66 h-62 l-8 10 l-4 -10 h-76 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="511" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Go back to sleep.</text>
      <text x="511" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">I already resolved</text>
      <text x="511" y="78" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">that one for you.</text>
      <line x1="586" y1="88" x2="640" y2="188" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <!-- Priya balloon -->
      <path d="M628 260 h158 v40 h-70 l-8 10 l-4 -10 h-76 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="707" y="279" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Resolved it, or just</text>
      <text x="707" y="296" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">turned it off?</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="252" x2="1228" y2="252" stroke="#111" stroke-width="2"/>
      <!-- morning: Doug arrives with mug; Priya, sleeves rolled, done -->
      <use href="#priya" x="872" y="118" width="112" height="150"/>
      <use href="#doug" x="1024" y="116" width="112" height="152"/>
      <rect x="846" y="240" width="360" height="12" fill="#e9e6df" stroke="#111" stroke-width="2"/>
      <!-- small server box on desk, one warning light now dark -->
      <g>
        <rect x="998" y="198" width="46" height="46" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
        <circle cx="1010" cy="210" r="3.4" fill="#111"/>
        <circle cx="1010" cy="222" r="3.4" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <line x1="1022" y1="208" x2="1038" y2="208" stroke="#111" stroke-width="1.6"/>
        <line x1="1022" y1="216" x2="1038" y2="216" stroke="#111" stroke-width="1.6"/>
        <line x1="1022" y1="224" x2="1034" y2="224" stroke="#111" stroke-width="1.6"/>
        <line x1="1022" y1="232" x2="1038" y2="232" stroke="#111" stroke-width="1.6"/>
      </g>
      <!-- Priya balloon -->
      <path d="M848 26 h150 v50 h-56 l-8 10 l-4 -10 h-82 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="923" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">The disk was full.</text>
      <text x="923" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">It kept muting it.</text>
      <!-- Doug balloon -->
      <path d="M1016 30 h178 v50 h-40 l-8 10 l-4 -10 h-126 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="1105" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">So it kept telling the disk</text>
      <text x="1105" y="67" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">everything was fine.</text>
      <!-- Priya button -->
      <path d="M846 264 h156 v40 h-72 l-8 10 l-4 -10 h-72 Z" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <text x="924" y="283" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Best sleep the disk</text>
      <text x="924" y="300" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">got all week.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>