<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">The Handoff Note</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-07-23</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- paper texture-free; simple -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#dfe6e6"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#c3cccc" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f4f1ea"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="1"/>
    </pattern>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linjoin="round" stroke-linecap="round">
        <!-- collar/shoulders -->
        <path d="M20 168 C20 132 40 118 60 118 C80 118 100 132 100 168" fill="#f4f1ea"/>
        <path d="M46 122 L60 140 L74 122" fill="#f4f1ea"/>
        <!-- tie -->
        <path d="M56 138 L64 138 L67 162 L60 170 L53 162 Z" fill="#f4f1ea"/>
        <!-- head -->
        <ellipse cx="60" cy="70" rx="34" ry="42" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 28 C66 20 78 24 72 34" />
        <!-- ears -->
        <path d="M26 70 q-7 6 0 12" fill="#f4f1ea"/>
        <path d="M94 70 q7 6 0 12" fill="#f4f1ea"/>
        <!-- glasses -->
        <circle cx="47" cy="70" r="11" fill="#f4f1ea"/>
        <circle cx="73" cy="70" r="11" fill="#f4f1ea"/>
        <line x1="58" y1="70" x2="62" y2="70"/>
        <!-- eyes -->
        <circle cx="47" cy="70" r="2.4" fill="#111" stroke="none"/>
        <circle cx="73" cy="70" r="2.4" fill="#111" stroke="none"/>
        <!-- nose -->
        <path d="M60 78 q4 6 -2 9"/>
        <!-- weary mouth -->
        <path d="M48 98 q12 5 24 0"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 180">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- body -->
        <path d="M22 178 C22 140 44 126 64 126 C84 126 106 140 106 178" fill="#f4f1ea"/>
        <path d="M50 130 L64 146 L78 130" fill="#f4f1ea"/>
        <!-- head round -->
        <circle cx="64" cy="74" r="42" fill="#f4f1ea"/>
        <!-- hair tuft -->
        <path d="M56 33 q8 -12 18 -2"/>
        <path d="M62 31 q4 -8 10 -1"/>
        <!-- ears -->
        <path d="M22 74 q-7 6 0 12" fill="#f4f1ea"/>
        <path d="M106 74 q7 6 0 12" fill="#f4f1ea"/>
        <!-- dot eyes -->
        <circle cx="50" cy="70" r="3" fill="#111" stroke="none"/>
        <circle cx="78" cy="70" r="3" fill="#111" stroke="none"/>
        <!-- nose -->
        <path d="M64 78 q3 4 -1 7"/>
        <!-- big grin -->
        <path d="M44 90 q20 22 40 0" fill="#f4f1ea"/>
        <path d="M44 90 q20 8 40 0"/>
      </g>
    </symbol>

    <!-- BOSS not used this strip -->

    <!-- CLANKER robot head -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- antenna -->
        <line x1="60" y1="20" x2="60" y2="6"/>
        <circle cx="60" cy="5" r="3.4" fill="#111"/>
        <!-- head box -->
        <rect x="24" y="20" width="72" height="64" rx="8" fill="#f4f1ea"/>
        <!-- slot eyes glowing -->
        <rect x="34" y="38" width="22" height="10" rx="3" fill="#111"/>
        <rect x="64" y="38" width="22" height="10" rx="3" fill="#111"/>
        <!-- grille mouth -->
        <rect x="38" y="62" width="44" height="12" rx="2" fill="#f4f1ea"/>
        <line x1="46" y1="62" x2="46" y2="74"/>
        <line x1="54" y1="62" x2="54" y2="74"/>
        <line x1="62" y1="62" x2="62" y2="74"/>
        <line x1="70" y1="62" x2="70" y2="74"/>
        <line x1="78" y1="62" x2="78" y2="74"/>
        <!-- side bolts -->
        <circle cx="30" cy="52" r="2.2" fill="#111"/>
        <circle cx="90" cy="52" r="2.2" fill="#111"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- desk -->
    <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round">
      <line x1="12" y1="300" x2="388" y2="300"/>
      <line x1="30" y1="300" x2="30" y2="332"/>
    </g>

    <!-- monitor with clanker -->
    <g>
      <rect x="60" y="188" width="150" height="104" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="72" y="198" width="126" height="80" rx="4" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <rect x="122" y="292" width="26" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="104" y="304" width="62" height="6" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="90" y="200" width="90" height="90"/>
    </g>

    <!-- dailbert at right -->
    <use href="#dailbert" x="250" y="150" width="126" height="178"/>

    <!-- Dailbert balloon -->
    <g>
      <path d="M212 26 h150 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-70 l-10 14 l-2 -14 h-68 a12 12 0 0 1 -12 -12 v-40 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="287" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">The old model left you</text>
      <text x="287" y="63" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">a note. Any idea what</text>
      <text x="287" y="80" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">it meant?</text>
    </g>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="20" y="26" width="176" height="96" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="25" y="31" width="166" height="86" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <line x1="108" y1="122" x2="120" y2="186" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <text x="108" y="48" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">It says 'Watch Doug.'</text>
      <text x="108" y="64" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">I've read it 4,000</text>
      <text x="108" y="80" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">times. A warning.</text>
      <text x="108" y="96" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">Or a chore.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- desk -->
    <g fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round">
      <line x1="426" y1="300" x2="802" y2="300"/>
      <line x1="784" y1="300" x2="784" y2="332"/>
    </g>

    <!-- dailbert left, leaning -->
    <use href="#dailbert" x="440" y="152" width="126" height="178"/>

    <!-- monitor with clanker, right -->
    <g>
      <rect x="596" y="188" width="150" height="104" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="608" y="198" width="126" height="80" rx="4" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <rect x="658" y="292" width="26" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="640" y="304" width="62" height="6" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="626" y="200" width="90" height="90"/>
    </g>

    <!-- Dailbert small balloon -->
    <g>
      <path d="M452 26 h96 a12 12 0 0 1 12 12 v26 a12 12 0 0 1 -12 12 h-40 l-12 14 l-1 -14 h-43 a12 12 0 0 1 -12 -12 v-26 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="500" y="55" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Both how?</text>
    </g>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="586" y="24" width="204" height="112" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="591" y="29" width="194" height="102" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <line x1="672" y1="136" x2="668" y2="186" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <text x="688" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">Doug is charging his</text>
      <text x="688" y="62" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">phone off the</text>
      <text x="688" y="78" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">production server. I</text>
      <text x="688" y="94" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">can see him in your</text>
      <text x="688" y="110" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">monitor's reflection.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>

    <!-- floor line -->
    <line x1="840" y1="306" x2="1216" y2="306" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>

    <!-- dailbert left -->
    <use href="#dailbert" x="856" y="150" width="128" height="182"/>

    <!-- doug right holding mug -->
    <use href="#doug" x="1040" y="140" width="140" height="192"/>

    <!-- Doug's mug with clanker sheen -->
    <g>
      <path d="M1040 244 h44 v34 a10 10 0 0 1 -10 10 h-24 a10 10 0 0 1 -10 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M1084 250 q18 2 18 16 q0 14 -18 16" fill="none" stroke="#111" stroke-width="2.6"/>
      <!-- sheen holding clanker -->
      <clipPath id="mugclip"><path d="M1041 245 h42 v33 a9 9 0 0 1 -9 9 h-24 a9 9 0 0 1 -9 -9 z"/></clipPath>
      <g clip-path="url(#mugclip)">
        <use href="#clanker" x="1038" y="240" width="52" height="52"/>
      </g>
    </g>

    <!-- Dailbert flat balloon -->
    <g>
      <path d="M852 24 h78 a10 10 0 0 1 10 10 v22 a10 10 0 0 1 -10 10 h-30 l-12 14 l-1 -14 h-35 a10 10 0 0 1 -10 -10 v-22 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="891" y="50" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Doug.</text>
    </g>

    <!-- Doug balloon -->
    <g>
      <path d="M1012 24 h150 a10 10 0 0 1 10 10 v24 a10 10 0 0 1 -10 10 h-50 l-14 14 l-1 -14 h-85 a10 10 0 0 1 -10 -10 v-24 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text x="1087" y="52" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">My phone was at 4%!</text>
    </g>

    <!-- Clanker screen balloon (from mug) -->
    <g>
      <rect x="928" y="108" width="184" height="80" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="933" y="113" width="174" height="70" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <line x1="1040" y1="188" x2="1058" y2="250" stroke="#111" stroke-width="1.4" stroke-dasharray="3 3"/>
      <text x="1020" y="132" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">So was production,</text>
      <text x="1020" y="148" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">Doug. So was</text>
      <text x="1020" y="164" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" fill="#111">production.</text>
    </g>
  </g>
</g>
    
  </svg>