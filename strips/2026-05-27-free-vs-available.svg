<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Free vs. Available</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-27</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== THE CLANKER (only ever inside a surface) ===== -->
    <symbol id="clanker" overflow="visible">
      <line x1="40" y1="12" x2="40" y2="2" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="2" r="3" fill="#111"/>
      <rect x="8" y="12" width="64" height="46" rx="5" fill="#bfc3c7" stroke="#111" stroke-width="2.5"/>
      <rect x="14" y="18" width="52" height="34" rx="3" fill="#262626" stroke="#111" stroke-width="1.5"/>
      <rect x="20" y="27" width="16" height="6" rx="2" fill="#dfe7d9"/>
      <rect x="44" y="27" width="16" height="6" rx="2" fill="#dfe7d9"/>
      <g stroke="#dfe7d9" stroke-width="1.6">
        <line x1="24" y1="44" x2="56" y2="44"/>
        <line x1="30" y1="41" x2="30" y2="47"/>
        <line x1="40" y1="41" x2="40" y2="47"/>
        <line x1="50" y1="41" x2="50" y2="47"/>
      </g>
    </symbol>

    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" overflow="visible">
      <path d="M40 150 Q40 108 80 108 Q120 108 120 150 L120 200 L40 200 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="72" y="92" width="16" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M80 108 l-7 8 l7 36 l7 -36 z" fill="#111"/>
      <ellipse cx="80" cy="60" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M80 30 q11 -13 1 -19" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="70" cy="58" r="9" fill="#ffffff" stroke="#111" stroke-width="2"/>
      <circle cx="92" cy="58" r="9" fill="#ffffff" stroke="#111" stroke-width="2"/>
      <line x1="79" y1="58" x2="83" y2="58" stroke="#111" stroke-width="2"/>
      <circle cx="70" cy="58" r="2.4" fill="#111"/>
      <circle cx="92" cy="58" r="2.4" fill="#111"/>
      <path d="M63 49 q6 -3 11 0 M81 49 q6 -3 11 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <path d="M72 79 q8 3 16 0" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" overflow="visible">
      <path d="M34 150 Q34 106 82 106 Q130 106 130 150 L130 205 L34 205 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="72" y="90" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="82" cy="56" r="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 30 q6 -8 12 -3 M92 27 q6 -6 12 1" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="72" cy="54" r="2.7" fill="#111"/>
      <circle cx="94" cy="54" r="2.7" fill="#111"/>
      <path d="M65 65 q17 17 34 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <!-- arm to mug -->
      <path d="M120 150 q30 8 30 -6" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="146" y="130" width="24" height="24" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M170 135 q11 3 0 14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M152 128 q6 -7 12 -1" fill="none" stroke="#111" stroke-width="1.4"/>
    </symbol>

    <!-- ===== PRIYA (the hero) ===== -->
    <symbol id="priya" overflow="visible">
      <path d="M36 150 Q36 106 84 106 Q132 106 132 150 L132 205 L36 205 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 150 l14 0 l0 12 l-14 0 z" fill="#111"/>
      <path d="M104 150 l14 0 l0 12 l-14 0 z" fill="#111"/>
      <rect x="74" y="90" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <ellipse cx="84" cy="58" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M58 58 q-7 -36 26 -42 q33 6 26 42 q-9 -22 -26 -20 q-17 -2 -26 20 z" fill="#111"/>
      <circle cx="84" cy="14" r="9" fill="#111"/>
      <circle cx="59" cy="54" r="5" fill="#111"/>
      <circle cx="109" cy="54" r="5" fill="#111"/>
      <rect x="61" y="52" width="18" height="13" rx="2" fill="#ffffff" stroke="#111" stroke-width="2"/>
      <rect x="89" y="52" width="18" height="13" rx="2" fill="#ffffff" stroke="#111" stroke-width="2"/>
      <line x1="79" y1="58" x2="89" y2="58" stroke="#111" stroke-width="2"/>
      <circle cx="70" cy="59" r="2.2" fill="#111"/>
      <circle cx="98" cy="59" r="2.2" fill="#111"/>
      <path d="M74 80 q10 4 20 0" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1" y="6" width="398" height="328" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="1" y1="266" x2="399" y2="266" stroke="#111" stroke-width="2"/>
      <!-- Dailbert -->
      <use href="#dailbert" x="18" y="142"/>
      <!-- Monitor -->
      <rect x="250" y="150" width="126" height="100" rx="5" fill="#dddddd" stroke="#111" stroke-width="2.5"/>
      <rect x="258" y="158" width="110" height="74" rx="3" fill="#262626" stroke="#111" stroke-width="1.5"/>
      <g stroke="#3d3d3d" stroke-width="1">
        <line x1="262" y1="164" x2="364" y2="164"/>
        <line x1="262" y1="228" x2="364" y2="228"/>
      </g>
      <use href="#clanker" x="276" y="172"/>
      <rect x="305" y="250" width="16" height="14" fill="#dddddd" stroke="#111" stroke-width="2"/>
      <ellipse cx="313" cy="266" rx="26" ry="5" fill="#dddddd" stroke="#111" stroke-width="2"/>
    </g>
    <!-- Clanker screen balloon -->
    <line x1="300" y1="110" x2="316" y2="158" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="120" y="18" width="250" height="92" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="125" y="23" width="240" height="82" fill="none" stroke="#111" stroke-width="1"/>
    <text x="245" y="43" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I scheduled standup</text>
    <text x="245" y="62" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">for 5 AM. It's the only</text>
    <text x="245" y="81" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">hour all nine calendars</text>
    <text x="245" y="100" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">agree they're free.</text>
    <!-- Dailbert balloon -->
    <path d="M96 176 l6 14 l14 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="18" y="120" width="168" height="58" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="102" y="146" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Nine people. One hour.</text>
    <text x="102" y="166" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">All asleep.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="414" y="6" width="398" height="328" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="300" x2="812" y2="300" stroke="#111" stroke-width="2"/>
      <line x1="470" y1="6" x2="470" y2="300" stroke="#111" stroke-width="1.2" opacity="0.5"/>
      <use href="#doug" x="544" y="120"/>
    </g>
    <!-- Doug balloon 1 -->
    <path d="M600 88 l4 16 l16 -10 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="432" y="24" width="196" height="62" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="530" y="50" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">5 a.m.! The clanker</text>
    <text x="530" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">believes in us.</text>
    <!-- Doug balloon 2 (the quiet beat) -->
    <path d="M660 196 l-16 6 l10 12 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="636" y="190" width="164" height="62" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="718" y="216" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">...I'm up then anyway.</text>
    <text x="718" y="236" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Good time to think.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="6" width="398" height="328" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="828" y="6" width="398" height="328" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <use href="#priya" x="878" y="118"/>
      <!-- desk in front -->
      <rect x="828" y="276" width="398" height="60" fill="#f4f1ea"/>
      <line x1="828" y1="276" x2="1226" y2="276" stroke="#111" stroke-width="2"/>
      <!-- forearms to keyboard -->
      <path d="M930 276 q6 -14 22 -12" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M1004 276 q-4 -14 -20 -12" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="918" y="284" width="150" height="24" rx="3" fill="#e5e2da" stroke="#111" stroke-width="2"/>
      <g stroke="#111" stroke-width="1">
        <line x1="930" y1="292" x2="1056" y2="292"/>
        <line x1="930" y1="300" x2="1056" y2="300"/>
      </g>
      <!-- clanker reflected small in her lens -->
      <use href="#clanker" x="966" y="170" transform="scale(0.2)" style="transform-box: view-box;" transform-origin="966 170"/>
    </g>
    <!-- clanker screen balloon (line goes to the glasses, never a person) -->
    <line x1="1010" y1="80" x2="976" y2="167" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="1010" y="40" width="184" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <rect x="1015" y="45" width="174" height="44" fill="none" stroke="#111" stroke-width="1"/>
    <text x="1102" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Reverted standup</text>
    <text x="1102" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">to 10 AM.</text>
    <!-- Priya button -->
    <path d="M938 172 l-4 16 l16 -8 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="845" y="112" width="150" height="60" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <text x="920" y="138" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Free isn't the same</text>
    <text x="920" y="158" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">as available.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>