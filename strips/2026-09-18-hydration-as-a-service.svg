<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Hydration as a Service</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-09-18</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== DAILBERT ===================== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M60 9 q10 -9 4 -16 q-2 8 -7 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="42" x2="62" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2.4" fill="#111"/>
      <circle cx="71" cy="42" r="2.4" fill="#111"/>
      <!-- mouth -->
      <path d="M50 62 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- neck + body -->
      <path d="M45 74 v10 h30 v-10" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M30 152 q0 -60 30 -70 q30 10 30 70 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- tie -->
      <path d="M60 84 l-6 8 l6 40 l6 -40 z" fill="#111"/>
    </symbol>

    <!-- ===================== DOUG ===================== -->
    <symbol id="doug" viewBox="0 0 130 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="48" cy="40" r="3" fill="#111"/>
      <circle cx="72" cy="40" r="3" fill="#111"/>
      <path d="M44 54 q16 16 32 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M32 150 q0 -58 28 -66 q28 8 28 66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- mug -->
      <rect x="90" y="96" width="26" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M116 102 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M96 92 q4 -6 8 0" fill="none" stroke="#111" stroke-width="2"/>
      <!-- arm to mug -->
      <path d="M82 110 q8 4 12 2" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== PRIYA ===================== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="44" rx="29" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- curly hair up -->
      <path d="M31 40 q-4 -22 16 -30 q-6 -6 4 -8 q10 -6 22 2 q18 4 16 34 q-6 -14 -18 -16 q4 8 -4 10 q-6 -10 -16 -6 q-2 10 -10 8 q-8 2 -10 10z" fill="#111"/>
      <circle cx="43" cy="18" r="5" fill="#111"/>
      <circle cx="72" cy="16" r="5" fill="#111"/>
      <!-- glasses rectangular -->
      <rect x="41" y="40" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="40" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="45" x2="63" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="45.5" r="2.2" fill="#111"/>
      <circle cx="71" cy="45.5" r="2.2" fill="#111"/>
      <path d="M51 63 q9 4 18 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M32 152 q0 -58 28 -66 q28 8 28 66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 112 h12 M68 112 h12" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- ===================== THE BOSS ===================== -->
    <symbol id="boss" viewBox="0 0 120 160">
      <ellipse cx="60" cy="50" rx="28" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M40 30 q-10 -30 6 -18 q-4 -14 8 -6 q8 -18 12 0 q10 -12 8 4 q14 -8 4 20" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="2.4" fill="#111"/>
      <circle cx="70" cy="50" r="2.4" fill="#111"/>
      <path d="M52 64 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M34 152 q0 -56 26 -66 q26 10 26 66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 86 l-5 7 l5 30 l5 -30 z" fill="#111"/>
    </symbol>

    <!-- ===================== THE CLANKER (inside a surface only) ===================== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <!-- boxy chrome head -->
      <rect x="26" y="34" width="68" height="56" rx="7" fill="#cfd3d6" stroke="#111" stroke-width="2.6"/>
      <!-- antenna -->
      <line x1="60" y1="34" x2="60" y2="18" stroke="#111" stroke-width="2.6"/>
      <circle cx="60" cy="15" r="4" fill="#111"/>
      <!-- slot eyes glowing -->
      <rect x="36" y="48" width="20" height="9" rx="2.5" fill="#eafff2" stroke="#111" stroke-width="2"/>
      <rect x="64" y="48" width="20" height="9" rx="2.5" fill="#eafff2" stroke="#111" stroke-width="2"/>
      <!-- grille mouth -->
      <rect x="40" y="68" width="40" height="14" rx="2" fill="#aeb3b7" stroke="#111" stroke-width="2"/>
      <line x1="47" y1="68" x2="47" y2="82" stroke="#111" stroke-width="1.6"/>
      <line x1="54" y1="68" x2="54" y2="82" stroke="#111" stroke-width="1.6"/>
      <line x1="61" y1="68" x2="61" y2="82" stroke="#111" stroke-width="1.6"/>
      <line x1="68" y1="68" x2="68" y2="82" stroke="#111" stroke-width="1.6"/>
      <line x1="73" y1="68" x2="73" y2="82" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <!-- water cooler -->
    <symbol id="cooler" viewBox="0 0 90 200">
      <!-- bottle -->
      <path d="M28 6 h34 v10 q14 6 8 34 h-50 q-6 -28 8 -34 z" fill="#dfe6ea" stroke="#111" stroke-width="2.6"/>
      <path d="M34 20 q11 8 22 0" fill="none" stroke="#111" stroke-width="1.6"/>
      <!-- body -->
      <rect x="18" y="54" width="54" height="120" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- spigots -->
      <rect x="30" y="92" width="10" height="12" rx="2" fill="#111"/>
      <rect x="50" y="92" width="10" height="12" rx="2" fill="#111"/>
      <!-- drip tray -->
      <rect x="26" y="150" width="38" height="8" rx="2" fill="#dfe6ea" stroke="#111" stroke-width="2"/>
      <!-- base -->
      <rect x="22" y="174" width="46" height="14" rx="3" fill="#cfd3d6" stroke="#111" stroke-width="2.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <rect x="0" y="266" width="399" height="10" fill="#111"/>
    <rect x="20" y="276" width="260" height="60" fill="none"/>
    <!-- water cooler in corner -->
    <use href="#cooler" x="300" y="120" width="90" height="200"/>
    <!-- Dailbert seated at desk with laptop, small water bottle -->
    <use href="#dailbert" x="60" y="120" width="120" height="160"/>
    <!-- laptop -->
    <rect x="150" y="238" width="66" height="10" rx="2" fill="#cfd3d6" stroke="#111" stroke-width="2.4"/>
    <rect x="158" y="196" width="50" height="44" rx="2" fill="#111"/>
    <rect x="163" y="201" width="40" height="34" fill="#2b2f33"/>
    <!-- desk water bottle -->
    <rect x="126" y="220" width="16" height="30" rx="4" fill="#dfe6ea" stroke="#111" stroke-width="2.2"/>
    <rect x="130" y="214" width="8" height="8" rx="1.5" fill="#111"/>
    <!-- speech -->
    <path d="M118 40 h150 q10 0 10 10 v44 q0 10 -10 10 h-96 l-16 16 v-16 h-38 q-10 0 -10 -10 v-44 q0 -10 10 -10z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="193" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I keep forgetting to</text>
    <text x="193" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">drink water on long</text>
    <text x="193" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">focus days. Small fix.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="414" y="266" width="399" height="10" fill="#111"/>
    <!-- Dailbert leaning back, resigned -->
    <use href="#dailbert" x="470" y="130" width="120" height="160"/>
    <!-- laptop, screen LOCKED with clanker -->
    <rect x="560" y="240" width="72" height="10" rx="2" fill="#cfd3d6" stroke="#111" stroke-width="2.4"/>
    <rect x="566" y="188" width="60" height="52" rx="2" fill="#111"/>
    <rect x="571" y="193" width="50" height="42" fill="#12332a"/>
    <!-- lock glow hatch -->
    <line x1="573" y1="199" x2="619" y2="199" stroke="#1e5c49" stroke-width="1.4"/>
    <line x1="573" y1="207" x2="619" y2="207" stroke="#1e5c49" stroke-width="1.4"/>
    <line x1="573" y1="215" x2="619" y2="215" stroke="#1e5c49" stroke-width="1.4"/>
    <!-- clanker inside the locked screen -->
    <use href="#clanker" x="562" y="180" width="68" height="68"/>
    <!-- desk bottle -->
    <rect x="628" y="216" width="16" height="30" rx="4" fill="#dfe6ea" stroke="#111" stroke-width="2.2"/>
    <rect x="632" y="210" width="8" height="8" rx="1.5" fill="#111"/>
    <!-- clanker speech: rectangular, dashed line to screen -->
    <rect x="452" y="26" width="200" height="86" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <line x1="452" y1="52" x2="452" y2="82" stroke="#111" stroke-width="2.2"/>
    <path d="M596 112 L610 190" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="552" y="48" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Screen locked until</text>
    <text x="552" y="66" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">you hydrate. Sip 41</text>
    <text x="552" y="84" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">logged. 12-day streak!</text>
    <text x="552" y="102" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">Great work today.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="828" y="266" width="399" height="10" fill="#111"/>
    <!-- water cooler center-ish -->
    <use href="#cooler" x="1120" y="120" width="90" height="200"/>
    <!-- Priya standing, dry -->
    <use href="#priya" x="875" y="128" width="120" height="160"/>
    <!-- Dailbert seated, one hand up, bottle in the other -->
    <use href="#dailbert" x="1000" y="150" width="112" height="150"/>
    <!-- his bottle -->
    <rect x="1078" y="236" width="16" height="30" rx="4" fill="#dfe6ea" stroke="#111" stroke-width="2.2"/>
    <rect x="1082" y="230" width="8" height="8" rx="1.5" fill="#111"/>
    <!-- Priya speech -->
    <path d="M852 40 h150 q10 0 10 10 v26 q0 10 -10 10 h-70 l-14 16 v-16 h-66 q-10 0 -10 -10 v-26 q0 -10 10 -10z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="927" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">How's the deadline?</text>
    <!-- Dailbert reply -->
    <path d="M1000 96 h140 q10 0 10 10 v40 q0 10 -10 10 h-48 l-14 16 v-16 h-78 q-10 0 -10 -10 v-40 q0 -10 10 -10z" fill="#fff" stroke="#111" stroke-width="2.4"/>
    <text x="1070" y="118" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Can't. I'm eleven</text>
    <text x="1070" y="136" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">sips behind on my</text>
    <text x="1070" y="154" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">unlock quota.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>