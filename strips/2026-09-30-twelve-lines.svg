      <line x1="216" y1="90" x2="235" y2="132" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <text x="122" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">For the vacation</text>
      <text x="122" y="61" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">tracker, I recommend</text>
      <text x="122" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">six microservices</text>
      <text x="122" y="95" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">and a message queue.</text>

      <!-- Doug beside -->
