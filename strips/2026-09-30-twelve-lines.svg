      <path d="M96 232 h150 v46 h-138 l-8 12 l-2 -12 h-2 z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="171" y="252" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">It just says who's</text>
      <text x="171" y="269" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">out on Friday.</text>
    </g>
