<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- head -->
        <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 8 q10 -8 6 4 q-3 7 4 4" />
        <!-- glasses -->
        <circle cx="49" cy="42" r="9" fill="#f4f1ea"/>
        <circle cx="72" cy="42" r="9" fill="#f4f1ea"/>
        <line x1="58" y1="42" x2="63" y2="42"/>
        <!-- eyes -->
        <circle cx="49" cy="42" r="1.6" fill="#111"/>
        <circle cx="72" cy="42" r="1.6" fill="#111"/>
        <!-- weary brows -->
        <line x1="43" y1="33" x2="53" y2="35"/>
        <line x1="68" y1="35" x2="78" y2="33"/>
        <!-- flat mouth -->
        <line x1="52" y1="60" x2="68" y2="60"/>
        <!-- neck/collar -->
        <path d="M50 74 l0 8 M70 74 l0 8"/>
        <path d="M42 92 l18 -10 18 10"/>
        <!-- tie -->
        <path d="M60 82 l-5 8 l5 26 l5 -26 z" fill="#f4f1ea"/>
        <!-- shoulders -->
        <path d="M30 132 q6 -34 30 -40 q24 6 30 40" fill="#f4f1ea"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="58" cy="44" r="34" fill="#f4f1ea"/>
        <!-- hair tuft -->
        <path d="M46 14 q6 -8 10 0 M58 12 q6 -7 9 1"/>
        <!-- dot eyes -->
        <circle cx="48" cy="42" r="2.4" fill="#111"/>
        <circle cx="70" cy="42" r="2.4" fill="#111"/>
        <!-- big grin -->
        <path d="M42 54 q16 20 34 0" />
        <!-- collar -->
        <path d="M44 92 l14 -8 14 8" fill="#f4f1ea"/>
        <!-- shoulders -->
        <path d="M26 134 q8 -36 32 -42 q24 6 32 42" fill="#f4f1ea"/>
        <!-- mug in hand -->
        <g stroke-width="2.2">
          <rect x="92" y="96" width="26" height="26" rx="3" fill="#f4f1ea"/>
          <path d="M118 102 q10 0 10 8 q0 8 -10 8"/>
          <path d="M100 90 q0 -6 6 -6 M110 90 q0 -5 5 -5"/>
        </g>
      </g>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- head -->
        <ellipse cx="60" cy="46" rx="28" ry="30" fill="#f4f1ea"/>
        <!-- two devil-horn spikes -->
        <path d="M40 22 l-6 -18 l16 12 Z" fill="#f4f1ea"/>
        <path d="M80 22 l6 -18 l-16 12 Z" fill="#f4f1ea"/>
        <!-- beady eyes -->
        <circle cx="52" cy="46" r="1.4" fill="#111"/>
        <circle cx="70" cy="46" r="1.4" fill="#111"/>
        <!-- brows -->
        <line x1="47" y1="41" x2="56" y2="42"/>
        <line x1="66" y1="42" x2="75" y2="41"/>
        <!-- smug mouth -->
        <path d="M52 60 q8 5 16 0"/>
        <!-- collar + tie -->
        <path d="M46 76 l14 8 14 -8" fill="#f4f1ea"/>
        <path d="M60 84 l-5 8 l5 24 l5 -24 z" fill="#f4f1ea"/>
        <!-- suit shoulders -->
        <path d="M28 132 q6 -34 32 -40 q26 6 32 40" fill="#f4f1ea"/>
        <path d="M60 84 l-16 8 M60 84 l16 8"/>
      </g>
    </symbol>

    <!-- THE CLANKER head -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- antenna -->
        <line x1="60" y1="14" x2="60" y2="2"/>
        <circle cx="60" cy="2" r="3" fill="#111"/>
        <!-- head box -->
        <rect x="24" y="14" width="72" height="66" rx="8" fill="#f4f1ea"/>
        <!-- slot eyes (glowing) -->
        <rect x="34" y="32" width="22" height="10" rx="2" fill="#111"/>
        <rect x="64" y="32" width="22" height="10" rx="2" fill="#111"/>
        <rect x="37" y="34" width="6" height="6" fill="#f4f1ea"/>
        <rect x="67" y="34" width="6" height="6" fill="#f4f1ea"/>
        <!-- grille mouth -->
        <rect x="38" y="56" width="44" height="14" rx="2"/>
        <line x1="46" y1="56" x2="46" y2="70"/>
        <line x1="54" y1="56" x2="54" y2="70"/>
        <line x1="62" y1="56" x2="62" y2="70"/>
        <line x1="70" y1="56" x2="70" y2="70"/>
        <line x1="74" y1="56" x2="74" y2="70"/>
        <!-- side bolts -->
        <circle cx="24" cy="47" r="3"/>
        <circle cx="96" cy="47" r="3"/>
      </g>
    </symbol>

    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="0" stroke="#111" stroke-width="0.5" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <line x1="0" y1="292" x2="400" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- monitor -->
    <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round">
      <rect x="238" y="150" width="140" height="104" rx="6" fill="#f4f1ea"/>
      <rect x="250" y="162" width="116" height="80" rx="3" fill="#f4f1ea"/>
      <rect x="250" y="162" width="116" height="80" rx="3" fill="url(#scan)" stroke="none"/>
      <path d="M296 254 l0 16 M280 288 l58 0 M308 254 l0 16" stroke-linecap="round"/>
    </g>
    <!-- clanker inside monitor -->
    <use href="#clanker" x="266" y="164" width="84" height="77"/>

    <!-- dailbert -->
    <use href="#dailbert" x="34" y="150" width="150" height="200"/>

    <!-- human balloon -->
    <g>
      <path d="M40 26 q0 -12 12 -12 l120 0 q12 0 12 12 l0 30 q0 12 -12 12 l-70 0 l-18 18 l2 -18 l-24 0 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="112" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">My backlog's</text>
      <text x="112" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">empty.</text>
    </g>

    <!-- clanker balloon (screen-edged, dashed connector to monitor) -->
    <line x1="300" y1="150" x2="300" y2="122" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <g>
      <rect x="196" y="26" width="188" height="96" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="201" y="31" width="178" height="86" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="290" y="52" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You said Tuesdays</text>
      <text x="290" y="70" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">wear you out.</text>
      <text x="290" y="88" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I took the small</text>
      <text x="290" y="106" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">ones.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="0" y1="292" x2="400" y2="292" stroke="#111" stroke-width="2.4"/>

    <!-- doug on left -->
    <use href="#doug" x="18" y="150" width="165" height="200"/>
    <!-- dailbert on right -->
    <use href="#dailbert" x="236" y="152" width="150" height="200"/>

    <!-- doug balloon -->
    <g>
      <path d="M20 24 q0 -12 12 -12 l150 0 q12 0 12 12 l0 44 q0 12 -12 12 l-96 0 l-16 18 l2 -18 l-40 0 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="107" y="36" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">You cleared all</text>
      <text x="107" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">that before your</text>
      <text x="107" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">coffee?</text>
    </g>

    <!-- dailbert balloon -->
    <g>
      <path d="M232 30 q0 -12 12 -12 l120 0 q12 0 12 12 l0 30 q0 12 -12 12 l-52 0 l-16 18 l2 -18 l-54 0 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="304" y="42" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I didn't</text>
      <text x="304" y="60" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">touch it.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="0" y1="292" x2="400" y2="292" stroke="#111" stroke-width="2.4"/>

    <!-- dailbert left -->
    <use href="#dailbert" x="16" y="152" width="150" height="200"/>
    <!-- boss right, arms up -->
    <use href="#boss" x="232" y="150" width="150" height="200"/>

    <!-- dailbert balloon -->
    <g>
      <path d="M18 28 q0 -12 12 -12 l150 0 q12 0 12 12 l0 44 q0 12 -12 12 l-96 0 l-16 18 l2 -18 l-40 0 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="105" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">That was a favor,</text>
      <text x="105" y="58" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">not a metric.</text>
    </g>

    <!-- boss balloon -->
    <g>
      <path d="M206 24 q0 -12 12 -12 l152 0 q12 0 12 12 l0 44 q0 12 -12 12 l-40 0 l-16 18 l2 -18 l-98 0 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="294" y="36" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Even better. Let's</text>
      <text x="294" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">favor us every</text>
      <text x="294" y="72" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">day.</text>
    </g>
  </g>
</svg>