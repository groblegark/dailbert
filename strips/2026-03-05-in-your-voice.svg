<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">In Your Voice</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-03-05</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M18 168 Q18 122 60 118 Q102 122 102 168" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="53" y="104" width="14" height="18" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M52 120 L60 138 L68 120" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M58 130 L60 150 L62 130 Z" fill="#111"/>
      <ellipse cx="60" cy="72" rx="27" ry="33" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="33" cy="72" r="5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="87" cy="72" r="5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M60 41 q7 -11 15 -4 q6 6 -3 10" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="49" cy="74" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="71" cy="74" r="9" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="74" x2="62" y2="74" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="74" r="2.2" fill="#111"/>
      <circle cx="71" cy="74" r="2.2" fill="#111"/>
      <path d="M52 92 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 170">
      <path d="M14 168 Q14 120 60 116 Q106 120 106 168" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="52" y="100" width="16" height="18" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="70" r="32" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M40 44 q6 -9 12 -2" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M68 42 q6 -9 12 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="49" cy="66" r="3" fill="#111"/>
      <circle cx="71" cy="66" r="3" fill="#111"/>
      <path d="M42 80 q18 22 36 0" fill="#fff" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M16 168 Q16 120 60 116 Q104 120 104 168" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M46 150 q14 8 28 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="53" y="102" width="14" height="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M32 76 Q30 32 60 30 Q90 32 88 76 Q78 50 60 50 Q42 50 32 76 Z" fill="#111"/>
      <circle cx="60" cy="25" r="9" fill="#111"/>
      <ellipse cx="60" cy="74" rx="25" ry="30" fill="#fff" stroke="#111" stroke-width="3"/>
      <path d="M35 58 Q33 40 55 40" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <path d="M85 58 Q87 40 65 40" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
      <rect x="40" y="69" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="69" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="74" x2="64" y2="74" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="74.5" r="2" fill="#111"/>
      <circle cx="72" cy="74.5" r="2" fill="#111"/>
      <path d="M54 92 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- ===== CLANKER (light on dark surface) ===== -->
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="7" stroke="#cdd3cd" stroke-width="2.5"/>
      <circle cx="50" cy="5" r="3" fill="#cdd3cd"/>
      <rect x="22" y="18" width="56" height="52" rx="8" fill="none" stroke="#cdd3cd" stroke-width="3"/>
      <rect x="30" y="34" width="16" height="7" rx="3" fill="#eafff0" stroke="#cdd3cd" stroke-width="1.5"/>
      <rect x="54" y="34" width="16" height="7" rx="3" fill="#eafff0" stroke="#cdd3cd" stroke-width="1.5"/>
      <rect x="34" y="52" width="32" height="10" rx="2" fill="none" stroke="#cdd3cd" stroke-width="2"/>
      <line x1="41" y1="52" x2="41" y2="62" stroke="#cdd3cd" stroke-width="1.5"/>
      <line x1="50" y1="52" x2="50" y2="62" stroke="#cdd3cd" stroke-width="1.5"/>
      <line x1="59" y1="52" x2="59" y2="62" stroke="#cdd3cd" stroke-width="1.5"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="0" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <line x1="16" y1="252" x2="384" y2="252" stroke="#111" stroke-width="2.5"/>
    <!-- monitor -->
    <rect x="150" y="150" width="118" height="84" rx="4" fill="#26302a" stroke="#111" stroke-width="3"/>
    <rect x="196" y="234" width="26" height="12" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <line x1="182" y1="248" x2="236" y2="248" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="170" y="150" width="78" height="78"/>
    <!-- dailbert seated -->
    <use href="#dailbert" x="8" y="100" width="122" height="172"/>
    <!-- doug standing -->
    <use href="#doug" x="272" y="96" width="122" height="172"/>
    <!-- doug mug -->
    <rect x="300" y="206" width="34" height="30" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M334 212 q12 2 0 16" fill="none" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="317" cy="207" rx="15" ry="4" fill="#2b241f"/>

    <!-- clanker balloon -->
    <line x1="92" y1="78" x2="196" y2="152" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="12" y="10" width="158" height="66" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="17" y="15" width="148" height="56" fill="none" stroke="#111" stroke-width="1"/>
    <text x="91" y="31" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I answered your</text>
    <text x="91" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">emails, Doug —</text>
    <text x="91" y="65" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">in your voice.</text>

    <!-- doug balloon -->
    <rect x="246" y="14" width="150" height="52" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="334,108 318,64 345,64" fill="#fff"/>
    <path d="M318 64 L334 108 L345 64" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="321" y="37" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Oh, nice! Saves</text>
    <text x="321" y="55" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">me typing.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="414" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="430" y1="256" x2="798" y2="256" stroke="#111" stroke-width="2.5"/>
    <!-- faint empty chair, background, unremarked -->
    <g stroke="#c3bdb0" stroke-width="2.5" fill="none">
      <rect x="596" y="176" width="40" height="30" rx="4"/>
      <line x1="616" y1="206" x2="616" y2="234"/>
      <line x1="600" y1="234" x2="632" y2="234"/>
    </g>
    <!-- priya -->
    <use href="#priya" x="424" y="104" width="118" height="168"/>
    <!-- printed page in her hand -->
    <rect x="500" y="204" width="38" height="46" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <line x1="507" y1="214" x2="531" y2="214" stroke="#8a8478" stroke-width="1.5"/>
    <line x1="507" y1="222" x2="531" y2="222" stroke="#8a8478" stroke-width="1.5"/>
    <line x1="507" y1="230" x2="524" y2="230" stroke="#8a8478" stroke-width="1.5"/>
    <!-- doug -->
    <use href="#doug" x="670" y="100" width="120" height="170"/>
    <rect x="698" y="208" width="34" height="30" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M732 214 q12 2 0 16" fill="none" stroke="#111" stroke-width="2.5"/>
    <ellipse cx="715" cy="209" rx="15" ry="4" fill="#2b241f"/>

    <!-- priya balloon -->
    <rect x="428" y="12" width="152" height="52" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="492,110 483,62 510,62" fill="#fff"/>
    <path d="M483 62 L492 110 L510 62" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="504" y="35" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It signed one</text>
    <text x="504" y="53" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">'warmly, Doug.'</text>

    <!-- doug balloon -->
    <rect x="688" y="18" width="124" height="40" rx="15" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="728,112 718,56 742,56" fill="#fff"/>
    <path d="M718 56 L728 112 L742 56" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="750" y="43" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">That's so me.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="828" y="4" width="400" height="332" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="844" y1="288" x2="1212" y2="288" stroke="#111" stroke-width="2.5"/>
    <!-- doug, larger, looking down -->
    <use href="#doug" x="920" y="70" width="150" height="210"/>
    <!-- big mug held up, clanker in the coffee -->
    <rect x="976" y="212" width="98" height="64" rx="8" fill="#fff" stroke="#111" stroke-width="3"/>
    <path d="M1074 224 q22 4 0 34" fill="none" stroke="#111" stroke-width="3"/>
    <ellipse cx="1025" cy="214" rx="46" ry="13" fill="#241d18" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="1001" y="180" width="48" height="48"/>

    <!-- deep-beat balloon -->
    <rect x="838" y="12" width="150" height="52" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="972,112 900,64 928,64" fill="#fff"/>
    <path d="M900 64 L972 112 L928 64" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="913" y="35" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">It even did my</text>
    <text x="913" y="53" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">little smileys.</text>

    <!-- button balloon -->
    <rect x="1092" y="150" width="66" height="40" rx="15" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <polygon points="1082,196 1100,150 1120,150" fill="#fff"/>
    <path d="M1100 150 L1082 196 L1120 150" fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1125" y="175" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">Huh.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>