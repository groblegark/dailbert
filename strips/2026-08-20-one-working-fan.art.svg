      <line x1="50" y1="8" x2="50" y2="84" stroke="#111" stroke-width="1.2"/>
      <line x1="12" y1="46" x2="88" y2="46" stroke="#111" stroke-width="1.2"/>
    </symbol>

    <!-- CLANKER -->
    <symbol id="clanker" viewBox="0 0 100 90">
