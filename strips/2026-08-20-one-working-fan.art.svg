      <circle cx="49" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="46" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 62 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 78 q20 12 40 0 l10 46 q-30 12 -60 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M60 80 l-7 16 l7 8 l7 -8 z" fill="#111"/>
      <path d="M60 104 l0 20" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
