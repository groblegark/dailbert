      <rect x="28" y="104" width="44" height="10" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="46" r="38" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="46" r="30" fill="#f4f1ea" stroke="#111" stroke-width="1.6"/>
      <circle cx="50" cy="46" r="7" fill="#111"/>
      <path d="M50 46 q22 -8 24 -22 q-16 4 -24 22" fill="#111" opacity="0.28"/>
      <path d="M50 46 q8 22 -6 30 q-8 -14 6 -30" fill="#111" opacity="0.28"/>
      <path d="M50 46 q-22 -6 -30 6 q14 12 30 -6" fill="#111" opacity="0.28"/>
