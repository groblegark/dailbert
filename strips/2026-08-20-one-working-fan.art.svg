    <g opacity="0.14">
      <rect x="20" y="14" width="360" height="60" fill="#111"/>
      <rect x="20" y="14" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="34" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="54" width="360" height="10" fill="#f4f1ea"/>
    </g>
    <rect x="0" y="270" width="400" height="14" fill="#111"/>
    <use href="#fan" x="150" y="150" width="100" height="120"/>
    <use href="#dailbert" x="18" y="118" width="120" height="160"/>
    <use href="#doug" x="262" y="112" width="120" height="160"/>
    <use href="#mug" x="340" y="210" width="60" height="60"/>
    <g>
      <rect x="238" y="18" width="150" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M300 68 l-6 20 l20 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="313" y="38" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It's a two-person</text>
      <text x="313" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">fan now.</text>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <g opacity="0.14">
      <rect x="20" y="14" width="360" height="60" fill="#111"/>
      <rect x="20" y="14" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="34" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="54" width="360" height="10" fill="#f4f1ea"/>
    </g>
    <rect x="0" y="270" width="400" height="14" fill="#111"/>
    <use href="#fan" x="150" y="150" width="100" height="120"/>
    <use href="#dailbert" x="18" y="118" width="120" height="160"/>
    <use href="#doug" x="262" y="112" width="120" height="160"/>
    <use href="#mug" x="340" y="210" width="60" height="60"/>

    <rect x="24" y="196" width="86" height="66" rx="4" fill="#111"/>
    <rect x="30" y="202" width="74" height="54" rx="3" fill="#2a2a2a"/>
    <g transform="translate(37,208)"><use href="#clanker" x="0" y="0" width="60" height="54"/></g>
    <rect x="58" y="262" width="18" height="8" fill="#111"/>

    <line x1="118" y1="212" x2="152" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
    <g>
      <rect x="150" y="76" width="204" height="58" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="252" y="96" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">I booked the good</text>
      <text x="252" y="113" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">conference room for</text>
      <text x="252" y="130" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">you. It has A/C.</text>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <g opacity="0.14">
      <rect x="20" y="14" width="360" height="60" fill="#111"/>
      <rect x="20" y="14" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="34" width="360" height="10" fill="#f4f1ea"/>
      <rect x="20" y="54" width="360" height="10" fill="#f4f1ea"/>
    </g>
    <rect x="0" y="270" width="400" height="14" fill="#111"/>
    <use href="#fan" x="150" y="150" width="100" height="120"/>
    <use href="#dailbert" x="18" y="118" width="120" height="160"/>
    <use href="#doug" x="262" y="112" width="120" height="160"/>
    <use href="#mug" x="340" y="210" width="60" height="60"/>

    <g>
      <rect x="18" y="18" width="150" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M78 68 l-4 20 l18 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="93" y="38" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The fan is here,</text>
      <text x="93" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">though.</text>
    </g>

    <g>
      <rect x="228" y="18" width="162" height="52" rx="16" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M300 68 l-6 20 l20 -14 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="309" y="38" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">And I've got</text>
      <text x="309" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">the coffee.</text>
    </g>
