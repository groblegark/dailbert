      <line x1="50" y1="20" x2="50" y2="8" stroke="#111" stroke-width="2.2"/>
      <circle cx="50" cy="6" r="3.5" fill="#111"/>
      <rect x="30" y="34" width="14" height="8" rx="2" fill="#111"/>
      <rect x="56" y="34" width="14" height="8" rx="2" fill="#111"/>
      <rect x="30" y="56" width="40" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="38" y1="56" x2="38" y2="64" stroke="#111" stroke-width="1.6"/>
      <line x1="46" y1="56" x2="46" y2="64" stroke="#111" stroke-width="1.6"/>
      <line x1="54" y1="56" x2="54" y2="64" stroke="#111" stroke-width="1.6"/>
      <line x1="62" y1="56" x2="62" y2="64" stroke="#111" stroke-width="1.6"/>
