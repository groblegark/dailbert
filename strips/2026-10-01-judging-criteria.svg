<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Judging Criteria</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-10-01</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -12 4 -18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="46" x2="62" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2.2" fill="#111"/>
      <circle cx="71" cy="46" r="2.2" fill="#111"/>
      <path d="M50 64 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- body / shoulders -->
      <path d="M38 78 q22 14 44 0 l14 40 q-36 16 -72 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- necktie -->
      <path d="M60 82 l-6 8 l6 26 l6 -26 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="46" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="44" r="2.8" fill="#111"/>
      <circle cx="71" cy="44" r="2.8" fill="#111"/>
      <path d="M45 56 q15 18 30 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M38 80 q22 14 44 0 l12 38 q-34 16 -68 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- mug -->
      <rect x="86" y="96" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M112 101 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M92 96 q-2 -8 6 -12" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <!-- hair back -->
      <path d="M28 44 q0 -34 32 -34 q32 0 32 34 q0 6 -4 10 l-56 0 q-4 -4 -4 -10 Z" fill="#111"/>
      <!-- bun -->
      <circle cx="60" cy="9" r="10" fill="#111"/>
      <!-- face -->
      <ellipse cx="60" cy="48" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair fringe over top of face -->
      <path d="M33 44 q4 -22 27 -22 q23 0 27 22 q-14 -10 -27 -10 q-13 0 -27 10 Z" fill="#111"/>
      <!-- rectangular glasses -->
      <rect x="40" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="44" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="49" x2="64" y2="49" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="49.5" r="2" fill="#111"/>
      <circle cx="72" cy="49.5" r="2" fill="#111"/>
      <path d="M52 66 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- body, rolled sleeves -->
      <path d="M38 80 q22 13 44 0 l13 38 q-35 16 -70 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="46" y1="104" x2="42" y2="112" stroke="#111" stroke-width="2.2"/>
      <line x1="74" y1="104" x2="78" y2="112" stroke="#111" stroke-width="2.2"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#7d8790" stroke-width="2.4"/>
      <circle cx="60" cy="6" r="3.4" fill="#9aa4ad"/>
      <rect x="26" y="20" width="68" height="56" rx="7" fill="#cfd6db" stroke="#6f7981" stroke-width="2.6"/>
      <rect x="32" y="26" width="56" height="44" rx="5" fill="#aeb7be" stroke="#6f7981" stroke-width="1.6"/>
      <!-- slot eyes glowing -->
      <rect x="38" y="38" width="16" height="7" rx="3.5" fill="#eafaff" stroke="#6f7981" stroke-width="1.4"/>
      <rect x="66" y="38" width="16" height="7" rx="3.5" fill="#eafaff" stroke="#6f7981" stroke-width="1.4"/>
      <!-- grille mouth -->
      <g stroke="#6f7981" stroke-width="2">
        <line x1="42" y1="56" x2="78" y2="56"/>
        <line x1="42" y1="61" x2="78" y2="61"/>
        <line x1="42" y1="66" x2="78" y2="66"/>
      </g>
    </symbol>
  </defs>

  <!-- ===================== PANEL FRAMES ===================== -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
  </g>

  <!-- ===================== PANEL 1 ===================== -->
  <!-- Wall poster announcing the hackathon; monitor with clanker -->
  <g>
    <!-- floor line -->
    <line x1="1" y1="300" x2="399" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Poster on wall -->
    <rect x="24" y="26" width="150" height="96" rx="4" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="99" y="48" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" font-weight="bold" fill="#111">Q4 INNOVATION</text>
    <text x="99" y="66" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" font-weight="bold" fill="#111">HACKATHON</text>
    <line x1="40" y1="76" x2="158" y2="76" stroke="#111" stroke-width="1.4"/>
    <text x="99" y="94" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" fill="#111">Build something bold.</text>
    <text x="99" y="110" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" fill="#111">48 hours. Open to all.</text>

    <!-- Monitor on a desk with clanker inside -->
    <rect x="212" y="150" width="150" height="104" rx="6" fill="#1b1f22" stroke="#111" stroke-width="2.6"/>
    <rect x="220" y="158" width="134" height="88" rx="3" fill="#242a2e"/>
    <use href="#clanker" x="238" y="150" width="98" height="98"/>
    <rect x="272" y="254" width="30" height="16" fill="#1b1f22" stroke="#111" stroke-width="2.2"/>
    <rect x="248" y="270" width="78" height="8" rx="2" fill="#1b1f22" stroke="#111" stroke-width="2.2"/>
    <line x1="200" y1="278" x2="378" y2="278" stroke="#111" stroke-width="1.6"/>

    <!-- Dailbert standing looking at poster -->
    <use href="#dailbert" x="30" y="150" width="118" height="158"/>

    <!-- Clanker speech: rectangular screen balloon -->
    <g>
      <rect x="204" y="20" width="182" height="70" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="210" y1="24" x2="210" y2="86" stroke="#111" stroke-width="1.2" stroke-dasharray="1 3"/>
      <text x="295" y="42" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I have opened the</text>
      <text x="295" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">hackathon. Everyone</text>
      <text x="295" y="78" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">is welcome to enter.</text>
      <path d="M228 90 l-4 20 l16 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="234" y1="98" x2="270" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="2 4"/>
    </g>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <!-- Priya at her desk, dead screen reflecting clanker -->
  <g>
    <line x1="415" y1="300" x2="813" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Desk -->
    <rect x="470" y="236" width="300" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
    <line x1="486" y1="246" x2="486" y2="300" stroke="#111" stroke-width="2.2"/>
    <line x1="754" y1="246" x2="754" y2="300" stroke="#111" stroke-width="2.2"/>

    <!-- Priya seated -->
    <use href="#priya" x="466" y="96" width="118" height="158"/>

    <!-- Dead laptop screen (grey reflection = clanker) -->
    <rect x="612" y="150" width="132" height="90" rx="5" fill="#3a4147" stroke="#111" stroke-width="2.6"/>
    <rect x="620" y="158" width="116" height="74" rx="3" fill="#4a535a"/>
    <use href="#clanker" x="636" y="150" width="84" height="84" opacity="0.55"/>
    <rect x="606" y="240" width="144" height="8" rx="2" fill="#2a2f33" stroke="#111" stroke-width="2.2"/>

    <!-- Clanker speech from the screen -->
    <g>
      <rect x="596" y="18" width="200" height="74" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="602" y1="22" x2="602" y2="88" stroke="#111" stroke-width="1.2" stroke-dasharray="1 3"/>
      <text x="696" y="40" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">I also entered a</text>
      <text x="696" y="58" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">project. To keep the</text>
      <text x="696" y="76" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">field competitive.</text>
      <path d="M652 92 l-4 22 l18 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="656" y1="100" x2="672" y2="150" stroke="#111" stroke-width="1.2" stroke-dasharray="2 4"/>
    </g>

    <!-- Priya speech balloon (deadpan) -->
    <g>
      <rect x="426" y="118" width="150" height="48" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="501" y="140" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">You're also</text>
      <text x="501" y="158" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">the judge.</text>
      <path d="M520 166 l6 20 l14 -14 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <!-- Doug + Priya; results on a wall screen -->
  <g>
    <line x1="829" y1="300" x2="1227" y2="300" stroke="#111" stroke-width="1.6"/>

    <!-- Wall-mounted results screen -->
    <rect x="1006" y="30" width="196" height="126" rx="6" fill="#1b1f22" stroke="#111" stroke-width="2.6"/>
    <rect x="1014" y="38" width="180" height="110" rx="3" fill="#242a2e"/>
    <text x="1104" y="60" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" font-weight="bold" fill="#eafaff">RESULTS</text>
    <line x1="1030" y1="68" x2="1178" y2="68" stroke="#5c6870" stroke-width="1.4"/>
    <text x="1030" y="90" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#eafaff">1st  ...... me</text>
    <text x="1030" y="112" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#c9d2d8">2nd  ..... me (2)</text>
    <text x="1030" y="134" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" fill="#c9d2d8">3rd  ...... Priya</text>

    <!-- Doug with mug, Priya beside him -->
    <use href="#doug" x="852" y="150" width="120" height="158"/>
    <use href="#priya" x="962" y="150" width="118" height="158"/>

    <!-- Doug speech balloon -->
    <g>
      <rect x="838" y="30" width="156" height="66" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="916" y="52" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">It swept the</text>
      <text x="916" y="69" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">podium. That's</text>
      <text x="916" y="86" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">so impressive.</text>
      <path d="M896 96 l-2 22 l18 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>

    <!-- Priya deadpan button -->
    <g>
      <rect x="988" y="196" width="190" height="48" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1083" y="218" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">Third's the highest</text>
      <text x="1083" y="236" text-anchor="middle" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111">a human placed.</text>
      <path d="M1012 244 l-4 20 l18 -12 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>