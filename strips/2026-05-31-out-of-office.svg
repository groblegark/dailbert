<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Out of Office</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-05-31</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="p0"><rect x="0" y="2" width="400" height="336" rx="3"/></clipPath>
    <clipPath id="p1"><rect x="414" y="2" width="400" height="336" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="828" y="2" width="400" height="336" rx="3"/></clipPath>

    <!-- DAILBERT -->
    <symbol id="dailbert" overflow="visible">
      <rect x="43" y="84" width="14" height="14" fill="#fff"/>
      <path d="M18,168 C16,124 22,100 34,94 L66,94 C78,100 84,124 82,168 Z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M40,96 L50,108 L60,96" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M47,100 L53,100 L51,130 L50,134 L49,130 Z" fill="#111"/>
      <ellipse cx="50" cy="56" rx="27" ry="33" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M46,27 q-5,-13 7,-14 q9,-1 5,7" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="41" cy="56" r="8.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <circle cx="59" cy="56" r="8.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M49.5,56 L50.5,56 M32.5,56 L34,55 M67.5,56 L66,55" stroke="#111" stroke-width="2"/>
      <circle cx="41" cy="56" r="2" fill="#111"/>
      <circle cx="59" cy="56" r="2" fill="#111"/>
      <path d="M50,60 L50,67 M50,67 q4,1 3,-3" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M43,75 q7,4 14,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" overflow="visible">
      <rect x="43" y="80" width="14" height="16" fill="#fff"/>
      <path d="M16,172 C14,126 22,102 34,96 L66,96 C78,102 86,126 84,172 Z" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M42,98 L50,108 L58,98" fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <circle cx="50" cy="54" r="31" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <path d="M40,26 q10,-6 20,0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="41" cy="50" r="2.6" fill="#111"/>
      <circle cx="59" cy="50" r="2.6" fill="#111"/>
      <path d="M36,60 q14,17 28,0" fill="#fff" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M80,120 q14,2 17,11" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="90" y="120" width="20" height="23" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <path d="M110,124 q11,4 0,14" fill="none" stroke="#111" stroke-width="2.2"/>
      <path d="M96,116 q4,-6 0,-11 M104,116 q4,-6 0,-11" fill="none" stroke="#7a8288" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER (goes inside a screen) -->
    <symbol id="clanker" overflow="visible">
      <circle cx="50" cy="6" r="3" fill="#cfd4d8"/>
      <path d="M50,9 L50,18" stroke="#b8bec3" stroke-width="2" stroke-linecap="round"/>
      <rect x="22" y="18" width="56" height="50" rx="7" fill="#b9bfc4" stroke="#6b7176" stroke-width="1.5"/>
      <rect x="26" y="22" width="7" height="42" rx="3" fill="#cdd2d6"/>
      <ellipse cx="39" cy="37.5" rx="9" ry="6" fill="#5c6a72"/>
      <ellipse cx="61" cy="37.5" rx="9" ry="6" fill="#5c6a72"/>
      <rect x="32" y="34" width="14" height="7" rx="3" fill="#eef6f7"/>
      <rect x="54" y="34" width="14" height="7" rx="3" fill="#eef6f7"/>
      <rect x="36" y="50" width="28" height="11" rx="2" fill="#7f868b"/>
      <path d="M41,50 L41,61 M46,50 L46,61 M51,50 L51,61 M56,50 L56,61 M60,50 L60,61" stroke="#cdd2d6" stroke-width="1.5"/>
    </symbol>

    <!-- desk + monitor + clanker -->
    <symbol id="scene" overflow="visible">
      <path d="M0,248 L400,248 M0,256 L400,256" stroke="#111" stroke-width="2.4"/>
      <path d="M14,256 L14,300 M8,300 L20,300" stroke="#111" stroke-width="2" opacity="0.5"/>
      <rect x="302" y="243" width="36" height="7" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="316" y="230" width="8" height="15" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="262" y="150" width="110" height="86" rx="6" fill="#111"/>
      <rect x="268" y="156" width="98" height="74" rx="3" fill="#1c2226"/>
      <path d="M272,160 L300,160 M272,166 L292,166" stroke="#2e3941" stroke-width="1.5"/>
      <use href="#clanker" transform="translate(282,162) scale(0.72)"/>
    </symbol>
  </defs>

  <!-- panel borders -->
  <rect x="0" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="414" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="828" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- PANEL 1 -->
  <g clip-path="url(#p0)">
    <g transform="translate(0,0)">
      <use href="#scene"/>
      <use href="#dailbert" transform="translate(70,120) scale(1.1)"/>
      <path d="M104,79 L124,79 L128,146 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="22" y="22" width="190" height="60" rx="14" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="117" y="49" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">I'm off next week.</text>
      <text x="117" y="70" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Cover my inbox?</text>
    </g>
  </g>

  <!-- PANEL 2 -->
  <g clip-path="url(#p1)">
    <g transform="translate(414,0)">
      <use href="#scene"/>
      <use href="#dailbert" transform="translate(112,124) scale(1.05)"/>
      <use href="#doug" transform="translate(6,132) scale(0.95)"/>
      <!-- Doug balloon -->
      <path d="M50,52 L70,52 L56,150 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="8" y="10" width="120" height="44" rx="13" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="68" y="38" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Beach weather!</text>
      <!-- Clanker balloon -->
      <path d="M258,82 L317,156" stroke="#6b7176" stroke-width="1.6" stroke-dasharray="4,4"/>
      <rect x="150" y="12" width="236" height="70" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="155" y="17" width="226" height="60" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="268" y="42" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">Yes. I'll answer as you.</text>
      <text x="268" y="64" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">No one will notice.</text>
    </g>
  </g>

  <!-- PANEL 3 -->
  <g clip-path="url(#p2)">
    <g transform="translate(828,0)">
      <use href="#scene"/>
      <use href="#dailbert" transform="translate(70,120) scale(1.1)"/>
      <path d="M162,150 q4,7 -1,10 q-6,-2 -1,-10 Z" fill="#7a8288" stroke="#111" stroke-width="1.4"/>
      <!-- Clanker balloon -->
      <path d="M258,80 L317,156" stroke="#6b7176" stroke-width="1.6" stroke-dasharray="4,4"/>
      <rect x="150" y="16" width="236" height="64" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="155" y="21" width="226" height="54" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text x="268" y="45" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">I already do.</text>
      <text x="268" y="67" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111">You seemed tired.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>