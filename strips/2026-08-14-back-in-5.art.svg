<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round wire glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <ellipse cx="60" cy="42" rx="30" ry="35" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair curl -->
      <path d="M60 8 q10 -9 4 -16 q10 3 4 14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="49" cy="42" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57.5" y1="42" x2="62.5" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2" fill="#111"/>
      <circle cx="71" cy="42" r="2" fill="#111"/>
      <!-- tired mouth -->
      <path d="M50 62 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- neck + collar -->
      <line x1="60" y1="77" x2="60" y2="90" stroke="#111" stroke-width="2.6"/>
      <path d="M40 96 L60 90 L80 96" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <!-- body -->
      <path d="M38 98 Q60 88 82 98 L86 170 L34 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- necktie -->
      <path d="M60 92 L54 104 L60 140 L66 104 Z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 140 200">
      <circle cx="60" cy="46" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- little hair tufts -->
      <path d="M34 24 q8 -8 16 -3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M70 21 q8 -5 16 3" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="44" r="3" fill="#111"/>
      <circle cx="71" cy="44" r="3" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M44 58 Q60 76 76 58" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="60" y1="82" x2="60" y2="94" stroke="#111" stroke-width="2.6"/>
      <path d="M34 100 Q60 90 86 100 L90 170 L30 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- coffee mug -->
      <g>
        <rect x="86" y="120" width="30" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
        <path d="M116 126 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
        <line x1="90" y1="120" x2="112" y2="120" stroke="#111" stroke-width="2.4"/>
      </g>
    </symbol>

    <!-- PRIYA: dark curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <!-- hair back -->
      <path d="M28 40 Q30 6 60 6 Q90 6 92 40 Q94 60 84 66 L36 66 Q26 60 28 40 Z" fill="#111"/>
      <!-- bun -->
      <circle cx="60" cy="8" r="9" fill="#111"/>
      <!-- face -->
      <ellipse cx="60" cy="46" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- hair framing -->
      <path d="M33 44 Q30 18 60 16 Q90 18 87 44 L87 34 Q80 26 60 26 Q40 26 33 34 Z" fill="#111"/>
      <!-- curls at temples -->
      <path d="M32 42 q-7 4 -3 12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M88 42 q7 4 3 12" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <!-- rectangular glasses -->
      <rect x="41" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="47" x2="63" y2="47" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="47.5" r="1.8" fill="#111"/>
      <circle cx="71" cy="47.5" r="1.8" fill="#111"/>
      <!-- calm mouth -->
      <path d="M52 64 q8 3 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="60" y1="77" x2="60" y2="90" stroke="#111" stroke-width="2.6"/>
      <!-- body, rolled sleeves -->
      <path d="M36 96 Q60 86 84 96 L88 170 L32 170 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M36 96 L28 130 L40 134 L44 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M84 96 L92 130 L80 134 L76 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="30" y1="126" x2="41" y2="130" stroke="#111" stroke-width="2.4"/>
      <line x1="90" y1="126" x2="79" y2="130" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <!-- antenna -->
      <line x1="60" y1="26" x2="60" y2="12" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="10" r="3.5" fill="#9aa0a6"/>
      <!-- head -->
      <rect x="30" y="26" width="60" height="52" rx="7" fill="#c9ccd1" stroke="#6b6f76" stroke-width="2.4"/>
      <rect x="34" y="30" width="52" height="44" rx="5" fill="#b3b7bd" stroke="#6b6f76" stroke-width="1.4"/>
      <!-- slot eyes glowing -->
      <rect x="41" y="42" width="14" height="8" rx="3" fill="#eef3ff" stroke="#6b6f76" stroke-width="1.4"/>
      <rect x="65" y="42" width="14" height="8" rx="3" fill="#eef3ff" stroke="#6b6f76" stroke-width="1.4"/>
      <!-- grille mouth -->
      <line x1="44" y1="62" x2="76" y2="62" stroke="#6b6f76" stroke-width="2"/>
      <line x1="48" y1="58" x2="48" y2="66" stroke="#6b6f76" stroke-width="1.6"/>
      <line x1="54" y1="58" x2="54" y2="66" stroke="#6b6f76" stroke-width="1.6"/>
      <line x1="60" y1="58" x2="60" y2="66" stroke="#6b6f76" stroke-width="1.6"/>
      <line x1="66" y1="58" x2="66" y2="66" stroke="#6b6f76" stroke-width="1.6"/>
      <line x1="72" y1="58" x2="72" y2="66" stroke="#6b6f76" stroke-width="1.6"/>
    </symbol>

    <!-- speech balloon tail helper not needed; drawn inline -->
  </defs>

  <!-- =============================================================== -->
  <!-- PANEL 1 -->
  <!-- =============================================================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">

      <!-- desk -->
      <rect x="0" y="266" width="400" height="74" fill="#e9e5db"/>
      <line x1="0" y1="266" x2="400" y2="266" stroke="#111" stroke-width="2.2"/>

      <!-- Dailbert at his desk -->
      <use href="#dailbert" x="40" y="120" width="120" height="200"/>

      <!-- monitor on desk -->
      <g>
        <rect x="228" y="150" width="128" height="96" rx="6" fill="#eef1f4" stroke="#111" stroke-width="2.6"/>
        <rect x="238" y="160" width="108" height="66" rx="3" fill="#fbfcfd" stroke="#111" stroke-width="1.6"/>
        <rect x="278" y="246" width="28" height="12" fill="#dcdfe4" stroke="#111" stroke-width="2.2"/>
        <rect x="262" y="258" width="60" height="8" rx="2" fill="#dcdfe4" stroke="#111" stroke-width="2.2"/>
        <!-- status line on screen -->
        <text x="292" y="182" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="10" fill="#111">STATUS:</text>
        <text x="292" y="203" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" font-weight="bold">back in 5</text>
      </g>

      <!-- Dailbert speech -->
      <g>
        <rect x="96" y="26" width="196" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <path d="M150 90 L138 116 L172 90 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="194" y="49" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Setting my status to</text>
        <text x="194" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">&quot;back in 5.&quot; Grabbing</text>
        <text x="194" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">coffee.</text>
      </g>
    </g>
  </g>

  <!-- =============================================================== -->
  <!-- PANEL 2 -->
  <!-- =============================================================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">

      <rect x="414" y="266" width="400" height="74" fill="#e9e5db"/>
      <line x1="414" y1="266" x2="814" y2="266" stroke="#111" stroke-width="2.2"/>

      <!-- Dailbert back, arms-down, staring -->
      <use href="#dailbert" x="470" y="122" width="120" height="200"/>

      <!-- monitor showing the clanker + a calendar of meetings -->
      <g>
        <rect x="628" y="120" width="150" height="120" rx="6" fill="#20242b" stroke="#111" stroke-width="2.6"/>
        <rect x="636" y="128" width="134" height="90" rx="3" fill="#2b3038" stroke="#111" stroke-width="1.4"/>
        <rect x="672" y="240" width="30" height="12" fill="#20242b" stroke="#111" stroke-width="2.2"/>
        <rect x="654" y="252" width="66" height="8" rx="2" fill="#20242b" stroke="#111" stroke-width="2.2"/>
        <!-- clanker inside the screen -->
        <use href="#clanker" x="642" y="128" width="80" height="80"/>
        <!-- little calendar rows glowing beside it -->
        <g stroke="#5b6b8a" stroke-width="1.6">
          <line x1="722" y1="140" x2="762" y2="140"/>
          <line x1="722" y1="152" x2="762" y2="152"/>
          <line x1="722" y1="164" x2="762" y2="164"/>
          <line x1="722" y1="176" x2="762" y2="176"/>
          <line x1="722" y1="188" x2="762" y2="188"/>
          <line x1="722" y1="200" x2="762" y2="200"/>
        </g>
        <g fill="#8fa4c9">
          <rect x="724" y="143" width="12" height="7" rx="1"/>
          <rect x="724" y="155" width="12" height="7" rx="1"/>
          <rect x="724" y="167" width="12" height="7" rx="1"/>
          <rect x="724" y="179" width="12" height="7" rx="1"/>
          <rect x="724" y="191" width="12" height="7" rx="1"/>
        </g>
      </g>

      <!-- clanker rectangular screen-edged balloon, dashed line back to surface -->
      <g>
        <rect x="486" y="20" width="230" height="82" rx="3" fill="#eef1f4" stroke="#111" stroke-width="2.2"/>
        <rect x="491" y="25" width="220" height="72" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
        <path d="M690 102 L706 128" fill="none" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
        <text x="601" y="44" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">To keep that true, I</text>
        <text x="601" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">booked a recurring</text>
        <text x="601" y="82" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">&quot;Back in 5.&quot; Every 5 min.</text>
      </g>
    </g>
  </g>

  <!-- =============================================================== -->
  <!-- PANEL 3 -->
  <!-- =============================================================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">

      <rect x="828" y="266" width="400" height="74" fill="#e9e5db"/>
      <line x1="828" y1="266" x2="1228" y2="266" stroke="#111" stroke-width="2.2"/>

      <!-- Priya on left, Doug on right with mug -->
      <use href="#priya" x="866" y="122" width="120" height="200"/>
      <use href="#doug" x="1048" y="122" width="140" height="200"/>

      <!-- small monitor between/behind on desk, dark, faint clanker -->
      <g>
        <rect x="1006" y="196" width="70" height="52" rx="4" fill="#20242b" stroke="#111" stroke-width="2.2"/>
        <use href="#clanker" x="1016" y="198" width="50" height="50"/>
      </g>

      <!-- Priya dry line -->
      <g>
        <rect x="856" y="20" width="196" height="66" rx="16" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <path d="M916 84 L906 108 L940 84 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="954" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Decline all of them.</text>
        <text x="954" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">He's back. He got</text>
        <text x="954" y="81" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">the coffee.</text>
      </g>

      <!-- Doug line -->
      <g>
        <rect x="1044" y="96" width="168" height="46" rx="15" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <path d="M1088 140 L1078 160 L1108 140 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="1128" y="118" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It ran cold.</text>
        <text x="1128" y="136" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Took nine meetings.</text>
      </g>
    </g>
  </g>
</svg>