<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Reader</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-01-29</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>

    <symbol id="dailbert" viewBox="0 0 90 160">
      <path d="M18 158 Q18 112 45 108 Q72 112 72 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="40" y="94" width="10" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 110 l-6 8 l6 24 l6 -24 z" fill="#111"/>
      <ellipse cx="45" cy="60" rx="26" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 27 q7 -12 -4 -15" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="60" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="56" cy="60" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="43" y1="60" x2="47" y2="60" stroke="#111" stroke-width="2.5"/>
      <line x1="65" y1="58" x2="72" y2="55" stroke="#111" stroke-width="2"/>
      <circle cx="34" cy="61" r="2.2" fill="#111"/>
      <circle cx="56" cy="61" r="2.2" fill="#111"/>
      <path d="M38 81 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 90 160">
      <path d="M14 158 Q14 110 45 106 Q76 110 76 158 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="40" y="90" width="10" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="45" cy="56" r="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M22 32 q6 -8 13 -5 M43 24 q7 -6 13 -1 M60 30 q6 -6 11 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="52" r="3" fill="#111"/>
      <circle cx="56" cy="52" r="3" fill="#111"/>
      <path d="M28 66 q17 22 34 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M28 66 q17 9 34 0" fill="none" stroke="#111" stroke-width="1.6"/>
    </symbol>

    <symbol id="mug" viewBox="0 0 44 40">
      <rect x="5" y="10" width="24" height="22" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M29 14 q11 0 11 8 q0 7 -11 7" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M12 7 q3 -5 0 -7 M19 7 q3 -5 0 -7" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <symbol id="clanker" viewBox="0 0 120 100">
      <line x1="60" y1="16" x2="60" y2="3" stroke="#8a8f95" stroke-width="2.5"/>
      <circle cx="60" cy="3" r="3" fill="#8a8f95"/>
      <rect x="22" y="16" width="76" height="62" rx="9" fill="#2f353c" stroke="#8a8f95" stroke-width="2.5"/>
      <rect x="33" y="35" width="21" height="9" rx="4.5" fill="#cfe8ff"/>
      <rect x="66" y="35" width="21" height="9" rx="4.5" fill="#cfe8ff"/>
      <line x1="30" y1="39" x2="26" y2="39" stroke="#8a8f95" stroke-width="1.4"/>
      <line x1="90" y1="39" x2="94" y2="39" stroke="#8a8f95" stroke-width="1.4"/>
      <line x1="41" y1="60" x2="79" y2="60" stroke="#8a8f95" stroke-width="1.8"/>
      <line x1="47" y1="60" x2="47" y2="69" stroke="#8a8f95" stroke-width="1.4"/>
      <line x1="55" y1="60" x2="55" y2="69" stroke="#8a8f95" stroke-width="1.4"/>
      <line x1="63" y1="60" x2="63" y2="69" stroke="#8a8f95" stroke-width="1.4"/>
      <line x1="71" y1="60" x2="71" y2="69" stroke="#8a8f95" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g clip-path="url(#clip1)">
    <rect x="1.5" y="1.5" width="397" height="337" fill="#f4f1ea"/>

    <!-- seated dailbert -->
    <use href="#dailbert" x="8" y="70" width="104" height="185"/>
    <!-- arm to keyboard -->
    <path d="M78 178 Q116 208 152 240" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <circle cx="154" cy="242" r="6.5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

    <!-- standing doug -->
    <use href="#doug" x="258" y="76" width="104" height="185"/>
    <use href="#mug" x="266" y="196" width="42" height="38"/>

    <!-- monitor showing SENT -->
    <rect x="150" y="150" width="118" height="94" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="158" y="158" width="102" height="70" rx="2" fill="#e6e3db" stroke="#111" stroke-width="1.5"/>
    <text x="209" y="190" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="16" fill="#111" text-anchor="middle">SENT</text>
    <path d="M188 204 l7 7 l14 -17" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="209" y1="244" x2="209" y2="252" stroke="#111" stroke-width="2.5"/>
    <rect x="122" y="244" width="80" height="10" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>

    <!-- desk front -->
    <rect x="1.5" y="252" width="397" height="86" fill="#f4f1ea"/>
    <line x1="1.5" y1="252" x2="398" y2="252" stroke="#111" stroke-width="2.5"/>

    <!-- balloon dailbert -->
    <path d="M18 60 h150 a12 12 0 0 1 12 12 v22 a12 12 0 0 1 -12 12 h-88 l-14 18 l-2 -18 h-46 a12 12 0 0 1 -12 -12 v-22 a12 12 0 0 1 12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="93" y="89" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Weekly report. Sent.</text>

    <!-- balloon doug -->
    <path d="M286 54 h96 a12 12 0 0 1 12 12 v20 a12 12 0 0 1 -12 12 h-56 l-10 16 l-3 -16 h-27 a12 12 0 0 1 -12 -12 v-20 a12 12 0 0 1 12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="334" y="82" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">Nice one, buddy.</text>

    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g clip-path="url(#clip2)">
    <rect x="415.5" y="1.5" width="397" height="337" fill="#f4f1ea"/>

    <!-- dailbert turned, leaning back -->
    <use href="#dailbert" x="440" y="70" width="106" height="188"/>

    <!-- doug sipping -->
    <use href="#doug" x="676" y="72" width="104" height="185"/>
    <use href="#mug" x="700" y="150" width="42" height="38"/>

    <!-- a sleeping dark monitor between them (surface, no clanker yet) -->
    <rect x="586" y="196" width="92" height="62" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="593" y="203" width="78" height="48" rx="2" fill="#d9d6cd" stroke="#111" stroke-width="1.5"/>
    <line x1="632" y1="258" x2="632" y2="262" stroke="#111" stroke-width="2.5"/>

    <!-- desk front -->
    <rect x="415.5" y="262" width="397" height="76" fill="#f4f1ea"/>
    <line x1="415.5" y1="262" x2="812" y2="262" stroke="#111" stroke-width="2.5"/>

    <!-- balloon dailbert -->
    <path d="M436 42 h164 a12 12 0 0 1 12 12 v24 a12 12 0 0 1 -12 12 h-96 l-14 18 l-2 -18 h-52 a12 12 0 0 1 -12 -12 v-24 a12 12 0 0 1 12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">
      <tspan x="518" y="63">Nobody's read one</tspan>
      <tspan x="518" y="81">in three years.</tspan>
    </text>

    <!-- balloon doug -->
    <path d="M672 46 h108 a12 12 0 0 1 12 12 v20 a12 12 0 0 1 -12 12 h-40 l-10 16 l-3 -16 h-47 a12 12 0 0 1 -12 -12 v-20 a12 12 0 0 1 12 -12 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="726" y="74" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">That's the dream.</text>

    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g clip-path="url(#clip3)">
    <rect x="829.5" y="1.5" width="397" height="337" fill="#f4f1ea"/>
    <!-- night dim -->
    <rect x="829.5" y="1.5" width="397" height="337" fill="#2a2f35" opacity="0.12"/>

    <!-- wall clock, late -->
    <circle cx="870" cy="44" r="19" fill="#f4f1ea" stroke="#7d8288" stroke-width="2.5"/>
    <path d="M870 44 L870 31 M870 44 L879 49" stroke="#7d8288" stroke-width="2.5" stroke-linecap="round"/>

    <!-- empty chairs turned away -->
    <g stroke="#9aa0a6" stroke-width="2.6" fill="none">
      <path d="M886 300 L886 236 Q886 224 900 224 L926 224 Q938 224 938 236 L938 300"/>
      <path d="M1150 306 L1150 240 Q1150 228 1164 228 L1190 228 Q1202 228 1202 240 L1202 306"/>
    </g>

    <!-- monitor glow -->
    <ellipse cx="1040" cy="196" rx="116" ry="86" fill="#cfe8ff" opacity="0.16"/>

    <!-- desk front -->
    <rect x="829.5" y="262" width="397" height="76" fill="#eceadf"/>
    <line x1="829.5" y1="262" x2="1226" y2="262" stroke="#111" stroke-width="2.5"/>

    <!-- glowing monitor with clanker inside -->
    <rect x="978" y="140" width="126" height="100" rx="5" fill="#111"/>
    <rect x="986" y="148" width="110" height="84" rx="2" fill="#1d2228"/>
    <use href="#clanker" x="994" y="152" width="94" height="78"/>
    <line x1="1041" y1="240" x2="1041" y2="262" stroke="#111" stroke-width="2.5"/>

    <!-- dashed line balloon -> screen surface -->
    <line x1="1016" y1="92" x2="1041" y2="140" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>

    <!-- clanker screen-edged balloon -->
    <rect x="926" y="30" width="182" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="931" y="35" width="172" height="50" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" fill="#111" text-anchor="middle">
      <tspan x="1017" y="55">I read all of them.</tspan>
      <tspan x="1017" y="75">Even the footnotes.</tspan>
    </text>

    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="none" stroke="#111" stroke-width="2.5"/>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>