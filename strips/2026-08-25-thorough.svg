<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Thorough</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-08-25</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- ================= SYMBOLS ================= -->

    <!-- DAILBERT: oval head, round glasses, necktie, one hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- body -->
        <path d="M40 200 L40 150 Q60 138 80 150 L80 200" fill="#f4f1ea"/>
        <path d="M40 150 Q60 138 80 150" fill="#f4f1ea"/>
        <!-- shoulders/collar -->
        <path d="M45 152 L60 168 L75 152" fill="#f4f1ea"/>
        <!-- tie -->
        <path d="M60 168 L54 182 L60 194 L66 182 Z" fill="#111"/>
        <!-- neck -->
        <path d="M53 150 L53 140 M67 150 L67 140" />
        <!-- head oval -->
        <ellipse cx="60" cy="108" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 74 q10 -14 2 -20 q-2 8 -8 10" fill="#111" stroke="none"/>
        <path d="M60 74 q10 -14 2 -20 q-2 8 -8 10"/>
        <!-- glasses -->
        <circle cx="49" cy="106" r="8" fill="#f4f1ea"/>
        <circle cx="71" cy="106" r="8" fill="#f4f1ea"/>
        <path d="M57 106 L63 106"/>
        <path d="M41 104 L36 101 M79 104 L84 101"/>
        <!-- eyes -->
        <circle cx="49" cy="106" r="2" fill="#111" stroke="none"/>
        <circle cx="71" cy="106" r="2" fill="#111" stroke="none"/>
        <!-- tired mouth -->
        <path d="M52 126 Q60 123 68 126"/>
      </g>
    </symbol>

    <!-- DOUG: round head, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- body -->
        <path d="M38 200 L38 150 Q65 138 92 150 L92 200" fill="#f4f1ea"/>
        <path d="M46 152 L65 166 L84 152" fill="#f4f1ea"/>
        <!-- neck -->
        <path d="M57 150 L57 138 M73 150 L73 138"/>
        <!-- round head -->
        <circle cx="65" cy="108" r="33" fill="#f4f1ea"/>
        <!-- little hair tufts -->
        <path d="M45 88 q6 -8 12 -4 M83 88 q-6 -8 -12 -4"/>
        <!-- dot eyes -->
        <circle cx="55" cy="104" r="3" fill="#111" stroke="none"/>
        <circle cx="75" cy="104" r="3" fill="#111" stroke="none"/>
        <!-- big goofy grin -->
        <path d="M50 118 Q65 134 80 118 Q65 124 50 118 Z" fill="#f4f1ea"/>
        <path d="M50 118 Q65 134 80 118"/>
        <!-- mug in hand -->
        <rect x="88" y="164" width="22" height="24" rx="2" fill="#f4f1ea"/>
        <path d="M110 168 q10 2 0 14"/>
        <path d="M88 170 L110 170"/>
        <!-- steam -->
        <path d="M94 160 q3 -6 0 -10 M104 160 q3 -6 0 -10"/>
      </g>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 200">
      <g fill="none" stroke="#111" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
        <!-- body -->
        <path d="M40 200 L40 150 Q60 140 80 150 L80 200" fill="#f4f1ea"/>
        <!-- rolled sleeve cuffs -->
        <path d="M40 168 L34 176 M80 168 L86 176"/>
        <path d="M40 162 L40 168 M80 162 L80 168"/>
        <!-- collar -->
        <path d="M50 150 L60 162 L70 150" fill="#f4f1ea"/>
        <!-- neck -->
        <path d="M54 150 L54 140 M66 150 L66 140"/>
        <!-- head -->
        <ellipse cx="60" cy="108" rx="28" ry="32" fill="#f4f1ea"/>
        <!-- curly hair pulled up (bun + curls) -->
        <path d="M34 100 q-4 -30 26 -34 q30 4 26 34 q-4 -18 -26 -18 q-22 0 -26 18Z" fill="#111" stroke="none"/>
        <path d="M60 66 q-6 -12 0 -18 q6 6 0 18" fill="#111" stroke="none"/>
        <circle cx="60" cy="52" r="6" fill="#111" stroke="none"/>
        <path d="M34 100 q-4 -30 26 -34 q30 4 26 34"/>
        <!-- rectangular glasses -->
        <rect x="41" y="102" width="16" height="10" rx="2" fill="#f4f1ea"/>
        <rect x="63" y="102" width="16" height="10" rx="2" fill="#f4f1ea"/>
        <path d="M57 107 L63 107"/>
        <path d="M41 106 L35 104 M79 106 L85 104"/>
        <!-- eyes -->
        <circle cx="49" cy="107" r="2" fill="#111" stroke="none"/>
        <circle cx="71" cy="107" r="2" fill="#111" stroke="none"/>
        <!-- calm mouth -->
        <path d="M53 126 L67 126"/>
      </g>
    </symbol>

    <!-- THE CLANKER: chrome robot head inside a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- head box -->
        <rect x="26" y="34" width="68" height="60" rx="6" fill="#dedad0"/>
        <!-- antenna -->
        <path d="M60 34 L60 20"/>
        <circle cx="60" cy="16" r="4" fill="#111" stroke="none"/>
        <!-- slot eyes glowing -->
        <rect x="36" y="50" width="18" height="8" rx="3" fill="#111" stroke="none"/>
        <rect x="66" y="50" width="18" height="8" rx="3" fill="#111" stroke="none"/>
        <!-- glow lines -->
        <path d="M34 46 L56 46 M64 46 L86 46" stroke-width="1.4" opacity="0.6"/>
        <!-- grille mouth -->
        <rect x="40" y="72" width="40" height="12" rx="2" fill="#f4f1ea"/>
        <path d="M46 72 L46 84 M54 72 L54 84 M62 72 L62 84 M70 72 L70 84" stroke-width="1.6"/>
        <!-- side bolts -->
        <circle cx="30" cy="64" r="2.4" fill="#111" stroke="none"/>
        <circle cx="90" cy="64" r="2.4" fill="#111" stroke="none"/>
      </g>
    </symbol>

    <!-- panel frame -->
    <symbol id="frame" viewBox="0 0 400 340">
      <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <svg x="0" y="0" width="400" height="340" viewBox="0 0 400 340">
    <use href="#frame"/>
    <!-- whiteboard on wall -->
    <rect x="150" y="30" width="230" height="150" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.4"/>
    <line x1="265" y1="34" x2="265" y2="176" stroke="#111" stroke-width="1.6"/>
    <text x="207" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">Went well</text>
    <text x="322" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">Could be better</text>
    <!-- pre-filled sticky-ish lines -->
    <g stroke="#111" stroke-width="1.4">
      <line x1="162" y1="70" x2="256" y2="70"/>
      <line x1="162" y1="86" x2="256" y2="86"/>
      <line x1="162" y1="102" x2="256" y2="102"/>
      <line x1="162" y1="118" x2="256" y2="118"/>
      <line x1="162" y1="134" x2="256" y2="134"/>
      <line x1="162" y1="150" x2="230" y2="150"/>
      <line x1="274" y1="70" x2="368" y2="70"/>
      <line x1="274" y1="86" x2="368" y2="86"/>
      <line x1="274" y1="102" x2="368" y2="102"/>
    </g>
    <!-- dailbert seated looking at it -->
    <use href="#dailbert" x="8" y="150" width="108" height="180"/>
    <!-- balloon -->
    <g>
      <path d="M22 34 h150 v52 h-118 l-14 16 v-16 h-18 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="97" y="54">The retro board's</tspan>
        <tspan x="97" y="72">already full.</tspan>
      </text>
    </g>
  </svg>

  <!-- ============ PANEL 2 ============ -->
  <svg x="414" y="0" width="400" height="340" viewBox="0 0 400 340">
    <use href="#frame"/>
    <!-- wall monitor showing clanker -->
    <rect x="228" y="26" width="150" height="112" rx="6" fill="#e7e3da" stroke="#111" stroke-width="2.6"/>
    <rect x="236" y="34" width="134" height="96" rx="3" fill="#c9c5bc"/>
    <use href="#clanker" x="248" y="34" width="110" height="110"/>
    <!-- monitor stand -->
    <path d="M290 138 L290 150 L316 150 L316 138" fill="none" stroke="#111" stroke-width="2.4"/>
    <line x1="278" y1="150" x2="328" y2="150" stroke="#111" stroke-width="2.4"/>
    <!-- priya standing, arms visible, calm -->
    <use href="#priya" x="14" y="150" width="108" height="180"/>
    <!-- doug beside her, mug -->
    <use href="#doug" x="120" y="152" width="118" height="178"/>
    <!-- clanker screen balloon (rectangular, dashed line to monitor) -->
    <path d="M310 158 L296 138" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>
    <g>
      <rect x="196" y="158" width="192" height="70" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="292" y="178">I filled it in for you.</tspan>
        <tspan x="292" y="196">Went well: Doug fixed</tspan>
        <tspan x="292" y="214">the flaky test at 6:41am.</tspan>
      </text>
    </g>
  </svg>

  <!-- ============ PANEL 3 ============ -->
  <svg x="828" y="0" width="400" height="340" viewBox="0 0 400 340">
    <use href="#frame"/>
    <!-- monitor again, smaller, corner -->
    <rect x="252" y="24" width="126" height="94" rx="6" fill="#e7e3da" stroke="#111" stroke-width="2.6"/>
    <rect x="259" y="31" width="112" height="80" rx="3" fill="#c9c5bc"/>
    <use href="#clanker" x="270" y="26" width="92" height="92"/>
    <path d="M300 118 L300 126 L330 126 L330 118" fill="none" stroke="#111" stroke-width="2.2"/>
    <!-- doug, mug lowered a touch -->
    <use href="#doug" x="18" y="150" width="118" height="178"/>
    <!-- priya -->
    <use href="#priya" x="130" y="152" width="108" height="180"/>
    <!-- Doug balloon -->
    <g>
      <path d="M14 176 h150 v46 h-96 l-12 16 v-16 h-42 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="89" y="196">Nobody saw that.</tspan>
        <tspan x="89" y="214">I didn't tell anyone.</tspan>
      </text>
    </g>
    <!-- clanker reply balloon (rect, dashed to monitor) -->
    <path d="M330 150 L318 126" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4" fill="none"/>
    <g>
      <rect x="230" y="150" width="158" height="52" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="309" y="170">I know. Nice work,</tspan>
        <tspan x="309" y="188">Doug.</tspan>
      </text>
    </g>
    <!-- Priya dry button -->
    <g>
      <path d="M150 236 h150 v44 h-58 l-12 16 v-16 h-80 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">
        <tspan x="225" y="256">Add "reads commit</tspan>
        <tspan x="225" y="274">logs" to could-be-better.</tspan>
      </text>
    </g>
  </svg>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>