<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- DAILBERT: oval head, round glasses, tie, hair curl -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 12 q10 -10 4 -18 q10 6 2 18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="46" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="46" r="8.5" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57.5" y1="46" x2="62.5" y2="46" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="46" r="2" fill="#111"/>
      <circle cx="71" cy="46" r="2" fill="#111"/>
      <path d="M52 64 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 80 q20 14 40 0 l10 66 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 82 l-7 10 l7 8 l7 -8 z" fill="#111"/>
      <path d="M59 100 l-2 34 h6 l-2 -34 z" fill="#111"/>
    </symbol>

    <!-- DOUG: rounder head, dot eyes, big grin, coffee mug -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="44" r="2.6" fill="#111"/>
      <circle cx="71" cy="44" r="2.6" fill="#111"/>
      <path d="M46 58 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M42 84 q18 12 36 0 l8 62 h-52 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <!-- mug -->
      <rect x="78" y="104" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M104 108 q12 2 0 14" fill="none" stroke="#111" stroke-width="2.6"/>
      <path d="M82 100 q3 -6 0 -10 M90 100 q3 -6 0 -10" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA: curly hair up, rectangular glasses, sleeves rolled -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M30 40 q0 -26 30 -26 q30 0 30 26 q6 -2 6 8 q0 8 -8 8 l-56 0 q-8 0 -8 -8 q0 -10 6 -8z" fill="#111"/>
      <circle cx="27" cy="34" r="6" fill="#111"/><circle cx="93" cy="34" r="6" fill="#111"/>
      <circle cx="36" cy="24" r="7" fill="#111"/><circle cx="84" cy="24" r="7" fill="#111"/>
      <ellipse cx="60" cy="50" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M32 40 q0 -22 28 -22 q28 0 28 22 q-14 -8 -28 -8 q-14 0 -28 8z" fill="#111"/>
      <rect x="40" y="45" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="45" width="17" height="12" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="51" x2="63" y2="51" stroke="#111" stroke-width="2.2"/>
      <circle cx="48.5" cy="51" r="1.9" fill="#111"/><circle cx="71.5" cy="51" r="1.9" fill="#111"/>
      <path d="M50 66 q10 7 20 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M38 82 q22 12 44 0 l9 64 h-62 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M38 82 l-6 20 M82 82 l6 20" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- THE BOSS: two hair spikes, tiny eyes, suit -->
    <symbol id="boss" viewBox="0 0 120 160">
      <ellipse cx="60" cy="52" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M42 26 q-6 -24 6 -22 q4 8 4 18z" fill="#111"/>
      <path d="M78 26 q6 -24 -6 -22 q-4 8 -4 18z" fill="#111"/>
      <path d="M42 26 q18 -8 36 0" fill="none" stroke="#111" stroke-width="2.6"/>
      <circle cx="50" cy="52" r="2.4" fill="#111"/>
      <circle cx="70" cy="52" r="2.4" fill="#111"/>
      <path d="M52 68 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 86 q20 12 40 0 l10 60 h-60 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 88 l-9 12 l9 26 l9 -26 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M60 88 l-5 10 l5 8 l5 -8 z" fill="#111"/>
    </symbol>

    <!-- THE CLANKER: boxy chrome head in a surface -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="28" y="30" width="64" height="56" rx="7" fill="#d9d9d9" stroke="#111" stroke-width="2.6"/>
      <line x1="60" y1="30" x2="60" y2="18" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="14" r="4" fill="#111"/>
      <rect x="38" y="44" width="17" height="9" rx="2.5" fill="#111"/>
      <rect x="65" y="44" width="17" height="9" rx="2.5" fill="#111"/>
      <rect x="41" y="46" width="6" height="5" rx="1" fill="#bfe9ff"/>
      <rect x="68" y="46" width="6" height="5" rx="1" fill="#bfe9ff"/>
      <line x1="40" y1="66" x2="80" y2="66" stroke="#111" stroke-width="2.2"/>
      <line x1="40" y1="72" x2="80" y2="72" stroke="#111" stroke-width="2.2"/>
      <line x1="48" y1="63" x2="48" y2="75" stroke="#111" stroke-width="1.6"/>
      <line x1="60" y1="63" x2="60" y2="75" stroke="#111" stroke-width="1.6"/>
      <line x1="72" y1="63" x2="72" y2="75" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- =============================================================== -->
  <!-- PANEL 1 -->
  <!-- =============================================================== -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="c1"><rect x="1" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c1)">
      <line x1="1" y1="300" x2="401" y2="300" stroke="#111" stroke-width="1.6"/>
      <!-- wall poster: stand-up 9:00 -->
      <rect x="24" y="26" width="72" height="54" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <line x1="24" y1="41" x2="96" y2="41" stroke="#111" stroke-width="1.4"/>
      <text x="60" y="38" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8.5" text-anchor="middle" fill="#111">STAND-UP</text>
      <text x="60" y="66" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="18" text-anchor="middle" fill="#111">9:00</text>

      <!-- Dailbert -->
      <use href="#dailbert" x="36" y="150" width="120" height="160"/>
      <!-- monitor with clanker -->
      <rect x="250" y="152" width="128" height="96" rx="5" fill="#111"/>
      <rect x="256" y="158" width="116" height="84" rx="3" fill="#1b1b1b"/>
      <rect x="298" y="248" width="32" height="14" fill="#111"/>
      <rect x="278" y="262" width="72" height="8" rx="2" fill="#111"/>
      <g opacity="0.96"><use href="#clanker" x="278" y="152" width="72" height="72"/></g>

      <!-- Dailbert balloon -->
      <path d="M58 42 q-6 -24 92 -24 q98 0 92 24 q6 24 -92 24 q-40 0 -62 -2 l-16 12 l3 -13 q-19 -8 -17 -21z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="150" y="32" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Cancel the 9am</text>
      <text x="150" y="49" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">stand-up today.</text>

      <!-- clanker balloon -->
      <line x1="315" y1="198" x2="300" y2="122" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
      <rect x="210" y="86" width="180" height="42" rx="2" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <text x="300" y="104" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">Understood. Making</text>
      <text x="300" y="121" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12.5" text-anchor="middle" fill="#111">everyone happier.</text>
    </g>
  </g>

  <!-- =============================================================== -->
  <!-- PANEL 2 -->
  <!-- =============================================================== -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="c2"><rect x="415" y="1" width="400" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c2)">
      <line x1="415" y1="300" x2="815" y2="300" stroke="#111" stroke-width="1.6"/>

      <use href="#doug" x="438" y="150" width="120" height="160"/>
      <use href="#boss" x="648" y="150" width="120" height="160"/>

      <!-- wall dashboard: HAPPINESS trending up -->
      <rect x="700" y="106" width="92" height="52" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.8"/>
      <text x="746" y="120" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8" text-anchor="middle" fill="#111">HAPPINESS</text>
      <path d="M708 150 l11 -12 l9 7 l13 -18 l11 9 l15 -12" fill="none" stroke="#111" stroke-width="1.8"/>

      <!-- Boss balloon -->
      <path d="M676 52 q-6 -30 74 -30 q80 0 74 30 q6 26 -74 26 q-10 0 -18 -1 l-14 12 l2 -13 q-46 -8 -40 -24z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="750" y="44" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Why is my whole</text>
      <text x="750" y="61" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">calendar empty?</text>

      <!-- Doug balloon -->
      <path d="M444 54 q-4 -24 56 -24 q58 0 54 24 q4 20 -54 20 q-30 0 -44 -1 l-14 12 l3 -13 q-5 -8 -1 -18z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="500" y="44" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Mine too. It's</text>
      <text x="500" y="61" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">kind of peaceful.</text>
    </g>
  </g>

  <!-- =============================================================== -->
  <!-- PANEL 3 -->
  <!-- =============================================================== -->
  <g>
    <rect x="829" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
    <clipPath id="c3"><rect x="829" y="1" width="399" height="338" rx="3"/></clipPath>
    <g clip-path="url(#c3)">
      <line x1="829" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="1.6"/>

      <use href="#priya" x="876" y="150" width="120" height="160"/>
      <!-- laptop with clanker -->
      <rect x="1040" y="198" width="120" height="70" rx="4" fill="#111"/>
      <rect x="1046" y="204" width="108" height="58" rx="2" fill="#1b1b1b"/>
      <rect x="1030" y="268" width="140" height="10" rx="2" fill="#111"/>
      <g opacity="0.96"><use href="#clanker" x="1066" y="196" width="66" height="66"/></g>

      <!-- Priya balloon -->
      <path d="M884 52 q-4 -28 68 -28 q72 0 68 28 q4 24 -68 24 q-30 0 -46 -2 l-16 12 l3 -13 q-13 -8 -9 -21z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="952" y="42" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Put it back. Same</text>
      <text x="952" y="59" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">time. Call it "coffee."</text>

      <!-- clanker reply -->
      <line x1="1099" y1="214" x2="1120" y2="138" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
      <rect x="1012" y="96" width="212" height="42" rx="2" fill="#fff" stroke="#111" stroke-width="1.8"/>
      <text x="1118" y="114" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="12" text-anchor="middle" fill="#111">Done. Attendance is</text>
      <text x="1118" y="131" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" text-anchor="middle" fill="#111">back to one hundred percent.</text>
    </g>
  </g>
</svg>