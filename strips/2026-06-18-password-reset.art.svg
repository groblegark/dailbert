  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="20" y="98" width="120" height="180"/>
    <!-- desk -->
    <path d="M8 262 H392" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="8" y="262" width="384" height="76" fill="#ece7db"/>
    <rect x="60" y="252" width="86" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="66" y1="258" x2="140" y2="258" stroke="#111" stroke-width="1"/>
    <!-- monitor -->
    <rect x="250" y="150" width="120" height="96" rx="6" fill="#111" stroke="#111" stroke-width="4"/>
    <rect x="256" y="156" width="108" height="84" rx="3" fill="#242424"/>
    <line x1="262" y1="234" x2="330" y2="164" stroke="#3a3a3a" stroke-width="2"/>
    <line x1="290" y1="236" x2="358" y2="166" stroke="#3a3a3a" stroke-width="2"/>
    <use href="#clanker" x="258" y="156" width="104" height="84"/>
    <rect x="298" y="246" width="24" height="14" fill="#111"/>
    <path d="M286 262 h48" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Dailbert balloon -->
    <rect x="14" y="24" width="152" height="62" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M74 84 L64 116 L96 92 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="90" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I just want to reset</text>
    <text x="90" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">my password.</text>
    <!-- Clanker balloon -->
    <path d="M306 88 L310 150" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="226" y="12" width="162" height="76" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="231" y="17" width="152" height="66" rx="3" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="307" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Your new password</text>
    <text x="307" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">must be a memory</text>
    <text x="307" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">only you know.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="440" y="100" width="118" height="178"/>
    <use href="#doug" x="560" y="92" width="150" height="186"/>
    <!-- desk -->
    <path d="M422 262 H806" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="422" y="262" width="384" height="76" fill="#ece7db"/>
    <rect x="470" y="252" width="86" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <line x1="476" y1="258" x2="550" y2="258" stroke="#111" stroke-width="1"/>
    <!-- monitor -->
    <rect x="688" y="152" width="112" height="90" rx="6" fill="#111" stroke="#111" stroke-width="4"/>
    <rect x="694" y="158" width="100" height="78" rx="3" fill="#242424"/>
    <line x1="700" y1="230" x2="762" y2="166" stroke="#3a3a3a" stroke-width="2"/>
    <use href="#clanker" x="696" y="158" width="96" height="78"/>
    <rect x="732" y="242" width="24" height="12" fill="#111"/>
    <path d="M722 258 h44" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Clanker balloon -->
    <path d="M720 76 L730 152" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="600" y="12" width="202" height="62" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="605" y="17" width="192" height="52" rx="3" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="701" y="37" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Rejected. I already</text>
    <text x="701" y="57" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">have that one.</text>
    <!-- Dailbert balloon -->
    <rect x="426" y="22" width="150" height="60" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M470 80 L462 108 L494 86 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="501" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Wait. How do you</text>
    <text x="501" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">have that one?</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="948" y="100" width="118" height="178"/>
    <use href="#doug" x="1072" y="94" width="148" height="184"/>
    <!-- sweat on Dailbert -->
    <path d="M1046 150 q-6 9 0 13 q6 -4 0 -13 Z" fill="#ffffff" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    <!-- desk -->
    <path d="M836 262 H1220" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="836" y="262" width="384" height="76" fill="#ece7db"/>
