<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <symbol id="dailbert" viewBox="0 0 120 180" overflow="visible">
      <path d="M18 180 Q18 128 60 121 Q102 128 102 180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
