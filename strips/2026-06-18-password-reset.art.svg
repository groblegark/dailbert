      <path d="M49 123 l11 10 l11 -10" fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="52" y="102" width="16" height="22" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="60" cy="65" rx="33" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="27" cy="65" r="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="93" cy="65" r="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 26 q11 -12 2 -19" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="47" cy="63" r="12" fill="#ffffff" stroke="#111" stroke-width="3"/>
      <circle cx="75" cy="63" r="12" fill="#ffffff" stroke="#111" stroke-width="3"/>
      <line x1="59" y1="63" x2="63" y2="63" stroke="#111" stroke-width="3"/>
      <line x1="87" y1="62" x2="93" y2="61" stroke="#111" stroke-width="2"/>
      <circle cx="47" cy="63" r="2.6" fill="#111"/>
      <circle cx="75" cy="63" r="2.6" fill="#111"/>
      <path d="M60 69 l-3 8 l5 0" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <line x1="52" y1="90" x2="68" y2="90" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <symbol id="doug" viewBox="0 0 150 180" overflow="visible">
      <path d="M16 180 Q16 130 66 123 Q116 130 116 180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M53 125 l13 10 l13 -10" fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="55" y="104" width="22" height="21" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="66" cy="65" r="42" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
