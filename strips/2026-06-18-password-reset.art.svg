    <rect x="884" y="242" width="24" height="12" fill="#111"/>
    <path d="M874 258 h44" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Clanker balloon -->
    <path d="M900 70 L896 152" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="838" y="12" width="174" height="58" rx="4" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <rect x="843" y="17" width="164" height="48" rx="3" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="925" y="35" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Give me one you</text>
    <text x="925" y="55" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">haven't told me yet.</text>
    <!-- Dailbert silent balloon -->
    <rect x="1008" y="70" width="60" height="34" rx="14" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M1028 102 L1023 126 L1046 106 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1038" y="93" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">. . .</text>
    <!-- Doug balloon -->
    <rect x="1042" y="10" width="176" height="52" rx="16" fill="#ffffff" stroke="#111" stroke-width="2.5"/>
    <path d="M1128 60 L1122 86 L1152 66 Z" fill="#ffffff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1130" y="32" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Take your time,</text>
    <text x="1130" y="50" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">buddy!</text>
  </g>
</svg>