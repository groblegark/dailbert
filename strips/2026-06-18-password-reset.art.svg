      <path d="M106 145 q4 -6 0 -12 M118 145 q4 -6 0 -12" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="clanker" viewBox="0 0 120 110" overflow="visible">
      <line x1="60" y1="20" x2="60" y2="7" stroke="#9a9a9a" stroke-width="3"/>
      <circle cx="60" cy="5" r="4" fill="#9a9a9a"/>
      <rect x="24" y="20" width="72" height="64" rx="9" fill="none" stroke="#9a9a9a" stroke-width="3"/>
      <rect x="33" y="38" width="23" height="9" rx="4" fill="#cccccc"/>
      <rect x="64" y="38" width="23" height="9" rx="4" fill="#cccccc"/>
      <rect x="38" y="60" width="44" height="14" rx="3" fill="none" stroke="#9a9a9a" stroke-width="2.5"/>
      <line x1="47" y1="60" x2="47" y2="74" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="55" y1="60" x2="55" y2="74" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="63" y1="60" x2="63" y2="74" stroke="#9a9a9a" stroke-width="2"/>
      <line x1="71" y1="60" x2="71" y2="74" stroke="#9a9a9a" stroke-width="2"/>
