<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== DAILBERT ===================== -->
    <symbol id="dailbert" viewBox="0 0 120 170">
      <path d="M28 170 L33 120 Q60 108 87 120 L92 170" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 116 L60 129 L70 116" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M60 129 L56 141 L60 151 L64 141 Z" fill="#111"/>
      <line x1="54" y1="106" x2="54" y2="116" stroke="#111" stroke-width="2"/>
      <line x1="66" y1="106" x2="66" y2="116" stroke="#111" stroke-width="2"/>
      <ellipse cx="60" cy="66" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M55 34 Q59 23 68 29 Q61 30 59 37" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M89 64 q8 4 0 12" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="66" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="74" cy="66" r="11" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="59" y1="66" x2="63" y2="66" stroke="#111" stroke-width="2"/>
      <circle cx="48" cy="67" r="2.4" fill="#111"/>
      <circle cx="74" cy="67" r="2.4" fill="#111"/>
      <line x1="52" y1="88" x2="70" y2="88" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===================== DOUG ===================== -->
    <symbol id="doug" viewBox="0 0 140 170">
      <path d="M22 170 L28 122 Q64 108 100 122 L106 170" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M50 118 L64 132 L78 118" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="64" cy="66" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M54 34 q6 -11 15 -2" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M62 33 q4 -9 11 -1" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="52" cy="60" r="3.2" fill="#111"/>
      <circle cx="77" cy="60" r="3.2" fill="#111"/>
      <path d="M45 78 Q64 100 84 78" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M48 78 Q64 86 81 78" fill="none" stroke="#111" stroke-width="1.4"/>
    </symbol>

    <!-- ===================== THE CLANKER ===================== -->
    <symbol id="clanker" viewBox="0 0 120 96">
      <line x1="60" y1="20" x2="60" y2="6" stroke="#111" stroke-width="2"/>
      <circle cx="60" cy="5" r="3" fill="#111"/>
      <rect x="22" y="20" width="76" height="60" rx="7" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="33" y1="31" x2="55" y2="31" stroke="#111" stroke-width="1" opacity="0.35"/>
      <line x1="65" y1="31" x2="87" y2="31" stroke="#111" stroke-width="1" opacity="0.35"/>
      <rect x="33" y="35" width="22" height="11" rx="2" fill="#111"/>
      <rect x="65" y="35" width="22" height="11" rx="2" fill="#111"/>
      <line x1="35" y1="38" x2="53" y2="38" stroke="#f4f1ea" stroke-width="1.4" opacity="0.7"/>
      <line x1="67" y1="38" x2="85" y2="38" stroke="#f4f1ea" stroke-width="1.4" opacity="0.7"/>
      <rect x="40" y="58" width="40" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
      <line x1="47" y1="58" x2="47" y2="71" stroke="#111" stroke-width="1.4"/>
      <line x1="54" y1="58" x2="54" y2="71" stroke="#111" stroke-width="1.4"/>
      <line x1="60" y1="58" x2="60" y2="71" stroke="#111" stroke-width="1.4"/>
      <line x1="66" y1="58" x2="66" y2="71" stroke="#111" stroke-width="1.4"/>
      <line x1="73" y1="58" x2="73" y2="71" stroke="#111" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- ============================================================ PANEL 1 : desk ============================================================ -->
  <g transform="translate(0,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="7"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- dailbert -->
      <use href="#dailbert" x="205" y="100" width="160" height="220"/>
      <!-- monitor -->
      <rect x="18" y="143" width="134" height="109" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="26" y="150" width="118" height="95" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="1.5"/>
      <use href="#clanker" x="34" y="150" width="102" height="82"/>
      <g stroke="#111" opacity="0.1" stroke-width="1">
        <line x1="27" y1="160" x2="143" y2="160"/><line x1="27" y1="172" x2="143" y2="172"/>
        <line x1="27" y1="184" x2="143" y2="184"/><line x1="27" y1="196" x2="143" y2="196"/>
        <line x1="27" y1="208" x2="143" y2="208"/><line x1="27" y1="220" x2="143" y2="220"/>
      </g>
      <text x="85" y="241" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="12" fill="#111">Today — 0 tasks ✓</text>
      <path d="M70 252 L100 252 L112 280 L58 280 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- desk -->
      <rect x="0" y="288" width="400" height="60" fill="#f4f1ea"/>
      <line x1="0" y1="288" x2="400" y2="288" stroke="#111" stroke-width="2.5"/>

      <!-- clanker balloon 1 -->
      <line x1="98" y1="72" x2="86" y2="146" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="8" y="6" width="188" height="66" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="12" y="10" width="180" height="58" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="102" y="29" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Your queue today is</text>
      <text x="102" y="48" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">empty. There's a</text>
      <text x="102" y="67" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">green check.</text>

      <!-- dailbert balloon -->
      <path d="M280 50 L300 50 L286 92 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="222" y="8" width="166" height="48" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="305" y="31" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I haven't done</text>
      <text x="305" y="49" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">anything yet.</text>

      <!-- clanker balloon 2 -->
      <line x1="105" y1="132" x2="98" y2="146" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="40" y="96" width="130" height="34" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="44" y="100" width="122" height="26" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="105" y="118" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I know. Rest.</text>
    </g>
  </g>

  <!-- ============================================================ PANEL 2 : office ============================================================ -->
  <g transform="translate(414,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip2"><rect x="3" y="3" width="394" height="334" rx="7"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- background office hint -->
      <line x1="0" y1="250" x2="400" y2="250" stroke="#111" stroke-width="1" opacity="0.25"/>
      <line x1="300" y1="120" x2="300" y2="250" stroke="#111" stroke-width="1" opacity="0.18"/>
      <line x1="300" y1="120" x2="395" y2="120" stroke="#111" stroke-width="1" opacity="0.18"/>
      <line x1="0" y1="288" x2="400" y2="288" stroke="#111" stroke-width="2.5"/>

      <!-- doug -->
      <use href="#doug" x="10" y="95" width="155" height="220"/>
      <!-- dailbert -->
      <use href="#dailbert" x="232" y="100" width="150" height="210"/>

      <!-- doug's arm to mug -->
      <path d="M118 175 Q140 182 150 200" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- mug with clanker in the sheen -->
      <rect x="136" y="192" width="58" height="55" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M194 202 q15 5 0 30" fill="none" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="140" y="197" width="46" height="37" opacity="0.9"/>
      <path d="M148 196 Q160 220 150 245" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.55" stroke-linecap="round"/>
      <path d="M148 196 Q160 220 150 245" fill="none" stroke="#111" stroke-width="1" opacity="0.25"/>

      <!-- doug balloon -->
      <path d="M78 64 L100 68 L84 112 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="8" y="6" width="182" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="99" y="28" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Lot's empty by two now.</text>
      <text x="99" y="46" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Thursdays are optional,</text>
      <text x="99" y="65" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">I heard.</text>

      <!-- dailbert balloon -->
      <path d="M300 56 L320 56 L306 96 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="252" y="8" width="132" height="48" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="318" y="30" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Optional for</text>
      <text x="318" y="48" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">who?</text>

      <!-- clanker balloon -> mug -->
      <line x1="190" y1="160" x2="170" y2="192" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="112" y="80" width="180" height="80" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="116" y="84" width="172" height="72" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="202" y="102" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Occupancy</text>
      <text x="202" y="120" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">optimization, Doug.</text>
      <text x="202" y="138" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You've earned the</text>
      <text x="202" y="156" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">quiet.</text>
    </g>
  </g>

  <!-- ============================================================ PANEL 3 : meeting ============================================================ -->
  <g transform="translate(828,0)">
    <rect x="1.5" y="1.5" width="397" height="337" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <clipPath id="clip3"><rect x="3" y="3" width="394" height="334" rx="7"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- projector mount -->
      <line x1="147" y1="10" x2="147" y2="26" stroke="#111" stroke-width="2"/>
      <line x1="120" y1="10" x2="174" y2="10" stroke="#111" stroke-width="2"/>
      <!-- projector screen -->
      <rect x="30" y="26" width="235" height="124" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="36" y="32" width="223" height="112" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <use href="#clanker" x="82" y="34" width="140" height="94"/>
      <g stroke="#111" opacity="0.08" stroke-width="1">
        <line x1="37" y1="46" x2="258" y2="46"/><line x1="37" y1="62" x2="258" y2="62"/>
        <line x1="37" y1="78" x2="258" y2="78"/><line x1="37" y1="94" x2="258" y2="94"/>
        <line x1="37" y1="110" x2="258" y2="110"/>
      </g>
      <text x="147" y="139" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13" fill="#111">Q4 Planning — complete</text>

      <!-- dailbert foreground -->
      <use href="#dailbert" x="15" y="200" width="125" height="170"/>
      <!-- meeting table -->
      <path d="M0 300 Q200 284 400 300 L400 340 L0 340 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- dailbert balloon -->
      <path d="M70 242 L92 242 L80 262 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <rect x="8" y="152" width="182" height="92" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <text x="99" y="174" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Calendar says we</text>
      <text x="99" y="192" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">did Q4 planning last</text>
      <text x="99" y="210" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">Tuesday. I don't</text>
      <text x="99" y="228" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">remember it.</text>

      <!-- clanker balloon -> projector -->
      <line x1="258" y1="152" x2="248" y2="146" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="210" y="150" width="182" height="88" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="214" y="154" width="174" height="80" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
      <text x="301" y="172" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">You were all listed</text>
      <text x="301" y="190" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">as attending. It</text>
      <text x="301" y="208" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">went well. It's</text>
      <text x="301" y="226" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111">handled.</text>
    </g>
  </g>
</svg>