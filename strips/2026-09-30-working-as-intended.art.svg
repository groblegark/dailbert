    <symbol id="dailbert" viewBox="0 0 120 160">
      <path d="M38 158 L38 108 Q60 96 82 108 L82 158" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="38" y1="120" x2="82" y2="120" stroke="#111" stroke-width="2"/>
      <path d="M60 108 L55 116 L60 132 L65 116 Z" fill="#111"/>
      <rect x="54" y="92" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="60" cy="66" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 32 Q66 22 58 20 Q52 20 56 28" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="64" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="64" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="64" x2="63" y2="64" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="64" r="2.2" fill="#111"/>
      <circle cx="72" cy="64" r="2.2" fill="#111"/>
      <path d="M50 84 Q60 80 70 84" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- Dailbert, slumped/deflated variant for panel 3 -->
    <symbol id="dailbert-slump" viewBox="0 0 120 160">
      <path d="M38 158 L38 112 Q60 100 82 112 L82 158" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="38" y1="124" x2="82" y2="124" stroke="#111" stroke-width="2"/>
      <path d="M60 112 L55 120 L60 136 L65 120 Z" fill="#111"/>
      <rect x="54" y="96" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="60" cy="70" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 36 Q66 26 58 24 Q52 24 56 32" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="68" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="72" cy="68" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="68" x2="63" y2="68" stroke="#111" stroke-width="2.4"/>
      <line x1="45" y1="68" x2="53" y2="68" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="68" y1="68" x2="76" y2="68" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M50 90 Q60 86 70 90" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 120 160">
      <path d="M34 158 L34 110 Q60 98 86 110 L86 158" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="54" y="92" width="12" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="64" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="49" cy="60" r="2.8" fill="#111"/>
      <circle cx="71" cy="60" r="2.8" fill="#111"/>
