      <path d="M40 36 Q46 28 52 34" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M68 34 Q74 28 80 36" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
