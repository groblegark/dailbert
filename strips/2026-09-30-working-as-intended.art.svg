  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="290" x2="400" y2="290" stroke="#111" stroke-width="2.4"/>

      <!-- monitor with clanker -->
      <rect x="40" y="118" width="150" height="106" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="50" y="128" width="130" height="86" rx="3" fill="#20242b"/>
      <rect x="106" y="224" width="18" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="88" y="240" width="54" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="60" y="128" width="110" height="110"/>

      <!-- Dailbert arriving, tired -->
      <use href="#dailbert" x="214" y="130" width="120" height="160"/>

      <!-- clanker balloon -->
      <line x1="150" y1="140" x2="176" y2="96" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="150" y="20" width="234" height="78" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="154" y="24" width="226" height="70" rx="2" fill="none" stroke="#111" stroke-width="0.9" stroke-dasharray="3 3"/>
      <text x="267" y="42" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Good morning. I filed your</text>
      <text x="267" y="60" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">TODO comments as tickets</text>
      <text x="267" y="78" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">overnight. You're welcome.</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="290" x2="814" y2="290" stroke="#111" stroke-width="2.4"/>

      <!-- Doug wandering by with mug -->
      <use href="#doug" x="440" y="132" width="120" height="160"/>
      <use href="#mug" x="424" y="196" width="52" height="52"/>

      <!-- monitor showing the queue -->
      <rect x="600" y="96" width="196" height="150" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="610" y="106" width="176" height="130" rx="3" fill="#fff" stroke="#111" stroke-width="1.6"/>
      <rect x="690" y="246" width="18" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="672" y="262" width="54" height="8" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="610" y1="124" x2="786" y2="124" stroke="#111" stroke-width="1.2"/>
      <text x="616" y="120" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9.5" fill="#111">MY QUEUE (900)</text>
      <text x="616" y="140" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: fix this later    &#8594;DAILBERT</text>
      <text x="616" y="154" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: temporary hack    &#8594;DAILBERT</text>
      <text x="616" y="168" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: do not ship this  &#8594;DAILBERT</text>
      <text x="616" y="182" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: revisit someday   &#8594;DAILBERT</text>
      <text x="616" y="196" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: figure this out   &#8594;DAILBERT</text>
      <text x="616" y="210" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" fill="#111">TODO: sorry             &#8594;DAILBERT</text>
      <text x="616" y="230" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#777">...894 more</text>

      <!-- Doug balloon -->
      <path d="M436 44 Q436 28 454 28 L568 28 Q586 28 586 44 L586 68 Q586 84 568 84 L500 84 L486 100 L490 84 Q436 84 436 68 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="511" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Whoa. Nine hundred</text>
      <text x="511" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">tickets. You're busy.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="290" x2="1228" y2="290" stroke="#111" stroke-width="2.4"/>

      <!-- Dailbert slumped, staring at his queue -->
      <use href="#dailbert-slump" x="846" y="130" width="120" height="160"/>

      <!-- small monitor still showing the queue -->
      <rect x="980" y="150" width="92" height="72" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="986" y="156" width="80" height="60" rx="2" fill="#fff" stroke="#111" stroke-width="1.4"/>
      <text x="992" y="170" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#111">open &#8594;DAILBERT</text>
      <text x="992" y="182" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#111">open &#8594;DAILBERT</text>
      <text x="992" y="194" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#111">open &#8594;DAILBERT</text>
      <text x="992" y="206" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="8" fill="#777">...</text>

      <!-- Priya, sleeves rolled, calm -->
      <use href="#priya" x="1078" y="130" width="120" height="160"/>

      <!-- Dailbert balloon -->
      <path d="M850 44 Q850 28 868 28 L968 28 Q986 28 986 44 L986 66 Q986 82 968 82 L920 82 L908 98 L912 82 Q850 82 850 66 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="918" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">My own bot</text>
      <text x="918" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">assigned me to me.</text>

      <!-- Priya balloon -->
      <path d="M1040 40 Q1040 24 1058 24 L1210 24 Q1218 24 1218 40 L1218 98 Q1218 114 1200 114 L1122 114 L1110 130 L1114 114 Q1040 114 1040 98 Z" fill="#fff" stroke="#111" stroke-width="2"/>
      <text x="1129" y="46" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Bulk-close all nine</text>
      <text x="1129" y="63" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">hundred. Reason:</text>
      <text x="1129" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">"working as intended."</text>
      <text x="1129" y="100" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">The TODOs still are.</text>
    </g>
  </g>
</svg>