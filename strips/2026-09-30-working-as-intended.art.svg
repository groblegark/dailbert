    <!-- ============ PRIYA ============ -->
    <symbol id="priya" viewBox="0 0 120 160">
      <path d="M36 158 L36 110 Q60 98 84 110 L84 158" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="36" y="128" width="10" height="8" fill="#111"/>
      <rect x="74" y="128" width="10" height="8" fill="#111"/>
      <rect x="54" y="92" width="12" height="12" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <ellipse cx="60" cy="66" rx="29" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M32 58 Q28 30 46 26 Q54 16 68 24 Q90 26 88 56 Q80 44 60 44 Q40 44 32 58 Z" fill="#111"/>
      <circle cx="60" cy="20" r="7" fill="#111"/>
      <rect x="40" y="58" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="63" y="58" width="17" height="12" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="57" y1="64" x2="63" y2="64" stroke="#111" stroke-width="2.4"/>
      <circle cx="48" cy="64" r="2.2" fill="#111"/>
      <circle cx="71" cy="64" r="2.2" fill="#111"/>
      <path d="M52 84 L68 84" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ CLANKER ============ -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="24" y="30" width="72" height="60" rx="6" fill="#2b2f36" stroke="#8a9099" stroke-width="2.4"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#8a9099" stroke-width="2.4"/>
      <circle cx="60" cy="13" r="4" fill="#8a9099"/>
      <rect x="36" y="48" width="20" height="8" rx="3" fill="#cfe8ff"/>
      <rect x="64" y="48" width="20" height="8" rx="3" fill="#cfe8ff"/>
      <line x1="40" y1="72" x2="80" y2="72" stroke="#8a9099" stroke-width="2.2"/>
      <line x1="44" y1="66" x2="44" y2="78" stroke="#8a9099" stroke-width="2"/>
      <line x1="52" y1="66" x2="52" y2="78" stroke="#8a9099" stroke-width="2"/>
      <line x1="60" y1="66" x2="60" y2="78" stroke="#8a9099" stroke-width="2"/>
      <line x1="68" y1="66" x2="68" y2="78" stroke="#8a9099" stroke-width="2"/>
      <line x1="76" y1="66" x2="76" y2="78" stroke="#8a9099" stroke-width="2"/>
    </symbol>
