    <rect x="302" y="245" width="16" height="14" fill="#dfe3e8" stroke="#111" stroke-width="2.5"/>
    <rect x="282" y="258" width="56" height="8" rx="3" fill="#dfe3e8" stroke="#111" stroke-width="2.5"/>

    <!-- clanker balloon -->
    <rect x="196" y="12" width="192" height="80" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="202" y="18" width="180" height="68" rx="2" fill="none" stroke="#8a8f98" stroke-width="1.5" stroke-dasharray="5 4"/>
    <line x1="300" y1="92" x2="310" y2="150" stroke="#8a8f98" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="292" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Oh. 'Sometime'</text>
    <text x="292" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">exists now.</text>
    <text x="292" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Cancelling the rest.</text>

    <!-- priya balloon -->
    <rect x="14" y="30" width="170" height="54" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M78 81 L96 81 L86 116" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="99" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It just wanted</text>
    <text x="99" y="73" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">closure.</text>
  </g>
</svg>