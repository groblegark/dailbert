      <rect x="34" y="50" width="32" height="10" rx="2" fill="#e6ebf0" stroke="#5b6b7a" stroke-width="1.5"/>
      <line x1="40" y1="50" x2="40" y2="60" stroke="#5b6b7a" stroke-width="1.5"/>
      <line x1="46" y1="50" x2="46" y2="60" stroke="#5b6b7a" stroke-width="1.5"/>
