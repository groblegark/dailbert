    <use href="#boss" x="8" y="150" width="124" height="186"/>
    <use href="#dailbert" x="268" y="160" width="116" height="174"/>

    <!-- packed calendar -->
    <rect x="110" y="150" width="110" height="80" rx="4" fill="#dfe3e8" stroke="#111" stroke-width="2.5"/>
    <text x="163" y="163" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="9" text-anchor="middle" fill="#111">APRIL</text>
    <rect x="116" y="166" width="98" height="58" fill="#eef2f6" stroke="#111" stroke-width="1"/>
    <g fill="#111">
      <rect x="118" y="168" width="14" height="12"/><rect x="134" y="168" width="14" height="12"/><rect x="150" y="168" width="30" height="12"/><rect x="182" y="168" width="14" height="12"/><rect x="198" y="168" width="14" height="12"/>
      <rect x="118" y="182" width="30" height="12"/><rect x="150" y="182" width="14" height="12"/><rect x="166" y="182" width="14" height="12"/><rect x="182" y="182" width="30" height="12"/>
      <rect x="118" y="196" width="14" height="12"/><rect x="134" y="196" width="30" height="12"/><rect x="166" y="196" width="14" height="12"/><rect x="182" y="196" width="14" height="12"/><rect x="198" y="196" width="14" height="12"/>
      <rect x="118" y="210" width="44" height="12"/><rect x="166" y="210" width="14" height="12"/><rect x="182" y="210" width="30" height="12"/>
    </g>

    <!-- boss balloon -->
    <rect x="8" y="12" width="152" height="56" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M58 65 L76 65 L66 100" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="84" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">Forty syncs!</text>
    <text x="84" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">We are SO aligned!</text>

    <!-- dailbert balloon -->
    <rect x="250" y="16" width="142" height="54" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M318 67 L336 67 L326 104" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="321" y="40" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I have no</text>
    <text x="321" y="59" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">afternoons.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
