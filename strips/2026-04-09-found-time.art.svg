      <circle cx="33" cy="52" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="87" cy="52" r="5" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 21 q8 -10 14 -2 q-6 -2 -8 6" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
