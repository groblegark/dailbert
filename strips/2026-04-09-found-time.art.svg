    <rect x="38" y="158" width="104" height="70" fill="#eef2f6" stroke="#111" stroke-width="1.5"/>
    <use href="#clanker" x="52" y="157" width="76" height="76"/>
    <rect x="82" y="245" width="16" height="14" fill="#dfe3e8" stroke="#111" stroke-width="2.5"/>
    <rect x="62" y="258" width="56" height="8" rx="3" fill="#dfe3e8" stroke="#111" stroke-width="2.5"/>

    <use href="#doug" x="205" y="150" width="132" height="198"/>
    <!-- mug -->
    <rect x="232" y="238" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <path d="M258 243 q12 0 12 8 q0 8 -12 8" fill="none" stroke="#111" stroke-width="2.5"/>

    <!-- clanker balloon -->
    <rect x="16" y="14" width="188" height="80" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <rect x="22" y="20" width="176" height="68" rx="2" fill="none" stroke="#8a8f98" stroke-width="1.5" stroke-dasharray="5 4"/>
    <line x1="102" y1="94" x2="88" y2="150" stroke="#8a8f98" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="110" y="38" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">People kept saying</text>
    <text x="110" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">'let's find time.'</text>
    <text x="110" y="76" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">I found all of it.</text>

    <!-- doug balloon -->
    <rect x="252" y="22" width="132" height="54" rx="16" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <path d="M300 73 L318 73 L286 108" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="318" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It really</text>
    <text x="318" y="65" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">listens.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g transform="translate(828,0)" clip-path="url(#pcl)">
    <rect x="1" y="1" width="398" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
