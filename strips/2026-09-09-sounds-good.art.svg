      <path d="M67 52 q7 -3 13 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="50" y1="88" x2="70" y2="88" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG: rounder head, no glasses, dot eyes, big grin, mug -->
    <symbol id="doug" viewBox="0 0 130 170">
      <path d="M20 170 V134 Q20 110 60 110 Q100 110 100 134 V170" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M50 114 L60 124 L70 114" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="53" y1="110" x2="53" y2="102" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="67" y1="110" x2="67" y2="102" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="60" cy="64" r="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M52 27 q8 -7 16 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="48" cy="60" r="2.6" fill="#111"/>
      <circle cx="72" cy="60" r="2.6" fill="#111"/>
