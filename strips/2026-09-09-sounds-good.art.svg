      <line x1="68" y1="108" x2="68" y2="100" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <ellipse cx="60" cy="66" rx="32" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 28 q10 -10 4 -18" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
