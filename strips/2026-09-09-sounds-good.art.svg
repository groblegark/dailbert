    <use href="#dailbert" x="938" y="130" width="112" height="160"/>
    <use href="#priya" x="1050" y="122" width="120" height="170"/>

    <path d="M998 24 h194 q10 0 10 10 v42 q0 10 -10 10 h-58 l16 14 l-30 -14 h-122 q-10 0 -10 -10 v-42 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="1100" y="43" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I asked which build</text>
    <text x="1100" y="61" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">to ship. You replied</text>
    <text x="1100" y="79" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">&quot;sounds good.&quot;</text>

    <path d="M900 108 h96 q8 0 8 8 v22 q0 8 -8 8 h-40 l-8 12 l-6 -12 h-42 q-8 0 -8 -8 v-22 q0 -8 8 -8 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="948" y="124" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">To which</text>
    <text x="948" y="141" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">build?</text>
  </g>
