    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M20 170 V132 Q20 108 60 108 Q100 108 100 132 V170" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M26 132 q-4 8 2 14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M94 132 q4 8 -2 14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M50 112 L60 122 L70 112" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <line x1="53" y1="108" x2="53" y2="100" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="67" y1="108" x2="67" y2="100" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <ellipse cx="60" cy="66" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
