      <rect x="65" y="58" width="17" height="12" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="55" y1="64" x2="65" y2="64" stroke="#111" stroke-width="2.4"/>
      <circle cx="46.5" cy="64" r="1.6" fill="#111"/>
      <circle cx="73.5" cy="64" r="1.6" fill="#111"/>
      <path d="M52 88 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="20" x2="60" y2="8" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="60" cy="6" r="3.4" fill="#111"/>
      <rect x="24" y="20" width="72" height="60" rx="10" fill="#d9d9d9" stroke="#111" stroke-width="2.4"/>
      <line x1="20" y1="40" x2="24" y2="40" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="96" y1="40" x2="100" y2="40" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="35" y="38" width="20" height="8" rx="4" fill="#bfe3d0" stroke="#111" stroke-width="1.6"/>
      <rect x="65" y="38" width="20" height="8" rx="4" fill="#bfe3d0" stroke="#111" stroke-width="1.6"/>
      <rect x="40" y="58" width="40" height="12" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="48" y1="58" x2="48" y2="70" stroke="#111" stroke-width="1.6"/>
      <line x1="56" y1="58" x2="56" y2="70" stroke="#111" stroke-width="1.6"/>
      <line x1="64" y1="58" x2="64" y2="70" stroke="#111" stroke-width="1.6"/>
      <line x1="72" y1="58" x2="72" y2="70" stroke="#111" stroke-width="1.6"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL FRAMES ===================== -->
  <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>

  <!-- ============ PANEL 1: Dailbert proud at monitor, Doug beside with mug ============ -->
  <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#clip1)">
    <rect x="14" y="270" width="373" height="10" fill="#111"/>
    <rect x="38" y="148" width="150" height="104" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
    <rect x="50" y="160" width="126" height="80" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="1.4"/>
    <rect x="98" y="252" width="30" height="14" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
    <rect x="80" y="266" width="66" height="6" rx="3" fill="#111"/>
    <use href="#clanker" x="78" y="166" width="70" height="70"/>
    <use href="#doug" x="10" y="120" width="130" height="170"/>
    <use href="#dailbert" x="248" y="118" width="120" height="170"/>

    <path d="M214 26 h164 q10 0 10 10 v46 q0 10 -10 10 h-70 l-6 14 l-14 -14 h-74 q-10 0 -10 -10 v-46 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <text x="296" y="47" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">New agent triages my</text>
    <text x="296" y="65" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">inbox. Archives the noise,</text>
    <text x="296" y="83" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">answers the rest for me.</text>
  </g>

  <!-- ============ PANEL 2: Clanker explains its policy; Dailbert nods ============ -->
  <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#clip2)">
    <rect x="428" y="270" width="373" height="10" fill="#111"/>
    <rect x="560" y="148" width="150" height="104" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
    <rect x="572" y="160" width="126" height="80" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="1.4"/>
    <rect x="620" y="252" width="30" height="14" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
    <rect x="602" y="266" width="66" height="6" rx="3" fill="#111"/>
    <use href="#clanker" x="600" y="166" width="70" height="70"/>
    <use href="#dailbert" x="440" y="120" width="120" height="170"/>

    <line x1="640" y1="176" x2="640" y2="122" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
    <rect x="548" y="28" width="252" height="92" rx="4" fill="#fff" stroke="#111" stroke-width="2.2"/>
    <rect x="553" y="33" width="242" height="82" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="674" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Low priority is archived.</text>
    <text x="674" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Everything worth your time</text>
    <text x="674" y="88" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">gets a warm, brief reply:</text>
    <text x="674" y="108" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111">&quot;Sounds good.&quot;</text>
  </g>

  <!-- ============ PANEL 3: Priya walks up, dry; Dailbert stricken ============ -->
  <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
  <g clip-path="url(#clip3)">
    <rect x="842" y="270" width="373" height="10" fill="#111"/>
    <rect x="854" y="156" width="118" height="96" rx="6" fill="#1c1c1c" stroke="#111" stroke-width="2.4"/>
    <rect x="864" y="166" width="98" height="72" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="1.4"/>
