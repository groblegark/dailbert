<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="46" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 12 q7 -9 2 -14 q9 3 5 13" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="49" cy="45" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <circle cx="71" cy="45" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="45" x2="63" y2="45" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="45" r="1.8" fill="#111"/>
      <circle cx="71" cy="45" r="1.8" fill="#111"/>
      <path d="M52 63 q8 5 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 80 q20 12 40 0 l14 46 q-34 12 -68 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M56 80 l4 12 4 -12 l6 6 -6 26 -8 0 -6 -26 Z" fill="#111"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="48" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="45" r="2.6" fill="#111"/>
      <circle cx="72" cy="45" r="2.6" fill="#111"/>
      <path d="M45 58 q15 16 30 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 84 q20 12 40 0 l12 44 q-32 12 -64 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="48" rx="27" ry="31" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M33 42 q27 12 54 0 q3 -28 -27 -28 q-30 0 -27 28 Z" fill="#111"/>
      <path d="M60 14 q-15 8 4 7 q11 -2 17 3 q-6 -14 -21 -10 Z" fill="#111"/>
      <path d="M34 40 q-6 -2 -4 8 q4 -5 8 -2 Z" fill="#111"/>
      <path d="M86 40 q6 -2 4 8 q-4 -5 -8 -2 Z" fill="#111"/>
      <rect x="41" y="42" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="63" y="42" width="16" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <line x1="57" y1="46" x2="63" y2="46" stroke="#111" stroke-width="2.2"/>
      <circle cx="49" cy="48" r="1.8" fill="#111"/>
      <circle cx="71" cy="48" r="1.8" fill="#111"/>
      <path d="M53 66 q7 4 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 82 q20 12 40 0 l12 46 q-32 12 -64 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M40 90 l-2 22 M80 90 l2 22" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== THE BOSS ===== -->
    <symbol id="boss" viewBox="0 0 120 160">
      <ellipse cx="60" cy="50" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40 26 l-10 -20 l18 14 Z" fill="#111"/>
      <path d="M80 26 l10 -20 l-18 14 Z" fill="#111"/>
      <path d="M40 26 q20 -10 40 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="51" cy="49" r="1.6" fill="#111"/>
      <circle cx="69" cy="49" r="1.6" fill="#111"/>
      <path d="M53 64 q7 3 14 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 82 q20 10 40 0 l12 46 q-32 12 -64 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M56 82 l4 10 4 -10 l6 6 -6 28 -8 0 -6 -28 Z" fill="#111"/>
    </symbol>

    <!-- ===== THE CLANKER (drawn INSIDE a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <rect x="26" y="30" width="68" height="60" rx="9" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="60" y1="30" x2="60" y2="16" stroke="#111" stroke-width="2.2"/>
      <circle cx="60" cy="13" r="3.4" fill="#111"/>
      <rect x="35" y="46" width="20" height="10" rx="3" fill="#111"/>
      <rect x="65" y="46" width="20" height="10" rx="3" fill="#111"/>
      <rect x="38" y="48.5" width="6" height="5" rx="1" fill="#cfe0e6"/>
      <rect x="68" y="48.5" width="6" height="5" rx="1" fill="#cfe0e6"/>
      <line x1="38" y1="72" x2="82" y2="72" stroke="#111" stroke-width="2.2"/>
      <line x1="44" y1="72" x2="44" y2="80" stroke="#111" stroke-width="2.2"/>
      <line x1="52" y1="72" x2="52" y2="80" stroke="#111" stroke-width="2.2"/>
      <line x1="60" y1="72" x2="60" y2="80" stroke="#111" stroke-width="2.2"/>
      <line x1="68" y1="72" x2="68" y2="80" stroke="#111" stroke-width="2.2"/>
      <line x1="76" y1="72" x2="76" y2="80" stroke="#111" stroke-width="2.2"/>
      <line x1="38" y1="80" x2="82" y2="80" stroke="#111" stroke-width="2.2"/>
    </symbol>
  </defs>

  <!-- =========================== PANEL 1 =========================== -->
  <g>
    <rect x="1.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="1.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <rect x="0" y="252" width="400" height="90" fill="#e9e5db"/>
      <line x1="0" y1="252" x2="400" y2="252" stroke="#111" stroke-width="2"/>

      <!-- monitor on desk -->
      <rect x="30" y="96" width="188" height="130" rx="7" fill="#dfe6e8" stroke="#111" stroke-width="2.5"/>
      <rect x="112" y="226" width="24" height="24" fill="#e9e5db" stroke="#111" stroke-width="2.2"/>
      <rect x="86" y="248" width="76" height="9" rx="3" fill="#e9e5db" stroke="#111" stroke-width="2.2"/>
      <!-- clanker inside monitor -->
      <use href="#clanker" x="26" y="100" width="84" height="84"/>
      <!-- tidy identical grid on screen -->
      <g stroke="#111" stroke-width="1.3" fill="none">
        <rect x="124" y="108" width="82" height="100"/>
        <line x1="124" y1="128" x2="206" y2="128"/>
        <line x1="124" y1="144" x2="206" y2="144"/>
        <line x1="124" y1="160" x2="206" y2="160"/>
        <line x1="124" y1="176" x2="206" y2="176"/>
        <line x1="124" y1="192" x2="206" y2="192"/>
        <line x1="166" y1="108" x2="166" y2="208"/>
      </g>
      <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8" fill="#111" text-anchor="middle">
        <text x="186" y="140">8.0</text>
        <text x="186" y="156">8.0</text>
        <text x="186" y="172">8.0</text>
        <text x="186" y="188">8.0</text>
        <text x="186" y="204">8.0</text>
      </g>

      <!-- Doug at desk with mug, delighted -->
      <use href="#doug" x="240" y="120" width="150" height="200"/>
      <ellipse cx="312" cy="240" rx="16" ry="9" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M296 240 l3 26 q13 6 26 0 l3 -26" fill="#f4f1ea" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M325 246 q12 0 12 10 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.2"/>

      <!-- clanker balloon -->
      <line x1="118" y1="92" x2="132" y2="72" stroke="#111" stroke-width="1.3" stroke-dasharray="4 3"/>
      <rect x="118" y="20" width="180" height="60" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="208" y="40" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">I filled your week in</text>
      <text x="208" y="57" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">for you, to be helpful.</text>
      <text x="208" y="74" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Nice and even.</text>
    </g>
  </g>

  <!-- =========================== PANEL 2 =========================== -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="415.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="252" width="400" height="90" fill="#e9e5db"/>
      <line x1="414" y1="252" x2="814" y2="252" stroke="#111" stroke-width="2"/>

      <!-- Priya standing, filling a paper timesheet by hand -->
      <use href="#priya" x="452" y="100" width="172" height="232"/>

      <!-- her hand-filled paper timesheet, uneven honest numbers -->
      <g transform="translate(612 150)">
        <rect x="0" y="0" width="98" height="120" rx="3" fill="#f8f6f0" stroke="#111" stroke-width="2.5"/>
        <g stroke="#111" stroke-width="1.3" fill="none">
          <line x1="0" y1="24" x2="98" y2="24"/>
          <line x1="0" y1="43" x2="98" y2="43"/>
          <line x1="0" y1="62" x2="98" y2="62"/>
          <line x1="0" y1="81" x2="98" y2="81"/>
          <line x1="0" y1="100" x2="98" y2="100"/>
          <line x1="58" y1="24" x2="58" y2="114"/>
        </g>
        <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8" fill="#111" text-anchor="middle">
          <text x="29" y="18">week</text>
          <text x="29" y="38">Mon</text>
          <text x="29" y="57">Tue</text>
          <text x="29" y="76">Wed</text>
          <text x="29" y="95">Thu</text>
          <text x="29" y="112">Fri</text>
        </g>
        <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111" text-anchor="middle">
          <text x="78" y="39">9.5</text>
          <text x="78" y="58">6</text>
          <text x="78" y="77">11</text>
          <text x="78" y="96">4.5</text>
          <text x="78" y="113">10</text>
        </g>
      </g>
      <!-- pen -->
      <line x1="604" y1="200" x2="628" y2="184" stroke="#111" stroke-width="3" stroke-linecap="round"/>

      <!-- Doug leaning in with mug -->
      <use href="#doug" x="702" y="150" width="116" height="160"/>
      <ellipse cx="744" cy="242" rx="12" ry="7" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M732 242 l2 20 q10 4 20 0 l2 -20" fill="#f4f1ea" stroke="#111" stroke-width="2" stroke-linejoin="round"/>

      <!-- Doug balloon -->
      <path d="M668 96 h122 v42 h-52 l-8 12 -6 -12 h-56 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="729" y="114" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">You still fill</text>
      <text x="729" y="131" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">yours in by hand?</text>

      <!-- Priya balloon -->
      <path d="M436 26 h158 v42 h-96 l-12 13 -3 -13 h-47 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="515" y="44" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Someone's should</text>
      <text x="515" y="61" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">match a real week.</text>
    </g>
  </g>

  <!-- =========================== PANEL 3 =========================== -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="829.5" y="1.5" width="397" height="337" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="252" width="400" height="90" fill="#e9e5db"/>
      <line x1="828" y1="252" x2="1228" y2="252" stroke="#111" stroke-width="2"/>

      <!-- monitor showing the roster -->
      <rect x="902" y="70" width="204" height="150" rx="8" fill="#dfe6e8" stroke="#111" stroke-width="2.5"/>
      <rect x="988" y="220" width="32" height="22" fill="#e9e5db" stroke="#111" stroke-width="2.2"/>
      <rect x="956" y="242" width="96" height="9" rx="3" fill="#e9e5db" stroke="#111" stroke-width="2.2"/>

      <!-- clanker small in corner of this screen -->
      <use href="#clanker" x="900" y="72" width="56" height="56"/>

      <!-- roster: identical 40.0 rows, then Priya's lone honest one -->
      <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="11" fill="#111">
        <text x="966" y="98">Doug        40.0</text>
        <text x="966" y="116">Dailbert    40.0</text>
        <text x="966" y="134">Team A      40.0</text>
        <text x="966" y="152">Team B      40.0</text>
        <text x="966" y="170">Team C      40.0</text>
        <text x="966" y="190" font-weight="bold">Priya       41.0</text>
      </g>
      <rect x="960" y="179" width="138" height="16" fill="none" stroke="#111" stroke-width="1.6"/>

      <!-- Boss pointing, flustered -->
      <use href="#boss" x="828" y="150" width="150" height="200"/>
      <!-- Priya, arms folded, calm, winning -->
      <use href="#priya" x="1062" y="150" width="150" height="200"/>

      <!-- Boss balloon -->
      <path d="M842 24 h130 v40 h-70 l-10 12 -3 -12 h-47 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="907" y="41" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">Yours doesn't</text>
      <text x="907" y="58" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">match the others.</text>

      <!-- Priya balloon: the dry button -->
      <path d="M1040 232 h172 v52 h-70 l-12 -13 -3 13 h-87 Z" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <text x="1126" y="253" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">No. The others</text>
      <text x="1126" y="270" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">match each other.</text>
    </g>
  </g>
</svg>