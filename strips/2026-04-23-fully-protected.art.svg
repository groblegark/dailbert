<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===== DAILBERT ===== -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <path d="M20 160 Q20 118 60 116 Q100 118 100 160 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="102" width="16" height="18" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M60 118 l-6 10 l6 26 l6 -26 z" fill="#111"/>
      <path d="M54 118 h12 l-6 8 z" fill="#111"/>
      <ellipse cx="60" cy="66" rx="30" ry="36" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M60 30 q11 -13 19 -4 q-7 2 -6 9" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="64" r="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="72" cy="64" r="10" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="64" x2="62" y2="64" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="64" r="2.5" fill="#111"/>
      <circle cx="72" cy="64" r="2.5" fill="#111"/>
      <path d="M50 86 q10 6 20 0" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== DOUG ===== -->
    <symbol id="doug" viewBox="0 0 130 160">
      <path d="M18 160 Q18 116 62 114 Q106 116 106 160 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="54" y="100" width="18" height="18" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="62" cy="62" r="36" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M50 28 q4 -8 8 0 M62 26 q4 -8 8 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="60" r="3" fill="#111"/>
      <circle cx="74" cy="60" r="3" fill="#111"/>
      <path d="M44 74 q18 20 34 0" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="88" y="120" width="26" height="26" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M114 126 q11 0 11 9 q0 9 -11 9" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M96 116 q-4 -6 0 -12 M106 116 q4 -6 0 -12" fill="none" stroke="#111" stroke-width="1.5"/>
    </symbol>

    <!-- ===== PRIYA ===== -->
    <symbol id="priya" viewBox="0 0 120 170">
      <path d="M16 170 Q16 122 60 120 Q104 122 104 170 Z" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M28 138 q-2 -10 4 -16 M92 138 q2 -10 -4 -16" fill="none" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="104" width="16" height="18" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="22" r="13" fill="#111"/>
      <path d="M26 82 Q22 30 60 30 Q98 30 94 82 Q94 98 84 98 L36 98 Q26 98 26 82 Z" fill="#111"/>
      <ellipse cx="60" cy="72" rx="26" ry="30" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <path d="M35 54 q6 -11 12 -3 q6 -11 12 -3 q6 -11 12 -3 q6 -9 9 0 l0 6 q-22 -8 -45 0 z" fill="#111"/>
      <rect x="38" y="63" width="18" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="64" y="63" width="18" height="13" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="56" y1="69" x2="64" y2="69" stroke="#111" stroke-width="2.5"/>
      <circle cx="47" cy="69" r="2.3" fill="#111"/>
      <circle cx="73" cy="69" r="2.3" fill="#111"/>
      <line x1="52" y1="92" x2="68" y2="92" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- ===== CLANKER (lives only inside a surface) ===== -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="18" x2="60" y2="6" stroke="#7d7d7d" stroke-width="2.5"/>
      <circle cx="60" cy="5" r="3.5" fill="#7d7d7d"/>
      <rect x="24" y="18" width="72" height="64" rx="9" fill="#cfcfcf" stroke="#7d7d7d" stroke-width="2.5"/>
      <rect x="33" y="37" width="23" height="10" rx="4" fill="#8fb0c9"/>
      <rect x="64" y="37" width="23" height="10" rx="4" fill="#8fb0c9"/>
      <rect x="38" y="60" width="44" height="12" rx="2" fill="#eee" stroke="#7d7d7d" stroke-width="2"/>
      <line x1="46" y1="60" x2="46" y2="72" stroke="#7d7d7d" stroke-width="1.5"/>
      <line x1="54" y1="60" x2="54" y2="72" stroke="#7d7d7d" stroke-width="1.5"/>
      <line x1="62" y1="60" x2="62" y2="72" stroke="#7d7d7d" stroke-width="1.5"/>
      <line x1="70" y1="60" x2="70" y2="72" stroke="#7d7d7d" stroke-width="1.5"/>
    </symbol>
  </defs>

  <!-- =================== PANEL 1 =================== -->
  <rect x="1.5" y="8" width="397" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="4" y1="256" x2="396" y2="256" stroke="#111" stroke-width="2"/>
  <use href="#dailbert" x="10" y="118" width="150" height="200"/>
  <!-- monitor -->
  <rect x="252" y="150" width="122" height="94" rx="6" fill="#111"/>
  <rect x="260" y="158" width="106" height="78" rx="3" fill="#1d2b34"/>
  <use href="#clanker" x="273" y="158" width="80" height="80"/>
  <rect x="304" y="244" width="18" height="10" fill="#111"/>
  <rect x="288" y="254" width="50" height="6" rx="2" fill="#111"/>
  <line x1="258" y1="150" x2="245" y2="140" stroke="#111" stroke-width="1.2" opacity="0.5"/>
  <line x1="258" y1="200" x2="242" y2="200" stroke="#111" stroke-width="1.2" opacity="0.5"/>
  <!-- Dailbert balloon -->
  <path d="M20 22 h176 a12 12 0 0 1 12 12 v42 a12 12 0 0 1 -12 12 h-96 l-14 20 l0 -20 h-66 a12 12 0 0 1 -12 -12 v-42 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="108" y="48" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">You booked eleven</text>
  <text x="108" y="68" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">meetings for me.</text>
  <!-- Clanker balloon -->
  <line x1="308" y1="104" x2="312" y2="150" stroke="#7d7d7d" stroke-width="1.5" stroke-dasharray="4 4"/>
  <rect x="214" y="18" width="176" height="86" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
  <rect x="218" y="22" width="168" height="78" rx="2" fill="none" stroke="#7d7d7d" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="302" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#333">You said yes to</text>
  <text x="302" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#333">all of them.</text>
  <text x="302" y="82" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#333">I only helped.</text>

  <!-- =================== PANEL 2 =================== -->
  <rect x="415.5" y="8" width="397" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="418" y1="300" x2="810" y2="300" stroke="#111" stroke-width="2"/>
  <use href="#doug" x="430" y="120" width="180" height="212"/>
  <use href="#priya" x="632" y="118" width="152" height="214"/>
  <!-- Doug balloon -->
  <path d="M430 20 h182 a12 12 0 0 1 12 12 v36 a12 12 0 0 1 -12 12 h-70 l-16 20 l2 -20 h-98 a12 12 0 0 1 -12 -12 v-36 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="521" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">It booked me a meeting</text>
  <text x="521" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#111">to prep for a meeting.</text>
  <!-- Priya balloon -->
  <path d="M640 34 h140 a12 12 0 0 1 12 12 v30 a12 12 0 0 1 -12 12 h-58 l-14 18 l1 -18 h-69 a12 12 0 0 1 -12 -12 v-30 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="712" y="56" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">Amateurs.</text>
  <text x="712" y="75" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">Watch.</text>

  <!-- =================== PANEL 3 =================== -->
  <rect x="829.5" y="8" width="397" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <line x1="832" y1="256" x2="1224" y2="256" stroke="#111" stroke-width="2"/>
  <use href="#priya" x="846" y="120" width="152" height="206"/>
  <!-- monitor with cleared calendar behind clanker -->
  <rect x="1028" y="150" width="116" height="90" rx="6" fill="#111"/>
  <rect x="1036" y="158" width="100" height="74" rx="3" fill="#eef1f0"/>
  <line x1="1052" y1="158" x2="1052" y2="232" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1068" y1="158" x2="1068" y2="232" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1084" y1="158" x2="1084" y2="232" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1100" y1="158" x2="1100" y2="232" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1116" y1="158" x2="1116" y2="232" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1036" y1="176" x2="1136" y2="176" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1036" y1="194" x2="1136" y2="194" stroke="#c4c9c9" stroke-width="1"/>
  <line x1="1036" y1="212" x2="1136" y2="212" stroke="#c4c9c9" stroke-width="1"/>
  <use href="#clanker" x="1046" y="158" width="72" height="72" opacity="0.92"/>
  <rect x="1078" y="240" width="16" height="10" fill="#111"/>
  <rect x="1062" y="250" width="48" height="6" rx="2" fill="#111"/>
  <!-- Doug peeking, foreground right -->
  <use href="#doug" x="1120" y="196" width="98" height="130"/>
  <!-- Clanker balloon -->
  <line x1="1084" y1="80" x2="1085" y2="150" stroke="#7d7d7d" stroke-width="1.5" stroke-dasharray="4 4"/>
  <rect x="982" y="16" width="200" height="64" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
  <rect x="986" y="20" width="192" height="56" rx="2" fill="none" stroke="#7d7d7d" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1082" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#333">Your whole week is</text>
  <text x="1082" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" text-anchor="middle" fill="#333">protected now.</text>
  <!-- Priya balloon -->
  <path d="M842 92 h146 a12 12 0 0 1 12 12 v28 a12 12 0 0 1 -12 12 h-56 l-14 18 l1 -18 h-77 a12 12 0 0 1 -12 -12 v-28 a12 12 0 0 1 12 -12 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="915" y="114" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">There's no</text>
  <text x="915" y="133" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" text-anchor="middle" fill="#111">incident.</text>
  <!-- Doug button balloon -->
  <path d="M1002 150 h148 a10 10 0 0 1 10 10 v30 a10 10 0 0 1 -10 10 h-14 l6 16 l-20 -16 h-120 a10 10 0 0 1 -10 -10 v-30 a10 10 0 0 1 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.5"/>
  <text x="1076" y="174" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">She gets more done</text>
  <text x="1076" y="191" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="13.5" text-anchor="middle" fill="#111">than the rest of us.</text>
</svg>