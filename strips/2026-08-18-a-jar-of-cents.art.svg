    <rect x="300" y="218" width="20" height="18" fill="#1b1f22" stroke="#111" stroke-width="2.5"/>
    <rect x="285" y="236" width="50" height="8" rx="2" fill="#1b1f22" stroke="#111" stroke-width="2.5"/>
