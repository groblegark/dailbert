    <line x1="292" y1="102" x2="300" y2="124" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="219" y="40" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">I round every paycheck</text>
    <text x="219" y="58" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">down to the dollar.</text>
    <text x="219" y="76" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">For tidiness.</text>
    <text x="219" y="94" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">Since January.</text>
  </g>

  <!-- PANEL 2 -->
  <g>
    <rect x="415.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
