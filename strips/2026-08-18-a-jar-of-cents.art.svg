    <text x="1020" y="38" font-size="13.5" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">I just can't work out</text>
    <text x="1020" y="56" font-size="13.5" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">whose cent is whose.</text>
    <rect x="832" y="204" width="130" height="48" rx="14" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M900 204 l-6 -16 l16 8 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="897" y="225" font-size="13" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">Keep the penny.</text>
    <text x="897" y="242" font-size="13" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">Lose the habit.</text>
