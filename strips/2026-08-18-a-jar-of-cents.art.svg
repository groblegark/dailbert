    <text x="544" y="42" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">I've saved quite a lot.</text>
    <text x="544" y="64" font-size="14" text-anchor="middle" fill="#111" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif">I'd like to give it back.</text>
  </g>

  <!-- PANEL 3 -->
