      <path d="M24,54 q-6,4 0,10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M96,54 q6,4 0,10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40,24 q6,-6 12,-2 M60,20 q6,-4 10,2" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
