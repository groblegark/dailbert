      <line x1="58" y1="58" x2="62" y2="58" stroke="#111" stroke-width="2.5"/>
      <circle cx="48" cy="58" r="2.5" fill="#111"/>
      <circle cx="72" cy="58" r="2.5" fill="#111"/>
      <path d="M60,66 q3,6 -2,8" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="52" y1="84" x2="68" y2="84" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
