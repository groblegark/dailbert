      <rect x="52" y="104" width="16" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="60" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M30,58 q-6,4 0,10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M90,58 q6,4 0,10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60,24 c -3,-10 9,-12 8,-3 c -0.5,4 -6,3 -4,-1" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
