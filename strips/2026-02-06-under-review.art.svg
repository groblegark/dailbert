      <circle cx="60" cy="62" r="2.5" fill="#111"/>
      <path d="M40,66 Q60,88 80,66" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <symbol id="boss" viewBox="0 0 120 200">
      <path d="M16,200 L26,126 Q60,108 94,126 L104,200 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M46,120 L60,150 L74,120" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M56,122 L60,140 L64,122 Z" fill="#111"/>
      <path d="M57,140 L63,140 L65,172 L60,178 L55,172 Z" fill="#111"/>
      <rect x="52" y="104" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="60" cy="62" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M42,34 L46,2 L56,32 Z" fill="#111"/>
      <path d="M64,32 L74,2 L78,34 Z" fill="#111"/>
