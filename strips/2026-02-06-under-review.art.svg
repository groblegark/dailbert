      <rect x="32" y="42" width="20" height="9" rx="4" fill="#f7f4ec" stroke="#111" stroke-width="2.5"/>
      <rect x="68" y="42" width="20" height="9" rx="4" fill="#f7f4ec" stroke="#111" stroke-width="2.5"/>
      <line x1="34" y1="46.5" x2="50" y2="46.5" stroke="#111" stroke-width="1.5"/>
      <line x1="70" y1="46.5" x2="86" y2="46.5" stroke="#111" stroke-width="1.5"/>
      <rect x="40" y="62" width="40" height="14" rx="2" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="48" y1="62" x2="48" y2="76" stroke="#111" stroke-width="1.8"/>
      <line x1="56" y1="62" x2="56" y2="76" stroke="#111" stroke-width="1.8"/>
      <line x1="64" y1="62" x2="64" y2="76" stroke="#111" stroke-width="1.8"/>
      <line x1="72" y1="62" x2="72" y2="76" stroke="#111" stroke-width="1.8"/>
    </symbol>

    <clipPath id="p1"><rect x="1" y="1" width="398" height="338" rx="3"/></clipPath>
    <clipPath id="p2"><rect x="415" y="1" width="398" height="338" rx="3"/></clipPath>
    <clipPath id="p3"><rect x="829" y="1" width="398" height="338" rx="3"/></clipPath>
