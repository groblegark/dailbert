<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 8 q10 -8 6 4 q-2 6 4 6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <circle cx="71" cy="42" r="9" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="58" y1="42" x2="62" y2="42" stroke="#111" stroke-width="2.4"/>
      <circle cx="49" cy="42" r="2.2" fill="#111"/>
      <circle cx="71" cy="42" r="2.2" fill="#111"/>
      <line x1="42" y1="30" x2="52" y2="33" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <line x1="78" y1="30" x2="68" y2="33" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M52 60 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M50 74 h20 v8 h-20 z" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <path d="M34 150 q0 -60 26 -68 q26 8 26 68 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M60 82 l-6 8 l6 26 l6 -26 z" fill="#111"/>
    </symbol>
    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 120 160">
      <circle cx="60" cy="44" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M34 24 q6 -6 10 0 M50 16 q10 -6 16 0 M74 22 q8 -5 12 2" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="49" cy="42" r="3.2" fill="#111"/>
      <circle cx="71" cy="42" r="3.2" fill="#111"/>
      <path d="M44 54 q16 20 32 0" fill="#fff" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M44 54 q16 20 32 0" fill="none" stroke="#111" stroke-width="2.4"/>
      <path d="M30 152 q0 -58 30 -66 q30 8 30 66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <g>
        <rect x="14" y="112" width="26" height="24" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
        <path d="M40 118 q10 0 10 8 q0 8 -10 8" fill="none" stroke="#111" stroke-width="2.4"/>
        <path d="M18 112 q9 8 18 0" fill="none" stroke="#111" stroke-width="1.8"/>
      </g>
    </symbol>
    <!-- ============ PRIYA ============ -->
    <symbol id="priya" viewBox="0 0 120 160">
      <ellipse cx="60" cy="44" rx="30" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M31 42 q-4 -30 29 -34 q33 4 29 34 q-6 -14 -14 -16 q4 8 -2 12 q-6 -12 -13 -12 q-7 0 -13 12 q-8 -4 -3 -12 q-8 2 -13 16 z" fill="#111"/>
      <path d="M55 8 q5 -8 10 0 q6 -4 10 4" fill="#111" stroke="#111" stroke-width="2"/>
      <rect x="40" y="38" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="64" y="38" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <line x1="56" y1="43" x2="64" y2="43" stroke="#111" stroke-width="2.2"/>
      <circle cx="48" cy="43.5" r="2" fill="#111"/>
      <circle cx="72" cy="43.5" r="2" fill="#111"/>
      <path d="M54 60 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M32 152 q0 -58 28 -66 q28 8 28 66 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="42" y1="118" x2="50" y2="118" stroke="#111" stroke-width="2.2"/>
      <line x1="70" y1="118" x2="78" y2="118" stroke="#111" stroke-width="2.2"/>
    </symbol>
    <!-- ============ THE CLANKER ============ -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <rect x="24" y="26" width="72" height="62" rx="8" fill="#20242b" stroke="#0a0c10" stroke-width="2.5"/>
      <line x1="60" y1="26" x2="60" y2="12" stroke="#c9ccd2" stroke-width="2.4"/>
      <circle cx="60" cy="9" r="3.4" fill="#cfe8ff"/>
      <rect x="34" y="42" width="22" height="9" rx="3" fill="#bfe3ff"/>
      <rect x="64" y="42" width="22" height="9" rx="3" fill="#bfe3ff"/>
      <g stroke="#9aa0aa" stroke-width="2">
        <line x1="40" y1="66" x2="40" y2="78"/>
        <line x1="48" y1="66" x2="48" y2="78"/>
        <line x1="56" y1="66" x2="56" y2="78"/>
        <line x1="64" y1="66" x2="64" y2="78"/>
        <line x1="72" y1="66" x2="72" y2="78"/>
        <line x1="80" y1="66" x2="80" y2="78"/>
      </g>
      <rect x="36" y="64" width="48" height="16" rx="3" fill="none" stroke="#9aa0aa" stroke-width="2"/>
    </symbol>
    <!-- dying desk plant -->
    <symbol id="plant" viewBox="0 0 80 90">
      <path d="M26 52 h28 l-4 30 h-20 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="40" y1="52" x2="40" y2="20" stroke="#111" stroke-width="2.4"/>
      <path d="M40 28 q-16 -2 -20 12" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 24 q16 -2 20 12" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M40 34 q-14 6 -16 16" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M18 84 q6 -4 12 -1" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>
  <!-- ============================ PANEL 1 ============================ -->
  <g>
    <rect x="0" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <line x1="0" y1="300" x2="400" y2="300" stroke="#111" stroke-width="1.6"/>
      <rect x="228" y="214" width="150" height="86" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="256" y="150" width="112" height="72" rx="5" fill="#eae6dc" stroke="#111" stroke-width="2.4"/>
      <rect x="266" y="160" width="92" height="52" rx="3" fill="#22262d"/>
      <line x1="304" y1="222" x2="320" y2="234" stroke="#111" stroke-width="2.2"/>
      <rect x="298" y="234" width="30" height="6" fill="#111"/>
      <use href="#clanker" x="266" y="150" width="92" height="84"/>
      <use href="#plant" x="230" y="150" width="66" height="74"/>
      <use href="#dailbert" x="30" y="120" width="150" height="200"/>
      <g>
        <path d="M40 40 h150 q10 0 10 10 v40 q0 10 -10 10 h-70 l-14 16 l2 -16 h-68 q-10 0 -10 -10 v-40 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="115" y="62" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">The plant's dying.</text>
        <text x="115" y="80" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Just give it a</text>
        <text x="115" y="98" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">little every hour.</text>
      </g>
    </g>
  </g>
  <!-- ============================ PANEL 2 ============================ -->
  <g>
    <rect x="414" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <line x1="414" y1="300" x2="814" y2="300" stroke="#111" stroke-width="1.6"/>
      <rect x="620" y="214" width="170" height="86" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <rect x="646" y="150" width="112" height="72" rx="5" fill="#eae6dc" stroke="#111" stroke-width="2.4"/>
      <rect x="656" y="160" width="92" height="52" rx="3" fill="#22262d"/>
      <use href="#clanker" x="656" y="150" width="92" height="84"/>
      <rect x="688" y="234" width="30" height="6" fill="#111"/>
      <line x1="694" y1="222" x2="710" y2="234" stroke="#111" stroke-width="2.2"/>
      <use href="#plant" x="500" y="150" width="66" height="74"/>
      <path d="M512 218 q10 12 30 12 q22 0 34 -10" fill="none" stroke="#8b93a0" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="545" cy="298" rx="52" ry="9" fill="none" stroke="#8b93a0" stroke-width="2"/>
      <ellipse cx="545" cy="298" rx="30" ry="5" fill="none" stroke="#8b93a0" stroke-width="1.6"/>
      <line x1="522" y1="224" x2="520" y2="240" stroke="#8b93a0" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="566" y1="224" x2="568" y2="240" stroke="#8b93a0" stroke-width="1.8" stroke-linecap="round"/>
      <use href="#dailbert" x="415" y="150" width="130" height="175"/>
      <line x1="702" y1="150" x2="702" y2="120" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <g>
        <rect x="560" y="30" width="238" height="86" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="679" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Watered hourly since</text>
        <text x="679" y="74" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">Monday. Never missed</text>
        <text x="679" y="92" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">a slot. 168 waterings.</text>
        <text x="679" y="110" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">It seemed thirsty.</text>
      </g>
    </g>
  </g>
  <!-- ============================ PANEL 3 ============================ -->
  <g>
    <rect x="828" y="0" width="400" height="340" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <line x1="828" y1="300" x2="1228" y2="300" stroke="#111" stroke-width="1.6"/>
      <rect x="1064" y="240" width="150" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
      <use href="#priya" x="980" y="132" width="150" height="200"/>
      <use href="#plant" x="1120" y="180" width="60" height="66"/>
      <use href="#doug" x="836" y="150" width="140" height="185"/>
      <g>
        <path d="M980 26 h220 q10 0 10 10 v42 q0 10 -10 10 h-96 l-16 16 l2 -16 h-114 q-10 0 -10 -10 v-42 q0 -10 10 -10 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="1092" y="50" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">I moved it to my desk.</text>
        <text x="1092" y="68" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">It doesn't have a</text>
        <text x="1092" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111">calendar invite now.</text>
      </g>
      <g>
        <path d="M846 128 h118 q8 0 8 8 v22 q0 8 -8 8 h-70 l-12 12 l1 -12 h-37 q-8 0 -8 -8 v-22 q0 -8 8 -8 z" fill="#fff" stroke="#111" stroke-width="2.2"/>
        <text x="905" y="147" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Lucky plant.</text>
        <text x="905" y="163" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Sip of coffee?</text>
      </g>
    </g>
  </g>
</svg>