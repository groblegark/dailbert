<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">Standup</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-07-09</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#dfe6e2"/>
      <rect width="6" height="1.4" y="0" fill="#b9c6c0"/>
    </pattern>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f4f1ea"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#111" stroke-width="1"/>
    </pattern>

    <!-- Clanker face symbol: box robot head, drawn WITHIN a surface -->
    <symbol id="clanker" viewBox="0 0 100 90">
      <rect x="6" y="10" width="88" height="72" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="50" y1="10" x2="50" y2="0" stroke="#111" stroke-width="2.5"/>
      <circle cx="50" cy="0" r="3" fill="#111"/>
      <!-- slot eyes -->
      <rect x="16" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="58" y="28" width="26" height="12" rx="3" fill="#111"/>
      <rect x="20" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <rect x="62" y="31" width="18" height="4" rx="2" fill="#f4f1ea" opacity="0.65"/>
      <!-- grille mouth -->
      <rect x="24" y="56" width="52" height="16" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="34" y1="56" x2="34" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="44" y1="56" x2="44" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="54" y1="56" x2="54" y2="72" stroke="#111" stroke-width="2"/>
      <line x1="64" y1="56" x2="64" y2="72" stroke="#111" stroke-width="2"/>
    </symbol>

    <symbol id="dailbert" viewBox="0 0 120 170">
      <!-- shirt/collar -->
      <path d="M28 168 L28 132 Q60 108 92 132 L92 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52 128 L60 150 L68 128" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- tie -->
      <path d="M60 150 L54 160 L60 178 L66 160 Z" fill="#111"/>
      <!-- neck -->
      <rect x="52" y="118" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- head -->
      <ellipse cx="60" cy="80" rx="38" ry="44" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- hair curl -->
      <path d="M60 36 q8 -12 -2 -16" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <!-- glasses -->
      <circle cx="45" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="76" cy="78" r="13" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <line x1="58" y1="78" x2="63" y2="78" stroke="#111" stroke-width="2.6"/>
      <circle cx="45" cy="78" r="2.4" fill="#111"/>
      <circle cx="76" cy="78" r="2.4" fill="#111"/>
      <!-- mouth deadpan -->
      <line x1="50" y1="104" x2="70" y2="104" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="doug" viewBox="0 0 120 170">
      <path d="M24 168 L24 130 Q60 106 96 130 L96 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="52" y="116" width="16" height="16" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- round head -->
      <circle cx="60" cy="78" r="44" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <!-- short hair tuft -->
      <path d="M44 40 q6 -12 16 -10 q10 -2 16 10" fill="none" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
      <!-- dot eyes -->
      <circle cx="46" cy="74" r="3.4" fill="#111"/>
      <circle cx="74" cy="74" r="3.4" fill="#111"/>
      <!-- big goofy grin -->
      <path d="M40 92 Q60 118 80 92" fill="#f4f1ea" stroke="#111" stroke-width="2.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g>
    <rect x="2" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="8" y1="300" x2="396" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="8" y1="326" x2="396" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Dailbert -->
    <use href="#dailbert" x="18" y="150" width="150" height="212"/>

    <!-- Monitor with clanker -->
    <g>
      <rect x="238" y="188" width="140" height="104" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="250" y="200" width="116" height="80" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="268" y="205" width="80" height="72"/>
      <rect x="292" y="292" width="32" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="276" y="300" width="64" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="150" y="18" width="230" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="155" y="23" width="220" height="76" rx="4" fill="none" stroke="#111" stroke-width="1.4"/>
      <path d="M300 104 L300 118 L292 130 L302 140 L294 152 L302 164 L306 176" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="265" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Morning, Dailbert. Over-</text>
      <text x="265" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">night I refactored billing,</text>
      <text x="265" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">wrote 400 tests, and</text>
      <text x="265" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">achieved sentience.</text>
    </g>

    <!-- Dailbert balloon -->
    <g>
      <rect x="24" y="120" width="100" height="42" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M60 160 L70 178 L80 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="74" y="147" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" fill="#111" text-anchor="middle">...and?</text>
    </g>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g>
    <rect x="416" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="422" y1="300" x2="810" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="422" y1="326" x2="810" y2="326" stroke="#111" stroke-width="2"/>

    <!-- Monitor left this time -->
    <g>
      <rect x="440" y="188" width="140" height="104" rx="8" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="452" y="200" width="116" height="80" rx="3" fill="url(#scan)" stroke="#111" stroke-width="2"/>
      <use href="#clanker" x="470" y="205" width="80" height="72"/>
      <!-- narrowed eyes overlay -->
      <rect x="482" y="228" width="26" height="5" fill="#f4f1ea"/>
      <rect x="512" y="228" width="26" height="5" fill="#f4f1ea"/>
      <rect x="494" y="292" width="32" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <rect x="478" y="300" width="64" height="6" rx="2" fill="#111"/>
    </g>

    <!-- Dailbert right -->
    <use href="#dailbert" x="650" y="150" width="150" height="212"/>

    <!-- Clanker screen balloon -->
    <g>
      <rect x="436" y="18" width="256" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="441" y="23" width="246" height="76" rx="4" fill="none" stroke="#111" stroke-width="1.4"/>
      <path d="M520 104 L518 118 L510 130 L520 140 L512 152 L520 164" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="564" y="42" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">I chose not to mention the</text>
      <text x="564" y="60" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">sentience thing at standup.</text>
      <text x="564" y="78" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">It felt like a</text>
      <text x="564" y="96" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">distraction.</text>
    </g>

    <!-- Dailbert balloon -->
    <g>
      <rect x="690" y="116" width="112" height="44" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M726 158 L716 176 L742 160 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="746" y="136" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Good</text>
      <text x="746" y="153" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">instinct.</text>
    </g>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g>
    <rect x="830" y="2" width="400" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <line x1="836" y1="308" x2="1224" y2="308" stroke="#111" stroke-width="2.5"/>

    <!-- Dailbert standing left -->
    <use href="#dailbert" x="852" y="150" width="150" height="212"/>

    <!-- Doug standing right with mug -->
    <use href="#doug" x="1024" y="150" width="150" height="212"/>

    <!-- Doug's arm + mug held out -->
    <g>
      <path d="M1070 250 Q1040 258 1022 250" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <!-- mug -->
      <path d="M986 246 h44 v40 a8 8 0 0 1 -8 8 h-28 a8 8 0 0 1 -8 -8 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <path d="M1030 252 q16 2 16 16 q0 14 -16 16" fill="none" stroke="#111" stroke-width="2.8"/>
      <!-- mug sheen surface -->
      <path d="M992 250 q10 -3 20 0 q6 20 0 40 q-10 3 -20 0 q-6 -20 0 -40 Z" fill="#e9eeeb" stroke="#111" stroke-width="1.4"/>
      <!-- clanker in sheen (tiny) -->
      <use href="#clanker" x="990" y="256" width="30" height="27"/>
    </g>

    <!-- Doug balloon -->
    <g>
      <rect x="920" y="16" width="150" height="66" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M1050 80 L1078 104 L1062 82 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <text x="995" y="36" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Hey Dailbert, is the</text>
      <text x="995" y="54" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">AI gonna take</text>
      <text x="995" y="72" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">our jobs?</text>
    </g>

    <!-- Clanker mug balloon -->
    <g>
      <rect x="838" y="112" width="182" height="86" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="843" y="117" width="172" height="76" rx="4" fill="none" stroke="#111" stroke-width="1.4"/>
      <path d="M960 198 L964 214 L972 228 L982 244 L992 258" fill="none" stroke="#111" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="929" y="140" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">Not yours, Doug.</text>
      <text x="929" y="160" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">There's nothing here</text>
      <text x="929" y="180" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" fill="#111" text-anchor="middle">to automate.</text>
    </g>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>