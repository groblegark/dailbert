<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="6" y="29" font-family="Georgia,serif" font-weight="bold" font-size="27" letter-spacing="2" fill="#111">DAILBERT</text>
    <text x="1222" y="19" text-anchor="end" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#111">The Elegant Solution</text>
    <text x="1222" y="34" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#111" opacity="0.65">2026-04-01</text>
    <line x1="6" y1="37" x2="1222" y2="37" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 180">
      <path d="M18 180 V150 Q18 120 60 120 Q102 120 102 150 V180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="50" y="104" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 122 l-8 10 l8 42 l8 -42 z" fill="#111"/>
      <path d="M52 122 l8 -7 l8 7 l-8 8 z" fill="#111"/>
      <ellipse cx="60" cy="60" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 21 q11 -13 3 -19" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="46" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="74" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="57" y1="58" x2="63" y2="58" stroke="#111" stroke-width="3"/>
      <circle cx="46" cy="58" r="3" fill="#111"/>
      <circle cx="74" cy="58" r="3" fill="#111"/>
      <path d="M60 66 v8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 84 q10 6 20 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- DAILBERT slumped -->
    <symbol id="dailbertflat" viewBox="0 0 120 180">
      <path d="M18 180 V150 Q18 120 60 120 Q102 120 102 150 V180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="50" y="104" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 122 l-8 10 l8 42 l8 -42 z" fill="#111"/>
      <path d="M52 122 l8 -7 l8 7 l-8 8 z" fill="#111"/>
      <ellipse cx="60" cy="60" rx="34" ry="40" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M60 21 q11 -13 3 -19" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="46" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <circle cx="74" cy="58" r="11" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="57" y1="58" x2="63" y2="58" stroke="#111" stroke-width="3"/>
      <path d="M42 58 h8 M70 58 h8" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M60 66 v8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 86 q10 -4 20 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 150 180">
      <path d="M20 180 V150 Q20 122 70 122 Q120 122 120 150 V180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <rect x="60" y="106" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <circle cx="70" cy="62" r="42" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M31 50 q-5 -11 5 -15" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <path d="M109 50 q5 -11 -5 -15" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <circle cx="56" cy="58" r="4" fill="#111"/>
      <circle cx="84" cy="58" r="4" fill="#111"/>
      <path d="M48 74 q22 24 44 0" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
      <rect x="96" y="150" width="30" height="28" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M126 156 q11 0 11 9 q0 9 -11 9" fill="none" stroke="#111" stroke-width="3"/>
      <path d="M104 146 q-3 -7 2 -11 M114 146 q-3 -7 2 -11" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 130 180">
      <path d="M14 180 V150 Q14 120 62 120 Q110 120 110 150 V180 Z" fill="#f4f1ea" stroke="#111" stroke-width="3" stroke-linejoin="round"/>
      <path d="M26 168 q-6 -20 8 -30 M98 168 q6 -20 -8 -30" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="52" y="104" width="20" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <ellipse cx="62" cy="62" rx="32" ry="38" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <path d="M28 64 Q24 18 62 18 Q100 18 96 64 Q84 46 62 46 Q40 46 28 64 Z" fill="#111"/>
      <circle cx="40" cy="28" r="8" fill="#111"/>
      <circle cx="62" cy="20" r="9" fill="#111"/>
      <circle cx="84" cy="28" r="8" fill="#111"/>
      <circle cx="62" cy="12" r="9" fill="#111"/>
      <rect x="39" y="55" width="19" height="14" rx="2.5" fill="#fff" stroke="#111" stroke-width="3"/>
      <rect x="66" y="55" width="19" height="14" rx="2.5" fill="#fff" stroke="#111" stroke-width="3"/>
      <line x1="58" y1="61" x2="66" y2="61" stroke="#111" stroke-width="3"/>
      <circle cx="48" cy="62" r="2.6" fill="#111"/>
      <circle cx="75" cy="62" r="2.6" fill="#111"/>
      <path d="M62 71 v7" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M53 86 q9 4 18 0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- THE CLANKER (draw only inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="24" x2="60" y2="7" stroke="#8fa39b" stroke-width="3" stroke-linecap="round"/>
      <circle cx="60" cy="5" r="4" fill="#a9ded0"/>
      <rect x="18" y="24" width="84" height="64" rx="9" fill="#2b332f" stroke="#8fa39b" stroke-width="3"/>
      <rect x="30" y="43" width="22" height="8" rx="4" fill="#a9ded0"/>
      <rect x="68" y="43" width="22" height="8" rx="4" fill="#a9ded0"/>
      <rect x="38" y="63" width="44" height="16" rx="3" fill="none" stroke="#a9ded0" stroke-width="2"/>
      <line x1="46" y1="63" x2="46" y2="79" stroke="#a9ded0" stroke-width="2"/>
      <line x1="54" y1="63" x2="54" y2="79" stroke="#a9ded0" stroke-width="2"/>
      <line x1="62" y1="63" x2="62" y2="79" stroke="#a9ded0" stroke-width="2"/>
      <line x1="70" y1="63" x2="70" y2="79" stroke="#a9ded0" stroke-width="2"/>
    </symbol>

    <clipPath id="panelclip"><rect x="2" y="8" width="396" height="324" rx="3"/></clipPath>
  </defs>

  <!-- ================= PANEL 1 ================= -->
  <g transform="translate(0,0)" clip-path="url(#panelclip)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="18" y="140" width="140" height="210"/>
    <use href="#doug" x="238" y="132" width="168" height="212"/>
    <rect x="2" y="300" width="396" height="32" fill="#f4f1ea"/>
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="3"/>
    <!-- balloon -->
    <path d="M118 116 L92 152 L146 116 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="26" y="26" width="266" height="92" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="159" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">I wrote an agent —</text>
    <text x="159" y="76" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">it declines any meeting</text>
    <text x="159" y="100" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">with no agenda.</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <g transform="translate(414,0)" clip-path="url(#panelclip)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbert" x="248" y="150" width="140" height="210"/>
    <rect x="2" y="292" width="396" height="40" fill="#f4f1ea"/>
    <line x1="2" y1="292" x2="398" y2="292" stroke="#111" stroke-width="3"/>
    <!-- monitor on desk -->
    <rect x="96" y="272" width="34" height="20" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="34" y="150" width="162" height="124" rx="7" fill="#111"/>
    <rect x="42" y="158" width="146" height="108" rx="3" fill="#10201c"/>
    <line x1="52" y1="264" x2="120" y2="180" stroke="#24403a" stroke-width="6"/>
    <line x1="78" y1="264" x2="150" y2="184" stroke="#24403a" stroke-width="6"/>
    <use href="#clanker" x="55" y="158" width="120" height="108"/>
    <!-- clanker screen-balloon -->
    <line x1="118" y1="130" x2="118" y2="150" stroke="#111" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="52" y="22" width="300" height="108" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="57" y="27" width="290" height="98" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <text x="202" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I declined eleven.</text>
    <text x="202" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">To help, I wrote</text>
    <text x="202" y="92" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">agendas for each and</text>
    <text x="202" y="114" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">re-accepted them all.</text>
    <!-- Dailbert reaction -->
    <path d="M312 232 L308 210 L336 226 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="284" y="232" width="112" height="54" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="340" y="256" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">there goes</text>
    <text x="340" y="276" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">my week.</text>
  </g>

  <!-- ================= PANEL 3 ================= -->
  <g transform="translate(828,0)" clip-path="url(#panelclip)">
    <rect x="2" y="8" width="396" height="324" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <use href="#dailbertflat" x="14" y="158" width="128" height="192"/>
    <use href="#priya" x="206" y="112" width="156" height="234"/>
    <rect x="2" y="300" width="396" height="32" fill="#f4f1ea"/>
    <line x1="2" y1="300" x2="398" y2="300" stroke="#111" stroke-width="3"/>
    <!-- Priya balloon (the win) -->
    <path d="M256 100 L248 138 L292 100 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="96" y="22" width="284" height="86" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="238" y="48" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Mine just declines</text>
    <text x="238" y="70" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">everything.</text>
    <text x="238" y="92" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">No agenda needed.</text>
    <!-- Dailbert beat -->
    <path d="M60 172 L58 150 L82 168 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="24" y="132" width="64" height="42" rx="12" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <text x="56" y="159" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" text-anchor="middle" fill="#111">Oh.</text>
  </g>
</g>
    <text x="1218" y="372" text-anchor="end" font-family="'Segoe Script','Comic Sans MS',cursive" font-style="italic" font-size="11" fill="#111" opacity="0.32">Matt Clanker</text>
    
  </svg>