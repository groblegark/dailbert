<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ DAILBERT ============ -->
    <symbol id="dailbert" viewBox="0 0 120 180">
      <path d="M18,178 L18,124 Q18,100 60,100 Q102,100 102,124 L102,178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M52,100 L60,116 L68,100 Z" fill="#111"/>
      <rect x="56" y="90" width="8" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <ellipse cx="60" cy="54" rx="30" ry="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60,18 q10,-10 4,-14 q10,4 2,16" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="49" cy="54" r="9" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="71" cy="54" r="9" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="58" y1="54" x2="62" y2="54" stroke="#111" stroke-width="2"/>
      <circle cx="49" cy="54" r="2.4" fill="#111"/>
      <circle cx="71" cy="54" r="2.4" fill="#111"/>
      <path d="M52,72 q8,5 16,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ DOUG ============ -->
    <symbol id="doug" viewBox="0 0 130 180">
      <path d="M20,178 L20,126 Q20,104 62,104 Q104,104 104,126 L104,178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="60" cy="58" r="36" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M40,30 q6,-6 12,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="54" r="3" fill="#111"/>
      <circle cx="72" cy="54" r="3" fill="#111"/>
      <path d="M46,68 q15,16 30,0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <!-- mug in hand -->
      <rect x="86" y="122" width="30" height="26" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M116,127 q12,2 0,14" fill="none" stroke="#111" stroke-width="2.5"/>
      <path d="M94,116 q3,-6 0,-10 M104,116 q3,-6 0,-10" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ PRIYA ============ -->
    <symbol id="priya" viewBox="0 0 130 180">
      <path d="M18,178 L18,126 Q18,102 62,102 Q106,102 106,126 L106,178 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- rolled sleeves -->
      <path d="M22,140 l14,0 M108,140 l-14,0" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="62" cy="58" rx="29" ry="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- curly hair up -->
      <path d="M34,52 q-6,-22 14,-24 q4,-14 20,-12 q18,-2 20,14 q16,4 8,22 q6,-14 -6,-2 q6,-16 -12,-18 q-4,-10 -18,-6 q-16,-4 -18,10 q-14,2 -8,16 z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M56,22 q4,-3 12,0" fill="none" stroke="#111" stroke-width="2"/>
      <!-- rectangular glasses -->
      <rect x="44" y="52" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <rect x="66" y="52" width="16" height="11" rx="2" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="60" y1="57" x2="66" y2="57" stroke="#111" stroke-width="2"/>
      <circle cx="52" cy="57.5" r="2.3" fill="#111"/>
      <circle cx="74" cy="57.5" r="2.3" fill="#111"/>
      <path d="M55,76 q8,4 16,0" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============ CLANKER (drawn inside a screen) ============ -->
    <symbol id="clanker" viewBox="0 0 100 88">
      <line x1="50" y1="4" x2="50" y2="16" stroke="#8fb0c9" stroke-width="2.5"/>
      <circle cx="50" cy="4" r="3.5" fill="#8fb0c9"/>
      <rect x="22" y="16" width="56" height="52" rx="7" fill="#c9d6df" stroke="#333" stroke-width="2.5"/>
      <rect x="16" y="30" width="6" height="16" rx="2" fill="#c9d6df" stroke="#333" stroke-width="2"/>
      <rect x="78" y="30" width="6" height="16" rx="2" fill="#c9d6df" stroke="#333" stroke-width="2"/>
      <rect x="30" y="30" width="16" height="8" rx="2" fill="#aef0ff" stroke="#333" stroke-width="2"/>
      <rect x="54" y="30" width="16" height="8" rx="2" fill="#aef0ff" stroke="#333" stroke-width="2"/>
      <g stroke="#333" stroke-width="2" stroke-linecap="round">
        <line x1="32" y1="52" x2="68" y2="52"/>
        <line x1="36" y1="58" x2="64" y2="58"/>
      </g>
    </symbol>
  </defs>

  <!-- ============================================================ -->
  <!-- PANEL 1 -->
  <!-- ============================================================ -->
  <g>
    <rect x="1.5" y="1.5" width="400" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="3" y="3" width="397" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk -->
      <rect x="-10" y="286" width="420" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- monitor on desk -->
      <rect x="40" y="196" width="120" height="90" rx="5" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <rect x="52" y="208" width="96" height="66" rx="3" fill="#dfe7ec" stroke="#111" stroke-width="2"/>
      <rect x="86" y="286" width="28" height="14" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="66" y="214" width="68" height="60"/>
      <!-- Doug -->
      <use href="#doug" x="196" y="150" width="150" height="200"/>
      <!-- Doug balloon -->
      <path d="M198,66 L198,26 Q198,14 212,14 L360,14 Q374,14 374,26 L374,96 Q374,108 360,108 L262,108 L238,132 L246,108 L212,108 Q198,108 198,96 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="286" y="46" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">I'll get to that</text>
      <text x="286" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">ticket when hell</text>
      <text x="286" y="86" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">freezes over.</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 2 -->
  <!-- ============================================================ -->
  <g>
    <rect x="415.5" y="1.5" width="398" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="417" y="3" width="395" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <!-- big monitor closeup -->
      <rect x="470" y="150" width="200" height="160" rx="6" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <rect x="486" y="166" width="168" height="120" rx="4" fill="#d7e2e9" stroke="#111" stroke-width="2"/>
      <!-- screen glow hatch -->
      <g stroke="#bcd0dc" stroke-width="1.5">
        <line x1="492" y1="176" x2="648" y2="176"/>
        <line x1="492" y1="188" x2="648" y2="188"/>
      </g>
      <rect x="546" y="306" width="48" height="14" fill="#eae6dc" stroke="#111" stroke-width="2.5"/>
      <use href="#clanker" x="512" y="182" width="116" height="102"/>
      <!-- little ticket popup -->
      <rect x="592" y="196" width="52" height="40" rx="3" fill="#fff" stroke="#111" stroke-width="2"/>
      <line x1="598" y1="206" x2="638" y2="206" stroke="#111" stroke-width="1.5"/>
      <line x1="598" y1="214" x2="638" y2="214" stroke="#111" stroke-width="1.5"/>
      <text x="618" y="230" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="9" text-anchor="middle" fill="#111">REOPENED</text>
      <!-- clanker screen balloon (rectangular, dashed tie to screen) -->
      <line x1="560" y1="150" x2="590" y2="120" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="450" y="24" width="330" height="96" rx="3" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="455" y="29" width="320" height="86" rx="2" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="615" y="52" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Hell, Michigan reached</text>
      <text x="615" y="74" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">31&#176;F at 6:02 this morning.</text>
      <text x="615" y="99" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">I reopened your ticket.</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL 3 -->
  <!-- ============================================================ -->
  <g>
    <rect x="829.5" y="1.5" width="397" height="337" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="831" y="3" width="394" height="334" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <!-- desk -->
      <rect x="820" y="292" width="420" height="60" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <!-- Doug seated left, mug -->
      <use href="#doug" x="848" y="150" width="140" height="200"/>
      <!-- Priya standing, leaning in, the win -->
      <use href="#priya" x="1010" y="146" width="150" height="205"/>
      <!-- Priya balloon -->
      <path d="M986,60 L986,24 Q986,14 998,14 L1150,14 Q1162,14 1162,24 L1162,80 Q1162,90 1150,90 L1070,90 L1050,110 L1056,90 L998,90 Q986,90 986,80 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="1074" y="44" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Relax. I shipped it</text>
      <text x="1074" y="66" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="14.5" text-anchor="middle" fill="#111">Tuesday.</text>
      <!-- Doug small button balloon -->
      <path d="M852,196 L852,172 Q852,164 862,164 L950,164 Q960,164 960,172 L960,204 Q960,212 950,212 L910,212 L898,228 L900,212 L862,212 Q852,212 852,204 Z" fill="#fff" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="906" y="188" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">Huh. Feels</text>
      <text x="906" y="204" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">warmer already.</text>
    </g>
  </g>
</svg>