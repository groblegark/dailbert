<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ===================== SYMBOLS ===================== -->

    <!-- PRIYA: dark curly hair up, rectangular glasses, rolled sleeves -->
    <symbol id="priya" viewBox="0 0 120 200">
      <path d="M30 40 q-4 -30 30 -32 q34 2 30 32 q4 -18 -8 -26 q-10 -12 -22 -12 q-12 0 -22 12 q-12 8 -8 26z" fill="#111"/>
      <circle cx="52" cy="9" r="8" fill="#111"/>
      <ellipse cx="60" cy="50" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M32 44 q-5 -30 28 -32 q33 2 28 32 q-14 -12 -28 -11 q-14 -1 -28 11z" fill="#111"/>
      <rect x="40" y="46" width="18" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <rect x="63" y="46" width="18" height="13" rx="2.5" fill="#fff" stroke="#111" stroke-width="2.5"/>
      <line x1="58" y1="51" x2="63" y2="51" stroke="#111" stroke-width="2.5"/>
      <circle cx="49" cy="52.5" r="2.2" fill="#111"/>
      <circle cx="72" cy="52.5" r="2.2" fill="#111"/>
      <path d="M50 70 q10 5 20 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M34 84 q26 20 52 0 l8 86 h-68 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 84 l-6 46 l14 6 l4 -40z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M86 84 l6 46 l-14 6 l-4 -40z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <line x1="30" y1="118" x2="44" y2="124" stroke="#111" stroke-width="2.5"/>
      <line x1="90" y1="118" x2="76" y2="124" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE BOSS: two tall hair spikes, tiny eyes, suit and tie -->
    <symbol id="boss" viewBox="0 0 120 200">
      <path d="M40 34 q-6 -40 14 -18 q6 -30 12 0 q20 -22 14 18z" fill="#111"/>
      <ellipse cx="60" cy="50" rx="28" ry="32" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M34 42 q-5 -14 26 -14 q31 0 26 14 q-14 -8 -26 -8 q-12 0 -26 8z" fill="#111"/>
      <circle cx="50" cy="50" r="2.4" fill="#111"/>
      <circle cx="70" cy="50" r="2.4" fill="#111"/>
      <path d="M52 64 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M34 84 q26 20 52 0 l9 86 h-70 z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 84 l-12 10 l12 8 l12 -8z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 102 l-6 8 l6 44 l6 -44z" fill="#111"/>
      <line x1="48" y1="94" x2="60" y2="102" stroke="#111" stroke-width="2.5"/>
      <line x1="72" y1="94" x2="60" y2="102" stroke="#111" stroke-width="2.5"/>
    </symbol>

    <!-- THE CLANKER: chrome robot head, slot eyes, grille, antenna -->
    <symbol id="clanker" viewBox="0 0 120 120">
      <line x1="60" y1="18" x2="60" y2="4" stroke="#111" stroke-width="2.5"/>
      <circle cx="60" cy="3" r="3.5" fill="#111"/>
      <rect x="26" y="18" width="68" height="58" rx="9" fill="#cfcfcf" stroke="#111" stroke-width="2.5"/>
      <rect x="33" y="26" width="54" height="42" rx="6" fill="#2b2b2b" stroke="#111" stroke-width="2"/>
      <rect x="40" y="38" width="16" height="7" rx="3.5" fill="#eafcff"/>
      <rect x="64" y="38" width="16" height="7" rx="3.5" fill="#eafcff"/>
      <g stroke="#8a8a8a" stroke-width="2">
        <line x1="44" y1="56" x2="76" y2="56"/>
        <line x1="44" y1="61" x2="76" y2="61"/>
        <line x1="44" y1="56" x2="44" y2="61"/>
        <line x1="52" y1="56" x2="52" y2="61"/>
        <line x1="60" y1="56" x2="60" y2="61"/>
        <line x1="68" y1="56" x2="68" y2="61"/>
        <line x1="76" y1="56" x2="76" y2="61"/>
      </g>
    </symbol>

  </defs>

  <!-- ===================== BACKDROP ===================== -->
  <rect x="0" y="0" width="1228" height="340" fill="#f4f1ea"/>

  <!-- ============ PANEL 1 ============ -->
  <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="clip1"><rect x="2" y="2" width="396" height="336" rx="3"/></clipPath>
  <g clip-path="url(#clip1)">
    <!-- projected screen on wall -->
    <rect x="150" y="120" width="230" height="150" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <!-- projector cone hatching -->
    <g stroke="#ddd8cb" stroke-width="1.5">
      <line x1="40" y1="300" x2="150" y2="140"/>
      <line x1="40" y1="300" x2="150" y2="250"/>
    </g>
    <!-- clanker lives inside the projected slide -->
    <use href="#clanker" x="168" y="138" width="80" height="80"/>
    <text x="285" y="180" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="15" font-style="italic" fill="#111">SYNERGY VELOCITY</text>
    <text x="285" y="200" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#666">a summer paradigm</text>
    <text x="285" y="214" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="11" fill="#666">framework</text>

    <!-- Boss presenting, gesturing at screen -->
    <use href="#boss" x="12" y="150" width="120" height="200"/>

    <!-- Boss balloon -->
    <path d="M120 40 q0 -12 12 -12 h108 q12 0 12 12 v34 q0 12 -12 12 h-78 l-14 14 l1 -14 h-17 q-12 0 -12 -12 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="187" y="56" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">This slide will change</text>
    <text x="187" y="73" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13.5" fill="#111">how we ship things.</text>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="clip2"><rect x="416" y="2" width="396" height="336" rx="3"/></clipPath>
  <g clip-path="url(#clip2)">
    <!-- projected screen, now a loading spinner -->
    <rect x="452" y="120" width="200" height="140" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <circle cx="552" cy="176" r="20" fill="none" stroke="#ccc" stroke-width="4"/>
    <path d="M552 156 a20 20 0 0 1 18 12" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    <text x="552" y="228" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#777">rendering slide 2 of 41...</text>

    <!-- Boss on left, still admiring the screen -->
    <use href="#boss" x="428" y="160" width="110" height="180"/>

    <!-- Priya on right at a laptop -->
    <use href="#priya" x="672" y="150" width="120" height="200"/>
    <rect x="694" y="300" width="88" height="10" rx="2" fill="#111"/>
    <rect x="704" y="262" width="68" height="40" rx="3" fill="#2b2b2b" stroke="#111" stroke-width="2"/>
    <rect x="709" y="267" width="58" height="30" rx="2" fill="#3a3a3a"/>
    <line x1="714" y1="274" x2="756" y2="274" stroke="#7fe38a" stroke-width="1.5"/>
    <line x1="714" y1="280" x2="748" y2="280" stroke="#7fe38a" stroke-width="1.5"/>
    <line x1="714" y1="286" x2="752" y2="286" stroke="#7fe38a" stroke-width="1.5"/>

    <!-- Boss balloon -->
    <path d="M448 40 q0 -10 10 -10 h74 q10 0 10 10 v26 q0 10 -10 10 h-44 l-12 12 l1 -12 h-19 q-10 0 -10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="495" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Still loading.</text>
    <text x="495" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Worth the wait.</text>

    <!-- Priya balloon -->
    <path d="M602 40 q0 -10 10 -10 h96 q10 0 10 10 v28 q0 10 -10 10 h-30 l-12 12 l1 -12 h-54 q-10 0 -10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="665" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">I built the thing</text>
    <text x="665" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">the slide's about.</text>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
  <clipPath id="clip3"><rect x="830" y="2" width="396" height="336" rx="3"/></clipPath>
  <g clip-path="url(#clip3)">
    <!-- screen finally shows the deck slide -->
    <rect x="1000" y="120" width="200" height="140" rx="4" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <use href="#clanker" x="1010" y="132" width="64" height="64"/>
    <text x="1110" y="180" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" font-style="italic" fill="#111">Q3: Ship Real</text>
    <text x="1110" y="196" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" font-style="italic" fill="#111">Things</text>

    <!-- Boss center, admiring the finished slide -->
    <use href="#boss" x="862" y="150" width="120" height="200"/>

    <!-- Priya heading out, closed laptop under arm -->
    <use href="#priya" x="1044" y="160" width="110" height="180"/>
    <rect x="1066" y="252" width="42" height="11" rx="2" fill="#2b2b2b" stroke="#111" stroke-width="1.5" transform="rotate(-9 1087 257)"/>

    <!-- Boss balloon -->
    <path d="M860 40 q0 -10 10 -10 h104 q10 0 10 10 v30 q0 10 -10 10 h-58 l-12 12 l1 -12 h-35 q-10 0 -10 -10 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="922" y="52" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">There it is.</text>
    <text x="922" y="69" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">Priya, you should</text>
    <text x="922" y="86" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111">really see this one.</text>

    <!-- Priya button balloon -->
    <path d="M996 42 q0 -9 9 -9 h74 q9 0 9 9 v22 q0 9 -9 9 h-26 l-11 11 l1 -11 h-38 q-9 0 -9 -9 z" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="1051" y="54" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">It's in prod.</text>
    <text x="1051" y="70" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111">Slide's behind.</text>
  </g>

</svg>