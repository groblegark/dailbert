<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- ============ SYMBOLS ============ -->

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 100 130">
      <ellipse cx="50" cy="34" rx="26" ry="30" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M50 4 q9 -8 4 -14 q7 4 2 14" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="40" cy="34" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <circle cx="60" cy="34" r="8" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <line x1="48" y1="34" x2="52" y2="34" stroke="#111" stroke-width="2.4"/>
      <circle cx="40" cy="34" r="2" fill="#111"/>
      <circle cx="60" cy="34" r="2" fill="#111"/>
      <path d="M42 50 q8 6 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M34 62 q16 12 32 0 l8 40 q-24 10 -48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M50 62 l-6 12 l6 8 l6 -8 z" fill="#111"/>
      <path d="M50 82 l0 20" stroke="#111" stroke-width="2.4"/>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 110 130">
      <circle cx="52" cy="36" r="32" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="42" cy="32" r="2.6" fill="#111"/>
      <circle cx="63" cy="32" r="2.6" fill="#111"/>
      <path d="M38 44 q14 16 28 0" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M32 66 q20 12 40 0 l7 42 q-27 10 -54 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- arm to mug -->
      <path d="M76 84 q22 4 26 22" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="96" y="100" width="20" height="18" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M116 104 q8 1 8 6 q0 5 -8 6" fill="none" stroke="#111" stroke-width="2.6"/>
    </symbol>

    <!-- PRIYA -->
    <symbol id="priya" viewBox="0 0 100 130">
      <path d="M22 30 q4 -22 28 -22 q24 0 28 22 q4 8 -4 10 l-48 0 q-8 -2 -4 -10z" fill="#111"/>
      <ellipse cx="50" cy="36" rx="25" ry="29" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <path d="M25 30 q4 -20 25 -21 q21 1 25 21 q-14 -8 -25 -6 q-11 -2 -25 6z" fill="#111"/>
      <rect x="30" y="30" width="17" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <rect x="53" y="30" width="17" height="12" rx="2.5" fill="#f4f1ea" stroke="#111" stroke-width="2.3"/>
      <line x1="47" y1="35" x2="53" y2="35" stroke="#111" stroke-width="2.3"/>
      <circle cx="38.5" cy="36" r="2" fill="#111"/>
      <circle cx="61.5" cy="36" r="2" fill="#111"/>
      <path d="M42 52 q8 4 16 0" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M34 64 q16 11 32 0 l7 40 q-23 10 -46 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <!-- rolled sleeves: cuff bands -->
      <path d="M36 76 l-4 22" stroke="#111" stroke-width="2.4" fill="none"/>
      <path d="M64 76 l4 22" stroke="#111" stroke-width="2.4" fill="none"/>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 100 130">
      <path d="M30 22 l6 -20 l6 18 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M58 20 l6 -18 l6 20 z" fill="#f4f1ea" stroke="#111" stroke-width="2.4" stroke-linejoin="round"/>
      <ellipse cx="50" cy="34" rx="25" ry="27" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <circle cx="42" cy="34" r="1.8" fill="#111"/>
      <circle cx="58" cy="34" r="1.8" fill="#111"/>
      <path d="M44 46 q6 3 12 0" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M34 60 q16 10 32 0 l8 42 q-24 10 -48 0 z" fill="#f4f1ea" stroke="#111" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M50 60 l-7 10 l7 30 l7 -30 z" fill="#111"/>
    </symbol>

    <!-- CLANKER (robot head, lives only inside a surface) -->
    <symbol id="clanker" viewBox="0 0 120 110">
      <line x1="60" y1="6" x2="60" y2="20" stroke="#9aa0a6" stroke-width="2.4"/>
      <circle cx="60" cy="5" r="3.4" fill="#9aa0a6"/>
      <rect x="22" y="20" width="76" height="64" rx="9" fill="none" stroke="#9aa0a6" stroke-width="2.8"/>
      <rect x="33" y="40" width="22" height="12" rx="3" fill="#9aa0a6"/>
      <rect x="65" y="40" width="22" height="12" rx="3" fill="#9aa0a6"/>
      <g stroke="#9aa0a6" stroke-width="2.2">
        <line x1="37" y1="66" x2="83" y2="66"/>
        <line x1="45" y1="60" x2="45" y2="72"/>
        <line x1="55" y1="60" x2="55" y2="72"/>
        <line x1="65" y1="60" x2="65" y2="72"/>
        <line x1="75" y1="60" x2="75" y2="72"/>
      </g>
    </symbol>
  </defs>

  <!-- ============ PANEL 1 ============ -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip1"><rect x="2" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip1)">
      <!-- desk edge -->
      <rect x="0" y="286" width="401" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- Dailbert at his desk -->
      <use href="#dailbert" x="34" y="150" width="100" height="130"/>

      <!-- monitor with clanker -->
      <rect x="210" y="120" width="170" height="118" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.8"/>
      <rect x="222" y="132" width="146" height="94" rx="3" fill="#e9e6df" stroke="#9aa0a6" stroke-width="1.6"/>
      <g clip-path="url(#clip1)"><use href="#clanker" x="238" y="130" width="120" height="110"/></g>
      <rect x="278" y="238" width="34" height="18" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <rect x="252" y="256" width="86" height="8" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- receipt in Dailbert's hand -->
      <g transform="rotate(-8 120 210)">
        <rect x="102" y="188" width="34" height="44" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
        <line x1="108" y1="196" x2="130" y2="196" stroke="#111" stroke-width="1.4"/>
        <line x1="108" y1="203" x2="130" y2="203" stroke="#111" stroke-width="1.4"/>
        <line x1="108" y1="210" x2="124" y2="210" stroke="#111" stroke-width="1.4"/>
        <text x="119" y="226" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="10" text-anchor="middle" fill="#111">$3.00</text>
      </g>

      <!-- Dailbert balloon -->
      <path d="M14 42 h150 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-70 l-16 16 l2 -16 h-66 a10 10 0 0 1 -10 -10 v-34 a10 10 0 0 1 10 -10z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="89" y="62" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">I bought a pack</text>
      <text x="89" y="79" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">of pens. Three</text>
      <text x="89" y="96" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="14" text-anchor="middle" fill="#111">dollars.</text>

      <!-- Clanker balloon (rectangular, dashed tail) -->
      <line x1="298" y1="128" x2="298" y2="102" stroke="#111" stroke-width="1.4" stroke-dasharray="4 4"/>
      <rect x="196" y="30" width="192" height="72" rx="3" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="292" y="50" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Logged. This looks</text>
      <text x="292" y="66" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">like the start of a</text>
      <text x="292" y="82" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">vendor relationship.</text>
    </g>
  </g>

  <!-- ============ PANEL 2 ============ -->
  <g>
    <rect x="415" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip2"><rect x="416" y="2" width="398" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip2)">
      <rect x="414" y="286" width="401" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- Priya standing, arms relaxed, unimpressed -->
      <use href="#priya" x="470" y="150" width="100" height="130"/>

      <!-- Dailbert turned toward her -->
      <use href="#dailbert" x="640" y="152" width="96" height="128"/>

      <!-- monitor small, showing an escalation flow -->
      <rect x="562" y="196" width="112" height="80" rx="5" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="571" y="205" width="94" height="62" rx="2" fill="#e9e6df" stroke="#9aa0a6" stroke-width="1.4"/>
      <g font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="8.5" fill="#4a4a4a" text-anchor="middle">
        <text x="618" y="217">$3 pens</text>
        <text x="618" y="230">&#8595; Manager</text>
        <text x="618" y="243">&#8595; Director</text>
        <text x="618" y="256">&#8595; VP sign-off</text>
      </g>

      <!-- Priya balloon -->
      <path d="M430 34 h150 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-64 l-16 16 l2 -16 h-72 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="505" y="54" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">It routed your pens</text>
      <text x="505" y="71" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">to a VP for sign-off.</text>
      <text x="505" y="88" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">Strategic, apparently.</text>

      <!-- Dailbert small reply -->
      <path d="M700 96 h96 a8 8 0 0 1 8 8 v26 a8 8 0 0 1 -8 8 h-40 l-12 12 l1 -12 h-45 a8 8 0 0 1 -8 -8 v-26 a8 8 0 0 1 8 -8z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="756" y="115" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">The VP loves</text>
      <text x="756" y="131" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13" text-anchor="middle" fill="#111">a good vendor.</text>
    </g>
  </g>

  <!-- ============ PANEL 3 ============ -->
  <g>
    <rect x="829" y="1" width="399" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <clipPath id="clip3"><rect x="830" y="2" width="397" height="336" rx="3"/></clipPath>
    <g clip-path="url(#clip3)">
      <rect x="828" y="286" width="400" height="54" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>

      <!-- Boss beaming, holding a printed page -->
      <use href="#boss" x="880" y="150" width="100" height="130"/>
      <!-- boss arm + paper -->
      <path d="M905 220 q-16 6 -26 -6" fill="none" stroke="#111" stroke-width="2.6" stroke-linecap="round"/>
      <g transform="rotate(-6 866 220)">
        <rect x="846" y="196" width="42" height="52" fill="#f4f1ea" stroke="#111" stroke-width="2.2"/>
        <line x1="852" y1="206" x2="882" y2="206" stroke="#111" stroke-width="1.4"/>
        <line x1="852" y1="214" x2="882" y2="214" stroke="#111" stroke-width="1.4"/>
        <line x1="852" y1="222" x2="876" y2="222" stroke="#111" stroke-width="1.4"/>
        <text x="867" y="240" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="9" text-anchor="middle" fill="#111">APPROVED</text>
      </g>

      <!-- Priya at right, deadpan, arms crossed -->
      <use href="#priya" x="1080" y="152" width="98" height="128"/>

      <!-- Boss balloon -->
      <path d="M960 30 h190 a10 10 0 0 1 10 10 v40 a10 10 0 0 1 -10 10 h-96 l-16 16 l2 -16 h-84 a10 10 0 0 1 -10 -10 v-40 a10 10 0 0 1 10 -10z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1057" y="50" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">The VP signed off.</text>
      <text x="1057" y="67" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">We now have a</text>
      <text x="1057" y="84" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">preferred pen partner.</text>

      <!-- Priya button line -->
      <path d="M968 118 h150 a9 9 0 0 1 9 9 v28 a9 9 0 0 1 -9 9 h-44 l-14 14 l2 -14 h-94 a9 9 0 0 1 -9 -9 v-28 a9 9 0 0 1 9 -9z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <text x="1043" y="138" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">I paid the three</text>
      <text x="1043" y="155" font-family="'Comic Sans MS','Comic Neue',sans-serif" font-size="13.5" text-anchor="middle" fill="#111">dollars myself.</text>
    </g>
  </g>
</svg>