<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 388" width="1228" height="388" font-family="Georgia,serif">
    <rect width="1228" height="388" fill="#f4f1ea"/>
    <text x="4" y="26" font-family="Georgia,serif" font-weight="bold" font-size="22" fill="#111">Droll</text>
    <text x="1224" y="26" text-anchor="end" font-family="'Courier New',monospace" font-size="14" fill="#111" opacity="0.7">2026-07-22</text>
    <line x1="4" y1="34" x2="1224" y2="34" stroke="#111" stroke-width="2"/>
    <g transform="translate(0,40)">
  <defs>
    <symbol id="clanker" viewBox="0 0 100 100">
      <line x1="50" y1="18" x2="50" y2="6" stroke="#111" stroke-width="2"/>
      <circle cx="50" cy="5" r="3" fill="#111"/>
      <rect x="20" y="18" width="60" height="55" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
      <rect x="26" y="30" width="20" height="11" rx="2" fill="#111"/>
      <rect x="54" y="30" width="20" height="11" rx="2" fill="#111"/>
      <rect x="29" y="33" width="14" height="4" rx="1" fill="#f4f1ea"/>
      <rect x="57" y="33" width="14" height="4" rx="1" fill="#f4f1ea"/>
      <rect x="30" y="52" width="40" height="13" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="38" y1="52" x2="38" y2="65" stroke="#111" stroke-width="1.5"/>
      <line x1="46" y1="52" x2="46" y2="65" stroke="#111" stroke-width="1.5"/>
      <line x1="54" y1="52" x2="54" y2="65" stroke="#111" stroke-width="1.5"/>
      <line x1="62" y1="52" x2="62" y2="65" stroke="#111" stroke-width="1.5"/>
    </symbol>
    <symbol id="dailbert" viewBox="0 0 100 130">
      <path d="M18 130 Q18 96 50 92 Q82 96 82 130 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M42 95 L50 108 L58 95" fill="none" stroke="#111" stroke-width="2"/>
      <path d="M50 108 L45 118 L50 129 L55 118 Z" fill="#111"/>
      <ellipse cx="50" cy="55" rx="28" ry="33" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M50 23 q9 -10 2 -17" fill="none" stroke="#111" stroke-width="2.5"/>
      <circle cx="40" cy="52" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <circle cx="62" cy="52" r="9" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <line x1="49" y1="52" x2="53" y2="52" stroke="#111" stroke-width="2"/>
      <circle cx="40" cy="53" r="2" fill="#111"/>
      <circle cx="62" cy="53" r="2" fill="#111"/>
      <path d="M51 58 l-3 8 l4 0" fill="none" stroke="#111" stroke-width="1.5"/>
      <path d="M42 76 q8 3 16 0" fill="none" stroke="#111" stroke-width="2"/>
    </symbol>
    <symbol id="doug" viewBox="0 0 120 140">
      <path d="M14 140 Q14 100 55 95 Q96 100 96 140 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M45 99 L55 112 L65 99" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="55" cy="55" r="34" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M49 23 q5 -10 12 -3 q-4 2 -2 6" fill="#111" stroke="#111" stroke-width="1"/>
      <circle cx="45" cy="50" r="3" fill="#111"/>
      <circle cx="66" cy="50" r="3" fill="#111"/>
      <circle cx="55" cy="60" r="2.5" fill="none" stroke="#111" stroke-width="1.5"/>
      <path d="M39 66 q16 21 33 0 q-16 8 -33 0 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    </symbol>
    <symbol id="mug" viewBox="0 0 80 72">
      <ellipse cx="34" cy="13" rx="26" ry="5" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
      <path d="M8 13 L60 13 L57 62 Q57 68 50 68 L18 68 Q11 68 11 62 Z" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
      <path d="M60 22 q16 2 14 17 q-2 13 -16 13" fill="none" stroke="#111" stroke-width="2.5"/>
    </symbol>
  </defs>

  <!-- ===================== PANEL 1 ===================== -->
  <g>
    <rect x="2" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- desk -->
    <line x1="6" y1="300" x2="394" y2="300" stroke="#111" stroke-width="2.5"/>
    <line x1="120" y1="300" x2="150" y2="336" stroke="#111" stroke-width="1.5"/>
    <line x1="300" y1="300" x2="330" y2="336" stroke="#111" stroke-width="1.5"/>
    <!-- monitor -->
    <rect x="55" y="168" width="150" height="118" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <rect x="66" y="179" width="128" height="96" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="115" y="286" width="30" height="10" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <rect x="98" y="296" width="64" height="6" rx="2" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <!-- scanlines -->
    <g stroke="#111" stroke-width="1" opacity="0.12">
      <line x1="68" y1="188" x2="192" y2="188"/>
      <line x1="68" y1="200" x2="192" y2="200"/>
      <line x1="68" y1="212" x2="192" y2="212"/>
      <line x1="68" y1="224" x2="192" y2="224"/>
      <line x1="68" y1="236" x2="192" y2="236"/>
      <line x1="68" y1="248" x2="192" y2="248"/>
      <line x1="68" y1="260" x2="192" y2="260"/>
    </g>
    <use href="#clanker" x="90" y="188" width="80" height="80"/>
    <!-- dailbert -->
    <use href="#dailbert" x="262" y="163" width="122" height="159"/>
    <!-- dailbert balloon -->
    <path d="M296 76 L318 92 L326 78" fill="#f4f1ea"/>
    <rect x="222" y="20" width="158" height="58" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="301" y="44" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">The new model's</text>
    <text x="301" y="63" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">funnier. Drier.</text>
    <!-- clanker balloon -->
    <line x1="113" y1="108" x2="128" y2="168" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="18" y="12" width="192" height="96" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="23" y="17" width="182" height="86" rx="3" fill="none" stroke="#111" stroke-width="1"/>
    <text x="114" y="37" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I don't know what you</text>
    <text x="114" y="54" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">mean. I simply say</text>
    <text x="114" y="71" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">true things at the</text>
    <text x="114" y="88" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">wrong volume.</text>
  </g>

  <!-- ===================== PANEL 2 ===================== -->
  <g>
    <rect x="416" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- floor / office hint -->
    <line x1="420" y1="308" x2="808" y2="308" stroke="#111" stroke-width="2"/>
    <line x1="760" y1="120" x2="760" y2="308" stroke="#111" stroke-width="1.5" opacity="0.4"/>
    <line x1="760" y1="120" x2="806" y2="120" stroke="#111" stroke-width="1.5" opacity="0.4"/>
    <!-- doug -->
    <use href="#doug" x="444" y="172" width="132" height="154"/>
    <!-- doug mug with clanker in sheen -->
    <g>
      <use href="#mug" x="520" y="238" width="78" height="70"/>
      <use href="#clanker" x="533" y="246" width="46" height="46" opacity="0.5"/>
      <path d="M528 250 q6 26 0 52" fill="none" stroke="#555" stroke-width="3" opacity="0.5"/>
    </g>
    <!-- dailbert -->
    <use href="#dailbert" x="662" y="178" width="116" height="151"/>
    <!-- doug balloon -->
    <path d="M498 68 L508 92 L520 70" fill="#f4f1ea"/>
    <rect x="432" y="16" width="150" height="54" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="507" y="39" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Can it do knock-</text>
    <text x="507" y="57" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">knock jokes?</text>
    <!-- clanker balloon -->
    <line x1="700" y1="122" x2="558" y2="250" stroke="#111" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="606" y="12" width="192" height="110" rx="4" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <rect x="611" y="17" width="182" height="100" rx="3" fill="none" stroke="#111" stroke-width="1"/>
    <text x="702" y="34" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Doug, you are a</text>
    <text x="702" y="51" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">knock-knock joke.</text>
    <text x="702" y="68" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">There's a 'who's</text>
    <text x="702" y="85" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">there,' then a long</text>
    <text x="702" y="102" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">disappointment.</text>
  </g>

  <!-- ===================== PANEL 3 ===================== -->
  <g>
    <rect x="830" y="2" width="396" height="336" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="3"/>
    <!-- floor / office hint -->
    <line x1="834" y1="308" x2="1222" y2="308" stroke="#111" stroke-width="2"/>
    <line x1="1180" y1="120" x2="1180" y2="308" stroke="#111" stroke-width="1.5" opacity="0.4"/>
    <line x1="1180" y1="120" x2="1220" y2="120" stroke="#111" stroke-width="1.5" opacity="0.4"/>
    <!-- doug -->
    <use href="#doug" x="866" y="178" width="128" height="150"/>
    <!-- doug plain mug -->
    <use href="#mug" x="960" y="250" width="64" height="58"/>
    <!-- dailbert -->
    <use href="#dailbert" x="1062" y="178" width="116" height="151"/>
    <!-- doug balloon -->
    <path d="M910 60 L920 86 L932 62" fill="#f4f1ea"/>
    <rect x="858" y="18" width="120" height="44" rx="13" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="918" y="46" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="15" fill="#111" text-anchor="middle">It knows me!</text>
    <!-- dailbert balloon -->
    <path d="M1096 84 L1112 104 L1120 86" fill="#f4f1ea"/>
    <rect x="976" y="14" width="214" height="72" rx="14" fill="#f4f1ea" stroke="#111" stroke-width="2"/>
    <text x="1083" y="36" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">That's the tragedy of</text>
    <text x="1083" y="55" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">the good ones, Doug.</text>
    <text x="1083" y="74" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">They always know you.</text>
  </g>
</g>
    
  </svg>