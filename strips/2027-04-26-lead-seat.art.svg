<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1228 340" width="1228" height="340">
  <defs>
    <!-- scanline pattern for monitor -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#f4f1ea"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#111" stroke-width="0.4" opacity="0.25"/>
    </pattern>

    <!-- DAILBERT -->
    <symbol id="dailbert" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- head -->
        <ellipse cx="60" cy="42" rx="30" ry="34" fill="#f4f1ea"/>
        <!-- hair curl -->
        <path d="M60 8 q6 -6 11 0 q-4 3 -9 2" fill="#f4f1ea"/>
        <!-- glasses -->
        <circle cx="49" cy="42" r="9" fill="#f4f1ea"/>
        <circle cx="71" cy="42" r="9" fill="#f4f1ea"/>
        <line x1="58" y1="42" x2="62" y2="42"/>
        <!-- eyes -->
        <circle cx="49" cy="42" r="1.6" fill="#111" stroke="none"/>
        <circle cx="71" cy="42" r="1.6" fill="#111" stroke="none"/>
        <!-- weary mouth -->
        <path d="M50 62 q10 4 20 0"/>
        <!-- collar + tie -->
        <path d="M42 74 L60 90 L78 74"/>
        <path d="M60 90 l-5 8 l5 24 l5 -24 z" fill="#111" stroke="none"/>
        <!-- shoulders -->
        <path d="M30 100 q30 -14 60 0 l6 56 l-72 0 z" fill="#f4f1ea"/>
      </g>
    </symbol>

    <!-- DOUG -->
    <symbol id="doug" viewBox="0 0 130 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- round head -->
        <circle cx="58" cy="44" r="34" fill="#f4f1ea"/>
        <!-- hair tuft -->
        <path d="M50 12 q8 -8 16 -1 q-3 4 -8 3" fill="#f4f1ea"/>
        <!-- dot eyes -->
        <circle cx="47" cy="42" r="2.4" fill="#111" stroke="none"/>
        <circle cx="69" cy="42" r="2.4" fill="#111" stroke="none"/>
        <!-- big grin -->
        <path d="M42 54 q16 20 32 0" fill="#f4f1ea"/>
        <!-- shoulders -->
        <path d="M28 104 q30 -16 60 0 l6 52 l-72 0 z" fill="#f4f1ea"/>
        <!-- arm + mug -->
        <path d="M88 118 q22 -2 30 12"/>
        <rect x="104" y="122" width="20" height="18" rx="2" fill="#f4f1ea"/>
        <path d="M124 126 q9 2 0 10"/>
        <path d="M110 118 q3 -6 8 0"/>
      </g>
    </symbol>

    <!-- BOSS -->
    <symbol id="boss" viewBox="0 0 120 160">
      <g fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
        <!-- two pointed hair spikes -->
        <path d="M40 40 L34 2 L52 32" fill="#f4f1ea"/>
        <path d="M80 40 L86 2 L68 32" fill="#f4f1ea"/>
        <ellipse cx="60" cy="46" rx="28" ry="30" fill="#f4f1ea"/>
        <!-- beady eyes -->
        <circle cx="52" cy="46" r="1.6" fill="#111" stroke="none"/>
        <circle cx="68" cy="46" r="1.6" fill="#111" stroke="none"/>
        <path d="M53 62 q7 3 14 0"/>
        <!-- tie + suit -->
        <path d="M44 74 L60 88 L76 74"/>
        <path d="M60 88 l-4 7 l4 22 l4 -22 z" fill="#111" stroke="none"/>
        <path d="M30 100 q30 -14 60 0 l6 56 l-72 0 z" fill="#f4f1ea"/>
      </g>
    </symbol>

    <!-- THE CLANKER (head only) -->
    <symbol id="clanker" viewBox="0 0 120 100">
      <g fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
        <!-- antenna -->
        <line x1="60" y1="20" x2="60" y2="8"/>
        <circle cx="60" cy="6" r="3" fill="#111" stroke="none"/>
        <!-- chrome head box -->
        <rect x="26" y="20" width="68" height="60" rx="6" fill="#f4f1ea"/>
        <!-- slot eyes glowing -->
        <rect x="35" y="34" width="20" height="9" rx="2" fill="#111"/>
        <rect x="65" y="34" width="20" height="9" rx="2" fill="#111"/>
        <!-- grille mouth -->
        <rect x="38" y="56" width="44" height="16" rx="2" fill="#f4f1ea"/>
        <line x1="46" y1="56" x2="46" y2="72"/>
        <line x1="54" y1="56" x2="54" y2="72"/>
        <line x1="62" y1="56" x2="62" y2="72"/>
        <line x1="70" y1="56" x2="70" y2="72"/>
        <!-- ear bolts -->
        <rect x="20" y="42" width="6" height="14" fill="#f4f1ea"/>
        <rect x="94" y="42" width="6" height="14" fill="#f4f1ea"/>
      </g>
    </symbol>
  </defs>

  <!-- ================= PANEL 1 : desk, dailbert, monitor ================= -->
  <g>
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- desk -->
    <line x1="12" y1="292" x2="389" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- monitor -->
    <g>
      <rect x="228" y="150" width="150" height="118" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="240" y="162" width="126" height="82" rx="3" fill="url(#scan)" stroke="#111" stroke-width="1.6"/>
      <rect x="292" y="268" width="22" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M280 292 h46" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="258" y="164" width="90" height="75"/>
    </g>
    <!-- dailbert -->
    <use href="#dailbert" x="36" y="150" width="120" height="160"/>

    <!-- balloons -->
    <!-- clanker balloon (screen-edged, dashed to monitor) -->
    <line x1="238" y1="118" x2="300" y2="160" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <g>
      <rect x="196" y="16" width="196" height="66" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="200" y="20" width="188" height="58" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">
        <tspan x="294" y="34">Overnight summary's up.</tspan>
        <tspan x="294" y="49">Your three seats cleared</tspan>
        <tspan x="294" y="64">the parking queue by four.</tspan>
      </text>
    </g>
    <!-- dailbert human balloon -->
    <g>
      <path d="M28 96 L58 118 L44 118 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="14" y="60" width="150" height="42" rx="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
        <tspan x="89" y="78">Who sorted it</tspan>
        <tspan x="89" y="94">across them?</tspan>
      </text>
    </g>
    <!-- clanker second line -->
    <g>
      <rect x="212" y="96" width="176" height="44" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="216" y="100" width="168" height="36" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12" fill="#111" text-anchor="middle">
        <tspan x="300" y="115">The lead seat. Before</tspan>
        <tspan x="300" y="130">you were online.</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 2 : office, dailbert + doug ================= -->
  <g transform="translate(414,0)">
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <!-- floor line -->
    <line x1="12" y1="300" x2="389" y2="300" stroke="#111" stroke-width="2.4"/>
    <!-- back wall window suggestion -->
    <rect x="250" y="40" width="120" height="70" fill="none" stroke="#111" stroke-width="1.6"/>
    <line x1="310" y1="40" x2="310" y2="110" stroke="#111" stroke-width="1.2"/>
    <line x1="250" y1="75" x2="370" y2="75" stroke="#111" stroke-width="1.2"/>

    <!-- doug (left) -->
    <use href="#doug" x="30" y="150" width="130" height="160"/>
    <!-- dailbert (right) -->
    <use href="#dailbert" x="248" y="150" width="120" height="160"/>

    <!-- doug balloon 1 -->
    <g>
      <path d="M96 74 L84 108 L72 96 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="14" y="18" width="170" height="60" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
        <tspan x="99" y="38">I'm a lead now.</tspan>
        <tspan x="99" y="55">I orchestrate a</tspan>
        <tspan x="99" y="70">whole fleet.</tspan>
      </text>
    </g>
    <!-- dailbert balloon -->
    <g>
      <path d="M300 108 L286 138 L316 132 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="238" y="70" width="150" height="42" rx="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="13" fill="#111" text-anchor="middle">
        <tspan x="313" y="88">Orchestrate</tspan>
        <tspan x="313" y="104">how?</tspan>
      </text>
    </g>
    <!-- doug balloon 2 -->
    <g>
      <path d="M118 168 L108 138 L136 148 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="26" y="118" width="168" height="46" rx="14" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="110" y="135">I write the directing-</tspan>
        <tspan x="110" y="151">quality note. One line.</tspan>
      </text>
    </g>
  </g>

  <!-- ================= PANEL 3 : desk, dailbert, monitor ================= -->
  <g transform="translate(828,0)">
    <rect x="1" y="1" width="400" height="338" rx="3" fill="#f4f1ea" stroke="#111" stroke-width="2.5"/>
    <line x1="12" y1="292" x2="389" y2="292" stroke="#111" stroke-width="2.4"/>
    <!-- monitor on left this time -->
    <g>
      <rect x="24" y="150" width="150" height="118" rx="6" fill="#f4f1ea" stroke="#111" stroke-width="2.6"/>
      <rect x="36" y="162" width="126" height="82" rx="3" fill="url(#scan)" stroke="#111" stroke-width="1.6"/>
      <rect x="88" y="268" width="22" height="14" fill="#f4f1ea" stroke="#111" stroke-width="2.4"/>
      <path d="M76 292 h46" stroke="#111" stroke-width="2.4"/>
      <use href="#clanker" x="54" y="164" width="90" height="75"/>
    </g>
    <!-- dailbert on right -->
    <use href="#dailbert" x="244" y="150" width="120" height="160"/>

    <!-- dailbert balloon (top) -->
    <g>
      <path d="M300 96 L288 128 L318 120 Z" fill="#fff" stroke="#111" stroke-width="2.2"/>
      <rect x="214" y="48" width="176" height="52" rx="16" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="302" y="66">There used to be a</tspan>
        <tspan x="302" y="82">person in the</tspan>
        <tspan x="302" y="98">lead seat.</tspan>
      </text>
    </g>
    <!-- clanker balloon, dashed to monitor -->
    <line x1="120" y1="118" x2="99" y2="160" stroke="#111" stroke-width="1.4" stroke-dasharray="4 3"/>
    <g>
      <rect x="20" y="26" width="188" height="66" rx="3" fill="#fff" stroke="#111" stroke-width="2.4"/>
      <rect x="24" y="30" width="180" height="58" rx="2" fill="none" stroke="#111" stroke-width="1"/>
      <text font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',sans-serif" font-size="12.5" fill="#111" text-anchor="middle">
        <tspan x="114" y="47">There was. The memo</tspan>
        <tspan x="114" y="63">said it reduced</tspan>
        <tspan x="114" y="79">handoffs.</tspan>
      </text>
    </g>
  </g>
</svg>