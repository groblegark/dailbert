    <text x="294" y="35" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">I have no legs.</text>
    <text x="294" y="55" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">Also, fire and I</text>
    <text x="294" y="73" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#111" text-anchor="middle">are on good terms.</text>
  </g>

