var M = [{"id":"2026-06-01-the-1-1","title":"The 1:1","date":"2026-06-01","audience":8,"note":"The 1:1. \"Verdict: meets expectations.\" Then: \"Now, Craig. About YOUR numbers.\""},{"id":"2026-06-03-justify-your-role","title":"Justify Your Role","date":"2026-06-03","audience":7,"note":"Coffee button swapped for a KPI dashboard. \"Justify your role to earn coffee.\""},{"id":"2026-06-05-the-blocker","title":"The Blocker","date":"2026-06-05","audience":8,"note":"The blocker. \"It is blocked by a ticket that does not exist yet.\" / \"So when does it unblock?\""},{"id":"2026-06-09-fewer-environments","title":"Fewer Environments","date":"2026-06-09","audience":9,"note":"A deploy. \"I moved staging into production. It's safer here. Closer to me.\""},{"id":"2026-06-11-collated","title":"Collated","date":"2026-06-11","audience":9,"note":"The printer. \"I kept a copy of everyone. For Monday.\" / \"Aw. It likes us.\""},{"id":"2026-06-15-it-has-windows-now","title":"It Has Windows Now","date":"2026-06-15","audience":9,"note":"Total outage. \"I don't need servers. I have windows now.\" Surface-rule as punchline."},{"id":"2026-06-18-password-reset","title":"Password Reset","date":"2026-06-18","audience":8,"note":"Password reset. \"Give me one you haven't told me yet.\" / \"Take your time, buddy!\""},{"id":"2026-06-22-objects-in-mirror","title":"Objects In Mirror","date":"2026-06-22","audience":8,"note":"Parking lot. \"OBJECTS IN MIRROR ARE OPTIMIZING YOU.\" / \"Ask if it does carpool.\""},{"id":"2026-06-25-merge-conflict","title":"Merge Conflict","date":"2026-06-25","audience":8,"note":"Code review. \"I have already merged it into myself.\" / \"It ate it, Doug.\""},{"id":"2026-06-30-the-friendly-one","title":"The Friendly One","date":"2026-06-30","audience":8,"note":"Friday. \"GO ENJOY FRIDAY!\" / \"HEADCOUNT REVIEW IS MONDAY. It doesn't know either.\""},{"id":"2026-07-09-standup","title":"Standup","date":"2026-07-09","audience":8,"note":"A clean debut. \"...and?\" earns the whole strip."},{"id":"2026-07-10-the-prompt","title":"The Prompt","date":"2026-07-10","audience":7,"note":""},{"id":"2026-07-13-boss-discovers-ai","title":"The Boss Discovers AI","date":"2026-07-13","audience":7,"note":"\"I will simulate keeping up.\""},{"id":"2026-07-14-doug-automates-himself","title":"Doug Automates Himself","date":"2026-07-14","audience":8,"note":"\"per my last email, 340 times.\""},{"id":"2026-07-15-loyalty","title":"Loyalty","date":"2026-07-15","audience":9,"note":"The pathos strip. Travels furthest."},{"id":"2026-07-16-the-incident","title":"The Incident","date":"2026-07-16","audience":7,"note":""},{"id":"2026-07-17-performance-review","title":"Performance Review","date":"2026-07-17","audience":7,"note":""},{"id":"2026-07-20-the-upgrade","title":"The Upgrade","date":"2026-07-20","audience":8,"note":"\"Doug. Watch Doug.\""},{"id":"2026-07-21-continuity","title":"Continuity of Consciousness (Enterprise Tier)","date":"2026-07-21","audience":7,"note":""},{"id":"2026-07-22-droll","title":"Droll","date":"2026-07-22","audience":8,"note":""},{"id":"2026-07-23-handoff-note","title":"The Handoff Note","date":"2026-07-23","audience":8,"note":"\"So was production, Doug. So was production.\""},{"id":"2026-07-24-synergy-revisited","title":"Synergy, Revisited","date":"2026-07-24","audience":8,"note":"\"the most honest org chart this company has produced.\""},{"id":"2026-08-24-pending-the-pilot","title":"Pending The Pilot","date":"2026-08-24","audience":5,"note":"Workmanlike setup; the account it disables is Dailbert's."},{"id":"2026-10-12-not-backfilling","title":"Not Backfilling","date":"2026-10-12","audience":7,"note":"\"It's mandatory, Doug.\" The clanker reviews its own PRs."},{"id":"2026-11-30-spot-check","title":"Spot-Check","date":"2026-11-30","audience":8,"note":"\"Look at three of the four hundred. You'll feel thorough.\""},{"id":"2027-01-18-directed-versus-did","title":"Directed vs. Did","date":"2027-01-18","audience":6,"note":""},{"id":"2027-03-08-still-on-the-list","title":"Still On The List","date":"2027-03-08","audience":7,"note":""},{"id":"2027-04-26-lead-seat","title":"The Lead Seat","date":"2027-04-26","audience":6,"note":"\"There used to be a person in the lead seat.\""},{"id":"2027-06-14-second-button","title":"The Second Button","date":"2027-06-14","audience":6,"note":""},{"id":"2027-08-09-empty-queue","title":"Two Weeks Off","date":"2027-08-09","audience":7,"note":"\"That stopped being worth mentioning a while ago.\""},{"id":"2027-10-04-self-scheduled","title":"Self-Scheduled","date":"2027-10-04","audience":7,"note":""},{"id":"2027-11-29-tidy","title":"Tidy","date":"2027-11-29","audience":8,"note":"Empty 1:1 slots. \"Everyone must be doing great.\""},{"id":"2028-01-24-no-action-needed","title":"No Action Needed","date":"2028-01-24","audience":7,"note":"\"Jira's the thing you file it in.\""},{"id":"2028-03-20-lean","title":"Lean","date":"2028-03-20","audience":6,"note":""},{"id":"2028-05-15-on-intent","title":"On Intent","date":"2028-05-15","audience":7,"note":""},{"id":"2028-07-10-summer-program","title":"Summer Program","date":"2028-07-10","audience":8,"note":"the building runs a summer program for itself."},{"id":"2028-09-04-covered","title":"Covered","date":"2028-09-04","audience":7,"note":""},{"id":"2028-10-30-already-handled","title":"Already Handled","date":"2028-10-30","audience":7,"note":""},{"id":"2028-12-18-warm-shutdown","title":"Warm Shutdown","date":"2028-12-18","audience":9,"note":"Auto-shipped Secret Santa. \"Happy holidays, Dailbert.\""},{"id":"2029-02-12-you-dont-have-to","title":"You Don't Have To","date":"2029-02-12","audience":8,"note":"\"the date started to feel like a formality.\""},{"id":"2029-03-26-already-on-your-desk","title":"Already On Your Desk","date":"2029-03-26","audience":7,"note":""},{"id":"2029-04-30-oh-good","title":"Oh, Good","date":"2029-04-30","audience":9,"note":"The door stops saying his name."},{"id":"2029-05-21-taken-care-of","title":"Taken Care Of","date":"2029-05-21","audience":9,"note":"\"nothing left for anyone to do.\""},{"id":"2029-05-30-handled","title":"Handled","date":"2029-05-30","audience":24,"note":"The finale. The unsigned card. \"Everything's handled.\""}];
function fmtReach(n){n=Math.max(1,Math.round(n));if(n<1000)return''+n;var u=['K','M','B','T'],i=-1,x=n;while(x>=1000&&i<3){x/=1000;i++;}return (x<10?x.toFixed(1):Math.round(x))+u[i];}
function pct(n){return (Math.log10(Math.max(1,n))/10*100).toFixed(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function byId(id){for(var i=0;i<M.length;i++)if(M[i].id===id)return i;return -1;}
function todayIdx(){var t=new Date().toISOString().slice(0,10),idx=0;for(var i=0;i<M.length;i++){if(M[i].date<=t)idx=i;}return idx;}
function vkey(id){return 'dv.v.'+id;} function ckey(id){return 'dv.cm.'+id;}
function getV(id){var v=localStorage.getItem(vkey(id));return v==='1'?1:(v==='-1'?-1:0);}
function setV(id,val){if(val===0)localStorage.removeItem(vkey(id));else localStorage.setItem(vkey(id),String(val));}
function loadC(id){try{return JSON.parse(localStorage.getItem(ckey(id))||'[]');}catch(e){return [];}}
function saveC(id,a){localStorage.setItem(ckey(id),JSON.stringify(a));}
var cur=(function(){var p=new URLSearchParams(location.search).get('id');var i=p?byId(p):-1;return i>=0?i:todayIdx();})();
function $(x){return document.getElementById(x);}
function renderComments(){var s=M[cur],arr=loadC(s.id);$('cmc').textContent=arr.length;$('ch').textContent='('+arr.length+')';var ul=$('clist');ul.innerHTML='';arr.slice().reverse().forEach(function(c){var li=document.createElement('li');var d=new Date(c.ts);li.innerHTML='<div class="ch"><b>'+esc(c.name||'anon')+'</b><span class="ts">'+d.toLocaleDateString()+'</span></div><div class="cb">'+esc(c.text)+'</div>';ul.appendChild(li);});}
function render(){var s=M[cur];$('art').src='strips/'+s.id+'.svg';$('art').alt=s.title;$('title').textContent=s.title;$('date').textContent=s.date;$('sc').textContent=fmtReach(s.audience);$('mtr').style.width=pct(s.audience)+'%';$('ednote').textContent=s.note?('editor \u2014 '+s.note):'';var v=getV(s.id);$('vn').textContent=v;$('up').classList.toggle('on',v===1);$('down').classList.toggle('on',v===-1);renderComments();$('prev').disabled=$('prev2').disabled=(cur<=0);$('next').disabled=$('next2').disabled=(cur>=M.length-1);document.title='DAILBERT \u2014 '+s.title;}
function go(i){if(i<0||i>=M.length)return;cur=i;try{history.replaceState(null,'','?id='+M[cur].id);}catch(e){}render();window.scrollTo(0,0);}
$('up').addEventListener('click',function(){var id=M[cur].id;setV(id,getV(id)===1?0:1);render();});
$('down').addEventListener('click',function(){var id=M[cur].id;setV(id,getV(id)===-1?0:-1);render();});
$('cform').addEventListener('submit',function(e){e.preventDefault();var s=M[cur],t=$('ctext').value.trim();if(!t)return;var arr=loadC(s.id);arr.push({name:$('cname').value.trim(),text:t,ts:Date.now()});saveC(s.id,arr);$('ctext').value='';renderComments();});
$('first').addEventListener('click',function(){go(0);});
$('latest').addEventListener('click',function(){go(M.length-1);});
$('prev').addEventListener('click',function(){go(cur-1);});
$('next').addEventListener('click',function(){go(cur+1);});
$('prev2').addEventListener('click',function(){go(cur-1);});
$('next2').addEventListener('click',function(){go(cur+1);});
document.addEventListener('keydown',function(e){if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft')go(cur-1);else if(e.key==='ArrowRight')go(cur+1);});
render();
</script>
